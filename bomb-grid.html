<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>爆格特攻</title><style>body{margin:0;background:#11131a;color:#f5f5ed;font-family:system-ui,"Microsoft YaHei"}.app{min-height:100vh;display:grid;place-items:center;padding:12px;box-sizing:border-box}.shell{display:grid;grid-template-columns:minmax(300px,620px) 250px;gap:12px;padding:14px;border:1px solid #484e63;border-radius:18px;background:#20232d}.board{display:grid;grid-template-columns:repeat(13,1fr);gap:3px;aspect-ratio:13/11;background:#151821;padding:5px;border-radius:10px}.cell{border-radius:4px;background:#303744;position:relative;min-height:0}.wall{background:#627080}.crate{background:#a96a45}.p{background:#59dbff;border-radius:50%;margin:17%}.bot{background:#ff6c73;border-radius:50%;margin:17%}.bomb{background:#1b1d24;border:3px solid #ffd762;border-radius:50%;margin:20%}.fire{background:#ff994d;box-shadow:0 0 14px #ff633f}.item:after{content:'✦';color:#83f3b3;position:absolute;inset:0;display:grid;place-items:center}.side{display:flex;flex-direction:column;gap:9px}.card{padding:10px;border:1px solid #42495d;border-radius:9px}.card b{display:block;color:#ffd762;font-size:22px}button{padding:10px;border:1px solid #66718d;border-radius:9px;background:#313b56;color:white;font-weight:bold}.pad{display:none;grid-template-columns:repeat(3,42px);gap:4px}.pad button:nth-child(1){grid-column:2}.pad button:nth-child(2){grid-column:1}.pad button:nth-child(3){grid-column:2}.pad button:nth-child(4){grid-column:3}@media(max-width:680px){.shell{grid-template-columns:1fr;width:100%}.side{display:grid;grid-template-columns:repeat(3,1fr)}.help{display:none}.pad{display:grid;grid-column:1/-1}.board{max-width:100%}}</style><main class="app"><div class="shell"><div class="board" id="b"></div><aside class="side"><div class="card">关卡<b id="lv">1</b></div><div class="card">生命 / 敌军<b id="st">3 / 0</b></div><div class="card">得分<b id="sc">0</b></div><button id="new">重新出击</button><div class="help">方向键/WASD 移动，空格放置炸弹。炸开木箱会掉落炸弹数量、爆炸范围与加速核心；清空敌人进入下一关。</div><div class="pad"><button data-d="0,-1">▲</button><button data-d="-1,0">◀</button><button data-d="0,1">▼</button><button data-d="1,0">▶</button><button id="bomb">炸弹</button></div></aside></div></main><script>
const B=document.querySelector('#b'),L=document.querySelector('#lv'),ST=document.querySelector('#st'),SC=document.querySelector('#sc');let q,keys=new Set(),last=0;const W=13,H=11,K=(x,y)=>x+','+y;function reset(){q={lv:1,hp:3,score:0,p:{x:1,y:1,cd:0,bombs:1,range:2,speed:6},bots:[],bombs:[],fire:[],items:[],map:[],run:true};map();draw()}function map(){q.map=Array.from({length:H},(_,y)=>Array.from({length:W},(_,x)=>x===0||y===0||x===W-1||y===H-1||(x%2===0&&y%2===0)?'wall':(Math.random()<.43&&!(x<3&&y<3)?'crate':'')));q.bots=Array.from({length:2+q.lv},()=>{let p=free();return{x:p.x,y:p.y,t:Math.random()*2}});q.p.x=1;q.p.y=1}function free(){let a=[];for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++)if(!q.map[y][x]&&!q.bombs.some(b=>b.x===x&&b.y===y)&&!(x===q.p.x&&y===q.p.y))a.push({x,y});return a[Math.floor(Math.random()*a.length)]}function move(dx,dy){let x=q.p.x+dx,y=q.p.y+dy;if(!q.run||q.map[y]?.[x]||q.bombs.some(b=>b.x===x&&b.y===y))return;q.p.x=x;q.p.y=y;item();if(q.bots.some(b=>b.x===x&&b.y===y))hurt()}function place(){if(!q.run||q.bombs.length>=q.p.bombs||q.bombs.some(b=>b.x===q.p.x&&b.y===q.p.y))return;q.bombs.push({x:q.p.x,y:q.p.y,t:1.5})}function explode(b){let cells=[[b.x,b.y]];for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]])for(let i=1;i<=q.p.range;i++){let x=b.x+dx*i,y=b.y+dy*i;if(q.map[y][x]==='wall')break;cells.push([x,y]);if(q.map[y][x]==='crate'){q.map[y][x]='';if(Math.random()<.3)q.items.push({x,y,k:['bomb','range','speed'][Math.floor(Math.random()*3)]});break}}q.fire.push(...cells.map(([x,y])=>({x,y,t:.45})));for(const f of cells){if(q.p.x===f[0]&&q.p.y===f[1])hurt();q.bots=q.bots.filter(e=>{if(e.x===f[0]&&e.y===f[1]){q.score+=100;return false}return true})}}function hurt(){if(q.p.cd>0)return;q.hp--;q.p.cd=1.2;q.p.x=1;q.p.y=1;if(q.hp<=0)reset()}function item(){let i=q.items.findIndex(a=>a.x===q.p.x&&a.y===q.p.y);if(i<0)return;let k=q.items.splice(i,1)[0].k;if(k==='bomb')q.p.bombs++;if(k==='range')q.p.range++;if(k==='speed')q.p.speed++;q.score+=30}function update(dt){if(!q.run)return;q.p.cd-=dt;q.bombs.forEach(b=>b.t-=dt);for(const b of q.bombs.filter(b=>b.t<=0)){explode(b);q.bombs.splice(q.bombs.indexOf(b),1)}q.fire.forEach(f=>f.t-=dt);q.fire=q.fire.filter(f=>f.t>0);for(const e of q.bots){e.t-=dt;if(e.t<=0){e.t=.45-Math.min(.2,q.lv*.01);let ds=[[1,0],[-1,0],[0,1],[0,-1]].sort(()=>Math.random()-.5);for(const[dX,dY]of ds){let x=e.x+dX,y=e.y+dY;if(!q.map[y][x]&&!q.bombs.some(b=>b.x===x&&b.y===y)){e.x=x;e.y=y;break}}if(e.x===q.p.x&&e.y===q.p.y)hurt()}}if(!q.bots.length){q.lv++;map()}sync();draw()}function sync(){L.textContent=q.lv;ST.textContent=`${q.hp} / ${q.bots.length}`;SC.textContent=q.score}function draw(){B.innerHTML='';for(let y=0;y<H;y++)for(let x=0;x<W;x++){let d=document.createElement('div'),f=q.fire.find(f=>f.x===x&&f.y===y),it=q.items.find(i=>i.x===x&&i.y===y);d.className='cell '+q.map[y][x]+(f?' fire':'')+(it?' item':'');if(q.p.x===x&&q.p.y===y)d.classList.add('p');if(q.bots.some(e=>e.x===x&&e.y===y))d.classList.add('bot');if(q.bombs.some(e=>e.x===x&&e.y===y))d.classList.add('bomb');B.append(d)}}function loop(t){let dt=Math.min(.04,(t-last)/1000);last=t;update(dt);requestAnimationFrame(loop)}addEventListener('keydown',e=>{let m={ArrowUp:[0,-1],KeyW:[0,-1],ArrowDown:[0,1],KeyS:[0,1],ArrowLeft:[-1,0],KeyA:[-1,0],ArrowRight:[1,0],KeyD:[1,0]};if(m[e.code])move(...m[e.code]);if(e.code==='Space'){e.preventDefault();place()}});document.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>move(...b.dataset.d.split(',').map(Number)));document.querySelector('#bomb').onclick=place;document.querySelector('#new').onclick=reset;reset();requestAnimationFrame(loop);
</script>
