<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>星炉工坊</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23101824'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%23f0d16f'/%3E%3Cpath d='M32 8v12M32 44v12M8 32h12M44 32h12M17 17l8 8M39 39l8 8M47 17l-8 8M25 39l-8 8' stroke='%238bd0bb' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
      :root{--ink:#10191f;--panel:#fffdf4;--line:#87989e;--teal:#287468;--gold:#d6a33d;--red:#bd5148;--blue:#326f91;--violet:#5f5b94;--shadow:rgba(5,12,16,.28);--radius:8px}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,sans-serif;background:linear-gradient(rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(135deg,#0b1724,#143a3b 48%,#383345);background-size:30px 30px,30px 30px,auto}button,textarea{font:inherit}.app{width:min(1460px,calc(100vw - 28px));margin:14px auto}.topbar,.panel{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,244,.97);box-shadow:0 16px 36px var(--shadow)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px}.eyebrow{margin:0 0 5px;color:#856219;font-size:12px;font-weight:900}h1{margin:0;font-size:clamp(26px,4vw,44px);line-height:1}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:42px;padding:0 14px;border:1px solid #24534d;border-radius:var(--radius);color:#fffdf6;background:var(--teal);font-weight:900;cursor:pointer}.btn.secondary{color:var(--ink);background:#f0d17b;border-color:#9c7621}.btn.warn{background:var(--red);border-color:#82322e}.btn.boost{background:var(--violet);border-color:#45416e}.btn:disabled,.buy:disabled{opacity:.45;cursor:not-allowed}.layout{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(360px,.92fr);gap:14px;margin-top:14px;align-items:start}.stage{position:relative;overflow:hidden;min-height:650px}canvas{display:block;width:100%;height:650px;touch-action:none}.hud{position:absolute;left:16px;right:16px;bottom:16px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px;pointer-events:none}.chip{padding:10px;border:1px solid rgba(255,253,244,.26);border-radius:var(--radius);background:rgba(12,24,31,.72);color:#fffdf4}.chip b{display:block;font-size:clamp(17px,2.2vw,27px);line-height:1.1}.chip small{color:#c9d9d3;font-weight:800}.side{display:grid;gap:12px}.section{padding:14px}.section h2{margin:0 0 10px;font-size:20px}.resources{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.res{padding:10px;border:1px solid #9da69e;border-radius:var(--radius);background:#f9f7eb}.res b{display:block;font-size:22px;line-height:1.1}.res small{color:#5e6d67;font-weight:800}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{min-height:38px;padding:0 12px;border:1px solid #87989e;border-radius:var(--radius);background:#fff8e6;font-weight:900;cursor:pointer}.tab.active{background:#287468;color:#fffdf4;border-color:#24534d}.view{display:none}.view.active{display:block}.list{display:grid;gap:9px}.item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px;border:1px solid #9da69e;border-radius:var(--radius);background:#fffaf0}.item.done{background:#eef8ef;border-color:#78a77d}.item.locked{opacity:.74}.item h3{margin:0 0 4px;font-size:16px}.item p{margin:0;color:#5d6b66;font-size:13px;line-height:1.35;font-weight:700}.buy{min-width:92px;min-height:42px;padding:0 10px;border:1px solid #24534d;border-radius:var(--radius);background:#287468;color:#fffdf4;font-weight:900;cursor:pointer}.buy.alt{background:#326f91}.buy.gold{color:#10191f;background:#f0d17b;border-color:#9c7621}.cost{color:#856219}.meter{height:9px;margin-top:8px;border:1px solid #8da09c;border-radius:999px;background:#e8eadc;overflow:hidden}.meter span{display:block;height:100%;width:0;background:linear-gradient(90deg,#287468,#d6a33d)}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:10px}.mini{padding:9px;border:1px solid #9da69e;border-radius:var(--radius);background:#fffaf0}.mini b{display:block;font-size:20px}.mini small{color:#5d6b66;font-weight:800}.log{min-height:42px;margin:0;color:#5d6b66;font-weight:800;line-height:1.45}.savebox{width:100%;min-height:92px;resize:vertical;border:1px solid #87989e;border-radius:var(--radius);padding:10px;background:#fffaf0;color:#10191f}.savegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.toast{position:fixed;left:50%;bottom:18px;z-index:5;transform:translateX(-50%);max-width:min(560px,calc(100vw - 24px));padding:12px 16px;border:1px solid #87989e;border-radius:var(--radius);background:#fffdf4;box-shadow:0 18px 42px rgba(0,0,0,.28);font-weight:900}.hidden{display:none}@media(max-width:1050px){.layout{grid-template-columns:1fr}.stage{min-height:560px}canvas{height:560px}.hud{grid-template-columns:repeat(3,1fr)}}@media(max-width:640px){.app{width:min(100vw - 16px,1460px);margin-top:8px}.topbar{display:block;padding:14px}.actions{margin-top:12px;justify-content:stretch}.btn{flex:1 1 auto}.stage{min-height:520px}canvas{height:520px}.hud{position:static;grid-template-columns:1fr 1fr;margin:10px}.resources,.summary{grid-template-columns:1fr 1fr}.item{grid-template-columns:1fr}.buy{width:100%}}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div><p class="eyebrow">IDLE WORKSHOP V2</p><h1>星炉工坊</h1></div>
        <div class="actions"><button class="btn" id="tapBtn">校准星炉</button><button class="btn boost" id="overclockBtn">星炉超频</button><button class="btn secondary" id="exportBtn">导出</button><button class="btn secondary" id="importBtn">导入</button><button class="btn warn" id="hardResetBtn">清档</button></div>
      </header>
      <section class="layout">
        <div class="panel stage">
          <canvas id="gameCanvas" aria-label="星炉工坊挂机游戏画面"></canvas>
          <div class="hud">
            <div class="chip"><b id="dustHud">0</b><small>星尘</small></div>
            <div class="chip"><b id="crystalHud">0</b><small>晶矿</small></div>
            <div class="chip"><b id="alloyHud">0</b><small>星合金</small></div>
            <div class="chip"><b id="scienceHud">0</b><small>研究</small></div>
            <div class="chip"><b id="fragmentHud">0</b><small>遗物碎片</small></div>
            <div class="chip"><b id="coreHud">0</b><small>星核</small></div>
          </div>
        </div>
        <aside class="side">
          <section class="panel section">
            <div class="resources">
              <div class="res"><b id="dustText">0</b><small>星尘 / <span id="dustRate">0/s</span></small></div>
              <div class="res"><b id="crystalText">0</b><small>晶矿 / <span id="crystalRate">0/s</span></small></div>
              <div class="res"><b id="alloyText">0</b><small>合金 / <span id="alloyRate">0/s</span></small></div>
              <div class="res"><b id="scienceText">0</b><small>研究 / <span id="scienceRate">0/s</span></small></div>
              <div class="res"><b id="fragmentsText">0</b><small>碎片 / <span id="fragmentsRate">0/s</span></small></div>
              <div class="res"><b id="energyText">0</b><small>星能 / <span id="energyRate">0/s</span></small></div>
            </div>
            <p class="log" id="logText">星炉已待命。手动校准、买装置、派远航，离线回来会结算收益。</p>
          </section>
          <section class="panel section">
            <div class="tabs"><button class="tab active" data-view="build">建筑</button><button class="tab" data-view="research">研究</button><button class="tab" data-view="orders">委托</button><button class="tab" data-view="crew">专员</button><button class="tab" data-view="voyage">远航</button><button class="tab" data-view="achieve">成就</button><button class="tab" data-view="legacy">星核</button><button class="tab" data-view="save">存档</button></div>
          </section>
          <section class="panel section view active" id="buildView"><h2>生产建筑</h2><div class="summary" id="buildSummary"></div><div class="list" id="buildingList"></div></section>
          <section class="panel section view" id="researchView"><h2>研究升级</h2><div class="list" id="researchList"></div></section>
          <section class="panel section view" id="ordersView"><h2>行星委托</h2><div class="summary" id="orderSummary"></div><div class="list" id="orderList"></div></section>
          <section class="panel section view" id="crewView"><h2>专员养成</h2><div class="summary" id="crewSummary"></div><div class="list" id="crewList"></div></section>
          <section class="panel section view" id="voyageView"><h2>远航与遗物</h2><div id="voyageStatus"></div><div class="list" id="voyageList"></div><h2 style="margin-top:14px">遗物工坊</h2><div class="list" id="artifactList"></div></section>
          <section class="panel section view" id="achieveView"><h2>星炉成就</h2><div class="summary" id="achievementSummary"></div><div class="list" id="achievementList"></div></section>
          <section class="panel section view" id="legacyView"><h2>星核重启</h2><div class="list"><div class="item"><div><h3>点燃下一轮宇宙</h3><p id="prestigeInfo">累计星尘达到 250K 后可获得星核。星核、专员、遗物和成就会保留。</p></div><button class="buy" id="prestigeBtn">重启</button></div></div><h2 style="margin-top:14px">星核天赋</h2><div class="list" id="coreUpgradeList"></div></section>
          <section class="panel section view" id="saveView"><h2>存档同步</h2><p class="log">本机自动保存。导出存档码后可以发到手机导入；以后接云存档也会用同一份 JSON 数据。</p><textarea class="savebox" id="saveBox" spellcheck="false" placeholder="导出的存档码会出现在这里，也可以粘贴存档码后点导入文本框。"></textarea><div class="savegrid"><button class="btn secondary" id="copyBtn">复制存档码</button><button class="btn" id="loadBoxBtn">导入文本框</button></div></section>
        </aside>
      </section>
    </main>
    <div class="toast hidden" id="toast"></div>
    <script>
      (()=> {
        const $=id=>document.getElementById(id),canvas=$("gameCanvas"),ctx=canvas.getContext("2d"),storageKey="miniStarforgeIdleSaveV1";
        const resources=["dust","crystal","alloy","science","fragments","energy"];
        const buildings=[
          {id:"probe",name:"星尘探针",desc:"自动校准星炉，稳定收集星尘。",cost:{dust:15},growth:1.16,out:{dust:.35},need:()=>true},
          {id:"miner",name:"月背矿机",desc:"把星尘轨道上的碎片筛成晶矿。",cost:{dust:95},growth:1.18,out:{crystal:.075},need:s=>s.stats.totalDust>=70||s.b.miner>0},
          {id:"smelter",name:"微型熔炉",desc:"把晶矿压进星炉，产出星合金。",cost:{dust:220,crystal:38},growth:1.20,out:{alloy:.024},need:s=>s.crystal>=18||s.b.smelter>0},
          {id:"lab",name:"轨道实验室",desc:"整理工坊数据，缓慢产出研究。",cost:{crystal:120,alloy:8},growth:1.22,out:{science:.016},need:s=>s.alloy>=4||s.b.lab>0},
          {id:"relay",name:"深空信标",desc:"提供全局产量加成，并凝聚星能。",cost:{alloy:42,science:16},growth:1.25,out:{science:.012,energy:.038},need:s=>s.science>=8||s.b.relay>0},
          {id:"condenser",name:"星云冷凝塔",desc:"中期复合产线，同时沉降星尘与晶矿。",cost:{dust:9000,crystal:900,alloy:90},growth:1.24,out:{dust:1.25,crystal:.12,energy:.018},need:s=>s.stats.totalDust>=12000||s.b.condenser>0},
          {id:"archive",name:"遗物档案库",desc:"长期养成核心，缓慢产出研究和遗物碎片。",cost:{crystal:2600,alloy:220,science:140},growth:1.28,out:{science:.07,fragments:.0025},need:s=>s.science>=80||s.fragments>0||s.b.archive>0}
        ];
        const researches=[
          {id:"rProbe",name:"探针编队",desc:"星尘探针产量 x2。",cost:{science:8},need:s=>s.b.lab>0||s.science>=4},
          {id:"rMiner",name:"晶脉测绘",desc:"月背矿机产量 x2。",cost:{science:24,crystal:120},need:s=>s.b.miner>=4},
          {id:"rForge",name:"热核坩埚",desc:"微型熔炉产量 x2。",cost:{science:64,alloy:22},need:s=>s.b.smelter>=3},
          {id:"rOrders",name:"贸易航线",desc:"委托奖励提升 50%，并刷新更多委托。",cost:{science:110,alloy:45},need:s=>s.ordersDone>=2},
          {id:"rMilestone",name:"阶梯装配",desc:"每 10 座同类建筑的里程碑加成更强。",cost:{science:150,crystal:360},need:s=>totalBuildings(s)>=22},
          {id:"rOffline",name:"冬眠引擎",desc:"离线收益上限从 12 小时提升到 24 小时，效率提升。",cost:{science:180,alloy:80},need:s=>s.science>=80},
          {id:"rOverclock",name:"脉冲超频",desc:"星炉超频从 x3 提升到 x4，并延长持续时间。",cost:{science:240,alloy:110},need:s=>s.stats.overclocks>0||s.energy>=80},
          {id:"rVoyage",name:"深空星图",desc:"远航耗时缩短 15%，解锁更远航线。",cost:{science:310,alloy:160,fragments:12},need:s=>s.stats.expeditions>0||s.fragments>=8},
          {id:"rArchive",name:"折叠档案",desc:"遗物档案库产出的研究和碎片 x2。",cost:{science:520,fragments:34},need:s=>s.b.archive>0||s.fragments>=24},
          {id:"rCore",name:"星核透镜",desc:"星核结算收益提升 25%。",cost:{science:760,alloy:320,fragments:60},need:s=>prestigeGain(s)>0||s.cores>0}
        ];
        const crew=[
          {id:"engineer",name:"炉心工程师",desc:"提升星尘与手动校准收益。",cost:{dust:1200,crystal:90},growth:1.62,need:()=>true},
          {id:"geologist",name:"晶脉地质师",desc:"提升晶矿和星合金产量。",cost:{crystal:260,alloy:14},growth:1.58,need:s=>s.b.miner>=2||s.crew.geologist>0},
          {id:"scholar",name:"轨道学者",desc:"提升研究速度，并小幅提升碎片收益。",cost:{science:36,crystal:420},growth:1.66,need:s=>s.science>=18||s.crew.scholar>0},
          {id:"pilot",name:"远航领航员",desc:"缩短远航耗时，提升碎片收益与离线保留。",cost:{alloy:85,science:80},growth:1.68,need:s=>s.ordersDone>=2||s.crew.pilot>0}
        ];
        const voyages=[
          {id:"moon",name:"环月巡航",desc:"短线远航，适合早期拿第一批碎片。",duration:180,cost:{crystal:90,alloy:8},reward:{dust:520,science:28,fragments:4},need:s=>s.b.smelter>0||s.fragments>0},
          {id:"asteroid",name:"小行星采样",desc:"中线远航，带回合金、晶矿和更多碎片。",duration:480,cost:{alloy:46,science:30},reward:{crystal:320,alloy:24,fragments:13},need:s=>s.science>=28||s.stats.expeditions>0},
          {id:"nebula",name:"星云残响",desc:"深空远航，主要服务遗物和后期研究。",duration:1500,cost:{alloy:130,science:170,fragments:8},reward:{science:140,fragments:44,energy:70},need:s=>s.r.rVoyage||s.fragments>=30}
        ];
        const artifacts=[
          {id:"lens",name:"古代聚光镜",desc:"每级全局产量 +5%。",cost:10,growth:1.72},
          {id:"ledger",name:"商会星账",desc:"每级委托奖励 +8%。",cost:14,growth:1.75},
          {id:"anchor",name:"冬眠锚点",desc:"每级离线效率 +4%，离线保留 +1 小时。",cost:18,growth:1.78},
          {id:"loom",name:"碎片织机",desc:"每级远航和档案库碎片收益 +10%。",cost:24,growth:1.82}
        ];
        const coreUps=[
          {id:"memory",name:"星忆温床",desc:"每级离线保留 +2 小时，离线效率 +5%。",cost:1,growth:2.05},
          {id:"catalyst",name:"星核催化",desc:"每级全局产量 +10%，超频持续时间更久。",cost:2,growth:2.15},
          {id:"contract",name:"星际契约",desc:"每级委托奖励 +15%，专员训练更顺滑。",cost:1,growth:2}
        ];
        const achievements=[
          {id:"firstTap",name:"第一束星尘",hint:"手动校准 1 次。",test:s=>s.stats.manual>=1},
          {id:"probe10",name:"探针小队",hint:"拥有 10 座星尘探针。",test:s=>s.b.probe>=10},
          {id:"firstAlloy",name:"第一炉合金",hint:"拥有 1 点星合金。",test:s=>s.alloy>=1||s.b.smelter>0},
          {id:"firstOrder",name:"准时交付",hint:"完成 1 个委托。",test:s=>s.stats.orders>=1||s.ordersDone>=1},
          {id:"crew3",name:"三人轮班",hint:"专员总等级达到 3。",test:s=>crewLevel(s)>=3},
          {id:"firstVoyage",name:"越过月背",hint:"完成 1 次远航。",test:s=>s.stats.expeditions>=1},
          {id:"fragment50",name:"碎片收藏家",hint:"累计拥有或花费 50 遗物碎片。",test:s=>s.stats.fragmentsEarned>=50||s.fragments>=50},
          {id:"overclock",name:"脉冲点火",hint:"启动 1 次星炉超频。",test:s=>s.stats.overclocks>=1},
          {id:"firstCore",name:"第一颗星核",hint:"完成 1 次星核重启。",test:s=>s.stats.totalCores>=1||s.cores>=1},
          {id:"millionDust",name:"百万星尘",hint:"本轮累计星尘达到 1M。",test:s=>s.stats.totalDust>=1000000},
          {id:"artifact5",name:"遗物成列",hint:"遗物总等级达到 5。",test:s=>artifactLevel(s)>=5},
          {id:"builder80",name:"轨道城市",hint:"建筑总数达到 80。",test:s=>totalBuildings(s)>=80}
        ];
        let w=900,h=650,dpr=1,last=performance.now(),saveTimer=0,hudTimer=0,toastTimer=0,orders=[],fx=[];
        let state=load();
        function fresh(){return{v:2,dust:0,crystal:0,alloy:0,science:0,fragments:0,energy:0,cores:0,b:{probe:0,miner:0,smelter:0,lab:0,relay:0,condenser:0,archive:0},r:{},crew:{engineer:0,geologist:0,scholar:0,pilot:0},artifacts:{lens:0,ledger:0,anchor:0,loom:0},coreUp:{memory:0,catalyst:0,contract:0},ach:{},ordersDone:0,expedition:null,boostUntil:0,stats:{totalDust:0,lifetimeDust:0,manual:0,bestCores:0,totalCores:0,orders:0,expeditions:0,overclocks:0,offlineSeconds:0,fragmentsEarned:0,maxRate:0},last:Date.now()}}
        function merge(s){const d=fresh();s=s&&typeof s==="object"?s:{};const out={...d,...s,b:{...d.b,...s.b},r:{...d.r,...s.r},crew:{...d.crew,...s.crew},artifacts:{...d.artifacts,...s.artifacts},coreUp:{...d.coreUp,...s.coreUp},ach:{...d.ach,...s.ach},stats:{...d.stats,...s.stats}};out.v=2;out.fragments=Number(out.fragments)||0;out.energy=Number(out.energy)||0;out.stats.totalCores=Math.max(out.stats.totalCores||0,out.cores||0,out.stats.bestCores||0);return out}
        function load(){let s=fresh();try{s=merge(JSON.parse(localStorage.getItem(storageKey)||"{}"))}catch(e){}const now=Date.now(),off=Math.max(0,Math.min((now-(s.last||now))/1000,offlineCap(s)));let gain={dust:0,crystal:0,alloy:0,science:0,fragments:0,energy:0};if(off>10){gain=produce(s,off*offlineEfficiency(s),true);s.stats.offlineSeconds+=off}const done=settleVoyage(s,now,true);checkAchievements(s,true);if(off>10||done){let msg=off>10?`离线 ${time(off)}，获得 ${fmt(gain.dust)} 星尘、${fmt(gain.crystal)} 晶矿、${fmt(gain.alloy)} 合金、${fmt(gain.science)} 研究、${fmt(gain.fragments)} 碎片。`:"远航已完成。";if(done)msg+=` ${done.name} 带回了补给。`;toast(msg,5600)}s.last=now;localStorage.setItem(storageKey,JSON.stringify(s));return s}
        function save(){state.last=Date.now();localStorage.setItem(storageKey,JSON.stringify(state))}
        function rates(s=state){const r={dust:0,crystal:0,alloy:0,science:0,fragments:0,energy:.018};for(const o of buildings){const n=s.b[o.id]||0;if(!n)continue;const bm=buildingMult(o,s);for(const k in o.out)r[k]+=o.out[k]*n*bm}const pm=productionMult(s);for(const k of ["dust","crystal","alloy","science","fragments"])r[k]*=pm*resourceMult(k,s);r.energy*=1+level(s.coreUp,"catalyst")*.1+level(s.b,"relay")*.02;return r}
        function productionMult(s=state){return globalMult(s)*overclockMult(s)}
        function globalMult(s=state){return(1+corePower(s)*.08)*(1+level(s.b,"relay")*.045)*(1+level(s.artifacts,"lens")*.05)*(1+level(s.coreUp,"catalyst")*.1)*Math.pow(1.04,achievementCount(s))*(s.r.rCore?1.06:1)}
        function overclockMult(s=state){if(Date.now()>s.boostUntil)return 1;return(s.r.rOverclock?4:3)*(1+level(s.coreUp,"catalyst")*.08)}
        function buildingMult(o,s=state){let m=1,n=level(s.b,o.id);if(o.id==="probe"&&s.r.rProbe)m*=2;if(o.id==="miner"&&s.r.rMiner)m*=2;if(o.id==="smelter"&&s.r.rForge)m*=2;if(o.id==="archive"&&s.r.rArchive)m*=2;const step=s.r.rMilestone?1.08:1.04;m*=Math.pow(step,Math.floor(n/10));return m}
        function resourceMult(k,s=state){let m=1;if(k==="dust")m*=1+level(s.crew,"engineer")*.12;if(k==="crystal")m*=1+level(s.crew,"geologist")*.10;if(k==="alloy")m*=1+level(s.crew,"geologist")*.08;if(k==="science")m*=1+level(s.crew,"scholar")*.12;if(k==="fragments")m*=1+level(s.crew,"pilot")*.06+level(s.crew,"scholar")*.04+level(s.artifacts,"loom")*.1;return m}
        function produce(s,dt){const r=rates(s),gain={};for(const k of resources){gain[k]=(r[k]||0)*dt;if(k==="energy")s.energy=Math.min(maxEnergy(s),(s.energy||0)+gain[k]);else s[k]=(s[k]||0)+gain[k]}s.stats.totalDust+=gain.dust||0;s.stats.lifetimeDust+=gain.dust||0;s.stats.fragmentsEarned+=(gain.fragments||0);return gain}
        function offlineCap(s=state){return((s.r.rOffline?24:12)+level(s.artifacts,"anchor")+level(s.coreUp,"memory")*2+Math.floor(level(s.crew,"pilot")/2))*3600}
        function offlineEfficiency(s=state){return Math.min(1,.7+(s.r.rOffline ? .12 : 0)+level(s.artifacts,"anchor")*.04+level(s.coreUp,"memory")*.05+level(s.crew,"pilot")*.015)}
        function maxEnergy(s=state){return 100+level(s.b,"relay")*12+level(s.b,"condenser")*8+level(s.artifacts,"anchor")*10+level(s.coreUp,"catalyst")*25}
        function costOf(o,s=state){const n=s.b[o.id]||0,c={};for(const k in o.cost)c[k]=o.cost[k]*Math.pow(o.growth,n);return c}
        function crewCost(o,s=state){const n=s.crew[o.id]||0,c={};const smooth=1/(1+level(s.coreUp,"contract")*.04);for(const k in o.cost)c[k]=o.cost[k]*Math.pow(o.growth,n)*smooth;return c}
        function artifactCost(o,s=state){return{fragments:o.cost*Math.pow(o.growth,level(s.artifacts,o.id))}}
        function coreUpCost(o,s=state){return{cores:Math.ceil(o.cost*Math.pow(o.growth,level(s.coreUp,o.id)))}}
        function canPay(c,s=state){return Object.entries(c).every(([k,v])=>(s[k]||0)>=v)}function pay(c,s=state){for(const k in c)s[k]-=c[k]}
        function level(obj,id){return Number(obj&&obj[id])||0}
        function totalBuildings(s=state){return Object.values(s.b).reduce((a,b)=>a+(Number(b)||0),0)}
        function crewLevel(s=state){return Object.values(s.crew).reduce((a,b)=>a+(Number(b)||0),0)}
        function artifactLevel(s=state){return Object.values(s.artifacts).reduce((a,b)=>a+(Number(b)||0),0)}
        function achievementCount(s=state){return Object.values(s.ach).filter(Boolean).length}
        function corePower(s=state){return Math.max(s.stats.totalCores||0,s.cores||0)}
        function fmt(n){n=Number(n)||0;if(n<1000)return n<10?n.toFixed(1):Math.floor(n).toString();const u=["K","M","B","T","Qa","Qi","Sx","Sp"],e=Math.min(u.length,Math.floor(Math.log10(n)/3));return(n/Math.pow(1000,e)).toFixed(n>=1e6?2:1)+u[e-1]}
        function time(sec){sec=Math.max(0,Math.floor(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;return h?`${h}小时${m}分`:m?`${m}分${s}秒`:`${s}秒`}
        function resName(k){return{dust:"星尘",crystal:"晶矿",alloy:"合金",science:"研究",fragments:"碎片",energy:"星能",cores:"星核"}[k]||k}
        function costText(c){return Object.entries(c).map(([k,v])=>`${resName(k)} ${fmt(v)}`).join(" / ")}
        function rewardText(c){return Object.entries(c).map(([k,v])=>`${resName(k)} ${fmt(v)}`).join(" / ")}
        function outputText(o){return Object.entries(o.out).map(([k,v])=>{let val=v*(state.b[o.id]||0)*buildingMult(o);if(k==="energy")val*=1+level(state.coreUp,"catalyst")*.1+level(state.b,"relay")*.02;else val*=productionMult()*resourceMult(k);return`${resName(k)} ${fmt(val)}/s`}).join(" / ")||"待建造"}
        function updateHud(){const r=rates();for(const k of ["dust","crystal","alloy","science"])$(k+"Text").textContent=fmt(state[k]),$(k+"Hud").textContent=fmt(state[k]),$(k+"Rate").textContent=fmt(r[k])+"/s";$("fragmentsText").textContent=fmt(state.fragments);$("fragmentHud").textContent=fmt(state.fragments);$("fragmentsRate").textContent=fmt(r.fragments)+"/s";$("energyText").textContent=`${fmt(state.energy)} / ${fmt(maxEnergy())}`;$("energyRate").textContent=fmt(r.energy)+"/s";$("coreHud").textContent=fmt(state.cores);const totalRate=r.dust+r.crystal*5+r.alloy*25+r.science*45+r.fragments*220;state.stats.maxRate=Math.max(state.stats.maxRate||0,totalRate);document.querySelectorAll("[data-buy]").forEach(btn=>{const o=buildings.find(x=>x.id===btn.dataset.buy);btn.disabled=!o||!canPay(costOf(o))});document.querySelectorAll("[data-research]").forEach(btn=>{const o=researches.find(x=>x.id===btn.dataset.research);btn.disabled=!o||state.r[o.id]||!canPay(o.cost)});document.querySelectorAll("[data-order]").forEach(btn=>{const o=orders[+btn.dataset.order];btn.disabled=!o||!canPay(o.req)});document.querySelectorAll("[data-crew]").forEach(btn=>{const o=crew.find(x=>x.id===btn.dataset.crew);btn.disabled=!o||!canPay(crewCost(o))});document.querySelectorAll("[data-artifact]").forEach(btn=>{const o=artifacts.find(x=>x.id===btn.dataset.artifact);btn.disabled=!o||!canPay(artifactCost(o))});document.querySelectorAll("[data-coreup]").forEach(btn=>{const o=coreUps.find(x=>x.id===btn.dataset.coreup);btn.disabled=!o||!canPay(coreUpCost(o))});document.querySelectorAll("[data-voyage]").forEach(btn=>{const o=voyages.find(x=>x.id===btn.dataset.voyage);btn.disabled=!!state.expedition||!o||!canPay(o.cost)});const boostLeft=Math.max(0,(state.boostUntil-Date.now())/1000);$("overclockBtn").textContent=boostLeft>0?`超频 ${time(boostLeft)}`:"星炉超频";$("overclockBtn").disabled=boostLeft>0||state.energy<100;const gain=prestigeGain();$("prestigeInfo").textContent=`本轮累计星尘 ${fmt(state.stats.totalDust)}。重启可         function buyBuilding(id){const o=buildings.find(x=>x.id===id),c=o&&costOf(o);if(!o||!canPay(c))return;pay(c);state.b[id]++;log(`${o.name} +1，下一座成本 ${costText(costOf(o))}`);burst();afterAction()}
        function buyResearch(id){const o=researches.find(x=>x.id===id);if(!o||state.r[id]||!canPay(o.cost))return;pay(o.cost);state.r[id]=1;log(`完成研究：${o.name}`);burst();afterAction()}
        function trainCrew(id){const o=crew.find(x=>x.id===id),c=o&&crewCost(o);if(!o||!canPay(c))return;pay(c);state.crew[id]++;log(`${o.name} Lv.${state.crew[id]}，工坊效率提升。`);burst();afterAction()}
        function buyArtifact(id){const o=artifacts.find(x=>x.id===id),c=o&&artifactCost(o);if(!o||!canPay(c))return;pay(c);state.artifacts[id]++;log(`${o.name} Lv.${state.artifacts[id]}。遗物光路接入星炉。`);burst();afterAction()}
        function buyCoreUp(id){const o=coreUps.find(x=>x.id===id),c=o&&coreUpCost(o);if(!o||!canPay(c))return;pay(c);state.coreUp[id]++;log(`${o.name} Lv.${state.coreUp[id]}。下一轮会更快。`);burst();afterAction()}
        function manual(){const r=rates(),add=(1+Math.sqrt(state.b.probe+1)*.85)*productionMult()*resourceMult("dust")*(1+level(state.crew,"engineer")*.08);state.dust+=add;state.stats.totalDust+=add;state.stats.lifetimeDust+=add;state.stats.manual++;if(state.r.rProbe&&r.dust>0){const pulse=r.dust*2;state.dust+=pulse;state.stats.totalDust+=pulse;state.stats.lifetimeDust+=pulse}fx.push({x:w*.5,y:h*.5,text:`+${fmt(add)}`,life:1,color:"#f0d16f"});afterAction(false)}
        function overclock(){if(state.energy<100||Date.now()<state.boostUntil)return;state.energy-=100;state.boostUntil=Date.now()+((state.r.rOverclock?85:60)+level(state.coreUp,"catalyst")*12)*1000;state.stats.overclocks++;log(`星炉超频启动，当前产量 x${overclockMult().toFixed(1)}。`);burst();afterAction()}
        function makeOrders(){const s=Math.pow(1.17,state.ordersDone),bonus=orderBonus();orders=[{name:"近地补给",req:{dust:140*s,crystal:18*s},rew:{science:6*s*bonus,dust:65*s*bonus}},{name:"环月船坞",req:{crystal:80*s,alloy:8*s},rew:{science:18*s*bonus,alloy:5*s*bonus}},{name:"深空灯塔",req:{dust:900*s,alloy:28*s,science:18*s},rew:{science:55*s*bonus,crystal:110*s*bonus}},{name:"学会急件",req:{dust:2200*s,science:65*s},rew:{fragments:3*s*bonus,alloy:42*s*bonus}},{name:"遗物买手",req:{alloy:120*s,science:180*s,fragments:8*s},rew:{fragments:20*s*bonus,dust:3600*s*bonus}}]}
        function orderBonus(s=state){return(1+(s.r.rOrders ? .5 : 0)+level(s.artifacts,"ledger")*.08+level(s.coreUp,"contract")*.15)}
        function completeOrder(i){const o=orders[i];if(!o||!canPay(o.req))return;pay(o.req);awardReward(state,o.rew,1);state.ordersDone++;state.stats.orders++;makeOrders();log(`完成委托：${o.name}`);burst();afterAction()}
        function awardReward(s,rew,m=1){for(const k in rew){let v=rew[k]*m;if(k==="fragments")v*=1+level(s.artifacts,"loom")*.1+level(s.crew,"pilot")*.06;s[k]=(s[k]||0)+v;if(k==="fragments")s.stats.fragmentsEarned+=v;if(k==="energy")s.energy=Math.min(maxEnergy(s),s.energy)}}
        function startVoyage(id){const o=voyages.find(x=>x.id===id);if(!o||state.expedition||!canPay(o.cost))return;pay(o.cost);state.expedition={id:o.id,end:Date.now()+voyageDuration(o)*1000};log(`${o.name} 已出发，预计 ${time(voyageDuration(o))} 后返航。`);save();render()}
        function voyageDuration(o,s=state){return Math.max(45,o.duration*(s.r.rVoyage ? .85 : 1)*(1-Math.min(.35,level(s.crew,"pilot")*.03)))}
        function settleVoyage(s=state,now=Date.now(),quiet=false){if(!s.expedition||now<s.expedition.end)return null;const o=voyages.find(x=>x.id===s.expedition.id);s.expedition=null;if(!o)return null;awardReward(s,o.reward,1);s.stats.expeditions++;if(!quiet)toast(`${o.name} 返航：${rewardText(o.reward)}`,4200);return o}
        function prestigeGain(s=state){if(s.stats.totalDust<250000)return 0;const base=Math.floor(Math.sqrt(s.stats.totalDust/250000));return Math.floor(base*(s.r.rCore?1.25:1))}
        function prestige(){const gain=prestigeGain();if(gain<=0)return;if(!confirm(`重启会清空本轮建筑、研究、资源和远航，获得 ${gain} 星核。专员、遗物、成就和星核天赋会保留。继续吗？`))return;const keep={cores:state.cores+gain,coreUp:{...state.coreUp},crew:{...state.crew},artifacts:{...state.artifacts},ach:{...state.ach},stats:{...state.stats}};keep.stats.bestCores=Math.max(keep.stats.bestCores||0,keep.cores);keep.stats.totalCores=(keep.stats.totalCores||0)+gain;const life=keep.stats.lifetimeDust;state=fresh();state.cores=keep.cores;state.coreUp=keep.coreUp;state.crew=keep.crew;state.artifacts=keep.artifacts;state.ach=keep.ach;state.stats={...state.stats,...keep.stats,totalDust:0,lifetimeDust:life};makeOrders();log(`星核重启完成，累计星核 ${fmt(corePower())}，下一轮起飞更快。`);save();render()}
        function exportSave(){const raw=JSON.stringify({...state,last:Date.now()});const code="SFI1-"+btoa(unescape(encodeURIComponent(raw)));$("saveBox").value=code;toast("存档码已生成，可以复制到手机导入。")}
        function importSave(text){try{const raw=text.trim().replace(/^SFI1-/,"");const data=JSON.parse(decodeURIComponent(escape(atob(raw))));state=merge(data);state.last=Date.now();makeOrders();checkAchievements(state,true);save();render();toast("导入成功。")}catch(e){toast("导入失败：存档码格式不对。",3600)}}

        function checkAchievements(s=state,quiet=true){let got=0;for(const a of achievements){if(!s.ach[a.id]&&a.test(s)){s.ach[a.id]=1;got++}}if(got&&!quiet)toast(`解锁 ${got} 个成就，全局产量提升。`,3200)}

        function burst(){for(let i=0;i<24;i++)fx.push({x:w*.5,y:h*.5,life:1,ang:Math.random()*Math.PI*2,spd:45+Math.random()*145,color:["#f0d16f","#8bd0bb","#bd5148","#326f91","#b49bff"][i%5]})}
        function render(){makeOrders();settleVoyage();checkAchievements(state,true);$("buildSummary").innerHTML=`<div class="mini"><b>${fmt(totalBuildings())}</b><small>建筑总数</small></div><div class="mini"><b>x${productionMult().toFixed(2)}</b><small>当前产量</small></div><div class="mini"><b>${time(offlineCap())}</b><small>离线保留</small></div>`;$("buildingList").innerHTML=buildings.filter(o=>o.need(state)).map(o=>{const c=costOf(o),ok=canPay(c),n=level(state.b,o.id);return `<div class="item"><div><h3>${o.name} Lv.${n}</h3><p>${o.desc}</p><p>当前：${outputText(o)}</p><p class="cost">${costText(c)}</p></div><button class="buy" data-buy="${o.id}" ${ok?"":"disabled"}>购买</button></div>`}).join("");$("researchList").innerHTML=researches.filter(o=>o.need(state)||state.r[o.id]).map(o=>{const ok=canPay(o.cost)&&!state.r[o.id];return `<div class="item ${state.r[o.id]?"done":""}"><div><h3>${state.r[o.id]?"已完成 ":""}${o.name}</h3><p>${o.desc}</p><p class="cost">${costText(o.cost)}</p></div><button class="buy" data-research="${o.id}" ${ok?"":"disabled"}>${state.r[o.id]?"完成":"研究"}</button></div>`}).join("");$("orderSummary").innerHTML=`<div class="mini"><b>${fmt(state.stats.orders||0)}</b><small>累计委托</small></div><div class="mini"><b>x${orderBonus().toFixed(2)}</b><small>委托奖励</small></div><div class="mini"><b>${fmt(state.ordersDone)}</b><small>本轮交付</small></div>`;$("orderList").innerHTML=orders.filter((o,i)=>i<3||state.r.rOrders||state.fragments>=6).map((o,i)=>`<div class="item"><div><h3>${o.name}</h3><p>需求：${costText(o.req)}</p><p class="cost">奖励：${rewardText(o.rew)}</p></div><button class="buy" data-order="${i}" ${canPay(o.req)?"":"disabled"}>交付</button></div>`).join("");$("crewSummary").innerHTML=`<div class="mini"><b>${crewLevel()}</b><small>专员总等级</small></div><div class="mini"><b>+${Math.round((resourceMult("dust")-1)*100)}%</b><small>星尘养成</small></div><div class="mini"><b>-${Math.round(Math.min(.35,level(state.crew,"pilot")*.03)*100)}%</b><small>远航耗时</small></div>`;$("crewList").innerHTML=crew.filter(o=>o.need(state)).map(o=>{const c=crewCost(o),ok=canPay(c),n=level(state.crew,o.id);return `<div class="item"><div><h3>${o.name} Lv.${n}</h3><p>${o.desc}</p><p class="cost">${costText(c)}</p></div><button class="buy alt" data-crew="${o.id}" ${ok?"":"disabled"}>训练</button></div>`}).join("");renderVoyage();renderAchievements();renderLegacy();updateHud()}
        function renderVoyage(){if(state.expedition){const o=voyages.find(x=>x.id===state.expedition.id),left=Math.max(0,(state.expedition.end-Date.now())/1000),total=o?voyageDuration(o):1,pct=Math.max(0,Math.min(100,100-left/total*100));$("voyageStatus").innerHTML=`<div class="item"><div><h3>${o?o.name:"远航"} 进行中</h3><p>剩余 ${time(left)}，返航后自动领取奖励。</p><div class="meter"><span style="width:${pct}%"></span></div></div><button class="buy" disabled>远航中</button></div>`}else $("voyageStatus").innerHTML=`<p class="log">远航会在离线时继续计时。短线拿碎片，长线冲遗物。</p>`;$("voyageList").innerHTML=voyages.filter(o=>o.need(state)).map(o=>`<div class="item"><div><h3>${o.name}</h3><p>${o.desc}</p><p>耗时：${time(voyageDuration(o))}</p><p>需求：${costText(o.cost)}</p><p class="cost">奖励：${rewardText(o.reward)}</p></div><button class="buy" data-voyage="${o.id}" ${state.expedition||!canPay(o.cost)?"disabled":""}>出发</button></div>`).join("");$("artifactList").innerHTML=artifacts.map(o=>{const c=artifactCost(o),n=level(state.artifacts,o.id);return `<div class="item"><div><h3>${o.name} Lv.${n}</h3><p>${o.desc}</p><p class="cost">${costText(c)}</p></div><button class="buy gold" data-artifact="${o.id}" ${canPay(c)?"":"disabled"}>升级</button></div>`}).join("")}
        function renderAchievements(){const count=achievementCount();$("achievementSummary").innerHTML=`<div class="mini"><b>${count} / ${achievements.length}</b><small>已解锁</small></div><div class="mini"><b>x${Math.pow(1.04,count).toFixed(2)}</b><small>成就倍率</small></div><div class="mini"><b>${fmt(state.stats.maxRate||0)}</b><small>最高综合速率</small></div>`;$("achievementList").innerHTML=achievements.map(a=>`<div class="item ${state.ach[a.id]?"done":"locked"}"><div><h3>${state.ach[a.id]?"已解锁 ":"未解锁 "}${a.name}</h3><p>${a.hint}</p><p class="cost">${state.ach[a.id]?"全局产量 +4%":"达成后永久加成"}</p></div><button class="buy" disabled>${state.ach[a.id]?"完成":"目标"}</button></div>`).join("")}

        function resize(){const r=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,devicePixelRatio||1));w=Math.max(320,r.width);h=Math.max(480,r.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0)}
        function draw(now){const dt=Math.min(.05,(now-last)/1000||.016);last=now;if(state){produce(state,dt);saveTimer+=dt;hudTimer+=dt;if(hudTimer>.25){hudTimer=0;settleVoyage();checkAchievements(state,true);updateHud();if(document.getElementById("voyageView").classList.contains("active"))renderVoyage()}if(saveTimer>5){saveTimer=0;save()}renderLight(dt)}if(toastTimer>0){toastTimer-=dt*1000;if(toastTimer<=0)$("toast").classList.add("hidden")}requestAnimationFrame(draw)}
        function renderLight(dt){ctx.clearRect(0,0,w,h);const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,"#101824");g.addColorStop(1,"#243347");ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle="rgba(255,255,255,.14)";for(let i=0;i<110;i++)ctx.fillRect((i*83+performance.now()*.012)%w,(i*47)%h,2,2);const cx=w*.5,cy=h*.47,pulse=1+Math.sin(performance.now()*.004)*.05+(overclockMult()>1?.05:0);ctx.strokeStyle=overclockMult()>1?"rgba(180,155,255,.55)":"rgba(139,208,187,.32)";ctx.lineWidth=2;for(let r=90;r<285;r+=38){ctx.beginPath();ctx.ellipse(cx,cy,r*pulse,r*.42*pulse,0,0,Math.PI*2);ctx.stroke()}ctx.fillStyle="rgba(240,209,111,.12)";ctx.beginPath();ctx.arc(cx,cy,125*pulse,0,Math.PI*2);ctx.fill();const core=52+Math.log10(state.dust+10)*3+achievementCount()*0.35;const rg=ctx.createRadialGradient(cx-18,cy-20,4,cx,cy,core);rg.addColorStop(0,"#fffdf4");rg.addColorStop(.38,overclockMult()>1?"#b49bff":"#f0d16f");rg.addColorStop(1,"#bd5148");ctx.fillStyle=rg;ctx.beginPath();ctx.arc(cx,cy,core,0,Math.PI*2);ctx.fill();drawMachines(cx,cy);drawVoyageShip(cx,cy);fx=fx.filter(p=>{p.life-=dt;if(p.ang!==undefined){p.x+=Math.cos(p.ang)*p.spd*dt;p.y+=Math.sin(p.ang)*p.spd*dt;ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill()}else{p.y-=dt*42;ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.font="900 22px system-ui";ctx.textAlign="center";ctx.fillText(p.text,p.x,p.y)}ctx.globalAlpha=1;return p.life>0});ctx.fillStyle="rgba(255,253,244,.9)";ctx.font="900 20px system-ui";ctx.textAlign="center";ctx.fillText(`产量 x${productionMult().toFixed(2)}  ·  离线 ${time(offlineCap())} / ${Math.round(offlineEfficiency()*100)}%`,cx,42)}
        function drawMachines(cx,cy){const total=totalBuildings(),shown=Math.min(44,total);for(let i=0;i<shown;i++){const a=i/shown*Math.PI*2+performance.now()*.0004*(i%2?1:-1),r=150+(i%5)*22,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r*.45;ctx.fillStyle=["#8bd0bb","#326f91","#d6a33d","#bd5148","#b49bff"][i%5];ctx.beginPath();ctx.roundRect?ctx.roundRect(x-10,y-7,20,14,4):ctx.rect(x-10,y-7,20,14);ctx.fill();ctx.strokeStyle="rgba(255,253,244,.7)";ctx.stroke()}ctx.fillStyle="rgba(255,253,244,.84)";ctx.font="800 16px system-ui";ctx.fillText(`${total} 座装置 · ${crewLevel()} 级专员 · ${achievementCount()} 成就`,cx,cy+124)}
        function drawVoyageShip(cx,cy){if(!state.expedition)return;const o=voyages.find(x=>x.id===state.expedition.id),left=Math.max(0,(state.expedition.end-Date.now())/1000),total=o?voyageDuration(o):1,p=1-left/total,a=p*Math.PI*2-Math.PI/2,r=245,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r*.42;ctx.fillStyle="#fffdf4";ctx.beginPath();ctx.moveTo(x+Math.cos(a)*14,y+Math.sin(a)*14);ctx.lineTo(x+Math.cos(a+2.4)*10,y+Math.sin(a+2.4)*10);ctx.lineTo(x+Math.cos(a-2.4)*10,y+Math.sin(a-2.4)*10);ctx.closePath();ctx.fill();ctx.strokeStyle="#8bd0bb";ctx.stroke()}
        document.addEventListener("click",e=>{const b=e.target.closest("[data-buy]"),r=e.target.closest("[data-research]"),o=e.target.closest("[data-order]"),c=e.target.closest("[data-crew]"),v=e.target.closest("[data-voyage]"),a=e.target.closest("[data-artifact]"),u=e.target.closest("[data-coreup]");if(b)buyBuilding(b.dataset.buy);if(r)buyResearch(r.dataset.research);if(o)completeOrder(+o.dataset.order);if(c)trainCrew(c.dataset.crew);if(v)startVoyage(v.dataset.voyage);if(a)buyArtifact(a.dataset.artifact);if(u)buyCoreUp(u.dataset.coreup)});
        document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));t.classList.add("active");$(t.dataset.view+"View").classList.add("active");if(t.dataset.view==="voyage")renderVoyage();if(t.dataset.view==="achieve")renderAchievements();if(t.dataset.view==="legacy")renderLegacy();updateHud()}));
        $("tapBtn").addEventListener("click",manual);canvas.addEventListener("pointerdown",manual);$("overclockBtn").addEventListener("click",overclock);$("prestigeBtn").addEventListener("click",prestige);$("exportBtn").addEventListener("click",exportSave);$("importBtn").addEventListener("click",()=>$("saveBox").focus());$("copyBtn").addEventListener("click",async()=>{exportSave();try{await navigator.clipboard.writeText($("saveBox").value);toast("已复制存档码。")}catch(e){toast("已生成存档码，请手动复制。")}});$("loadBoxBtn").addEventListener("click",()=>importSave($("saveBox").value));$("hardResetBtn").addEventListener("click",hardReset);window.addEventListener("beforeunload",save);window.addEventListener("resize",resize);
        makeOrders();resize();render();requestAnimationFrame(draw);
      })();
    </script>
  </body>
</html>
