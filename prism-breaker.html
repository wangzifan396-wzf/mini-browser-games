<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>棱镜破阵</title><style>body{margin:0;background:#090616;color:#f4efff;font-family:system-ui}.app{height:100vh;display:grid;grid-template-columns:1fr 240px;gap:10px;padding:10px;box-sizing:border-box}.stage,aside{border:1px solid #493d75;border-radius:16px;background:#100a25;overflow:hidden}.stage{position:relative}canvas{display:block;width:100%;height:100%}aside{padding:14px;display:flex;flex-direction:column;gap:10px}.card{padding:10px;border:1px solid #44386d;border-radius:10px}.card b{display:block;font-size:24px;color:#e477ff}button{border:1px solid #7254a7;border-radius:9px;background:#2a1d52;color:white;padding:10px;font-weight:bold}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:#080414c9;text-align:center}.hidden{display:none}@media(max-width:650px){.app{grid-template-columns:1fr;grid-template-rows:1fr 160px;padding:6px}aside{display:grid;grid-template-columns:repeat(3,1fr);padding:7px}.card{padding:7px}.card b{font-size:16px}.help{display:none}}</style><main class="app"><section class="stage"><canvas id="c"></canvas><div id="o" class="overlay"><div><h1>棱镜破阵</h1><p>拖动挡板反射光球；击破砖阵，拾取多球、扩展和激光晶体。</p><button id="go">开始破阵</button></div></div></section><aside><div class="card">得分<b id="s">0</b></div><div class="card">关卡<b id="l">1</b></div><div class="card">生命<b id="hp">3</b></div><button id="resetGame">新局</button><div class="help">鼠标/触摸移动挡板。每关最后的棱镜砖会掉落特殊能力；第六关是核心阵列。</div></aside></main><script>
const c=document.querySelector('#c'),x=c.getContext('2d'),O=document.querySelector('#o'),sc=document.querySelector('#s'),lv=document.querySelector('#l'),life=document.querySelector('#hp');let q,last=0;function reset(){q={run:false,p:{x:.5,w:.18},balls:[],bricks:[],score:0,lv:1,lives:3,laser:0};level();sync()}function level(){q.bricks=[];let rows=4+Math.min(3,q.lv),cols=9;for(let y=0;y<rows;y++)for(let z=0;z<cols;z++)if(Math.random()>.08)q.bricks.push({x:(z+.5)/cols,y:.1+y*.055,w:.095,h:.045,hp:q.lv%6===0?2:1,prism:z===cols-1&&y===rows-1});serve()}function serve(){q.balls=[{x:q.p.x,y:.78,vx:.28,vy:-.42}]}function sync(){sc.textContent=q.score;lv.textContent=q.lv;life.textContent=q.lives}function start(){q.run=true;O.classList.add('hidden')}function update(dt){if(!q.run)return;q.laser=Math.max(0,q.laser-dt);for(const b of q.balls){b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.x<0||b.x>1){b.vx*=-1;b.x=Math.max(0,Math.min(1,b.x))}if(b.y<0)b.vy*=-1;if(b.y>.76&&b.y<.81&&Math.abs(b.x-q.p.x)<q.p.w/2){b.vy=-Math.abs(b.vy);b.vx+=(b.x-q.p.x)*.55}for(const r of q.bricks){if(!r.dead&&Math.abs(b.x-r.x)<r.w/2&&Math.abs(b.y-r.y)<r.h/2){r.hp--;b.vy*=-1;if(r.hp<=0){r.dead=1;q.score+=r.prism?80:10;if(r.prism)power()}break}}}q.bricks=q.bricks.filter(r=>!r.dead);q.balls=q.balls.filter(b=>b.y<1.08);if(!q.balls.length){q.lives--;q.lives?serve():end()}if(!q.bricks.length){q.lv++;level()}sync()}function power(){let r=Math.random();if(r<.3)q.balls.push(...q.balls.map(b=>({...b,vx:-b.vx})));else if(r<.6)q.p.w=Math.min(.4,q.p.w+.08);else q.laser=7}function end(){q.run=false;O.classList.remove('hidden');O.innerHTML=`<div><h1>阵列失守</h1><p>得分 ${q.score}</p><button id="go">再来一局</button></div>`;document.querySelector('#go').onclick=()=>{reset();start()}}function draw(){let w=c.clientWidth,h=c.clientHeight;c.width=w*devicePixelRatio;c.height=h*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);x.fillStyle='#100a25';x.fillRect(0,0,w,h);for(const r of q.bricks){x.fillStyle=r.prism?'#f06cff':r.hp>1?'#ffb85f':'#6bdbff';x.fillRect((r.x-r.w/2)*w,(r.y-r.h/2)*h,r.w*w,r.h*h)}x.fillStyle='#e3ccff';x.fillRect((q.p.x-q.p.w/2)*w,.82*h,q.p.w*w,12);for(const b of q.balls){x.fillStyle='#fff3b0';x.beginPath();x.arc(b.x*w,b.y*h,7,0,7);x.fill()}if(q.laser>0){x.strokeStyle='#ff70ce';x.lineWidth=3;x.beginPath();x.moveTo((q.p.x-q.p.w*.35)*w,.82*h);x.lineTo((q.p.x-q.p.w*.35)*w,0);x.moveTo((q.p.x+q.p.w*.35)*w,.82*h);x.lineTo((q.p.x+q.p.w*.35)*w,0);x.stroke()}}function loop(t){let dt=Math.min(.03,(t-last)/1000);last=t;update(dt);draw();requestAnimationFrame(loop)}c.addEventListener('pointermove',e=>{let r=c.getBoundingClientRect();q.p.x=Math.max(q.p.w/2,Math.min(1-q.p.w/2,(e.clientX-r.left)/r.width))});document.querySelector('#go').onclick=()=>{reset();start()};document.querySelector('#resetGame').onclick=reset;reset();requestAnimationFrame(loop);
</script><script>const prismRecord=document.createElement('div');prismRecord.className='card';document.querySelector('aside').prepend(prismRecord);setInterval(()=>{if(q.run&&q.laser>0&&q.bricks.length){let r=q.bricks[Math.floor(Math.random()*q.bricks.length)];r.hp--;if(r.hp<=0){r.dead=1;q.score+=10}}let b=+localStorage.getItem('prism_breaker_best')||0;if(q.score>b){b=q.score;localStorage.setItem('prism_breaker_best',b)}prismRecord.innerHTML='最佳纪录<b>'+b+'</b>'},260)</script>
