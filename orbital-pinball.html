<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>轨道弹球</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23101824'/%3E%3Ccircle cx='33' cy='22' r='10' fill='%23f0d16f'/%3E%3Cpath d='M15 48c11-8 28-8 38 0M18 40l10-7M46 40l-10-7' stroke='%238bd0bb' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
    <style>
      :root{--ink:#10191f;--panel:#fffdf4;--line:#87989e;--teal:#287468;--gold:#d6a33d;--red:#bd5148;--blue:#326f91;--shadow:rgba(5,12,16,.28);--radius:8px}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,sans-serif;background:linear-gradient(rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(135deg,#0b1724,#18354a 48%,#342f44);background-size:30px 30px,30px 30px,auto}button{font:inherit}.app{width:min(1380px,calc(100vw - 28px));margin:14px auto}.topbar,.panel{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,244,.97);box-shadow:0 16px 36px var(--shadow)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px}.eyebrow{margin:0 0 5px;color:#856219;font-size:12px;font-weight:900}h1{margin:0;font-size:clamp(26px,4vw,44px);line-height:1}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:42px;padding:0 14px;border:1px solid #24534d;border-radius:var(--radius);color:#fffdf6;background:var(--teal);font-weight:900;cursor:pointer}.btn.secondary{color:var(--ink);background:#f0d17b;border-color:#9c7621}.btn:active{transform:translateY(1px)}.layout{display:grid;grid-template-columns:minmax(0,1fr) 316px;gap:14px;margin-top:14px;align-items:start}.stage{position:relative;overflow:hidden;min-height:650px}canvas{display:block;width:100%;height:650px;touch-action:none}.side{padding:16px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.stat{padding:10px;border:1px solid #9da69e;border-radius:var(--radius);background:#f9f7eb}.stat b{display:block;font-size:24px;line-height:1.1}.stat small{color:#5e6d67;font-weight:800}.meter{margin:0 0 13px}.meter span{display:flex;justify-content:space-between;margin-bottom:6px;color:#5e6d67;font-weight:900}.bar{height:13px;border:1px solid #84968f;border-radius:999px;overflow:hidden;background:#e9eadc}.bar i{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--gold),var(--red))}.flippers{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.flippers .wide{grid-column:1/-1}.touchbtn{min-height:56px;border:1px solid #758780;border-radius:var(--radius);background:#fff8e6;color:var(--ink);font-size:18px;font-weight:900;cursor:pointer}.hint{margin:14px 0 0;color:#566861;line-height:1.55;font-weight:700}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:24px;background:rgba(16,28,31,.52)}.modal{width:min(470px,100%);padding:22px;border:1px solid #a4b4ad;border-radius:var(--radius);background:#fffdf6;box-shadow:0 24px 52px rgba(0,0,0,.32)}.modal h2{margin:0 0 10px;font-size:28px}.modal p{margin:0 0 16px;color:#53635f;line-height:1.6}.hidden{display:none}@media(max-width:940px){.layout{grid-template-columns:1fr}.side{order:-1}.stage{min-height:560px}canvas{height:560px}}@media(max-width:620px){.app{width:min(100vw - 16px,1380px);margin-top:8px}.topbar{display:block;padding:14px}.actions{margin-top:12px;justify-content:stretch}.btn{flex:1 1 auto}.stage{min-height:540px}canvas{height:540px}.stat b{font-size:21px}}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div><p class="eyebrow">PERSPECTIVE PINBALL</p><h1>轨道弹球</h1></div>
        <div class="actions"><button class="btn" id="startBtn">开局</button><button class="btn secondary" id="pauseBtn">暂停</button><button class="btn secondary" id="resetBtn">重开</button></div>
      </header>
      <section class="layout">
        <div class="panel stage"><canvas id="gameCanvas" aria-label="轨道弹球游戏画面"></canvas><div class="overlay" id="overlay"><div class="modal"><h2 id="overlayTitle">发射轨道球</h2><p id="overlayText">按住空格或发射键蓄力，左右挡板把球打回轨道撞柱。掉球会扣生命。</p><button class="btn" id="overlayBtn">开始弹球</button></div></div></div>
        <aside class="panel side">
          <div class="stats"><div class="stat"><b id="scoreText">0</b><small>分数</small></div><div class="stat"><b id="bestText">0</b><small>最佳</small></div><div class="stat"><b id="ballsText">3</b><small>剩余球</small></div><div class="stat"><b id="comboText">1x</b><small>连撞</small></div></div>
          <div class="meter"><span><b>发射蓄力</b><em id="chargeText">0%</em></span><div class="bar"><i id="chargeBar"></i></div></div>
          <div class="flippers"><button class="touchbtn" id="leftBtn">左挡板</button><button class="touchbtn" id="rightBtn">右挡板</button><button class="touchbtn wide" id="launchBtn">按住发射</button></div>
          <p class="hint">A / ← 控制左挡板，D / → 控制右挡板。空格按住蓄力、松开发射，P 暂停，R 重开。</p>
        </aside>
      </section>
    </main>
    <script>
      (()=> {
        const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d"),overlay=document.getElementById("overlay"),overlayTitle=document.getElementById("overlayTitle"),overlayText=document.getElementById("overlayText"),overlayBtn=document.getElementById("overlayBtn"),startBtn=document.getElementById("startBtn"),pauseBtn=document.getElementById("pauseBtn"),resetBtn=document.getElementById("resetBtn"),leftBtn=document.getElementById("leftBtn"),rightBtn=document.getElementById("rightBtn"),launchBtn=document.getElementById("launchBtn");
        const scoreText=document.getElementById("scoreText"),bestText=document.getElementById("bestText"),ballsText=document.getElementById("ballsText"),comboText=document.getElementById("comboText"),chargeText=document.getElementById("chargeText"),chargeBar=document.getElementById("chargeBar");
        const BW=520,BH=780,storageKey="miniOrbitalPinballRecords";let w=900,h=650,dpr=1,last=0,loopToken=0;const keys=new Set();let state=makeState();
        const bumpers=[{x:190,y:205,r:34,v:700,c:"#f0d16f",name:"太阳"},{x:330,y:250,r:31,v:620,c:"#8bd0bb",name:"水星"},{x:250,y:360,r:36,v:680,c:"#bd5148",name:"火星"},{x:128,y:470,r:24,v:560,c:"#326f91",name:"海王"},{x:392,y:485,r:24,v:560,c:"#326f91",name:"海王"}];
        const lanes=[{x:96,y:116,w:62,h:16,hit:0},{x:206,y:96,w:62,h:16,hit:0},{x:316,y:116,w:62,h:16,hit:0}];
        function loadBest(){try{return JSON.parse(localStorage.getItem(storageKey)||"{}").best||0}catch(e){return 0}}
        function saveBest(v){const b=Math.max(loadBest(),v);localStorage.setItem(storageKey,JSON.stringify({best:b}));return b}
        function makeState(){return{mode:"menu",score:0,best:loadBest(),balls:3,charge:0,charging:false,combo:1,comboTimer:0,msg:"",msgTimer:0,particles:[],ball:{x:BW-43,y:BH-78,vx:0,vy:0,r:13,locked:true},flips:{left:0,right:0}}}
        function resize(){const r=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,devicePixelRatio||1));w=Math.max(320,r.width);h=Math.max(500,r.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
        function start(){loopToken++;state=makeState();resetBall(false);state.mode="running";overlay.classList.add("hidden");last=performance.now();updateHud();requestAnimationFrame(t=>loop(t,loopToken))}
        function resetBall(lose){const b=state.ball;if(lose){state.balls--;state.combo=1;flash("掉球 -1","#bd5148")}b.x=BW-43;b.y=BH-78;b.vx=0;b.vy=0;b.locked=true;state.charge=0;state.charging=false;if(state.balls<=0){state.mode="over";state.best=saveBest(state.score);overlayTitle.textContent="弹球结束";overlayText.textContent=`最终分数 ${state.score}，最佳 ${state.best}。`;overlayBtn.textContent="再来一局";overlay.classList.remove("hidden")}updateHud()}
        function togglePause(){if(state.mode==="running"){state.mode="paused";overlayTitle.textContent="已暂停";overlayText.textContent="继续保持球感，下一拍会很关键。";overlayBtn.textContent="继续";overlay.classList.remove("hidden");pauseBtn.textContent="继续"}else if(state.mode==="paused"){state.mode="running";overlay.classList.add("hidden");pauseBtn.textContent="暂停";last=performance.now();requestAnimationFrame(t=>loop(t,loopToken))}}
        function loop(now,token){if(token!==loopToken||state.mode!=="running")return;const dt=Math.min(.033,(now-last)/1000||.016);last=now;update(dt);draw();requestAnimationFrame(t=>loop(t,token))}
        function update(dt){state.flips.left+=(isLeft()?1:-1)*dt*8;state.flips.right+=(isRight()?1:-1)*dt*8;state.flips.left=Math.max(0,Math.min(1,state.flips.left));state.flips.right=Math.max(0,Math.min(1,state.flips.right));state.comboTimer-=dt;if(state.comboTimer<=0)state.combo=1;state.msgTimer=Math.max(0,state.msgTimer-dt);if(state.charging&&state.ball.locked)state.charge=Math.min(1,state.charge+dt*.72);const b=state.ball;if(!b.locked){b.vy+=430*dt;b.vx*=Math.pow(.992,dt*60);b.vy*=Math.pow(.998,dt*60);b.x+=b.vx*dt;b.y+=b.vy*dt;walls();for(const p of bumpers)circleHit(p);for(const l of lanes)laneHit(l);flipperHit(true);flipperHit(false);if(b.x>BW-70&&b.y<96){b.x=BW-120;b.y=98;b.vx=-130-Math.random()*50;b.vy=80}if(b.y>BH+30)resetBall(true)}state.particles=state.particles.filter(p=>{p.life-=dt;p.y-=dt*45;return p.life>0});updateHud()}
        function walls(){const b=state.ball;if(b.x<b.r+28){b.x=b.r+28;b.vx=Math.abs(b.vx)*.82}if(b.x>BW-b.r-28){b.x=BW-b.r-28;b.vx=-Math.abs(b.vx)*.82}if(b.y<b.r+25){b.y=b.r+25;b.vy=Math.abs(b.vy)*.82}if(b.y>BH-92&&b.x>BW-82){b.x=BW-82;b.vx=-Math.abs(b.vx)*.65}if(b.y>BH-48&&Math.abs(b.x-BW/2)>72){b.y=BH-48;b.vy=-Math.abs(b.vy)*.62}}
        function circleHit(p){const b=state.ball,dx=b.x-p.x,dy=b.y-p.y,dist=Math.hypot(dx,dy),min=b.r+p.r;if(dist<min){const nx=dx/(dist||1),ny=dy/(dist||1),dot=b.vx*nx+b.vy*ny;b.x=p.x+nx*min;b.y=p.y+ny*min;if(dot<0){b.vx-=2*dot*nx;b.vy-=2*dot*ny}b.vx+=nx*p.v;b.vy+=ny*p.v;score(120,p.name,p.c)}}
        function laneHit(l){const b=state.ball;if(b.x>l.x&&b.x<l.x+l.w&&b.y>l.y-12&&b.y<l.y+l.h+12&&performance.now()-l.hit>600){l.hit=performance.now();score(70,"轨道", "#d6a33d")}}
        function flipperData(left){const lift=left?state.flips.left:state.flips.right,p={x:left?168:352,y:684},len=112,closed=left?-.12:Math.PI+.12,open=left?-.82:Math.PI+.82,a=closed+(open-closed)*lift;return{p,e:{x:p.x+Math.cos(a)*len,y:p.y+Math.sin(a)*len},lift,left}}
        function flipperHit(left){const f=flipperData(left),b=state.ball,vx=f.e.x-f.p.x,vy=f.e.y-f.p.y,len2=vx*vx+vy*vy,t=Math.max(0,Math.min(1,((b.x-f.p.x)*vx+(b.y-f.p.y)*vy)/len2)),cx=f.p.x+vx*t,cy=f.p.y+vy*t,dx=b.x-cx,dy=b.y-cy,dist=Math.hypot(dx,dy),min=b.r+8;if(dist<min&&b.vy>20){const nx=dx/(dist||1),ny=dy/(dist||1),dot=b.vx*nx+b.vy*ny;b.x=cx+nx*min;b.y=cy+ny*min;if(dot<0){b.vx-=1.7*dot*nx;b.vy-=1.7*dot*ny}const power=420+f.lift*420;b.vy-=power;b.vx+=(left?1:-1)*(240+f.lift*220);score(12,"挡板","#8bd0bb")}}
        function score(base,label,color){const add=Math.round(base*state.combo);state.score+=add;state.combo=Math.min(9,state.combo+.25);state.comboTimer=2.4;flash(`${label} +${add}`,color)}
        function flash(text,color){state.msg=text;state.msgTimer=1.2;state.particles.push({x:state.ball.x,y:state.ball.y,text,color,life:1})}
        function launchDown(){state.charging=true}
        function launchUp(){if(!state.ball.locked)return;const b=state.ball,p=.28+state.charge*.72;b.locked=false;b.vx=-28;b.vy=-610-760*p;state.charging=false;state.charge=0;flash("发射","#f0d16f")}
        function isLeft(){return keys.has("ArrowLeft")||keys.has("KeyA")}function isRight(){return keys.has("ArrowRight")||keys.has("KeyD")}
        function project(x,y,z=0){const boardScale=Math.min(w*.88/BW,h*.94/BH),s=.58+.42*y/BH,cx=w/2,top=24,py=top+y*boardScale*.9,px=cx+(x-BW/2)*boardScale*s;return{x:px,y:py-z*boardScale*s,scale:boardScale*s}}
        function poly(points,fill,stroke){ctx.beginPath();points.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke()}}
        function draw(){ctx.clearRect(0,0,w,h);const bg=ctx.createLinearGradient(0,0,0,h);bg.addColorStop(0,"#111928");bg.addColorStop(1,"#283048");ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);for(let i=0;i<72;i++){ctx.fillStyle=i%3?"rgba(255,255,255,.13)":"rgba(214,163,61,.22)";ctx.fillRect((i*79)%w,(i*43)%h,2,2)}const p1=project(28,20),p2=project(BW-28,20),p3=project(BW-18,BH),p4=project(18,BH);poly([p1,p2,p3,p4],"#162934","#8bd0bb");const inner=[project(56,54),project(BW-56,54),project(BW-56,BH-46),project(56,BH-46)];poly(inner,"#203948","#335a63");drawRails();for(const l of lanes)drawRect(l.x,l.y,l.w,l.h,"#d6a33d");for(const p of bumpers)drawBumper(p);drawFlipper(true);drawFlipper(false);drawDrain();drawBall();for(const p of state.particles){const q=project(p.x,p.y,40*p.life);ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.font=`900 ${16+8*q.scale}px system-ui`;ctx.textAlign="center";ctx.fillText(p.text,q.x,q.y);ctx.globalAlpha=1}if(state.msgTimer>0){ctx.fillStyle="rgba(255,253,244,.88)";ctx.font="900 24px system-ui";ctx.textAlign="center";ctx.fillText(state.msg,w/2,42)}}
        function drawRails(){ctx.strokeStyle="#8bd0bb";ctx.lineWidth=4;ctx.beginPath();let p=project(68,70);ctx.moveTo(p.x,p.y);for(let y=80;y<BH-118;y+=28){p=project(68+Math.sin(y*.018)*18,y);ctx.lineTo(p.x,p.y)}ctx.stroke();ctx.beginPath();p=project(BW-72,70);ctx.moveTo(p.x,p.y);for(let y=80;y<BH-115;y+=28){p=project(BW-72+Math.sin(y*.016)*16,y);ctx.lineTo(p.x,p.y)}ctx.stroke();ctx.strokeStyle="rgba(240,209,111,.8)";ctx.lineWidth=3;let a=project(BW-72,BH-118),b=project(BW-72,104);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
        function drawRect(x,y,W,H,color){const a=project(x,y),b=project(x+W,y),c=project(x+W,y+H),d=project(x,y+H);poly([a,b,c,d],color,"rgba(255,253,244,.75)")}
        function drawBumper(p){const q=project(p.x,p.y,8),r=p.r*q.scale/(project(p.x,p.y).scale||1)*.92;ctx.fillStyle="rgba(0,0,0,.24)";ctx.beginPath();ctx.ellipse(q.x+4*q.scale,q.y+8*q.scale,r*1.06,r*.42,0,0,Math.PI*2);ctx.fill();const g=ctx.createRadialGradient(q.x-r*.35,q.y-r*.45,2,q.x,q.y,r);g.addColorStop(0,"#fffdf4");g.addColorStop(.35,p.c);g.addColorStop(1,"#16313a");ctx.fillStyle=g;ctx.beginPath();ctx.arc(q.x,q.y,r,0,Math.PI*2);ctx.fill();ctx.lineWidth=3;ctx.strokeStyle="#fffdf4";ctx.stroke()}
        function drawFlipper(left){const f=flipperData(left),a=project(f.p.x,f.p.y,8),b=project(f.e.x,f.e.y,8);ctx.strokeStyle="#f0d16f";ctx.lineWidth=12*a.scale;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.strokeStyle="#1b413d";ctx.lineWidth=3*a.scale;ctx.stroke()}
        function drawDrain(){const a=project(BW/2-66,BH-34),b=project(BW/2+66,BH-34);ctx.strokeStyle="#bd5148";ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
        function drawBall(){const b=state.ball,q=project(b.x,b.y,22),r=b.r*q.scale*1.8;ctx.fillStyle="rgba(0,0,0,.34)";ctx.beginPath();ctx.ellipse(q.x+5*q.scale,q.y+13*q.scale,r*.95,r*.34,0,0,Math.PI*2);ctx.fill();const g=ctx.createRadialGradient(q.x-r*.4,q.y-r*.45,2,q.x,q.y,r);g.addColorStop(0,"#fffdf4");g.addColorStop(.42,"#8bd0bb");g.addColorStop(1,"#1c5560");ctx.fillStyle=g;ctx.beginPath();ctx.arc(q.x,q.y,r,0,Math.PI*2);ctx.fill()}
        function updateHud(){scoreText.textContent=state.score.toString();bestText.textContent=Math.max(state.best,state.score).toString();ballsText.textContent=state.balls.toString();comboText.textContent=`${state.combo.toFixed(1)}x`;chargeText.textContent=`${Math.round(state.charge*100)}%`;chargeBar.style.width=`${state.charge*100}%`}
        startBtn.addEventListener("click",start);resetBtn.addEventListener("click",start);overlayBtn.addEventListener("click",()=>state.mode==="paused"?togglePause():start());pauseBtn.addEventListener("click",togglePause);
        function hold(btn,code){btn.addEventListener("pointerdown",e=>{e.preventDefault();keys.add(code);btn.setPointerCapture?.(e.pointerId)});btn.addEventListener("pointerup",e=>{e.preventDefault();keys.delete(code)});btn.addEventListener("pointercancel",()=>keys.delete(code));btn.addEventListener("pointerleave",()=>keys.delete(code))}
        hold(leftBtn,"ArrowLeft");hold(rightBtn,"ArrowRight");launchBtn.addEventListener("pointerdown",e=>{e.preventDefault();launchDown()});launchBtn.addEventListener("pointerup",e=>{e.preventDefault();launchUp()});launchBtn.addEventListener("pointercancel",launchUp);launchBtn.addEventListener("pointerleave",()=>{if(state.charging)launchUp()});
        document.addEventListener("keydown",e=>{if(["ArrowLeft","ArrowRight","Space"].includes(e.code))e.preventDefault();if(e.code==="KeyP")togglePause();if(e.code==="KeyR")start();if(e.code==="Space"&&!keys.has("Space"))launchDown();keys.add(e.code)});
        document.addEventListener("keyup",e=>{if(e.code==="Space")launchUp();keys.delete(e.code)});window.addEventListener("resize",resize);resize();updateHud();draw();
      })();
    </script>
  </body>
</html>
