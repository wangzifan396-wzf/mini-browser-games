<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>轨道弹球：三界巡回</title>
  <style>
    :root{--ink:#10191f;--paper:#fffaf0;--line:#7d9094;--teal:#277469;--gold:#d5a03b;--red:#bc514b;--blue:#326f91;--shadow:rgba(5,12,16,.3)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:system-ui,"Microsoft YaHei",sans-serif;background:linear-gradient(rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(135deg,#0b1724,#16374a 50%,#342e49);background-size:28px 28px,28px 28px,auto}.app{width:min(1450px,calc(100% - 22px));margin:11px auto}.top,.panel{border:1px solid var(--line);border-radius:14px;background:rgba(255,250,240,.97);box-shadow:0 18px 48px var(--shadow)}.top{display:flex;align-items:center;justify-content:space-between;gap:15px;padding:15px 18px}.eyebrow{margin:0 0 4px;color:#52767b;font-size:12px;font-weight:950;letter-spacing:.15em}.top h1{margin:0;font-size:clamp(26px,4vw,43px);line-height:1}.sub{margin:7px 0 0;color:#617074;font-size:13px}.actions,.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}button,textarea{font:inherit}.btn{min-height:42px;padding:0 13px;border:1px solid #38656a;border-radius:9px;background:var(--teal);color:white;font-weight:900;cursor:pointer}.btn.gold{border-color:#98702a;background:#d9ad53;color:#302516}.btn.red{border-color:#95433e;background:#a74340}.btn.ghost{background:#fff7e8;color:#21333a;border-color:#7c8d8d}.btn:disabled{opacity:.45;filter:saturate(.3);cursor:not-allowed}.layout{display:grid;grid-template-columns:minmax(0,1fr) 370px;gap:12px;margin-top:12px;align-items:start}.stage{position:relative;overflow:hidden;min-height:680px}.stage canvas{display:block;width:100%;height:680px;touch-action:none}.side{padding:12px;display:grid;gap:10px;max-height:calc(100vh - 105px);overflow:auto}.hud{position:absolute;left:10px;right:10px;top:10px;display:grid;grid-template-columns:repeat(6,1fr);gap:6px;pointer-events:none}.stat{padding:7px;border:1px solid rgba(255,255,255,.33);border-radius:8px;background:rgba(9,26,34,.8);color:white;text-shadow:0 1px #000}.stat b{display:block;font-size:19px}.stat small{font-size:10px;color:#d3e4e2}.charge{position:absolute;left:12px;right:12px;bottom:12px;padding:7px;border:1px solid rgba(255,255,255,.32);border-radius:8px;background:rgba(9,26,34,.82);color:white;font-size:11px;font-weight:850;pointer-events:none}.bar{height:9px;margin-top:4px;border-radius:99px;overflow:hidden;background:rgba(255,255,255,.17)}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#f2d680)}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:20px;background:rgba(8,23,30,.62)}.overlay.hidden{display:none}.dialog{width:min(510px,100%);padding:20px;border:1px solid #8a9b98;border-radius:14px;background:#fffaf0;box-shadow:0 25px 58px rgba(0,0,0,.34)}.dialog h2{margin:0 0 8px}.dialog p{color:#5e6c6b;line-height:1.55}.block{padding:11px;border:1px solid #9ca6a0;border-radius:11px;background:#f7f0e2}.block h2,.block h3{margin:0 0 8px}.block h2{font-size:20px}.block h3{font-size:14px;color:#2e6d70}.tables{display:grid;gap:6px}.table-card{padding:8px;border:1px solid #989f98;border-radius:8px;background:#fffaf0;color:var(--ink);text-align:left;cursor:pointer}.table-card.active{outline:3px solid var(--teal);background:#e8f3ed}.table-card:disabled{opacity:.45}.table-card b{display:flex;justify-content:space-between}.table-card small{display:block;margin-top:4px;color:#68736f;font-size:10px;line-height:1.35}.stars{color:var(--gold)}.objective{display:grid;gap:6px}.goal{display:flex;justify-content:space-between;gap:8px;padding:7px;border:1px solid #9da49c;border-radius:8px;color:#69726e;background:#fffaf0;font-size:11px}.goal.pass{border-color:#57906d;color:#295e3c;background:#e5f3e8}.career{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.career div{padding:7px;border:1px solid #9ba39c;border-radius:8px;background:#fffaf0;text-align:center}.career b{display:block;font-size:19px}.career small{font-size:10px;color:#68736f}.modules{display:grid;grid-template-columns:1fr 1fr;gap:6px}.module{padding:7px;border:1px solid #989f98;border-radius:8px;background:#fffaf0;color:var(--ink);text-align:left;cursor:pointer}.module.active{outline:3px solid #8068b0}.module:disabled{opacity:.45}.module b,.module small{display:block}.module small{min-height:30px;color:#69736f;font-size:9px;margin-top:3px}.flippers{display:grid;grid-template-columns:1fr 1fr;gap:7px}.touch{min-height:54px;border:1px solid #788b87;border-radius:8px;background:#fffaf0;color:#193337;font-size:17px;font-weight:900}.touch.wide{grid-column:1/-1}.tip{color:#5e6d69;font-size:12px;line-height:1.5}.archive{position:fixed;inset:0;z-index:8;display:grid;place-items:center;padding:18px;background:rgba(4,14,18,.82)}.archive.hidden{display:none}.archive .dialog{width:min(620px,100%)}textarea{width:100%;min-height:125px;padding:10px;border:1px solid #778c8b;border-radius:8px;background:#f2eadc;resize:vertical}.feedback{min-height:20px;margin-top:7px;color:#8d651d;font-size:12px;font-weight:850}
    @media(max-width:1000px){.layout{grid-template-columns:1fr}.side{max-height:none;grid-template-columns:repeat(2,minmax(0,1fr))}.side .wide{grid-column:1/-1}.stage,.stage canvas{height:610px;min-height:610px}}
    @media(max-width:650px){.app{width:min(100% - 10px,1450px);margin:5px auto}.top{display:block;padding:12px}.actions{margin-top:11px}.actions .btn{flex:1}.stage,.stage canvas{height:560px;min-height:560px}.hud{grid-template-columns:repeat(3,1fr)}.side{grid-template-columns:1fr}.side .wide{grid-column:auto}.sub{line-height:1.45}}
  </style>
</head>
<body>
<main class="app">
  <header class="top"><div><p class="eyebrow">ORBITAL PINBALL TOUR V2</p><h1>轨道弹球</h1><p class="sub">三张规则桌台、独立桌面任务与双槽球体模块。挡板物理不变，得分路线完全不同。</p></div><div class="actions"><button class="btn" id="startBtn">开始桌台</button><button class="btn gold" id="pauseBtn">暂停</button><button class="btn ghost" id="archiveBtn">巡回档案</button></div></header>
  <section class="layout">
    <div class="panel stage"><canvas id="gameCanvas" aria-label="轨道弹球三界巡回桌台"></canvas>
      <div class="hud"><div class="stat"><b id="scoreText">0</b><small>分数</small></div><div class="stat"><b id="targetText">0</b><small>目标</small></div><div class="stat"><b id="ballsText">3</b><small>剩余球</small></div><div class="stat"><b id="comboText">1.0x</b><small>连撞</small></div><div class="stat"><b id="maxComboText">1.0x</b><small>最高连撞</small></div><div class="stat"><b id="missionText">0/0</b><small>桌面任务</small></div></div>
      <div class="charge">发射蓄力 <span id="chargeText">0%</span><div class="bar"><i id="chargeBar"></i></div></div>
      <div class="overlay" id="overlay"><div class="dialog"><h2 id="overlayTitle">选择桌台</h2><p id="overlayText"></p><button class="btn" id="overlayBtn">开始弹球</button></div></div>
    </div>
    <aside class="panel side">
      <section class="block wide"><h3>三界巡回</h3><div class="tables" id="tables"></div></section>
      <section class="block"><h3 id="tableChapter"></h3><h2 id="tableName"></h2><p class="tip" id="tableBrief"></p><div class="objective" id="objectives"></div></section>
      <section class="block"><h3>巡回生涯</h3><div class="career"><div><b id="starText">0</b><small>星章</small></div><div><b id="clearText">0</b><small>通关</small></div><div><b id="bestText">0</b><small>当前桌最佳</small></div></div></section>
      <section class="block wide"><h3>双槽球体模块 <span id="slotText"></span></h3><div class="modules" id="modules"></div></section>
      <section class="block"><h3>触屏挡板</h3><div class="flippers"><button class="touch" id="leftBtn">左挡板</button><button class="touch" id="rightBtn">右挡板</button><button class="touch wide" id="launchBtn">按住蓄力发射</button></div><p class="tip">A / ← 与 D / → 控制挡板；Space 按住蓄力，P 暂停，R 重开。</p></section>
    </aside>
  </section>
</main>
<div class="archive hidden" id="archiveModal"><div class="dialog"><h2>跨设备巡回档案</h2><p class="tip">档案包含桌台星级、最佳分、已解锁桌台、模块配置和通关数。</p><textarea id="archiveText" spellcheck="false"></textarea><div class="row" style="justify-content:flex-end"><button class="btn ghost" id="closeArchiveBtn">关闭</button><button class="btn" id="importBtn">导入</button><button class="btn gold" id="exportBtn">生成并复制</button></div><div class="feedback" id="archiveFeedback"></div></div></div>
<script>
(() => {
  "use strict";
  const BW=520,BH=780,KEY="miniOrbitalPinballV2",$=id=>document.getElementById(id),canvas=$("gameCanvas"),ctx=canvas.getContext("2d");
  const TABLES=[
    {chapter:"第一站 · 日珥花园",name:"太阳环庭",brief:"点亮三条上层轨道，再围绕五颗行星维持连撞。",target:6500,objective:"lanes",objectiveCount:3,gravity:430,bg:["#111928","#263b49"],accent:"#8bd0bb",bumpers:[[190,205,34,700,"#f0d16f","太阳"],[330,250,31,620,"#8bd0bb","水星"],[250,360,36,680,"#bd5148","火星"],[128,470,24,560,"#326f91","海王"],[392,485,24,560,"#326f91","海王"]],lanes:[[96,116,62,16],[206,96,62,16],[316,116,62,16]],targets:[],magnets:[],portals:[]},
    {chapter:"第二站 · 磁铸工坊",name:"双极熔炉",brief:"磁场持续弯曲球路，击倒四枚冷却靶解除炉心锁。",target:8500,objective:"targets",objectiveCount:4,gravity:445,bg:["#211720","#4c2f2d"],accent:"#efaa63",bumpers:[[160,230,29,650,"#efaa63","阳极"],[360,230,29,650,"#67cbd3","阴极"],[260,390,38,720,"#e16761","炉心"]],lanes:[],targets:[[116,470],[212,430],[308,430],[404,470]],magnets:[[150,320,1],[370,320,-1]],portals:[]},
    {chapter:"第三站 · 时隙边境",name:"双门悖论",brief:"穿越成对时隙改变球路，累计四次跃迁后击穿计分目标。",target:11000,objective:"portals",objectiveCount:4,gravity:360,bg:["#15152c","#2e2852"],accent:"#b68ee8",bumpers:[[260,210,34,690,"#b68ee8","钟核"],[155,420,27,590,"#6ed1d9","早星"],[365,420,27,590,"#efc262","晚星"]],lanes:[[105,110,65,16],[350,110,65,16]],targets:[],magnets:[],portals:[[115,285,395,500],[405,285,125,500]]}
  ];
  const MODULES=[
    {name:"保险球仓",need:0,key:"ball",desc:"每局额外 1 球"},{name:"弹性外壳",need:2,key:"power",desc:"撞柱推力与得分 +18%"},
    {name:"连撞记忆",need:4,key:"combo",desc:"连撞衰减时间 +1.2 秒"},{name:"轨道倍增",need:5,key:"lane",desc:"轨道与靶标得分 +40%"},
    {name:"聚能发射器",need:7,key:"launch",desc:"发射初速度 +16%"},{name:"安全回收环",need:9,key:"save",desc:"首次掉球不扣球数"}
  ];
  let profile=load(),selected=Math.min(profile.unlocked,2),state=makeState(),w=900,h=680,dpr=1,last=0,token=0,keys=new Set();
  function defaults(){return {v:2,unlocked:0,stars:[0,0,0],best:[0,0,0],clears:0,equipped:[0]};}
  function load(){try{const v=JSON.parse(localStorage.getItem(KEY)||"null");if(v&&v.v===2)return Object.assign(defaults(),v,{stars:Array.from({length:3},(_,i)=>v.stars?.[i]||0),best:Array.from({length:3},(_,i)=>v.best?.[i]||0),equipped:Array.isArray(v.equipped)?v.equipped.filter(i=>Number.isInteger(i)&&i>=0&&i<MODULES.length).slice(0,2):[0]});}catch(_){}return defaults();}
  function save(){localStorage.setItem(KEY,JSON.stringify(profile));}function totalStars(){return profile.stars.reduce((a,b)=>a+b,0);}function has(k){return profile.equipped.some(i=>MODULES[i]?.key===k);}
  function boardFromTable(){const t=TABLES[selected];return {bumpers:t.bumpers.map(([x,y,r,v,c,name])=>({x,y,r,v,c,name})),lanes:t.lanes.map(([x,y,w,h])=>({x,y,w,h,last:0,hits:0})),targets:t.targets.map(([x,y])=>({x,y,r:18,active:true})),magnets:t.magnets.map(([x,y,pull])=>({x,y,pull})),portals:t.portals.map(([x,y,tx,ty])=>({x,y,tx,ty,r:25}))};}
  function makeState(){const balls=3+(has?.('ball')?1:0);return {mode:"menu",score:0,balls,charge:0,charging:false,combo:1,maxCombo:1,comboTimer:0,msg:"",msgTimer:0,particles:[],mission:0,portalUses:0,saved:false,board:boardFromTable?.()||{bumpers:[],lanes:[],targets:[],magnets:[],portals:[]},portalCooldown:0,ball:{x:BW-43,y:BH-78,vx:0,vy:0,r:13,locked:true},flips:{left:0,right:0}};}
  function resize(){const r=canvas.getBoundingClientRect();w=Math.max(320,r.width);h=Math.max(520,r.height);dpr=Math.max(1,Math.min(2,devicePixelRatio||1));canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw();}
  function chooseTable(i){if(i>profile.unlocked||['running','paused'].includes(state.mode))return;selected=i;state=makeState();overlayTitle.textContent=TABLES[i].name;overlayText.textContent=`${TABLES[i].brief} 一星目标 ${TABLES[i].target} 分。`;overlayBtn.textContent='开始弹球';overlay.classList.remove('hidden');renderSide();updateHud();draw();}
  function start(){token++;state=makeState();state.mode='running';resetBall(false);overlay.classList.add('hidden');last=performance.now();renderSide();updateHud();requestAnimationFrame(t=>loop(t,token));}
  function resetBall(lose){const b=state.ball;if(lose){if(has('save')&&!state.saved){state.saved=true;flash('回收环救球','#8bd0bb');}else{state.balls--;state.combo=1;flash('掉球 -1','#bd5148');}}b.x=BW-43;b.y=BH-78;b.vx=b.vy=0;b.locked=true;state.charge=0;state.charging=false;if(state.balls<=0)finish(false);updateHud();}
  function finish(success){if(state.mode==='over')return;state.mode='over';token++;profile.best[selected]=Math.max(profile.best[selected],state.score);let stars=0;if(success){stars=1;if(objectiveDone())stars=2;if(objectiveDone()&&state.balls>=2)stars=3;profile.stars[selected]=Math.max(profile.stars[selected],stars);profile.unlocked=Math.max(profile.unlocked,Math.min(2,selected+1));profile.clears++;}save();overlayTitle.textContent=success?`${'★'.repeat(stars)} 桌台完成`:'球仓耗尽';overlayText.textContent=`最终 ${state.score} 分，任务 ${missionProgress()}/${TABLES[selected].objectiveCount}，剩余 ${state.balls} 球，最高连撞 ${state.maxCombo.toFixed(1)}x。`;overlayBtn.textContent='再来一局';overlay.classList.remove('hidden');renderSide();updateHud();}
  function togglePause(){if(state.mode==='running'){state.mode='paused';overlayTitle.textContent='巡回暂停';overlayText.textContent='桌面物理已经冻结。';overlayBtn.textContent='继续';overlay.classList.remove('hidden');pauseBtn.textContent='继续';}else if(state.mode==='paused'){state.mode='running';overlay.classList.add('hidden');pauseBtn.textContent='暂停';last=performance.now();requestAnimationFrame(t=>loop(t,token));}}
  function loop(now,id){if(id!==token||state.mode!=='running')return;const dt=Math.min(.033,(now-last)/1000||.016);last=now;update(dt);draw();if(state.mode==='running')requestAnimationFrame(t=>loop(t,id));}
  function update(dt){const t=TABLES[selected];state.flips.left=clamp(state.flips.left+(isLeft()?1:-1)*dt*8,0,1);state.flips.right=clamp(state.flips.right+(isRight()?1:-1)*dt*8,0,1);state.comboTimer-=dt;if(state.comboTimer<=0)state.combo=1;state.msgTimer=Math.max(0,state.msgTimer-dt);state.portalCooldown=Math.max(0,state.portalCooldown-dt);if(state.charging&&state.ball.locked)state.charge=Math.min(1,state.charge+dt*.72);const b=state.ball;if(!b.locked){b.vy+=t.gravity*dt;b.vx*=Math.pow(.992,dt*60);b.vy*=Math.pow(.998,dt*60);for(const m of state.board.magnets){const dx=m.x-b.x,dy=m.y-b.y,d=Math.max(40,Math.hypot(dx,dy));if(d<150){const force=m.pull*19000/(d*d);b.vx+=dx/d*force*dt;b.vy+=dy/d*force*dt;}}b.x+=b.vx*dt;b.y+=b.vy*dt;walls();for(const p of state.board.bumpers)circleHit(p,'bumper');for(const p of state.board.targets)if(p.active)circleHit(p,'target');for(const l of state.board.lanes)laneHit(l);portalHit();flipperHit(true);flipperHit(false);if(b.x>BW-70&&b.y<96){b.x=BW-120;b.y=98;b.vx=-130-Math.random()*50;b.vy=80;}if(b.y>BH+30)resetBall(true);}state.particles=state.particles.filter(p=>(p.life-=dt,p.y-=dt*45,p.life>0));if(state.score>=t.target)finish(true);updateHud();}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function walls(){const b=state.ball;if(b.x<b.r+28){b.x=b.r+28;b.vx=Math.abs(b.vx)*.82;}if(b.x>BW-b.r-28){b.x=BW-b.r-28;b.vx=-Math.abs(b.vx)*.82;}if(b.y<b.r+25){b.y=b.r+25;b.vy=Math.abs(b.vy)*.82;}if(b.y>BH-92&&b.x>BW-82){b.x=BW-82;b.vx=-Math.abs(b.vx)*.65;}if(b.y>BH-48&&Math.abs(b.x-BW/2)>72){b.y=BH-48;b.vy=-Math.abs(b.vy)*.62;}}
  function circleHit(p,type){const b=state.ball,dx=b.x-p.x,dy=b.y-p.y,dist=Math.hypot(dx,dy),min=b.r+p.r;if(dist<min){const nx=dx/(dist||1),ny=dy/(dist||1),dot=b.vx*nx+b.vy*ny;b.x=p.x+nx*min;b.y=p.y+ny*min;if(dot<0){b.vx-=2*dot*nx;b.vy-=2*dot*ny;}if(type==='target'){p.active=false;b.vx+=nx*360;b.vy+=ny*360;score(Math.round(260*(has('lane')?1.4:1)),'冷却靶','#f0d16f',true);}else{const power=p.v*(has('power')?1.18:1);b.vx+=nx*power;b.vy+=ny*power;score(Math.round(120*(has('power')?1.18:1)),p.name,p.c);}}}
  function laneHit(l){const b=state.ball,now=performance.now();if(b.x>l.x&&b.x<l.x+l.w&&b.y>l.y-12&&b.y<l.y+l.h+12&&now-l.last>600){l.last=now;l.hits++;score(Math.round(80*(has('lane')?1.4:1)),'轨道','#d6a33d',true);}}
  function portalHit(){if(state.portalCooldown>0)return;const b=state.ball;for(const p of state.board.portals)if(Math.hypot(b.x-p.x,b.y-p.y)<b.r+p.r){b.x=p.tx;b.y=p.ty;b.vx*=-.78;b.vy*=-.78;state.portalCooldown=.85;state.portalUses++;score(320,'时隙跃迁','#b68ee8',true);break;}}
  function objectiveDone(){return missionProgress()>=TABLES[selected].objectiveCount;}function missionProgress(){if(TABLES[selected].objective==='lanes')return state.board.lanes.filter(x=>x.hits>0).length;if(TABLES[selected].objective==='targets')return state.board.targets.filter(x=>!x.active).length;return state.portalUses;}
  function flipperData(left){const lift=left?state.flips.left:state.flips.right,p={x:left?168:352,y:684},len=112,closed=left?-.12:Math.PI+.12,open=left?-.82:Math.PI+.82,a=closed+(open-closed)*lift;return {p,e:{x:p.x+Math.cos(a)*len,y:p.y+Math.sin(a)*len},lift};}
  function flipperHit(left){const f=flipperData(left),b=state.ball,vx=f.e.x-f.p.x,vy=f.e.y-f.p.y,len2=vx*vx+vy*vy,t=clamp(((b.x-f.p.x)*vx+(b.y-f.p.y)*vy)/len2,0,1),cx=f.p.x+vx*t,cy=f.p.y+vy*t,dx=b.x-cx,dy=b.y-cy,dist=Math.hypot(dx,dy),min=b.r+8;if(dist<min&&b.vy>20){const nx=dx/(dist||1),ny=dy/(dist||1),dot=b.vx*nx+b.vy*ny;b.x=cx+nx*min;b.y=cy+ny*min;if(dot<0){b.vx-=1.7*dot*nx;b.vy-=1.7*dot*ny;}const power=420+f.lift*420;b.vy-=power;b.vx+=(left?1:-1)*(240+f.lift*220);score(12,'挡板','#8bd0bb');}}
  function score(base,label,color,objective=false){const add=Math.round(base*state.combo);state.score+=add;state.combo=Math.min(9,state.combo+.25);state.maxCombo=Math.max(state.maxCombo,state.combo);state.comboTimer=2.4+(has('combo')?1.2:0);flash(`${label} +${add}`,color);if(objective)state.mission=missionProgress();}
  function flash(text,color){state.msg=text;state.msgTimer=1.2;state.particles.push({x:state.ball.x,y:state.ball.y,text,color,life:1});}
  function launchDown(){if(state.mode==='running')state.charging=true;}function launchUp(){if(!state.ball.locked||state.mode!=='running')return;const b=state.ball,p=.28+state.charge*.72,m=has('launch')?1.16:1;b.locked=false;b.vx=-28;b.vy=(-610-760*p)*m;state.charging=false;state.charge=0;flash('发射','#f0d16f');}
  function isLeft(){return keys.has('ArrowLeft')||keys.has('KeyA');}function isRight(){return keys.has('ArrowRight')||keys.has('KeyD');}
  function project(x,y,z=0){const scale=Math.min(w*.88/BW,h*.94/BH),s=.58+.42*y/BH,cx=w/2,top=24;return {x:cx+(x-BW/2)*scale*s,y:top+y*scale*.9-z*scale*s,scale:scale*s};}
  function poly(points,fill,stroke){ctx.beginPath();points.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();}}
  function draw(){const t=TABLES[selected],bg=ctx.createLinearGradient(0,0,0,h);bg.addColorStop(0,t.bg[0]);bg.addColorStop(1,t.bg[1]);ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);for(let i=0;i<72;i++){ctx.fillStyle=i%3?'rgba(255,255,255,.13)':'rgba(214,163,61,.22)';ctx.fillRect((i*79)%w,(i*43)%h,2,2);}poly([project(28,20),project(BW-28,20),project(BW-18,BH),project(18,BH)],'#162934',t.accent);poly([project(56,54),project(BW-56,54),project(BW-56,BH-46),project(56,BH-46)],'#203948','#335a63');drawRails();for(const l of state.board.lanes)drawRect(l.x,l.y,l.w,l.h,l.hits?'#79d4a0':'#d6a33d');for(const m of state.board.magnets)drawMagnet(m);for(const p of state.board.portals)drawPortal(p);for(const p of state.board.bumpers)drawBumper(p);for(const p of state.board.targets)if(p.active)drawTarget(p);drawFlipper(true);drawFlipper(false);drawDrain();drawBall();for(const p of state.particles){const q=project(p.x,p.y,40*p.life);ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.font=`900 ${16+8*q.scale}px system-ui`;ctx.textAlign='center';ctx.fillText(p.text,q.x,q.y);ctx.globalAlpha=1;}if(state.msgTimer>0){ctx.fillStyle='rgba(255,253,244,.9)';ctx.font='900 23px system-ui';ctx.textAlign='center';ctx.fillText(state.msg,w/2,42);}}
  function drawRails(){const t=TABLES[selected];ctx.strokeStyle=t.accent;ctx.lineWidth=4;for(const side of[-1,1]){ctx.beginPath();let p=project(side<0?68:BW-72,70);ctx.moveTo(p.x,p.y);for(let y=80;y<BH-118;y+=28){p=project((side<0?68:BW-72)+Math.sin(y*.017)*17,y);ctx.lineTo(p.x,p.y);}ctx.stroke();}}
  function drawRect(x,y,W,H,color){poly([project(x,y),project(x+W,y),project(x+W,y+H),project(x,y+H)],color,'rgba(255,253,244,.75)');}
  function drawBumper(p){const q=project(p.x,p.y,8),r=p.r*q.scale/(project(p.x,p.y).scale||1)*.92,gr=ctx.createRadialGradient(q.x-r*.35,q.y-r*.45,2,q.x,q.y,r);gr.addColorStop(0,'#fffdf4');gr.addColorStop(.35,p.c);gr.addColorStop(1,'#16313a');ctx.fillStyle=gr;ctx.beginPath();ctx.arc(q.x,q.y,r,0,Math.PI*2);ctx.fill();ctx.lineWidth=3;ctx.strokeStyle='#fffdf4';ctx.stroke();}
  function drawTarget(p){const q=project(p.x,p.y,7);ctx.fillStyle='#f0d16f';ctx.fillRect(q.x-12*q.scale,q.y-21*q.scale,24*q.scale,42*q.scale);ctx.strokeStyle='#fff';ctx.strokeRect(q.x-12*q.scale,q.y-21*q.scale,24*q.scale,42*q.scale);}
  function drawMagnet(m){const q=project(m.x,m.y,4);ctx.strokeStyle=m.pull>0?'#efaa63':'#67cbd3';ctx.lineWidth=5;ctx.beginPath();ctx.arc(q.x,q.y,36*q.scale,0,Math.PI*2);ctx.stroke();ctx.font=`900 ${23*q.scale}px system-ui`;ctx.fillStyle=ctx.strokeStyle;ctx.textAlign='center';ctx.fillText(m.pull>0?'+':'−',q.x,q.y+7*q.scale);}
  function drawPortal(p){const q=project(p.x,p.y,5);ctx.strokeStyle='#b68ee8';ctx.lineWidth=5;ctx.beginPath();ctx.arc(q.x,q.y,p.r*q.scale,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='#6ed1d9';ctx.beginPath();ctx.arc(q.x,q.y,p.r*q.scale*.55,0,Math.PI*2);ctx.stroke();}
  function drawFlipper(left){const f=flipperData(left),a=project(f.p.x,f.p.y,8),b=project(f.e.x,f.e.y,8);ctx.strokeStyle='#f0d16f';ctx.lineWidth=12*a.scale;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.strokeStyle='#1b413d';ctx.lineWidth=3*a.scale;ctx.stroke();}
  function drawDrain(){const a=project(BW/2-66,BH-34),b=project(BW/2+66,BH-34);ctx.strokeStyle='#bd5148';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  function drawBall(){const b=state.ball,q=project(b.x,b.y,22),r=b.r*q.scale*1.8,gr=ctx.createRadialGradient(q.x-r*.4,q.y-r*.45,2,q.x,q.y,r);gr.addColorStop(0,'#fffdf4');gr.addColorStop(.42,TABLES[selected].accent);gr.addColorStop(1,'#1c5560');ctx.fillStyle=gr;ctx.beginPath();ctx.arc(q.x,q.y,r,0,Math.PI*2);ctx.fill();}
  function updateHud(){scoreText.textContent=state.score;targetText.textContent=TABLES[selected].target;ballsText.textContent=state.balls;comboText.textContent=`${state.combo.toFixed(1)}x`;maxComboText.textContent=`${state.maxCombo.toFixed(1)}x`;missionText.textContent=`${missionProgress()}/${TABLES[selected].objectiveCount}`;chargeText.textContent=`${Math.round(state.charge*100)}%`;chargeBar.style.width=`${state.charge*100}%`;startBtn.disabled=['running','paused'].includes(state.mode);pauseBtn.disabled=!['running','paused'].includes(state.mode);renderObjectives();}
  function renderObjectives(){const t=TABLES[selected],items=[[`达到 ${t.target} 分`,state.score>=t.target],[t.objective==='lanes'?'点亮三条轨道':t.objective==='targets'?'击倒四枚冷却靶':'完成四次时隙跃迁',objectiveDone()],["完成时至少剩余 2 球",state.balls>=2]];objectives.innerHTML=items.map(([label,pass])=>`<div class="goal ${pass?'pass':''}"><span>${pass?'✓':'○'} ${label}</span><b>${pass?'满足':'未满足'}</b></div>`).join('');}
  function renderSide(){const t=TABLES[selected],active=['running','paused'].includes(state.mode);tables.innerHTML=TABLES.map((x,i)=>`<button class="table-card ${i===selected?'active':''}" data-table="${i}" ${i>profile.unlocked||active?'disabled':''}><b><span>${i+1}. ${x.name}</span><span class="stars">${'★'.repeat(profile.stars[i])}${'☆'.repeat(3-profile.stars[i])}</span></b><small>${i>profile.unlocked?'上一桌台至少一星解锁':x.brief}</small></button>`).join('');tables.querySelectorAll('[data-table]').forEach(b=>b.onclick=()=>chooseTable(+b.dataset.table));tableChapter.textContent=t.chapter;tableName.textContent=t.name;tableBrief.textContent=t.brief;starText.textContent=totalStars();clearText.textContent=profile.clears;bestText.textContent=profile.best[selected];slotText.textContent=`${profile.equipped.length}/2`;modules.innerHTML=MODULES.map((m,i)=>`<button class="module ${profile.equipped.includes(i)?'active':''}" data-module="${i}" ${totalStars()<m.need||active?'disabled':''}><b>${m.name}</b><small>${m.desc}</small><span>${totalStars()>=m.need?'点击装配':m.need+' 星解锁'}</span></button>`).join('');modules.querySelectorAll('[data-module]').forEach(b=>b.onclick=()=>toggleModule(+b.dataset.module));renderObjectives();}
  function toggleModule(i){if(totalStars()<MODULES[i].need||['running','paused'].includes(state.mode))return;const at=profile.equipped.indexOf(i);if(at>=0)profile.equipped.splice(at,1);else{if(profile.equipped.length>=2)profile.equipped.shift();profile.equipped.push(i);}save();state=makeState();renderSide();updateHud();draw();}
  function checksum(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0).toString(36).toUpperCase();}
  function encode(){const p=btoa(unescape(encodeURIComponent(JSON.stringify({v:2,u:profile.unlocked,s:profile.stars,b:profile.best,c:profile.clears,e:profile.equipped}))));return `PIN2.${p}.${checksum(p)}`;}
  function decode(code){const p=code.trim().split('.');if(p.length!==3||p[0]!=="PIN2"||checksum(p[1])!==p[2])throw Error('巡回档案校验失败');const v=JSON.parse(decodeURIComponent(escape(atob(p[1]))));if(v.v!==2||!Array.isArray(v.s))throw Error('档案版本不兼容');return {v:2,unlocked:clamp(+v.u||0,0,2),stars:Array.from({length:3},(_,i)=>clamp(+v.s[i]||0,0,3)),best:Array.from({length:3},(_,i)=>Math.max(0,+v.b?.[i]||0)),clears:Math.max(0,+v.c||0),equipped:(v.e||[]).filter(i=>Number.isInteger(i)&&i>=0&&i<MODULES.length).slice(0,2)};}
  startBtn.onclick=start;pauseBtn.onclick=togglePause;overlayBtn.onclick=()=>state.mode==='paused'?togglePause():start();archiveBtn.onclick=()=>{archiveModal.classList.remove('hidden');archiveText.value=encode();archiveFeedback.textContent='';};closeArchiveBtn.onclick=()=>archiveModal.classList.add('hidden');exportBtn.onclick=async()=>{archiveText.value=encode();archiveText.select();try{await navigator.clipboard.writeText(archiveText.value);archiveFeedback.textContent='巡回档案已复制。';}catch(_){archiveFeedback.textContent='档案已生成，请手动复制。';}};importBtn.onclick=()=>{try{profile=decode(archiveText.value);save();selected=Math.min(profile.unlocked,2);state=makeState();renderSide();updateHud();draw();archiveFeedback.textContent='导入成功。';}catch(e){archiveFeedback.textContent=e.message;}};
  function hold(btn,code){btn.onpointerdown=e=>{e.preventDefault();keys.add(code);btn.setPointerCapture?.(e.pointerId);};btn.onpointerup=btn.onpointercancel=btn.onpointerleave=()=>keys.delete(code);}hold(leftBtn,'ArrowLeft');hold(rightBtn,'ArrowRight');launchBtn.onpointerdown=e=>{e.preventDefault();launchDown();};launchBtn.onpointerup=e=>{e.preventDefault();launchUp();};launchBtn.onpointercancel=launchUp;document.addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();if(e.code==='KeyP')togglePause();if(e.code==='KeyR')start();if(e.code==='Space'&&!keys.has('Space'))launchDown();keys.add(e.code);});document.addEventListener('keyup',e=>{if(e.code==='Space')launchUp();keys.delete(e.code);});window.addEventListener('resize',resize);
  window.__orbitalPinball={TABLES,MODULES,profile:()=>profile,state:()=>state,chooseTable,start,finish,objectiveDone,missionProgress,encode,decode};
  resize();renderSide();chooseTable(selected);updateHud();draw();
})();
</script>
