<script>(()=>{'use strict';const $=id=>document.getElementById(id),SAVE='alchemyWorkshopV3';
const ING=[['晨露','💧','水',0],['火莓','🔥','火',0],['月草','🌿','生',0],['风铃花','🌸','风',0],['岩盐','🧂','土',1],['银苔','🪴','生',1],['夜菇','🍄','影',1],['蜂蜡','🍯','火',1],['珊瑚粉','🪸','水',2],['海星砂','⭐','光',2],['雷藻','🌱','风',2],['珍珠泪','🫧','水',2],['幽火','👻','影',3],['日曜石','🔆','光',3],['龙鳞屑','🐉','火',3],['古树心','🪵','生',3],['霜晶','❄️','水',4],['熔核','🌋','火',4],['星尘','✨','光',4],['虚空墨','🌑','影',4]].map((x,id)=>({id,n:x[0],i:x[1],e:x[2],region:x[3]}));
const STATIONS=[{n:'秘银坩埚',i:'⚗️',id:'pot'},{n:'蒸馏塔',i:'🧪',id:'still'},{n:'星辉浸注器',i:'🔮',id:'infuse'},{n:'炽热熔炉',i:'♨️',id:'forge'}];
const RAW=[['微光药水','🧴','pot',[0,2],24,'恢复'],['灼热合剂','🧨','pot',[1,7],30,'火焰'],['风行露','🪽','still',[0,3],34,'速度'],['石肤剂','🪨','pot',[4,5],38,'防护'],['夜视墨水','👁️','still',[0,6],42,'洞察'],['丰饶精华','🌾','infuse',[2,5,7],55,'生长'],['潮汐呼吸','🐟','still',[8,9],58,'水息'],['雷鸣瓶','⚡','forge',[10,14],65,'雷电'],['月影药剂','🌙','infuse',[6,11,12],72,'隐匿'],['太阳灵露','☀️','infuse',[9,13],76,'光明'],['龙血酊','🩸','forge',[1,14,15],88,'力量'],['古树复苏','🌳','infuse',[2,15],82,'治疗'],['霜火矛盾剂','☯️','forge',[16,17],95,'转化'],['星界墨水','🌌','still',[18,19],105,'知识'],['凤凰灰烬','🪶','forge',[7,14,17],118,'复生'],['虚空屏障','🕳️','infuse',[4,12,19],110,'防护'],['海月珍珠剂','🪼','still',[8,11,18],102,'魅力'],['雷霜催化剂','🌩️','forge',[10,16,17],112,'雷电'],['生命之泉','⛲','pot',[0,11,15],120,'治疗'],['黄金转化液','🪙','forge',[4,13,18],145,'财富'],['梦境香雾','💤','still',[3,6,16],100,'梦境'],['巨龙星火','🐲','infuse',[13,14,18],155,'力量'],['万象溶剂','🌈','pot',[0,1,2],130,'转化'],['贤者之滴','💎','infuse',[15,18,19],180,'知识']].map((x,id)=>({id,n:x[0],i:x[1],station:x[2],ing:x[3],value:x[4],tag:x[5]}));
const REGIONS=[{n:'晨雾林地',i:'🌲',d:'基础草木与晨露。',need:0,pool:[0,1,2,3]},{n:'回声矿洞',i:'⛏️',d:'盐、苔、夜菇与蜂蜡。',need:2,pool:[4,5,6,7]},{n:'珊瑚海岸',i:'🏖️',d:'潮汐素材与雷藻。',need:5,pool:[8,9,10,11]},{n:'失落遗迹',i:'🏛️',d:'幽火、曜石、龙鳞与树心。',need:10,pool:[12,13,14,15]},{n:'星落火山',i:'🌋',d:'终局霜晶、熔核与星界素材。',need:18,pool:[16,17,18,19]}];
const MENTORS={herbal:{i:'🌿',n:'林地药师',d:'基础草木库存更多，采集时有概率额外获得素材。'},merchant:{i:'🪙',n:'商会学徒',d:'开局金币更多，订单与出售价格提高 12%。'},scholar:{i:'📚',n:'星象学者',d:'开局灵感更多，首次发现配方额外获得灵感。'}};
const UPGRADES={garden:{i:'🌱',n:'温室苗圃',d:'每天自动获得基础草木素材。',base:90,max:4},shelves:{i:'🗄️',n:'扩展货架',d:'出售药剂每级提高 6%。',base:110,max:4},library:{i:'📖',n:'研究书库',d:'每日灵感与研究线索增强。',base:130,max:4},caravan:{i:'🛒',n:'远征车队',d:'每日行动 +1，采集品质提高。',base:150,max:3},guild:{i:'🏛️',n:'商会柜台',d:'订单奖励每级提高 10%。',base:170,max:3},automation:{i:'⚙️',n:'自动搅拌机',d:'发现过的双素材配方有概率产出双份。',base:210,max:3}};
let q=null,selected=[],station=0,activeView='brew';function fresh(mentor){const stock={};[0,1,2,3].forEach(i=>stock[i]=mentor==='herbal'?6:4);const x={v:3,mentor,day:1,coins:mentor==='merchant'?130:80,insight:mentor==='scholar'?12:6,energy:5,renown:0,stock,potions:{},known:[],orders:[],upgrades:{garden:0,shelves:0,library:0,caravan:0,guild:0,automation:0},stats:{brews:0,discoveries:0,orders:0,gathers:0},log:'导师留下基础素材，也留下一张没有答案的配方图。'};x.orders=makeOrders(x);return x}
function makeOrders(state=q){const pool=RECIPES.filter(r=>state.known.includes(r.id));const fallback=RECIPES.slice(0,4);return Array.from({length:3},(_,i)=>{const list=pool.length?pool:fallback,r=list[(Math.floor(Math.random()*list.length)+i)%list.length],need=1+(i===2?1:0);return{id:r.id,need,reward:Math.round(r.value*need*(1.5+i*.12)),done:false,expires:state.day+3}})}
const RECIPES=RAW;function save(){if(q)localStorage.setItem(SAVE,JSON.stringify(q))}function load(){try{const x=JSON.parse(localStorage.getItem(SAVE));if(x?.v===3)q=x}catch{}}
function checksum(s){let h=2166136261;for(const ch of s){h^=ch.charCodeAt(0);h=Math.imul(h,16777619)}return(h>>>0).toString(36)}function exportCode(){const b=btoa(unescape(encodeURIComponent(JSON.stringify(q))));return`AW3-${b}-${checksum(b)}`}function importCode(x){const m=x.trim().match(/^AW3-(.+)-([a-z0-9]+)$/i);if(!m||checksum(m[1])!==m[2])throw Error('存档码校验失败');const d=JSON.parse(decodeURIComponent(escape(atob(m[1]))));if(d.v!==3)throw Error('版本不兼容');q=d;save();draw()}
function key(a){return[...a].sort((x,y)=>x-y).join(',')}function msg(s){q.log=s;$('message').textContent=s}function toast(s){const e=document.createElement('div');e.className='toast';e.textContent=s;document.body.append(e);setTimeout(()=>e.remove(),1400)}
function selectIngredient(id){if((q.stock[id]||0)<=0)return;if(selected.includes(id))selected=selected.filter(x=>x!==id);else{if(selected.length>=3)selected.shift();selected.push(id)}draw()}
function brew(){if(selected.length<2)return toast('至少投入两种素材');const stationId=STATIONS[station].id,recipe=RECIPES.find(r=>key(r.ing)===key(selected)&&r.station===stationId);selected.forEach(id=>q.stock[id]--);q.stats.brews++;if(!recipe){q.potions.sludge=(q.potions.sludge||0)+1;q.insight++;msg('配方没有稳定成形，获得一份炼金残渣与 1 灵感。')}else{let n=1;if(q.upgrades.automation&&recipe.ing.length===2&&Math.random()<q.upgrades.automation*.18)n++;q.potions[recipe.id]=(q.potions[recipe.id]||0)+n;const first=!q.known.includes(recipe.id);if(first){q.known.push(recipe.id);q.stats.discoveries++;q.renown+=2;q.insight+=2+(q.mentor==='scholar'?2:0);msg(`发现秘方：${recipe.i}${recipe.n}！已记录进万象书。`)}else msg(`炼成 ${n} 瓶${recipe.n}。`)}selected=[];save();draw()}
function gather(i){const r=REGIONS[i];if(q.renown<r.need)return;if(q.energy<=0)return toast('今日行动已经用完');q.energy--;q.stats.gathers++;const count=3+q.upgrades.caravan+(q.mentor==='herbal'&&Math.random()<.4?1:0),got={};for(let n=0;n<count;n++){const id=r.pool[Math.floor(Math.random()*r.pool.length)];q.stock[id]=(q.stock[id]||0)+1;got[id]=(got[id]||0)+1}msg(`从${r.n}带回：${Object.entries(got).map(([id,n])=>ING[id].i+ING[id].n+'×'+n).join('、')}`);save();draw()}
function research(){if(q.insight<4)return toast('灵感不足');q.insight-=4;const unknown=RECIPES.filter(r=>!q.known.includes(r.id));if(!unknown.length){q.insight+=4;return toast('全部秘方已经发现')}const r=unknown[Math.floor(Math.random()*unknown.length)],knownCount=r.ing.filter(id=>(q.stock[id]||0)>0).length;$('researchHint').textContent=`线索：${r.n}需要 ${r.ing.length} 种素材，设备为${STATIONS.find(s=>s.id===r.station).n}；你目前持有其中 ${knownCount} 种。元素倾向：${[...new Set(r.ing.map(id=>ING[id].e))].join('/')}`;save();draw()}
function deliver(i){const o=q.orders[i];if(o.done)return;if((q.potions[o.id]||0)<o.need)return toast('药剂数量不足');q.potions[o.id]-=o.need;o.done=true;const reward=Math.round(o.reward*(1+q.upgrades.guild*.1+(q.mentor==='merchant'?.12:0)));q.coins+=reward;q.renown+=2;q.insight++;q.stats.orders++;msg(`订单完成，获得 ${reward} 金币、2 声望与 1 灵感。`);if(q.orders.every(x=>x.done))q.orders=makeOrders();save();draw()}
function sellAll(){let total=0;RECIPES.forEach(r=>{const reserved=q.orders.filter(o=>!o.done&&o.id===r.id).reduce((a,o)=>a+o.need,0),n=Math.max(0,(q.potions[r.id]||0)-reserved);if(n){total+=Math.round(n*r.value*(1+q.upgrades.shelves*.06+(q.mentor==='merchant'?.12:0)));q.potions[r.id]-=n}});total+=(q.potions.sludge||0)*4;q.potions.sludge=0;q.coins+=total;msg(total?`非订单药剂售出，收入 ${total} 金币。`:'没有可出售的药剂。');save();draw()}
function nextDay(){q.day++;q.energy=5+q.upgrades.caravan;q.insight+=q.upgrades.library;if(q.upgrades.garden)for(let n=0;n<q.upgrades.garden;n++){const id=Math.floor(Math.random()*4);q.stock[id]=(q.stock[id]||0)+1}if(q.orders.some(o=>o.expires<q.day&&!o.done))q.orders=makeOrders();msg(`第 ${q.day} 日开始，工坊恢复行动与研究进度。`);save();draw()}
function upgrade(id){const d=UPGRADES[id],lv=q.upgrades[id],cost=Math.round(d.base*Math.pow(1.7,lv));if(lv>=d.max||q.coins<cost)return toast('金币不足或已满级');q.coins-=cost;q.upgrades[id]++;q.renown++;msg(`${d.n}升级到 Lv.${q.upgrades[id]}。`);save();draw()}
function showSave(){const code=exportCode();$('infoTitle').textContent='跨设备炼金档案';$('infoBody').innerHTML=`<p>素材、配方、药剂、订单、建筑与统计都会导出，并带完整性校验。</p><textarea class="savebox" id="saveCode">${code}</textarea><div class="controls"><button class="btn" id="copyCode">复制导出</button><button class="btn" id="importCodeBtn">导入上方存档</button></div>`;$('infoOverlay').classList.remove('hidden');$('copyCode').onclick=()=>navigator.clipboard?.writeText($('saveCode').value);$('importCodeBtn').onclick=()=>{try{importCode($('saveCode').value);$('infoOverlay').classList.add('hidden');alert('炼金档案导入成功')}catch(e){alert(e.message)}}}
function draw(){if(!q)return;$('day').textContent=`第${q.day}日`;$('coins').textContent=Math.floor(q.coins);$('insight').textContent=q.insight;$('energy').textContent=`${q.energy} / ${5+q.upgrades.caravan}`;$('renown').textContent=q.renown;$('recipeCount').textContent=`${q.known.length} / ${RECIPES.length}`;$('message').textContent=q.log;$('log').textContent=q.log;$('stationIcon').textContent=STATIONS[station].i;$('stationName').textContent=STATIONS[station].n;$('slots').innerHTML=Array.from({length:3},(_,i)=>`<div class="slot">${selected[i]!=null?ING[selected[i]].i:'+'}</div>`).join('');
$('ingredients').innerHTML=ING.map(x=>`<button class="ingredient ${selected.includes(x.id)?'selected':''}" data-ing="${x.id}" ${(q.stock[x.id]||0)<=0?'disabled':''}><span>${x.i}</span><b>${x.n}</b><small>${x.e} · 库存 ${q.stock[x.id]||0}</small></button>`).join('');document.querySelectorAll('[data-ing]').forEach(b=>b.onclick=()=>selectIngredient(+b.dataset.ing));const stock=ING.filter(x=>(q.stock[x.id]||0)>0);$('quickStock').innerHTML=stock.length?stock.map(x=>`<div class="stock"><span>${x.i}${x.n}</span><b>${q.stock[x.id]}</b></div>`).join(''):'<div class="sub">素材柜为空。</div>';
$('regions').innerHTML=REGIONS.map((r,i)=>`<article class="region ${q.renown<r.need?'locked':''}"><span>${r.i}</span><h3>${r.n}</h3><p>${r.d}<br>解锁声望 ${r.need}</p><button class="btn" data-region="${i}" ${q.renown<r.need||q.energy<=0?'disabled':''}>采集 1行动</button></article>`).join('');document.querySelectorAll('[data-region]').forEach(b=>b.onclick=()=>gather(+b.dataset.region));
$('orders').innerHTML=q.orders.map((o,i)=>{const r=RECIPES[o.id],have=q.potions[o.id]||0;return`<div class="order"><header><b>${o.done?'✓ ':''}${r.i}${r.n} × ${o.need}</b><strong>${o.reward}金</strong></header><p>期限第 ${o.expires} 日 · 库存 ${have}/${o.need} · ${r.tag}</p><button class="btn" data-order="${i}" ${o.done?'disabled':''}>交付</button></div>`}).join('');document.querySelectorAll('[data-order]').forEach(b=>b.onclick=()=>deliver(+b.dataset.order));$('potions').innerHTML=RECIPES.filter(r=>(q.potions[r.id]||0)>0).map(r=>`<article class="potion-card"><span>${r.i}</span><b>${r.n}</b><small>${r.tag} · ${r.value}金 · 库存 ${q.potions[r.id]}</small></article>`).join('')+(q.potions.sludge?`<article class="potion-card"><span>🫙</span><b>炼金残渣</b><small>4金 · 库存 ${q.potions.sludge}</small></article>`:'')||'<div class="sub">还没有成品药剂。</div>';
$('recipes').innerHTML=RECIPES.map(r=>{const known=q.known.includes(r.id);return`<article class="recipe ${known?'':'locked'}"><span>${known?r.i:'❔'}</span><b>${known?r.n:'未知秘方'}</b><small>${known?`${STATIONS.find(s=>s.id===r.station).n}<br>${r.ing.map(id=>ING[id].i+ING[id].n).join(' + ')}`:'通过实验或研究发现'}</small></article>`}).join('');$('upgrades').innerHTML=Object.entries(UPGRADES).map(([id,d])=>{const lv=q.upgrades[id],cost=Math.round(d.base*Math.pow(1.7,lv));return`<article class="upgrade"><header><b>${d.i}${d.n}</b><span>Lv.${lv}/${d.max}</span></header><p>${d.d}</p><button class="btn" data-up="${id}" ${lv>=d.max?'disabled':''}>${lv>=d.max?'满级':'升级 '+cost}</button></article>`}).join('');document.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>upgrade(b.dataset.up));save()}
function mentorScreen(){$('mentors').innerHTML=Object.entries(MENTORS).map(([id,m])=>`<button class="choice" data-mentor="${id}"><span>${m.i}</span><h3>${m.n}</h3><p>${m.d}</p></button>`).join('');document.querySelectorAll('[data-mentor]').forEach(b=>b.onclick=()=>{q=fresh(b.dataset.mentor);$('startOverlay').classList.add('hidden');draw()})}
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{activeView=b.dataset.view;document.querySelectorAll('.tab[data-view]').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id===activeView+'View'))});$('stationBtn').onclick=()=>{station=(station+1)%STATIONS.length;draw()};$('brewBtn').onclick=brew;$('researchBtn').onclick=research;$('nextDayBtn').onclick=nextDay;$('sellAllBtn').onclick=sellAll;$('saveBtn').onclick=()=>q&&showSave();$('closeInfoBtn').onclick=()=>$('infoOverlay').classList.add('hidden');$('newBtn').onclick=()=>{if(!q||confirm('清空当前炼金档案？')){q=null;localStorage.removeItem(SAVE);$('startOverlay').classList.remove('hidden')}};load();mentorScreen();if(q){$('startOverlay').classList.add('hidden');draw()}
})();</script></body></html>
