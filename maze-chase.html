<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>霓虹迷宫</title><style>body{margin:0;background:#050714;color:white;font-family:system-ui}.app{height:100vh;display:grid;grid-template-columns:1fr 230px;gap:10px;padding:10px;box-sizing:border-box}.stage,aside{border:1px solid #334a8a;border-radius:16px;background:#090d22;overflow:hidden}.stage{display:grid;place-items:center}canvas{max-width:100%;max-height:100%;aspect-ratio:15/13}aside{padding:14px;display:flex;flex-direction:column;gap:9px}.card{padding:10px;border:1px solid #334a8a;border-radius:9px}.card b{display:block;color:#ffe462;font-size:24px}button{padding:10px;border:1px solid #536db1;border-radius:9px;background:#1b2857;color:white;font-weight:bold}@media(max-width:650px){.app{grid-template-columns:1fr;grid-template-rows:1fr 130px;padding:6px}aside{display:grid;grid-template-columns:repeat(3,1fr);padding:7px}.help{display:none}}</style><main class="app"><section class="stage"><canvas id="c" width="600" height="520"></canvas></section><aside><div class="card">得分<b id="s">0</b></div><div class="card">生命 / 豆子<b id="st">3 / 0</b></div><button id="newGame">新局</button><div class="help">方向键/WASD 移动。吃完全部光豆获胜；大能量豆会让追猎者短暂变蓝，可反过来捕获。</div></aside></main><script>
const c=document.querySelector('#c'),x=c.getContext('2d'),map=['###############','#o....#.#....o#','#.##.#.#.#.##.','#.............#','#.##.#.#.#.##.','#....#...#....#','###.#.....#.###','#....#.P.#....#','#.##.#.#.#.##.','#.............#','#.##.#.#.#.##.','#o....#.#....o#','###############'].map(r=>r.split(''));let q,dir={x:0,y:0},last=0;function reset(){let p;map.forEach((r,y)=>r.forEach((v,z)=>{if(v==='P')p={x:z,y}}));q={m:map.map(r=>r.map(v=>v==='P'?'.':v)),p,lives:3,score:0,power:0,ghosts:[{x:7,y:6,c:'#ff5d72'},{x:6,y:6,c:'#5de3ff'},{x:8,y:6,c:'#ff8fe7'}],tick:0};sync()}function move(){let nx=q.p.x+dir.x,ny=q.p.y+dir.y;if(q.m[ny]?.[nx]!=='#'){q.p.x=nx;q.p.y=ny;let v=q.m[ny][nx];if(v==='.'||v==='o'){q.m[ny][nx]=' ';q.score+=v==='o'?50:10;if(v==='o')q.power=18}}for(const g of q.ghosts)if(g.x===q.p.x&&g.y===q.p.y){if(q.power>0){q.score+=200;g.x=7;g.y=6}else{q.lives--;q.p={x:7,y:7};if(q.lives<=0)reset()}}if(!q.m.flat().some(v=>v==='.'||v==='o')){q.score+=1000;reset()}sync()}function ghost(){for(const g of q.ghosts){let ds=[[1,0],[-1,0],[0,1],[0,-1]].filter(([a,b])=>q.m[g.y+b]?.[g.x+a]!=='#'),target=q.power>0?ds.sort(()=>Math.random()-.5)[0]:ds.sort((a,b)=>Math.hypot(g.x+a[0]-q.p.x,g.y+a[1]-q.p.y)-Math.hypot(g.x+b[0]-q.p.x,g.y+b[1]-q.p.y))[0];g.x+=target[0];g.y+=target[1]}}function sync(){s.textContent=q.score;st.textContent=`${q.lives} / ${q.m.flat().filter(v=>v==='.'||v==='o').length}`}function draw(){let z=40;x.fillStyle='#050714';x.fillRect(0,0,600,520);q.m.forEach((r,y)=>r.forEach((v,i)=>{if(v==='#'){x.fillStyle='#284ea0';x.fillRect(i*z+2,y*z+2,z-4,z-4)}else if(v==='.'||v==='o'){x.fillStyle='#ffe779';x.beginPath();x.arc(i*z+20,y*z+20,v==='o'?7:3,0,7);x.fill()}}));x.fillStyle='#ffe04f';x.beginPath();x.arc(q.p.x*z+20,q.p.y*z+20,14,0,7);x.fill();q.ghosts.forEach(g=>{x.fillStyle=q.power>0?'#537dff':g.c;x.beginPath();x.arc(g.x*z+20,g.y*z+20,14,0,7);x.fill()})}function loop(t){let d=t-last;last=t;q.tick+=d;if(q.tick>150){q.tick=0;move();if(Math.random()<.55)ghost();q.power=Math.max(0,q.power-1)}draw();requestAnimationFrame(loop)}addEventListener('keydown',e=>{let m={ArrowUp:[0,-1],KeyW:[0,-1],ArrowDown:[0,1],KeyS:[0,1],ArrowLeft:[-1,0],KeyA:[-1,0],ArrowRight:[1,0],KeyD:[1,0]};if(m[e.code])dir={x:m[e.code][0],y:m[e.code][1]}});newGame.onclick=reset;reset();requestAnimationFrame(loop);
</script>
