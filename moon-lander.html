<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>月面轻降</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23101824'/%3E%3Ccircle cx='44' cy='18' r='9' fill='%23f0d16f'/%3E%3Cpath d='M14 50h36M20 42l8-20h8l8 20M24 34h16' stroke='%238bd0bb' stroke-width='5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
    <style>
      :root{--ink:#10191f;--panel:#fffdf4;--line:#87989e;--teal:#287468;--gold:#d6a33d;--red:#bd5148;--blue:#326f91;--shadow:rgba(5,12,16,.28);--radius:8px}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,sans-serif;background:linear-gradient(rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(135deg,#0c1824,#152b41 48%,#433352);background-size:30px 30px,30px 30px,auto}button{font:inherit}.app{width:min(1380px,calc(100vw - 28px));margin:14px auto}.topbar,.panel{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,244,.97);box-shadow:0 16px 36px var(--shadow)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px}.eyebrow{margin:0 0 5px;color:#856219;font-size:12px;font-weight:900}h1{margin:0;font-size:clamp(26px,4vw,44px);line-height:1}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:42px;padding:0 14px;border:1px solid #24534d;border-radius:var(--radius);color:#fffdf6;background:var(--teal);font-weight:900;cursor:pointer}.btn.secondary{color:var(--ink);background:#f0d17b;border-color:#9c7621}.layout{display:grid;grid-template-columns:minmax(0,1fr) 312px;gap:14px;margin-top:14px;align-items:start}.stage{position:relative;overflow:hidden;min-height:620px}canvas{display:block;width:100%;height:620px;touch-action:none}.side{padding:16px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.stat{padding:10px;border:1px solid #9da69e;border-radius:var(--radius);background:#f9f7eb}.stat b{display:block;font-size:24px;line-height:1.1}.stat small{color:#5e6d67;font-weight:800}.meter{margin:0 0 13px}.meter span{display:flex;justify-content:space-between;margin-bottom:6px;color:#5e6d67;font-weight:900}.bar{height:13px;border:1px solid #84968f;border-radius:999px;overflow:hidden;background:#e9eadc}.bar i{display:block;width:100%;height:100%;background:linear-gradient(90deg,var(--blue),#8bd0bb)}.pad{display:grid;grid-template-columns:repeat(3,60px);justify-content:center;gap:8px;margin-top:14px}.pad button{width:60px;height:52px;border:1px solid #758780;border-radius:var(--radius);background:#fff8e6;color:var(--ink);font-size:20px;font-weight:900;cursor:pointer}.pad .blank{visibility:hidden}.hint{margin:14px 0 0;color:#566861;line-height:1.55;font-weight:700}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:24px;background:rgba(16,28,31,.52)}.modal{width:min(460px,100%);padding:22px;border:1px solid #a4b4ad;border-radius:var(--radius);background:#fffdf6;box-shadow:0 24px 52px rgba(0,0,0,.32)}.modal h2{margin:0 0 10px;font-size:28px}.modal p{margin:0 0 16px;color:#53635f;line-height:1.6}.hidden{display:none}@media(max-width:940px){.layout{grid-template-columns:1fr}.side{order:-1}.stage{min-height:540px}canvas{height:540px}}@media(max-width:620px){.app{width:min(100vw - 16px,1380px);margin-top:8px}.topbar{display:block;padding:14px}.actions{margin-top:12px;justify-content:stretch}.btn{flex:1 1 auto}.stage{min-height:500px}canvas{height:500px}}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar"><div><p class="eyebrow">PHYSICS LANDING</p><h1>月面轻降</h1></div><div class="actions"><button class="btn" id="startBtn">点火</button><button class="btn secondary" id="brakeBtn">主推</button><button class="btn secondary" id="resetBtn">重开</button></div></header>
      <section class="layout">
        <div class="panel stage"><canvas id="gameCanvas" aria-label="月面轻降游戏画面"></canvas><div class="overlay" id="overlay"><div class="modal"><h2 id="overlayTitle">准备降落</h2><p id="overlayText">控制左右姿态和主推力，把速度压低后落在平台上。</p><button class="btn" id="overlayBtn">开始下降</button></div></div></div>
        <aside class="panel side">
          <div class="stats"><div class="stat"><b id="scoreText">0</b><small>评分</small></div><div class="stat"><b id="speedText">0</b><small>速度</small></div><div class="stat"><b id="angleText">0</b><small>角度</small></div><div class="stat"><b id="bestText">0</b><small>最佳</small></div></div>
          <div class="meter"><span><b>燃料</b><em id="fuelText">100%</em></span><div class="bar"><i id="fuelBar"></i></div></div>
          <div class="pad"><button class="blank"></button><button data-key="ArrowUp">↑</button><button class="blank"></button><button data-key="ArrowLeft">←</button><button data-key="ArrowDown">稳</button><button data-key="ArrowRight">→</button></div>
          <p class="hint">方向键 / WASD 控制，↑ 主推，←/→ 转向，↓ 自动扶正。轻触按钮也可玩。</p>
        </aside>
      </section>
    </main>
    <script>
      (()=>{const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d"),overlay=document.getElementById("overlay"),overlayTitle=document.getElementById("overlayTitle"),overlayText=document.getElementById("overlayText"),overlayBtn=document.getElementById("overlayBtn"),startBtn=document.getElementById("startBtn"),resetBtn=document.getElementById("resetBtn"),brakeBtn=document.getElementById("brakeBtn"),scoreText=document.getElementById("scoreText"),speedText=document.getElementById("speedText"),angleText=document.getElementById("angleText"),bestText=document.getElementById("bestText"),fuelText=document.getElementById("fuelText"),fuelBar=document.getElementById("fuelBar");const storageKey="miniMoonLanderRecords";let w=900,h=620,dpr=1,last=0,token=0,keys=new Set(),state=makeState();
      function best(){try{return JSON.parse(localStorage.getItem(storageKey)||"{}").best||0}catch(e){return 0}}function save(s){const b=Math.max(best(),s);localStorage.setItem(storageKey,JSON.stringify({best:b}));return b}
      function makeState(){return{mode:"menu",score:0,best:best(),fuel:100,ship:{x:180,y:80,vx:42,vy:0,a:.1,va:0},particles:[],pads:[]}}
      function resize(){const r=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,devicePixelRatio||1));w=Math.max(320,r.width);h=Math.max(480,r.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);makePads();draw()}
      function makePads(){state.pads=[{x:w*.58,y:h-82,width:120},{x:w*.78,y:h-128,width:96}]}
      function start(){token++;state=makeState();makePads();state.mode="running";overlay.classList.add("hidden");last=performance.now();updateHud();requestAnimationFrame(t=>loop(t,token))}
      function end(ok,msg){if(state.mode==="over")return;state.mode="over";if(ok){const speed=Math.hypot(state.ship.vx,state.ship.vy),angle=Math.abs(state.ship.a);state.score=Math.max(50,Math.round(1000-speed*28-angle*220+state.fuel*4));state.best=save(state.score)}overlayTitle.textContent=ok?"平稳着陆":"任务失败";overlayText.textContent=msg;overlayBtn.textContent="再降一次";overlay.classList.remove("hidden");updateHud()}
      function thrust(main,side){if(state.fuel<=0)return;const s=state.ship;if(main){s.vx+=Math.sin(s.a)*-160*.016;s.vy+=Math.cos(s.a)*-160*.016;state.fuel-=.22;state.particles.push({x:s.x+Math.sin(s.a)*16,y:s.y+Math.cos(s.a)*20,life:1})}if(side){s.va+=side*.018;state.fuel-=.06}}
      function update(dt){const s=state.ship;if(keys.has("ArrowLeft")||keys.has("KeyA"))thrust(false,-1);if(keys.has("ArrowRight")||keys.has("KeyD"))thrust(false,1);if(keys.has("ArrowUp")||keys.has("KeyW")){thrust(true,0)}if(keys.has("ArrowDown")||keys.has("KeyS"))s.va+=(0-s.a)*dt*1.8;s.vy+=48*dt;s.x+=s.vx*dt;s.y+=s.vy*dt;s.a+=s.va;s.va*=Math.pow(.25,dt);state.fuel=Math.max(0,state.fuel);if(s.x<20||s.x>w-20)s.vx*=-.55;if(s.y>h-60){const pad=state.pads.find(p=>s.x>p.x-p.width/2&&s.x<p.x+p.width/2);const speed=Math.hypot(s.vx,s.vy);if(pad&&speed<42&&Math.abs(s.a)<.35)end(true,`落速 ${speed.toFixed(1)}，燃料剩余 ${Math.round(state.fuel)}%。`);else end(false,pad?"速度或角度太大。":"没有落在平台上。")}if(s.y<-40)s.y=-40;state.particles=state.particles.filter(p=>{p.y+=70*dt;p.life-=dt*1.4;return p.life>0});updateHud()}
      function loop(now,id){if(id!==token||state.mode!=="running")return;const dt=Math.min(.05,(now-last)/1000||.016);last=now;update(dt);draw();if(state.mode==="running")requestAnimationFrame(t=>loop(t,id))}
      function rr(x,y,W,H,r,fill,stroke){r=Math.min(r,W/2,H/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+W,y,x+W,y+H,r);ctx.arcTo(x+W,y+H,x,y+H,r);ctx.arcTo(x,y+H,x,y,r);ctx.arcTo(x,y,x+W,y,r);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.stroke()}}
      function draw(){ctx.clearRect(0,0,w,h);const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,"#111a29");g.addColorStop(1,"#2a3145");ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle="rgba(255,255,255,.18)";for(let i=0;i<80;i++)ctx.fillRect((i*83)%w,(i*47)%h,2,2);ctx.fillStyle="#d8c79e";ctx.beginPath();ctx.moveTo(0,h-48);for(let x=0;x<=w;x+=48)ctx.lineTo(x,h-48-Math.sin(x*.03)*18-Math.sin(x*.013)*10);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();for(const p of state.pads)rr(p.x-p.width/2,p.y,p.width,14,5,"#8bd0bb","#1b413d");for(const p of state.particles){ctx.globalAlpha=p.life;ctx.fillStyle="#f0d16f";ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}const s=state.ship;ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.a);ctx.strokeStyle="#8bd0bb";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(15,16);ctx.lineTo(-15,16);ctx.closePath();ctx.stroke();ctx.fillStyle="#fffdf4";ctx.fillRect(-8,-2,16,10);ctx.restore()}
      function updateHud(){const s=state.ship,speed=Math.hypot(s.vx,s.vy);scoreText.textContent=state.score.toString();speedText.textContent=speed.toFixed(0);angleText.textContent=Math.round(s.a*57.3).toString();bestText.textContent=Math.max(state.best,state.score).toString();fuelText.textContent=`${Math.round(state.fuel)}%`;fuelBar.style.width=`${state.fuel}%`;fuelBar.style.background=state.fuel<25?"linear-gradient(90deg,#bd5148,#d6a33d)":"linear-gradient(90deg,var(--blue),#8bd0bb)"}
      startBtn.addEventListener("click",start);resetBtn.addEventListener("click",start);overlayBtn.addEventListener("click",start);brakeBtn.addEventListener("pointerdown",()=>keys.add("ArrowUp"));brakeBtn.addEventListener("pointerup",()=>keys.delete("ArrowUp"));document.querySelectorAll("[data-key]").forEach(b=>{b.addEventListener("pointerdown",()=>keys.add(b.dataset.key));b.addEventListener("pointerup",()=>keys.delete(b.dataset.key));b.addEventListener("pointerleave",()=>keys.delete(b.dataset.key))});document.addEventListener("keydown",e=>{keys.add(e.code);if(e.code==="KeyR")start()});document.addEventListener("keyup",e=>keys.delete(e.code));window.addEventListener("resize",resize);resize();updateHud();draw()})();
    </script>
  </body>
</html>
