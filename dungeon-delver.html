function checksum(s){let h=2166136261;for(const ch of s){h^=ch.charCodeAt(0);h=Math.imul(h,16777619)}return(h>>>0).toString(36)}function exportCode(){const b=btoa(unescape(encodeURIComponent(JSON.stringify({v:3,profile,q}))));return`DD3-${b}-${checksum(b)}`}function importCode(x){const m=x.trim().match(/^DD3-(.+)-([a-z0-9]+)$/i);if(!m||checksum(m[1])!==m[2])throw Error('存档码校验失败');const d=JSON.parse(decodeURIComponent(escape(atob(m[1]))));if(d.v!==3)throw Error('版本不兼容');profile=d.profile;q=d.q;$('classOverlay').classList.toggle('hidden',!!q);if(q)spawnRoom(q.roomType||'battle');drawUI();save()}

function floatDamage(x,y,n){const r=cv.getBoundingClientRect(),el=document.createElement('span');el.className='damage';el.textContent=n;el.style.left=x/960*r.width+'px';el.style.top=y/540*r.height+'px';$('floating').append(el);setTimeout(()=>el.remove(),720)}
function dash(){const p=q.p;if(p.dash>0||q.paused)return;let dx=(keys.KeyD||keys.ArrowRight?1:0)-(keys.KeyA||keys.ArrowLeft?1:0),dy=(keys.KeyS||keys.ArrowDown?1:0)-(keys.KeyW||keys.ArrowUp?1:0);if(!dx&&!dy){const a=Math.atan2(mouse.y-p.y,mouse.x-p.x);dx=Math.cos(a);dy=Math.sin(a)}const l=Math.hypot(dx,dy)||1;for(let i=0;i<6;i++){const nx=p.x+dx/l*18,ny=p.y+dy/l*18;if(!collides(nx,ny)){p.x=nx;p.y=ny}}p.inv=.42;p.dash=p.dashMax*(q.relics.includes('boots')?.75:1);screenShake=4}
function skill(){const p=q.p;if(p.skill>0||q.paused)return;p.skill=p.skillMax;const power=p.skillPower*(q.relics.includes('ember')?1.4:1);if(q.cls==='warden'){q.enemies.forEach(e=>{if(Math.hypot(e.x-p.x,e.y-p.y)<220){hurtEnemy(e,p.atk*2.2*power);e.burn=4}});for(let i=0;i<18;i++){const a=i/18*Math.PI*2;q.bullets.push({x:p.x,y:p.y,vx:Math.cos(a)*270,vy:Math.sin(a)*270,d:p.atk*.7*power,foe:false,life:.8,pierce:0})}addLog('圣焰环爆发！')}else if(q.cls==='ranger'){const a=Math.atan2(mouse.y-p.y,mouse.x-p.x);for(let i=-2;i<=2;i++)q.bullets.push({x:p.x,y:p.y,vx:Math.cos(a+i*.11)*720,vy:Math.sin(a+i*.11)*720,d:p.atk*1.3*power,foe:false,life:1.4,pierce:2});addLog('裂隙齐射！')}else{p.inv=1.1;q.enemies.forEach(e=>{if(Math.hypot(e.x-p.x,e.y-p.y)<155){const d=hurtEnemy(e,p.atk*2.5*power);p.hp=Math.min(p.max,p.hp+d*.12)}});addLog('余烬剑风席卷房间！')}screenShake=7}
function enemyShoot(e,a,count=1,speed=210){for(let i=0;i<count;i++){const off=(i-(count-1)/2)*.17;q.bullets.push({x:e.x,y:e.y,vx:Math.cos(a+off)*speed,vy:Math.sin(a+off)*speed,d:e.a,foe:true,life:3,pierce:0})}}
function updateEnemy(e,dt){if(e.hp<=0)return;e.flash=Math.max(0,e.flash-dt);if(e.burn>0){e.burn-=dt;e.phase+=dt;if(e.phase>.55){e.phase=0;e.hp-=Math.max(1,Math.round(q.p.atk*.14))}}const p=q.p,a=Math.atan2(p.y-e.y,p.x-e.x),dist=Math.hypot(p.x-e.x,p.y-e.y);if(e.boss){e.shot-=dt;e.summon-=dt;e.charge-=dt;if(e.shot<=0){enemyShoot(e,a,e.hp/e.max<.5?7:3,e.hp/e.max<.5?250:205);e.shot=1.2}if(e.summon<=0&&q.enemies.length<9){for(let i=0;i<2;i++)q.enemies.push(makeEnemy(Math.floor(Math.random()*5)));e.summon=5}e.x+=Math.cos(a)*e.spd*dt;e.y+=Math.sin(a)*e.spd*dt}else if(e.type===1){e.shot-=dt;if(dist<360&&e.shot<=0){enemyShoot(e,a,1,220);e.shot=1.45}else if(dist>250){e.x+=Math.cos(a)*e.spd*dt;e.y+=Math.sin(a)*e.spd*dt}}else if(e.type===2){e.charge-=dt;const speed=e.charge<.45?e.spd*3:e.spd;e.x+=Math.cos(a)*speed*dt;e.y+=Math.sin(a)*speed*dt;if(e.charge<=0)e.charge=2.5}else if(e.type===3){e.summon-=dt;if(e.summon<=0&&q.enemies.length<12){q.enemies.push(makeEnemy(0));e.summon=3.5}e.x+=Math.cos(a)*e.spd*.5*dt;e.y+=Math.sin(a)*e.spd*.5*dt}else{e.x+=Math.cos(a)*e.spd*dt;e.y+=Math.sin(a)*e.spd*dt}e.x=Math.max(20,Math.min(940,e.x));e.y=Math.max(20,Math.min(520,e.y));if(dist<24&&p.inv<=0)hurtPlayer(e.a)}
function hurtPlayer(raw){const p=q.p;if(p.inv>0)return;const dmg=Math.round(raw);p.hp-=dmg;p.inv=.65;screenShake=9;if(q.relics.includes('thorn')){const near=q.enemies.find(e=>Math.hypot(e.x-p.x,e.y-p.y)<45);if(near)near.hp-=8}if(p.hp<=0&&q.relics.includes('feather')&&!q.featherUsed){p.hp=1;q.featherUsed=true;addLog('灰羽替你承受了致命一击')}}
function update(dt){if(!q||q.paused||q.choosing)return;const p=q.p,dx=(keys.KeyD||keys.ArrowRight?1:0)-(keys.KeyA||keys.ArrowLeft?1:0),dy=(keys.KeyS||keys.ArrowDown?1:0)-(keys.KeyW||keys.ArrowUp?1:0);movePlayer(dx,dy,dt);p.shot=Math.max(0,p.shot-dt);p.dash=Math.max(0,p.dash-dt);p.skill=Math.max(0,p.skill-dt);p.inv=Math.max(0,p.inv-dt);p.hp=Math.min(p.max,p.hp+p.regen*dt);if(mouse.down)attack();q.bullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;if(b.foe){if(Math.hypot(b.x-p.x,b.y-p.y)<17&&p.inv<=0){hurtPlayer(b.d);b.life=0}}else for(const e of q.enemies){if(e.hp>0&&Math.hypot(b.x-e.x,b.y-e.y)<21){hurtEnemy(e,b.d);if(b.splash)q.enemies.forEach(x=>{if(x!==e&&Math.hypot(x.x-e.x,x.y-e.y)<b.splash)hurtEnemy(x,b.d*.45)});if(b.pierce>0)b.pierce--;else b.life=0;break}}});q.bullets=q.bullets.filter(b=>b.life>0&&b.x>-20&&b.x<980&&b.y>-20&&b.y<560);q.enemies.forEach(e=>updateEnemy(e,dt));const dead=q.enemies.filter(e=>e.hp<=0);dead.forEach(e=>{q.kills++;q.xp+=8+(e.elite?12:0)+(e.boss?30:0);if(Math.random()<.35+profile.talents.fortune*.05){const n=Math.random()<.18?3:1;q.gold+=Math.round(n*(q.relics.includes('lantern')?1.35:1))}for(let i=0;i<5;i++)particles.push({x:e.x,y:e.y,life:.4+Math.random()*.4,color:e.elite?'#c38cff':'#d97a58',r:3+Math.random()*5})});q.enemies=q.enemies.filter(e=>e.hp>0);while(q.xp>=q.need&&!q.choosing){q.xp-=q.need;q.lv++;q.need=Math.round(q.need*1.28);showBlessing()}particles.forEach(a=>a.life-=dt);particles=particles.filter(a=>a.life>0);screenShake=Math.max(0,screenShake-dt*25);if(p.hp<=0)return gameOver();if(!q.enemies.length&&!roomClear&&!q.choosing){roomClear=true;setTimeout(roomCompleted,450)}drawUI()}
function showBlessing(){q.choosing=true;const ids=Object.keys(BLESSINGS).sort(()=>Math.random()-.5).slice(0,3);$('choiceTitle').textContent=`升级至 Lv.${q.lv}`;$('choiceHelp').textContent='选择一项祝福，构筑本次远征。';$('choices').innerHTML=ids.map(id=>`<button class="choice" data-bless="${id}"><span class="big">${BLESSINGS[id].i}</span><h3>${BLESSINGS[id].n}</h3><p>${BLESSINGS[id].d}</p></button>`).join('');$('choiceOverlay').classList.remove('hidden');document.querySelectorAll('[data-bless]').forEach(b=>b.onclick=()=>{const id=b.dataset.bless;BLESSINGS[id].f();q.blessings.push(id);q.choosing=false;$('choiceOverlay').classList.add('hidden');addLog(`获得祝福：${BLESSINGS[id].n}`);drawUI()})}
function roomCompleted(){if(q.room===5){const bossFloor=q.floor;q.runEmbers+=8+q.floor*3;showRelic(()=>{if(bossFloor>=5)return victory();q.floor++;q.room=1;if(q.relics.includes('coin'))q.gold+=25;q.p.hp=Math.min(q.p.max,q.p.hp+Math.round(q.p.max*.35));spawnRoom('battle')});return}if(q.pendingRelic||q.roomType==='elite'){q.pendingRelic=false;showRelic(showDoors);return}showDoors()}
function showDoors(){q.choosing=true;const pool=[{id:'battle',i:'⚔️',n:'烛卫回廊',d:'常规战斗，稳定获得经验与金币'},{id:'elite',i:'💀',n:'精英封印',d:'危险战斗，胜利后获得一件遗物'},{id:'shrine',i:'⛲',n:'余烬祭坛',d:'恢复生命或交换力量'},{id:'shop',i:'🛒',n:'地牢商队',d:'花费金币购买祝福'}].sort(()=>Math.random()-.5).slice(0,3);$('choiceTitle').textContent='选择下一道门';$('choiceHelp').textContent='路线决定风险与构筑速度。第五间固定为守门者。';$('choices').innerHTML=pool.map(o=>`<button class="choice" data-door="${o.id}"><span class="big">${o.i}</span><h3>${o.n}</h3><p>${o.d}</p></button>`).join('');$('choiceOverlay').classList.remove('hidden');document.querySelectorAll('[data-door]').forEach(b=>b.onclick=()=>advanceDoor(b.dataset.door))}
function advanceDoor(type){q.room++;q.choosing=false;$('choiceOverlay').classList.add('hidden');if(type==='shrine')return showShrine();if(type==='shop')return showShop();q.pendingRelic=type==='elite';spawnRoom(type)}
function showShrine(){q.choosing=true;const opts=[{i:'❤️',n:'温火休憩',d:'恢复 45% 最大生命',f:()=>q.p.hp=Math.min(q.p.max,q.p.hp+q.p.max*.45)},{i:'🩸',n:'血烛交易',d:'失去 18% 当前生命，攻击 +8',f:()=>{q.p.hp=Math.max(1,q.p.hp*.82);q.p.atk+=8}},{i:'🔥',n:'收集余烬',d:'本局余烬 +10',f:()=>q.runEmbers+=10}];showEventChoices('余烬祭坛','火焰回应了你的祈愿。',opts,()=>spawnRoom('battle'))}
function showShop(){q.choosing=true;const ids=Object.keys(BLESSINGS).sort(()=>Math.random()-.5).slice(0,3),opts=ids.map(id=>({i:BLESSINGS[id].i,n:BLESSINGS[id].n,d:`${BLESSINGS[id].d} · 价格 18`,f:()=>{if(q.gold<18)return toast('金币不足');q.gold-=18;BLESSINGS[id].f();q.blessings.push(id)}}));showEventChoices('地牢商队','每件祝福售价 18 金币；也可以直接离开。',opts,()=>spawnRoom('battle'),true)}
function showEventChoices(title,help,opts,done,allowSkip=false){$('choiceTitle').textContent=title;$('choiceHelp').textContent=help;$('choices').innerHTML=opts.map((o,i)=>`<button class="choice" data-event="${i}"><span class="big">${o.i}</span><h3>${o.n}</h3><p>${o.d}</p></button>`).join('')+(allowSkip?'<button class="choice" data-skip="1"><span class="big">🚪</span><h3>离开</h3><p>保留金币继续前进</p></button>':'');$('choiceOverlay').classList.remove('hidden');document.querySelectorAll('[data-event]').forEach(b=>b.onclick=()=>{opts[+b.dataset.event].f();q.choosing=false;$('choiceOverlay').classList.add('hidden');done()});document.querySelector('[data-skip]')?.addEventListener('click',()=>{q.choosing=false;$('choiceOverlay').classList.add('hidden');done()})}
function showRelic(done){q.choosing=true;const count=q.relics.includes('map')?4:3,ids=Object.keys(RELICS).filter(id=>!q.relics.includes(id)).sort(()=>Math.random()-.5).slice(0,count);$('choiceTitle').textContent=q.roomType==='elite'?'精英战利品':'守门者遗物';$('choiceHelp').textContent=ids.length?'选择一件能改变构筑方向的遗物。':'遗物已集齐，余烬将强化你的基础属性。';if(!ids.length){$('choices').innerHTML='<button class="choice" id="relicOverflow"><span class="big">🔥</span><h3>余烬灌注</h3><p>生命上限 +18、攻击 +3，并恢复 18 点生命。</p></button>';$('choiceOverlay').classList.remove('hidden');$('relicOverflow').onclick=()=>{q.p.max+=18;q.p.hp=Math.min(q.p.max,q.p.hp+18);q.p.atk+=3;q.choosing=false;$('choiceOverlay').classList.add('hidden');done()};return}$('choices').innerHTML=ids.map(id=>`<button class="choice" data-relic="${id}"><span class="big">${RELICS[id].i}</span><h3>${RELICS[id].n}</h3><p>${RELICS[id].d}</p></button>`).join('');$('choiceOverlay').classList.remove('hidden');document.querySelectorAll('[data-relic]').forEach(b=>b.onclick=()=>{const id=b.dataset.relic;q.relics.push(id);if(id==='heart'){q.p.max+=25;q.p.hp+=25}if(id==='hourglass')q.p.rate*=.88;if(id==='boots')q.p.spd+=28;q.choosing=false;$('choiceOverlay').classList.add('hidden');done()})}
function gameOver(){q.paused=true;profile.embers+=q.runEmbers+Math.floor(q.kills/8);profile.best=Math.max(profile.best,(q.floor-1)*5+q.room);save();$('infoTitle').textContent='烛火熄灭';$('infoBody').innerHTML=`<h3>远征止步于 ${REALMS[q.floor-1].n} · 房间 ${q.room}</h3><p>带回 ${q.runEmbers+Math.floor(q.kills/8)} 余烬。它们可以在新远征开始前强化永久天赋。</p><button class="btn primary" id="restartRun">返回地牢入口</button>`;$('infoOverlay').classList.remove('hidden');$('restartRun').onclick=()=>{q=null;save();location.reload()}}
function victory(){q.paused=true;profile.wins++;profile.embers+=q.runEmbers+60;profile.best=25;save();$('infoTitle').textContent='余烬王座重燃';$('infoBody').innerHTML=`<h3>无烛之王倒下，五层地牢重新燃起烛光。</h3><p>本次获得 ${q.runEmbers+60} 余烬。你可以继续提升永久天赋，并用其他职业挑战新的构筑路线。</p><button class="btn primary" id="restartRun">开启新远征</button>`;$('infoOverlay').classList.remove('hidden');$('restartRun').onclick=()=>{q=null;save();location.reload()}}
function render(){if(!q)return;const realm=REALMS[q.floor-1];ctx.save();if(screenShake)ctx.translate((Math.random()-.5)*screenShake,(Math.random()-.5)*screenShake);ctx.fillStyle=realm.c;ctx.fillRect(0,0,960,540);ctx.strokeStyle=realm.accent+'55';ctx.lineWidth=2;for(let x=0;x<960;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,540);ctx.stroke()}for(let y=0;y<540;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(960,y);ctx.stroke()}obstacles.forEach(o=>{ctx.fillStyle='#111319';ctx.fillRect(o.x,o.y,o.w,o.h);ctx.strokeStyle=realm.accent;ctx.strokeRect(o.x,o.y,o.w,o.h)});q.hazards.forEach(h=>{ctx.fillStyle='#ff5b4d44';ctx.beginPath();ctx.arc(h.x,h.y,h.r,0,7);ctx.fill()});q.bullets.forEach(b=>{ctx.fillStyle=b.foe?'#ff6b70':q.cls==='ranger'?'#c8eeff':'#ffd98a';ctx.beginPath();ctx.arc(b.x,b.y,b.foe?5:6,0,7);ctx.fill()});q.enemies.forEach(e=>{ctx.globalAlpha=e.flash?0.45:1;ctx.font=e.boss?'54px serif':e.elite?'34px serif':'27px serif';ctx.textAlign='center';ctx.fillText(e.icon,e.x,e.y+10);ctx.globalAlpha=1;ctx.fillStyle='#291219';ctx.fillRect(e.x-22,e.y-29,44,4);ctx.fillStyle=e.elite?'#bd6ee8':'#e35f67';ctx.fillRect(e.x-22,e.y-29,44*Math.max(0,e.hp/e.max),4);if(e.burn>0){ctx.fillStyle='#ff9b42';ctx.fillText('🔥',e.x+16,e.y-12)}});particles.forEach(a=>{ctx.globalAlpha=Math.min(1,a.life*3);ctx.fillStyle=a.color;ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,7);ctx.fill()});ctx.globalAlpha=q.p.inv>0?.45:1;ctx.font='34px serif';ctx.textAlign='center';ctx.fillText(CLASSES[q.cls].i,q.p.x,q.p.y+11);ctx.globalAlpha=1;ctx.strokeStyle='#ffe39d55';ctx.beginPath();ctx.arc(q.p.x,q.p.y,44,0,7);ctx.stroke();ctx.restore()}
function drawUI(){if(!q)return;$('floor').textContent=`${q.floor} · ${q.room}`;$('level').textContent=q.lv;$('gold').textContent=q.gold;$('left').textContent=q.enemies.length;$('classLabel').textContent=CLASSES[q.cls].n;$('hpbar').style.width=Math.max(0,q.p.hp/q.p.max*100)+'%';$('xpbar').style.width=q.xp/q.need*100+'%';$('skillbar').style.width=(1-q.p.skill/q.p.skillMax)*100+'%';$('route').innerHTML=Array.from({length:5},(_,i)=>`<div class="room-dot ${i+1<q.room?'done':i+1===q.room?'current':''}">${i===4?'👑':i+1}</div>`).join('');const dps=(q.p.atk/q.p.rate*q.p.shots).toFixed(1);$('build').innerHTML=[['攻击',Math.round(q.p.atk)],['理论秒伤',dps],['暴击',Math.round((q.p.crit+(q.relics.includes('fang')?.12:0))*100)+'%'],['投射物',q.p.shots],['穿透',q.p.pierce],['移速',Math.round(q.p.spd)]].map(x=>`<div class="build-row"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('');$('relics').innerHTML=q.relics.length?q.relics.map(id=>`<div class="relic"><span>${RELICS[id].i}</span><b>${RELICS[id].n}</b></div>`).join(''):'<div class="sub">击败精英与守门者获取。</div>';$('log').innerHTML=q.log.map(x=>`<div>${x}</div>`).join('');$('dashBtn').textContent=`冲刺 ${q.p.dash>0?q.p.dash.toFixed(1):'就绪'}`;$('skillBtn').textContent=`战技 ${q.p.skill>0?q.p.skill.toFixed(1):'就绪'}`}
function classScreen(){$('emberCount').textContent=profile.embers;$('classChoices').innerHTML=Object.entries(CLASSES).map(([id,c])=>`<button class="choice" data-class="${id}"><span class="big">${c.i}</span><h3>${c.n}</h3><p>${c.d}<br>生命 ${c.hp} · 攻击 ${c.atk} · 移速 ${c.spd}</p></button>`).join('');document.querySelectorAll('[data-class]').forEach(b=>b.onclick=()=>{q=fresh(b.dataset.class);$('classOverlay').classList.add('hidden');spawnRoom('battle')});$('talents').innerHTML=Object.entries(TALENTS).map(([id,t])=>{const lv=profile.talents[id],cost=t.cost*(lv+1);return`<div class="talent"><b>${t.n} · Lv.${lv}/8</b><small>${t.d}</small><button class="btn" data-talent="${id}" ${lv>=8?'disabled':''}>升级 ${cost}</button></div>`}).join('');document.querySelectorAll('[data-talent]').forEach(b=>b.onclick=()=>{const id=b.dataset.talent,lv=profile.talents[id],cost=TALENTS[id].cost*(lv+1);if(profile.embers<cost)return toast('余烬不足');profile.embers-=cost;profile.talents[id]++;save();classScreen()})}
function showSave(){const code=exportCode();$('infoTitle').textContent='跨设备远征档案';$('infoBody').innerHTML=`<p>永久天赋、当前构筑、层数、遗物与祝福都会导出，并带完整性校验。</p><textarea class="savebox" id="saveCode">${code}</textarea><div class="controls"><button class="btn" id="copyCode">复制导出</button><button class="btn" id="importCodeBtn">导入上方存档</button></div><div class="build-row"><span>永久余烬</span><strong>${profile.embers}</strong></div><div class="build-row"><span>通关次数</span><strong>${profile.wins}</strong></div>`;$('infoOverlay').classList.remove('hidden');$('copyCode').onclick=()=>navigator.clipboard?.writeText($('saveCode').value);$('importCodeBtn').onclick=()=>{try{importCode($('saveCode').value);$('infoOverlay').classList.add('hidden');alert('导入成功')}catch(e){alert(e.message)}}}
function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;update(dt);render();raf=requestAnimationFrame(loop)}
addEventListener('keydown',e=>{keys[e.code]=true;if(!q)return;if(e.code==='Space')attack();if(e.code==='ShiftLeft'||e.code==='ShiftRight')dash();if(e.code==='KeyQ')skill();if(e.code==='KeyP'){q.paused=!q.paused;$('pauseBtn').textContent=q.paused?'继续 P':'暂停 P'}});addEventListener('keyup',e=>keys[e.code]=false);cv.onpointermove=e=>{const r=cv.getBoundingClientRect();mouse.x=(e.clientX-r.left)*960/r.width;mouse.y=(e.clientY-r.top)*540/r.height};cv.onpointerdown=e=>{if(!q)return;cv.setPointerCapture(e.pointerId);mouse.down=true;attack()};cv.onpointerup=cv.onpointercancel=()=>mouse.down=false;document.querySelectorAll('[data-key]').forEach(b=>{const k=b.dataset.key;b.onpointerdown=e=>{if(!q)return;e.preventDefault();keys[k]=true;b.setPointerCapture(e.pointerId)};b.onpointerup=b.onpointercancel=()=>keys[k]=false});$('attackBtn').onpointerdown=e=>{if(!q)return;e.preventDefault();mouse.down=true;$('attackBtn').setPointerCapture(e.pointerId)};$('attackBtn').onpointerup=$('attackBtn').onpointercancel=()=>mouse.down=false;$('dashBtn').onclick=()=>q&&dash();$('skillBtn').onclick=()=>q&&skill();$('pauseBtn').onclick=()=>{if(q)q.paused=!q.paused};$('saveBtn').onclick=()=>q&&showSave();$('closeInfoBtn').onclick=()=>$('infoOverlay').classList.add('hidden');
load();classScreen();if(q){$('classOverlay').classList.add('hidden');q.paused=false;q.choosing=false;spawnRoom(q.roomType||'battle')}loop(0);
})();
</script></body></html>
