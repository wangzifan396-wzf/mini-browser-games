<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#090718" />
    <title>霓虹 2048：万象矩阵</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f4f2ff;
        --muted: #9d98ba;
        --cyan: #43dcff;
        --pink: #ff5caf;
        --gold: #ffd45e;
        --green: #69eea2;
        --violet: #a486ff;
        --panel: rgba(12, 9, 29, 0.92);
        --line: rgba(186, 164, 255, 0.18);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #05040e;
        color: var(--ink);
        font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      }
      body {
        overflow: hidden;
      }
      button {
        font: inherit;
      }
      .app {
        height: 100vh;
        height: 100dvh;
        padding: 9px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 8px;
        background:
          radial-gradient(
            circle at 12% 12%,
            rgba(55, 214, 255, 0.11),
            transparent 28%
          ),
          radial-gradient(
            circle at 88% 84%,
            rgba(255, 75, 171, 0.1),
            transparent 28%
          );
      }
      .topbar,
      .game,
      .side,
      .card,
      .overlay-card,
      .modal-card {
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      }
      .topbar {
        min-height: 61px;
        border-radius: 16px;
        padding: 8px 13px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo {
        width: 42px;
        height: 42px;
        border-radius: 13px;
        display: grid;
        place-items: center;
        background: linear-gradient(145deg, var(--violet), var(--pink));
        font-weight: 1000;
        color: #100821;
      }
      .brand h1 {
        margin: 0;
        font-size: clamp(20px, 2.5vw, 29px);
        line-height: 1;
      }
      .brand h1 b {
        color: var(--pink);
      }
      .brand p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
      }
      .actions {
        display: flex;
        gap: 6px;
      }
      .btn,
      .icon-btn,
      .choice,
      .tool,
      .upgrade-card,
      .archive-btn {
        border: 1px solid var(--line);
        border-radius: 11px;
        background: rgba(34, 25, 65, 0.9);
        color: var(--ink);
        font-weight: 900;
        cursor: pointer;
        transition: 0.15s;
      }
      .btn:hover,
      .icon-btn:hover,
      .choice:hover,
      .tool:hover,
      .upgrade-card:hover,
      .archive-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(67, 220, 255, 0.7);
      }
      .btn:disabled,
      .icon-btn:disabled,
      .tool:disabled,
      .archive-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none;
      }
      .btn {
        padding: 9px 14px;
      }
      .btn.primary {
        border: 0;
        background: linear-gradient(135deg, var(--violet), var(--pink));
        color: white;
      }
      .icon-btn {
        width: 40px;
        height: 40px;
      }
      .layout {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 335px;
        gap: 8px;
      }
      .game,
      .side {
        border-radius: 16px;
        min-height: 0;
        min-width: 0;
      }
      .game {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 7px;
        padding: 8px;
      }
      .hud {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 5px;
      }
      .hud div {
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.025);
      }
      .hud span {
        display: block;
        color: var(--muted);
        font-size: 8px;
        font-weight: 900;
      }
      .hud strong {
        font-size: 15px;
      }
      .hud .score strong {
        color: var(--gold);
      }
      .board-wrap {
        position: relative;
        min-height: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 13px;
        background: #09071a;
      }
      .board {
        --size: 4;
        position: relative;
        width: min(100%, 620px, calc(100vh - 220px));
        aspect-ratio: 1;
        display: grid;
        grid-template-columns: repeat(var(--size), 1fr);
        grid-template-rows: repeat(var(--size), 1fr);
        gap: clamp(5px, 1vmin, 9px);
        padding: clamp(7px, 1.2vmin, 11px);
        border: 1px solid rgba(112, 84, 184, 0.34);
        border-radius: 15px;
        background: rgba(24, 15, 52, 0.86);
        touch-action: none;
      }
      .cell {
        position: relative;
        min-width: 0;
        border-radius: clamp(7px, 1.1vmin, 12px);
        background: rgba(255, 255, 255, 0.045);
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .tile {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        border-radius: inherit;
        font-weight: 1000;
        font-size: clamp(14px, 4vmin, 35px);
        color: white;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.32);
        animation: pop 0.14s ease;
      }
      .tile.new {
        animation: spawn 0.18s ease;
      }
      .tile.merge {
        animation: merge 0.23s ease;
      }
      .cell.target {
        outline: 3px solid var(--cyan);
        outline-offset: -4px;
      }
      .cell.swap {
        outline: 3px solid var(--gold);
        outline-offset: -4px;
      }
      @keyframes spawn {
        from {
          transform: scale(0.4);
          opacity: 0.3;
        }
      }
      @keyframes merge {
        50% {
          transform: scale(1.13);
        }
      }
      @keyframes pop {
        from {
          opacity: 0.75;
        }
      }
      .banner {
        position: absolute;
        left: 50%;
        top: 15px;
        transform: translate(-50%, -10px);
        padding: 8px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(8, 5, 21, 0.92);
        font-size: 11px;
        font-weight: 900;
        opacity: 0;
        transition: 0.2s;
        pointer-events: none;
      }
      .banner.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      .mission-track {
        position: absolute;
        left: 50%;
        bottom: 8px;
        transform: translateX(-50%);
        width: min(58%, 470px);
        padding: 6px 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(7, 5, 18, 0.85);
        pointer-events: none;
      }
      .mission-track div {
        height: 8px;
        border-radius: 7px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }
      .mission-track i {
        display: block;
        width: 0;
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--violet),
          var(--cyan),
          var(--gold)
        );
      }
      .mission-track span {
        position: absolute;
        inset: 2px;
        text-align: center;
        font-size: 8px;
        font-weight: 900;
      }
      .tools {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 5px;
      }
      .tool {
        position: relative;
        min-height: 51px;
        padding: 6px;
      }
      .tool b {
        display: block;
        font-size: 15px;
      }
      .tool span {
        display: block;
        color: var(--muted);
        font-size: 8px;
      }
      .tool em {
        position: absolute;
        right: 5px;
        top: 4px;
        color: var(--gold);
        font-style: normal;
        font-size: 9px;
      }
      .tool.active {
        border-color: var(--cyan);
        background: rgba(67, 220, 255, 0.1);
      }
      .side {
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 7px;
        overflow: auto;
      }
      .card {
        padding: 10px;
        border-radius: 13px;
      }
      .objective {
        display: flex;
        gap: 9px;
        align-items: center;
      }
      .objective-icon {
        width: 39px;
        height: 39px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-size: 19px;
        background: rgba(164, 134, 255, 0.14);
      }
      .objective b {
        display: block;
        font-size: 12px;
      }
      .objective small {
        display: block;
        color: var(--muted);
        font-size: 9px;
        line-height: 1.35;
        margin-top: 2px;
      }
      .bar {
        height: 7px;
        margin-top: 7px;
        border-radius: 8px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }
      .bar i {
        display: block;
        width: 0;
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--pink),
          var(--violet),
          var(--cyan)
        );
      }
      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 7px;
      }
      .card-head strong {
        font-size: 11px;
      }
      .eyebrow {
        color: var(--pink);
        font-size: 8px;
        font-weight: 1000;
        letter-spacing: 0.08em;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .chip {
        padding: 5px 7px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
        font-size: 9px;
      }
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }
      .stats div {
        display: flex;
        justify-content: space-between;
        padding: 6px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.025);
        font-size: 9px;
      }
      .stats span {
        color: var(--muted);
      }
      .tip {
        color: var(--muted);
        font-size: 9px;
        line-height: 1.55;
      }
      .tip b {
        color: var(--cyan);
      }
      .overlay,
      .modal {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        padding: 15px;
        background: rgba(4, 3, 12, 0.77);
        backdrop-filter: blur(7px);
      }
      .overlay.hidden,
      .modal.hidden {
        display: none;
      }
      .overlay-card,
      .modal-card {
        width: min(900px, 96%);
        max-height: 94%;
        overflow: auto;
        border-radius: 20px;
        padding: 17px;
      }
      .overlay-title {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .overlay-title h2 {
        margin: 0;
        font-size: 26px;
      }
      .overlay-title h2 b {
        color: var(--pink);
      }
      .overlay-title p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 10px;
      }
      .save-pill {
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        font-size: 9px;
        color: var(--muted);
      }
      .setup {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 11px;
      }
      .section {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.018);
      }
      .section h3 {
        margin: 0 0 7px;
        font-size: 11px;
      }
      .mode-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .choice {
        min-height: 63px;
        padding: 8px;
        text-align: left;
      }
      .choice b {
        display: block;
        font-size: 11px;
      }
      .choice small {
        display: block;
        color: var(--muted);
        font-size: 8px;
        line-height: 1.35;
        margin-top: 3px;
      }
      .choice.selected {
        border-color: var(--pink);
        background: rgba(255, 92, 175, 0.08);
      }
      .sector-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 5px;
      }
      .sector {
        min-height: 42px;
        text-align: center;
        padding: 5px;
      }
      .sector.locked {
        opacity: 0.3;
      }
      .archive {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .archive-btn {
        padding: 7px;
        text-align: left;
      }
      .archive-btn b {
        font-size: 10px;
      }
      .archive-btn span {
        display: block;
        color: var(--muted);
        font-size: 8px;
      }
      .archive-btn em {
        display: block;
        color: var(--gold);
        font-size: 8px;
        font-style: normal;
        margin-top: 4px;
      }
      .save-tools {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .start-row {
        display: flex;
        justify-content: flex-end;
        gap: 7px;
        margin-top: 10px;
      }
      .result {
        display: none;
        text-align: center;
      }
      .result.show {
        display: block;
      }
      .result h2 {
        margin: 0;
        font-size: 27px;
      }
      .result p {
        font-size: 10px;
        color: var(--muted);
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        margin: 12px 0;
      }
      .result-grid div {
        padding: 9px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
      }
      .result-grid b {
        display: block;
        color: var(--gold);
        font-size: 18px;
      }
      .result-grid span {
        font-size: 8px;
        color: var(--muted);
      }
      .modal-card {
        width: min(720px, 94%);
      }
      .modal-card h2 {
        margin: 3px 0 11px;
      }
      .upgrade-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
      }
      .upgrade-card {
        min-height: 125px;
        padding: 12px;
        text-align: left;
      }
      .upgrade-card i {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        font-style: normal;
        margin-bottom: 8px;
      }
      .upgrade-card strong {
        display: block;
        font-size: 12px;
      }
      .upgrade-card p {
        font-size: 9px;
        color: var(--muted);
        line-height: 1.4;
      }
      .protocol-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 9px;
      }
      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) 205px;
        }
        .side {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }
        .side .tip-card {
          display: none;
        }
        .setup {
          grid-template-columns: 1fr;
        }
        .board {
          width: min(100%, calc(100vh - 390px), 560px);
        }
      }
      @media (max-width: 560px) {
        .app {
          padding: 5px;
          gap: 5px;
        }
        .topbar {
          min-height: 51px;
          padding: 5px 8px;
        }
        .logo {
          width: 35px;
          height: 35px;
        }
        .brand p {
          display: none;
        }
        .actions .btn {
          display: none;
        }
        .icon-btn {
          width: 35px;
          height: 35px;
        }
        .layout {
          grid-template-rows: minmax(0, 1fr) 180px;
          gap: 5px;
        }
        .game {
          padding: 4px;
        }
        .hud {
          grid-template-columns: repeat(3, 1fr);
          gap: 3px;
        }
        .hud div {
          padding: 4px 6px;
        }
        .hud strong {
          font-size: 12px;
        }
        .board {
          width: min(100%, calc(100vw - 20px));
        }
        .tools {
          grid-template-columns: repeat(4, 1fr);
          gap: 3px;
        }
        .tool {
          min-height: 43px;
          padding: 3px;
        }
        .tool b {
          font-size: 13px;
        }
        .side {
          padding: 5px;
          gap: 4px;
        }
        .card {
          padding: 7px;
        }
        .stats {
          display: none;
        }
        .overlay {
          padding: 6px;
        }
        .overlay-card {
          padding: 11px;
        }
        .overlay-title {
          display: block;
        }
        .mode-grid {
          gap: 4px;
        }
        .choice {
          min-height: 54px;
          padding: 6px;
        }
        .sector-grid {
          grid-template-columns: repeat(4, 1fr);
        }
        .archive {
          grid-template-columns: 1fr;
        }
        .archive-btn {
          display: flex;
          justify-content: space-between;
        }
        .archive-btn span {
          display: none;
        }
        .upgrade-grid {
          grid-template-columns: 1fr;
        }
        .upgrade-card {
          min-height: 92px;
        }
        .result-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo">2ⁿ</div>
          <div>
            <h1>霓虹 2048 <b>万象 V3</b></h1>
            <p>18 节点 · 七模式 · 八工具 · 跨设备档案</p>
          </div>
        </div>
        <div class="actions">
          <button class="icon-btn" id="undoBtn">↶</button
          ><button class="btn" id="homeBtn">矩阵站</button
          ><button class="icon-btn" id="newBtn">↻</button>
        </div>
      </header>
      <div class="layout">
        <section class="game">
          <div class="hud">
            <div class="score">
              <span>得分</span><strong id="score">0</strong>
            </div>
            <div><span>最高</span><strong id="best">0</strong></div>
            <div><span>步数</span><strong id="moves">0</strong></div>
            <div><span>最大块</span><strong id="maxTile">2</strong></div>
            <div><span>连锁</span><strong id="combo">×1</strong></div>
            <div><span>时间/步限</span><strong id="limit">--</strong></div>
          </div>
          <div class="board-wrap">
            <div class="board" id="board"></div>
            <div class="banner" id="banner">矩阵启动</div>
            <div class="mission-track">
              <div><i id="missionBar"></i></div>
              <span id="missionText">选择行动</span>
            </div>
            <div class="overlay" id="homeOverlay">
              <div class="overlay-card">
                <div id="setupView">
                  <div class="overlay-title">
                    <div>
                      <h2>万象矩阵：<b>选择协议</b></h2>
                      <p>
                        保持标准合成规则，用连锁充能、工具和局内协议完成不同矩阵目标。
                      </p>
                    </div>
                    <div class="save-pill" id="savePill">数据片 0</div>
                  </div>
                  <div class="setup">
                    <section class="section">
                      <h3>矩阵模式</h3>
                      <div class="mode-grid" id="modeGrid"></div>
                    </section>
                    <section class="section">
                      <h3>远征节点</h3>
                      <div class="sector-grid" id="sectorGrid"></div>
                    </section>
                    <section class="section" style="grid-column: 1/-1">
                      <h3>永久档案强化</h3>
                      <div class="archive" id="archiveGrid"></div>
                      <div class="save-tools">
                        <button class="btn" id="exportSaveBtn" type="button">
                          导出存档码
                        </button>
                        <button class="btn" id="importSaveBtn" type="button">
                          导入存档码
                        </button>
                      </div>
                    </section>
                  </div>
                  <div class="start-row">
                    <button class="btn primary" id="startBtn">启动矩阵</button>
                  </div>
                </div>
                <div class="result" id="resultView">
                  <h2 id="resultTitle">矩阵结束</h2>
                  <p id="resultText"></p>
                  <div class="result-grid">
                    <div><b id="resultScore">0</b><span>得分</span></div>
                    <div><b id="resultMax">0</b><span>最大块</span></div>
                    <div><b id="resultData">0</b><span>数据片</span></div>
                    <div><b id="resultMoves">0</b><span>步数</span></div>
                  </div>
                  <div class="start-row" style="justify-content: center">
                    <button class="btn" id="againBtn">同配置再战</button
                    ><button class="btn primary" id="resultHomeBtn">
                      返回矩阵站
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="tools" id="tools">
            <button class="tool" data-tool="hammer">
              <em id="hammerCount">0</em><b>锤</b><span>移除</span></button
            ><button class="tool" data-tool="swap">
              <em id="swapCount">0</em><b>换</b><span>交换</span></button
            ><button class="tool" data-tool="bomb">
              <em id="bombCount">0</em><b>爆</b><span>十字</span></button
            ><button class="tool" data-tool="upgrade">
              <em id="upgradeCount">0</em><b>升</b><span>升阶</span></button

      function load() {
        const base = {
          v: 3,

          unlocked: 1,
          best: {},
          stars: {},

              ...base,
              ...s,
              v: 3,
              archive: { ...base.archive, ...(s.archive || {}) },
              records: s.records || {},

      function store() {

      function saveHash(text) {
        let hash = 2166136261;
        for (let i = 0; i < text.length; i++) {

        }
        return (hash >>> 0).toString(36);
      }
      function encodeSave() {
        const json = JSON.stringify({
          game: "neon-2048",
          version: 3,
          data: save,

        const bytes = new TextEncoder().encode(json);

        bytes.forEach((byte) => (binary += String.fromCharCode(byte)));
        const payload = btoa(binary);
        return `NMX3.${payload}.${saveHash(payload)}`;
      }
      function importSave(code) {

          throw new Error("不是霓虹 2048 存档");
        localStorage.setItem(SAVE_KEY, JSON.stringify(parsed.data));
        save = load();
        selectedMode = MODES[save.loadout.mode]
          ? save.loadout.mode
          : "expedition";
        selectedSector = Math.min(save.unlocked, 18);

        renderHome();

      const clone = (g) => g.map((r) => r.slice()),
        clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      function sectorGoal(n) {

      function sectorMoves(n) {

      }
      function renderHome() {
        ui.setup.style.display = "block";

          )

          const n = i + 1,

        }).join("");

          selectedMode === "expedition" ? 1 : 0.42;
        $("#archiveGrid").innerHTML = Object.entries(ARCHIVE)
          .map(([k, a]) => {

              c = a.cost(lv),
              max = lv >= a.max;

          })

      function buyArchive(k) {
        const a = ARCHIVE[k],
          lv = save.archive[k] || 0,
          c = a.cost(lv);
        if (lv >= a.max || save.data < c) return;
        save.data -= c;

      }
      function rng(seed) {
        return () => {
          seed = (Math.imul(seed, 1664525) + 1013904223) | 0;
          return (seed >>> 0) / 4294967296;
        };
      }
      function dailySeed() {
        const d = new Date();

      }
      function fresh() {
        const mode = MODES[selectedMode],
          size = mode.size,

      function spawn() {
        const empty = [];
        for (let r = 0; r < state.size; r++)
          for (let c = 0; c < state.size; c++)
            if (!state.grid[r][c]) empty.push({ r, c });
        if (!empty.length) return false;
        const p = empty[Math.floor(state.rand() * empty.length)],
          v = state.rand() < 1 - state.fourChance ? 2 : 4;

      function snapshot() {
        state.history.push({
          grid: clone(state.grid),
          score: state.score,
          moves: state.moves,

          charge: state.charge,
          combo: state.combo,

        if (state.history.length > state.historyMax) state.history.shift();

      function lines(dir) {
        const out = [];
        for (let i = 0; i < state.size; i++) {
          const line = [];
          for (let j = 0; j < state.size; j++) {
            if (dir === "left") line.push([i, j]);
            if (dir === "right") line.push([i, state.size - 1 - j]);
            if (dir === "up") line.push([j, i]);
            if (dir === "down") line.push([state.size - 1 - j, i]);
          }
          out.push(line);
        }
        return out;
      }
      function move(dir) {
        if (

          !ui.modal.classList.contains("hidden")

      function equal(a, b) {

      function purgeLowest(target, count) {

          if (
            state.mode === "expedition" ||
            state.mode === "daily" ||
            state.mode === "wide" ||
            state.mode === "zen" ||
            state.mode === "entropy"
          )
            return end(true, "目标数字已达成");
          showBanner(`${state.target} 已达成，仍可继续`);
          state.target *= 2;
        }
        if (state.moves >= state.moveLimit) return end(false, "步数耗尽");
        if (!canMove()) end(false, "矩阵已锁死");
      }
      function canMove() {
        if (state.grid.flat().includes(0)) return true;
        for (let r = 0; r < state.size; r++)
          for (let c = 0; c < state.size; c++) {
            if (r + 1 < state.size && state.grid[r][c] === state.grid[r + 1][c])
              return true;
            if (c + 1 < state.size && state.grid[r][c] === state.grid[r][c + 1])
              return true;
          }
        return false;
      }
      function openProtocol() {
        state.charge = 0;
        const opts = sample(PROTOCOLS, 3);
        ui.protocolGrid.innerHTML = opts
          .map(
            (p, i) =>
              `<button class="upgrade-card" data-protocol="${p.id}"><i>${p.icon}</i><strong>${p.title}</strong><p>${p.desc}</p></button>`,
          )
          .join("");
        ui.protocolGrid
          .querySelectorAll("[data-protocol]")
          .forEach(
            (b) => (b.onclick = () => chooseProtocol(b.dataset.protocol)),
          );
        ui.modal.classList.remove("hidden");
      }
      function chooseProtocol(id) {
        const p = PROTOCOLS.find((x) => x.id === id);
        if (!p) return;
        p.apply(state);
        state.build.push(p.title);
        ui.modal.classList.add("hidden");
        state.maxTile = Math.max(...state.grid.flat());
        showBanner(`${p.title} 已接入`);
        renderBoard();
        checkState();
        sync();
      }
      function sample(a, n) {
        const b = [...a],
          o = [];
        while (b.length && o.length < n)
          o.push(b.splice(Math.floor(state.rand() * b.length), 1)[0]);
        return o;
      }
      function grantTool(type) {
        const keys = Object.keys(state.tools),
          k = type || keys[Math.floor(state.rand() * keys.length)];
        state.tools[k]++;
        showBanner(`获得工具：${TOOL_INFO[k][0]}`);
        sync();
      }
      function selectTool(k) {
        if (state.over) return;
        if (k === "undo") return undo();
        if (k === "magnet") return magnet();
        if (state.tools[k] <= 0) return;
        state.activeTool = state.activeTool === k ? null : k;
        state.swapCell = null;
        renderBoard();
        sync();
      }
      function undo() {
        if (state.tools.undo <= 0 || !state.history.length) return;
        const s = state.history.pop();
        state.tools.undo--;
        Object.assign(state, {
          grid: clone(s.grid),
          score: s.score,
          moves: s.moves,
          maxTile: s.maxTile,
          charge: s.charge,
          combo: s.combo,
          activeTool: null,
        });
        renderBoard();
        sync();
        showBanner("矩阵已回溯");
      }
      function magnet() {
        if (state.tools.magnet <= 0) return;
        state.tools.magnet--;
        snapshot();
        for (let i = 0; i < state.size * 2; i++) {
          const res = analyzeNoSpawn(i % 2 ? "down" : "right");
          state.grid = res;
        }
        state.moves++;
        renderBoard();
        sync();
        showBanner("高阶数字已聚向右下");
      }
      function analyzeNoSpawn(dir) {
        const next = Array.from({ length: state.size }, () =>
          Array(state.size).fill(0),
        );
        for (const line of lines(dir)) {
          const vals = line.map(([r, c]) => state.grid[r][c]).filter(Boolean);
          while (vals.length < state.size) vals.push(0);
          line.forEach(([r, c], i) => (next[r][c] = vals[i]));
        }
        return next;
      }
      function cellClick(r, c) {
        const k = state.activeTool;
        if (!k) return;
        if (k === "hammer") {
          if (!state.grid[r][c]) return;
          state.grid[r][c] = 0;
        } else if (k === "bomb") {
          for (const [rr, cc] of [
            [r, c],
            [r - 1, c],
            [r + 1, c],
            [r, c - 1],
            [r, c + 1],
          ])
            if (rr >= 0 && cc >= 0 && rr < state.size && cc < state.size)
              state.grid[rr][cc] = 0;
        } else if (k === "upgrade") {
          if (!state.grid[r][c]) return;
          state.grid[r][c] *= 2;
          state.score += state.grid[r][c];
        } else if (k === "downgrade") {
          if (state.grid[r][c] <= 2) return;
          state.grid[r][c] /= 2;
          state.charge = Math.min(100, state.charge + 25);
        } else if (k === "clone") {
          if (!state.grid[r][c]) return;
          const empty = [];
          for (let rr = 0; rr < state.size; rr++)
            for (let cc = 0; cc < state.size; cc++)
              if (!state.grid[rr][cc]) empty.push([rr, cc]);
          if (!empty.length) return;
          const [rr, cc] = empty[Math.floor(state.rand() * empty.length)];
          state.grid[rr][cc] = state.grid[r][c];
        } else if (k === "swap") {
          if (!state.swapCell) {
            state.swapCell = { r, c };
            renderBoard();
            return;
          }
          const a = state.swapCell,
            v = state.grid[a.r][a.c];
          state.grid[a.r][a.c] = state.grid[r][c];
          state.grid[r][c] = v;
          state.swapCell = null;
        }
        state.tools[k]--;
        state.activeTool = null;
        state.maxTile = Math.max(...state.grid.flat());
        renderBoard();
        sync();
        showBanner(`${TOOL_INFO[k][0]}已使用`);
        if (state.charge >= 100 && !state.over) openProtocol();
      }
      function renderBoard() {
        ui.board.style.setProperty("--size", state.size);
        ui.board.innerHTML = "";
        for (let r = 0; r < state.size; r++)
          for (let c = 0; c < state.size; c++) {
            const cell = document.createElement("button");
            cell.className = `cell ${state.activeTool ? "target" : ""} ${state.swapCell && state.swapCell.r === r && state.swapCell.c === c ? "swap" : ""}`;
            const v = state.grid[r][c];
            if (v) {
              const tile = document.createElement("span");
              tile.className = `tile ${state.newCells.has(`${r},${c}`) ? "new" : ""} ${state.mergeCells.has(`${r},${c}`) ? "merge" : ""}`;
              tile.textContent = v;
              tile.style.background = tileColor(v);
              tile.style.fontSize =
                state.size >= 5
                  ? state.size === 6
                    ? "clamp(9px,2.5vmin,22px)"
                    : "clamp(12px,3.1vmin,27px)"
                  : "";
              cell.appendChild(tile);
            }
            cell.onclick = () => cellClick(r, c);
            ui.board.appendChild(cell);
          }
      }
      function tileColor(v) {
        const colors = {
          2: "#39305f",
          4: "#493672",
          8: "#5d3f8d",
          16: "#7043a4",
          32: "#8b45b2",
          64: "#b24cae",
          128: "#d6539e",
          256: "#eb647e",
          512: "#f48161",
          1024: "#eea64f",
          2048: "#e9c653",
          4096: "#55d6d0",
        };
        return colors[v] || "linear-gradient(135deg,#36d9ff,#9d79ff,#ff5caf)";
      }
      function settleMilestones() {
        let bonus = 0;
        for (const milestone of MILESTONES) {
          if (!save.milestones[milestone.id] && milestone.done(save)) {
            save.milestones[milestone.id] = true;
            save.data += milestone.reward;
            bonus += milestone.reward;
          }
        }
        return bonus;
      }
      function end(win, reason) {
        if (state.over) return;
        state.over = true;
        state.won = win;
        const data = Math.max(
          1,
          Math.floor(
            (Math.floor(Math.log2(state.maxTile)) +
              Math.floor(state.score / 5000) +
              (win ? selectedSector : 0)) *
              (1 + (save.archive.yield || 0) * 0.06) *
              state.dataMult,
          ),
        );
        save.data += data;
        save.runs += 1;
        save.wins += win ? 1 : 0;
        save.best[state.mode] = Math.max(
          save.best[state.mode] || 0,
          state.score,
        );
        if (win && state.mode === "expedition") {
          save.unlocked = Math.max(
            save.unlocked,
            Math.min(18, state.sector + 1),
          );
          save.stars[state.sector] = Math.max(
            save.stars[state.sector] || 0,
            state.moves < state.moveLimit * 0.65
              ? 3
              : state.moves < state.moveLimit * 0.85
                ? 2
                : 1,
          );
        }
        const record = save.records[state.mode] || {
          plays: 0,
          wins: 0,
          bestTile: 0,
        };
        record.plays += 1;
        record.wins += win ? 1 : 0;
        record.bestTile = Math.max(record.bestTile, state.maxTile);
        save.records[state.mode] = record;
        const milestoneBonus = settleMilestones();
        store();
        ui.overlay.classList.remove("hidden");
        ui.setup.style.display = "none";
        ui.result.classList.add("show");
        $("#resultTitle").textContent = win ? "矩阵目标完成" : "矩阵暂时停摆";
        $("#resultText").textContent =
          `${reason} · ${MODES[state.mode].name}${milestoneBonus ? ` · 里程碑 +${milestoneBonus} 数据片` : ""}`;
        $("#resultScore").textContent = state.score;
        $("#resultMax").textContent = state.maxTile;
        $("#resultData").textContent = data;
        $("#resultMoves").textContent = state.moves;
      }
      function sync() {
        if (!state) return;
        ui.score.textContent = state.score;
        ui.best.textContent = Math.max(state.best, state.score);
        ui.moves.textContent = state.moves;
        ui.max.textContent = state.maxTile;
        ui.combo.textContent = `×${Math.max(1, state.combo)}`;
        ui.limit.textContent =
          state.timeLeft > 0
            ? format(state.timeLeft)
            : state.moveLimit < 99999
              ? `${state.moves}/${state.moveLimit}`
              : "∞";
        ui.chargeBar.style.width = `${state.charge}%`;
        ui.chargeText.textContent = `充能 ${Math.floor(state.charge)}%`;
        const progress = Math.min(
          100,
          (Math.log2(state.maxTile) / Math.log2(state.target)) * 100,
        );
        ui.missionBar.style.width = `${progress}%`;
        ui.missionText.textContent = `目标 ${state.target} · 当前 ${state.maxTile}`;
        $("#objectiveIcon").textContent = MODES[state.mode].icon;
        $("#objectiveTitle").textContent =
          `${MODES[state.mode].name}${state.mode === "expedition" ? ` · 节点 ${state.sector}` : ""}`;
        $("#objectiveText").textContent =
          state.timeLeft > 0
            ? `剩余 ${format(state.timeLeft)}，保持连锁。`
            : `制造 ${state.target}，合理控制空格。`;
        ui.build.innerHTML = state.build.length
          ? state.build.map((x) => `<span class="chip">${x}</span>`).join("")
          : '<span class="chip">标准合成协议</span>';
        ui.stats.innerHTML = [
          ["总合成", state.merges],
          ["有效移动", state.moves],
          ["充能倍率", `${Math.round(state.chargeMult * 100)}%`],
          ["计分倍率", `${Math.round(state.scoreMult * 100)}%`],
        ]
          .map((x) => `<div><span>${x[0]}</span><b>${x[1]}</b></div>`)
          .join("");
        for (const [k] of Object.entries(state.tools)) {
          const el = $(`#${k}Count`);
          if (el) el.textContent = state.tools[k];
        }
        document.querySelectorAll("[data-tool]").forEach((b) => {
          const k = b.dataset.tool;
          b.classList.toggle("active", state.activeTool === k);
          b.disabled = state.tools[k] <= 0;
        });
      }
      function showBanner(t) {
        ui.banner.textContent = t;
        ui.banner.classList.add("show");
        bannerTimer = 1800;
      }
      function format(s) {
        s = Math.max(0, Math.ceil(s));
        return `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
      }
      function keyMove(code) {
        const m = {
          ArrowLeft: "left",
          KeyA: "left",
          ArrowRight: "right",
          KeyD: "right",
          ArrowUp: "up",
          KeyW: "up",
          ArrowDown: "down",
          KeyS: "down",
        };
        if (m[code]) move(m[code]);
      }
      $("#startBtn").onclick = start;
      $("#againBtn").onclick = start;
      $("#resultHomeBtn").onclick = () => {
        ui.result.classList.remove("show");
        renderHome();
      };
      $("#homeBtn").onclick = () => {
        if (
          state &&
          !state.over &&
          state.moves &&
          !confirm("当前矩阵尚未结算，返回矩阵站？")
        )
          return;
        ui.overlay.classList.remove("hidden");
        renderHome();
      };
      $("#newBtn").onclick = () => {
        if (confirm("重新开始当前矩阵？")) start();
      };
      $("#undoBtn").onclick = () => selectTool("undo");
      $("#convertBtn").onclick = () => {
        grantTool();
        ui.modal.classList.add("hidden");
      };
      $("#exportSaveBtn").onclick = async () => {
        const code = encodeSave();
        try {
          await navigator.clipboard.writeText(code);
        } catch (error) {}
        prompt("霓虹 2048 存档码（已尝试复制，可在其他设备导入）", code);
      };
      $("#importSaveBtn").onclick = () => {
        const code = prompt("粘贴霓虹 2048 存档码：");
        if (!code) return;
        try {
          importSave(code);
          alert("存档导入成功，矩阵档案与远征进度已恢复。");
        } catch (error) {
          alert(`导入失败：${error.message}`);
        }
      };
      document
        .querySelectorAll("[data-tool]")
        .forEach((b) => (b.onclick = () => selectTool(b.dataset.tool)));
      window.addEventListener("keydown", (e) => {
        if (
          ["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(e.code)
        )
          e.preventDefault();
        keyMove(e.code);
        if (e.code === "KeyZ") undo();
        if (e.code === "Escape") {
          state.activeTool = null;
          state.swapCell = null;
          renderBoard();
          sync();
        }
      });
      ui.board.addEventListener(
        "pointerdown",
        (e) => (pointer = { x: e.clientX, y: e.clientY }),
      );
      ui.board.addEventListener("pointerup", (e) => {
        if (!pointer) return;
        const dx = e.clientX - pointer.x,
          dy = e.clientY - pointer.y;
        if (Math.hypot(dx, dy) > 20)
          move(
            Math.abs(dx) > Math.abs(dy)
              ? dx > 0
                ? "right"
                : "left"
              : dy > 0
                ? "down"
                : "up",
          );
        pointer = null;
      });
      state = fresh();
      renderHome();
      renderBoard();
      sync();
    </script>
  </body>
</html>
