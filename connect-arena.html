<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>四子战线</title><style>body{margin:0;background:#10152b;color:#eef4ff;font-family:system-ui}.app{min-height:100vh;display:grid;place-items:center;padding:12px;box-sizing:border-box}.shell{width:min(760px,100%);padding:16px;border:1px solid #46568b;border-radius:18px;background:#1b2242}.top{display:flex;justify-content:space-between;gap:10px}.top h1{margin:0;color:#8de3ff}.board{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;background:#3158ad;padding:10px;border-radius:14px;margin-top:14px}.cell{aspect-ratio:1;border:0;border-radius:50%;background:#10193a;cursor:pointer}.p1{background:#ff5c73}.p2{background:#ffd963}.row{display:flex;gap:7px;margin-top:12px}.card{padding:8px;border:1px solid #4a5990;border-radius:9px}.msg{color:#bfd2ed}@media(max-width:520px){.shell{padding:9px}.board{gap:4px;padding:6px}}</style><main class="app"><div class="shell"><div class="top"><div><h1>四子战线</h1><div class="msg" id="msg">你先手，连成四子获胜。</div></div><div class="card" id="score">你 0 : 0 AI</div></div><div class="board" id="b"></div><div class="row"><button id="newGame">新局</button><button id="mode">难度：标准</button></div></div></main><script>
let q={g:[],turn:1,me:0,ai:0,hard:false,over:false};const B=document.querySelector('#b'),M=document.querySelector('#msg'),S=document.querySelector('#score');function reset(){q.g=Array.from({length:6},()=>Array(7).fill(0));q.turn=1;q.over=false;draw()}function drop(c,p){for(let r=5;r>=0;r--)if(!q.g[r][c]){q.g[r][c]=p;return r}return-1}function win(r,c,p){for(const[a,b]of[[1,0],[0,1],[1,1],[1,-1]]){let n=1;for(const s of[-1,1])for(let k=1;k<4;k++){let y=r+b*k*s,x=c+a*k*s;if(y<0||x<0||y>=6||x>=7||q.g[y][x]!==p)break;n++}if(n>=4)return true}return false}function play(c){if(q.over||q.turn!==1)return;let r=drop(c,1);if(r<0)return;after(r,c,1);if(!q.over)setTimeout(ai,280)}function after(r,c,p){if(win(r,c,p)){q.over=true;if(p===1)q.me++;else q.ai++;M.textContent=p===1?'胜利！':'AI 获胜';S.textContent=`你 ${q.me} : ${q.ai} AI`}else if(q.g.flat().every(Boolean)){q.over=true;M.textContent='平局'}else q.turn=3-p;draw()}function ai(){let opts=[];for(let c=0;c<7;c++){let r=drop(c,2);if(r>=0){let w=win(r,c,2);q.g[r][c]=0;opts.push({c,w})}}let o=opts.find(x=>x.w);if(!o){for(let c=0;c<7;c++){let r=drop(c,1);if(r>=0){let w=win(r,c,1);q.g[r][c]=0;if(w){o={c};break}}}}if(!o)o=opts.sort((a,b)=>Math.abs(a.c-3)-Math.abs(b.c-3)+(Math.random()-.5)*(q.hard?.4:2))[0];let r=drop(o.c,2);after(r,o.c,2)}function draw(){B.innerHTML=q.g.flatMap((row,r)=>row.map((v,c)=>`<button class="cell p${v}" data-c="${c}"></button>`)).join('');B.querySelectorAll('button').forEach(b=>b.onclick=()=>play(+b.dataset.c))}newGame.onclick=reset;mode.onclick=()=>{q.hard=!q.hard;mode.textContent='难度：'+(q.hard?'高手':'标准')};reset();
</script>
