<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>霓虹贪吃蛇</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0b0d12;
    --panel: #151923;
    --panel-2: #1c2230;
    --line: #2b3445;
    --text: #edf3ff;
    --muted: #91a0b8;
    --green: #4ade80;
    --cyan: #38d9ff;
    --gold: #f8d34b;
    --red: #ff6b6b;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    overflow: hidden;
    background:
      radial-gradient(circle at 20% 10%, rgba(74, 222, 128, 0.12), transparent 28rem),
      radial-gradient(circle at 78% 15%, rgba(56, 217, 255, 0.10), transparent 30rem),
      linear-gradient(145deg, #080a0f 0%, #10131a 50%, #0a0d12 100%);
    color: var(--text);
    font-family: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    touch-action: none;
    user-select: none;
  }

  button {
    font: inherit;
    color: inherit;
    border: 1px solid var(--line);
    background: #202737;
    cursor: pointer;
    transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
  }

  button:hover { background: #2a3346; border-color: #43516a; }
  button:active { transform: scale(0.96); }

  .shell {
    width: min(1180px, 96vw);
    height: min(760px, 94vh);
    display: grid;
    grid-template-columns: minmax(300px, 560px) 320px;
    gap: 18px;
    align-items: stretch;
  }

  .stage {
    min-width: 0;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    gap: 12px;
  }

  .topbar,
  .side,
  .mobile-pad {
    background: rgba(21, 25, 35, 0.88);
    border: 1px solid rgba(145, 160, 184, 0.20);
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.24);
    backdrop-filter: blur(14px);
  }

  .topbar {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .brand h1 {
    margin: 0;
    font-size: clamp(20px, 3vw, 32px);
    line-height: 1;
    letter-spacing: 0;
  }

  .brand p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .icon-btn {
    width: 42px;
    height: 42px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-size: 19px;
  }

  .primary {
    background: #2f8f5b;
    border-color: #4ade80;
    color: #f3fff7;
  }

  .primary:hover { background: #36a669; }

  .board-wrap {
    min-height: 0;
    display: grid;
    place-items: center;
  }

  canvas {
    width: min(100%, 72vh, 560px);
    aspect-ratio: 1;
    height: auto;
    border-radius: 8px;
    border: 1px solid rgba(145, 160, 184, 0.28);
    background: #0c1118;
    box-shadow:
      0 24px 70px rgba(0, 0, 0, 0.42),
      inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }

  .mobile-pad {
    display: none;
    padding: 10px;
    grid-template-columns: repeat(3, 46px);
    grid-template-rows: repeat(2, 40px);
    gap: 8px;
    justify-content: center;
  }

  .mobile-pad button {
    border-radius: 8px;
    font-size: 20px;
  }

  .mobile-pad .up { grid-column: 2; }
  .mobile-pad .left { grid-column: 1; grid-row: 2; }
  .mobile-pad .down { grid-column: 2; grid-row: 2; }
  .mobile-pad .right { grid-column: 3; grid-row: 2; }

  .side {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 0;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .stat {
    background: var(--panel-2);
    border: 1px solid rgba(145, 160, 184, 0.16);
    border-radius: 8px;
    padding: 10px;
    min-width: 0;
  }

  .label {
    color: var(--muted);
    font-size: 12px;
    line-height: 1;
  }

  .value {
    margin-top: 6px;
    font-size: 28px;
    font-weight: 750;
    line-height: 1;
  }

  .value.small { font-size: 21px; }
  .best { color: var(--gold); }
  .combo { color: var(--cyan); }

  .section-title {
    margin: 0 0 8px;
    color: #cbd7ea;
    font-size: 13px;
    font-weight: 700;
  }

  .mode-group {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .mode-group button {
    min-height: 38px;
    border-radius: 8px;
    color: #c8d4e8;
    font-size: 13px;
  }

  .mode-group button.active {
    background: #31415b;
    border-color: var(--cyan);
    color: white;
  }

  .mission {
    background: #111722;
    border: 1px solid rgba(145, 160, 184, 0.16);
    border-radius: 8px;
    padding: 12px;
  }

  .mission strong {
    display: block;
    margin-bottom: 8px;
    font-size: 15px;
  }

  .mission span {
    display: block;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .bar {
    height: 8px;
    margin-top: 10px;
    border-radius: 999px;
    background: #283143;
    overflow: hidden;
  }

  .bar i {
    display: block;
    height: 100%;
    width: 0%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--green), var(--cyan));
    transition: width 180ms ease;
  }

  .legend {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .legend-item {
    display: grid;
    grid-template-columns: 18px 1fr;
    gap: 8px;
    align-items: center;
    color: #c3cede;
    font-size: 13px;
  }

  .swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    box-shadow: 0 0 12px currentColor;
  }

  .swatch.food { color: var(--red); background: var(--red); }
  .swatch.gold { color: var(--gold); background: var(--gold); }
  .swatch.focus { color: var(--cyan); background: var(--cyan); border-radius: 4px; transform: rotate(45deg); }
  .swatch.guard { color: #a78bfa; background: #a78bfa; border-radius: 4px; }

  .status-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    min-height: 28px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 9px;
    border: 1px solid rgba(145, 160, 184, 0.20);
    border-radius: 999px;
    background: #101620;
    color: #d6e1f2;
    font-size: 12px;
  }

  .tip {
    margin-top: auto;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }

  .overlay {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    padding: 24px;
    background: rgba(5, 8, 12, 0.72);
    z-index: 10;
  }

  .dialog {
    width: min(390px, 92vw);
    padding: 24px;
    text-align: center;
    background: #151923;
    border: 1px solid rgba(145, 160, 184, 0.28);
    border-radius: 8px;
    box-shadow: 0 30px 100px rgba(0, 0, 0, 0.45);
  }

  .dialog h2 {
    margin: 0 0 8px;
    font-size: 28px;
  }

  .dialog p {
    margin: 8px 0 18px;
    color: var(--muted);
  }

  .final-score {
    color: var(--gold);
    font-size: 54px;
    font-weight: 800;
    line-height: 1;
  }

  .dialog button {
    min-width: 150px;
    min-height: 44px;
    border-radius: 8px;
  }

  @media (max-width: 900px) {
    body { overflow-x: hidden; overflow-y: auto; align-items: start; padding: 12px 0; }
    .shell {
      height: auto;
      min-height: 100vh;
      grid-template-columns: 1fr;
      width: 84vw;
      max-width: 620px;
      min-width: 0;
    }
    .stage,
    .side,
    .topbar { max-width: 100%; min-width: 0; }
    .side { order: -1; }
    .stats { grid-template-columns: repeat(4, 1fr); }
    .value { font-size: 22px; }
    .mode-group { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .mobile-pad { display: grid; }
    canvas { width: min(100%, 88vmin, 560px); }
  }

  @media (max-width: 560px) {
    .shell { width: min(340px, 84vw); }
    .topbar { grid-template-columns: 1fr; }
    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      justify-content: stretch;
    }
    .icon-btn { min-width: 0; width: auto; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .brand p { white-space: normal; }
  }
</style>
</head>
<body>
  <main class="shell">
    <section class="stage" aria-label="游戏区域">
      <div class="topbar">
        <div class="brand">
          <h1>霓虹贪吃蛇</h1>
          <p id="headline">吃出连击、解锁关卡、用道具救回极限操作。</p>
        </div>
        <div class="actions">
          <button class="icon-btn" id="pauseBtn" title="暂停或继续" aria-label="暂停或继续">Ⅱ</button>
          <button class="icon-btn" id="muteBtn" title="声音开关" aria-label="声音开关">♪</button>
          <button class="icon-btn primary" id="restartBtn" title="重新开始" aria-label="重新开始">↻</button>
        </div>
      </div>

      <div class="board-wrap">
        <canvas id="canvas" width="560" height="560" aria-label="贪吃蛇棋盘"></canvas>
      </div>

      <div class="mobile-pad" aria-label="方向控制">
        <button class="up" data-dir="0,-1" aria-label="向上">↑</button>
        <button class="left" data-dir="-1,0" aria-label="向左">←</button>
        <button class="down" data-dir="0,1" aria-label="向下">↓</button>
        <button class="right" data-dir="1,0" aria-label="向右">→</button>
      </div>
    </section>

    <aside class="side" aria-label="游戏信息">
      <div class="stats">
        <div class="stat">
          <div class="label">分数</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="label">最高</div>
          <div class="value best" id="bestScore">0</div>
        </div>
        <div class="stat">
          <div class="label">关卡</div>
          <div class="value small" id="level">1</div>
        </div>
        <div class="stat">
          <div class="label">连击</div>
          <div class="value small combo" id="combo">x1</div>
        </div>
      </div>

      <div>
        <p class="section-title">难度</p>
        <div class="mode-group" id="modeGroup">
          <button class="active" data-mode="relaxed">轻松</button>
          <button data-mode="arcade">街机</button>
          <button data-mode="expert">高手</button>
        </div>
      </div>

      <div class="mission">
        <strong id="missionTitle">本关目标</strong>
        <span id="missionText">再吃 5 个食物进入下一关。</span>
        <div class="bar" aria-hidden="true"><i id="missionBar"></i></div>
      </div>

      <div>
        <p class="section-title">道具</p>
        <div class="legend">
          <div class="legend-item"><i class="swatch food"></i><span>红果：基础成长，维持节奏</span></div>
          <div class="legend-item"><i class="swatch gold"></i><span>金果：限时高分，拉高连击</span></div>
          <div class="legend-item"><i class="swatch focus"></i><span>蓝晶：短暂慢动作，适合穿缝</span></div>
          <div class="legend-item"><i class="swatch guard"></i><span>护盾：抵消一次撞击</span></div>
        </div>
      </div>

      <div>
        <p class="section-title">状态</p>
        <div class="status-list" id="statusList">
          <span class="pill">准备就绪</span>
        </div>
      </div>

      <div class="tip">
        方向键或 WASD 移动，空格暂停。手机可滑动棋盘或使用方向键。街机和高手难度会出现岩块，高手模式没有穿墙。
      </div>
    </aside>
  </main>

  <div class="overlay" id="overlay">
    <div class="dialog">
      <h2 id="resultTitle">游戏结束</h2>
      <div class="final-score" id="finalScore">0</div>
      <p id="resultText">再来一局，节奏会更准。</p>
      <button class="primary" id="playAgainBtn">再来一局</button>
    </div>
  </div>

<script>
(function () {
  "use strict";

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestScoreEl = document.getElementById("bestScore");
  const levelEl = document.getElementById("level");
  const comboEl = document.getElementById("combo");
  const missionTitleEl = document.getElementById("missionTitle");
  const missionTextEl = document.getElementById("missionText");
  const missionBarEl = document.getElementById("missionBar");
  const statusListEl = document.getElementById("statusList");
  const overlay = document.getElementById("overlay");
  const finalScoreEl = document.getElementById("finalScore");
  const resultTitleEl = document.getElementById("resultTitle");
  const resultTextEl = document.getElementById("resultText");
  const pauseBtn = document.getElementById("pauseBtn");
  const muteBtn = document.getElementById("muteBtn");

  const SIZE = 560;
  const CELLS = 20;
  const CELL = SIZE / CELLS;
  const COMBO_WINDOW = 4200;

  const modes = {
    relaxed: { name: "轻松", baseSpeed: 135, minSpeed: 78, wrap: true, hazards: false, hazardStep: 0, scoreKey: "snake_neon_best_relaxed" },
    arcade: { name: "街机", baseSpeed: 112, minSpeed: 54, wrap: true, hazards: true, hazardStep: 2, scoreKey: "snake_neon_best_arcade" },
    expert: { name: "高手", baseSpeed: 92, minSpeed: 42, wrap: false, hazards: true, hazardStep: 3, scoreKey: "snake_neon_best_expert" }
  };

  const foodTypes = {
    normal: { label: "红果", color: "#ff6b6b", glow: "rgba(255, 107, 107, 0.35)", points: 10, grow: 1, ttl: 0 },
    gold: { label: "金果", color: "#f8d34b", glow: "rgba(248, 211, 75, 0.42)", points: 35, grow: 2, ttl: 7600 },
    focus: { label: "蓝晶", color: "#38d9ff", glow: "rgba(56, 217, 255, 0.38)", points: 15, grow: 1, ttl: 9200 },
    guard: { label: "护盾", color: "#a78bfa", glow: "rgba(167, 139, 250, 0.36)", points: 12, grow: 1, ttl: 9800 }
  };

  let audioCtx;
  let muted = localStorage.getItem("snake_neon_muted") === "1";
  let state;
  let activeMode = "relaxed";
  let lastFrame = performance.now();
  let moveCarry = 0;
  let particles = [];
  let floaters = [];

  function freshState() {
    const mid = Math.floor(CELLS / 2);
    return {
      snake: [
        { x: mid, y: mid },
        { x: mid - 1, y: mid },
        { x: mid - 2, y: mid }
      ],
      direction: { x: 1, y: 0 },
      nextDirection: { x: 1, y: 0 },
      food: null,
      obstacles: [],
      score: 0,
      best: Number(localStorage.getItem(modes[activeMode].scoreKey)) || 0,
      level: 1,
      eaten: 0,
      combo: 1,
      comboUntil: 0,
      focusUntil: 0,
      shieldUntil: 0,
      feverUntil: 0,
      running: true,
      paused: false,
      over: false,
      shake: 0,
      levelFlash: 0
    };
  }

  function startGame() {
    state = freshState();
    moveCarry = 0;
    particles = [];
    floaters = [];
    overlay.style.display = "none";
    updateObstacles();
    spawnFood("normal");
    updateHud();
    draw();
  }

  function initAudio() {
    if (muted || audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function beep(freq, duration, type, volume) {
    if (muted || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const now = audioCtx.currentTime;
    osc.type = type || "sine";
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(volume || 0.04, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + duration);
  }

  function chime(base) {
    beep(base, 0.07, "square", 0.035);
    setTimeout(() => beep(base * 1.5, 0.08, "triangle", 0.028), 45);
  }

  function currentSpeed(now) {
    const mode = modes[activeMode];
    let speed = mode.baseSpeed - (state.level - 1) * 6;
    if (state.combo >= 4) speed -= 5;
    if (state.feverUntil > now) speed -= 10;
    if (state.focusUntil > now) speed += 38;
    return Math.max(mode.minSpeed, speed);
  }

  function isSame(a, b) {
    return a.x === b.x && a.y === b.y;
  }

  function isOpposite(a, b) {
    return a.x + b.x === 0 && a.y + b.y === 0;
  }

  function wrapCell(cell) {
    return {
      x: (cell.x + CELLS) % CELLS,
      y: (cell.y + CELLS) % CELLS
    };
  }

  function randomCell() {
    return {
      x: Math.floor(Math.random() * CELLS),
      y: Math.floor(Math.random() * CELLS)
    };
  }

  function isBlocked(cell, includeFood) {
    if (state.snake.some(part => isSame(part, cell))) return true;
    if (state.obstacles.some(part => isSame(part, cell))) return true;
    if (includeFood && state.food && isSame(state.food, cell)) return true;
    const mid = Math.floor(CELLS / 2);
    return Math.abs(cell.x - mid) <= 2 && Math.abs(cell.y - mid) <= 2 && state.eaten === 0;
  }

  function openCell(includeFood) {
    for (let i = 0; i < 600; i++) {
      const cell = randomCell();
      if (!isBlocked(cell, includeFood)) return cell;
    }
    return { x: 1, y: 1 };
  }

  function pickFoodType(forced) {
    if (forced) return forced;
    const roll = Math.random();
    if (state.eaten > 2 && roll < 0.12) return "gold";
    if (state.eaten > 4 && roll < 0.22) return "focus";
    if (state.eaten > 6 && roll < 0.31) return "guard";
    return "normal";
  }

  function spawnFood(forced) {
    const type = pickFoodType(forced);
    const cell = openCell(false);
    state.food = {
      x: cell.x,
      y: cell.y,
      type,
      born: performance.now()
    };
  }

  function updateObstacles() {
    const mode = modes[activeMode];
    if (!mode.hazards) {
      state.obstacles = [];
      return;
    }

    const target = Math.min(36, Math.max(4, state.level * mode.hazardStep + 2));
    const obstacles = [];
    const reserve = new Set(state.snake.map(cell => `${cell.x},${cell.y}`));
    reserve.add(`${Math.floor(CELLS / 2)},${Math.floor(CELLS / 2)}`);

    while (obstacles.length < target) {
      const seed = randomCell();
      if (reserve.has(`${seed.x},${seed.y}`)) continue;
      const nearCenter = Math.abs(seed.x - CELLS / 2) < 4 && Math.abs(seed.y - CELLS / 2) < 4;
      if (nearCenter && obstacles.length < 10) continue;
      const clusterSize = Math.random() < 0.35 ? 2 : 1;
      const cluster = [seed];
      if (clusterSize === 2) {
        const dirs = [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }];
        const dir = dirs[Math.floor(Math.random() * dirs.length)];
        cluster.push(wrapCell({ x: seed.x + dir.x, y: seed.y + dir.y }));
      }
      for (const cell of cluster) {
        const key = `${cell.x},${cell.y}`;
        if (!reserve.has(key) && !obstacles.some(item => isSame(item, cell)) && obstacles.length < target) {
          obstacles.push(cell);
        }
      }
    }
    state.obstacles = obstacles;
  }

  function queueDirection(dx, dy) {
    if (state.over) return;
    const next = { x: dx, y: dy };
    if (isOpposite(next, state.direction) || isOpposite(next, state.nextDirection)) return;
    if (isSame(next, state.nextDirection)) return;
    state.nextDirection = next;
  }

  function tick(now) {
    if (!state.running || state.paused || state.over) return;

    if (state.food && foodTypes[state.food.type].ttl) {
      const config = foodTypes[state.food.type];
      if (now - state.food.born > config.ttl) spawnFood("normal");
    }

    state.direction = { ...state.nextDirection };
    const head = state.snake[0];
    let newHead = { x: head.x + state.direction.x, y: head.y + state.direction.y };
    const mode = modes[activeMode];
    let wallHit = false;

    if (newHead.x < 0 || newHead.x >= CELLS || newHead.y < 0 || newHead.y >= CELLS) {
      if (mode.wrap || state.shieldUntil > now) {
        newHead = wrapCell(newHead);
      } else {
        wallHit = true;
      }
    }

    const willEat = state.food && newHead.x === state.food.x && newHead.y === state.food.y;
    const bodyToCheck = willEat ? state.snake : state.snake.slice(0, -1);
    const bodyHit = bodyToCheck.some(part => isSame(part, newHead));
    const obstacleHit = state.obstacles.some(part => isSame(part, newHead));

    if (wallHit || bodyHit || obstacleHit) {
      if (tryShield(now)) return;
      endGame(wallHit ? "撞上边界" : obstacleHit ? "撞上岩块" : "咬到自己");
      return;
    }

    state.snake.unshift(newHead);

    if (willEat) {
      eatFood(now);
    } else {
      state.snake.pop();
    }
  }

  function tryShield(now) {
    if (state.shieldUntil <= now) return false;
    state.shieldUntil = 0;
    state.shake = 12;
    state.score = Math.max(0, state.score - 8);
    state.direction = { x: -state.direction.x, y: -state.direction.y };
    state.nextDirection = { ...state.direction };
    addFloater("护盾抵消", state.snake[0], "#a78bfa");
    burst(state.snake[0], "#a78bfa", 26);
    beep(180, 0.15, "sawtooth", 0.05);
    updateHud();
    return true;
  }

  function eatFood(now) {
    const food = state.food;
    const config = foodTypes[food.type];
    const wasComboActive = now <= state.comboUntil;
    state.combo = wasComboActive ? Math.min(12, state.combo + 1) : 1;
    state.comboUntil = now + COMBO_WINDOW;

    if (state.combo >= 7) state.feverUntil = now + 5200;
    if (food.type === "focus") state.focusUntil = now + 6500;
    if (food.type === "guard") state.shieldUntil = now + 11500;

    const comboMultiplier = 1 + Math.min(6, state.combo - 1) * 0.25;
    const feverMultiplier = state.feverUntil > now ? 1.5 : 1;
    const gained = Math.round(config.points * comboMultiplier * feverMultiplier);
    state.score += gained;
    state.eaten += 1;

    for (let i = 1; i < config.grow; i++) {
      const tail = state.snake[state.snake.length - 1];
      state.snake.push({ ...tail });
    }

    burst(food, config.color, food.type === "gold" ? 34 : 20);
    addFloater(`+${gained}`, food, config.color);
    chime(food.type === "gold" ? 760 : 540 + state.combo * 20);

    const nextLevel = Math.floor(state.eaten / 5) + 1;
    if (nextLevel !== state.level) {
      state.level = nextLevel;
      state.levelFlash = 80;
      updateObstacles();
      addFloater(`第 ${state.level} 关`, state.snake[0], "#38d9ff");
      beep(900, 0.12, "triangle", 0.04);
    }

    spawnFood();
    updateHud();
  }

  function endGame(reason) {
    state.over = true;
    state.running = false;
    state.shake = 20;
    burst(state.snake[0], "#ff6b6b", 42);
    beep(130, 0.28, "triangle", 0.06);

    const bestKey = modes[activeMode].scoreKey;
    const newBest = state.score > state.best;
    if (newBest) {
      state.best = state.score;
      localStorage.setItem(bestKey, String(state.best));
    }

    finalScoreEl.textContent = state.score;
    resultTitleEl.textContent = newBest ? "新纪录" : "游戏结束";
    resultTextEl.textContent = `${reason}。本局吃到 ${state.eaten} 个食物，最高连击 x${state.combo}。`;
    overlay.style.display = "grid";
    updateHud();
  }

  function togglePause() {
    if (state.over) return;
    state.paused = !state.paused;
    pauseBtn.textContent = state.paused ? "▶" : "Ⅱ";
    draw();
  }

  function burst(cell, color, count) {
    const center = cellToPixel(cell);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.2 + Math.random() * 4.2;
      particles.push({
        x: center.x,
        y: center.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.018 + Math.random() * 0.036,
        size: 2 + Math.random() * 3,
        color
      });
    }
  }

  function addFloater(text, cell, color) {
    const center = cellToPixel(cell);
    floaters.push({ text, x: center.x, y: center.y, life: 1, color });
  }

  function cellToPixel(cell) {
    return {
      x: cell.x * CELL + CELL / 2,
      y: cell.y * CELL + CELL / 2
    };
  }

  function updateEffects(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.985;
      p.vy *= 0.985;
      p.life -= p.decay * dt * 0.9;
      if (p.life <= 0) particles.splice(i, 1);
    }

    for (let i = floaters.length - 1; i >= 0; i--) {
      const f = floaters[i];
      f.y -= 0.9 * dt;
      f.life -= 0.018 * dt;
      if (f.life <= 0) floaters.splice(i, 1);
    }

    if (state.shake > 0) state.shake = Math.max(0, state.shake - dt);
    if (state.levelFlash > 0) state.levelFlash = Math.max(0, state.levelFlash - dt);
  }

  function updateHud() {
    scoreEl.textContent = state.score;
    bestScoreEl.textContent = state.best;
    levelEl.textContent = state.level;
    comboEl.textContent = `x${state.combo}`;

    const left = 5 - (state.eaten % 5 || 0);
    const progress = ((state.eaten % 5) / 5) * 100;
    missionTitleEl.textContent = `第 ${state.level} 关目标`;
    missionTextEl.textContent = left === 5 && state.eaten > 0
      ? "新关卡开始，岩块布局已经刷新。"
      : `再吃 ${left} 个食物进入下一关。连击越高，奖励越厚。`;
    missionBarEl.style.width = `${progress}%`;

    const now = performance.now();
    const tags = [];
    tags.push(`<span class="pill">${modes[activeMode].name}模式</span>`);
    if (state.focusUntil > now) tags.push(`<span class="pill">慢动作 ${Math.ceil((state.focusUntil - now) / 1000)}s</span>`);
    if (state.shieldUntil > now) tags.push(`<span class="pill">护盾 ${Math.ceil((state.shieldUntil - now) / 1000)}s</span>`);
    if (state.feverUntil > now) tags.push(`<span class="pill">狂热 ${Math.ceil((state.feverUntil - now) / 1000)}s</span>`);
    if (state.comboUntil > now && state.combo > 1) tags.push(`<span class="pill">连击窗口 ${Math.ceil((state.comboUntil - now) / 1000)}s</span>`);
    statusListEl.innerHTML = tags.join("");
    pauseBtn.textContent = state.paused ? "▶" : "Ⅱ";
    muteBtn.textContent = muted ? "×" : "♪";
  }

  function draw() {
    const now = performance.now();
    ctx.save();
    const shakeX = state.shake ? (Math.random() - 0.5) * state.shake : 0;
    const shakeY = state.shake ? (Math.random() - 0.5) * state.shake : 0;
    ctx.translate(shakeX, shakeY);
    drawBackground(now);
    drawObstacles();
    drawFood(now);
    drawSnake(now);
    drawParticles();
    drawFloaters();
    if (state.levelFlash > 0) drawLevelFlash();
    if (state.paused) drawPause();
    ctx.restore();
  }

  function drawBackground(now) {
    const grad = ctx.createLinearGradient(0, 0, SIZE, SIZE);
    grad.addColorStop(0, "#0d141d");
    grad.addColorStop(1, "#111820");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, SIZE, SIZE);

    ctx.strokeStyle = "rgba(255, 255, 255, 0.035)";
    ctx.lineWidth = 1;
    for (let i = 1; i < CELLS; i++) {
      const pos = i * CELL;
      ctx.beginPath();
      ctx.moveTo(pos, 0);
      ctx.lineTo(pos, SIZE);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, pos);
      ctx.lineTo(SIZE, pos);
      ctx.stroke();
    }

    if (state.feverUntil > now) {
      ctx.save();
      ctx.globalAlpha = 0.14 + Math.sin(now / 90) * 0.04;
      ctx.strokeStyle = "#f8d34b";
      ctx.lineWidth = 8;
      ctx.strokeRect(4, 4, SIZE - 8, SIZE - 8);
      ctx.restore();
    }
  }

  function drawObstacles() {
    for (const rock of state.obstacles) {
      const x = rock.x * CELL;
      const y = rock.y * CELL;
      ctx.save();
      ctx.fillStyle = "#48515f";
      ctx.shadowColor = "rgba(0, 0, 0, 0.45)";
      ctx.shadowBlur = 8;
      roundedRect(x + 5, y + 5, CELL - 10, CELL - 10, 6);
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = "rgba(255, 255, 255, 0.16)";
      roundedRect(x + 9, y + 8, CELL * 0.28, 3, 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawFood(now) {
    const food = state.food;
    if (!food) return;
    const config = foodTypes[food.type];
    const center = cellToPixel(food);
    const pulse = 1 + Math.sin(now / 160) * 0.12;
    const ttl = config.ttl ? Math.max(0, 1 - (now - food.born) / config.ttl) : 1;

    ctx.save();
    const glow = ctx.createRadialGradient(center.x, center.y, CELL * 0.15, center.x, center.y, CELL * 0.8);
    glow.addColorStop(0, config.glow);
    glow.addColorStop(1, "rgba(0, 0, 0, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(center.x, center.y, CELL * 0.82, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 0.45 + ttl * 0.55;
    ctx.fillStyle = config.color;
    ctx.shadowColor = config.color;
    ctx.shadowBlur = 16;

    if (food.type === "gold") {
      drawStar(center.x, center.y, CELL * 0.34 * pulse, CELL * 0.16 * pulse, 5);
    } else if (food.type === "focus") {
      ctx.translate(center.x, center.y);
      ctx.rotate(Math.PI / 4 + now / 700);
      roundedRect(-CELL * 0.25, -CELL * 0.25, CELL * 0.5, CELL * 0.5, 5);
      ctx.fill();
    } else if (food.type === "guard") {
      drawHex(center.x, center.y, CELL * 0.34 * pulse);
    } else {
      ctx.beginPath();
      ctx.arc(center.x, center.y, CELL * 0.31 * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#ffd1d1";
      ctx.beginPath();
      ctx.arc(center.x - 4, center.y - 5, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSnake(now) {
    for (let i = state.snake.length - 1; i >= 0; i--) {
      const part = state.snake[i];
      const x = part.x * CELL;
      const y = part.y * CELL;
      const t = i / Math.max(1, state.snake.length - 1);
      const isHead = i === 0;
      const hueBoost = state.feverUntil > now ? Math.sin(now / 90 + i) * 24 : 0;

      ctx.save();
      ctx.globalAlpha = 1 - t * 0.20;
      ctx.fillStyle = isHead ? "#6eff9c" : `hsl(${145 + hueBoost}, ${78 - t * 18}%, ${54 - t * 12}%)`;
      ctx.shadowColor = isHead ? "#4ade80" : "rgba(74, 222, 128, 0.72)";
      ctx.shadowBlur = isHead ? 18 : 7;
      roundedRect(x + 3, y + 3, CELL - 6, CELL - 6, isHead ? 9 : 7);
      ctx.fill();

      if (isHead) drawEyes(x, y);
      ctx.restore();
    }
  }

  function drawEyes(x, y) {
    const dir = state.direction;
    const spots = [];
    if (dir.x === 1) {
      spots.push([x + CELL - 9, y + 9], [x + CELL - 9, y + CELL - 9]);
    } else if (dir.x === -1) {
      spots.push([x + 9, y + 9], [x + 9, y + CELL - 9]);
    } else if (dir.y === -1) {
      spots.push([x + 9, y + 9], [x + CELL - 9, y + 9]);
    } else {
      spots.push([x + 9, y + CELL - 9], [x + CELL - 9, y + CELL - 9]);
    }

    for (const [ex, ey] of spots) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#f9fffb";
      ctx.beginPath();
      ctx.arc(ex, ey, 3.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#162018";
      ctx.beginPath();
      ctx.arc(ex + dir.x * 1.2, ey + dir.y * 1.2, 1.55, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawFloaters() {
    ctx.save();
    ctx.textAlign = "center";
    ctx.font = "700 18px Microsoft YaHei, Segoe UI, sans-serif";
    for (const f of floaters) {
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = f.color;
      ctx.shadowColor = "rgba(0, 0, 0, 0.65)";
      ctx.shadowBlur = 6;
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.restore();
  }

  function drawLevelFlash() {
    ctx.save();
    ctx.globalAlpha = Math.min(0.28, state.levelFlash / 160);
    ctx.fillStyle = "#38d9ff";
    ctx.fillRect(0, 0, SIZE, SIZE);
    ctx.restore();
  }

  function drawPause() {
    ctx.save();
    ctx.fillStyle = "rgba(5, 8, 12, 0.56)";
    ctx.fillRect(0, 0, SIZE, SIZE);
    ctx.fillStyle = "#edf3ff";
    ctx.textAlign = "center";
    ctx.font = "800 38px Microsoft YaHei, Segoe UI, sans-serif";
    ctx.fillText("已暂停", SIZE / 2, SIZE / 2);
    ctx.font = "500 16px Microsoft YaHei, Segoe UI, sans-serif";
    ctx.fillStyle = "#91a0b8";
    ctx.fillText("按空格或点击播放继续", SIZE / 2, SIZE / 2 + 34);
    ctx.restore();
  }

  function roundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawStar(cx, cy, outer, inner, points) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const radius = i % 2 === 0 ? outer : inner;
      const angle = -Math.PI / 2 + i * Math.PI / points;
      const x = cx + Math.cos(angle) * radius;
      const y = cy + Math.sin(angle) * radius;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  }

  function drawHex(cx, cy, radius) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 6 + i * Math.PI / 3;
      const x = cx + Math.cos(angle) * radius;
      const y = cy + Math.sin(angle) * radius;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "rgba(255, 255, 255, 0.45)";
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function frame(now) {
    const dt = Math.min(3, (now - lastFrame) / 16.67);
    lastFrame = now;

    if (!state.paused && !state.over) {
      moveCarry += now - (lastFrame - dt * 16.67);
      const speed = currentSpeed(now);
      while (moveCarry >= speed) {
        tick(now);
        moveCarry -= speed;
        if (state.over) break;
      }
    }

    updateEffects(dt);
    updateHud();
    draw();
    requestAnimationFrame(frame);
  }

  document.addEventListener("keydown", event => {
    initAudio();
    if (event.code === "Space") {
      event.preventDefault();
      togglePause();
      return;
    }

    const key = event.key.toLowerCase();
    if (key === "arrowup" || key === "w") queueDirection(0, -1);
    if (key === "arrowdown" || key === "s") queueDirection(0, 1);
    if (key === "arrowleft" || key === "a") queueDirection(-1, 0);
    if (key === "arrowright" || key === "d") queueDirection(1, 0);
  });

  let touchStart = null;
  canvas.addEventListener("touchstart", event => {
    initAudio();
    const t = event.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
    event.preventDefault();
  }, { passive: false });

  canvas.addEventListener("touchend", event => {
    if (!touchStart) return;
    const t = event.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const ax = Math.abs(dx);
    const ay = Math.abs(dy);
    if (Math.max(ax, ay) > 18) {
      if (ax > ay) queueDirection(dx > 0 ? 1 : -1, 0);
      else queueDirection(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
    event.preventDefault();
  }, { passive: false });

  document.querySelector(".mobile-pad").addEventListener("click", event => {
    const btn = event.target.closest("button[data-dir]");
    if (!btn) return;
    initAudio();
    const [dx, dy] = btn.dataset.dir.split(",").map(Number);
    queueDirection(dx, dy);
  });

  pauseBtn.addEventListener("click", () => {
    initAudio();
    togglePause();
  });

  muteBtn.addEventListener("click", () => {
    muted = !muted;
    localStorage.setItem("snake_neon_muted", muted ? "1" : "0");
    if (!muted) initAudio();
    updateHud();
  });

  document.getElementById("restartBtn").addEventListener("click", () => {
    initAudio();
    startGame();
  });

  document.getElementById("playAgainBtn").addEventListener("click", () => {
    initAudio();
    startGame();
  });

  document.getElementById("modeGroup").addEventListener("click", event => {
    const btn = event.target.closest("button[data-mode]");
    if (!btn) return;
    initAudio();
    activeMode = btn.dataset.mode;
    document.querySelectorAll("#modeGroup button").forEach(item => item.classList.toggle("active", item === btn));
    startGame();
  });

  startGame();
  requestAnimationFrame(time => {
    lastFrame = time;
    requestAnimationFrame(frame);
  });
})();
</script>
</body>
</html>
