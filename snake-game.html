<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#070b18" />
    <title>霓虹贪吃蛇：星环远征</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f0f7ff;
        --muted: #91a2bc;
        --cyan: #38ddff;
        --pink: #ff5ba7;
        --gold: #ffd65c;
        --green: #71ef9c;
        --violet: #a68bff;
        --panel: rgba(8, 14, 30, 0.92);
        --line: rgba(155, 210, 255, 0.18);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #040712;
        color: var(--ink);
        font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      }
      body {
        overflow: hidden;
      }
      button {
        font: inherit;
      }
      .app {
        height: 100vh;
        height: 100dvh;
        padding: 10px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 9px;
        background:
          radial-gradient(
            circle at 15% 15%,
            rgba(49, 214, 255, 0.12),
            transparent 28%
          ),
          radial-gradient(
            circle at 86% 82%,
            rgba(255, 76, 165, 0.1),
            transparent 28%
          );
      }
      .topbar,
      .arena,
      .side,
      .card,
      .overlay-card,
      .modal-card {
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
      }
      .topbar {
        min-height: 62px;
        border-radius: 16px;
        padding: 8px 13px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .logo {
        width: 42px;
        height: 42px;
        border-radius: 13px;
        display: grid;
        place-items: center;
        background: linear-gradient(145deg, var(--cyan), var(--violet));
        color: #071020;
        font-weight: 1000;
        font-size: 23px;
        box-shadow: 0 0 25px rgba(56, 221, 255, 0.2);
      }
      h1 {
        margin: 0;
        font-size: clamp(20px, 2.5vw, 30px);
        line-height: 1;
      }
      .brand b {
        color: var(--cyan);
      }
      .brand p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
      }
      .actions {
        display: flex;
        gap: 6px;
      }
      .btn,
      .icon-btn,
      .choice,
      .upgrade-card,
      .lab-btn {
        border: 1px solid var(--line);
        border-radius: 11px;
        background: rgba(24, 38, 68, 0.9);
        color: var(--ink);
        font-weight: 900;
        cursor: pointer;
        transition: 0.15s;
      }
      .btn:hover,
      .icon-btn:hover,
      .choice:hover,
      .upgrade-card:hover,
      .lab-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(56, 221, 255, 0.75);
      }
      .btn:disabled,
      .icon-btn:disabled,
      .lab-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none;
      }
      .btn {
        padding: 9px 14px;
      }
      .btn.primary {
        border: 0;
        background: linear-gradient(135deg, var(--cyan), #6a8dff);
        color: #07101e;
      }
      .icon-btn {
        width: 40px;
        height: 40px;
      }
      .icon-btn.active {
        color: var(--gold);
        border-color: var(--gold);
      }
      .layout {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 330px;
        gap: 9px;
      }
      .arena,
      .side {
        min-height: 0;
        min-width: 0;
        border-radius: 16px;
      }
      .arena {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        padding: 8px;
        gap: 7px;
      }
      .hud {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 5px;
      }
      .hud div {
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.025);
      }
      .hud span {
        display: block;
        color: var(--muted);
        font-size: 8px;
        font-weight: 900;
      }
      .hud strong {
        display: block;
        font-size: 16px;
        margin-top: 2px;
      }
      .hud .score strong {
        color: var(--gold);
      }
      .board-wrap {
        position: relative;
        min-height: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 13px;
        background: #060b1b;
      }
      canvas {
        display: block;
        width: min(100%, calc(100vh - 153px));
        height: min(100%, calc(100vh - 153px));
        max-width: 650px;
        max-height: 650px;
        aspect-ratio: 1;
        touch-action: none;
      }
      .mission-track {
        position: absolute;
        left: 50%;
        bottom: 9px;
        transform: translateX(-50%);
        width: min(62%, 500px);
        padding: 6px 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(4, 8, 20, 0.82);
        pointer-events: none;
      }
      .mission-track div {
        height: 8px;
        background: rgba(255, 255, 255, 0.09);
        border-radius: 8px;
        overflow: hidden;
      }
      .mission-track i {
        display: block;
        height: 100%;
        width: 0;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          var(--cyan),
          var(--green),
          var(--gold)
        );
        transition: width 0.2s;
      }
      .mission-track span {
        position: absolute;
        inset: 2px;
        text-align: center;
        font-size: 9px;
        font-weight: 900;
      }
      .pulse-btn {
        position: absolute;
        right: 14px;
        bottom: 14px;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 2px solid rgba(56, 221, 255, 0.65);
        background: radial-gradient(
          circle at 35% 30%,
          rgba(255, 255, 255, 0.2),
          rgba(29, 71, 105, 0.88)
        );
        color: #d8faff;
        font-weight: 1000;
        z-index: 4;
      }
      .pulse-btn small {
        display: block;
        font-size: 8px;
        color: #9dd9e3;
      }
      .banner {
        position: absolute;
        left: 50%;
        top: 20px;
        transform: translate(-50%, -10px);
        padding: 8px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(5, 10, 24, 0.9);
        font-size: 11px;
        font-weight: 900;
        opacity: 0;
        transition: 0.2s;
        pointer-events: none;
      }
      .banner.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      .pad {
        display: none;
        position: absolute;
        left: 14px;
        bottom: 13px;
        grid-template-columns: repeat(3, 44px);
        grid-template-rows: repeat(2, 40px);
        gap: 3px;
        z-index: 4;
      }
      .pad button {
        border: 1px solid var(--line);
        border-radius: 9px;
        background: rgba(9, 20, 39, 0.72);
        color: #dff8ff;
        font-weight: 1000;
      }
      .pad .up {
        grid-column: 2;
      }
      .pad .left {
        grid-column: 1;
        grid-row: 2;
      }
      .pad .down {
        grid-column: 2;
        grid-row: 2;
      }
      .pad .right {
        grid-column: 3;
        grid-row: 2;
      }
      .side {
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 7px;
        overflow: auto;
      }
      .card {
        padding: 10px;
        border-radius: 13px;
      }
      .objective {
        display: flex;
        gap: 9px;
        align-items: center;
      }
      .objective-icon {
        width: 39px;
        height: 39px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-size: 19px;
        background: rgba(56, 221, 255, 0.12);
      }
      .objective b {
        display: block;
        font-size: 12px;
      }
      .objective small {
        display: block;
        color: var(--muted);
        font-size: 9px;
        line-height: 1.35;
        margin-top: 2px;
      }
      .bar {
        height: 7px;
        margin-top: 7px;
        border-radius: 8px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }
      .bar i {
        display: block;
        width: 0;
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--violet),
          var(--cyan),
          var(--gold)
        );
      }
      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 7px;
      }
      .card-head strong {
        font-size: 11px;
      }
      .eyebrow {
        font-size: 8px;
        color: var(--cyan);
        font-weight: 1000;
        letter-spacing: 0.08em;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .chip {
        padding: 5px 7px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
        font-size: 9px;
      }
      .chip.hot {
        color: #ffdd78;
        border-color: rgba(255, 214, 92, 0.55);
      }
      .ranking {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .rank {
        display: grid;
        grid-template-columns: 20px 1fr auto;
        gap: 6px;
        padding: 5px 6px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.025);
        font-size: 9px;
      }
      .rank span {
        color: var(--muted);
      }
      .rank.me {
        border: 1px solid rgba(56, 221, 255, 0.35);
        color: var(--cyan);
      }
      .legend {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }
      .legend div {
        padding: 5px;
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.025);
        font-size: 9px;
      }
      .legend b {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 5px;
      }
      .overlay,
      .modal {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        padding: 15px;
        background: rgba(3, 6, 16, 0.76);
        backdrop-filter: blur(7px);
      }
      .overlay.hidden,
      .modal.hidden {
        display: none;
      }
      .overlay-card,
      .modal-card {
        width: min(900px, 96%);
        max-height: 94%;
        overflow: auto;
        border-radius: 20px;
        padding: 17px;
      }
      .overlay-title {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .overlay-title h2 {
        margin: 0;
        font-size: 26px;
      }
      .overlay-title h2 b {
        color: var(--cyan);
      }
      .overlay-title p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 10px;
      }
      .save-pill {
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--muted);
        font-size: 9px;
      }
      .setup {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 11px;
      }
      .section {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.018);
      }
      .section h3 {
        font-size: 11px;
        margin: 0 0 7px;
      }
      .mode-grid,
      .frame-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .choice {
        min-height: 62px;
        text-align: left;
        padding: 8px;
      }
      .choice b {
        display: block;
        font-size: 11px;
      }
      .choice small {
        display: block;
        color: var(--muted);
        font-size: 8px;
        line-height: 1.35;
        margin-top: 3px;
      }
      .choice.selected {
        border-color: var(--cyan);
        background: rgba(56, 221, 255, 0.09);
      }
      .sector-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 5px;
      }
      .sector {
        min-height: 53px;
        text-align: center;
        padding: 5px;
      }
      .sector b {
        font-size: 12px;
      }
      .sector-stars {
        display: block;
        min-height: 11px;
        margin-top: 3px;
        color: var(--gold);
        font-size: 8px;
        letter-spacing: 0;
      }
      .sector.locked {
        opacity: 0.3;
      }
      .sector.completed {
        border-color: rgba(255, 214, 92, 0.36);
      }
      .sector-detail {
        margin-top: 7px;
        padding: 9px;
        border: 1px solid rgba(56, 221, 255, 0.16);
        border-radius: 10px;
        background: rgba(4, 10, 24, 0.55);
      }
      .sector-detail > b {
        display: block;
        color: var(--ink);
        font-size: 11px;
      }
      .sector-detail p {
        margin: 4px 0 7px;
        color: var(--muted);
        font-size: 8px;
        line-height: 1.45;
      }
      .challenge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .challenge-chip {
        padding: 4px 6px;
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 8px;
      }
      .challenge-chip.done {
        color: var(--gold);
        background: rgba(255, 214, 92, 0.09);
      }
      .lab {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .lab-btn {
        padding: 7px;
        text-align: left;
      }
      .lab-btn b {
        font-size: 10px;
      }
      .lab-btn span {
        display: block;
        color: var(--muted);
        font-size: 8px;
        margin-top: 2px;
      }
      .lab-btn em {
        display: block;
        color: var(--gold);
        font-size: 8px;
        font-style: normal;
        margin-top: 4px;
      }
      .archive-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }
      .archive-chip {
        padding: 7px;
        border: 1px solid var(--line);
        border-radius: 9px;
        color: var(--muted);
        font-size: 8px;
      }
      .archive-chip b {
        display: block;
        color: var(--ink);
        font-size: 11px;
        margin-bottom: 3px;
      }
      .save-tools {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 7px;
      }
      .start-row {
        display: flex;
        justify-content: flex-end;
        gap: 7px;
        margin-top: 10px;
      }
      #setupView > .start-row {
        position: sticky;
        bottom: -1px;
        z-index: 3;
        padding: 9px 0 2px;
        background: rgba(8, 15, 33, 0.96);
        box-shadow: 0 -10px 18px rgba(3, 7, 18, 0.72);
      }
      .boss-line {
        display: grid;
        grid-template-columns: auto minmax(60px, 1fr) auto;
        align-items: center;
        gap: 7px;
        margin-top: 7px;
        color: #ff9bb8;
        font-size: 8px;
        font-weight: 900;
      }
      .boss-line.hidden {
        display: none;
      }
      .boss-line div {
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }
      .boss-line i {
        display: block;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, #ff4f7d, #ffd65c);
      }
      .result {
        display: none;
        text-align: center;
      }
      .result.show {
        display: block;
      }
      .result h2 {
        margin: 0;
        font-size: 27px;
      }
      .result p {
        color: var(--muted);
        font-size: 10px;
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        margin: 12px 0;
      }
      .result-grid div {
        padding: 9px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
      }
      .result-grid b {
        display: block;
        color: var(--gold);
        font-size: 18px;
      }
      .result-grid span {
        font-size: 8px;
        color: var(--muted);
      }
      .modal-card {
        width: min(700px, 94%);
      }
      .modal-card h2 {
        margin: 3px 0 11px;
      }
      .upgrade-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
      }
      .upgrade-card {
        min-height: 128px;
        padding: 12px;
        text-align: left;
      }
      .upgrade-card i {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        font-style: normal;
        margin-bottom: 8px;
      }
      .upgrade-card strong {
        display: block;
        font-size: 12px;
      }
      .upgrade-card p {
        color: var(--muted);
        font-size: 9px;
        line-height: 1.4;
      }
      .upgrade-card.rare {
        border-color: var(--violet);
      }
      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) 210px;
        }
        .side {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }
        .side .rank-card {
          display: none;
        }
        .pad {
          display: grid;
        }
        .setup {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 560px) {
        .app {
          padding: 5px;
          gap: 5px;
        }
        .topbar {
          min-height: 51px;
          padding: 5px 8px;
        }
        .logo {
          width: 35px;
          height: 35px;
        }
        .brand p {
          display: none;
        }
        .actions .btn {
          display: none;
        }
        .icon-btn {
          width: 35px;
          height: 35px;
        }
        .layout {
          grid-template-rows: minmax(0, 1fr) 190px;
          gap: 5px;
        }
        .arena {
          padding: 4px;
        }
        .hud {
          grid-template-columns: repeat(3, 1fr);
          gap: 3px;
        }
        .hud div {
          padding: 4px 6px;
        }
        .hud strong {
          font-size: 13px;
        }
        .side {
          padding: 5px;
          gap: 4px;
        }
        .card {
          padding: 7px;
        }
        .legend {
          display: none;
        }
        canvas {
          width: min(100%, calc(100vw - 20px));
          height: auto;
        }
        .pulse-btn {
          width: 61px;
          height: 61px;
        }
        .pad {
          grid-template-columns: repeat(3, 42px);
          grid-template-rows: repeat(2, 40px);
        }
        .overlay {
          padding: 6px;
        }
        .overlay-card {
          padding: 11px;
        }
        .overlay-title {
          display: block;
        }
        .mode-grid,
        .frame-grid {
          gap: 4px;
        }
        .choice {
          min-height: 54px;
          padding: 6px;
        }
        .sector-grid {
          grid-template-columns: repeat(4, 1fr);
        }
        #setupView > .start-row {
          flex-wrap: wrap;
        }
        #setupView > .start-row .btn {
          flex: 1 1 145px;
        }
        .lab {
          grid-template-columns: 1fr;
        }
        .lab-btn {
          display: flex;
          justify-content: space-between;
        }
        .lab-btn span {
          display: none;
        }
        .upgrade-grid {
          grid-template-columns: 1fr;
        }
        .upgrade-card {
          min-height: 94px;
        }
        .result-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo">蛇</div>
          <div>
            <h1>霓虹贪吃蛇 <b>星环 V4</b></h1>
            <p>三章 18 节点 · 三星挑战 · 协议构筑 · 断点续航</p>
          </div>
        </div>
        <div class="actions">
          <button class="icon-btn" id="pauseBtn">Ⅱ</button
          ><button class="icon-btn" id="muteBtn">音</button
          ><button class="btn" id="homeBtn">远征站</button
          ><button class="icon-btn" id="restartBtn">↻</button>
        </div>
      </header>
      <div class="layout">
        <section class="arena">
          <div class="hud">
            <div class="score">
              <span>得分</span><strong id="score">0</strong>
            </div>
            <div><span>长度</span><strong id="length">4</strong></div>
            <div><span>区段</span><strong id="sector">1</strong></div>
            <div><span>连击</span><strong id="combo">×1</strong></div>
            <div><span>能量</span><strong id="energy">0%</strong></div>
            <div><span>时间</span><strong id="time">00:00</strong></div>
          </div>
          <div class="board-wrap">
            <canvas
              id="canvas"
              width="650"
              height="650"
              aria-label="霓虹贪吃蛇棋盘"
            ></canvas>
            <div class="banner" id="banner">区段开始</div>
            <div class="mission-track">

                C * 0.07,
                0,
                Math.PI * 2,
              );
              ctx.fill();
            }
          });
        for (const p of particles) {
          ctx.globalAlpha = p.life / p.max;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
      }
      function cellRect(c, C, fill, stroke) {
        ctx.fillStyle = fill;
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 2;
        round((c.x + 0.12) * C, (c.y + 0.12) * C, C * 0.76, C * 0.76, C * 0.15);
        ctx.fill();
        ctx.stroke();
      }
      function round(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }
      function rgba(hex, a) {
        const n = parseInt(hex.slice(1), 16);
        return `rgba(${n >> 16},${(n >> 8) & 255},${n & 255},${a})`;
      }
      function burst(c, color) {
        const C = canvas.width / N;
        for (let i = 0; i < 14; i++) {
          const a = Math.random() * Math.PI * 2,
            s = Math.random() * 3 + 1;
          particles.push({
            x: (c.x + 0.5) * C,
            y: (c.y + 0.5) * C,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s,
            r: Math.random() * 3 + 2,
            life: 500,
            max: 500,
            color,
          });
        }
      }
      function updateFx(dt) {
        for (const p of particles) {
          p.life -= dt;
          p.x += p.vx * dt * 0.08;
          p.y += p.vy * dt * 0.08;
        }
        particles = particles.filter((p) => p.life > 0);
        state.shake = Math.max(0, (state.shake || 0) - dt * 0.04);
        if (bannerTimer > 0) {
          bannerTimer -= dt;
          if (bannerTimer <= 0) ui.banner.classList.remove("show");
        }
      }
      function showBanner(x) {
        ui.banner.textContent = x;
        ui.banner.classList.add("show");
        bannerTimer = 1800;
      }
      function format(s) {
        s = Math.max(0, Math.floor(s));
        return `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
      }
      function resize() {
        const r = canvas.getBoundingClientRect(),
          size = Math.max(280, Math.floor(Math.min(r.width, r.height)));
        canvas.width = size;
        canvas.height = size;
        draw();
      }
      $("#startBtn").onclick = () => start(false);
      $("#resumeBtn").onclick = resumeRun;
      $("#againBtn").onclick = () => start(true);
      $("#resultHomeBtn").onclick = () => {
        ui.result.classList.remove("show");
        renderHome();
      };
      $("#homeBtn").onclick = () => {
        if (
          state.mode === "running" &&
          !confirm("当前航线尚未结算，返回远征站？")
        )
          return;
        snapshotRun();
        state.mode = "ready";
        ui.overlay.classList.remove("hidden");
        renderHome();
      };
      $("#restartBtn").onclick = () => {
        if (state.mode === "running" && confirm("重新开始当前航线？"))
          start(true);
      };
      $("#pauseBtn").onclick = () => {
        if (
          state.mode !== "running" ||
          !ui.upgrade.classList.contains("hidden")
        )
          return;
        state.paused = !state.paused;
        $("#pauseBtn").textContent = state.paused ? "▶" : "Ⅱ";
        last = performance.now();
        if (state.paused) snapshotRun();
      };
      $("#muteBtn").onclick = () => {
        muted = !muted;
        $("#muteBtn").textContent = muted ? "静" : "音";
        if (!muted) sfx("start");
      };
      $("#exportSaveBtn").onclick = async () => {
        const code = encodeSave();
        try {
          await navigator.clipboard.writeText(code);
        } catch (error) {}
        prompt("霓虹贪吃蛇 V4 存档码（已尝试复制，可在其他设备导入）", code);
      };
      $("#importSaveBtn").onclick = () => {
        const code = prompt("粘贴霓虹贪吃蛇存档码：");
        if (!code) return;
        try {
          importSave(code);
          alert("存档导入成功，远征与实验室数据已恢复。");
        } catch (error) {
          alert(`导入失败：${error.message}`);
        }
      };
      ui.pulse.onclick = usePulse;
      document.querySelectorAll("[data-dir]").forEach(
        (b) =>
          (b.onclick = () => {
            const [x, y] = b.dataset.dir.split(",").map(Number);
            queueDir(x, y);
          }),
      );
      window.addEventListener("keydown", (e) => {
        const m = {
          ArrowUp: [0, -1],
          KeyW: [0, -1],
          ArrowDown: [0, 1],
          KeyS: [0, 1],
          ArrowLeft: [-1, 0],
          KeyA: [-1, 0],
          ArrowRight: [1, 0],
          KeyD: [1, 0],
        };
        if (m[e.code]) {
          e.preventDefault();
          queueDir(...m[e.code]);
        }
        if (e.code === "Space") {
          e.preventDefault();
          $("#pauseBtn").click();
        }
        if (e.code === "ShiftLeft" || e.code === "ShiftRight") usePulse();
      });
      let touch = null;
      canvas.addEventListener(
        "pointerdown",
        (e) => (touch = { x: e.clientX, y: e.clientY }),
      );
      canvas.addEventListener("pointerup", (e) => {
        if (!touch) return;
        const dx = e.clientX - touch.x,
          dy = e.clientY - touch.y;
        if (Math.hypot(dx, dy) > 18)
          queueDir(
            Math.abs(dx) > Math.abs(dy) ? Math.sign(dx) : 0,
            Math.abs(dy) > Math.abs(dx) ? Math.sign(dy) : 0,
          );
        touch = null;
      });
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) snapshotRun();
      });
      window.addEventListener("beforeunload", snapshotRun);
      window.addEventListener("resize", resize);
      state = fresh();
      renderHome();
      requestAnimationFrame(() => {
        resize();
        sync();
        draw();
      });
    </script>
  </body>
</html>
