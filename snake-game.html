function renderHome(){ui.setup.style.display="block";ui.result.classList.remove("show");$("#savePill").textContent=`光核 ${save.cores} · 解锁 ${save.unlocked}/12 · 总收集 ${save.total}`;$("#modeGrid").innerHTML=Object.entries(MODES).map(([k,m])=>`<button class="choice ${selectedMode===k?"selected":""}" data-mode="${k}"><b>${m.icon} ${m.name}</b><small>${m.desc}<br>纪录 ${save.best[k]||0}</small></button>`).join("");$("#frameGrid").innerHTML=Object.entries(FRAMES).map(([k,f])=>`<button class="choice ${selectedFrame===k?"selected":""}" data-frame="${k}"><b style="color:${f.color}">${f.icon} ${f.name}</b><small>${f.desc}</small></button>`).join("");$("#sectorGrid").innerHTML=Array.from({length:12},(_,i)=>{const n=i+1,locked=n>save.unlocked;return`<button class="choice sector ${selectedSector===n?"selected":""} ${locked?"locked":""}" data-sector="${n}" ${locked?"disabled":""}><b>${n}</b><small>${sectorName(n)}</small></button>`}).join("");$("#labGrid").innerHTML=Object.entries(LAB).map(([k,l])=>{const lv=save.lab[k]||0,c=l.cost(lv),max=lv>=l.max;return`<button class="lab-btn" data-lab="${k}" ${max||save.cores<c?"disabled":""}><b>${l.name} Lv.${lv}</b><span>${l.desc}</span><em>${max?"已满级":`光核 ${c}`}</em></button>`}).join("");document.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>{selectedMode=b.dataset.mode;renderHome()});document.querySelectorAll("[data-frame]").forEach(b=>b.onclick=()=>{selectedFrame=b.dataset.frame;renderHome()});document.querySelectorAll("[data-sector]").forEach(b=>b.onclick=()=>{selectedSector=+b.dataset.sector;renderHome()});document.querySelectorAll("[data-lab]").forEach(b=>b.onclick=()=>buyLab(b.dataset.lab))}
function buyLab(k){const l=LAB[k],lv=save.lab[k]||0,c=l.cost(lv);if(lv>=l.max||save.cores<c)return;save.cores-=c;save.lab[k]=lv+1;store();renderHome()}function sectorName(n){return["初光","折线","石阵","追猎","裂门","脉冲","霓虹雨","双猎","逆流","核心","超载","终点"][n-1]}
function fresh(){const mid=Math.floor(N/2),frame=FRAMES[selectedFrame],mode=MODES[selectedMode],baseShield=(frame.shield||0)+Math.floor((save.lab.shield||0)/3);return{mode:"ready",paused:false,operation:selectedMode,frame:selectedFrame,sector:selectedMode==="expedition"?selectedSector:1,maxSector:selectedMode==="expedition"?selectedSector:999,elapsed:0,timeLeft:mode.timed||0,snake:[{x:mid,y:mid},{x:mid-1,y:mid},{x:mid-2,y:mid},{x:mid-3,y:mid}],dir:{x:1,y:0},queue:{x:1,y:0},food:null,obstacles:[],portals:[],hunters:[],score:0,eaten:0,sectorEaten:0,goal:5+Math.floor(selectedSector/2),combo:0,comboUntil:0,comboWindow:4300,energy:Math.min(100,(save.lab.core||0)*8),shields:baseShield,phase:frame.phase||0,tailSaves:0,tailUsed:false,scoreMult:1+(save.lab.score||0)*.04,pulseCost:72,speedFloor:0,magnet:0,fever:0,hunterSlow:1,build:[],pending:0,gameOver:false,best:save.best[selectedMode]||0}}
function start(){state=fresh();particles=[];carry=0;state.mode="running";ui.overlay.classList.add("hidden");setupSector();last=performance.now();showBanner(`${MODES[state.operation].icon} ${state.operation==="expedition"?`第 ${state.sector} 区段`:MODES[state.operation].name}`);if(!raf)raf=requestAnimationFrame(loop);sync()}
function setupSector(){state.sectorEaten=0;state.tailUsed=false;state.obstacles=[];state.portals=[];state.hunters=[];const difficulty=state.operation==="expedition"?state.sector:Math.max(1,Math.floor(state.eaten/5)+1);const count=Math.min(46,Math.max(0,(difficulty-1)*2+(state.operation==="chaos"?10:0)));const occupied=new Set(state.snake.map(key));for(let i=0;i<count;i++){const c=openCell(occupied);if(c){state.obstacles.push(c);occupied.add(key(c))}}if(difficulty>=5||state.operation==="chaos"){const a=openCell(occupied);if(a){occupied.add(key(a));const b=openCell(occupied);if(b)state.portals=[a,b]}}if(MODES[state.operation].hunters&&difficulty>=4){for(let i=0;i<Math.min(3,Math.floor((difficulty+1)/4));i++){const c=openCell(occupied);if(c)state.hunters.push({x:c.x,y:c.y,cd:i%2})}}spawnFood();state.goal=state.operation==="expedition"?5+Math.floor(state.sector/2):6;sync()}
function openCell(reserve=new Set()){for(let i=0;i<500;i++){const c={x:rint(0,N-1),y:rint(0,N-1)};if(!reserve.has(key(c))&&!blocked(c,true))return c}return null}function blocked(c,food=false){return state.snake.some(x=>same(x,c))||state.obstacles.some(x=>same(x,c))||state.hunters.some(x=>same(x,c))||state.portals.some(x=>same(x,c))||(food&&state.food&&same(state.food,c))}
function spawnFood(){let pool=Object.entries(FOODS),roll=Math.random()*pool.reduce((n,[,f])=>n+f.weight,0),type="normal";for(const[k,f]of pool){roll-=f.weight;if(roll<=0){type=k;break}}const head=state.snake[0],reserve=new Set();if(state.magnet){for(let r=2;r<=5+state.magnet;r++)for(let i=0;i<30;i++){const c={x:(head.x+rint(-r,r)+N)%N,y:(head.y+rint(-r,r)+N)%N};if(!blocked(c)){state.food={...c,type};return}}}const c=openCell(reserve);state.food=c?{...c,type}:null}
function queueDir(x,y){if(state.mode!=="running"||state.paused)return;if(x===-state.dir.x&&y===-state.dir.y)return;state.queue={x,y}}
function loop(t){raf=requestAnimationFrame(loop);const dt=Math.min(40,t-last);last=t;if(state.mode==="running"&&!state.paused){state.elapsed+=dt/1000;if(state.timeLeft>0){state.timeLeft-=dt/1000;if(state.timeLeft<=0)return end(true,"倒计时结束")}carry+=dt;const interval=speed();while(carry>=interval){carry-=interval;tick(t);if(state.gameOver)break}updateFx(dt)}draw();sync()}
function speed(){let base=150-Math.min(82,(state.sector-1)*5+Math.floor(state.eaten/4)*2);if(state.operation==="blitz")base-=18;if(state.energyBoost)base*=.64;return Math.max(52+state.speedFloor,base)}
function tick(now){state.dir=state.queue;const head=state.snake[0],mode=MODES[state.operation];let next={x:head.x+state.dir.x,y:head.y+state.dir.y};if(next.x<0||next.y<0||next.x>=N||next.y>=N){if(mode.wrap){next={x:(next.x+N)%N,y:(next.y+N)%N}}else if(state.shields>0){state.shields--;next={x:(next.x+N)%N,y:(next.y+N)%N};showBanner("护盾折返边界")}else return collide("撞上边界",next)}const portal=state.portals.findIndex(p=>same(p,next));if(portal>=0){const out=state.portals[1-portal];next={x:out.x+state.dir.x,y:out.y+state.dir.y};next.x=(next.x+N)%N;next.y=(next.y+N)%N;showBanner("裂隙跃迁")}
 const eat=state.food&&same(next,state.food),body=(eat?state.snake:state.snake.slice(0,-1)).some(x=>same(x,next)),rock=state.obstacles.some(x=>same(x,next)),hunter=state.hunters.some(x=>same(x,next));if(body||rock||hunter)return collide(body?"咬到蛇身":hunter?"撞上追猎者":"撞上障碍",next);state.snake.unshift(next);if(eat)eatFood(now);else state.snake.pop();moveHunters(now)}
function collide(reason,cell){if(state.shields>0){state.shields--;state.obstacles=state.obstacles.filter(x=>!same(x,cell));state.hunters=state.hunters.filter(x=>!same(x,cell));showBanner("护盾吸收碰撞");return}if(state.phase>0){state.phase--;state.shields++;showBanner("相位框架穿透");return}if(state.tailSaves>0&&!state.tailUsed&&state.snake.length>7){state.tailUsed=true;state.tailSaves--;state.snake.splice(-4);showBanner("断尾协议启动");return}if(state.operation==="blitz"&&state.snake.length>6){state.snake.splice(-3);state.score=Math.max(0,state.score-40);showBanner("碰撞：长度 -3");return}end(false,reason)}
function moveHunters(now){if(!state.hunters.length)return;const step=Math.random()<.7*state.hunterSlow;for(const h of state.hunters){h.cd=(h.cd||0)-1;if(h.cd>0||!step)continue;h.cd=1;const target=state.food||state.snake[0],opts=[{x:h.x+Math.sign(target.x-h.x),y:h.y},{x:h.x,y:h.y+Math.sign(target.y-h.y)}].sort(()=>Math.random()-.5);const n=opts.find(c=>c.x>=0&&c.y>=0&&c.x<N&&c.y<N&&!state.obstacles.some(x=>same(x,c))&&!state.hunters.some(x=>x!==h&&same(x,c)));if(n){h.x=n.x;h.y=n.y}if(state.food&&same(h,state.food)){spawnFood();showBanner("追猎者抢走光点")}}}
function eatFood(now){const type=FOODS[state.food.type],active=now<state.comboUntil;state.combo=active?state.combo+1:1;state.comboUntil=now+state.comboWindow;let gain=type.points*(1+Math.min(8,state.combo-1)*.18)*state.scoreMult;if(state.combo>=5)gain*=1+state.fever;if(state.frame==="harvest"&&state.food.type==="gold")gain*=1.5;state.score+=Math.round(gain);state.eaten++;state.sectorEaten++;save.total++;for(let i=0;i<type.grow;i++)state.snake.push({...state.snake[state.snake.length-1]});if(state.food.type==="energy")state.energy=Math.min(100,state.energy+32*(state.frame==="harvest"?1.25:1));if(state.food.type==="shield")state.shields++;if(state.food.type==="ghost"){state.phase++;state.energy=Math.min(100,state.energy+15)}burst(state.food,type.color);spawnFood();if(state.sectorEaten>=state.goal){if(state.operation==="expedition"){if(state.sector>=state.maxSector)return end(true,"区段目标完成");state.sector++}else state.sector++;state.pending++;openUpgrade()}sync()}
function openUpgrade(){state.paused=true;const opts=sample(UPGRADES,3);ui.upgradeGrid.innerHTML=opts.map((u,i)=>`<button class="upgrade-card ${i===2?"rare":""}" data-up="${u.id}"><i>${u.icon}</i><strong>${u.title}</strong><p>${u.desc}</p></button>`).join("");ui.upgradeGrid.querySelectorAll("[data-up]").forEach(b=>b.onclick=()=>chooseUpgrade(b.dataset.up));ui.upgrade.classList.remove("hidden")}
function chooseUpgrade(id){const u=UPGRADES.find(x=>x.id===id);if(!u)return;u.apply(state);state.build.push(u.title);state.pending=Math.max(0,state.pending-1);ui.upgrade.classList.add("hidden");if(state.operation!=="expedition"||state.sector<=state.maxSector)setupSector();state.paused=false;last=performance.now();showBanner(`${u.title} 已接入`);sync()}function sample(a,n){const b=[...a],o=[];while(b.length&&o.length<n)o.push(b.splice(rint(0,b.length-1),1)[0]);return o}
function usePulse(){if(state.mode!=="running"||state.paused||state.energy<state.pulseCost)return;state.energy-=state.pulseCost;const head=state.snake[0],frame=FRAMES[state.frame];if(frame.ability==="clear"){state.obstacles=state.obstacles.filter(o=>Math.abs(o.x-head.x)+Math.abs(o.y-head.y)>5);state.hunters=state.hunters.filter(o=>Math.abs(o.x-head.x)+Math.abs(o.y-head.y)>5)}else if(frame.ability==="phase"){state.phase+=2;state.shields++}else if(frame.ability==="fever"){state.combo=Math.max(5,state.combo);state.comboUntil=performance.now()+8000}else{state.shields+=2;state.snake.splice(-Math.min(3,state.snake.length-4))}state.energyBoost=1;setTimeout(()=>{if(state)state.energyBoost=0},900);showBanner(`${frame.name}脉冲！`);sync()}
function end(win,reason){if(state.gameOver)return;state.gameOver=true;state.mode=win?"win":"dead";state.paused=true;const record=Math.max(save.best[state.operation]||0,state.score);save.best[state.operation]=record;const cores=Math.max(1,Math.floor(state.eaten/3)+(win&&state.operation==="expedition"?state.sector:0));save.cores+=cores;if(win&&state.operation==="expedition")save.unlocked=Math.max(save.unlocked,Math.min(12,state.sector+1));store();ui.overlay.classList.remove("hidden");ui.setup.style.display="none";ui.result.classList.add("show");$("#resultTitle").textContent=win?"光轨稳定":"航线中断";$("#resultText").textContent=`${reason} · ${MODES[state.operation].name} · ${FRAMES[state.frame].name}`;$("#resultScore").textContent=state.score;$("#resultLength").textContent=state.snake.length;$("#resultCore").textContent=cores;$("#resultSector").textContent=state.sector}
function sync(){if(!state)return;ui.score.textContent=state.score;ui.length.textContent=state.snake.length;ui.sector.textContent=state.sector;ui.combo.textContent=`×${Math.max(1,state.combo)}`;ui.energy.textContent=`${Math.floor(state.energy)}%`;ui.time.textContent=state.timeLeft>0?format(state.timeLeft):format(state.elapsed);ui.pulse.disabled=state.energy<state.pulseCost||state.mode!=="running";ui.pulse.querySelector("small").textContent=`Shift · ${Math.floor(state.energy)}%`;ui.energyBar.style.width=`${state.energy}%`;ui.missionBar.style.width=`${Math.min(100,state.sectorEaten/state.goal*100)}%`;ui.missionText.textContent=`区段 ${state.sector} · 收集 ${state.sectorEaten}/${state.goal}`;$("#objectiveIcon").textContent=MODES[state.operation].icon;$("#objectiveTitle").textContent=`${MODES[state.operation].name} · ${sectorName(Math.min(12,state.sector))}`;$("#objectiveText").textContent=state.timeLeft>0?`剩余 ${format(state.timeLeft)}，争取更高得分。`:`完成本区段收集目标并选择强化。`;ui.shield.textContent=`护盾 ${state.shields} · 相位 ${state.phase}`;ui.build.innerHTML=state.build.length?state.build.map(x=>`<span class="chip">${x}</span>`).join(""):`<span class="chip">${FRAMES[state.frame].name}</span>`;const rivals=[{n:"极光",v:Math.round(state.score*.85+120)},{n:"像素",v:Math.round(state.score*.62+260)},{n:"你",v:state.score},{n:"电弧",v:Math.round(state.score*.35+390)}].sort((a,b)=>b.v-a.v);ui.ranking.innerHTML=rivals.map((r,i)=>`<div class="rank ${r.n==="你"?"me":""}"><b>${i+1}</b><span>${r.n}</span><strong>${r.v}</strong></div>`).join("")}
function draw(){if(!state)return;const W=canvas.width,C=W/N,t=performance.now();ctx.fillStyle="#050a19";ctx.fillRect(0,0,W,W);ctx.strokeStyle="rgba(65,160,230,.09)";ctx.lineWidth=1;for(let i=0;i<=N;i++){ctx.beginPath();ctx.moveTo(i*C,0);ctx.lineTo(i*C,W);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*C);ctx.lineTo(W,i*C);ctx.stroke()}for(const o of state.obstacles)cellRect(o,C,"#293653","#6078a8");for(const p of state.portals){ctx.strokeStyle="#a684ff";ctx.lineWidth=4;ctx.beginPath();ctx.arc((p.x+.5)*C,(p.y+.5)*C,C*.34,0,Math.PI*2);ctx.stroke()}for(const h of state.hunters){ctx.fillStyle="#ff5a86";ctx.beginPath();ctx.moveTo((h.x+.5)*C,(h.y+.12)*C);ctx.lineTo((h.x+.88)*C,(h.y+.83)*C);ctx.lineTo((h.x+.12)*C,(h.y+.83)*C);ctx.closePath();ctx.fill()}if(state.food){const f=FOODS[state.food.type],pulse=.24+Math.sin(t*.008)*.06;ctx.shadowColor=f.color;ctx.shadowBlur=15;ctx.fillStyle=f.color;ctx.beginPath();ctx.arc((state.food.x+.5)*C,(state.food.y+.5)*C,C*pulse,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}state.snake.slice().reverse().forEach((s,ri)=>{const i=state.snake.length-1-ri,head=i===0,alpha=.42+.58*(1-i/Math.max(1,state.snake.length));ctx.fillStyle=head?FRAMES[state.frame].color:rgba(FRAMES[state.frame].color,alpha);round((s.x+.12)*C,(s.y+.12)*C,C*.76,C*.76,C*.25);ctx.fill();if(head){ctx.fillStyle="#06101a";const dx=state.dir.y?-.16:.16,dy=state.dir.x?-.16:.16;ctx.beginPath();ctx.arc((s.x+.5+dx)*C,(s.y+.5+dy)*C,C*.07,0,Math.PI*2);ctx.fill()}});for(const p of particles){ctx.globalAlpha=p.life/p.max;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function cellRect(c,C,fill,stroke){ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.lineWidth=2;round((c.x+.12)*C,(c.y+.12)*C,C*.76,C*.76,C*.15);ctx.fill();ctx.stroke()}function round(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}function rgba(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16},${n>>8&255},${n&255},${a})`}
function burst(c,color){const C=canvas.width/N;for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,s=Math.random()*3+1;particles.push({x:(c.x+.5)*C,y:(c.y+.5)*C,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:Math.random()*3+2,life:500,max:500,color})}}function updateFx(dt){for(const p of particles){p.life-=dt;p.x+=p.vx*dt*.08;p.y+=p.vy*dt*.08}particles=particles.filter(p=>p.life>0);if(bannerTimer>0){bannerTimer-=dt;if(bannerTimer<=0)ui.banner.classList.remove("show")}}function showBanner(x){ui.banner.textContent=x;ui.banner.classList.add("show");bannerTimer=1800}function format(s){s=Math.max(0,Math.floor(s));return`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`}
function resize(){const r=canvas.getBoundingClientRect(),size=Math.max(280,Math.floor(Math.min(r.width,r.height)));canvas.width=size;canvas.height=size;draw()}$("#startBtn").onclick=start;$("#againBtn").onclick=start;$("#resultHomeBtn").onclick=()=>{ui.result.classList.remove("show");renderHome()};$("#homeBtn").onclick=()=>{if(state.mode==="running"&&!confirm("当前航线尚未结算，返回远征站？"))return;state.mode="ready";ui.overlay.classList.remove("hidden");renderHome()};$("#restartBtn").onclick=()=>{if(state.mode==="running"&&confirm("重新开始当前航线？"))start()};$("#pauseBtn").onclick=()=>{if(state.mode!=="running"||!ui.upgrade.classList.contains("hidden"))return;state.paused=!state.paused;$("#pauseBtn").textContent=state.paused?"▶":"Ⅱ";last=performance.now()};$("#muteBtn").onclick=()=>{muted=!muted;$("#muteBtn").textContent=muted?"静":"音"};ui.pulse.onclick=usePulse;document.querySelectorAll("[data-dir]").forEach(b=>b.onclick=()=>{const[x,y]=b.dataset.dir.split(",").map(Number);queueDir(x,y)});window.addEventListener("keydown",e=>{const m={ArrowUp:[0,-1],KeyW:[0,-1],ArrowDown:[0,1],KeyS:[0,1],ArrowLeft:[-1,0],KeyA:[-1,0],ArrowRight:[1,0],KeyD:[1,0]};if(m[e.code]){e.preventDefault();queueDir(...m[e.code])}if(e.code==="Space"){e.preventDefault();$("#pauseBtn").click()}if(e.code==="ShiftLeft"||e.code==="ShiftRight")usePulse()});let touch=null;canvas.addEventListener("pointerdown",e=>touch={x:e.clientX,y:e.clientY});canvas.addEventListener("pointerup",e=>{if(!touch)return;const dx=e.clientX-touch.x,dy=e.clientY-touch.y;if(Math.hypot(dx,dy)>18)queueDir(Math.abs(dx)>Math.abs(dy)?Math.sign(dx):0,Math.abs(dy)>Math.abs(dx)?Math.sign(dy):0);touch=null});window.addEventListener("resize",resize);state=fresh();renderHome();requestAnimationFrame(()=>{resize();sync();draw()});
</script></body></html>
