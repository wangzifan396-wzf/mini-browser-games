<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>元素落沙实验室</title><style>
*{box-sizing:border-box}body{margin:0;background:#17191e;color:#f2f4f7;font-family:system-ui,"Microsoft YaHei"}.app{min-height:100vh;padding:14px;display:grid;place-items:center}.shell{width:min(980px,100%);background:#272b32;border:1px solid #646b75;border-radius:20px;padding:16px}.top,.row,.tools{display:flex;justify-content:space-between;gap:7px;align-items:center;flex-wrap:wrap}canvas{width:100%;aspect-ratio:16/9;background:#0e1115;border:2px solid #555d67;border-radius:12px;display:block;margin:12px 0;image-rendering:pixelated;touch-action:none}.tools{justify-content:flex-start}.tools button.active{outline:3px solid white}button{padding:9px 11px;border:1px solid #747b85;border-radius:8px;background:#424852;color:white;font-weight:bold}.help{font-size:13px;color:#c3c7cd}@media(max-width:650px){.app{place-items:start center}}
</style><main class="app"><section class="shell"><div class="top"><div><h1 style="margin:0">元素落沙实验室</h1><div class="help">绘制沙、水、火、植物、油、冰与墙体，观察重力、燃烧、蒸发和生长形成的连锁反应。</div></div><div>实验 <b id="challenge"></b>/5　完成度 <b id="score"></b>%</div></div><div class="tools" id="tools"></div><canvas id="c" width="160" height="90"></canvas><div class="row"><span id="mission"></span><button id="clear">清空</button><button id="next">下一实验</button><button id="pause">暂停</button></div></section></main><script>
const cv=document.getElementById('c'),g=cv.getContext('2d'),W=160,H=90,M=[['沙','#d7ba62'],['水','#3e8bd8'],['墙','#777b82'],['火','#ff653a'],['植物','#4bb65f'],['油','#6b4a2e'],['冰','#a8e5f2']],missions=['让沙堆积到画面底部','让水覆盖至少 15% 空间','用火点燃一片植物','让油与火发生连锁燃烧','自由创造并使用五种元素'];let grid=new Uint8Array(W*H),mat=1,down=false,paused=false,level=0;const $=x=>document.getElementById(x),idx=(x,y)=>y*W+x;
function swap(a,b){let t=grid[a];grid[a]=grid[b];grid[b]=t}
function tick(){if(paused)return;for(let y=H-2;y>=0;y--)for(let x=1;x<W-1;x++){let i=idx(x,y),v=grid[i],below=idx(x,y+1);if(v===1){if(!grid[below]||grid[below]===2)swap(i,below);else{let d=Math.random()<.5?-1:1,j=idx(x+d,y+1);if(!grid[j]||grid[j]===2)swap(i,j)}}if(v===2){if(!grid[below])swap(i,below);else{let d=Math.random()<.5?-1:1,j=idx(x+d,y);if(!grid[j])swap(i,j)}}if(v===4){if(Math.random()<.12&&y>0)swap(i,idx(x,y-1));for(const j of[i-1,i+1,i-W,i+W])if(grid[j]===5||grid[j]===6){grid[j]=4;if(Math.random()<.08)grid[i]=0}if(Math.random()<.03)grid[i]=0}if(v===6&&!grid[below])swap(i,below);if(v===7&&Math.random()<.001)grid[i]=2}}
function render(){tick();let im=g.createImageData(W,H);for(let i=0;i<grid.length;i++){let c=grid[i]?M[grid[i]-1][1]:'#0e1115',n=parseInt(c.slice(1),16);im.data[i*4]=n>>16;im.data[i*4+1]=n>>8&255;im.data[i*4+2]=n&255;im.data[i*4+3]=255}g.putImageData(im,0,0);drawUI();requestAnimationFrame(render)}
function paint(e){if(!down)return;let r=cv.getBoundingClientRect(),p=e.touches?.[0]||e,x=Math.floor((p.clientX-r.left)*W/r.width),y=Math.floor((p.clientY-r.top)*H/r.height);for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++)if(x+dx>=0&&x+dx<W&&y+dy>=0&&y+dy<H&&Math.random()<.7)grid[idx(x+dx,y+dy)]=mat}
function calc(){let count=[0,0,0,0,0,0,0];grid.forEach(v=>v&&count[v-1]++);if(level===0)return Math.min(100,count[0]/8);if(level===1)return Math.min(100,count[1]/24);if(level===2)return Math.min(100,count[3]/2+count[4]/12);if(level===3)return Math.min(100,count[3]+count[5]/15);return Math.min(100,count.filter(x=>x>0).length*20)}
function drawUI(){challenge.textContent=level+1;score.textContent=Math.floor(calc());mission.textContent=missions[level];tools.innerHTML=M.map((m,i)=>`<button data-i="${i+1}" class="${mat===i+1?'active':''}" style="background:${m[1]}">${m[0]}</button>`).join('');tools.querySelectorAll('[data-i]').forEach(e=>e.onclick=()=>mat=+e.dataset.i);next.disabled=calc()<80}
cv.onpointerdown=e=>{down=true;paint(e)};cv.onpointermove=paint;addEventListener('pointerup',()=>down=false);clear.onclick=()=>grid.fill(0);next.onclick=()=>{if(calc()>=80){level=Math.min(4,level+1);grid.fill(0)}};pause.onclick=()=>{paused=!paused;pause.textContent=paused?'继续':'暂停'};drawUI();render();
</script>
