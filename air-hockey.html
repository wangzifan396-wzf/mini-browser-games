<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>霓虹冰球</title><style>body{margin:0;background:#08101d;color:#edf7ff;font-family:system-ui}.app{height:100vh;display:grid;grid-template-columns:1fr 230px;gap:10px;padding:10px;box-sizing:border-box}.stage,aside{border:1px solid #31577d;border-radius:16px;background:#0d1c30;overflow:hidden}.stage{position:relative}canvas{display:block;width:100%;height:100%}aside{padding:14px;display:flex;flex-direction:column;gap:10px}.card{padding:10px;border:1px solid #31577d;border-radius:10px}.card b{display:block;color:#67e3ff;font-size:25px}button{padding:10px;border:1px solid #4d87b4;border-radius:9px;background:#193d5d;color:white;font-weight:bold}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:#08111cc9;text-align:center}.hidden{display:none}@media(max-width:650px){.app{grid-template-columns:1fr;grid-template-rows:1fr 130px;padding:6px}aside{display:grid;grid-template-columns:repeat(3,1fr);padding:7px}.help{display:none}}</style><main class="app"><section class="stage"><canvas id="c"></canvas><div id="o" class="overlay"><div><h1>霓虹冰球</h1><p>拖动球拍截击冰球，率先拿到 5 分获胜。蓄力冲撞可改变球速。</p><button id="go">开球</button></div></section><aside><div class="card">比分<b id="s">0 : 0</b></div><div class="card">连击<b id="st">0</b></div><button id="resetGame">新局</button><div class="help">鼠标或触控移动球拍。把冰球打入上方球门；AI 会随比分提升速度。</div></aside></main><script>
const c=document.querySelector('#c'),x=c.getContext('2d'),O=document.querySelector('#o'),S=document.querySelector('#s'),ST=document.querySelector('#st');let q,last=0,target=null;function reset(){q={run:false,me:0,ai:0,streak:0,p:{x:.5,y:.82},a:{x:.5,y:.18},b:{x:.5,y:.5,vx:.33,vy:.38}};sync()}function start(){q.run=true;O.classList.add('hidden')}function serve(dir=1){q.b={x:.5,y:.5,vx:(Math.random()-.5)*.35,vy:.38*dir};q.p.x=.5;q.a.x=.5}function update(dt){if(!q.run)return;if(target){q.p.x+=(target.x-q.p.x)*dt*9;q.p.y=Math.max(.65,Math.min(.9,target.y))}q.a.x+=(q.b.x-q.a.x)*dt*(2.4+q.ai*.15);q.b.x+=q.b.vx*dt;q.b.y+=q.b.vy*dt;if(q.b.x<.03||q.b.x>.97){q.b.vx*=-1;q.b.x=Math.max(.03,Math.min(.97,q.b.x))}for(const m of[q.p,q.a])if(Math.abs(q.b.x-m.x)<.09&&Math.abs(q.b.y-m.y)<.04&&((m===q.p&&q.b.vy>0)||(m===q.a&&q.b.vy<0))){q.b.vy*=-1.08;q.b.vx+=(q.b.x-m.x)*2.5;if(m===q.p)q.streak++}if(q.b.y<0){q.me++;q.streak++;serve(1)}if(q.b.y>1){q.ai++;q.streak=0;serve(-1)}if(q.me>=5||q.ai>=5)end();sync()}function end(){q.run=false;O.innerHTML=`<div><h1>${q.me>q.ai?'胜利！':'AI 获胜'}</h1><p>${q.me} : ${q.ai}</p><button id="go">再来一局</button></div>`;O.classList.remove('hidden');document.querySelector('#go').onclick=()=>{reset();start()}}function sync(){S.textContent=`${q.me} : ${q.ai}`;ST.textContent=q.streak}function draw(){let w=c.clientWidth,h=c.clientHeight;c.width=w*devicePixelRatio;c.height=h*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);x.fillStyle='#0a2440';x.fillRect(0,0,w,h);x.strokeStyle='#5fcdf0';x.strokeRect(8,8,w-16,h-16);x.beginPath();x.moveTo(0,h/2);x.lineTo(w,h/2);x.stroke();for(const m of[q.p,q.a]){x.fillStyle=m===q.p?'#6ee8ff':'#ff8a85';x.fillRect((m.x-.1)*w,(m.y-.018)*h,.2*w,.036*h)}x.fillStyle='#fff2a0';x.beginPath();x.arc(q.b.x*w,q.b.y*h,10,0,7);x.fill()}function loop(t){let dt=Math.min(.03,(t-last)/1000);last=t;update(dt);draw();requestAnimationFrame(loop)}c.addEventListener('pointermove',e=>{let r=c.getBoundingClientRect();target={x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height}});document.querySelector('#go').onclick=()=>{reset();start()};document.querySelector('#resetGame').onclick=reset;reset();requestAnimationFrame(loop);
</script><script>const hockeyRecord=document.createElement('div');hockeyRecord.className='card';document.querySelector('aside').prepend(hockeyRecord);setInterval(()=>{let b=+localStorage.getItem('air_hockey_streak')||0;if(q.streak>b){b=q.streak;localStorage.setItem('air_hockey_streak',b)}hockeyRecord.innerHTML='最佳连击<b>'+b+'</b>'},500)</script>
