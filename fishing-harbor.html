const FISH=[

 {n:'青花鲭',i:'🐟',r:1,d:2,v:19,w:[.8,2.2],b:'steady'},{n:'珊瑚鲷',i:'🐠',r:1,d:2,v:24,w:[.6,1.8],b:'dart'},{n:'墨斗乌贼',i:'🦑',r:1,d:3,v:35,w:[1.1,3.4],b:'trick'},{n:'虎纹虾',i:'🦐',r:1,d:3,v:31,w:[.3,1.1],b:'dart'},{n:'港湾鳐',i:'🐟',r:1,d:4,v:48,w:[2,6],b:'heavy'},
 {n:'蓝枪鱼',i:'🐟',r:2,d:4,v:56,w:[3,9],b:'dart'},{n:'玻璃水母',i:'🪼',r:2,d:3,v:43,w:[.4,1.5],b:'trick'},{n:'剑吻鲨',i:'🦈',r:2,d:5,v:82,w:[5,14],b:'heavy'},{n:'灯笼鱼',i:'🐡',r:2,d:4,v:67,w:[.8,2.6],b:'trick'},{n:'深蓝龙虾',i:'🦞',r:2,d:5,v:91,w:[2,5],b:'heavy'},
 {n:'极光鲑',i:'🐟',r:3,d:4,v:78,w:[2,7],b:'dart'},{n:'冰晶鳕',i:'🐟',r:3,d:4,v:73,w:[3,10],b:'steady'},{n:'雪翼鳐',i:'🐟',r:3,d:5,v:108,w:[6,18],b:'trick'},{n:'白鲸幼体',i:'🐋',r:3,d:6,v:170,w:[18,45],b:'heavy'},{n:'霜冠王鱼',i:'🐠',r:3,d:6,v:210,w:[4,12],b:'dart'},
 {n:'星斑旗鱼',i:'🐟',r:4,d:5,v:125,w:[5,16],b:'dart'},{n:'幽光鲨',i:'🦈',r:4,d:6,v:195,w:[12,38],b:'trick'},{n:'深渊皇带鱼',i:'🐉',r:4,d:7,v:280,w:[20,55],b:'heavy'},{n:'潮汐古鲸',i:'🐋',r:4,d:8,v:420,w:[40,95],b:'legend'}
];
const LOCS=[{n:'芦苇河湾',i:'🌾',need:0,d:'平静淡水，适合熟悉搏鱼。'},{n:'珊瑚浅滩',i:'🏝️',need:2,d:'海风多变，稀有鱼开始出现。'},{n:'沉船深海',i:'⚓',need:5,d:'深水鱼力量强，需要结实钓线。'},{n:'月影冰湖',i:'🏔️',need:9,d:'寒流让鱼群行动更加突然。'},{n:'星渊海沟',i:'🌌',need:14,d:'只向最负盛名的船长开放。'}];
const WEATHERS=[{n:'晴朗',i:'☀️',d:'常规鱼群活跃',mod:0},{n:'细雨',i:'🌧️',d:'稀有鱼咬钩率提高',mod:1},{n:'大风',i:'🌬️',d:'鱼更活跃，售价提高 10%',mod:0},{n:'满月',i:'🌕',d:'黄昏后传奇鱼可能出现',mod:2}];
const UPGRADES={rod:{n:'潮纹鱼竿',i:'🎣',d:'扩大捕获区并提高稀有鱼概率',base:45,max:6},line:{n:'深海钓线',i:'🧵',d:'降低张力增长，允许挑战更强鱼类',base:40,max:6},reel:{n:'星轮卷线器',i:'⚙️',d:'收线区移动更灵敏，进度增长更快',base:42,max:6},boat:{n:'远航渔船',i:'⛵',d:'每级解锁更远海域并增加每日行动',base:80,max:5},market:{n:'冰鲜鱼市',i:'🏪',d:'所有鱼获售价提高 8%',base:65,max:5},museum:{n:'潮汐博物馆',i:'🏛️',d:'新图鉴发现提供更多声望',base:70,max:5}};
let q={v:3,coins:40,day:1,action:0,fame:0,loc:0,weather:0,gear:{rod:1,line:1,reel:1,boat:1,market:0,museum:0},bag:[],dex:[],contracts:[],milestones:[]},state='idle',power=0,powerDir=1,waitTimer=0,hook=null,reeling=false,fishPos=50,fishVel=0,zonePos=50,catchProgress=0,tension=0,last=0,raf;
function save(){localStorage.setItem(SAVE,JSON.stringify(q))}function load(){try{const x=JSON.parse(localStorage.getItem(SAVE));if(x?.v===3)q={...q,...x,gear:{...q.gear,...x.gear}}}catch{}if(!q.contracts.length)newContracts()}
function checksum(s){let h=0;for(const ch of s)h=(Math.imul(h,33)^ch.charCodeAt(0))>>>0;return h.toString(36)}function exportCode(){const b=btoa(unescape(encodeURIComponent(JSON.stringify(q))));return`FH3-${b}-${checksum(b)}`}function importCode(x){const m=x.trim().match(/^FH3-(.+)-([a-z0-9]+)$/i);if(!m||checksum(m[1])!==m[2])throw Error('存档码校验失败');const d=JSON.parse(decodeURIComponent(escape(atob(m[1]))));if(d.v!==3)throw Error('版本不兼容');q=d;save();drawUI()}
function timeName(){return['清晨','正午','黄昏','夜晚'][Math.min(3,Math.floor(q.action/2))]}function maxActions(){return 6+Math.floor(q.gear.boat/2)}function msg(s){$('message').textContent=s}function toast(s){const e=document.createElement('div');e.className='toast';e.textContent=s;document.body.append(e);setTimeout(()=>e.remove(),1600)}
function newContracts(){const region=Math.min(4,q.loc),pool=FISH.map((f,i)=>f.r<=region?i:-1).filter(i=>i>=0).sort(()=>Math.random()-.5);q.contracts=[{type:'fish',id:pool[0],need:2,have:0,reward:28+q.day*2,done:false},{type:'quality',need:2,have:0,reward:34+q.day*2,done:false},{type:'weight',need:Math.round(4+q.day*.35),have:0,reward:40+q.day*3,done:false}]}
function startCast(){if(q.action>=maxActions())return msg('今天的行动已经用完，请返港休息');if(state==='idle'){state='charging';power=0;powerDir=1;$('castBtn').textContent='确定抛距';msg('力量条往返变化，选好时机再次点击。')}else if(state==='charging'){state='waiting';waitTimer=.8+Math.random()*1.5;$('castBtn').disabled=true;$('castBtn').textContent='等待鱼讯';msg(`浮漂落在 ${Math.round(power)} 米外，保持安静……`)}else if(state==='bite'){hookFish()}}
function chooseFish(){const maxRegion=Math.min(q.loc,Math.max(0,q.gear.boat-1)),weather=WEATHERS[q.weather],depth=power/100,pool=FISH.map((f,i)=>({i,f,w:f.r<=maxRegion?Math.max(.05,6-f.d+(weather.mod&&f.d>=3?weather.mod:0)+depth*f.d):0})).filter(x=>x.w>0);let total=pool.reduce((a,b)=>a+b.w,0),v=Math.random()*total;for(const x of pool){v-=x.w;if(v<=0)return x.i}return pool[0].i}
function hookFish(){const id=chooseFish(),d=FISH[id];hook={id,size:+(d.w[0]+Math.random()*(d.w[1]-d.w[0])).toFixed(2),quality:1+ +(Math.random()<.28+q.gear.rod*.04)+ +(Math.random()<.08+q.gear.rod*.015),phase:Math.random()*6.28,elapsed:0};state='hooked';fishPos=45+Math.random()*20;fishVel=0;zonePos=50;catchProgress=8;tension=10;$('fightUI').classList.add('show');$('reelBtn').disabled=false;$('castBtn').disabled=true;$('phaseTitle').textContent='鱼已咬钩！';$('phaseHelp').textContent=`${d.b==='heavy'?'沉重拉扯':d.b==='dart'?'高速游动':'节奏变化'} · 难度 ${d.d}`;msg('按住收线追踪鱼的位置；别让红色张力爆表。')}
function update(dt){if(state==='charging'){power+=powerDir*75*dt;if(power>=100||power<=0){power=Math.max(0,Math.min(100,power));powerDir*=-1}}if(state==='waiting'){waitTimer-=dt;if(waitTimer<=0){state='bite';$('castBtn').disabled=false;$('castBtn').textContent='立即提竿';$('phaseTitle').textContent='鱼讯！';$('phaseHelp').textContent='短时间内点击提竿';waitTimer=1.1}else return}if(state==='bite'){waitTimer-=dt;if(waitTimer<=0){state='idle';$('castBtn').textContent='开始蓄力';$('phaseTitle').textContent='错过鱼讯';$('phaseHelp').textContent='重新抛竿';msg('提竿太慢，鱼吃掉了饵。');q.action++;drawUI()}}if(state==='hooked')updateFight(dt);drawScene()}
function updateFight(dt){const d=FISH[hook.id],difficulty=d.d,behavior=d.b;hook.elapsed+=dt;hook.phase+=dt*(1.2+difficulty*.12);let target=50+Math.sin(hook.phase*(behavior==='dart'?2.1:behavior==='heavy'?.65:1.15))*35;if(behavior==='trick')target=50+Math.sin(hook.phase)*25+Math.sin(hook.phase*3.7)*17;if(behavior==='legend')target=50+Math.sin(hook.phase*.7)*22+Math.sin(hook.phase*4.3)*28;fishVel+=(target-fishPos)*dt*(behavior==='heavy'?1.8:3.3);fishVel*=Math.pow(.1,dt);fishPos=Math.max(4,Math.min(96,fishPos+fishVel*dt));const reelSpeed=44+q.gear.reel*5;zonePos+=dt*(reeling?reelSpeed:-reelSpeed*.7);zonePos=Math.max(8,Math.min(92,zonePos));const zone=17+q.gear.rod*2.4,inside=Math.abs(zonePos-fishPos)<zone/2;if(inside)catchProgress+=dt*(13+q.gear.reel*1.7);else catchProgress-=dt*(5+difficulty*.45);catchProgress=Math.max(0,catchProgress);tension+=dt*(reeling?(4+difficulty*1.55-q.gear.line*1.3):-10);if(!inside&&reeling)tension+=dt*difficulty*1.3;tension=Math.max(0,tension);$('fishMarker').style.top=fishPos+'%';$('catchZone').style.top=zonePos+'%';$('catchZone').style.height=zone+'%';$('catchMeter').style.width=Math.min(100,catchProgress)+'%';$('tensionMeter').style.width=Math.min(100,tension)+'%';if(catchProgress>=100)landFish();else if(tension>=100||catchProgress<=0&&hook.elapsed>2)loseFish()}
function landFish(){state='idle';q.action++;const d=FISH[hook.id],quality=['','普通','银星','金星'][hook.quality],mult=1+(hook.quality-1)*.35,fish={id:hook.id,size:hook.size,quality:hook.quality,value:Math.round(d.v*hook.size*.65*mult)};q.bag.push(fish);if(!q.dex.includes(hook.id)){q.dex.push(hook.id);q.fame+=2+q.gear.museum;toast(`图鉴新增：${d.n}`)}q.contracts.forEach(c=>{if(c.type==='fish'&&c.id===hook.id)c.have++;if(c.type==='quality'&&hook.quality>=2)c.have++;if(c.type==='weight')c.have+=hook.size});msg(`捕获${quality}${d.n} · ${hook.size}kg · 估值 ${fish.value}`);hook=null;$('fightUI').classList.remove('show');$('reelBtn').disabled=true;$('castBtn').disabled=false;$('castBtn').textContent='开始蓄力';$('phaseTitle').textContent='成功入箱';$('phaseHelp').textContent=`今日行动 ${q.action}/${maxActions()}`;checkMilestone();drawUI();save()}
function loseFish(){state='idle';q.action++;msg('张力失控，鱼挣脱了。升级钓线或在鱼发力时松开收线。');hook=null;$('fightUI').classList.remove('show');$('reelBtn').disabled=true;$('castBtn').disabled=false;$('castBtn').textContent='开始蓄力';$('phaseTitle').textContent='鱼线松脱';$('phaseHelp').textContent=`今日行动 ${q.action}/${maxActions()}`;drawUI();save()}
function endDay(){if(state!=='idle')return msg('先结束当前钓鱼流程');q.day++;q.action=0;q.weather=Math.floor(Math.random()*WEATHERS.length);newContracts();const upkeep=Math.max(0,q.gear.boat-2)*2;if(upkeep){q.coins=Math.max(0,q.coins-upkeep);msg(`新的一天开始，渔船维护支出 ${upkeep}`)}else msg('新的一天开始，鱼市价格已经更新。');drawUI();save()}
function sell(index){const f=q.bag[index];if(!f)return;const weather=WEATHERS[q.weather],price=Math.round(f.value*(1+q.gear.market*.08)*(weather.n==='大风'?1.1:1));q.coins+=price;q.bag.splice(index,1);msg(`鱼市售出 ${FISH[f.id].n}，获得 ${price} 金币`);drawUI();save()}function sellAll(){for(let i=q.bag.length-1;i>=0;i--)sell(i)}
function completeContracts(){let n=0;q.contracts.forEach(c=>{if(!c.done&&c.have>=c.need){c.done=true;q.coins+=c.reward;q.fame+=2;n++}});msg(n?`交付 ${n} 项委托，声望提升。`:'当前没有可交付委托');checkMilestone();drawUI();save()}
function upgrade(id){const d=UPGRADES[id],lv=q.gear[id],cost=Math.round(d.base*Math.pow(1.65,lv));if(lv>=d.max)return;if(q.coins<cost)return msg('金币不足');q.coins-=cost;q.gear[id]++;msg(`${d.n}升级至 Lv.${q.gear[id]}`);drawUI();save()}
function checkMilestone(){const levels=[3,6,10,15,22],i=levels.findIndex((x,k)=>q.fame>=x&&!q.milestones.includes(k));if(i<0)return;q.milestones.push(i);const perks=[{i:'🧊',n:'急冻保鲜',d:'立即获得 80 金币',f:()=>q.coins+=80},{i:'🎟️',n:'远海许可证',d:'声望 +3，更快解锁海域',f:()=>q.fame+=3},{i:'🪝',n:'大师鱼钩',d:'鱼竿与卷线器各提升一级',f:()=>{q.gear.rod=Math.min(6,q.gear.rod+1);q.gear.reel=Math.min(6,q.gear.reel+1)}}];$('choiceTitle').textContent='港口里程碑';$('choiceHelp').textContent='声望让渔港获得新的投资。选择一项永久奖励。';$('choices').innerHTML=perks.map((p,j)=>`<button class="choice" data-perk="${j}"><span class="big">${p.i}</span><h3>${p.n}</h3><p>${p.d}</p></button>`).join('');$('choiceOverlay').classList.remove('hidden');document.querySelectorAll('[data-perk]').forEach(b=>b.onclick=()=>{perks[+b.dataset.perk].f();$('choiceOverlay').classList.add('hidden');drawUI();save()})}
function drawScene(){const w=cv.width,h=cv.height,weather=WEATHERS[q.weather];const sky=ctx.createLinearGradient(0,0,0,h*.45);sky.addColorStop(0,timeName()==='夜晚'?'#091b38':'#69c9e6');sky.addColorStop(1,timeName()==='夜晚'?'#20375d':'#b7e8ed');ctx.fillStyle=sky;ctx.fillRect(0,0,w,h*.44);ctx.fillStyle=timeName()==='夜晚'?'#dfe8ff':'#ffe173';ctx.beginPath();ctx.arc(820,75,28,0,7);ctx.fill();ctx.fillStyle='#0d6892';ctx.fillRect(0,h*.44,w,h*.56);for(let y=h*.48;y<h;y+=35){ctx.strokeStyle=`rgba(160,230,245,${.08+(y/h)*.08})`;ctx.beginPath();for(let x=0;x<w;x+=30)ctx.lineTo(x,y+Math.sin(x*.03+performance.now()*.001+y)*5);ctx.stroke()}ctx.font='48px serif';ctx.fillText(LOCS[q.loc].i,90,150);ctx.font='22px serif';ctx.fillText(weather.i,740,62);if(state==='charging'||state==='waiting'||state==='bite'){ctx.fillStyle='#07131daa';ctx.fillRect(80,h-58,w-160,24);ctx.fillStyle=state==='charging'?'#ffd166':'#64c8f1';ctx.fillRect(83,h-55,(w-166)*power/100,18);ctx.fillStyle='#fff';ctx.font='15px sans-serif';ctx.fillText(`抛距 ${Math.round(power)}m`,w/2-40,h-39)}if(state==='waiting'||state==='bite'){const x=180+power/100*600;ctx.strokeStyle='#f5e6bf';ctx.beginPath();ctx.moveTo(110,210);ctx.lineTo(x,300);ctx.stroke();ctx.font='25px serif';ctx.fillText(state==='bite'?'❗':'🔴',x-12,308)}if(state==='hooked'){ctx.font='36px serif';ctx.fillText(FISH[hook.id].i,430+Math.sin(hook.phase)*120,350+Math.cos(hook.phase*.7)*45)}}
function drawUI(){$('coins').textContent=q.coins;$('day').textContent=q.day;$('time').textContent=timeName();$('fame').textContent=q.fame;$('weatherIcon').textContent=WEATHERS[q.weather].i;$('weatherName').textContent=WEATHERS[q.weather].n;$('weatherText').textContent=WEATHERS[q.weather].d;$('locations').innerHTML=LOCS.map((l,i)=>`<button class="location ${q.loc===i?'active':''}" data-loc="${i}" ${q.fame<l.need||q.gear.boat<i+1?'disabled':''}>${l.i} ${l.n}</button>`).join('');document.querySelectorAll('[data-loc]').forEach(b=>b.onclick=()=>{if(state==='idle'){q.loc=+b.dataset.loc;msg(LOCS[q.loc].d);drawUI()}});$('contracts').innerHTML=q.contracts.map(c=>{const label=c.type==='fish'?`捕获 ${FISH[c.id].n} ${c.need}条`:c.type==='quality'?`捕获银星以上 ${c.need}条`:`累计鱼重 ${c.need}kg`;return`<div class="contract"><b>${c.done?'✓ ':''}${label}</b><p>${Math.min(c.need,c.have).toFixed(c.type==='weight'?1:0)} / ${c.need}</p><strong>奖励 ${c.reward} 金币 · 2声望</strong></div>`}).join('');$('gearSummary').innerHTML=Object.entries(q.gear).map(([id,lv])=>`<div class="gear-row"><span>${UPGRADES[id].i} ${UPGRADES[id].n}</span><strong>Lv.${lv}</strong></div>`).join('');$('bag').innerHTML=q.bag.length?q.bag.map((f,i)=>`<article class="fish-card"><span class="quality">${'★'.repeat(f.quality)}</span><span class="fish">${FISH[f.id].i}</span><h3>${FISH[f.id].n}</h3><p>${f.size}kg · 基础估值 ${f.value}<br>${LOCS[FISH[f.id].r].n}</p><button data-sell="${i}">单独出售</button></article>`).join(''):'<div class="empty">保鲜箱还是空的，出海带回第一尾鱼吧。</div>';document.querySelectorAll('[data-sell]').forEach(b=>b.onclick=()=>sell(+b.dataset.sell));$('upgrades').innerHTML=Object.entries(UPGRADES).map(([id,d])=>{const lv=q.gear[id],cost=Math.round(d.base*Math.pow(1.65,lv));return`<article class="upgrade"><span>${d.i}</span><h3>${d.n} · Lv.${lv}</h3><p>${d.d}</p><button class="btn" data-up="${id}" ${lv>=d.max?'disabled':''}>${lv>=d.max?'已满级':`升级 ${cost}`}</button></article>`}).join('');document.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>upgrade(b.dataset.up));$('codex').innerHTML=FISH.map((f,id)=>`<div class="codex-card ${q.dex.includes(id)?'':'locked'}"><span>${q.dex.includes(id)?f.i:'❔'}</span><b>${q.dex.includes(id)?f.n:'未发现'}</b><small>${q.dex.includes(id)?`${LOCS[f.r].n} · 难度${f.d}`:'在远海中发现'}</small></div>`).join('');$('castBtn').disabled=state==='waiting'||state==='hooked';save();drawScene()}
function showSave(){const code=exportCode();$('infoTitle').textContent='跨设备港口档案';$('infoBody').innerHTML=`<p>设备、鱼获、图鉴、委托、声望和当前天数都会导出，并带完整性校验。</p><textarea class="savebox" id="saveCode">${code}</textarea><div class="controls"><button class="btn" id="copyCode">复制导出</button><button class="btn" id="importCodeBtn">导入上方存档</button></div>`;$('infoOverlay').classList.remove('hidden');$('copyCode').onclick=()=>navigator.clipboard?.writeText($('saveCode').value);$('importCodeBtn').onclick=()=>{try{importCode($('saveCode').value);$('infoOverlay').classList.add('hidden');alert('导入成功')}catch(e){alert(e.message)}}}
function loop(t){const dt=Math.min(.04,(t-last)/1000||0);last=t;update(dt);raf=requestAnimationFrame(loop)}
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab[data-view]').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id===b.dataset.view+'View'))});$('castBtn').onclick=startCast;$('reelBtn').onpointerdown=e=>{e.preventDefault();reeling=true;$('reelBtn').setPointerCapture(e.pointerId)};$('reelBtn').onpointerup=$('reelBtn').onpointercancel=()=>reeling=false;$('endDayBtn').onclick=endDay;$('sellAllBtn').onclick=sellAll;$('completeBtn').onclick=completeContracts;$('saveBtn').onclick=showSave;$('closeInfoBtn').onclick=()=>$('infoOverlay').classList.add('hidden');$('newBtn').onclick=()=>{if(confirm('清空当前港口档案？')){localStorage.removeItem(SAVE);location.reload()}};
load();drawUI();loop(0);
})();
</script></body></html>
