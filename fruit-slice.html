<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>果切风暴</title><style>body{margin:0;background:#10101a;color:#fff;font-family:system-ui}.app{height:100vh;display:grid;grid-template-columns:1fr 250px;gap:10px;padding:10px;box-sizing:border-box}.stage,aside{border:1px solid #5b4169;border-radius:16px;background:#211527;overflow:hidden}.stage{position:relative}canvas{width:100%;height:100%;display:block}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:#120817c9;text-align:center}.hidden{display:none}.side{padding:14px;display:flex;flex-direction:column;gap:10px}.card{padding:10px;border:1px solid #5c4264;border-radius:10px}.card b{display:block;font-size:24px;color:#ffbf67}button{padding:10px;border:1px solid #9a5f84;border-radius:9px;background:#51273f;color:#fff;font-weight:bold}.help{color:#d4aabc;line-height:1.6}@media(max-width:650px){.app{grid-template-columns:1fr;grid-template-rows:1fr 140px;padding:6px}.side{display:grid;grid-template-columns:repeat(3,1fr);padding:7px}.help{display:none}}</style><main class="app"><section class="stage"><canvas id="c"></canvas><div id="o" class="overlay"><div><h1>果切风暴</h1><p>拖动划出刀光切开水果，避开炸弹。连切与暴击果会快速拉高得分。</p><button id="go">开始 60 秒挑战</button></div></div></section><aside><div class="card">得分<b id="s">0</b></div><div class="card">连击<b id="co">×0</b></div><div class="card">时间 / 失误<b id="t">60 / 3</b></div><button id="reset">新局</button><div class="help">鼠标或手指快速划过目标。每次一刀切多个水果增加连击；炸弹会扣除一次失误，漏掉水果也会扣除。</div></aside></main><script>
const c=document.querySelector('#c'),x=c.getContext('2d'),O=document.querySelector('#o');let q,last=0,trail=[];function reset(){q={run:false,score:0,combo:0,time:60,life:3,spawn:0,objs:[]};sync()}function start(){reset();q.run=true;O.classList.add('hidden')}function add(){let bomb=Math.random()<.12;q.objs.push({x:Math.random(),y:1.1,vx:(Math.random()-.5)*.45,vy:-.7-Math.random()*.45,r:bomb?.045:.038,bomb,color:['#ff6a63','#ffe06b','#77e891','#6ad8ff','#c887ff'][Math.floor(Math.random()*5)]})}function slash(a,b){let cut=0;for(const o of q.objs){let d=distSeg(o.x,o.y,a.x,a.y,b.x,b.y);if(d<o.r&&!o.dead){o.dead=1;if(o.bomb){q.life--;q.combo=0}else{cut++;q.score+=10+q.combo*3}}}if(cut)q.combo+=cut}function distSeg(px,py,x1,y1,x2,y2){let dx=x2-x1,dy=y2-y1,t=((px-x1)*dx+(py-y1)*dy)/(dx*dx+dy*dy||1);t=Math.max(0,Math.min(1,t));return Math.hypot(px-(x1+t*dx),py-(y1+t*dy))}function update(dt){if(!q.run)return;q.time-=dt;q.spawn-=dt;if(q.spawn<0){q.spawn=.45-Math.min(.22,q.score/7000);add();if(Math.random()<.3)add()}for(const o of q.objs){o.x+=o.vx*dt;o.y+=o.vy*dt;o.vy+=1.15*dt;if(o.y>1.12&&!o.dead){o.dead=1;if(!o.bomb)q.life--;q.combo=0}}q.objs=q.objs.filter(o=>!o.dead);if(q.time<=0||q.life<=0)end();sync()}function end(){q.run=false;O.innerHTML=`<div><h1>挑战结束</h1><p>得分 ${q.score} · 最长连击 ${q.combo}</p><button id="go">再来一次</button></div>`;O.classList.remove('hidden');document.querySelector('#go').onclick=start}function sync(){s.textContent=q.score;co.textContent='×'+q.combo;t.textContent=`${Math.ceil(q.time)} / ${q.life}`}function draw(){let w=c.clientWidth,h=c.clientHeight;c.width=w*devicePixelRatio;c.height=h*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);let g=x.createLinearGradient(0,0,0,h);g.addColorStop(0,'#321c43');g.addColorStop(1,'#111220');x.fillStyle=g;x.fillRect(0,0,w,h);for(const o of q.objs){x.fillStyle=o.bomb?'#30313c':o.color;x.beginPath();x.arc(o.x*w,o.y*h,o.r*w,0,7);x.fill();if(o.bomb){x.fillStyle='#ffbd66';x.fillText('✹',o.x*w-5,o.y*h+5)}}x.strokeStyle='#fff4dd';x.lineWidth=4;x.beginPath();trail.forEach((p,i)=>i?x.lineTo(p.x*w,p.y*h):x.moveTo(p.x*w,p.y*h));x.stroke()}function loop(ti){let dt=Math.min(.03,(ti-last)/1000);last=ti;update(dt);draw();requestAnimationFrame(loop)}c.addEventListener('pointermove',e=>{let r=c.getBoundingClientRect(),p={x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height};if(trail.length)slash(trail[trail.length-1],p);trail.push(p);if(trail.length>8)trail.shift()});c.addEventListener('pointerleave',()=>trail=[]);document.querySelector('#go').onclick=start;document.querySelector('#reset').onclick=reset;reset();requestAnimationFrame(loop);
</script>
