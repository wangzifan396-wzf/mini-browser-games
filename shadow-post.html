<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>影邮潜行：十二夜</title>

    <style>
      :root {
        --ink: #101820;
        --paper: #f5efe0;
        --panel: #fffcf2;
        --line: #83939c;
        --night: #16252b;
        --teal: #2f756a;
        --blue: #315f8c;
        --gold: #d4a43f;
        --red: #b74a42;
        --violet: #65577f;
        --shadow: rgba(4, 11, 14, 0.28);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
        background:
          linear-gradient(rgba(245, 239, 224, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(245, 239, 224, 0.06) 1px, transparent 1px),
          linear-gradient(135deg, #0f1a21, #17333a 48%, #343047);
        background-size: 30px 30px, 30px 30px, auto;
        overflow-x: hidden;
      }

      button {
        font: inherit;
      }

      .app {
        width: min(1380px, calc(100vw - 28px));
        margin: 14px auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 16px 20px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: linear-gradient(90deg, rgba(255, 252, 242, 0.98), rgba(233, 246, 241, 0.95));
        box-shadow: 0 16px 36px var(--shadow);
      }

      .eyebrow {
        margin: 0 0 5px;
        color: #806017;
        font-size: 12px;
        font-weight: 900;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 4vw, 44px);
        line-height: 1;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .btn {
        min-height: 42px;
        padding: 0 14px;
        border: 1px solid #214f49;
        border-radius: var(--radius);
        color: #fffdf6;
        background: #24675e;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(12, 45, 42, 0.22);
      }

      .btn.secondary {
        color: var(--ink);
        background: #efd07a;
        border-color: #9c7924;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 14px;
        margin-top: 14px;
        align-items: start;
      }

      .stage,
      .side {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 252, 242, 0.96);
        box-shadow: 0 16px 36px var(--shadow);
      }

      .stage {
        position: relative;
        overflow: hidden;
        min-height: 640px;
      }

      canvas {
        display: block;
        width: 100%;
        height: 640px;
        touch-action: none;
      }

      .side {
        padding: 16px;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .stat {
        padding: 10px;
        border: 1px solid #9aa59d;
        border-radius: var(--radius);
        background: #f8f6ea;
      }

      .stat b {
        display: block;
        font-size: 24px;
        line-height: 1.1;
      }

      .stat small {
        color: #5e6b68;
        font-weight: 800;
      }

      .brief {
        margin: 14px 0;
        padding: 12px;
        border: 1px solid #9aa59d;
        border-radius: var(--radius);
        background: #fff7e4;
        color: #475752;
        line-height: 1.55;
        font-weight: 700;
      }

      .tools {
        display: grid;
        gap: 10px;
      }

      .tool {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px;
        border: 1px solid #8f9e97;
        border-radius: var(--radius);
        background: #f3f8ec;
      }

      .tool button {
        min-width: 82px;
      }

      .pad {
        display: grid;
        grid-template-columns: repeat(3, 58px);
        justify-content: center;
        gap: 8px;
        margin-top: 16px;
      }

      .pad button {
        width: 58px;
        height: 50px;
        border: 1px solid #667871;
        border-radius: var(--radius);
        background: #fbf5e3;
        color: var(--ink);
        font-size: 20px;
        font-weight: 900;
        cursor: pointer;
      }

      .pad .blank {
        visibility: hidden;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(14, 24, 29, 0.52);
      }

      .modal {
        width: min(920px, 100%);
        max-height: calc(100vh - 44px);
        overflow: auto;
        padding: 22px;
        border: 1px solid #a1b1aa;
        border-radius: var(--radius);
        background: #fffdf6;
        box-shadow: 0 24px 52px rgba(0, 0, 0, 0.32);
      }

      .modal h2 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      .modal p {
        margin-bottom: 16px;
        color: #53635f;
        line-height: 1.6;
      }

      .hidden {
        display: none;
      }

      .campaign-head,
      .campaign-stats,
      .archive-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .campaign-head {
        align-items: flex-start;
      }

      .campaign-stats {
        min-width: 250px;
      }

      .campaign-stat,
      .mission-card,
      .goal-box {
        border: 1px solid #9aa59d;
        border-radius: var(--radius);
        background: #fff7e4;
      }

      .campaign-stat {
        flex: 1;
        padding: 8px 10px;
      }

      .campaign-stat small,
      .mission-card small {
        display: block;
        color: #5e6b68;
        font-size: 11px;
        font-weight: 900;
      }

      .campaign-stat strong {
        display: block;
        margin-top: 3px;
        font-size: 18px;
      }

      .mission-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin: 14px 0;
      }

      .mission-card {
        min-height: 96px;
        padding: 10px;
        color: var(--ink);
        text-align: left;
        font: inherit;
        cursor: pointer;
      }

      .mission-card strong {
        display: block;
        margin: 4px 0;
      }

      .mission-card.selected {
        border-color: var(--gold);
        box-shadow: inset 0 0 0 1px var(--gold);
      }

      .mission-card:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .mission-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 6px;
      }

      .mission-meta span {
        padding: 3px 5px;
        border: 1px solid rgba(94, 107, 104, 0.25);
        border-radius: 4px;
        color: #5e6b68;
        font-size: 10px;
        font-weight: 900;
      }

      .stars {
        color: #9a6a12;
        font-weight: 900;
      }

      .archive-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .archive-row input {
        min-width: 0;
        min-height: 40px;
        border: 1px solid #9aa59d;
        border-radius: var(--radius);
        padding: 8px;
        background: #fffdf6;
        font: 12px ui-monospace, Consolas, monospace;
      }

      .goal-box {
        margin-top: 12px;
        padding: 10px;
      }

      .goal-row {
        min-height: 27px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr) auto;
        align-items: center;
        gap: 6px;
        color: #5e6b68;
        font-size: 12px;
        font-weight: 800;
      }

      .goal-row.done {
        color: var(--teal);
      }

      @media (max-width: 940px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .stage {
          order: -1;
        }

        .stage {
          min-height: 560px;
        }

        canvas {
          height: 560px;
        }
      }

      @media (max-width: 620px) {
        .app {
          width: min(100vw - 16px, 1380px);
          margin-top: 8px;
        }

        .topbar {
          display: block;
          padding: 14px;
        }

        .actions {
          justify-content: stretch;
          margin-top: 12px;
        }

        .btn {
          flex: 1 1 auto;
        }

        canvas {
          height: 500px;
        }

        .stage {
          min-height: 500px;
        }

        .overlay {
          align-items: start;
          overflow: auto;
          padding: 8px;
        }

        .modal {
          max-height: none;
        }

        .campaign-head {
          display: block;
        }

        .campaign-stats {
          min-width: 0;
          margin-top: 10px;
        }

        .mission-grid,
        .archive-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">TURN STEALTH</p>
          <h1>影邮潜行：十二夜</h1>
        </div>
        <div class="actions">
          <button class="btn" id="startBtn">任务簿</button>
          <button class="btn secondary" id="undoBtn">撤回</button>
          <button class="btn secondary" id="resetBtn">重开</button>
        </div>
      </header>

      <section class="layout">
        <div class="stage">
          <canvas id="gameCanvas" aria-label="影邮潜行棋盘"></canvas>
          <div class="overlay" id="overlay">
            <div class="modal">
              <div id="campaignView">
                <div class="campaign-head">
                  <div><h2>十二夜任务簿</h2><p>看清守卫规则，送完所有密信，再从出口撤离。</p></div>
                  <div class="campaign-stats">
                    <div class="campaign-stat"><small>星章</small><strong id="campaignStars">0/36</strong></div>
                    <div class="campaign-stat"><small>完成</small><strong id="campaignClears">0/12</strong></div>
                    <div class="campaign-stat"><small>勋章</small><strong id="campaignMedals">0/6</strong></div>
                  </div>
                </div>
                <div class="mission-grid" id="missionGrid"></div>
                <div class="archive-row">
                  <input id="archiveCode" aria-label="影邮存档码" placeholder="SHADOW2 跨设备存档码">
                  <div class="archive-actions"><button class="btn secondary" id="exportBtn">导出</button><button class="btn secondary" id="importBtn">导入</button><button class="btn secondary" id="soundBtn">音效：开</button></div>
                </div>
                <button class="btn" id="campaignStartBtn" style="width:100%;margin-top:12px">开始任务</button>
              </div>
              <div id="messageView" class="hidden">
                <h2 id="overlayTitle">夜班派送</h2>
                <p id="overlayText">规划路线，把信送进所有邮箱，再从出口离开。</p>
                <div class="goal-box" id="resultGoals"></div>
                <div class="archive-actions"><button class="btn secondary" id="campaignBtn">返回任务簿</button><button class="btn" id="overlayBtn">重试本关</button></div>
              </div>
            </div>
          </div>
        </div>
        <aside class="side">
          <div class="stat-grid">
            <div class="stat"><b id="levelText">1</b><small>关卡</small></div>
            <div class="stat"><b id="stepsText">0</b><small>步数</small></div>
            <div class="stat"><b id="mailText">0/0</b><small>邮件</small></div>
            <div class="stat"><b id="bestText">--</b><small>最佳</small></div>
          </div>
          <p class="brief" id="briefText">避开灯锥，踩阴影，必要时用一枚烟雾弹穿过视线。</p>
          <div class="tools">
            <div class="tool">
              <span><b>烟雾弹</b><br><small>本回合无视灯光</small></span>
              <button class="btn secondary" id="smokeBtn">使用</button>
            </div>
            <div class="tool">
              <span><b>等一拍</b><br><small>不移动，让巡逻换位</small></span>
              <button class="btn secondary" id="waitBtn">等待</button>
            </div>
            <div class="tool">
              <span><b>假信号</b><br><small>守卫转身并推进一回合</small></span>
              <button class="btn secondary" id="decoyBtn">使用</button>
            </div>
          </div>
          <div class="goal-box"><strong id="missionName">后巷第一封</strong><div id="goalList"></div></div>
          <div class="pad">
            <button class="blank" aria-hidden="true"></button>
            <button data-dir="up">↑</button>
            <button class="blank" aria-hidden="true"></button>
            <button data-dir="left">←</button>
            <button data-dir="down">↓</button>
            <button data-dir="right">→</button>
          </div>
        </aside>
      </section>
    </main>

        const dirs = [
          { x: 0, y: -1 },
          { x: 1, y: 0 },
          { x: 0, y: 1 },
          { x: -1, y: 0 }
        ];

        let dpr = 1;
        let w = 900;
        let h = 640;
        let state;
        let audioCtx = null;
        let career = loadCareer();

        function defaultCareer() {
          return { version: 2, selectedLevel: levels[0].id, stageStars: {}, bestSteps: {}, clears: 0, sound: true };
        }

        function totalStars(source = career) {
          return Object.values(source.stageStars || {}).reduce((sum, value) => sum + Math.max(0, Math.min(3, Number(value) || 0)), 0);
        }

        function sanitizeCareer(raw) {
          const base = defaultCareer();
          if (!raw || typeof raw !== "object") return base;
          const valid = new Set(levels.map((level) => level.id));
          const clean = { version: 2, selectedLevel: valid.has(raw.selectedLevel) ? raw.selectedLevel : base.selectedLevel, stageStars: {}, bestSteps: {}, clears: Math.max(0, Math.round(Number(raw.clears) || 0)), sound: raw.sound !== false };
          for (const [id, value] of Object.entries(raw.stageStars || {})) if (valid.has(id)) clean.stageStars[id] = Math.max(0, Math.min(3, Math.round(Number(value) || 0)));
          for (const [id, value] of Object.entries(raw.bestSteps || {})) if (valid.has(id) && Number(value) > 0) clean.bestSteps[id] = Math.round(Number(value));
          if ((levels.find((level) => level.id === clean.selectedLevel)?.unlock || 0) > totalStars(clean)) clean.selectedLevel = levels.filter((level) => level.unlock <= totalStars(clean)).at(-1)?.id || levels[0].id;
          return clean;
        }

        function loadCareer() {
          try {
            const stored = JSON.parse(localStorage.getItem(SAVE_KEY) || "null");
            if (stored) return sanitizeCareer(stored);
            const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY) || "null");
            if (legacy) {
              const migrated = defaultCareer();
              levels.slice(0, 4).forEach((level, index) => {
                const best = Number(legacy[`level${index}`]);
                if (!best) return;
                migrated.bestSteps[level.id] = best;
                migrated.stageStars[level.id] = best <= level.par ? 2 : 1;
              });
              localStorage.setItem(SAVE_KEY, JSON.stringify(migrated));
              return migrated;
            }
          } catch (error) {
            // Invalid local data starts a clean campaign.
          }
          return defaultCareer();
        }

        function saveCareer() {
          localStorage.setItem(SAVE_KEY, JSON.stringify(career));
        }

        function encodeCareer() {
          const bytes = new TextEncoder().encode(JSON.stringify(career));
          let binary = "";
          for (const byte of bytes) binary += String.fromCharCode(byte);
          return SAVE_PREFIX + btoa(binary);
        }

        function importCareer(code) {
          const text = String(code || "").trim();
          if (!text.startsWith(SAVE_PREFIX)) throw new Error("存档码前缀不正确");
          const binary = atob(text.slice(SAVE_PREFIX.length));
          const value = JSON.parse(new TextDecoder().decode(Uint8Array.from(binary, (char) => char.charCodeAt(0))));
          if (value.version !== 2) throw new Error("存档版本不兼容");
          career = sanitizeCareer(value);
          saveCareer();
          renderCampaign();
          return career;
        }

        function ensureAudio() {
          if (!career.sound) return;
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === "suspended") audioCtx.resume();
        }

        function tone(freq, duration = 0.08, gain = 0.035) {
          if (!career.sound) return;
          ensureAudio();
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const amp = audioCtx.createGain();
          osc.type = "triangle";
          osc.frequency.value = freq;
          amp.gain.setValueAtTime(gain, audioCtx.currentTime);
          amp.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
          osc.connect(amp).connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + duration);
        }

        function clone(value) {
          return JSON.parse(JSON.stringify(value));
        }

        function makeState(levelIndex = 0) {
          const level = levels[levelIndex];
          const grid = level.map.map((row) => row.split(""));
          const mail = [];
          let player = { x: 1, y: 1 };
          let exit = { x: 1, y: 1 };
          for (let y = 0; y < grid.length; y += 1) {
            for (let x = 0; x < grid[y].length; x += 1) {
              if (grid[y][x] === "S") {
                player = { x, y };
                grid[y][x] = ".";
              } else if (grid[y][x] === "E") {
                exit = { x, y };
                grid[y][x] = ".";
              } else if (grid[y][x] === "M") {
                mail.push({ x, y, done: false });
                grid[y][x] = ".";
              } else if (grid[y][x] === "G") {
                grid[y][x] = ".";
              }
            }
          }
          return {
            mode: "menu",
            levelIndex,
            grid,
            player,
            exit,
            mail,
            guards: clone(level.guards),
            smoke: level.smoke,
            decoys: level.decoys,
            smokeArmed: false,
            toolsUsed: 0,
            steps: 0,
            caught: false,
            won: false,
            history: []
          };
        }

        state = makeState(Math.max(0, levels.findIndex((level) => level.id === career.selectedLevel)));

        function resizeCanvas() {
          const rect = canvas.getBoundingClientRect();
          dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
          w = Math.max(320, rect.width);
          h = Math.max(500, rect.height);
          canvas.width = Math.floor(w * dpr);
          canvas.height = Math.floor(h * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          draw();
        }

        function tileSize() {
          const cols = state.grid[0].length;
          const rows = state.grid.length;
          return Math.floor(Math.min((w - 54) / cols, (h - 74) / rows));
        }

        function boardOrigin() {
          const size = tileSize();
          return {
            x: Math.floor((w - state.grid[0].length * size) / 2),
            y: Math.floor((h - state.grid.length * size) / 2) + 10,
            size
          };
        }

        function medalState() {
          const stars = totalStars();
          return [
            ["第一封信", Object.keys(career.stageStars).length > 0],
            ["后巷全星", stars >= 9],
            ["钟楼潜影", stars >= 18],
            ["无道具派送", Object.values(career.stageStars).some((value) => value >= 3)],
            ["二十八星", stars >= 28],
            ["十二夜终局", Boolean(career.stageStars["night-12"])]
          ];
        }

        function missionStats(completed = state.won) {
          return { completed, steps: state.steps, toolsUsed: state.toolsUsed };
        }

        function goalRows(stats = missionStats(false)) {
          const level = levels[state.levelIndex];
          const goals = [
            [stats.completed, "完成全部投递并撤离", stats.completed ? "完成" : "进行中"],
            [stats.completed && stats.steps <= level.par, `不超过 ${level.par} 步`, `${stats.steps}/${level.par}`],
            [stats.completed && stats.toolsUsed === 0, "不使用烟雾与假信号", `${stats.toolsUsed} 次`]
          ];
          return goals.map(([done, label, progress]) => `<div class="goal-row ${done ? "done" : ""}"><span>${done ? "●" : "○"}</span><span>${label}</span><strong>${progress}</strong></div>`).join("");
        }

        function renderCampaign() {
          const stars = totalStars();
          campaignStars.textContent = `${stars}/36`;
          campaignClears.textContent = `${Object.keys(career.stageStars).length}/12`;
          campaignMedals.textContent = `${medalState().filter(([, done]) => done).length}/6`;
          soundBtn.textContent = `音效：${career.sound ? "开" : "关"}`;
          missionGrid.innerHTML = levels.map((level, index) => {
            const locked = level.unlock > stars;
            const earned = career.stageStars[level.id] || 0;
            const guardRules = [...new Set(level.guards.map((guard) => guard.type))].map((type) => ({ turn: "轮转", patrol: "巡逻", reverse: "逆转", sentry: "长哨" }[type])).join("+");
            return `<button class="mission-card ${career.selectedLevel === level.id ? "selected" : ""}" data-level="${level.id}" ${locked ? "disabled" : ""}><small>${String(index + 1).padStart(2, "0")} · ${level.chapter}</small><strong>${level.name}</strong><div class="stars">${"★".repeat(earned)}${"☆".repeat(3 - earned)}</div><div class="mission-meta"><span>${guardRules}</span><span>${level.par} 步</span><span>${locked ? `${level.unlock} 星解锁` : `${level.smoke} 烟 / ${level.decoys} 饵`}</span></div></button>`;
          }).join("");
        }

        function openCampaign() {
          state.mode = "menu";
          campaignView.classList.remove("hidden");
          messageView.classList.add("hidden");
          overlay.classList.remove("hidden");
          renderCampaign();
        }

        function startLevel(levelIndex = state.levelIndex) {
          if (typeof levelIndex === "string") levelIndex = levels.findIndex((level) => level.id === levelIndex);
          if (levelIndex < 0) levelIndex = 0;
          if (levels[levelIndex].unlock > totalStars()) return;
          career.selectedLevel = levels[levelIndex].id;
          saveCareer();
          state = makeState(levelIndex);
          state.mode = "playing";
          ensureAudio();
          overlay.classList.add("hidden");
          updateHud();
          draw();
        }

        function setOverlay(title, text, button) {
          overlayTitle.textContent = title;
          overlayText.textContent = text;
          overlayBtn.textContent = button;
          campaignView.classList.add("hidden");
          messageView.classList.remove("hidden");
          resultGoals.innerHTML = goalRows();
          overlay.classList.remove("hidden");
        }

        function cell(x, y) {
          return state.grid[y] && state.grid[y][x] ? state.grid[y][x] : "#";
        }

        function guardAt(x, y) {
          return state.guards.find((guard) => guard.x === x && guard.y === y);
        }

        function canSee(guard, x, y) {
          if (guard.x === x && guard.y === y) return true;
          const dir = dirs[guard.dir];
          const range = guard.type === "sentry" ? 6 : 4;
          for (let dist = 1; dist <= range; dist += 1) {
            const tx = guard.x + dir.x * dist;
            const ty = guard.y + dir.y * dist;
            if (cell(tx, ty) === "#") return false;
            if (tx === x && ty === y) return true;
          }
          if (guard.type === "sentry") return false;
          const sideA = (guard.dir + 1) % 4;
          const sideB = (guard.dir + 3) % 4;
          return [sideA, sideB].some((side) => {
            const tx = guard.x + dirs[side].x;
            const ty = guard.y + dirs[side].y;
            return tx === x && ty === y;
          });
        }

        function inDanger(x = state.player.x, y = state.player.y) {
          return state.guards.some((guard) => canSee(guard, x, y));
        }

        function pushHistory() {
          state.history.push({
            player: clone(state.player),
            guards: clone(state.guards),
            mail: clone(state.mail),
            smoke: state.smoke,
            decoys: state.decoys,
            smokeArmed: state.smokeArmed,
            toolsUsed: state.toolsUsed,
            steps: state.steps
          });
          if (state.history.length > 80) state.history.shift();
        }

        function restoreHistory() {
          const last = state.history.pop();
          if (!last || !["playing", "caught"].includes(state.mode)) return;
          overlay.classList.add("hidden");
          state.player = last.player;
          state.guards = last.guards;
          state.mail = last.mail;
          state.smoke = last.smoke;
          state.decoys = last.decoys;
          state.smokeArmed = last.smokeArmed;
          state.toolsUsed = last.toolsUsed;
          state.steps = last.steps;
          state.caught = false;
          state.won = false;
          state.mode = "playing";
          updateHud();
          draw();
        }

        function moveGuards() {
          for (const guard of state.guards) {
            if (guard.type === "turn") {
              guard.dir = (guard.dir + 1) % 4;
            } else if (guard.type === "reverse") {
              guard.dir = (guard.dir + 3) % 4;
            } else if (guard.type === "patrol") {
              const nextStep = (guard.step + 1) % guard.route.length;
              const next = guard.route[nextStep];
              const dx = next[0] - guard.x;
              const dy = next[1] - guard.y;
              if (dx === 1) guard.dir = 1;
              else if (dx === -1) guard.dir = 3;
              else if (dy === 1) guard.dir = 2;
              else if (dy === -1) guard.dir = 0;
              guard.x = next[0];
              guard.y = next[1];
              guard.step = nextStep;
            }
          }
        }

        function collectMail() {
          for (const mail of state.mail) {
            if (!mail.done && mail.x === state.player.x && mail.y === state.player.y) {
              mail.done = true;
              tone(620, 0.09, 0.035);
            }
          }
        }

        function allMailDone() {
          return state.mail.every((mail) => mail.done);
        }

        function step(dx, dy) {
          if (state.mode !== "playing") return;
          const nx = state.player.x + dx;
          const ny = state.player.y + dy;
          if (cell(nx, ny) === "#" || guardAt(nx, ny)) return;
          pushHistory();
          state.player = { x: nx, y: ny };
          state.steps += 1;
          collectMail();
          moveGuards();
          resolveTurn();
        }

        function waitTurn() {
          if (state.mode !== "playing") return;
          pushHistory();
          state.steps += 1;
          moveGuards();
          resolveTurn();
        }

        function resolveTurn() {
          const protectedBySmoke = state.smokeArmed;
          if (state.smokeArmed) state.smokeArmed = false;
          if (inDanger() && !protectedBySmoke) {
            state.caught = true;
            state.mode = "caught";
            setOverlay("被照到了", "守卫发现了脚步声。撤回一步或重新规划路线。", "重试本关");
            tone(150, 0.18, 0.05);
          } else if (state.player.x === state.exit.x && state.player.y === state.exit.y && allMailDone()) {
            state.won = true;
            const level = levels[state.levelIndex];
            const stats = missionStats(true);
            const stars = [true, stats.steps <= level.par, stats.toolsUsed === 0].filter(Boolean).length;
            const previous = career.stageStars[level.id] || 0;
            career.stageStars[level.id] = Math.max(previous, stars);
            career.bestSteps[level.id] = Math.min(career.bestSteps[level.id] || Infinity, state.steps);
            career.clears += 1;
            saveCareer();
            const best = career.bestSteps[level.id];
            const next = state.levelIndex + 1;
            if (next >= levels.length) {
              state.mode = "done";
              setOverlay(`十二夜完成 · ${"★".repeat(stars)}${"☆".repeat(3 - stars)}`, `最后一关 ${state.steps} 步，最佳 ${best} 步。`, "重试终局");
            } else {
              state.mode = "won";
              setOverlay(`投递成功 · ${"★".repeat(stars)}${"☆".repeat(3 - stars)}`, `本关 ${state.steps} 步，目标 ${level.par} 步，使用道具 ${state.toolsUsed} 次。`, "下一关");
            }
            resultGoals.innerHTML = goalRows(stats);
            tone(760, 0.12, 0.045);
          }
          updateHud();
          draw();
        }

        function armSmoke() {
          if (state.mode !== "playing" || state.smoke <= 0 || state.smokeArmed) return;
          state.smoke -= 1;
          state.smokeArmed = true;
          state.toolsUsed += 1;
          tone(360, 0.08, 0.03);
          updateHud();
          draw();
        }

        function useDecoy() {
          if (state.mode !== "playing" || state.decoys <= 0) return;
          pushHistory();
          state.decoys -= 1;
          state.toolsUsed += 1;
          state.steps += 1;
          for (const guard of state.guards) guard.dir = (guard.dir + 2) % 4;
          tone(440, 0.1, 0.035);
          resolveTurn();
        }

        function drawRoundRect(x, y, width, height, radius, fill, stroke) {
          ctx.beginPath();
          ctx.moveTo(x + radius, y);
          ctx.arcTo(x + width, y, x + width, y + height, radius);
          ctx.arcTo(x + width, y + height, x, y + height, radius);
          ctx.arcTo(x, y + height, x, y, radius);
          ctx.arcTo(x, y, x + width, y, radius);
          if (fill) {
            ctx.fillStyle = fill;
            ctx.fill();
          }
          if (stroke) {
            ctx.strokeStyle = stroke;
            ctx.stroke();
          }
        }

        function draw() {
          ctx.clearRect(0, 0, w, h);
          const grad = ctx.createLinearGradient(0, 0, 0, h);
          grad.addColorStop(0, "#eef7f0");
          grad.addColorStop(0.58, "#f6efd9");
          grad.addColorStop(1, "#d4d8bd");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);

          const { x: ox, y: oy, size } = boardOrigin();
          drawRoundRect(ox - 14, oy - 14, state.grid[0].length * size + 28, state.grid.length * size + 28, 8, "rgba(17,28,34,.9)", "#8aa29a");

          for (let y = 0; y < state.grid.length; y += 1) {
            for (let x = 0; x < state.grid[y].length; x += 1) {
              const px = ox + x * size;
              const py = oy + y * size;
              const wall = cell(x, y) === "#";
              ctx.fillStyle = wall ? "#26363c" : ((x + y) % 2 ? "#f5edd8" : "#fff9e9");
              ctx.fillRect(px, py, size - 1, size - 1);
              if (!wall) {
                ctx.fillStyle = "rgba(47,117,106,.06)";
                ctx.fillRect(px + 5, py + 5, size - 11, size - 11);
              }
            }
          }

          for (const guard of state.guards) {
            drawVision(guard, ox, oy, size);
          }

          const ex = ox + state.exit.x * size;
          const ey = oy + state.exit.y * size;
          drawRoundRect(ex + size * 0.18, ey + size * 0.18, size * 0.64, size * 0.64, 7, allMailDone() ? "#8fd0a5" : "#9aa6a2", "#28423c");
          ctx.fillStyle = "#17302c";
          ctx.font = `900 ${Math.max(15, size * 0.32)}px system-ui`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("出", ex + size / 2, ey + size / 2);

          for (const mail of state.mail) {
            const mx = ox + mail.x * size;
            const my = oy + mail.y * size;
            drawRoundRect(mx + size * 0.22, my + size * 0.26, size * 0.56, size * 0.42, 5, mail.done ? "#c8dccb" : "#f0c75b", "#725a19");
            ctx.strokeStyle = "#725a19";
            ctx.lineWidth = Math.max(1, size * 0.04);
            ctx.beginPath();
            ctx.moveTo(mx + size * 0.24, my + size * 0.28);
            ctx.lineTo(mx + size * 0.5, my + size * 0.5);
            ctx.lineTo(mx + size * 0.76, my + size * 0.28);
            ctx.stroke();
          }

          for (const guard of state.guards) {
            const gx = ox + guard.x * size + size / 2;
            const gy = oy + guard.y * size + size / 2;
            ctx.fillStyle = guard.type === "sentry" ? "#6b4f72" : guard.type === "reverse" ? "#76513e" : "#314a5a";
            ctx.beginPath();
            ctx.arc(gx, gy, size * 0.27, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#f4d36c";
            const dir = dirs[guard.dir];
            ctx.beginPath();
            ctx.arc(gx + dir.x * size * 0.13, gy + dir.y * size * 0.13, size * 0.08, 0, Math.PI * 2);
            ctx.fill();
          }

          const px = ox + state.player.x * size + size / 2;
          const py = oy + state.player.y * size + size / 2;
          ctx.fillStyle = state.smokeArmed ? "#6b637d" : "#2f756a";
          ctx.beginPath();
          ctx.arc(px, py, size * 0.28, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#fffdf2";
          ctx.font = `900 ${Math.max(16, size * 0.34)}px system-ui`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
            ctx.fillText("邮", px, py + 1);

          ctx.fillStyle = "#122127";
          ctx.font = "900 20px system-ui";
          ctx.textAlign = "left";
          ctx.fillText(`${levels[state.levelIndex].chapter} · ${levels[state.levelIndex].name}`, 22, 34);
        }

        function drawVision(guard, ox, oy, size) {
          ctx.fillStyle = "rgba(212, 164, 63, 0.28)";
          const mark = (x, y, alpha) => {
            if (cell(x, y) === "#") return false;
            ctx.fillStyle = `rgba(212, 164, 63, ${alpha})`;
            ctx.fillRect(ox + x * size + 3, oy + y * size + 3, size - 7, size - 7);
            return true;
          };
          mark(guard.x, guard.y, 0.14);
          const dir = dirs[guard.dir];
          const range = guard.type === "sentry" ? 6 : 4;
          for (let dist = 1; dist <= range; dist += 1) {
            const x = guard.x + dir.x * dist;
            const y = guard.y + dir.y * dist;
            if (cell(x, y) === "#") break;
            mark(x, y, 0.32 - dist * 0.035);
          }
          if (guard.type !== "sentry") {
            [1, 3].forEach((turn) => {
              const side = dirs[(guard.dir + turn) % 4];
              mark(guard.x + side.x, guard.y + side.y, 0.18);
            });
          }
        }

        function updateHud() {
          const done = state.mail.filter((mail) => mail.done).length;
          const level = levels[state.levelIndex];
          const best = career.bestSteps[level.id];
          levelText.textContent = `${state.levelIndex + 1}/${levels.length}`;
          stepsText.textContent = state.steps.toString();
          mailText.textContent = `${done}/${state.mail.length}`;
          bestText.textContent = best ? best.toString() : "--";
          smokeBtn.textContent = state.smokeArmed ? "已就绪" : `${state.smoke} 枚`;
          smokeBtn.disabled = state.smoke <= 0 || state.smokeArmed || state.mode !== "playing";
          decoyBtn.textContent = `${state.decoys} 枚`;
          decoyBtn.disabled = state.decoys <= 0 || state.mode !== "playing";
          missionName.textContent = `${level.chapter} · ${level.name}`;
          goalList.innerHTML = goalRows();
          briefText.textContent = state.smokeArmed
            ? "烟雾弹已经就绪，下一步就算穿过灯光也不会被抓。"
            : `目标 ${level.par} 步；轮转守卫顺时针，逆转守卫逆时针，紫色长哨拥有六格直线视野。`;
        }

        function pointerToCell(event) {
          const rect = canvas.getBoundingClientRect();
          const { x: ox, y: oy, size } = boardOrigin();
          const x = Math.floor((event.clientX - rect.left - ox) / size);
          const y = Math.floor((event.clientY - rect.top - oy) / size);
          return { x, y };
        }

        startBtn.addEventListener("click", openCampaign);
        resetBtn.addEventListener("click", () => startLevel(state.levelIndex));
        undoBtn.addEventListener("click", restoreHistory);
        smokeBtn.addEventListener("click", armSmoke);
        waitBtn.addEventListener("click", waitTurn);
        decoyBtn.addEventListener("click", useDecoy);
        campaignStartBtn.addEventListener("click", () => startLevel(career.selectedLevel));
        campaignBtn.addEventListener("click", openCampaign);
        overlayBtn.addEventListener("click", () => {
          if (state.mode === "won") startLevel(state.levelIndex + 1);
          else if (state.mode === "done") startLevel(state.levelIndex);
          else startLevel(state.levelIndex);
        });
        missionGrid.addEventListener("click", (event) => {
          const button = event.target.closest("[data-level]");
          if (!button || button.disabled) return;
          career.selectedLevel = button.dataset.level;
          saveCareer();
          renderCampaign();
        });
        exportBtn.addEventListener("click", async () => {
          archiveCode.value = encodeCareer();
          archiveCode.select();
          try { await navigator.clipboard.writeText(archiveCode.value); } catch (error) {}
        });
        importBtn.addEventListener("click", () => {
          try { importCareer(archiveCode.value); }
          catch (error) { archiveCode.value = error.message || "存档码无效"; }
        });
        soundBtn.addEventListener("click", () => {
          career.sound = !career.sound;
          saveCareer();
          renderCampaign();
        });
        document.querySelectorAll("[data-dir]").forEach((button) => {
          button.addEventListener("click", () => {
            const dir = button.dataset.dir;
            if (dir === "up") step(0, -1);
            if (dir === "down") step(0, 1);
            if (dir === "left") step(-1, 0);
            if (dir === "right") step(1, 0);
          });
        });
        canvas.addEventListener("pointerdown", (event) => {
          const target = pointerToCell(event);
          const dx = target.x - state.player.x;
          const dy = target.y - state.player.y;
          if (Math.abs(dx) + Math.abs(dy) === 1) step(dx, dy);
        });
        document.addEventListener("keydown", (event) => {
          if (event.repeat) return;
          if (event.code === "ArrowUp" || event.code === "KeyW") step(0, -1);
          if (event.code === "ArrowDown" || event.code === "KeyS") step(0, 1);
          if (event.code === "ArrowLeft" || event.code === "KeyA") step(-1, 0);
          if (event.code === "ArrowRight" || event.code === "KeyD") step(1, 0);
          if (event.code === "Space") {
            event.preventDefault();
            waitTurn();
          }
          if (event.code === "KeyQ") armSmoke();
          if (event.code === "KeyE") useDecoy();
          if (event.code === "KeyZ") restoreHistory();
          if (event.code === "KeyR") startLevel(state.levelIndex);
        });
        window.addEventListener("resize", resizeCanvas);
        if (new URLSearchParams(location.search).has("debug")) {
          window.__shadowPostDebug = {
            snapshot() {
              return {
                career: JSON.parse(JSON.stringify(career)),
                totalStars: totalStars(),
                level: levels[state.levelIndex].id,
                levelIndex: state.levelIndex,
                mode: state.mode,
                steps: state.steps,
                smoke: state.smoke,
                decoys: state.decoys,
                toolsUsed: state.toolsUsed,
                guards: clone(state.guards),
                mapRows: state.grid.length,
                mapCols: state.grid[0].length,
                savePrefix: SAVE_PREFIX.slice(0, -1)
              };
            },
            start(levelId = career.selectedLevel) {
              const level = levels.find((item) => item.id === levelId);
              if (level && level.unlock > totalStars()) career.stageStars = Object.fromEntries(levels.map((item) => [item.id, 3]));
              startLevel(levelId);
              return this.snapshot();
            },
            forceComplete(payload = {}) {
              state.steps = Number(payload.steps) || levels[state.levelIndex].par;
              state.toolsUsed = Number(payload.toolsUsed) || 0;
              state.mail.forEach((mail) => { mail.done = true; });
              state.player = { ...state.exit };
              state.smokeArmed = true;
              resolveTurn();
              return this.snapshot();
            },
            unlockAll() {
              career.stageStars = Object.fromEntries(levels.map((item) => [item.id, 3]));
              saveCareer();
              renderCampaign();
              return this.snapshot();
            },
            encodeCareer,
            importCareer,
            data: { levels }
          };
        }
        resizeCanvas();
        renderCampaign();
        updateHud();
        draw();
      })();
    </script>
  </body>
</html>
