<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>数独工坊</title><style>body{margin:0;background:#0c1320;color:#edf6ff;font-family:system-ui}.app{min-height:100vh;display:grid;place-items:center;padding:12px;box-sizing:border-box}.shell{display:grid;grid-template-columns:minmax(300px,560px) 240px;gap:12px;padding:14px;border:1px solid #37566f;border-radius:18px;background:#142334}.grid{display:grid;grid-template-columns:repeat(9,1fr);border:2px solid #6ecbea}.cell{aspect-ratio:1;border:1px solid #315269;background:#102031;color:#fff;font-size:clamp(15px,3vw,26px);font-weight:bold}.cell.fixed{background:#263b4c;color:#75ddff}.cell.bad{background:#7d3541}.side{display:flex;flex-direction:column;gap:8px}.nums{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}button{border:1px solid #4b7894;border-radius:8px;background:#1d3a50;color:white;padding:10px;font-weight:bold}.card{padding:10px;border:1px solid #365b73;border-radius:9px}.card b{display:block;font-size:22px;color:#72e4ff}.hint{color:#a9c4d5;line-height:1.6}@media(max-width:650px){.shell{grid-template-columns:1fr;width:100%}.side{display:grid;grid-template-columns:repeat(3,1fr)}.hint{display:none}}</style><main class="app"><div class="shell"><div class="grid" id="g"></div><aside class="side"><div class="card">难度<b id="d">标准</b></div><div class="card">错误 / 提示<b id="st">0 / 3</b></div><div class="nums" id="numPad"></div><button id="erase">擦除</button><button id="hint">提示</button><button id="newGame">换题</button><div class="hint">选择格子后输入数字。可使用数字键或右侧按钮；错误会高亮，三次提示能填入一个正确数字。</div></aside></div></main><script>
const G=document.querySelector('#g'),PAD=document.querySelector('#numPad'),D=document.querySelector('#d'),ST=document.querySelector('#st');const puzzles=['530070000600195000098000060800060003400803001700020006060000280000419005000080079','000260701680070090190004500820100040004602900050003028009300074040050036703018000','000000907000420180000705026100904000050000040000507009920108000034059000507000000'],sol=['534678912672195348198342567859761423426853791713924856961537284287419635345286179','435269781682571493197834562826195347826195347374682915951743628519326874248957136763418259','462831957795426183381795426178964235659312748243587619926148573834259761517673894'];let q;function reset(){let i=Math.floor(Math.random()*puzzles.length);q={p:puzzles[i].split('').map(Number),s:sol[i].split('').map(Number),fixed:[],sel:0,err:0,hints:3};q.fixed=q.p.map(v=>!!v);draw();buildPad()}function draw(){G.innerHTML=q.p.map((v,i)=>`<button class="cell ${q.fixed[i]?'fixed':''} ${v&&v!==q.s[i]?'bad':''}" data-i="${i}">${v||''}</button>`).join('');G.querySelectorAll('button').forEach(b=>b.onclick=()=>{q.sel=+b.dataset.i;draw()});D.textContent='标准';ST.textContent=`${q.err} / ${q.hints}`}function buildPad(){PAD.innerHTML=Array.from({length:9},(_,i)=>`<button data-n="${i+1}">${i+1}</button>`).join('');PAD.querySelectorAll('button').forEach(b=>b.onclick=()=>set(+b.dataset.n))}function set(n){let i=q.sel;if(q.fixed[i])return;q.p[i]=n;if(n!==q.s[i])q.err++;if(q.p.every((v,j)=>v===q.s[j]))setTimeout(()=>alert('数独完成！'),10);draw()}document.querySelector('#erase').onclick=()=>{if(!q.fixed[q.sel]){q.p[q.sel]=0;draw()}};document.querySelector('#hint').onclick=()=>{if(q.hints&&!q.fixed[q.sel]){q.hints--;q.p[q.sel]=q.s[q.sel];draw()}};document.querySelector('#newGame').onclick=reset;addEventListener('keydown',e=>{if(+e.key>=1&&+e.key<=9)set(+e.key);if(e.key==='Backspace')document.querySelector('#erase').click()});reset();
</script>
