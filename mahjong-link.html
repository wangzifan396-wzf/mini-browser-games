<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>麻将连台</title><style>body{margin:0;background:#10251f;color:#f1fff8;font-family:system-ui}.app{min-height:100vh;display:grid;place-items:center;padding:12px}.shell{width:min(850px,100%);padding:14px;border:1px solid #397d69;border-radius:18px;background:#17392f}.board{display:grid;grid-template-columns:repeat(8,1fr);gap:7px}.tile{aspect-ratio:.75;border:0;border-radius:8px;background:#f4ecd8;color:#18372d;font-size:clamp(16px,3vw,28px);box-shadow:0 4px #b8a986;font-weight:bold}.tile.sel{outline:4px solid #ffd867}.tile.gone{visibility:hidden}.top{display:flex;justify-content:space-between;gap:8px;margin-bottom:12px}.row{display:flex;gap:7px}button{padding:9px;border:1px solid #559d87;border-radius:8px;background:#225747;color:white;font-weight:bold}@media(max-width:520px){.board{gap:4px}.shell{padding:8px}}</style><main class="app"><div class="shell"><div class="top"><div><h1>麻将连台</h1><div id="msg">选择两个相同且至少一侧开放的牌。</div></div><div class="row"><button id="shuffle">洗牌</button><button id="hint">提示</button><button id="newGame">新局</button></div></div><div class="board" id="b"></div></div></main><script>
const sy='一二三四五六七八九東南西北中發白春夏秋冬梅蘭竹菊'.split('');let q;function reset(){let a=[];for(let i=0;i<32;i++)a.push(sy[i%sy.length],sy[i%sy.length]);q={a:a.sort(()=>Math.random()-.5),sel:-1,score:0};draw()}function free(i){if(q.a[i]==='')return false;let c=i%8;return c===0||c===7||q.a[i-1]===''||q.a[i+1]===''}function click(i){if(!free(i))return msg.textContent='这张牌被两侧压住';if(q.sel<0){q.sel=i}else if(q.sel===i)q.sel=-1;else if(q.a[q.sel]===q.a[i]&&free(q.sel)){q.a[q.sel]=q.a[i]='';q.sel=-1;q.score++;msg.textContent=q.a.every(v=>!v)?'全部消除，牌局完成！':'配对成功'}else{q.sel=i;msg.textContent='图案不同'}draw()}function draw(){b.innerHTML=q.a.map((v,i)=>`<button class="tile ${i===q.sel?'sel':''} ${!v?'gone':''}" data-i="${i}">${v}</button>`).join('');b.querySelectorAll('button').forEach(e=>e.onclick=()=>click(+e.dataset.i))}shuffle.onclick=()=>{let v=q.a.filter(Boolean).sort(()=>Math.random()-.5),i=0;q.a=q.a.map(x=>x?v[i++]:x);q.sel=-1;draw()};hint.onclick=()=>{for(let i=0;i<64;i++)for(let j=i+1;j<64;j++)if(free(i)&&free(j)&&q.a[i]===q.a[j]){q.sel=i;msg.textContent='提示：寻找另一张 '+q.a[i];draw();return}};newGame.onclick=reset;reset();
</script>
