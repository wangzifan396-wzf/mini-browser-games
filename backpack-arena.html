};
const RECIPES=[['dagger','dagger','sword'],['sword','stone','greatsword'],['bow','ruby','crossbow'],['buckler','buckler','tower'],['herb','potion','elixir'],['greatsword','ruby','sunblade'],['crossbow','sapphire','moonbow'],['mail','thorn','dragon']];

function checksum(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(h,31)+s.charCodeAt(i))>>>0;return h.toString(36)}function exportCode(){const b=btoa(unescape(encodeURIComponent(JSON.stringify({v:3,q,profile}))));return`BA3-${b}-${checksum(b)}`}function importCode(x){const m=x.trim().match(/^BA3-(.+)-([a-z0-9]+)$/i);if(!m||checksum(m[1])!==m[2])throw Error('存档码校验失败');const d=JSON.parse(decodeURIComponent(escape(atob(m[1]))));if(d.v!==3)throw Error('版本不兼容');q=d.q;profile=d.profile;save();draw()}

function discover(id){profile.seen.push(id);profile.seen=[...new Set(profile.seen)]}function hint(s){$('hint').textContent=s;if(q){q.log.unshift(s);q.log=q.log.slice(0,12)}save()}
function rarityRoll(){const x=Math.random(),max=q.round;return x<Math.min(.08,max*.005)?'epic':x<Math.min(.3,.12+max*.012)?'rare':x<.65?'uncommon':'common'}function makeOffer(){const r=rarityRoll(),pool=Object.keys(ITEMS).filter(id=>ITEMS[id].r===r);return pool[Math.floor(Math.random()*pool.length)]}function roll(free=false){if(!free){if(q.gold<1)return hint('金币不足');q.gold--}q.shop=Array.from({length:4},makeOffer);selectedOffer=null;draw()}
function adjacency(){const map={};q.items.forEach(a=>{map[a.uid]=[];q.items.forEach(b=>{if(a===b)return;const near=a.cells.some(x=>{const r=Math.floor(x/COLS),c=x%COLS;return b.cells.some(y=>{const rr=Math.floor(y/COLS),cc=y%COLS;return Math.abs(r-rr)+Math.abs(c-cc)===1})});if(near)map[a.uid].push(b)})});return map}
function buildStats(){const adj=adjacency(),s={hp:55,shield:0,stamina:10,regen:3,weapons:[],reflect:0,resist:0,poison:0,tickHeal:0,heals:[],damagePct:0,speed:0,amp:q.perks.includes('expand')?.05:0};q.items.forEach(it=>{const d=ITEMS[it.id],mult=1+(it.level-1)*.35+(s.amp||0);s.hp+=(d.hp||0)*mult;s.shield+=(d.armor||0)*mult;s.stamina+=(d.stamina||0);s.regen+=(d.regen||0)*3;s.reflect+=(d.reflect||0);s.resist=Math.max(s.resist,d.resist||0);s.poison+=d.poison||0;s.tickHeal+=(d.tickHeal||0);s.damagePct+=d.damagePct||0;s.speed+=d.haste||0;if(d.heal)s.heals.push({value:d.heal*mult,used:0,haste:d.haste||0});if(d.type==='weapon'){let damage=d.dmg*mult,cd=d.cd;adj[it.uid].forEach(n=>{const x=ITEMS[n.id];if(x.adj==='weapon'||x.adj==='all'){const perk=q.perks.includes('craft')?1.3:1;damage+=(x.bonus||0)*perk;cd*=1-(x.speed||0)*perk;damage*=1+(x.amp||0)}});s.weapons.push({uid:it.uid,id:it.id,damage,cd,stam:d.stam,crit:d.crit||0,lifesteal:d.lifesteal||0,burst:d.burst||0,count:0,t:0})}});if(q.cls==='ranger')s.weapons.filter(w=>ITEMS[w.id].t.includes('远射')).forEach(w=>w.cd*=.88);if(q.perks.includes('tempo'))s.weapons.forEach(w=>w.cd*=.9);if(q.perks.includes('guard'))s.shield+=q.items.filter(x=>ITEMS[x.id].type==='armor').length*4;if(q.perks.includes('brew'))s.heals.forEach(x=>x.value*=1.3);if(q.perks.includes('stamina')){s.stamina+=4;s.regen+=.36}s.damagePct+=q.perks.includes('last')?0:0;return s}
function enemyStats(){const e=ENEMIES[(q.round-1)%ENEMIES.length],scale=1+(q.round-1)*.105,s={...e,hp:Math.round((48+q.round*5)*scale),shield:Math.round((q.round%3)*7+q.round*1.4),stamina:10,regen:3,weapons:[],reflect:e.style==='反击'?3:0,resist:e.style==='壁垒'?.1:0,poison:e.style==='炼金'?2:0,tickHeal:0,heals:e.style==='炼金'?[{value:15+q.round,used:0}]:[],damagePct:0,speed:0};e.gear.slice(0,2+Math.floor(q.round/5)).forEach(id=>{const d=ITEMS[id];if(d.dmg)s.weapons.push({uid:uid(),id,damage:d.dmg*scale,cd:d.cd,stam:d.stam,crit:d.crit||0,lifesteal:0,burst:d.burst||0,count:0,t:0});s.shield+=(d.armor||0);s.hp+=(d.hp||0)});if(!s.weapons.length)s.weapons.push({uid:uid(),id:'dagger',damage:7*scale,cd:1.8,stam:2,crit:0,count:0,t:0});return s}
function forge(){for(const[a,b,out]of RECIPES){const x=q.items.find(it=>it.id===a),y=q.items.find(it=>it!==x&&it.id===b);if(x&&y){x.id=out;x.level=1;const newShape=shape(out,x.rot);const start=x.cells[0];q.items=q.items.filter(it=>it!==y);if(fits(out,start,x.rot,x.uid))x.cells=cellsFor(out,start,x.rot);else{x.id=a;q.items.push(y);continue}discover(out);selectedItem=null;hint(`百炼成功：${ITEMS[out].n}`);draw();return}}const pair=q.items.find(x=>q.items.some(y=>y!==x&&y.id===x.id&&y.level===x.level));if(pair){const y=q.items.find(z=>z!==pair&&z.id===pair.id&&z.level===pair.level);pair.level++;q.items=q.items.filter(z=>z!==y);hint(`${ITEMS[pair.id].n} 强化到 +${pair.level}`);draw();return}hint('没有可用配方：尝试两件同名装备，或利刃+磨刀石等组合')}
function startBattle(){if(battleTimer||q.gameOver||q.champion)return;if(!q.items.some(x=>ITEMS[x.id].type==='weapon'))return hint('至少装备一件武器');selectedItem=null;const p=buildStats(),e=enemyStats();runtime={time:0,p:{...p,max:p.hp,cur:p.hp,shieldCur:p.shield,stamCur:p.stamina},e:{...e,max:e.hp,cur:e.hp,shieldCur:e.shield,stamCur:e.stamina},feed:[]};$('fightBtn').disabled=true;drawBattle();battleTimer=setInterval(stepBattle,250)}
function damage(from,to,amount,label){let dmg=amount*(1-(to.resist||0));if(from===runtime.p&&q.cls==='berserker')dmg*=1+(1-from.cur/from.max)*.5;if(from===runtime.p&&q.perks.includes('last')&&from.cur/from.max<.35)dmg*=1.25;dmg*=1+from.damagePct;dmg=Math.round(dmg);const blocked=Math.min(to.shieldCur,dmg);to.shieldCur-=blocked;to.cur-=dmg-blocked;if(to.reflect&&dmg>0)from.cur-=to.reflect;runtime.feed.unshift(`${label}造成 ${dmg} 伤害${blocked?`（格挡${blocked}）`:''}`);runtime.feed=runtime.feed.slice(0,12)}
function act(side,other){side.stamCur=Math.min(side.stamina,side.stamCur+side.regen*.25);for(const w of side.weapons){w.t+=.25*(1+side.speed);if(w.t>=w.cd&&side.stamCur>=w.stam){w.t=0;side.stamCur-=w.stam;w.count++;let dmg=w.damage*(Math.random()<w.crit?1.75:1);if(w.burst&&w.count%w.burst===0)dmg*=2;damage(side,other,dmg,ITEMS[w.id].n);if(w.lifesteal)side.cur=Math.min(side.max,side.cur+w.lifesteal);flash(w.uid)}}for(const pot of side.heals){if(!pot.used&&side.cur/side.max<.48){pot.used=1;side.cur=Math.min(side.max,side.cur+pot.value);side.speed+=pot.haste||0;runtime.feed.unshift(`药剂恢复 ${Math.round(pot.value)} 生命`);if(side===runtime.p&&q.cls==='alchemist'){side.cur=Math.min(side.max,side.cur+pot.value*.55);runtime.feed.unshift('药剂师复触恢复')}}}}
function stepBattle(){runtime.time+=.25;act(runtime.p,runtime.e);act(runtime.e,runtime.p);if(Math.floor(runtime.time*4)%8===0){if(runtime.p.poison)damage(runtime.p,runtime.e,runtime.p.poison,'毒素');if(runtime.e.poison)damage(runtime.e,runtime.p,runtime.e.poison,'毒素');runtime.p.cur=Math.min(runtime.p.max,runtime.p.cur+runtime.p.tickHeal);runtime.e.cur=Math.min(runtime.e.max,runtime.e.cur+runtime.e.tickHeal)}drawBattle();if(runtime.p.cur<=0||runtime.e.cur<=0||runtime.time>=35)finishBattle(runtime.e.cur<=0||(runtime.time>=35&&runtime.p.cur>runtime.e.cur))}
function flash(uid){const el=document.querySelector(`[data-uid="${uid}"]`);if(el){el.classList.add('trigger');setTimeout(()=>el.classList.remove('trigger'),300)}}
function finishBattle(win){clearInterval(battleTimer);battleTimer=null;if(win){q.wins++;q.gold+=6+(q.perks.includes('economy')?2:0)+Math.floor(q.round/4);hint(`胜利！获得 ${6+(q.perks.includes('economy')?2:0)+Math.floor(q.round/4)} 金币`)}else{q.losses++;q.lives--;q.gold+=3;hint('败北，获得 3 金币整备补给')}q.round++;profile.best=Math.max(profile.best,q.round);if(q.wins>=10||q.round>12){q.champion=true;profile.wins++;profile.glory+=60;showResult(true)}else if(q.lives<=0){q.gameOver=true;profile.glory+=q.wins*4;showResult(false)}else{if(!q.locked)roll(true);if(q.round===5||q.round===9)showPerk();draw()}save()}
function showPerk(){const ids=Object.keys(PERKS).filter(x=>!q.perks.includes(x)).sort(()=>Math.random()-.5).slice(0,3);$('choiceTitle').textContent='选择行囊专精';$('choiceHelp').textContent='专精会永久改变本赛季的装备效率。';$('choices').innerHTML=ids.map(id=>`<button class="choice" data-perk="${id}"><span class="big">${PERKS[id].i}</span><h3>${PERKS[id].n}</h3><p>${PERKS[id].d}</p></button>`).join('');$('choiceOverlay').classList.remove('hidden');document.querySelectorAll('[data-perk]').forEach(b=>b.onclick=()=>{q.perks.push(b.dataset.perk);$('choiceOverlay').classList.add('hidden');hint(`获得专精：${PERKS[b.dataset.perk].n}`);draw()})}
function renderGear(it,origin){const d=ITEMS[it.id],el=document.createElement('div');el.className=`gear ${d.type} ${selectedItem===it.uid?'selected':''}`;el.dataset.uid=it.uid;el.innerHTML=`<em>${it.level>1?'+'+it.level:''}</em><span class="icon">${d.i}</span><b>${d.n}</b>`;el.onclick=e=>{e.stopPropagation();selectedOffer=null;selectedItem=selectedItem===it.uid?null:it.uid;rotation=it.rot;draw()};return el}
function draw(){if(!q)return;$('gold').textContent=q.gold;$('round').textContent=`${Math.min(q.round,12)} / 12`;$('lives').textContent='♥'.repeat(Math.max(0,q.lives));$('wins').textContent=q.wins;$('className').textContent=CLASSES[q.cls].n;$('playerAvatar').textContent=CLASSES[q.cls].i;$('spaceText').textContent=`${new Set(q.items.flatMap(x=>x.cells)).size} / ${ROWS*COLS} 格`;const grid=$('grid');grid.innerHTML='';for(let i=0;i<ROWS*COLS;i++){const c=document.createElement('div');c.className='cell';c.onclick=()=>place(i);grid.append(c)}q.items.forEach(it=>{const first=Math.min(...it.cells);grid.children[first]?.append(renderGear(it,first));it.cells.filter(x=>x!==first).forEach(x=>{if(grid.children[x])grid.children[x].style.background='#342844'})});$('shop').innerHTML=q.shop.map((id,i)=>id?`<button class="offer ${selectedOffer===i?'active':''}" data-offer="${i}"><span class="price">${ITEMS[id].cost}</span><span class="icon">${ITEMS[id].i}</span><b>${ITEMS[id].n}</b><small>${ITEMS[id].d}<br>${ITEMS[id].shape.length} 格 · ${ITEMS[id].t.join('/')}</small></button>`:'<button class="offer" disabled>已售出</button>').join('');document.querySelectorAll('[data-offer]').forEach(b=>b.onclick=()=>{selectedOffer=+b.dataset.offer;selectedItem=null;rotation=0;hint(`选择 ${ITEMS[q.shop[selectedOffer]].n}，点击背包空格放置`);draw()});const s=buildStats();$('buildStats').innerHTML=[['最大生命',Math.round(s.hp)],['起始护盾',Math.round(s.shield)],['武器数量',s.weapons.length],['秒均伤害',s.weapons.reduce((a,w)=>a+w.damage/w.cd,0).toFixed(1)],['耐力 / 恢复',`${s.stamina.toFixed(1)} / ${s.regen.toFixed(1)}`]].map(x=>`<div class="build-row"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('');const tags={};q.items.forEach(it=>ITEMS[it.id].t.forEach(t=>tags[t]=(tags[t]||0)+1));$('traits').innerHTML=Object.entries(tags).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`<div class="trait"><span>${t}</span><strong>${n} 件</strong></div>`).join('')||'<small style="color:var(--muted)">购入装备后显示协同。</small>';$('lockBtn').classList.toggle('primary',q.locked);$('fightBtn').disabled=q.gameOver||q.champion;$('enemyName').textContent=ENEMIES[(q.round-1)%ENEMIES.length].n;$('enemyAvatar').textContent=ENEMIES[(q.round-1)%ENEMIES.length].i;$('enemyItems').innerHTML=ENEMIES[(q.round-1)%ENEMIES.length].gear.slice(0,2+Math.floor(q.round/5)).map(id=>`<span>${ITEMS[id].i}</span>`).join('');if(!battleTimer){['playerHp','playerShield','playerStamina','enemyHp','enemyShield','enemyStamina'].forEach(id=>$(id).style.width='100%');$('feed').innerHTML=q.log.slice(0,8).map(x=>`<div>${x}</div>`).join('')}save()}
function drawBattle(){const p=runtime.p,e=runtime.e;$('playerHp').style.width=Math.max(0,p.cur/p.max*100)+'%';$('playerShield').style.width=Math.min(100,p.shieldCur/Math.max(1,p.shield)*100)+'%';$('playerStamina').style.width=p.stamCur/p.stamina*100+'%';$('enemyHp').style.width=Math.max(0,e.cur/e.max*100)+'%';$('enemyShield').style.width=Math.min(100,e.shieldCur/Math.max(1,e.shield)*100)+'%';$('enemyStamina').style.width=e.stamCur/e.stamina*100+'%';$('feed').innerHTML=runtime.feed.map(x=>`<div>${x}</div>`).join('')}
function startClass(id){q=fresh(id);$('classOverlay').classList.add('hidden');for(const itemId of CLASSES[id].start){let placed=false;for(let i=0;i<ROWS*COLS&&!placed;i++)if(fits(itemId,i,0)){q.items.push({uid:uid(),id:itemId,rot:0,cells:cellsFor(itemId,i,0),level:1});discover(itemId);placed=true}}roll(true);hint(`${CLASSES[id].n}进入百炼赛季`);draw()}
function classScreen(){$('classChoices').innerHTML=Object.entries(CLASSES).map(([id,c])=>`<button class="choice" data-class="${id}"><span class="big">${c.i}</span><h3>${c.n}</h3><p>${c.d}</p></button>`).join('');document.querySelectorAll('[data-class]').forEach(b=>b.onclick=()=>startClass(b.dataset.class))}
function showCodex(){$('infoTitle').textContent='百炼装备图鉴';$('infoBody').innerHTML=`<div class="codex">${Object.entries(ITEMS).map(([id,d])=>`<div style="opacity:${profile.seen.includes(id)?1:.42}"><span style="font-size:24px">${profile.seen.includes(id)?d.i:'❔'}</span><b>${profile.seen.includes(id)?d.n:'未发现'}</b><small>${profile.seen.includes(id)?d.d:'在商店或合成中发现'}</small></div>`).join('')}</div>`;$('infoOverlay').classList.remove('hidden')}
function showSave(){const code=exportCode();$('infoTitle').textContent='跨设备百炼档案';$('infoBody').innerHTML=`<p>荣耀 ${profile.glory} · 冠军 ${profile.wins} · 最佳轮次 ${profile.best}</p><textarea class="savebox" id="saveCode">${code}</textarea><div class="actions"><button class="btn" id="copyCode">复制导出</button><button class="btn" id="importCodeBtn">导入上方存档</button></div>`;$('infoOverlay').classList.remove('hidden');$('copyCode').onclick=()=>navigator.clipboard?.writeText($('saveCode').value);$('importCodeBtn').onclick=()=>{try{importCode($('saveCode').value);$('infoOverlay').classList.add('hidden');alert('导入成功')}catch(e){alert(e.message)}}}
function showResult(win){$('infoTitle').textContent=win?'百炼冠军':'赛季止步';$('infoBody').innerHTML=`<h3>${win?'你以十胜战绩登顶角斗场。':'生命耗尽，重新整理构筑再战。'}</h3><div class="build-row"><span>胜场</span><strong>${q.wins}</strong></div><div class="build-row"><span>荣耀</span><strong>${profile.glory}</strong></div>`;$('infoOverlay').classList.remove('hidden')}
$('rotateBtn').onclick=()=>{rotation=(rotation+1)%2;if(selectedItem){const it=q.items.find(x=>x.uid===selectedItem);const start=Math.min(...it.cells);if(fits(it.id,start,rotation,it.uid)){it.rot=rotation;it.cells=cellsFor(it.id,start,rotation)}else hint('当前位置无法旋转')}draw()};$('forgeBtn').onclick=forge;$('sellBtn').onclick=()=>{const it=q.items.find(x=>x.uid===selectedItem);if(!it)return hint('先选择一件已放置装备');q.gold+=Math.max(1,Math.floor(ITEMS[it.id].cost*.6));q.items=q.items.filter(x=>x!==it);selectedItem=null;draw()};$('rerollBtn').onclick=()=>roll();$('lockBtn').onclick=()=>{q.locked=!q.locked;draw()};$('fightBtn').onclick=startBattle;$('codexBtn').onclick=showCodex;$('saveBtn').onclick=showSave;$('closeInfoBtn').onclick=()=>$('infoOverlay').classList.add('hidden');$('newBtn').onclick=()=>{if(confirm('放弃当前赛季并重新开始？')){q=null;save();$('classOverlay').classList.remove('hidden')}};
load();classScreen();if(q){$('classOverlay').classList.add('hidden');if(!q.shop?.length)roll(true);else draw()}else{for(let i=0;i<ROWS*COLS;i++)$('grid').insertAdjacentHTML('beforeend','<div class="cell"></div>')}
})();
</script></body></html>
