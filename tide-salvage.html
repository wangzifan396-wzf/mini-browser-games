<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>潮汐拾荒</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23111d24'/%3E%3Cpath d='M11 40c7-8 14-8 21 0s14 8 21 0v12H11Z' fill='%23356f91'/%3E%3Ccircle cx='31' cy='26' r='11' fill='%23f0d16f'/%3E%3Cpath d='M21 26h20M31 16v20' stroke='%23111d24' stroke-width='4'/%3E%3C/svg%3E">
    <style>
      :root { --ink:#10191f; --panel:#fffdf4; --line:#87989e; --teal:#287569; --gold:#d6a33d; --red:#bd5148; --blue:#326f91; --shadow:rgba(5,12,16,.28); --radius:8px; }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; color:var(--ink); font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,sans-serif; background:linear-gradient(rgba(255,255,245,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,245,.06) 1px,transparent 1px),linear-gradient(135deg,#0f2026,#16384a 47%,#3e3b56); background-size:30px 30px,30px 30px,auto; }
      button { font:inherit; }
      .app { width:min(1380px,calc(100vw - 28px)); margin:14px auto; }
      .topbar,.panel { border:1px solid var(--line); border-radius:var(--radius); background:rgba(255,253,244,.97); box-shadow:0 16px 36px var(--shadow); }
      .topbar { display:flex; justify-content:space-between; align-items:center; gap:14px; padding:16px 20px; }
      .eyebrow { margin:0 0 5px; color:#856219; font-size:12px; font-weight:900; }
      h1 { margin:0; font-size:clamp(26px,4vw,44px); line-height:1; }
      .actions { display:flex; flex-wrap:wrap; justify-content:flex-end; gap:10px; }
      .btn { min-height:42px; padding:0 14px; border:1px solid #24544d; border-radius:var(--radius); color:#fffdf6; background:var(--teal); font-weight:900; cursor:pointer; }
      .btn.secondary { color:var(--ink); background:#f0d17b; border-color:#9c7621; }
      .layout { display:grid; grid-template-columns:minmax(0,1fr) 312px; gap:14px; margin-top:14px; align-items:start; }
      .stage { position:relative; overflow:hidden; min-height:620px; }
      canvas { display:block; width:100%; height:620px; touch-action:none; }
      .side { padding:16px; }
      .stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
      .stat { padding:10px; border:1px solid #9da69e; border-radius:var(--radius); background:#f9f7eb; }
      .stat b { display:block; font-size:24px; line-height:1.1; }
      .stat small { color:#5e6d67; font-weight:800; }
      .meter { margin:0 0 13px; }
      .meter span { display:flex; justify-content:space-between; margin-bottom:6px; color:#5e6d67; font-weight:900; }
      .bar { height:13px; border:1px solid #84968f; border-radius:999px; overflow:hidden; background:#e9eadc; }
      .bar i { display:block; width:100%; height:100%; background:linear-gradient(90deg,var(--blue),#8bd0bb); }
      .pad { display:grid; grid-template-columns:repeat(3,60px); justify-content:center; gap:8px; margin-top:14px; }
      .pad button { width:60px; height:52px; border:1px solid #758780; border-radius:var(--radius); background:#fff8e6; color:var(--ink); font-size:20px; font-weight:900; cursor:pointer; }
      .pad .blank { visibility:hidden; }
      .hint { margin:14px 0 0; color:#566861; line-height:1.55; font-weight:700; }
      .overlay { position:absolute; inset:0; display:grid; place-items:center; padding:24px; background:rgba(16,28,31,.52); }
      .modal { width:min(460px,100%); padding:22px; border:1px solid #a4b4ad; border-radius:var(--radius); background:#fffdf6; box-shadow:0 24px 52px rgba(0,0,0,.32); }
      .modal h2 { margin:0 0 10px; font-size:28px; }
      .modal p { margin:0 0 16px; color:#53635f; line-height:1.6; }
      .hidden { display:none; }
      @media (max-width:940px){ .layout{grid-template-columns:1fr;} .side{order:-1;} .stage{min-height:540px;} canvas{height:540px;} }
      @media (max-width:620px){ .app{width:min(100vw - 16px,1380px); margin-top:8px;} .topbar{display:block;padding:14px;} .actions{margin-top:12px;justify-content:stretch;} .btn{flex:1 1 auto;} .stage{min-height:500px;} canvas{height:500px;} }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div><p class="eyebrow">OXYGEN EXPLORATION</p><h1>潮汐拾荒</h1></div>
        <div class="actions"><button class="btn" id="startBtn">下潜</button><button class="btn secondary" id="dashBtn">冲刺</button><button class="btn secondary" id="resetBtn">重开</button></div>
      </header>
      <section class="layout">
        <div class="panel stage">
          <canvas id="gameCanvas" aria-label="潮汐拾荒游戏画面"></canvas>
          <div class="overlay" id="overlay"><div class="modal"><h2 id="overlayTitle">准备下潜</h2><p id="overlayText">收集海底遗物，躲开水母和暗流。氧气不足就回到水面补给。</p><button class="btn" id="overlayBtn">开始下潜</button></div></div>
        </div>
        <aside class="panel side">
          <div class="stats"><div class="stat"><b id="scoreText">0</b><small>估值</small></div><div class="stat"><b id="cargoText">0</b><small>货物</small></div><div class="stat"><b id="depthText">0</b><small>深度</small></div><div class="stat"><b id="bestText">0</b><small>最佳</small></div></div>
          <div class="meter"><span><b>氧气</b><em id="oxygenText">100%</em></span><div class="bar"><i id="oxygenBar"></i></div></div>
          <div class="meter"><span><b>船舱</b><em id="cargoMeterText">0/8</em></span><div class="bar"><i id="cargoBar"></i></div></div>
          <div class="pad">
            <button class="blank"></button><button data-dir="up">↑</button><button class="blank"></button>
            <button data-dir="left">←</button><button data-dir="down">↓</button><button data-dir="right">→</button>
          </div>
          <p class="hint">方向键 / WASD 移动，Shift 冲刺。到水面会自动卖出货物并补满氧气。</p>
        </aside>
      </section>
    </main>
    <script>
      (() => {
        const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay"), overlayTitle = document.getElementById("overlayTitle"), overlayText = document.getElementById("overlayText"), overlayBtn = document.getElementById("overlayBtn");
        const startBtn = document.getElementById("startBtn"), resetBtn = document.getElementById("resetBtn"), dashBtn = document.getElementById("dashBtn");
        const scoreText = document.getElementById("scoreText"), cargoText = document.getElementById("cargoText"), depthText = document.getElementById("depthText"), bestText = document.getElementById("bestText"), oxygenText = document.getElementById("oxygenText"), oxygenBar = document.getElementById("oxygenBar"), cargoMeterText = document.getElementById("cargoMeterText"), cargoBar = document.getElementById("cargoBar");
        const storageKey = "miniTideSalvageRecords";
        let w=900,h=620,dpr=1,lastFrame=0,loopToken=0;
        const keys = new Set();
        let pointer = null;
        let state = makeState();

        function loadBest(){try{return JSON.parse(localStorage.getItem(storageKey)||"{}").best||0;}catch(e){return 0;}}
        function saveBest(score){const best=Math.max(loadBest(),score);localStorage.setItem(storageKey,JSON.stringify({best}));return best;}
        function makeState(){
          return {mode:"menu",time:0,score:0,cargo:0,best:loadBest(),player:{x:160,y:86,vx:0,vy:0},oxygen:100,capacity:8,items:[],hazards:[],particles:[],dash:0};
        }
        function resizeCanvas(){const rect=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));w=Math.max(320,rect.width);h=Math.max(480,rect.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw();}
        function startGame(){loopToken+=1;state=makeState();seedWorld();state.mode="running";overlay.classList.add("hidden");lastFrame=performance.now();updateHud();requestAnimationFrame(t=>loop(t,loopToken));}
        function seedWorld(){state.items=[];state.hazards=[];for(let i=0;i<28;i++){state.items.push({x:70+Math.random()*(w-140),y:150+Math.random()*(h-190),value:20+Math.floor(Math.random()*55),r:11});}for(let i=0;i<10;i++){state.hazards.push({x:80+Math.random()*(w-160),y:155+Math.random()*(h-200),vx:(Math.random()-.5)*34,vy:(Math.random()-.5)*22,r:18+Math.random()*12,phase:Math.random()*6});}}
        function finish(){if(state.mode==="over")return;state.mode="over";state.best=saveBest(state.score);overlayTitle.textContent="返航";overlayText.textContent=`本次打捞估值 ${state.score}，带回 ${state.cargo} 件未售货物。`;overlayBtn.textContent="再次下潜";overlay.classList.remove("hidden");updateHud();}
        function moveInput(){let ax=0,ay=0;if(keys.has("ArrowLeft")||keys.has("KeyA"))ax-=1;if(keys.has("ArrowRight")||keys.has("KeyD"))ax+=1;if(keys.has("ArrowUp")||keys.has("KeyW"))ay-=1;if(keys.has("ArrowDown")||keys.has("KeyS"))ay+=1;if(pointer){ax=(pointer.x-state.player.x)/80;ay=(pointer.y-state.player.y)/80;}const len=Math.hypot(ax,ay)||1;return {x:ax/len,y:ay/len,active:Math.hypot(ax,ay)>0.05};}
        function dash(){if(state.mode==="running"&&state.dash<=0&&state.oxygen>12){state.dash=.22;state.oxygen-=7;}}
        function update(dt){state.time+=dt;const input=moveInput();const speed=state.dash>0?250:142;if(input.active){state.player.vx+=input.x*speed*dt*4;state.player.vy+=input.y*speed*dt*4;}state.player.vx*=Math.pow(.16,dt);state.player.vy*=Math.pow(.16,dt);state.player.x+=state.player.vx*dt;state.player.y+=state.player.vy*dt;state.player.x=Math.max(32,Math.min(w-32,state.player.x));state.player.y=Math.max(52,Math.min(h-32,state.player.y));if(state.dash>0)state.dash-=dt;
          if(state.player.y>104)state.oxygen-=dt*(5.5+state.player.y/h*3.4);else{state.oxygen=Math.min(100,state.oxygen+dt*34);if(state.cargo>0){state.score+=state.cargo*35;pop(state.player.x,state.player.y,"售出","#d6a33d");state.cargo=0;}}
          for(let i=state.items.length-1;i>=0;i--){const item=state.items[i];if(Math.hypot(item.x-state.player.x,item.y-state.player.y)<item.r+18&&state.cargo<state.capacity){state.items.splice(i,1);state.cargo+=1;state.score+=item.value;pop(item.x,item.y,`+${item.value}`,"#d6a33d");}}
          for(const hz of state.hazards){hz.phase+=dt;hz.x+=hz.vx*dt;hz.y+=hz.vy*dt;if(hz.x<hz.r||hz.x>w-hz.r)hz.vx*=-1;if(hz.y<130||hz.y>h-hz.r)hz.vy*=-1;if(Math.hypot(hz.x-state.player.x,hz.y-state.player.y)<hz.r+16){state.oxygen-=dt*34;state.player.vx+=(state.player.x-hz.x)*dt*7;state.player.vy+=(state.player.y-hz.y)*dt*7;}}
          if(state.oxygen<=0)finish();if(state.items.length<18&&Math.random()<dt*.6)state.items.push({x:70+Math.random()*(w-140),y:160+Math.random()*(h-200),value:25+Math.floor(Math.random()*70),r:11});
          state.particles=state.particles.filter(p=>{p.y-=dt*38;p.life-=dt*.8;return p.life>0;});updateHud();}
        function loop(now,token){if(token!==loopToken||state.mode!=="running")return;const dt=Math.min(.05,(now-lastFrame)/1000||.016);lastFrame=now;update(dt);draw();if(state.mode==="running")requestAnimationFrame(t=>loop(t,token));}
        function pop(x,y,text,color){state.particles.push({x,y,text,color,life:1});}
        function rr(x,y,width,height,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+width,y,x+width,y+height,r);ctx.arcTo(x+width,y+height,x,y+height,r);ctx.arcTo(x,y+height,x,y,r);ctx.arcTo(x,y,x+width,y,r);if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.stroke();}}
        function draw(){ctx.clearRect(0,0,w,h);const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,"#cce9ee");g.addColorStop(.2,"#67a9bb");g.addColorStop(1,"#102f45");ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle="#f5e0b5";ctx.fillRect(0,0,w,86);ctx.fillStyle="rgba(255,255,255,.28)";for(let x=-80;x<w+80;x+=120){ctx.beginPath();ctx.arc(x+Math.sin(state.time*1.5)*18,96,62,0,Math.PI);ctx.fill();}
          for(const item of state.items){ctx.fillStyle="#f0d16f";ctx.beginPath();ctx.arc(item.x,item.y,item.r,0,Math.PI*2);ctx.fill();ctx.fillStyle="#7a5c18";ctx.fillRect(item.x-2,item.y-7,4,14);}
          for(const hz of state.hazards){ctx.fillStyle="rgba(189,81,72,.82)";ctx.beginPath();ctx.arc(hz.x,hz.y,hz.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle="rgba(255,253,244,.75)";ctx.lineWidth=2;for(let i=0;i<5;i++){const a=hz.phase+i*1.25;ctx.beginPath();ctx.moveTo(hz.x+Math.cos(a)*hz.r*.6,hz.y+Math.sin(a)*hz.r*.6);ctx.lineTo(hz.x+Math.cos(a)*(hz.r+10),hz.y+Math.sin(a)*(hz.r+10));ctx.stroke();}}
          ctx.save();ctx.translate(state.player.x,state.player.y);ctx.fillStyle="#f0d16f";ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();ctx.fillStyle="#326f91";rr(-20,-4,40,18,7,"#326f91","#10242f");ctx.fillStyle="#fffdf4";ctx.beginPath();ctx.arc(7,-2,5,0,Math.PI*2);ctx.fill();ctx.restore();
          for(const p of state.particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.font="900 22px system-ui";ctx.textAlign="center";ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1;}
        }
        function updateHud(){scoreText.textContent=state.score.toString();cargoText.textContent=state.cargo.toString();depthText.textContent=Math.max(0,Math.round((state.player.y-86)/4)).toString();bestText.textContent=Math.max(state.best,state.score).toString();oxygenText.textContent=`${Math.max(0,Math.round(state.oxygen))}%`;oxygenBar.style.width=`${Math.max(0,state.oxygen)}%`;oxygenBar.style.background=state.oxygen<25?"linear-gradient(90deg,#bd5148,#d6a33d)":"linear-gradient(90deg,var(--blue),#8bd0bb)";cargoMeterText.textContent=`${state.cargo}/${state.capacity}`;cargoBar.style.width=`${state.cargo/state.capacity*100}%`;dashBtn.textContent=state.dash>0?"冲刺中":"冲刺";}
        startBtn.addEventListener("click",startGame);resetBtn.addEventListener("click",startGame);overlayBtn.addEventListener("click",startGame);dashBtn.addEventListener("click",dash);
        document.querySelectorAll("[data-dir]").forEach(btn=>{btn.addEventListener("pointerdown",()=>keys.add(btn.dataset.dir==="up"?"ArrowUp":btn.dataset.dir==="down"?"ArrowDown":btn.dataset.dir==="left"?"ArrowLeft":"ArrowRight"));btn.addEventListener("pointerup",()=>keys.clear());btn.addEventListener("pointerleave",()=>keys.clear());});
        canvas.addEventListener("pointerdown",e=>{const r=canvas.getBoundingClientRect();pointer={x:e.clientX-r.left,y:e.clientY-r.top};});canvas.addEventListener("pointermove",e=>{if(pointer){const r=canvas.getBoundingClientRect();pointer={x:e.clientX-r.left,y:e.clientY-r.top};}});canvas.addEventListener("pointerup",()=>pointer=null);canvas.addEventListener("pointercancel",()=>pointer=null);
        document.addEventListener("keydown",e=>{keys.add(e.code);if(e.code==="ShiftLeft"||e.code==="ShiftRight")dash();if(e.code==="KeyR")startGame();});document.addEventListener("keyup",e=>keys.delete(e.code));
        window.addEventListener("resize",resizeCanvas);resizeCanvas();updateHud();draw();
      })();
    </script>
  </body>
</html>
