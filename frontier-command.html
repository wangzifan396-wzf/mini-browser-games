</style></head><body><main class="app"><header class="top"><div><h1>前线指挥部：赤潮防线</h1><div class="sub">三战线实时攻防、基地经济、兵种克制与战术技能；守住五章边境并发动最终反攻。</div></div><div class="stats"><div class="stat"><small>晶矿</small><b id="ore">0</b></div><div class="stat"><small>战术能源</small><b id="power">0</b></div><div class="stat"><small>人口</small><b id="supply">0 / 0</b></div><div class="stat"><small>波次</small><b id="wave">0 / 0</b></div><div class="stat"><small>倒计时</small><b id="countdown">0</b></div></div></header><section class="layout"><section class="panel battle"><div class="battle-head"><div><b id="missionName">等待部署</b><div class="sub" id="doctrineName"></div></div><div class="tabs"><button class="tab lane active" data-lane="0">北线</button><button class="tab lane" data-lane="1">中线</button><button class="tab lane" data-lane="2">南线</button></div></div><div class="stage"><canvas id="canvas" width="960" height="540"></canvas></div><div class="basebars"><div>指挥部 <span id="baseText"></span><div class="bar"><i id="baseBar"></i></div></div><div>敌方要塞 <span id="enemyBaseText"></span><div class="bar"><i id="enemyBaseBar" style="background:var(--red)"></i></div></div></div><div class="controls"><button class="btn red" id="assaultBtn">全线推进</button><button class="btn blue" id="airstrikeBtn">空袭 35能量</button><button class="btn" id="repairBtn">紧急维修 25能量</button><button class="btn" id="rallyBtn">火力超载 30能量</button><button class="btn" id="pauseBtn">暂停</button><button class="btn" id="saveBtn">存档码</button><button class="btn" id="retreatBtn">撤离战役</button></div><div class="message" id="message">选择战役与指挥学说后部署。</div></section><aside class="side"><section class="panel section"><h2>部队部署 · 当前战线</h2><div class="unit-grid" id="units"></div></section><section class="panel section"><h2>基地建设</h2><div class="building-grid" id="buildings"></div></section><section class="panel section"><h2>战地记录</h2><div class="log" id="log"></div></section></aside></section></main>

<script>(()=>{'use strict';const $=id=>document.getElementById(id),cv=$('canvas'),ctx=cv.getContext('2d'),SAVE='frontierCommandV3';
const MISSIONS=[{n:'灰桥哨站',i:'🌉',d:'基础防线，熟悉经济与反攻。',waves:5,hp:420,eHp:360,reward:12},{n:'砂海补给线',i:'🏜️',d:'敌军突袭更快，北线晶矿丰富。',waves:6,hp:460,eHp:440,reward:17},{n:'冻原反应堆',i:'❄️',d:'能源恢复减慢，重甲单位增加。',waves:7,hp:500,eHp:520,reward:23},{n:'赤潮工厂',i:'🏭',d:'机械海与精英炮车持续压迫。',waves:8,hp:540,eHp:620,reward:30},{n:'黑曜王城',i:'🌋',d:'三线总攻与最终攻城巨兽。',waves:10,hp:600,eHp:800,reward:45}];

const UNITS={rifle:{i:'🪖',n:'突击兵',d:'廉价中程主力',cost:38,pop:1,hp:55,a:10,range:82,spd:38,cd:.75,need:['barracks',1]},medic:{i:'🧑‍⚕️',n:'战地医师',d:'治疗同线友军',cost:54,pop:1,hp:46,a:0,range:105,spd:34,cd:1.2,heal:9,need:['barracks',2]},tank:{i:'🚙',n:'铁甲战车',d:'高生命前排',cost:95,pop:2,hp:145,a:19,range:90,spd:25,cd:1.15,armor:.18,need:['factory',1]},artillery:{i:'💥',n:'远程火炮',d:'超远范围溅射',cost:125,pop:2,hp:70,a:34,range:220,spd:18,cd:2.4,splash:45,need:['factory',2]},drone:{i:'🛸',n:'蜂群无人机',d:'快速无视护甲',cost:82,pop:1,hp:58,a:13,range:120,spd:52,cd:.55,pierce:1,need:['lab',1]},walker:{i:'🤖',n:'雷霆机甲',d:'终局攻城单位',cost:180,pop:3,hp:230,a:38,range:105,spd:22,cd:1.25,armor:.25,need:['lab',3]}};
const BUILDINGS={refinery:{i:'⛏️',n:'精炼厂',d:'提高每秒晶矿收入',base:65,max:4},barracks:{i:'🏕️',n:'兵营',d:'解锁医师并扩大人口',base:80,max:4},factory:{i:'🏭',n:'载具厂',d:'解锁战车与火炮',base:110,max:3},lab:{i:'🧪',n:'战术实验室',d:'提高能源并解锁无人机',base:130,max:3},turret:{i:'🗼',n:'自动炮塔',d:'攻击接近基地的敌军',base:90,max:4},reactor:{i:'⚛️',n:'反应堆',d:'加快战术能源恢复',base:100,max:4}};
const TECHS={armor:{i:'🔩',n:'复合装甲',d:'部队生命 +8%',cost:12},weapons:{i:'🎯',n:'校准武器',d:'部队伤害 +8%',cost:12},economy:{i:'💎',n:'晶矿测绘',d:'资源生产 +10%',cost:14},capacity:{i:'🏗️',n:'模块营房',d:'初始人口 +3',cost:15},air:{i:'✈️',n:'空袭协议',d:'空袭伤害 +35%',cost:18},repair:{i:'🧰',n:'纳米维修',d:'维修效果 +40%',cost:18},veteran:{i:'🏅',n:'老兵体系',d:'击杀后小幅恢复生命',cost:22},command:{i:'📡',n:'前线指挥网',d:'技能冷却 -15%',cost:24}};
const ENEMIES={raider:{i:'👾',hp:42,a:8,range:48,spd:34,cd:.9},brute:{i:'👹',hp:105,a:16,range:45,spd:21,cd:1.25,armor:.16},gunner:{i:'🦹',hp:58,a:11,range:115,spd:27,cd:1.05},crawler:{i:'🕷️',hp:34,a:7,range:38,spd:58,cd:.55},siege:{i:'🦂',hp:150,a:25,range:190,spd:15,cd:2.2},boss:{i:'🐲',hp:620,a:34,range:100,spd:14,cd:1.2,armor:.24}};
let profile={commend:0,unlocked:1,wins:0,tech:{}},q=null,last=0,selectedLane=0,raf,selectedMission=0;const has=id=>profile.tech[id],techMul=id=>has(id)?1:0;
function fresh(mission,doctrine){const m=MISSIONS[mission],base=Math.round(m.hp*(doctrine==='fortress'?1.25:1));return{v:3,mission,doctrine,time:0,ore:doctrine==='logistics'?210:140,power:25,wave:0,nextWave:8,base,maxBase:base,enemyBase:m.eHp,maxEnemyBase:m.eHp,units:[],enemies:[],buildings:{refinery:1,barracks:1,factory:0,lab:0,turret:0,reactor:0},assault:false,boost:0,cool:{air:0,repair:0,rally:0},paused:false,over:false,won:false,kills:0,logs:['前线展开，敌军侦察信号正在逼近。']}}
function save(){localStorage.setItem(SAVE,JSON.stringify({v:3,profile,q}))}function load(){try{const d=JSON.parse(localStorage.getItem(SAVE));if(d?.v===3){profile={...profile,...d.profile,tech:{...profile.tech,...d.profile.tech}};q=d.q}}catch{}}
function checksum(s){let h=5381;for(const ch of s)h=((h<<5)-h+ch.charCodeAt(0))>>>0;return h.toString(36)}function exportCode(){const clean=q?{...q,paused:true}:null,b=btoa(unescape(encodeURIComponent(JSON.stringify({v:3,profile,q:clean}))));return`FC3-${b}-${checksum(b)}`}function importCode(x){const m=x.trim().match(/^FC3-(.+)-([a-z0-9]+)$/i);if(!m||checksum(m[1])!==m[2])throw Error('存档码校验失败');const d=JSON.parse(decodeURIComponent(escape(atob(m[1]))));if(d.v!==3)throw Error('版本不兼容');profile=d.profile;q=d.q;if(q)q.paused=false;save();draw()}
function supplyCap(){return 8+q.buildings.barracks*4+techMul('capacity')*3}function usedSupply(){return q.units.reduce((a,u)=>a+UNITS[u.type].pop,0)}function income(){return(1.3+q.buildings.refinery*1.25)*(1+(q.doctrine==='logistics'?.18:0)+techMul('economy')*.1)}function say(s){q.logs.unshift(s);q.logs=q.logs.slice(0,18);$('message').textContent=s}function toast(s){const e=document.createElement('div');e.className='toast';e.textContent=s;document.body.append(e);setTimeout(()=>e.remove(),1400)}
function spawnUnit(type){const d=UNITS[type],need=d.need;if(q.buildings[need[0]]<need[1])return toast(`${BUILDINGS[need[0]].n} Lv.${need[1]} 解锁`);if(q.ore<d.cost)return toast('晶矿不足');if(usedSupply()+d.pop>supplyCap())return toast('人口已满，升级兵营');q.ore-=d.cost;const hp=Math.round(d.hp*(1+techMul('armor')*.08));q.units.push({type,lane:selectedLane,x:115,hp,max:hp,shot:Math.random()*.5,flash:0});say(`${d.n}部署至${['北','中','南'][selectedLane]}线`);save()}
function build(id){const d=BUILDINGS[id],lv=q.buildings[id],discount=q.doctrine==='logistics'&&id==='barracks'?.8:1,cost=Math.round(d.base*Math.pow(1.65,lv)*discount);if(lv>=d.max)return;if(q.ore<cost)return toast('晶矿不足');q.ore-=cost;q.buildings[id]++;say(`${d.n}升级到 Lv.${q.buildings[id]}`);save();draw()}
function spawnWave(){const m=MISSIONS[q.mission];q.wave++;const count=2+q.wave+Math.floor(q.mission*.8),pool=['raider','gunner',...(q.wave>2?['brute','crawler']:[]),...(q.wave>4?['siege']:[])];for(let i=0;i<count;i++){const type=pool[Math.floor(Math.random()*pool.length)],d=ENEMIES[type],scale=1+q.mission*.16+q.wave*.055,hp=Math.round(d.hp*scale);q.enemies.push({type,lane:i%3,x:845+Math.random()*70,hp,max:hp,shot:Math.random(),flash:0})}if(q.wave===m.waves){const d=ENEMIES.boss,scale=1+q.mission*.24;for(let lane=0;lane<3;lane++)if(lane===1||q.mission>=4){const hp=Math.round(d.hp*scale);q.enemies.push({type:'boss',lane,x:880+lane*12,hp,max:hp,shot:1,flash:0})}}q.nextWave=q.wave>=m.waves?999:Math.max(10,19-q.mission*1.2-q.wave*.35);say(`第 ${q.wave}/${m.waves} 波抵达${q.wave===m.waves?'，攻城巨兽出现！':''}`)}
function nearestEnemy(u){return q.enemies.filter(e=>e.lane===u.lane&&e.hp>0&&e.x>=u.x-10).sort((a,b)=>a.x-b.x)[0]}function nearestUnit(e){return q.units.filter(u=>u.lane===e.lane&&u.hp>0&&u.x<=e.x+10).sort((a,b)=>b.x-a.x)[0]}
function damage(target,raw,pierce=0){const d=target.type&&UNITS[target.type]||target.type&&ENEMIES[target.type],armor=pierce?0:d?.armor||0;target.hp-=raw*(1-armor);target.flash=.1}
function update(dt){if(!q||q.paused||q.over)return;const m=MISSIONS[q.mission];q.time+=dt;q.ore+=income()*dt;q.power=Math.min(100,q.power+(1.2+q.buildings.reactor*.7)*(q.mission===2?.72:1)*dt);q.nextWave-=dt;q.boost=Math.max(0,q.boost-dt);for(const k in q.cool)q.cool[k]=Math.max(0,q.cool[k]-dt);if(q.nextWave<=0&&q.wave<m.waves)spawnWave();
for(const u of q.units){const d=UNITS[u.type];u.shot-=dt;u.flash=Math.max(0,u.flash-dt);if(d.heal){const ally=q.units.filter(x=>x.lane===u.lane&&x!==u&&x.hp<x.max).sort((a,b)=>a.hp/a.max-b.hp/b.max)[0];if(ally&&Math.abs(ally.x-u.x)<d.range&&u.shot<=0){ally.hp=Math.min(ally.max,ally.hp+d.heal);u.shot=d.cd}else if(u.x<285)u.x+=d.spd*dt;continue}const e=nearestEnemy(u),range=d.range;if(e&&e.x-u.x<=range){if(u.shot<=0){let atk=d.a*(1+techMul('weapons')*.08)*(q.boost>0?1.35:1);damage(e,atk,d.pierce);if(d.splash)q.enemies.filter(x=>x!==e&&x.lane===e.lane&&Math.abs(x.x-e.x)<d.splash).forEach(x=>damage(x,atk*.42));u.shot=d.cd}}else if(q.assault||u.x<280)u.x+=d.spd*(q.doctrine==='blitz'?1.2:1)*dt;if(u.x>835){q.enemyBase-=d.a*dt*.55;u.hp-=8*dt}}
for(const e of q.enemies){const d=ENEMIES[e.type];e.shot-=dt;e.flash=Math.max(0,e.flash-dt);const u=nearestUnit(e);if(u&&e.x-u.x<=d.range){if(e.shot<=0){damage(u,d.a);e.shot=d.cd}}else e.x-=d.spd*dt;if(e.x<125){q.base-=d.a*dt*.55;e.hp-=q.buildings.turret*(q.doctrine==='fortress'?7:5)*dt}}
const deadEnemies=q.enemies.filter(e=>e.hp<=0);deadEnemies.forEach(()=>{q.kills++;q.ore+=3;if(has('veteran'))q.units.filter(u=>u.hp>0).slice(0,2).forEach(u=>u.hp=Math.min(u.max,u.hp+2))});q.enemies=q.enemies.filter(e=>e.hp>0);q.units=q.units.filter(u=>u.hp>0&&u.x<900);if(q.base<=0)return finish(false);if(q.enemyBase<=0||(q.wave>=m.waves&&!q.enemies.length&&q.nextWave>100))return finish(true);const ui=Math.floor(q.time*4);if(ui!==q.uiTick){q.uiTick=ui;drawFast()}if(Math.floor(q.time/3)!==q.saveTick){q.saveTick=Math.floor(q.time/3);save()}}
function ability(id){if(q.cool[id]>0)return toast('战术仍在冷却');const reduce=has('command')?.85:1;if(id==='air'){if(q.power<35)return toast('能源不足');q.power-=35;const targets=q.enemies.filter(e=>e.lane===selectedLane);targets.forEach(e=>damage(e,Math.round((68+q.mission*10)*(has('air')?1.35:1)),1));q.cool.air=16*reduce;say(`空袭覆盖${['北','中','南'][selectedLane]}线`)}if(id==='repair'){if(q.power<25)return toast('能源不足');q.power-=25;const n=Math.round(95*(has('repair')?1.4:1));q.base=Math.min(q.maxBase,q.base+n);q.units.forEach(u=>u.hp=Math.min(u.max,u.hp+n*.18));q.cool.repair=20*reduce;say('纳米维修群抵达前线')}if(id==='rally'){if(q.power<30)return toast('能源不足');q.power-=30;q.boost=8;q.cool.rally=18*reduce;say('全军进入火力超载')}draw()}
function finish(win){q.over=true;q.paused=true;q.won=win;if(win){const m=MISSIONS[q.mission],reward=m.reward+Math.floor(q.base/q.maxBase*8);profile.commend+=reward;profile.wins++;profile.unlocked=Math.max(profile.unlocked,Math.min(5,q.mission+2));say(`战役胜利，获得 ${reward} 枚勋章`)}else say('指挥部失守，战役失败');save();$('infoTitle').textContent=win?'边境战役胜利':'战线撤离';$('infoBody').innerHTML=`<h3>${win?'敌方要塞已被摧毁':'防线已经崩溃'}</h3><p>击破 ${q.kills} · 剩余基地 ${Math.max(0,Math.round(q.base))} · 完成波次 ${q.wave}/${MISSIONS[q.mission].waves}</p><button class="btn primary" id="returnCampaign">返回战役地图</button>`;$('infoOverlay').classList.remove('hidden');$('returnCampaign').onclick=()=>{q=null;save();$('infoOverlay').classList.add('hidden');startScreen();$('startOverlay').classList.remove('hidden')}}
function research(id){const d=TECHS[id];if(has(id)||profile.commend<d.cost)return;profile.commend-=d.cost;profile.tech[id]=1;save();startScreen()}
function showSave(){const code=exportCode();$('infoTitle').textContent='跨设备战役档案';$('infoBody').innerHTML=`<p>章节、永久研究、当前战场、建筑与部队状态均会导出，并带完整性校验。</p><textarea class="savebox" id="saveCode">${code}</textarea><div class="controls"><button class="btn" id="copyCode">复制导出</button><button class="btn" id="importCodeBtn">导入上方存档</button></div>`;$('infoOverlay').classList.remove('hidden');$('copyCode').onclick=()=>navigator.clipboard?.writeText($('saveCode').value);$('importCodeBtn').onclick=()=>{try{importCode($('saveCode').value);$('infoOverlay').classList.add('hidden');$('startOverlay').classList.toggle('hidden',!!q);alert('战役档案导入成功')}catch(e){alert(e.message)}}}
function render(){if(!q)return;ctx.clearRect(0,0,960,540);const colors=['#425d49','#394f42','#30463b'];colors.forEach((c,l)=>{ctx.fillStyle=c;ctx.fillRect(0,35+l*165,960,145);ctx.strokeStyle='#82917d55';ctx.setLineDash([12,10]);ctx.beginPath();ctx.moveTo(0,107+l*165);ctx.lineTo(960,107+l*165);ctx.stroke();ctx.setLineDash([])});ctx.fillStyle='#263831';ctx.fillRect(70,20,80,500);ctx.fillStyle='#543337';ctx.fillRect(820,20,80,500);ctx.font='45px serif';ctx.textAlign='center';ctx.fillText('🏰',110,280);ctx.fillText('🏯',860,280);ctx.font='19px sans-serif';ctx.fillStyle='#adc6b5';['北线','中线','南线'].forEach((x,l)=>ctx.fillText(x,36,112+l*165));
q.units.forEach(u=>{const d=UNITS[u.type],y=108+u.lane*165;ctx.globalAlpha=u.flash?.45:1;ctx.font='29px serif';ctx.fillText(d.i,u.x,y+9);ctx.globalAlpha=1;ctx.fillStyle='#132018';ctx.fillRect(u.x-17,y-25,34,4);ctx.fillStyle=varColor('--green','#65dc96');ctx.fillRect(u.x-17,y-25,34*Math.max(0,u.hp/u.max),4)});q.enemies.forEach(e=>{const d=ENEMIES[e.type],y=108+e.lane*165;ctx.globalAlpha=e.flash?.45:1;ctx.font=e.type==='boss'?'45px serif':'28px serif';ctx.fillText(d.i,e.x,y+9);ctx.globalAlpha=1;ctx.fillStyle='#271418';ctx.fillRect(e.x-18,y-27,36,4);ctx.fillStyle='#ff6671';ctx.fillRect(e.x-18,y-27,36*Math.max(0,e.hp/e.max),4)});if(q.paused&&!q.over){ctx.fillStyle='#061013aa';ctx.fillRect(0,0,960,540);ctx.fillStyle='#fff';ctx.font='bold 35px sans-serif';ctx.fillText('战术暂停',480,270)}}function varColor(n,f){return getComputedStyle(document.documentElement).getPropertyValue(n).trim()||f}
function drawFast(){if(!q)return;const m=MISSIONS[q.mission];$('ore').textContent=Math.floor(q.ore);$('power').textContent=Math.floor(q.power);$('supply').textContent=`${usedSupply()} / ${supplyCap()}`;$('wave').textContent=`${q.wave} / ${m.waves}`;$('countdown').textContent=q.nextWave>100?'最终清场':Math.max(0,Math.ceil(q.nextWave))+'s';$('baseText').textContent=`${Math.max(0,Math.round(q.base))}/${q.maxBase}`;$('enemyBaseText').textContent=`${Math.max(0,Math.round(q.enemyBase))}/${q.maxEnemyBase}`;$('baseBar').style.width=Math.max(0,q.base/q.maxBase*100)+'%';$('enemyBaseBar').style.width=Math.max(0,q.enemyBase/q.maxEnemyBase*100)+'%';$('message').textContent=q.logs[0]||'';$('log').innerHTML=q.logs.map(x=>`<div>${x}</div>`).join('');$('airstrikeBtn').textContent=`空袭 ${q.cool.air>0?q.cool.air.toFixed(0)+'s':'35能量'}`;$('repairBtn').textContent=`维修 ${q.cool.repair>0?q.cool.repair.toFixed(0)+'s':'25能量'}`;$('rallyBtn').textContent=`超载 ${q.cool.rally>0?q.cool.rally.toFixed(0)+'s':'30能量'}`}
function draw(){if(!q)return;const m=MISSIONS[q.mission];drawFast();$('missionName').textContent=`${m.i} ${m.n}`;$('doctrineName').textContent=DOCTRINES[q.doctrine].n;
$('units').innerHTML=Object.entries(UNITS).map(([id,d])=>{const locked=q.buildings[d.need[0]]<d.need[1];return`<div class="card unit-card"><span>${d.i}</span><b>${d.n}</b><small>${d.d}<br>${d.cost}矿 · ${d.pop}人口</small><button class="btn" data-unit="${id}" ${locked?'disabled':''}>${locked?'未解锁':'部署'}</button></div>`}).join('');document.querySelectorAll('[data-unit]').forEach(b=>b.onclick=()=>spawnUnit(b.dataset.unit));$('buildings').innerHTML=Object.entries(BUILDINGS).map(([id,d])=>{const lv=q.buildings[id],discount=q.doctrine==='logistics'&&id==='barracks'?.8:1,cost=Math.round(d.base*Math.pow(1.65,lv)*discount);return`<div class="card"><b>${d.i}${d.n} Lv.${lv}</b><small>${d.d}</small><button class="btn" data-build="${id}" ${lv>=d.max?'disabled':''}>${lv>=d.max?'满级':`升级 ${cost}`}</button></div>`}).join('');document.querySelectorAll('[data-build]').forEach(b=>b.onclick=()=>build(b.dataset.build));$('log').innerHTML=q.logs.map(x=>`<div>${x}</div>`).join('');$('assaultBtn').textContent=q.assault?'停止推进':'全线推进';$('airstrikeBtn').textContent=`空袭 ${q.cool.air>0?q.cool.air.toFixed(0)+'s':'35能量'}`;$('repairBtn').textContent=`维修 ${q.cool.repair>0?q.cool.repair.toFixed(0)+'s':'25能量'}`;$('rallyBtn').textContent=`超载 ${q.cool.rally>0?q.cool.rally.toFixed(0)+'s':'30能量'}`;$('pauseBtn').textContent=q.paused?'继续':'暂停';render();save()}
function startScreen(){$('commendations').textContent=profile.commend;$('campaign').innerHTML=MISSIONS.map((m,i)=>`<button class="mission ${selectedMission===i?'active':''}" data-mission="${i}" ${i>=profile.unlocked?'disabled':''}><b>${m.i} ${i+1}.${m.n}</b><small>${m.waves} 波 · 奖励 ${m.reward} 勋章</small></button>`).join('');document.querySelectorAll('[data-mission]').forEach(b=>b.onclick=()=>{selectedMission=+b.dataset.mission;startScreen()});$('doctrines').innerHTML=Object.entries(DOCTRINES).map(([id,d])=>`<button class="choice" data-doctrine="${id}"><span>${d.i}</span><h3>${d.n}</h3><p>${d.d}<br>开始章节：${MISSIONS[selectedMission].n}</p></button>`).join('');document.querySelectorAll('[data-doctrine]').forEach(b=>b.onclick=()=>{q=fresh(selectedMission,b.dataset.doctrine);$('startOverlay').classList.add('hidden');draw()});$('techs').innerHTML=Object.entries(TECHS).map(([id,d])=>`<div class="card"><b>${d.i}${d.n}</b><small>${d.d}</small><button class="btn" data-tech="${id}" ${has(id)||profile.commend<d.cost?'disabled':''}>${has(id)?'已研究':d.cost+' 勋章'}</button></div>`).join('');document.querySelectorAll('[data-tech]').forEach(b=>b.onclick=()=>research(b.dataset.tech))}
document.querySelectorAll('[data-lane]').forEach(b=>b.onclick=()=>{selectedLane=+b.dataset.lane;document.querySelectorAll('[data-lane]').forEach(x=>x.classList.toggle('active',x===b))});$('assaultBtn').onclick=()=>{q.assault=!q.assault;if(q.assault&&q.doctrine==='blitz'&&!q.blitzUsed){q.boost=8;q.blitzUsed=1}draw()};$('airstrikeBtn').onclick=()=>ability('air');$('repairBtn').onclick=()=>ability('repair');$('rallyBtn').onclick=()=>ability('rally');$('pauseBtn').onclick=()=>{q.paused=!q.paused;draw()};$('saveBtn').onclick=()=>q&&showSave();$('closeInfoBtn').onclick=()=>$('infoOverlay').classList.add('hidden');$('retreatBtn').onclick=()=>{if(confirm('撤离当前战役并返回章节地图？')){q=null;save();startScreen();$('startOverlay').classList.remove('hidden')}};function loop(t){const dt=Math.min(.04,(t-last)/1000||0);last=t;update(dt);render();raf=requestAnimationFrame(loop)}load();startScreen();if(q&&!q.over){$('startOverlay').classList.add('hidden');q.paused=false;draw()}loop(0)
})();</script><style>@media(max-width:580px){.battle>.controls{display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}.battle>.controls .btn{width:100%}}</style></body></html>
