<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>晶糖花园</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23101824'/%3E%3Cpath d='M32 9 50 25 42 52H22L14 25Z' fill='%23f0d16f'/%3E%3Cpath d='M17 25h30M24 12l8 40 8-40' stroke='%23287468' stroke-width='5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
    <style>
      :root{--ink:#10191f;--panel:#fffdf4;--line:#87989e;--teal:#287468;--gold:#d6a33d;--red:#bd5148;--blue:#326f91;--shadow:rgba(5,12,16,.28);--radius:8px}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,sans-serif;background:linear-gradient(rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(135deg,#0b1724,#173b39 48%,#3b3345);background-size:30px 30px,30px 30px,auto}button{font:inherit}.app{width:min(1380px,calc(100vw - 28px));margin:14px auto}.topbar,.panel{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,244,.97);box-shadow:0 16px 36px var(--shadow)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px}.eyebrow{margin:0 0 5px;color:#856219;font-size:12px;font-weight:900}h1{margin:0;font-size:clamp(26px,4vw,44px);line-height:1}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:42px;padding:0 14px;border:1px solid #24534d;border-radius:var(--radius);color:#fffdf6;background:var(--teal);font-weight:900;cursor:pointer}.btn.secondary{color:var(--ink);background:#f0d17b;border-color:#9c7621}.layout{display:grid;grid-template-columns:minmax(0,1fr) 316px;gap:14px;margin-top:14px;align-items:start}.stage{position:relative;overflow:hidden;min-height:650px}canvas{display:block;width:100%;height:650px;touch-action:none}.side{padding:16px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.stat{padding:10px;border:1px solid #9da69e;border-radius:var(--radius);background:#f9f7eb}.stat b{display:block;font-size:24px;line-height:1.1}.stat small{color:#5e6d67;font-weight:800}.goal{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.goal div{min-height:74px;padding:8px;border:1px solid #9da69e;border-radius:var(--radius);background:#fff8e6;text-align:center;font-weight:900}.goal i{display:block;width:28px;height:28px;margin:0 auto 5px;border-radius:50%}.meter{margin:0 0 13px}.meter span{display:flex;justify-content:space-between;margin-bottom:6px;color:#5e6d67;font-weight:900}.bar{height:13px;border:1px solid #84968f;border-radius:999px;overflow:hidden;background:#e9eadc}.bar i{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--blue),#8bd0bb)}.tools{display:grid;grid-template-columns:1fr 1fr;gap:10px}.toolbtn{min-height:52px;border:1px solid #758780;border-radius:var(--radius);background:#fff8e6;color:var(--ink);font-weight:900;cursor:pointer}.toolbtn.active{background:#f0d17b;border-color:#9c7621}.hint{margin:14px 0 0;color:#566861;line-height:1.55;font-weight:700}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:24px;background:rgba(16,28,31,.52)}.modal{width:min(470px,100%);padding:22px;border:1px solid #a4b4ad;border-radius:var(--radius);background:#fffdf6;box-shadow:0 24px 52px rgba(0,0,0,.32)}.modal h2{margin:0 0 10px;font-size:28px}.modal p{margin:0 0 16px;color:#53635f;line-height:1.6}.hidden{display:none}@media(max-width:940px){.layout{grid-template-columns:1fr}.side{order:-1}.stage{min-height:560px}canvas{height:560px}}@media(max-width:620px){.app{width:min(100vw - 16px,1380px);margin-top:8px}.topbar{display:block;padding:14px}.actions{margin-top:12px;justify-content:stretch}.btn{flex:1 1 auto}.stage{min-height:500px}canvas{height:500px}.stat b{font-size:21px}}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div><p class="eyebrow">MATCH THREE</p><h1>晶糖花园</h1></div>
        <div class="actions"><button class="btn" id="startBtn">开局</button><button class="btn secondary" id="hintBtn">提示</button><button class="btn secondary" id="resetBtn">重开</button></div>
      </header>
      <section class="layout">
        <div class="panel stage"><canvas id="gameCanvas" aria-label="晶糖花园游戏画面"></canvas><div class="overlay" id="overlay"><div class="modal"><h2 id="overlayTitle">花园开盘</h2><p id="overlayText">交换相邻晶糖，三连消除。四连会留下横竖爆，五连会留下星爆，完成目标就通关。</p><button class="btn" id="overlayBtn">开始消除</button></div></div></div>
        <aside class="panel side">
          <div class="stats"><div class="stat"><b id="scoreText">0</b><small>分数</small></div><div class="stat"><b id="bestText">0</b><small>最佳</small></div><div class="stat"><b id="movesText">24</b><small>步数</small></div><div class="stat"><b id="chainText">0</b><small>连锁</small></div></div>
          <div class="goal" id="goalBox"></div>
          <div class="meter"><span><b>目标进度</b><em id="progressText">0%</em></span><div class="bar"><i id="progressBar"></i></div></div>
          <div class="tools"><button class="toolbtn" id="shuffleBtn">洗牌</button><button class="toolbtn" id="hammerBtn">小锤</button></div>
          <p class="hint">点击两颗相邻晶糖交换，也可按住拖向相邻格。洗牌会扣 1 步，小锤可敲掉 1 颗晶糖，R 重开。</p>
        </aside>
      </section>
    </main>
    <script>
      (()=> {
        const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d"),overlay=document.getElementById("overlay"),overlayTitle=document.getElementById("overlayTitle"),overlayText=document.getElementById("overlayText"),overlayBtn=document.getElementById("overlayBtn"),startBtn=document.getElementById("startBtn"),resetBtn=document.getElementById("resetBtn"),hintBtn=document.getElementById("hintBtn"),shuffleBtn=document.getElementById("shuffleBtn"),hammerBtn=document.getElementById("hammerBtn"),goalBox=document.getElementById("goalBox");
        const scoreText=document.getElementById("scoreText"),bestText=document.getElementById("bestText"),movesText=document.getElementById("movesText"),chainText=document.getElementById("chainText"),progressText=document.getElementById("progressText"),progressBar=document.getElementById("progressBar");
        const N=8,K=6,storageKey="miniGemGardenRecords",colors=["#d65a4a","#d6a33d","#287468","#326f91","#7b5bb4","#d9823b"];let w=900,h=650,dpr=1,last=0,loopToken=0,state=makeState();
        function loadBest(){try{return JSON.parse(localStorage.getItem(storageKey)||"{}").best||0}catch(e){return 0}}function saveBest(v){const b=Math.max(loadBest(),v);localStorage.setItem(storageKey,JSON.stringify({best:b}));return b}
        function makeState(){return{mode:"menu",score:0,best:loadBest(),moves:24,chain:0,board:[],selected:null,drag:null,msg:"",msgTimer:0,particles:[],busy:false,hint:null,hintTimer:0,hammer:false,goals:[{t:0,n:16},{t:2,n:14},{t:4,n:12}]}}
        function resize(){const r=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,devicePixelRatio||1));w=Math.max(320,r.width);h=Math.max(500,r.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
        function start(){loopToken++;state=makeState();fillBoard();state.mode="running";overlay.classList.add("hidden");last=performance.now();updateHud();requestAnimationFrame(t=>loop(t,loopToken))}
        function fillBoard(){state.board=[];for(let y=0;y<N;y++){state.board[y]=[];for(let x=0;x<N;x++){let t;do{t=Math.floor(Math.random()*K)}while((x>1&&state.board[y][x-1].t===t&&state.board[y][x-2].t===t)||(y>1&&state.board[y-1][x].t===t&&state.board[y-2][x].t===t));state.board[y][x]=gem(t)}}if(!findMove())fillBoard()}
        function gem(t){return{t,kind:0,scale:1,flash:0,fall:0}}function loop(now,token){if(token!==loopToken||state.mode!=="running")return;const dt=Math.min(.033,(now-last)/1000||.016);last=now;state.msgTimer=Math.max(0,state.msgTimer-dt);state.hintTimer=Math.max(0,state.hintTimer-dt);for(const row of state.board)for(const g of row){g.flash=Math.max(0,g.flash-dt);g.scale+=(1-g.scale)*dt*8}state.particles=state.particles.filter(p=>{p.life-=dt;p.y-=dt*34;return p.life>0});draw();requestAnimationFrame(t=>loop(t,token))}
        function area(){const size=Math.min(w-42,h-58),cell=size/N,x=(w-size)/2,y=(h-size)/2+12;return{x,y,size,cell}}function cellAt(px,py){const a=area(),x=Math.floor((px-a.x)/a.cell),y=Math.floor((py-a.y)/a.cell);return x>=0&&x<N&&y>=0&&y<N?{x,y}:null}function same(a,b){return a&&b&&a.x===b.x&&a.y===b.y}function adj(a,b){return a&&b&&Math.abs(a.x-b.x)+Math.abs(a.y-b.y)===1}
        async function trySwap(a,b,free=false){if(state.busy||state.mode!=="running"||!adj(a,b))return;state.busy=true;swap(a,b);let matches=findMatches();if(!matches.length&&!free){swap(a,b);message("没有三连","#bd5148");state.busy=false;state.selected=null;return}if(!free)state.moves--;state.selected=null;await settle(matches,free?0:1);state.busy=false;checkEnd()}
        async function settle(matches,chain){while(matches.length){state.chain=Math.max(state.chain,chain);const clear=new Map(),specials=[];for(const m of matches){for(const c of m.cells)clear.set(`${c.x},${c.y}`,c);if(m.cells.length>=4){const keep=m.cells[Math.floor(m.cells.length/2)],g=state.board[keep.y][keep.x];g.kind=m.cells.length>=5?3:(m.dir==="h"?1:2);g.t=m.type;specials.push(`${keep.x},${keep.y}`)}}for(const key of [...clear.keys()]){if(specials.includes(key))clear.delete(key)}expandSpecials(clear);for(const key of clear.keys()){const [x,y]=key.split(",").map(Number),g=state.board[y][x];collect(g.t);pop(x,y,`+${20*chain}`,colors[g.t]);state.score+=20*chain;state.board[y][x]=null}collapse();await wait(120);matches=findMatches();chain++}updateHud()}
        function expandSpecials(clear){let changed=true;while(changed){changed=false;for(const key of [...clear.keys()]){const [x,y]=key.split(",").map(Number),g=state.board[y][x];if(!g||!g.kind)continue;if(g.kind===1){for(let i=0;i<N;i++)if(!clear.has(`${i},${y}`)){clear.set(`${i},${y}`,{x:i,y});changed=true}}if(g.kind===2){for(let i=0;i<N;i++)if(!clear.has(`${x},${i}`)){clear.set(`${x},${i}`,{x,y:i});changed=true}}if(g.kind===3){for(let yy=y-1;yy<=y+1;yy++)for(let xx=x-1;xx<=x+1;xx++)if(xx>=0&&xx<N&&yy>=0&&yy<N&&!clear.has(`${xx},${yy}`)){clear.set(`${xx},${yy}`,{x:xx,y:yy});changed=true}}}}}
        function collapse(){for(let x=0;x<N;x++){let write=N-1;for(let y=N-1;y>=0;y--)if(state.board[y][x])state.board[write--][x]=state.board[y][x];for(let y=write;y>=0;y--){state.board[y][x]=gem(Math.floor(Math.random()*K));state.board[y][x].scale=.2}}}
        function findMatches(){const out=[];for(let y=0;y<N;y++){let run=1;for(let x=1;x<=N;x++){if(x<N&&state.board[y][x]?.t===state.board[y][x-1]?.t)run++;else{if(run>=3){const cells=[];for(let i=x-run;i<x;i++)cells.push({x:i,y});out.push({dir:"h",type:state.board[y][x-1].t,cells})}run=1}}}for(let x=0;x<N;x++){let run=1;for(let y=1;y<=N;y++){if(y<N&&state.board[y][x]?.t===state.board[y-1][x]?.t)run++;else{if(run>=3){const cells=[];for(let i=y-run;i<y;i++)cells.push({x,y:i});out.push({dir:"v",type:state.board[y-1][x].t,cells})}run=1}}}return out}
        function findMove(){for(let y=0;y<N;y++)for(let x=0;x<N;x++){for(const d of [[1,0],[0,1]]){const a={x,y},b={x:x+d[0],y:y+d[1]};if(b.x<N&&b.y<N){swap(a,b);const ok=findMatches().length>0;swap(a,b);if(ok)return[a,b]}}}return null}
        function swap(a,b){const t=state.board[a.y][a.x];state.board[a.y][a.x]=state.board[b.y][b.x];state.board[b.y][b.x]=t;state.board[a.y][a.x].flash=.25;state.board[b.y][b.x].flash=.25}function collect(t){for(const g of state.goals)if(g.t===t&&g.n>0)g.n--}
        function hint(){const mv=findMove();if(mv){state.hint=mv;state.hintTimer=2.2;message("提示已标出","#326f91")}else{shuffle()}}function shuffle(){if(state.busy||state.mode!=="running")return;const gems=state.board.flat();for(let i=gems.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[gems[i],gems[j]]=[gems[j],gems[i]]}for(let y=0;y<N;y++)for(let x=0;x<N;x++)state.board[y][x]=gems[y*N+x];if(state.moves>0)state.moves--;message("花园洗牌","#d6a33d");updateHud();checkEnd()}
        async function hammer(c){if(state.busy||!c)return;state.busy=true;state.moves--;const clear=new Map([[`${c.x},${c.y}`,c]]);expandSpecials(clear);for(const key of clear.keys()){const [x,y]=key.split(",").map(Number),g=state.board[y][x];collect(g.t);state.score+=40;pop(x,y,"敲","#d6a33d");state.board[y][x]=null}collapse();await wait(100);await settle(findMatches(),1);state.busy=false;state.hammer=false;hammerBtn.classList.remove("active");checkEnd()}
        function checkEnd(){const done=state.goals.every(g=>g.n<=0);if(done||state.moves<=0){state.mode="over";if(done)state.score+=state.moves*80;state.best=saveBest(state.score);overlayTitle.textContent=done?"花园丰收":"步数用尽";overlayText.textContent=`分数 ${state.score}，最佳 ${state.best}。`;overlayBtn.textContent="再开一盘";overlay.classList.remove("hidden")}else if(!findMove())shuffle();updateHud()}
        function wait(ms){return new Promise(r=>setTimeout(r,ms))}function message(text,color){state.msg=text;state.msgColor=color;state.msgTimer=1}function pop(x,y,text,color){const a=area();state.particles.push({x:a.x+(x+.5)*a.cell,y:a.y+(y+.5)*a.cell,text,color,life:1})}
        function draw(){ctx.clearRect(0,0,w,h);const bg=ctx.createLinearGradient(0,0,0,h);bg.addColorStop(0,"#132334");bg.addColorStop(1,"#263346");ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);for(let i=0;i<60;i++){ctx.fillStyle=i%2?"rgba(255,255,255,.12)":"rgba(214,163,61,.14)";ctx.fillRect((i*89)%w,(i*47)%h,2,2)}const a=area();round(a.x-12,a.y-12,a.size+24,a.size+24,12,"#162934","#8bd0bb");ctx.fillStyle="rgba(255,253,244,.08)";for(let y=0;y<N;y++)for(let x=0;x<N;x++){round(a.x+x*a.cell+4,a.y+y*a.cell+4,a.cell-8,a.cell-8,8,"rgba(255,253,244,.08)")}if(state.hint&&state.hintTimer>0){ctx.strokeStyle="#f0d16f";ctx.lineWidth=4;for(const c of state.hint)ctx.strokeRect(a.x+c.x*a.cell+7,a.y+c.y*a.cell+7,a.cell-14,a.cell-14)}for(let y=0;y<N;y++)for(let x=0;x<N;x++)drawGem(x,y,state.board[y]?.[x]);if(state.selected){ctx.strokeStyle="#fffdf4";ctx.lineWidth=4;ctx.strokeRect(a.x+state.selected.x*a.cell+6,a.y+state.selected.y*a.cell+6,a.cell-12,a.cell-12)}for(const p of state.particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.font="900 20px system-ui";ctx.textAlign="center";ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1}if(state.msgTimer>0){ctx.fillStyle=state.msgColor||"#fffdf4";ctx.font="900 24px system-ui";ctx.textAlign="center";ctx.fillText(state.msg,w/2,48)}}
        function drawGem(x,y,g){if(!g)return;const a=area(),cx=a.x+(x+.5)*a.cell,cy=a.y+(y+.5)*a.cell,r=a.cell*.34*g.scale;ctx.save();ctx.translate(cx,cy);ctx.fillStyle="rgba(0,0,0,.25)";ctx.beginPath();ctx.ellipse(4,8,r*.95,r*.32,0,0,Math.PI*2);ctx.fill();ctx.rotate((g.t%3-.8)*.18);ctx.fillStyle=colors[g.t];ctx.strokeStyle="#fffdf4";ctx.lineWidth=3;ctx.beginPath();if(g.t%3===0){ctx.moveTo(0,-r);ctx.lineTo(r*.9,-r*.1);ctx.lineTo(r*.45,r);ctx.lineTo(-r*.45,r);ctx.lineTo(-r*.9,-r*.1)}else if(g.t%3===1){ctx.moveTo(0,-r);ctx.lineTo(r,r*.15);ctx.lineTo(0,r);ctx.lineTo(-r,r*.15)}else{ctx.arc(0,0,r,0,Math.PI*2)}ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle="rgba(255,255,255,.48)";ctx.beginPath();ctx.arc(-r*.28,-r*.28,r*.22,0,Math.PI*2);ctx.fill();if(g.kind){ctx.strokeStyle=g.kind===3?"#10191f":"#f0d16f";ctx.lineWidth=5;ctx.beginPath();if(g.kind===1){ctx.moveTo(-r*.65,0);ctx.lineTo(r*.65,0)}else if(g.kind===2){ctx.moveTo(0,-r*.65);ctx.lineTo(0,r*.65)}else{for(let i=0;i<5;i++){const an=i*Math.PI*2/5-Math.PI/2;ctx.lineTo(Math.cos(an)*r*.72,Math.sin(an)*r*.72)}}ctx.stroke()}if(g.flash>0){ctx.globalAlpha=g.flash*4;ctx.strokeStyle="#fffdf4";ctx.lineWidth=6;ctx.beginPath();ctx.arc(0,0,r+5,0,Math.PI*2);ctx.stroke()}ctx.restore()}
        function round(x,y,W,H,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+W,y,x+W,y+H,r);ctx.arcTo(x+W,y+H,x,y+H,r);ctx.arcTo(x,y+H,x,y,r);ctx.arcTo(x,y,x+W,y,r);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke()}}
        function updateHud(){scoreText.textContent=state.score.toString();bestText.textContent=Math.max(state.best,state.score).toString();movesText.textContent=state.moves.toString();chainText.textContent=state.chain.toString();goalBox.innerHTML=state.goals.map(g=>`<div><i style="background:${colors[g.t]}"></i>${Math.max(0,g.n)}</div>`).join("");const total=42,left=state.goals.reduce((s,g)=>s+Math.max(0,g.n),0),p=Math.max(0,Math.min(100,Math.round((1-left/total)*100)));progressText.textContent=`${p}%`;progressBar.style.width=`${p}%`}
        function pointer(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}canvas.addEventListener("pointerdown",e=>{if(state.mode!=="running"||state.busy)return;const p=pointer(e),c=cellAt(p.x,p.y);if(!c)return;if(state.hammer){hammer(c);return}state.drag={cell:c,x:p.x,y:p.y};if(state.selected&&adj(state.selected,c))trySwap(state.selected,c);else state.selected=c;draw()});canvas.addEventListener("pointermove",e=>{if(!state.drag||state.busy)return;const p=pointer(e),dx=p.x-state.drag.x,dy=p.y-state.drag.y,a=area();if(Math.hypot(dx,dy)>a.cell*.42){const dir=Math.abs(dx)>Math.abs(dy)?{x:Math.sign(dx),y:0}:{x:0,y:Math.sign(dy)},b={x:state.drag.cell.x+dir.x,y:state.drag.cell.y+dir.y};state.drag=null;if(b.x>=0&&b.x<N&&b.y>=0&&b.y<N)trySwap(state.selected,b)}});canvas.addEventListener("pointerup",()=>state.drag=null);canvas.addEventListener("pointercancel",()=>state.drag=null);
        startBtn.addEventListener("click",start);resetBtn.addEventListener("click",start);overlayBtn.addEventListener("click",start);hintBtn.addEventListener("click",hint);shuffleBtn.addEventListener("click",shuffle);hammerBtn.addEventListener("click",()=>{state.hammer=!state.hammer;hammerBtn.classList.toggle("active",state.hammer)});document.addEventListener("keydown",e=>{if(e.code==="KeyR")start();if(e.code==="KeyH")hint()});window.addEventListener("resize",resize);fillBoard();resize();updateHud();draw();
      })();
    </script>
  </body>
</html>
