<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>弹弓风暴</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0d0c;
    --panel: rgba(18, 24, 23, 0.9);
    --panel-2: rgba(27, 35, 33, 0.92);
    --line: rgba(230, 242, 221, 0.18);
    --line-hot: rgba(255, 205, 91, 0.62);
    --text: #f2f7ec;
    --muted: #a8b7aa;
    --green: #69d47c;
    --cyan: #48c8d9;
    --gold: #f5c857;
    --coral: #ff735e;
    --violet: #b78cff;
  }

  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    min-height: 100%;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    overflow: hidden;
    background:
      linear-gradient(180deg, #111b18 0%, #0c1110 48%, #0b0d0a 100%);
    color: var(--text);
    font-family: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    touch-action: none;
    user-select: none;
  }

  button {
    font: inherit;
    color: inherit;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(29, 38, 36, 0.94);
    cursor: pointer;
    transition: transform 120ms ease, background 120ms ease, border-color 120ms ease, opacity 120ms ease;
  }

  button:hover {
    background: rgba(42, 54, 50, 0.98);
    border-color: var(--line-hot);
  }

  button:active { transform: scale(0.97); }
  button:disabled { cursor: not-allowed; opacity: 0.42; }

  .shell {
    width: min(1220px, calc(100vw - 28px));
    height: min(790px, calc(100vh - 28px));
    display: grid;
    grid-template-columns: minmax(0, 1fr) 318px;
    gap: 16px;
    align-items: stretch;
  }

  .stage,
  .rail {
    min-width: 0;
    min-height: 0;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 0 24px 76px rgba(0, 0, 0, 0.38);
    backdrop-filter: blur(14px);
  }

  .stage {
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    overflow: hidden;
  }

  .topbar {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px;
    align-items: center;
    padding: 12px;
    border-bottom: 1px solid rgba(230, 242, 221, 0.12);
  }

  h1 {
    margin: 0;
    font-size: 34px;
    line-height: 1;
    letter-spacing: 0;
  }

  .subline {
    margin-top: 7px;
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .top-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .icon-btn {
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    font-size: 18px;
    font-weight: 900;
  }

  .canvas-wrap {
    position: relative;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    background:
      linear-gradient(180deg, #1c3431 0%, #1a2522 45%, #181710 100%);
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .toast {
    position: absolute;
    left: 50%;
    top: 18px;
    transform: translateX(-50%);
    min-width: 180px;
    max-width: min(520px, 80%);
    padding: 10px 14px;
    border: 1px solid rgba(245, 200, 87, 0.45);
    border-radius: 8px;
    background: rgba(18, 21, 16, 0.88);
    color: var(--text);
    text-align: center;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 180ms ease, transform 180ms ease;
  }

  .toast.show {
    opacity: 1;
    transform: translate(-50%, 4px);
  }

  .modal {
    position: absolute;
    inset: 0;
    display: none;
    place-items: center;
    padding: 20px;
    background: rgba(5, 8, 7, 0.54);
  }

  .modal.show { display: grid; }

  .dialog {
    width: min(430px, 92%);
    border: 1px solid rgba(230, 242, 221, 0.2);
    border-radius: 8px;
    background: rgba(18, 25, 23, 0.95);
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
    padding: 20px;
  }

  .dialog h2 {
    margin: 0 0 8px;
    font-size: 26px;
    line-height: 1.1;
    letter-spacing: 0;
  }

  .dialog p {
    margin: 0 0 16px;
    color: var(--muted);
    line-height: 1.65;
    font-size: 14px;
  }

  .dialog-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .primary-btn,
  .wide-btn {
    min-height: 42px;
    padding: 0 15px;
    font-weight: 800;
  }

  .primary-btn {
    border-color: rgba(245, 200, 87, 0.72);
    background: linear-gradient(180deg, rgba(245, 200, 87, 0.32), rgba(197, 93, 64, 0.26));
  }

  .rail {
    display: grid;
    grid-template-rows: auto auto auto minmax(0, 1fr);
    gap: 12px;
    padding: 12px;
    overflow: hidden;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .stat {
    min-width: 0;
    min-height: 72px;
    padding: 10px;
    border: 1px solid rgba(230, 242, 221, 0.13);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.035);
  }

  .stat-label {
    color: var(--muted);
    font-size: 12px;
  }

  .stat-value {
    margin-top: 7px;
    font-size: 21px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0;
    overflow-wrap: anywhere;
  }

  .panel-title {
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .ammo-list {
    display: grid;
    gap: 8px;
  }

  .ammo-item {
    min-height: 48px;
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr) auto;
    gap: 9px;
    align-items: center;
    padding: 8px;
    border: 1px solid rgba(230, 242, 221, 0.12);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.034);
  }

  .ammo-item.active {
    border-color: rgba(245, 200, 87, 0.7);
    background: rgba(245, 200, 87, 0.09);
  }

  .ammo-item.spent {
    opacity: 0.42;
  }

  .ammo-orb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.35);
    box-shadow: inset -5px -6px 0 rgba(0, 0, 0, 0.18);
  }

  .ammo-name {
    min-width: 0;
    font-size: 14px;
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ammo-tag {
    color: var(--muted);
    font-size: 12px;
  }

  .control-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .wide-btn {
    width: 100%;
  }

  .level-list {
    min-height: 0;
    overflow: auto;
    padding-right: 2px;
    display: grid;
    align-content: start;
    gap: 8px;
  }

  .level-btn {
    width: 100%;
    min-height: 42px;
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    padding: 0 10px;
    text-align: left;
  }

  .level-btn.current {
    border-color: rgba(72, 200, 217, 0.72);
    background: rgba(72, 200, 217, 0.09);
  }

  .level-index {
    color: var(--gold);
    font-weight: 900;
  }

  .level-name {
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stars {
    color: var(--gold);
    font-weight: 900;
    letter-spacing: 0;
  }

  @media (max-width: 900px) {
    body { overflow: auto; }

    .shell {
      width: min(100vw - 18px, 780px);
      height: auto;
      min-height: calc(100vh - 18px);
      grid-template-columns: 1fr;
      grid-template-rows: minmax(520px, 64vh) auto;
      padding: 9px 0;
    }

    .rail {
      grid-template-rows: auto auto auto;
      overflow: visible;
    }

    .level-list {
      max-height: 170px;
    }
  }

  @media (max-width: 560px) {
    .shell {
      width: calc(100vw - 12px);
      grid-template-rows: minmax(470px, 62vh) auto;
      gap: 10px;
    }

    .topbar {
      grid-template-columns: 1fr;
    }

    h1 { font-size: 27px; }

    .subline { white-space: normal; }

    .top-actions { justify-content: flex-start; }

    .stat-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
</style>
</head>
<body>
<main class="shell">
  <section class="stage" aria-label="弹弓风暴游戏区">
    <header class="topbar">
      <div>
        <h1>弹弓风暴</h1>
        <div class="subline"><span id="levelName">风口试射</span> · <span id="statusText">准备</span></div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="pauseBtn" title="暂停/继续" aria-label="暂停/继续">Ⅱ</button>
        <button class="icon-btn" id="restartBtn" title="重新开始" aria-label="重新开始">↻</button>
      </div>
    </header>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" aria-label="弹弓物理谜题画布"></canvas>
      <div class="toast" id="toast"></div>
      <div class="modal show" id="startModal">
        <div class="dialog">
          <h2>弹弓风暴</h2>
          <p>原创弹弓物理解谜：用元素弹丸击碎晶核塔，借风向和技能把结构连锁推倒。</p>
          <div class="dialog-actions">
            <button class="primary-btn" id="startBtn">开始挑战</button>
          </div>
        </div>
      </div>
      <div class="modal" id="resultModal">
        <div class="dialog">
          <h2 id="resultTitle">关卡完成</h2>
          <p id="resultCopy">星级与分数会显示在这里。</p>
          <div class="dialog-actions">
            <button class="primary-btn" id="nextBtn">下一关</button>
            <button class="wide-btn" id="retryBtn">再来一次</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <aside class="rail" aria-label="弹弓风暴状态栏">
    <div class="stat-grid">
      <div class="stat">
        <div class="stat-label">分数</div>
        <div class="stat-value" id="scoreValue">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">晶核</div>
        <div class="stat-value" id="targetValue">0/0</div>
      </div>
      <div class="stat">
        <div class="stat-label">风场</div>
        <div class="stat-value" id="windValue">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">星级</div>
        <div class="stat-value stars" id="starValue">---</div>
      </div>
    </div>

    <section>
      <p class="panel-title">弹丸序列</p>
      <div class="ammo-list" id="ammoList"></div>
    </section>

    <section>
      <p class="panel-title">主动装置</p>
      <div class="control-grid">
        <button class="wide-btn" id="abilityBtn" title="触发当前弹丸技能">技能</button>
        <button class="wide-btn" id="windBtn" title="切换风向">换风</button>
      </div>
    </section>

    <section>
      <p class="panel-title">关卡</p>
      <div class="level-list" id="levelList"></div>
    </section>
  </aside>
</main>

    engine.velocityIterations = 7;
    Events.on(engine, "collisionStart", handleCollisions);
  }

  function addStaticWorld() {
    const ground = Bodies.rectangle(WORLD_W / 2, GROUND_Y + 48, WORLD_W + 300, 96, {
      isStatic: true,
      friction: 0.95,
      restitution: 0.04
    });
    ground.game = { kind: "ground" };

    const leftWall = Bodies.rectangle(-70, WORLD_H / 2, 80, WORLD_H + 400, {
      isStatic: true,
      friction: 0.9
    });
    leftWall.game = { kind: "wall" };

    const rightWall = Bodies.rectangle(WORLD_W + 160, WORLD_H / 2, 80, WORLD_H + 400, {
      isStatic: true,
      friction: 0.9
    });
    rightWall.game = { kind: "wall" };

    Composite.add(world, [ground, leftWall, rightWall]);
  }

  function addBlock(spec) {
    const [matKey, x, y, w, h, angle] = spec;
    const mat = materials[matKey] || materials.wood;
    const body = Bodies.rectangle(x, y, w, h, {
      angle,
      density: mat.density,
      friction: mat.friction,
      restitution: mat.restitution,
      chamfer: { radius: Math.min(4, Math.min(w, h) * 0.12) },
      isStatic: matKey === "steel"
    });
    body.game = {
      kind: "block",
      mat: matKey,
      w,
      h,
      hp: mat.hp,
      maxHp: mat.hp,
      flash: 0,
      dead: false
    };
    blocks.push(body);
    Composite.add(world, body);
    return body;
  }

  function addTarget(spec) {
    const [x, y, r] = spec;
    const body = Bodies.circle(x, y, r, {
      density: 0.0015,
      friction: 0.58,
      restitution: 0.22,
      chamfer: { radius: 4 }
    });
    body.game = {
      kind: "target",
      hp: 34 + r * 0.8,
      maxHp: 34 + r * 0.8,
      flash: 0,
      dead: false
    };
    targets.push(body);
    Composite.add(world, body);
    return body;
  }

  function createProjectile(typeKey, x, y, fragment = false) {
    const type = ammoTypes[typeKey];
    const radius = fragment ? Math.max(8, type.radius * 0.58) : type.radius;
    const body = Bodies.circle(x, y, radius, {
      density: fragment ? type.density * 0.72 : type.density,
      friction: 0.22,
      frictionAir: 0.007,
      restitution: type.restitution,
      // Create every projectile as a dynamic body first. Matter.js only
      // records a finite mass/inertia when an existing dynamic body is later
      // made static; bodies born static otherwise keep Infinity after release.
      isStatic: false,
      isSensor: !fragment,
      collisionFilter: {
        category: PROJECTILE_CATEGORY,
        mask: fragment ? LIVE_PROJECTILE_MASK : 0
      }
    });
    body.game = {
      kind: "projectile",
      type: typeKey,
      fragment,
      radius,
      asleepFor: 0,
      bornAt: performance.now()
    };
    projectiles.push(body);
    Composite.add(world, body);
    return body;
  }

  function holdProjectile(body, point = SLING_POUCH) {
    Body.setStatic(body, true);
    Body.setPosition(body, point);
    Body.setVelocity(body, { x: 0, y: 0 });
    Body.setAngularVelocity(body, 0);
    body.isSensor = true;
    body.collisionFilter.category = PROJECTILE_CATEGORY;
    body.collisionFilter.mask = 0;
    body.game.asleepFor = 0;
  }

  function releaseProjectileBody(body) {
    Body.setStatic(body, false);
    body.isSensor = false;
    body.collisionFilter.category = PROJECTILE_CATEGORY;
    body.collisionFilter.mask = LIVE_PROJECTILE_MASK;
    body.game.asleepFor = 0;
  }

  function prepareProjectile() {
    removeRestingProjectiles();
    const level = levels[state.level];
    if (state.ammoIndex >= level.ammo.length) {
      currentProjectile = null;
      currentType = null;
      state.status = "spent";
      updateUI();
      return;
    }
    currentType = level.ammo[state.ammoIndex];
    currentProjectile = createProjectile(currentType, SLING_POUCH.x, SLING_POUCH.y, false);
    holdProjectile(currentProjectile);
    state.status = "ready";
    state.abilityUsed = false;
    state.windShiftLeft = level.shifts;
    updateUI();
  }

  function removeBody(body) {
    Composite.remove(world, body);
    blocks = blocks.filter(item => item !== body);
    targets = targets.filter(item => item !== body);
    projectiles = projectiles.filter(item => item !== body);
    if (currentProjectile === body) currentProjectile = null;
  }

  function removeRestingProjectiles() {
    for (const body of [...projectiles]) {
      const oldEnough = performance.now() - body.game.bornAt > 1200;
      const sleeping = body.speed < 0.12;
      const offscreen = body.position.x < -180 || body.position.x > WORLD_W + 220 || body.position.y > WORLD_H + 180;
      if (offscreen || (oldEnough && sleeping)) removeBody(body);
    }
  }

  function loadLevel(index) {
    state.level = (index + levels.length) % levels.length;
    state.status = "ready";
    state.ammoIndex = 0;
    state.score = 0;
    state.shotsUsed = 0;
    state.targetDestroyed = 0;
    state.stars = 0;
    state.endScheduled = false;
    paused = false;
    pauseBtn.textContent = "Ⅱ";
    particles = [];
    wells = [];
    blocks = [];
    targets = [];
    projectiles = [];
    currentProjectile = null;
    currentType = null;

    createEngine();
    addStaticWorld();
    const level = levels[state.level];
    state.wind = level.wind;
    for (const spec of level.blocks) addBlock(spec);
    for (const spec of level.targets) addTarget(spec);
    state.targetStart = targets.length;
    prepareProjectile();
    resultModal.classList.remove("show");
    updateUI();
    showToast(level.name);
  }

  function launchProjectile() {
    if (!currentProjectile || state.status !== "aiming") return;
    const pull = {
      x: SLING_POUCH.x - currentProjectile.position.x,
      y: SLING_POUCH.y - currentProjectile.position.y
    };
    const strength = Math.hypot(pull.x, pull.y);
    if (strength < MIN_PULL) {
      holdProjectile(currentProjectile);
      state.status = "ready";
      updateUI();
      return;
    }

    const launchPoint = {
      x: currentProjectile.position.x,
      y: currentProjectile.position.y
    };
    releaseProjectileBody(currentProjectile);
    Body.setPosition(currentProjectile, launchPoint);
    Body.setVelocity(currentProjectile, {
      x: pull.x * SHOT_POWER,
      y: pull.y * SHOT_POWER
    });
    Body.setAngularVelocity(currentProjectile, pull.x * 0.0012);
    state.ammoIndex += 1;
    state.shotsUsed += 1;
    state.status = "flying";
    state.abilityUsed = false;
    launchedAt = performance.now();
    spawnTrail(SLING_POUCH.x, SLING_POUCH.y, ammoTypes[currentType].color, 16, 2.5);
    updateUI();
  }

  function handleCollisions(event) {
    for (const pair of event.pairs) {
      const a = pair.bodyA;
      const b = pair.bodyB;
      const rvx = a.velocity.x - b.velocity.x;
      const rvy = a.velocity.y - b.velocity.y;
      const impact = Math.hypot(rvx, rvy);
      if (impact < 1.55) continue;

      const point = pair.collision.supports[0] || {
        x: (a.position.x + b.position.x) / 2,
        y: (a.position.y + b.position.y) / 2
      };
      const projectileBoost = (a.game?.kind === "projectile" || b.game?.kind === "projectile") ? 1.35 : 1;
      const damage = Math.pow(impact, 1.22) * 2.65 * projectileBoost;
      applyDamage(a, damage, point);
      applyDamage(b, damage, point);
      if (impact > 3.2) spawnTrail(point.x, point.y, "#f5c857", Math.min(18, impact * 2), impact * 0.45);
    }
  }

  function applyDamage(body, amount, point) {
    const data = body.game;
    if (!data || data.dead || body.isStatic || data.kind === "ground" || data.kind === "wall") return;

    if (data.kind === "target") amount *= 1.35;
    if (data.kind === "projectile") return;
    if (data.kind !== "block" && data.kind !== "target") return;

    data.hp -= amount;
    data.flash = 7;
    if (data.hp <= 0) destroyBody(body, point || body.position);
  }

  function destroyBody(body, point) {
    const data = body.game;
    if (!data || data.dead) return;
    data.dead = true;

    if (data.kind === "target") {
      state.targetDestroyed += 1;
      state.score += 1400;
      spawnTrail(body.position.x, body.position.y, "#69d47c", 44, 5.2);
      showToast("晶核碎裂 +" + 1400);
    } else if (data.kind === "block") {
      const mat = materials[data.mat] || materials.wood;
      state.score += mat.score;
      spawnTrail(body.position.x, body.position.y, mat.stroke, 18, 3.6);
      if (data.mat === "barrel") {
        shockwave(body.position.x, body.position.y, 172, 0.011, 34, "#ff735e");
        showToast("爆桶连锁");
      }
    }

    removeBody(body);
    updateUI();
  }

  function shockwave(x, y, radius, strength, damage, color) {
    wells.push({
      x,
      y,
      radius,
      life: 260,
      maxLife: 260,
      color,
      push: true
    });
    for (const body of Composite.allBodies(world)) {
      if (body.isStatic || !body.game || body.game.kind === "projectile") continue;
      const dx = body.position.x - x;
      const dy = body.position.y - y;
      const d = Math.max(18, Math.hypot(dx, dy));
      if (d > radius) continue;
      const falloff = 1 - d / radius;
      Body.applyForce(body, body.position, {
        x: dx / d * strength * falloff * body.mass,
        y: dy / d * strength * falloff * body.mass
      });
      applyDamage(body, damage * falloff, { x, y });
    }
    spawnTrail(x, y, color, 44, 6);
  }

  function activateAbility() {
    if (state.status !== "flying" && state.status !== "settling") return;
    if (!currentType || state.abilityUsed) return;
    const projectile = currentProjectile || projectiles[projectiles.length - 1];
    if (!projectile) return;
    const type = currentType;
    state.abilityUsed = true;

    if (type === "pulse") {
      shockwave(projectile.position.x, projectile.position.y, 190, 0.012, 42, ammoTypes[type].color);
      showToast("冲击星释放震波");
    } else if (type === "split") {
      splitProjectile(projectile);
      showToast("裂光星三裂");
    } else if (type === "flux") {
      wells.push({
        x: projectile.position.x,
        y: projectile.position.y,
        radius: 245,
        life: 1100,
        maxLife: 1100,
        color: ammoTypes[type].color,
        push: false
      });
      spawnTrail(projectile.position.x, projectile.position.y, ammoTypes[type].color, 28, 4.4);
      showToast("磁涡展开");
    } else if (type === "ember") {
      shockwave(projectile.position.x, projectile.position.y, 156, 0.014, 52, ammoTypes[type].color);
      removeBody(projectile);
      showToast("爆燃星引爆");
    }
    updateUI();
  }

  function splitProjectile(projectile) {
    const v = projectile.velocity;
    const speed = Math.max(8, Math.hypot(v.x, v.y));
    const base = Math.atan2(v.y, v.x || 0.01);
    const angles = [-0.32, 0.32];
    for (const offset of angles) {
      const frag = createProjectile("split", projectile.position.x, projectile.position.y, true);
      Body.setVelocity(frag, {
        x: Math.cos(base + offset) * speed * 0.92,
        y: Math.sin(base + offset) * speed * 0.92
      });
      Body.setAngularVelocity(frag, offset * 0.08);
    }
    Body.scale(projectile, 0.72, 0.72);
    projectile.game.radius *= 0.72;
    Body.setVelocity(projectile, {
      x: Math.cos(base) * speed * 0.92,
      y: Math.sin(base) * speed * 0.92
    });
    spawnTrail(projectile.position.x, projectile.position.y, ammoTypes.split.color, 24, 4);
  }

  function shiftWind() {
    if (!started || state.windShiftLeft <= 0 || state.status === "won" || state.status === "lost") return;
    state.wind *= -1;
    state.windShiftLeft -= 1;
    showToast("风向切换");
    updateUI();
  }

  function update(dt) {
    if (!started || paused || !engine) return;
    const step = Math.min(32, Math.max(12, dt || 16.67));
    applyWindAndWells(step);
    Engine.update(engine, step);
    updateParticles(step);
    cleanupWorld(step);
    checkLevelState();
  }

  function applyWindAndWells(step) {
    const windForce = state.wind;
    for (const body of projectiles) {
      if (!body.isStatic) {
        Body.applyForce(body, body.position, {
          x: windForce * body.mass,
          y: 0
        });
      }
    }

    for (const well of wells) {
      well.life -= step;
      if (!well.push) {
        for (const body of Composite.allBodies(world)) {
          if (body.isStatic || !body.game || body.game.kind === "ground" || body.game.kind === "wall") continue;
          const dx = well.x - body.position.x;
          const dy = well.y - body.position.y;
          const d = Math.max(28, Math.hypot(dx, dy));
          if (d > well.radius) continue;
          const falloff = 1 - d / well.radius;
          Body.applyForce(body, body.position, {
            x: dx / d * 0.00055 * falloff * body.mass,
            y: dy / d * 0.00055 * falloff * body.mass
          });
          if (body.game.kind === "target" || body.game.kind === "block") {
            applyDamage(body, 0.04 * falloff * step, { x: well.x, y: well.y });
          }
        }
      }
    }
    wells = wells.filter(well => well.life > 0);
  }

  function cleanupWorld(step) {
    for (const body of [...projectiles]) {
      const offscreen = body.position.x < -220 || body.position.x > WORLD_W + 250 || body.position.y > WORLD_H + 220;
      if (body.speed < 0.13 && !body.isStatic) body.game.asleepFor += step;
      else body.game.asleepFor = 0;
      if (offscreen || body.game.asleepFor > 1500) removeBody(body);
    }

    for (const body of [...targets, ...blocks]) {
      if (body.position.y > WORLD_H + 180) destroyBody(body, body.position);
      if (body.game?.flash > 0) body.game.flash -= 1;
    }
  }

  function checkLevelState() {
    if (state.status === "won" || state.status === "lost" || state.endScheduled) return;

    if (targets.length === 0) {
      finishLevel(true);
      return;
    }

    if (state.status === "flying" || state.status === "settling") {
      const activeProjectiles = projectiles.filter(body => !body.isStatic);
      const activeMoving = activeProjectiles.some(body => body.speed > 0.25);
      const timeSinceLaunch = performance.now() - launchedAt;
      const structuresMoving = [...blocks, ...targets].some(body => body.speed > 0.3 || Math.abs(body.angularVelocity) > 0.04);

      if (activeProjectiles.length === 0 || (!activeMoving && !structuresMoving && timeSinceLaunch > 1650)) {
        if (state.ammoIndex < levels[state.level].ammo.length) {
          state.status = "settling";
          state.endScheduled = true;
          window.setTimeout(() => {
            state.endScheduled = false;
            if (targets.length === 0) finishLevel(true);
            else prepareProjectile();
          }, 520);
        } else {
          finishLevel(false);
        }
      }
    }
  }

  function finishLevel(won) {
    state.status = won ? "won" : "lost";
    state.endScheduled = false;
    if (won) {
      const level = levels[state.level];
      const unused = level.ammo.length - state.ammoIndex;
      const parBonus = Math.max(0, level.par + 1 - state.shotsUsed);
      state.score += unused * 2200 + parBonus * 900 + Math.max(0, 2800 - state.shotsUsed * 280);
      state.totalScore += state.score;
      state.stars = state.shotsUsed <= level.par ? 3 : state.shotsUsed <= level.par + 1 ? 2 : 1;
      if (state.stars > bestStars[state.level]) {
        bestStars[state.level] = state.stars;
        saveBestStars();
      }
      resultTitle.textContent = "关卡完成";
      resultCopy.textContent = `${level.name} · ${renderStars(state.stars)} · ${state.score} 分`;
      nextBtn.textContent = state.level === levels.length - 1 ? "回到第一关" : "下一关";
      showToast("完成 " + renderStars(state.stars));
    } else {
      state.stars = 0;
      resultTitle.textContent = "挑战失败";
      resultCopy.textContent = "晶核还没有全部碎裂，换个角度再试。";
      nextBtn.textContent = "跳到下一关";
      showToast("还差一点");
    }
    resultModal.classList.add("show");
    updateUI();
  }

  function renderStars(count) {
    return "★".repeat(count) + "☆".repeat(3 - count);
  }

  function spawnTrail(x, y, color, count, speed) {
    for (let i = 0; i < count; i += 1) {
      const angle = Math.random() * Math.PI * 2;
      const power = (0.4 + Math.random() * 0.8) * speed;
      particles.push({
        x,
        y,
        vx: Math.cos(angle) * power,
        vy: Math.sin(angle) * power,
        life: 420 + Math.random() * 300,
        maxLife: 720,
        size: 2 + Math.random() * 4,
        color
      });
    }
  }

  function updateParticles(step) {
    for (const p of particles) {
      p.life -= step;
      p.x += p.vx * step / 16.67;
      p.y += p.vy * step / 16.67;
      p.vy += 0.05 * step / 16.67;
      p.vx *= 0.99;
      p.vy *= 0.99;
    }
    particles = particles.filter(p => p.life > 0);

    if (toastTimer > 0) {
      toastTimer -= step;
      if (toastTimer <= 0) toast.classList.remove("show");
    }
  }

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");
    toastTimer = 1500;
  }

  function updateUI() {
    const level = levels[state.level];
    levelNameEl.textContent = level.name;
    const statusLabels = {
      ready: "准备",
      aiming: "蓄力",
      flying: "飞行中",
      settling: "结算",
      spent: "弹丸用尽",
      won: "完成",
      lost: "失败"
    };
    statusTextEl.textContent = statusLabels[state.status] || "准备";
    scoreValue.textContent = String(state.score);
    targetValue.textContent = `${state.targetDestroyed}/${state.targetStart}`;
    windValue.textContent = windLabel();
    starValue.textContent = renderStars(state.stars);
    abilityBtn.disabled = state.abilityUsed || (state.status !== "flying" && state.status !== "settling");
    windBtn.disabled = state.windShiftLeft <= 0 || state.status === "won" || state.status === "lost";
    windBtn.textContent = `换风 ${state.windShiftLeft}`;

    ammoList.innerHTML = "";
    level.ammo.forEach((typeKey, index) => {
      const type = ammoTypes[typeKey];
      const item = document.createElement("div");
      item.className = "ammo-item";
      if (index < state.ammoIndex) item.classList.add("spent");
      if (index === state.ammoIndex && state.status !== "won" && state.status !== "lost") item.classList.add("active");
      item.innerHTML = `
        <div class="ammo-orb" style="background:${type.color}; box-shadow: 0 0 16px ${type.glow}, inset -5px -6px 0 rgba(0,0,0,0.18);"></div>
        <div class="ammo-name">${type.name}</div>
        <div class="ammo-tag">${type.tag}</div>
      `;
      ammoList.appendChild(item);
    });

    renderLevelButtons();
  }

  function renderLevelButtons() {
    levelList.innerHTML = "";
    levels.forEach((level, index) => {
      const button = document.createElement("button");
      button.className = "level-btn";
      if (index === state.level) button.classList.add("current");
      const savedStars = bestStars[index] ? renderStars(bestStars[index]) : index === state.level ? renderStars(state.stars) : "---";
      button.innerHTML = `
        <span class="level-index">${index + 1}</span>
        <span class="level-name">${level.name}</span>
        <span class="stars">${savedStars}</span>
      `;
      button.addEventListener("click", () => {
        started = true;
        startModal.classList.remove("show");
        loadLevel(index);
      });
      levelList.appendChild(button);
    });
  }

  function windLabel() {
    if (Math.abs(state.wind) < 0.000004) return "静";
    const arrow = state.wind > 0 ? "→" : "←";
    const strength = Math.min(5, Math.max(1, Math.round(Math.abs(state.wind) / 0.00001)));
    return arrow.repeat(strength);
  }

  function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(view.ox, view.oy);
    ctx.scale(view.scale, view.scale);

    drawBackground();
    drawWindLines();
    drawTrajectory();
    drawSling("back");
    drawBodies({ skipCurrent: true });
    if (currentProjectile) drawProjectile(currentProjectile);
    drawSling("front");
    drawWells();
    drawParticles();

    ctx.restore();
  }

  function drawBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, WORLD_H);
    sky.addColorStop(0, "#1a3835");
    sky.addColorStop(0.48, "#20342a");
    sky.addColorStop(1, "#19150e");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, WORLD_W, WORLD_H);

    ctx.fillStyle = "rgba(255, 240, 171, 0.34)";
    for (let i = 0; i < 28; i += 1) {
      const x = (i * 83 + 37) % WORLD_W;
      const y = 34 + (i * 47) % 210;
      ctx.fillRect(x, y, 2, 2);
    }

    drawHill("#20372f", 0, 565, [0, 20, 100, -30, 230, 10, 380, -50, 540, 15, 760, -35, 930, 8, 1200, -28]);
    drawHill("#182922", 0, 620, [0, 0, 160, -38, 300, 6, 490, -28, 650, 8, 830, -52, 1010, -10, 1200, -44]);

    ctx.fillStyle = "#202018";
    ctx.fillRect(0, GROUND_Y, WORLD_W, WORLD_H - GROUND_Y);
    ctx.fillStyle = "#2f3a25";
    ctx.fillRect(0, GROUND_Y, WORLD_W, 12);
    ctx.fillStyle = "rgba(245, 200, 87, 0.18)";
    for (let x = 0; x < WORLD_W; x += 42) {
      ctx.fillRect(x, GROUND_Y + 10 + (x % 84 === 0 ? 8 : 0), 24, 2);
    }
  }

  function drawHill(color, startX, baseY, points) {
    ctx.beginPath();
    ctx.moveTo(startX, WORLD_H);
    ctx.lineTo(startX, baseY);
    for (let i = 0; i < points.length; i += 2) {
      ctx.lineTo(points[i], baseY + points[i + 1]);
    }
    ctx.lineTo(WORLD_W, WORLD_H);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }

  function drawWindLines() {
    const dir = state.wind >= 0 ? 1 : -1;
    const t = performance.now() * 0.035 * dir;
    ctx.strokeStyle = "rgba(212, 232, 202, 0.18)";
    ctx.lineWidth = 2;
    for (let i = 0; i < 9; i += 1) {
      const y = 112 + i * 42;
      const x = ((i * 173 + t * (20 + i)) % (WORLD_W + 180)) - 90;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.bezierCurveTo(x + 46 * dir, y - 12, x + 92 * dir, y + 12, x + 138 * dir, y);
      ctx.stroke();
    }
  }

  function drawSling(layer) {
    const left = { x: SLING.x - 29, y: SLING.y - 72 };
    const right = { x: SLING.x + 29, y: SLING.y - 72 };
    const base = { x: SLING.x, y: SLING.y + 70 };
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    if (layer === "wood") {
      ctx.strokeStyle = "#4a3324";
      ctx.lineWidth = 20;
      ctx.beginPath();
      ctx.moveTo(base.x, base.y);
      ctx.lineTo(left.x, left.y);
      ctx.moveTo(base.x, base.y);
      ctx.lineTo(right.x, right.y);
      ctx.stroke();

      ctx.strokeStyle = "#b7814b";
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(base.x, base.y);
      ctx.lineTo(left.x, left.y);
      ctx.moveTo(base.x, base.y);
      ctx.lineTo(right.x, right.y);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255, 218, 143, 0.28)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(base.x - 4, base.y - 12);
      ctx.lineTo(left.x + 3, left.y + 12);
      ctx.moveTo(base.x + 4, base.y - 12);
      ctx.lineTo(right.x - 3, right.y + 12);
      ctx.stroke();
    }

    if (currentProjectile && (state.status === "aiming" || state.status === "ready") && layer !== "wood") {
      const p = currentProjectile.position;
      const r = (currentProjectile.circleRadius || currentProjectile.game?.radius || 18) + 4;
      const leftEnd = bandEdge(left, p, r);
      const rightEnd = bandEdge(right, p, r);
      ctx.strokeStyle = layer === "front" ? "#25140f" : "#6b3828";
      ctx.lineWidth = layer === "front" ? 5 : 9;
      ctx.beginPath();
      if (layer === "front") {
        ctx.moveTo(left.x, left.y);
        ctx.lineTo(leftEnd.x, leftEnd.y);
        ctx.moveTo(right.x, right.y);
        ctx.lineTo(rightEnd.x, rightEnd.y);
      } else {
        ctx.moveTo(left.x, left.y);
        ctx.lineTo(leftEnd.x, leftEnd.y);
        ctx.moveTo(right.x, right.y);
        ctx.lineTo(rightEnd.x, rightEnd.y);
      }
      ctx.stroke();

      if (layer === "back") {
        ctx.fillStyle = "rgba(38, 21, 14, 0.82)";
        roundRect(p.x - r * 0.72, p.y + r * 0.18, r * 1.44, 10, 5);
        ctx.fill();
      }
    }
  }

  function bandEdge(anchor, projectile, radius) {
    const dx = anchor.x - projectile.x;
    const dy = anchor.y - projectile.y;
    const len = Math.hypot(dx, dy) || 1;
    return {
      x: projectile.x + dx / len * radius,
      y: projectile.y + dy / len * radius
    };
  }

  function drawTrajectory() {
    if (state.status !== "aiming" || !currentProjectile) return;
    const pos = currentProjectile.position;
    const pull = {
      x: SLING_POUCH.x - pos.x,
      y: SLING_POUCH.y - pos.y
    };
    if (Math.hypot(pull.x, pull.y) < MIN_PULL) return;
    let x = pos.x;
    let y = pos.y;
    let vx = pull.x * SHOT_POWER;
    let vy = pull.y * SHOT_POWER;
    ctx.fillStyle = "rgba(245, 200, 87, 0.75)";
    for (let i = 0; i < 32; i += 1) {
      vx += state.wind * 950;
      vy += 0.31;
      x += vx;
      y += vy;
      if (i % 2 === 0) {
        ctx.globalAlpha = Math.max(0.12, 0.86 - i * 0.026);
        ctx.beginPath();
        ctx.arc(x, y, Math.max(2, 5 - i * 0.08), 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawBodies(options = {}) {
    const all = [...blocks, ...targets, ...projectiles];
    for (const body of all) {
      if (body.game?.kind === "block") drawBlock(body);
    }
    for (const body of targets) drawTarget(body);
    for (const body of projectiles) {
      if (options.skipCurrent && body === currentProjectile) continue;
      drawProjectile(body);
    }
  }

  function drawBlock(body) {
    const mat = materials[body.game.mat] || materials.wood;
    ctx.save();
    ctx.translate(body.position.x, body.position.y);
    ctx.rotate(body.angle);
    const w = body.game.w;
    const h = body.game.h;
    ctx.fillStyle = mat.fill;
    ctx.strokeStyle = body.game.flash > 0 ? "#fff6c7" : mat.stroke;
    ctx.lineWidth = body.game.flash > 0 ? 4 : 2;
    roundRect(-w / 2, -h / 2, w, h, 4);
    ctx.fill();
    ctx.stroke();

    ctx.globalAlpha = 0.24;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 1;
    if (body.game.mat === "wood") {
      for (let y = -h / 2 + 10; y < h / 2; y += 16) {
        ctx.beginPath();
        ctx.moveTo(-w / 2 + 6, y);
        ctx.lineTo(w / 2 - 6, y + Math.sin(y) * 2);
        ctx.stroke();
      }
    } else if (body.game.mat === "glass") {
      ctx.beginPath();
      ctx.moveTo(-w / 2 + 6, h / 2 - 6);
      ctx.lineTo(w / 2 - 8, -h / 2 + 8);
      ctx.stroke();
    } else if (body.game.mat === "barrel") {
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = "#ffd070";
      ctx.font = "900 18px 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("!", 0, 0);
    }
    ctx.restore();
  }

  function drawTarget(body) {
    const r = body.circleRadius || 22;
    const hpRatio = Math.max(0, body.game.hp / body.game.maxHp);
    ctx.save();
    ctx.translate(body.position.x, body.position.y);
    ctx.rotate(body.angle);
    ctx.fillStyle = body.game.flash > 0 ? "#fffad0" : "#69d47c";
    ctx.strokeStyle = "#d5ffd6";
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let i = 0; i < 8; i += 1) {
      const a = Math.PI / 4 * i;
      const rr = i % 2 === 0 ? r : r * 0.68;
      ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,0.72)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, r + 6, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * hpRatio);
    ctx.stroke();
    ctx.restore();
  }

  function drawProjectile(body) {
    const type = ammoTypes[body.game.type] || ammoTypes.pulse;
    const r = body.circleRadius || body.game.radius || type.radius;
    ctx.save();
    ctx.translate(body.position.x, body.position.y);
    ctx.rotate(body.angle);
    const glow = ctx.createRadialGradient(-r * 0.3, -r * 0.35, r * 0.2, 0, 0, r * 1.15);
    glow.addColorStop(0, "#ffffff");
    glow.addColorStop(0.24, type.color);
    glow.addColorStop(1, "#191b17");
    ctx.fillStyle = glow;
    ctx.strokeStyle = "rgba(255,255,255,0.75)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.arc(r * 0.22, -r * 0.12, r * 0.18, 0, Math.PI * 2);
    ctx.arc(-r * 0.18, -r * 0.18, r * 0.14, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawWells() {
    for (const well of wells) {
      const ratio = Math.max(0, well.life / well.maxLife);
      ctx.save();
      ctx.globalAlpha = Math.min(0.8, ratio);
      ctx.strokeStyle = well.color;
      ctx.lineWidth = well.push ? 5 : 3;
      ctx.setLineDash(well.push ? [] : [12, 12]);
      ctx.beginPath();
      ctx.arc(well.x, well.y, well.radius * (1 - ratio * 0.12), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function roundRect(x, y, w, h, r) {
    const radius = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
  }

  function onPointerDown(event) {
    if (!started || paused || !currentProjectile || state.status !== "ready") return;
    const p = screenToWorld(event);
    const nearProjectile = dist(p, currentProjectile.position) < 64;
    const nearSling = dist(p, SLING_POUCH) < 110;
    if (!nearProjectile && !nearSling) return;
    event.preventDefault();
    pointer.active = true;
    pointer.id = event.pointerId;
    pointer.x = p.x;
    pointer.y = p.y;
    canvas.setPointerCapture(event.pointerId);
    state.status = "aiming";
    Body.setPosition(currentProjectile, clampPull(p));
    updateUI();
  }

  function onPointerMove(event) {
    if (!pointer.active || pointer.id !== event.pointerId || state.status !== "aiming" || !currentProjectile) return;
    event.preventDefault();
    const p = screenToWorld(event);
    pointer.x = p.x;
    pointer.y = p.y;
    Body.setPosition(currentProjectile, clampPull(p));
  }

  function onPointerUp(event) {
    if (!pointer.active || pointer.id !== event.pointerId) return;
    event.preventDefault();
    pointer.active = false;
    pointer.id = null;
    launchProjectile();
  }

  function togglePause() {
    if (!started || state.status === "won" || state.status === "lost") return;
    paused = !paused;
    pauseBtn.textContent = paused ? "▶" : "Ⅱ";
    showToast(paused ? "暂停" : "继续");
  }

  function loop(time) {
    const dt = lastTime ? time - lastTime : 16.67;
    lastTime = time;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  canvas.addEventListener("pointerdown", onPointerDown);
  canvas.addEventListener("pointermove", onPointerMove);
  canvas.addEventListener("pointerup", onPointerUp);
  canvas.addEventListener("pointercancel", onPointerUp);
  canvas.addEventListener("contextmenu", event => event.preventDefault());
  abilityBtn.addEventListener("click", activateAbility);
  windBtn.addEventListener("click", shiftWind);
  pauseBtn.addEventListener("click", togglePause);
  restartBtn.addEventListener("click", () => {
    started = true;
    startModal.classList.remove("show");
    loadLevel(state.level);
  });
  startBtn.addEventListener("click", () => {
    started = true;
    startModal.classList.remove("show");
    loadLevel(0);
  });
  nextBtn.addEventListener("click", () => {
    started = true;
    loadLevel(state.level + 1);
  });
  retryBtn.addEventListener("click", () => {
    started = true;
    loadLevel(state.level);
  });

  window.addEventListener("keydown", event => {
    if (event.code === "Space") {
      event.preventDefault();
      activateAbility();
    } else if (event.code === "KeyQ") {
      shiftWind();
    } else if (event.code === "KeyP") {
      togglePause();
    } else if (event.code === "KeyR") {
      started = true;
      startModal.classList.remove("show");
      loadLevel(state.level);
    }
  });
  window.addEventListener("resize", resize);

  resize();
  createEngine();
  addStaticWorld();
  renderLevelButtons();
  updateUI();
  if (new URLSearchParams(window.location.search).get("autostart") === "1") {
    started = true;
    startModal.classList.remove("show");
    loadLevel(0);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
