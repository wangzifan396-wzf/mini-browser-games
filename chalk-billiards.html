<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>粉笔台球</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23101824'/%3E%3Crect x='10' y='14' width='44' height='36' rx='6' fill='%23287468'/%3E%3Ccircle cx='26' cy='32' r='7' fill='%23fffdf4'/%3E%3Ccircle cx='40' cy='32' r='7' fill='%23f0d16f'/%3E%3C/svg%3E">
    <style>
      :root{--ink:#10191f;--panel:#fffdf4;--line:#87989e;--teal:#287468;--gold:#d6a33d;--red:#bd5148;--blue:#326f91;--shadow:rgba(5,12,16,.28);--radius:8px}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,sans-serif;background:linear-gradient(rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(135deg,#0c1824,#1d3a43 48%,#373544);background-size:30px 30px,30px 30px,auto}button{font:inherit}.app{width:min(1380px,calc(100vw - 28px));margin:14px auto}.topbar,.panel{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,244,.97);box-shadow:0 16px 36px var(--shadow)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px}.eyebrow{margin:0 0 5px;color:#856219;font-size:12px;font-weight:900}h1{margin:0;font-size:clamp(26px,4vw,44px);line-height:1}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:42px;padding:0 14px;border:1px solid #24534d;border-radius:var(--radius);color:#fffdf6;background:var(--teal);font-weight:900;cursor:pointer}.btn.secondary{color:var(--ink);background:#f0d17b;border-color:#9c7621}.layout{display:grid;grid-template-columns:minmax(0,1fr) 314px;gap:14px;margin-top:14px;align-items:start}.stage{position:relative;overflow:hidden;min-height:650px}canvas{display:block;width:100%;height:650px;touch-action:none}.side{padding:16px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.stat{padding:10px;border:1px solid #9da69e;border-radius:var(--radius);background:#f9f7eb}.stat b{display:block;font-size:24px;line-height:1.1}.stat small{color:#5e6d67;font-weight:800}.meter{margin:0 0 13px}.meter span{display:flex;justify-content:space-between;margin-bottom:6px;color:#5e6d67;font-weight:900}.bar{height:13px;border:1px solid #84968f;border-radius:999px;overflow:hidden;background:#e9eadc}.bar i{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--blue),#8bd0bb)}.cueTools{display:grid;grid-template-columns:1fr 1fr;gap:10px}.toolbtn{min-height:52px;border:1px solid #758780;border-radius:var(--radius);background:#fff8e6;color:var(--ink);font-weight:900;cursor:pointer}.hint{margin:14px 0 0;color:#566861;line-height:1.55;font-weight:700}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:24px;background:rgba(16,28,31,.52)}.modal{width:min(470px,100%);padding:22px;border:1px solid #a4b4ad;border-radius:var(--radius);background:#fffdf6;box-shadow:0 24px 52px rgba(0,0,0,.32)}.modal h2{margin:0 0 10px;font-size:28px}.modal p{margin:0 0 16px;color:#53635f;line-height:1.6}.hidden{display:none}@media(max-width:940px){.layout{grid-template-columns:1fr}.side{order:-1}.stage{min-height:560px}canvas{height:560px}}@media(max-width:620px){.app{width:min(100vw - 16px,1380px);margin-top:8px}.topbar{display:block;padding:14px}.actions{margin-top:12px;justify-content:stretch}.btn{flex:1 1 auto}.stage{min-height:500px}canvas{height:500px}.stat b{font-size:21px}}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div><p class="eyebrow">POOL PHYSICS</p><h1>粉笔台球</h1></div>
        <div class="actions"><button class="btn" id="startBtn">开球</button><button class="btn secondary" id="resetCueBtn">摆白球</button><button class="btn secondary" id="resetBtn">重开</button></div>
      </header>
      <section class="layout">
        <div class="panel stage"><canvas id="gameCanvas" aria-label="粉笔台球游戏画面"></canvas><div class="overlay" id="overlay"><div class="modal"><h2 id="overlayTitle">粉笔擦亮</h2><p id="overlayText">拖拽白球反方向蓄力，松手出杆。连续进球会提升评分，白球落袋会罚杆。</p><button class="btn" id="overlayBtn">开始练杆</button></div></div></div>
        <aside class="panel side">
          <div class="stats"><div class="stat"><b id="scoreText">0</b><small>分数</small></div><div class="stat"><b id="bestText">0</b><small>最佳</small></div><div class="stat"><b id="leftText">9</b><small>剩余目标</small></div><div class="stat"><b id="shotText">0</b><small>杆数</small></div></div>
          <div class="meter"><span><b>蓄力</b><em id="powerText">0%</em></span><div class="bar"><i id="powerBar"></i></div></div>
          <div class="meter"><span><b>桌面速度</b><em id="speedText">静止</em></span><div class="bar"><i id="speedBar"></i></div></div>
          <div class="cueTools"><button class="toolbtn" id="softBtn">轻推</button><button class="toolbtn" id="hardBtn">强力</button></div>
          <p class="hint">在白球附近按下并向后拖拽，松开击球。所有球停稳后才能下一杆；R 重开，空格可把白球摆回开球区。</p>
        </aside>
      </section>
    </main>
    <script>
      (()=> {
        const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d"),overlay=document.getElementById("overlay"),overlayTitle=document.getElementById("overlayTitle"),overlayText=document.getElementById("overlayText"),overlayBtn=document.getElementById("overlayBtn"),startBtn=document.getElementById("startBtn"),resetBtn=document.getElementById("resetBtn"),resetCueBtn=document.getElementById("resetCueBtn"),softBtn=document.getElementById("softBtn"),hardBtn=document.getElementById("hardBtn");
        const scoreText=document.getElementById("scoreText"),bestText=document.getElementById("bestText"),leftText=document.getElementById("leftText"),shotText=document.getElementById("shotText"),powerText=document.getElementById("powerText"),powerBar=document.getElementById("powerBar"),speedText=document.getElementById("speedText"),speedBar=document.getElementById("speedBar");
        const storageKey="miniChalkBilliardsRecords",TW=900,TH=500,R=15;let w=900,h=650,dpr=1,last=0,loopToken=0;let state=makeState();
        const colors=["#f0d16f","#326f91","#bd5148","#7b5bb4","#d9823b","#287468","#7c2d2d","#2e8a97","#8e7d37"];
        function loadBest(){try{return JSON.parse(localStorage.getItem(storageKey)||"{}").best||0}catch(e){return 0}}function saveBest(v){const b=Math.max(loadBest(),v);localStorage.setItem(storageKey,JSON.stringify({best:b}));return b}
        function makeState(){return{mode:"menu",score:0,best:loadBest(),shots:0,streak:0,message:"",msgTimer:0,aim:null,spin:1,balls:[]}}
        function initBalls(){state.balls=[];state.balls.push(ball(230,TH/2,"#fffdf4",0,true));let n=1,startX=620;for(let row=0;row<4;row++){for(let col=0;col<=row;col++){state.balls.push(ball(startX+row*(R*1.85),TH/2-row*R+col*R*2,colors[(n-1)%colors.length],n,false));n++}}}
        function ball(x,y,color,num,cue){return{x,y,vx:0,vy:0,r:R,color,num,cue,pocketed:false,flash:0}}
        function resize(){const r=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,devicePixelRatio||1));w=Math.max(320,r.width);h=Math.max(500,r.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
        function start(){loopToken++;state=makeState();initBalls();state.mode="running";overlay.classList.add("hidden");last=performance.now();updateHud();requestAnimationFrame(t=>loop(t,loopToken))}
        function loop(now,token){if(token!==loopToken||state.mode!=="running")return;const dt=Math.min(.033,(now-last)/1000||.016);last=now;update(dt);draw();requestAnimationFrame(t=>loop(t,token))}
        function table(){const scale=Math.min((w-40)/TW,(h-70)/TH),x=(w-TW*scale)/2,y=(h-TH*scale)/2+16;return{x,y,scale}}
        function toScreen(p){const t=table();return{x:t.x+p.x*t.scale,y:t.y+p.y*t.scale,r:p.r*t.scale,scale:t.scale}}function fromScreen(x,y){const t=table();return{x:(x-t.x)/t.scale,y:(y-t.y)/t.scale}}
        function update(dt){let moving=0;for(const b of state.balls){if(b.pocketed)continue;b.x+=b.vx*dt;b.y+=b.vy*dt;b.vx*=Math.pow(.18,dt);b.vy*=Math.pow(.18,dt);if(Math.hypot(b.vx,b.vy)<4){b.vx=0;b.vy=0}else moving+=Math.hypot(b.vx,b.vy);rails(b);b.flash=Math.max(0,b.flash-dt)}for(let i=0;i<state.balls.length;i++)for(let j=i+1;j<state.balls.length;j++)collide(state.balls[i],state.balls[j]);pockets();state.msgTimer=Math.max(0,state.msgTimer-dt);const left=targetsLeft();if(left===0&&state.mode==="running"){state.mode="over";state.score+=Math.max(100,600-state.shots*35);state.best=saveBest(state.score);overlayTitle.textContent="清台完成";overlayText.textContent=`用了 ${state.shots} 杆，得分 ${state.score}。`;overlayBtn.textContent="再开一桌";overlay.classList.remove("hidden")}updateHud(moving)}
        function rails(b){if(b.x<b.r+28){b.x=b.r+28;b.vx=Math.abs(b.vx)*.88}if(b.x>TW-b.r-28){b.x=TW-b.r-28;b.vx=-Math.abs(b.vx)*.88}if(b.y<b.r+28){b.y=b.r+28;b.vy=Math.abs(b.vy)*.88}if(b.y>TH-b.r-28){b.y=TH-b.r-28;b.vy=-Math.abs(b.vy)*.88}}
        function collide(a,b){if(a.pocketed||b.pocketed)return;const dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy),min=a.r+b.r;if(dist>=min||dist===0)return;const nx=dx/dist,ny=dy/dist,over=(min-dist)/2;a.x-=nx*over;a.y-=ny*over;b.x+=nx*over;b.y+=ny*over;const dvx=b.vx-a.vx,dvy=b.vy-a.vy,rel=dvx*nx+dvy*ny;if(rel<0){const imp=rel;a.vx+=imp*nx;a.vy+=imp*ny;b.vx-=imp*nx;b.vy-=imp*ny;a.flash=b.flash=.16}}
        function pockets(){const ps=pocketList();for(const b of state.balls){if(b.pocketed)continue;for(const p of ps){const d=Math.hypot(b.x-p.x,b.y-p.y);if(d<33){b.pocketed=true;b.vx=0;b.vy=0;if(b.cue){state.score=Math.max(0,state.score-80);state.streak=0;message("白球落袋 -80","#bd5148");setTimeout(()=>{if(state.mode==="running")resetCue()},500)}else{state.streak++;const add=120+state.streak*30;state.score+=add;message(`进球 +${add}`,"#f0d16f")}break}}}}
        function pocketList(){return[{x:30,y:30},{x:TW/2,y:22},{x:TW-30,y:30},{x:30,y:TH-30},{x:TW/2,y:TH-22},{x:TW-30,y:TH-30}]}
        function targetsLeft(){return state.balls.filter(b=>!b.cue&&!b.pocketed).length}
        function resetCue(){const cue=state.balls.find(b=>b.cue);cue.pocketed=false;cue.x=230;cue.y=TH/2;cue.vx=0;cue.vy=0;cue.flash=.3;state.aim=null;message("白球复位","#8bd0bb")}
        function allStill(){return state.balls.every(b=>b.pocketed||Math.hypot(b.vx,b.vy)<1)}
        function shoot(){if(!state.aim||!allStill())return;const cue=state.balls.find(b=>b.cue&&!b.pocketed);if(!cue)return;const dx=state.aim.start.x-state.aim.now.x,dy=state.aim.start.y-state.aim.now.y,power=Math.min(1,Math.hypot(dx,dy)/170);if(power<.05){state.aim=null;return}const a=Math.atan2(dy,dx),force=(520+720*state.spin)*power;cue.vx=Math.cos(a)*force;cue.vy=Math.sin(a)*force;state.shots++;state.aim=null;message("出杆","#fffdf4")}
        function message(text,color){state.message=text;state.msgColor=color;state.msgTimer=1.1}
        function draw(){ctx.clearRect(0,0,w,h);const bg=ctx.createLinearGradient(0,0,0,h);bg.addColorStop(0,"#12212a");bg.addColorStop(1,"#263247");ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);const t=table();ctx.save();ctx.translate(t.x,t.y);ctx.scale(t.scale,t.scale);drawTable();for(const b of state.balls)drawBall(b);drawAim();ctx.restore();if(state.msgTimer>0){ctx.fillStyle=state.msgColor||"#fffdf4";ctx.font="900 24px system-ui";ctx.textAlign="center";ctx.fillText(state.message,w/2,54)}}
        function drawTable(){ctx.fillStyle="#6d4526";roundRect(0,0,TW,TH,34);ctx.fill();ctx.fillStyle="#287468";roundRect(26,26,TW-52,TH-52,22);ctx.fill();ctx.strokeStyle="rgba(255,253,244,.18)";ctx.lineWidth=2;for(let x=130;x<TW-120;x+=90){ctx.beginPath();ctx.moveTo(x,30);ctx.lineTo(x,TH-30);ctx.stroke()}ctx.fillStyle="#10191f";for(const p of pocketList()){ctx.beginPath();ctx.arc(p.x,p.y,31,0,Math.PI*2);ctx.fill()}ctx.strokeStyle="#f0d16f";ctx.lineWidth=3;ctx.setLineDash([9,11]);ctx.beginPath();ctx.moveTo(230,48);ctx.lineTo(230,TH-48);ctx.stroke();ctx.setLineDash([])}
        function drawBall(b){if(b.pocketed)return;ctx.save();ctx.translate(b.x,b.y);ctx.fillStyle="rgba(0,0,0,.26)";ctx.beginPath();ctx.ellipse(5,8,b.r*1.05,b.r*.42,0,0,Math.PI*2);ctx.fill();const g=ctx.createRadialGradient(-6,-6,2,0,0,b.r);g.addColorStop(0,"#fffdf4");g.addColorStop(.42,b.color);g.addColorStop(1,b.cue?"#cfd7d5":"#17242b");ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill();if(!b.cue){ctx.fillStyle="#fffdf4";ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();ctx.fillStyle="#10191f";ctx.font="700 9px system-ui";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(b.num,0,.5)}if(b.flash>0){ctx.strokeStyle="#fffdf4";ctx.lineWidth=3;ctx.globalAlpha=b.flash*5;ctx.beginPath();ctx.arc(0,0,b.r+5,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}ctx.restore()}
        function drawAim(){if(!state.aim)return;const cue=state.balls.find(b=>b.cue&&!b.pocketed);if(!cue)return;const dx=state.aim.start.x-state.aim.now.x,dy=state.aim.start.y-state.aim.now.y,power=Math.min(1,Math.hypot(dx,dy)/170),a=Math.atan2(dy,dx);ctx.strokeStyle="rgba(255,253,244,.85)";ctx.lineWidth=3;ctx.setLineDash([10,10]);ctx.beginPath();ctx.moveTo(cue.x,cue.y);ctx.lineTo(cue.x+Math.cos(a)*360,cue.y+Math.sin(a)*360);ctx.stroke();ctx.setLineDash([]);ctx.strokeStyle="#d6a33d";ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(cue.x-Math.cos(a)*(42+power*90),cue.y-Math.sin(a)*(42+power*90));ctx.lineTo(cue.x-Math.cos(a)*190,cue.y-Math.sin(a)*190);ctx.stroke()}
        function roundRect(x,y,W,H,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+W,y,x+W,y+H,r);ctx.arcTo(x+W,y+H,x,y+H,r);ctx.arcTo(x,y+H,x,y,r);ctx.arcTo(x,y,x+W,y,r)}
        function updateHud(moving=0){scoreText.textContent=state.score.toString();bestText.textContent=Math.max(state.best,state.score).toString();leftText.textContent=targetsLeft().toString();shotText.textContent=state.shots.toString();const power=state.aim?Math.min(1,Math.hypot(state.aim.start.x-state.aim.now.x,state.aim.start.y-state.aim.now.y)/170):0;powerText.textContent=`${Math.round(power*100)}%`;powerBar.style.width=`${power*100}%`;const speed=Math.min(1,moving/1300);speedText.textContent=speed<.02?"静止":"滚动";speedBar.style.width=`${speed*100}%`;softBtn.style.background=state.spin<.75?"#f0d17b":"#fff8e6";hardBtn.style.background=state.spin>.75?"#f0d17b":"#fff8e6"}
        function pointer(e){const r=canvas.getBoundingClientRect();return fromScreen(e.clientX-r.left,e.clientY-r.top)}
        canvas.addEventListener("pointerdown",e=>{if(state.mode!=="running"||!allStill())return;const p=pointer(e),cue=state.balls.find(b=>b.cue&&!b.pocketed);if(cue&&Math.hypot(p.x-cue.x,p.y-cue.y)<80){state.aim={start:{x:cue.x,y:cue.y},now:p};canvas.setPointerCapture?.(e.pointerId)}});canvas.addEventListener("pointermove",e=>{if(state.aim){state.aim.now=pointer(e);updateHud();draw()}});canvas.addEventListener("pointerup",e=>{if(state.aim){state.aim.now=pointer(e);shoot()}});canvas.addEventListener("pointercancel",()=>state.aim=null);
        startBtn.addEventListener("click",start);resetBtn.addEventListener("click",start);overlayBtn.addEventListener("click",start);resetCueBtn.addEventListener("click",resetCue);softBtn.addEventListener("click",()=>state.spin=.55);hardBtn.addEventListener("click",()=>state.spin=1.05);
        document.addEventListener("keydown",e=>{if(e.code==="KeyR")start();if(e.code==="Space"){e.preventDefault();resetCue()}});window.addEventListener("resize",resize);resize();initBalls();updateHud();draw();
      })();
    </script>
  </body>
</html>
