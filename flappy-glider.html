<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>像素飞翼</title><style>body{margin:0;background:#081526;color:#eefaff;font-family:system-ui,"Microsoft YaHei"}.app{height:100vh;display:grid;grid-template-columns:1fr 240px;gap:10px;padding:10px;box-sizing:border-box}.stage,aside{border:1px solid #326a88;border-radius:16px;background:#0c2740;overflow:hidden}.stage{position:relative}canvas{display:block;width:100%;height:100%;touch-action:none}aside{padding:14px;display:flex;flex-direction:column;gap:9px}.card{padding:10px;border:1px solid #326a88;border-radius:10px}.card b{display:block;color:#6ae8ff;font-size:25px}button{padding:10px;border:1px solid #4a96b8;border-radius:9px;background:#174c69;color:#fff;font-weight:bold}.overlay{position:absolute;inset:0;display:grid;place-items:center;text-align:center;background:#071625c7}.hidden{display:none}.help{color:#a5d0df;line-height:1.6}@media(max-width:650px){.app{grid-template-columns:1fr;grid-template-rows:1fr 130px;padding:6px}aside{display:grid;grid-template-columns:repeat(3,1fr);padding:7px}.help{display:none}}</style><body><main class="app"><section class="stage"><canvas id="c"></canvas><div id="overlay" class="overlay"><div><h1>像素飞翼</h1><p>点击、空格或触摸扇翼，穿过不断变化的风门。连续完美过门会提升倍率。</p><button id="startBtn">开始飞行</button></div></div></section><aside><div class="card">得分 / 最佳<b id="score">0 / 0</b></div><div class="card">连击倍率<b id="combo">×1</b></div><div class="card">区域<b id="zone">晨风</b></div><button id="resetBtn">新局</button><div class="help">每 10 分切换区域并提高速度；金色窄门奖励双倍分数，护盾羽毛可抵挡一次撞击。</div></aside></main><script>
const c=document.querySelector('#c'),x=c.getContext('2d'),O=document.querySelector('#overlay'),SE=document.querySelector('#score'),CE=document.querySelector('#combo'),ZE=document.querySelector('#zone');let q,last=0;const BK='flappy_glider_best';function reset(){q={run:false,y:.5,vy:0,pipes:[],spawn:0,score:0,best:+localStorage.getItem(BK)||0,combo:0,shield:0,t:0};sync()}function start(){reset();q.run=true;O.classList.add('hidden');last=performance.now()}function flap(){if(!q.run)return;q.vy=-.48}function update(dt){if(!q.run)return;q.t+=dt;q.vy+=1.32*dt;q.y+=q.vy*dt;q.spawn-=dt;let speed=.24+Math.min(.16,q.score*.004);if(q.spawn<=0){q.spawn=Math.max(1.05,1.55-q.score*.012);let gap=Math.max(.19,.31-q.score*.003),cy=.25+Math.random()*.5;q.pipes.push({x:1.12,cy,gap,done:false,gold:Math.random()<.18})}for(const p of q.pipes){p.x-=speed*dt;if(!p.done&&p.x<.28){p.done=true;let perfect=Math.abs(q.y-p.cy)<p.gap*.18;q.combo=perfect?q.combo+1:Math.max(0,q.combo-1);q.score+=(p.gold?2:1)*(1+Math.min(4,Math.floor(q.combo/3)))}if(p.x<.34&&p.x>.2&&(q.y<p.cy-p.gap/2||q.y>p.cy+p.gap/2))crash()}q.pipes=q.pipes.filter(p=>p.x>-.1);if(q.y<0||q.y>1)crash();sync()}function crash(){if(q.shield){q.shield=0;q.y=.5;q.vy=0;return}q.run=false;q.best=Math.max(q.best,q.score);localStorage.setItem(BK,q.best);O.innerHTML=`<div><h1>飞行结束</h1><p>得分 ${q.score} · 最佳 ${q.best}</p><button id="startBtn">再飞一次</button></div>`;O.classList.remove('hidden');document.querySelector('#startBtn').onclick=start}function sync(){SE.textContent=`${q.score} / ${q.best}`;CE.textContent='×'+(1+Math.min(4,Math.floor(q.combo/3)));ZE.textContent=['晨风','霞谷','夜航','雷云'][Math.min(3,Math.floor(q.score/10))]}function draw(){let w=c.clientWidth,h=c.clientHeight;c.width=w*devicePixelRatio;c.height=h*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);let g=x.createLinearGradient(0,0,0,h);g.addColorStop(0,'#1a6790');g.addColorStop(1,'#0a243d');x.fillStyle=g;x.fillRect(0,0,w,h);for(const p of q.pipes){x.fillStyle=p.gold?'#ffd660':'#6be5bb';let xx=p.x*w,gh=p.gap*h/2;x.fillRect(xx-30,0,60,p.cy*h-gh);x.fillRect(xx-30,p.cy*h+gh,60,h)}x.fillStyle='#fff4a0';x.beginPath();x.moveTo(.28*w,q.y*h);x.lineTo(.22*w,(q.y+.035)*h);x.lineTo(.22*w,(q.y-.035)*h);x.fill()}function loop(t){let dt=Math.min(.03,(t-last)/1000);last=t;update(dt);draw();requestAnimationFrame(loop)}addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap()}});c.addEventListener('pointerdown',flap);document.querySelector('#startBtn').onclick=start;document.querySelector('#resetBtn').onclick=reset;reset();requestAnimationFrame(loop);
</script>
