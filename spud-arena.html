<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>薯仔突围</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23131916'/%3E%3Cellipse cx='33' cy='34' rx='21' ry='24' fill='%23d9b46b'/%3E%3Ccircle cx='25' cy='29' r='4' fill='%23131916'/%3E%3Ccircle cx='41' cy='29' r='4' fill='%23131916'/%3E%3Cpath d='M24 43c6 5 13 5 19 0' stroke='%23131916' stroke-width='4' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
    <style>
      :root {
        --ink: #111814;
        --muted: #5f6d63;
        --line: #80907f;
        --paper: #f5f0df;
        --panel: #fffaf0;
        --leaf: #2f7a5e;
        --leaf-dark: #1f4f43;
        --gold: #d7a947;
        --gold-dark: #7b5618;
        --red: #b64037;
        --blue: #2f638a;
        --violet: #66578b;
        --shadow: rgba(9, 16, 12, 0.24);
        --radius: 8px;
      }
      
      * {
        box-sizing: border-box;
      }
      
      html {
        min-height: 100%;
        background:
          linear-gradient(90deg, rgba(245, 240, 223, 0.06) 1px, transparent 1px),
          linear-gradient(0deg, rgba(245, 240, 223, 0.06) 1px, transparent 1px),
          radial-gradient(circle at 78% 12%, rgba(215, 169, 71, 0.18), transparent 24rem),
          #111a16;
        background-size: 24px 24px, 24px 24px, auto, auto;
      }
      
      body {
        min-height: 100%;
        margin: 0;
        color: var(--ink);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Noto Sans CJK SC",
          system-ui,
          sans-serif;
        letter-spacing: 0;
      }
      
      button {
        min-height: 38px;
        border: 1px solid var(--gold-dark);
        border-radius: 6px;
        background: #fff6df;
        color: var(--ink);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          background 140ms ease;
      }
      
      button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px var(--shadow);
      }
      
      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      
      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }
      
      h1 {
        margin-bottom: 0;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 0.95;
      }
      
      h2 {
        margin-bottom: 8px;
        font-size: 1.45rem;
      }
      
      h3 {
        margin-bottom: 6px;
        font-size: 1rem;
      }
      
      .app-shell {
        width: min(1500px, 100%);
        margin: 0 auto;
        padding: 18px;
      }
      
      .topbar,
      .arena-panel,
      .side-panel,
      .side-card,
      .modal-card {
        border: 1px solid var(--line);
        box-shadow: 0 14px 36px var(--shadow);
      }
      
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 108px;
        padding: 20px 24px;
        border-radius: var(--radius) var(--radius) 0 0;
        background:
          linear-gradient(120deg, rgba(47, 122, 94, 0.24), transparent 36%),
          linear-gradient(270deg, rgba(215, 169, 71, 0.2), transparent 36%),
          var(--paper);
      }
      
      .eyebrow {
        margin: 0 0 5px;
        color: var(--gold-dark);
        font-size: 0.74rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      
      .top-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      
      .quiet-button,
      .primary-button {
        padding: 0 15px;
      }
      
      .primary-button {
        background: var(--ink);
        color: var(--paper);
      }
      
      .game-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 330px;
        gap: 14px;
        margin-top: 14px;
      }
      
      .arena-panel,
      .side-panel {
        min-width: 0;
        border-radius: var(--radius);
        background: rgba(245, 240, 223, 0.97);
      }
      
      .arena-panel {
        padding: 14px;
      }
      
      .hud-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(110px, 1fr));
        gap: 1px;
        margin-bottom: 12px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--line);
      }
      
      .hud-tile {
        min-height: 68px;
        padding: 10px 12px;
        background: #fffdf7;
      }
      
      .hud-tile:nth-child(2) {
        background: #f6eeec;
      }
      
      .hud-tile:nth-child(3) {
        background: #eef7f2;
      }
      
      .hud-tile:nth-child(4) {
        background: #eef3f8;
      }
      
      .hud-tile span {
        display: block;
        color: var(--muted);
        font-size: 0.8rem;
      }
      
      .hud-tile strong {
        display: block;
        margin-top: 4px;
        font-size: 1.55rem;
      }
      
      .canvas-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 3 / 2;
        min-height: 420px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background:
          radial-gradient(circle at 50% 48%, rgba(245, 240, 223, 0.12), transparent 16rem),
          #18221c;
      }
      
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .mobile-joystick {
        position: absolute;
        left: 16px;
        bottom: 16px;
        z-index: 4;
        width: 118px;
        height: 118px;
        display: none;
        pointer-events: auto;
        touch-action: none;
        user-select: none;
      }

      .mobile-joystick-base {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1px solid rgba(245, 240, 223, 0.36);
        background: rgba(20, 30, 22, 0.46);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05), 0 16px 40px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(10px);
      }

      .mobile-joystick-thumb {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid rgba(132, 184, 108, 0.82);
        background: radial-gradient(circle at 34% 30%, rgba(255, 255, 255, 0.78), rgba(132, 184, 108, 0.64) 34%, rgba(38, 55, 40, 0.88) 74%);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
      }
      
      .center-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        align-content: center;
        gap: 10px;
        padding: 24px;
        background: rgba(14, 22, 17, 0.72);
        color: var(--paper);
        text-align: center;
        z-index: 5;
      }
      
      .center-overlay.hidden {
        display: none;
      }
      
      .center-overlay p {
        max-width: 420px;
        margin-bottom: 0;
        color: #e8dfc8;
        line-height: 1.5;
      }
      
      .danger-select {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        max-width: 520px;
        margin: 4px 0 2px;
      }
      
      .danger-select span {
        color: #f2e6c8;
        font-weight: 900;
      }
      
      .danger-choice {
        min-height: 34px;
        padding: 0 12px;
        background: rgba(255, 246, 223, 0.92);
      }
      
      .danger-choice.active {
        background: var(--gold);
        color: var(--ink);
        box-shadow: 0 0 0 3px rgba(215, 169, 71, 0.25);
      }
      
      .side-panel {
        display: grid;
        align-content: start;
        gap: 12px;
        padding: 14px;
      }
      
      .side-card {
        padding: 12px;
        border-radius: var(--radius);
        background: rgba(255, 250, 240, 0.9);
      }
      
      .stat-list {
        display: grid;
        gap: 8px;
      }
      
      .stat-line {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 7px 0;
        border-bottom: 1px solid rgba(128, 144, 127, 0.28);
      }
      
      .stat-line:last-child {
        border-bottom: 0;
      }
      
      .stat-line span {
        color: var(--muted);
      }
      
      .stat-line strong {
        font-weight: 900;
      }
      
      .chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      
      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 9px;
        border-radius: 999px;
        background: rgba(47, 122, 94, 0.13);
        color: var(--leaf-dark);
        font-size: 0.8rem;
        font-weight: 900;
      }
      
      .chip.weapon {
        background: rgba(215, 169, 71, 0.2);
        color: var(--gold-dark);
      }
      
      .log-list {
        display: grid;
        gap: 7px;
        max-height: 300px;
        overflow: auto;
        margin: 0;
        padding-left: 20px;
      }
      
      .log-list li {
        padding: 7px 8px;
        border-left: 4px solid var(--blue);
        background: rgba(255, 253, 247, 0.72);
        line-height: 1.42;
      }
      
      .log-list li.good {
        border-color: var(--leaf);
      }
      
      .log-list li.warn {
        border-color: var(--red);
      }
      
      .log-list li.gold {
        border-color: var(--gold);
      }
      
      .modal {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(12, 18, 15, 0.7);
      }
      
      .modal.hidden {
        display: none;
      }
      
      .modal-card {
        width: min(760px, 100%);
        max-height: min(760px, 90vh);
        overflow: auto;
        padding: 18px;
        border-radius: var(--radius);
        background: var(--paper);
      }
      
      .upgrade-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 12px;
      }
      
      .upgrade-card {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 190px;
        padding: 12px;
        text-align: left;
        background: #fffdf7;
      }
      
      .upgrade-icon {
        display: grid;
        place-items: center;
        width: 46px;
        height: 46px;
        margin-bottom: 10px;
        border: 1px solid var(--line);
        border-radius: 50%;
        background:
          radial-gradient(circle at 35% 28%, #fff9df, rgba(215, 169, 71, 0.56) 62%, rgba(47, 122, 94, 0.34)),
          #ead082;
        font-weight: 900;
      }
      
      .upgrade-card p {
        margin-bottom: 12px;
        color: var(--muted);
        line-height: 1.45;
      }
      
      .upgrade-card strong {
        display: block;
        margin-bottom: 6px;
      }
      
      @media (max-width: 1100px) {
        .game-layout {
          grid-template-columns: 1fr;
        }
      
        .side-panel {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
      
      @media (max-width: 760px) {
        .app-shell {
          padding: 10px;
        }
      
        .topbar {
          align-items: flex-start;
          flex-direction: column;
          min-height: auto;
        }
      
        .hud-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      
        .canvas-wrap {
          min-height: 330px;
        }

        .mobile-joystick {
          display: block;
        }
      
        .side-panel,
        .upgrade-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">自动射击肉鸽</p>
          <h1>薯仔突围</h1>
        </div>
        <div class="top-actions">
          <button id="pauseButton" class="quiet-button" type="button">暂停</button>
          <button id="restartButton" class="quiet-button" type="button">新局</button>
        </div>
      </header>

      <main class="game-layout">
        <section class="arena-panel" aria-label="游戏区域">
          <div class="hud-row">
            <div class="hud-tile">
              <span>时间</span>
              <strong id="timeStat">00:00</strong>
            </div>
            <div class="hud-tile">
              <span>气血</span>
              <strong id="hpStat">60/60</strong>
            </div>
            <div class="hud-tile">
              <span>等级</span>
              <strong id="levelStat">1</strong>
            </div>
            <div class="hud-tile">
              <span>晶薯</span>
              <strong id="crystalStat">0</strong>
            </div>
          </div>
          <div class="canvas-wrap">
            <canvas id="gameCanvas" width="960" height="640" aria-label="薯仔突围游戏画布"></canvas>
            <div class="mobile-joystick" id="mobileJoystick" aria-label="移动摇杆">
              <div class="mobile-joystick-base"></div>
              <div class="mobile-joystick-thumb" id="mobileJoystickThumb"></div>
            </div>
            <div id="centerOverlay" class="center-overlay">
              <p class="eyebrow">准备</p>
              <h2>移动，活下去</h2>
              <p>WASD / 方向键移动，武器会自动攻击最近敌人。</p>
              <div class="danger-select" aria-label="危险度选择">
                <span>危险度</span>
                <button class="danger-choice" data-danger="0" type="button">训练</button>
                <button class="danger-choice" data-danger="1" type="button">普通</button>
                <button class="danger-choice active" data-danger="2" type="button">硬核</button>
                <button class="danger-choice" data-danger="3" type="button">噩梦</button>
              </div>
              <button id="startButton" class="primary-button" type="button">开始突围</button>
            </div>
          </div>
        </section>

        <aside class="side-panel">
          <section class="side-card">
            <p class="eyebrow">属性</p>
            <div id="statList" class="stat-list"></div>
          </section>
          <section class="side-card">
            <p class="eyebrow">武器</p>
            <div id="weaponList" class="chip-list"></div>
          </section>
          <section class="side-card">
            <p class="eyebrow">战况</p>
            <ol id="logList" class="log-list"></ol>
          </section>
        </aside>
      </main>
    </div>

    <div id="levelModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-card">
        <p id="modalKicker" class="eyebrow">升级</p>
        <h2 id="modalTitle">选择一项强化</h2>
        <div id="upgradeChoices" class="upgrade-grid"></div>
      </div>
    </div>

    <script>
      "use strict";
      
      const canvas = document.querySelector("#gameCanvas");
      const ctx = canvas.getContext("2d");
      const mobileJoystick = document.querySelector("#mobileJoystick");
      const mobileJoystickThumb = document.querySelector("#mobileJoystickThumb");
      
      const ui = {
        time: document.querySelector("#timeStat"),
        hp: document.querySelector("#hpStat"),
        level: document.querySelector("#levelStat"),
        crystal: document.querySelector("#crystalStat"),
        statList: document.querySelector("#statList"),
        weaponList: document.querySelector("#weaponList"),
        logList: document.querySelector("#logList"),
        overlay: document.querySelector("#centerOverlay"),
        start: document.querySelector("#startButton"),
        restart: document.querySelector("#restartButton"),
        pause: document.querySelector("#pauseButton"),
        modal: document.querySelector("#levelModal"),
        upgradeChoices: document.querySelector("#upgradeChoices")
      };
      
      const keys = new Set();
      const pointer = { active: false, x: 0, y: 0 };
      const joystick = { active: false, pointerId: null, x: 0, y: 0 };
      let selectedDanger = 2;
      
      const WORLD = { width: 2400, height: 1600 };
      const RUN_LENGTH = 300;
      
      const WEAPONS = {
        twig: {
          name: "树枝枪",
          icon: "枝",
          cooldown: 0.48,
          damage: 8,
          speed: 760,
          range: 540,
          pierce: 0,
          count: 1,
          spread: 0.1,
          color: "#d7a947"
        },
        pan: {
          name: "平底锅",
          icon: "锅",
          cooldown: 1.1,
          damage: 16,
          speed: 0,
          range: 78,
          pierce: 4,
          count: 1,
          spread: 0,
          color: "#8f6b37",
          melee: true,
          duration: 0.16
        },
        spark: {
          name: "电芽",
          icon: "电",
          cooldown: 1.65,
          damage: 11,
          speed: 0,
          range: 260,
          pierce: 2,
          count: 3,
          spread: 0,
          color: "#4fb6d8",
          chain: true
        }
      };
      
      const UPGRADES = [
        {
          id: "damage",
          icon: "伤",
          title: "尖刺芽",
          desc: "所有武器伤害 +18%。",
          apply() {
            state.player.damageMult += 0.18;
            addLog("伤害提升，薯仔看起来更有棱角。", "good");
          }
        },
        {
          id: "speed",
          icon: "速",
          title: "滑皮靴",
          desc: "移动速度 +12%。",
          apply() {
            state.player.speedMult += 0.12;
            addLog("移动速度提升，脚底像抹了黄油。", "good");
          }
        },
        {
          id: "fireRate",
          icon: "频",
          title: "急性子",
          desc: "武器冷却 -12%。",
          apply() {
            state.player.cooldownMult *= 0.88;
            addLog("攻击频率提升，手比脑子先动。", "good");
          }
        },
        {
          id: "maxHp",
          icon: "血",
          title: "厚薯皮",
          desc: "最大气血 +12，并回复 12。",
          apply() {
            state.player.maxHp += 12;
            state.player.hp = Math.min(state.player.maxHp, state.player.hp + 12);
            addLog("薯皮变厚了。", "good");
          }
        },
        {
          id: "regen",
          icon: "愈",
          title: "发芽自愈",
          desc: "每秒回复 +0.35。",
          apply() {
            state.player.regen += 0.35;
            addLog("嫩芽开始缓慢修补伤口。", "good");
          }
        },
        {
          id: "magnet",
          icon: "吸",
          title: "磁铁根须",
          desc: "拾取范围 +45%。",
          apply() {
            state.player.pickupMult += 0.45;
            addLog("地上的晶薯更愿意靠近你。", "good");
          }
        },
        {
          id: "armor",
          icon: "甲",
          title: "锅盖甲",
          desc: "护甲 +2，接触伤害降低。",
          apply() {
            state.player.armor += 2;
            addLog("护甲提升，撞上去没那么疼了。", "good");
          }
        },
        {
          id: "twig",
          icon: "枝",
          title: "再来一把树枝枪",
          desc: "获得 1 把树枝枪。",
          apply() {
            addWeapon("twig");
          }
        },
        {
          id: "pan",
          icon: "锅",
          title: "带锅上阵",
          desc: "获得 1 把近战平底锅。",
          apply() {
            addWeapon("pan");
          }
        },
        {
          id: "spark",
          icon: "电",
          title: "种下电芽",
          desc: "获得 1 个自动连锁电芽。",
          apply() {
            addWeapon("spark");
          }
        }
      ];
      
      let state;
      let lastTime = 0;
      let animationId = null;
      let resizeObserver = null;
      
      function createState() {
        const maxHp = 64 - selectedDanger * 4;
        return {
          mode: "ready",
          paused: false,
          danger: selectedDanger,
          elapsed: 0,
          enemySpawn: 0,
          nextEliteAt: Math.max(48, 90 - selectedDanger * 12),
          bossSpawned: false,
          camera: { x: 0, y: 0 },
          player: {
            x: WORLD.width / 2,
            y: WORLD.height / 2,
            radius: 22,
            hp: maxHp,
            maxHp,
            level: 1,
            xp: 0,
            xpNext: 24,
            crystals: 0,
            speed: 255,
            speedMult: 1,
            damageMult: 1,
            cooldownMult: 1,
            pickupMult: 1,
            regen: 0,
            armor: 0,
            invuln: 0,
            weapons: [
              { key: "twig", cooldown: 0.05, level: 1 },
              { key: "pan", cooldown: 0.9, level: 1 }
            ]
          },
          enemies: [],
          bullets: [],
          enemyShots: [],
          hits: [],
          drops: [],
          floaters: [],
          particles: [],
          logs: [],
          pendingUpgrades: 0,
          killCount: 0,
          nextId: 1
        };
      }
      
      function nextId() {
        state.nextId += 1;
        return state.nextId;
      }
      
      function addLog(text, type = "info") {
        state.logs.unshift({ text, type });
        state.logs = state.logs.slice(0, 16);
      }
      
      function resetRun() {
        state = createState();
        updateDangerButtons();
        addLog(`薯仔醒在菜园中央，危险度 ${state.danger}。`, "info");
        ui.overlay.classList.remove("hidden");
        ui.overlay.querySelector("h2").textContent = "移动，活下去";
        ui.overlay.querySelector("p:last-of-type").textContent = "WASD / 方向键移动，武器会自动攻击最近敌人。";
        ui.start.textContent = "开始突围";
        ui.pause.textContent = "暂停";
        closeUpgradeModal();
        syncUi();
        draw();
      }
      
      function updateDangerButtons() {
        document.querySelectorAll("[data-danger]").forEach((button) => {
          button.classList.toggle("active", Number(button.dataset.danger) === selectedDanger);
        });
      }
      
      function startRun() {
        if (state.mode === "dead" || state.mode === "win") {
          resetRun();
        }
        state.mode = "running";
        state.paused = false;
        ui.overlay.classList.add("hidden");
        lastTime = performance.now();
        if (!animationId) animationId = requestAnimationFrame(loop);
      }
      
      function togglePause() {
        if (state.mode !== "running") return;
        state.paused = !state.paused;
        ui.pause.textContent = state.paused ? "继续" : "暂停";
        if (!state.paused) {
          lastTime = performance.now();
        }
      }
      
      function loop(now) {
        animationId = requestAnimationFrame(loop);
        const dt = Math.min(0.033, (now - lastTime) / 1000 || 0);
        lastTime = now;
      
        if (state.mode === "running" && !state.paused) {
          update(dt);
        }
        draw();
      }
      
      function update(dt) {
        state.elapsed += dt;
        updatePlayer(dt);
        updateWeapons(dt);
        updateEnemies(dt);
        updateBullets(dt);
        updateEnemyShots(dt);
        updateHits(dt);
        updateDrops(dt);
        updateParticles(dt);
        spawnDirector(dt);
        cleanupEntities();
      
        if (state.player.hp <= 0) {
          endRun(false);
        } else if (state.elapsed >= RUN_LENGTH && !state.bossSpawned) {
          spawnBoss();
        }
      
        syncUi();
      }
      
      function updatePlayer(dt) {
        const p = state.player;
        let dx = 0;
        let dy = 0;
      
        if (keys.has("KeyW") || keys.has("ArrowUp")) dy -= 1;
        if (keys.has("KeyS") || keys.has("ArrowDown")) dy += 1;
        if (keys.has("KeyA") || keys.has("ArrowLeft")) dx -= 1;
        if (keys.has("KeyD") || keys.has("ArrowRight")) dx += 1;
      
        if (joystick.active) {
          dx += joystick.x;
          dy += joystick.y;
        } else if (pointer.active) {
          const rect = canvas.getBoundingClientRect();
          const px = pointer.x - rect.left - rect.width / 2;
          const py = pointer.y - rect.top - rect.height / 2;
          const len = Math.hypot(px, py);
          if (len > 14) {
            dx += px / len;
            dy += py / len;
          }
        }
      
        const len = Math.hypot(dx, dy);
        if (len > 0) {
          const speed = p.speed * p.speedMult;
          p.x += (dx / len) * speed * dt;
          p.y += (dy / len) * speed * dt;
        }
      
        p.x = clamp(p.x, p.radius, WORLD.width - p.radius);
        p.y = clamp(p.y, p.radius, WORLD.height - p.radius);
        p.invuln = Math.max(0, p.invuln - dt);
      
        if (p.regen > 0 && p.hp < p.maxHp) {
          p.hp = Math.min(p.maxHp, p.hp + p.regen * dt);
        }
      
        state.camera.x = clamp(p.x - canvas.width / 2, 0, WORLD.width - canvas.width);
        state.camera.y = clamp(p.y - canvas.height / 2, 0, WORLD.height - canvas.height);
      }
      
      function updateWeapons(dt) {
        for (const weapon of state.player.weapons) {
          const def = WEAPONS[weapon.key];
          weapon.cooldown -= dt;
          if (weapon.cooldown > 0) continue;
      
          const target = nearestEnemy(def.range);
          if (!target) continue;
      
          fireWeapon(weapon, def, target);
          weapon.cooldown = def.cooldown * state.player.cooldownMult * Math.max(0.58, 1 - (weapon.level - 1) * 0.05);
        }
      }
      
      function nearestEnemy(range) {
        let best = null;
        let bestDist = range * range;
        for (const enemy of state.enemies) {
          const d2 = dist2(enemy.x, enemy.y, state.player.x, state.player.y);
          if (d2 < bestDist) {
            best = enemy;
            bestDist = d2;
          }
        }
        return best;
      }
      
      function fireWeapon(weapon, def, target) {
        if (def.melee) {
          const angle = Math.atan2(target.y - state.player.y, target.x - state.player.x);
          state.hits.push({
            id: nextId(),
            x: state.player.x + Math.cos(angle) * 38,
            y: state.player.y + Math.sin(angle) * 38,
            radius: def.range + weapon.level * 5,
            damage: scaledDamage(def.damage + weapon.level * 3),
            life: def.duration,
            maxLife: def.duration,
            color: def.color,
            hit: new Set()
          });
          return;
        }
      
        if (def.chain) {
          const targets = nearestEnemies(def.range, def.count + Math.floor(weapon.level / 2));
          for (const enemy of targets) {
            damageEnemy(enemy, scaledDamage(def.damage + weapon.level * 2), "spark");
            spawnParticles(enemy.x, enemy.y, def.color, 8);
            state.floaters.push({ x: enemy.x, y: enemy.y - 20, text: "电", life: 0.45, color: def.color });
          }
          return;
        }
      
        const count = def.count + Math.floor((weapon.level - 1) / 2);
        const baseAngle = Math.atan2(target.y - state.player.y, target.x - state.player.x);
        for (let i = 0; i < count; i += 1) {
          const offset = (i - (count - 1) / 2) * def.spread;
          const angle = baseAngle + offset;
          state.bullets.push({
            id: nextId(),
            x: state.player.x,
            y: state.player.y,
            vx: Math.cos(angle) * def.speed,
            vy: Math.sin(angle) * def.speed,
            radius: 6,
            damage: scaledDamage(def.damage + weapon.level * 2),
            pierce: def.pierce + Math.floor(weapon.level / 3),
            life: def.range / def.speed,
            color: def.color
          });
        }
      }
      
      function nearestEnemies(range, count) {
        return state.enemies
          .map((enemy) => ({ enemy, d: dist2(enemy.x, enemy.y, state.player.x, state.player.y) }))
          .filter((entry) => entry.d <= range * range)
          .sort((a, b) => a.d - b.d)
          .slice(0, count)
          .map((entry) => entry.enemy);
      }
      
      function scaledDamage(base) {
        return Math.max(1, Math.round(base * state.player.damageMult));
      }
      
      function updateEnemies(dt) {
        const p = state.player;
        for (const enemy of state.enemies) {
          const angle = Math.atan2(p.y - enemy.y, p.x - enemy.x);
          const distance = Math.hypot(p.x - enemy.x, p.y - enemy.y);
          const slow = enemy.hitFlash > 0 ? 0.72 : 1;
          let intent = 1;
      
          if (enemy.ranged) {
            if (distance < enemy.preferRange * 0.72) intent = -0.55;
            else if (distance < enemy.preferRange) intent = 0.18;
            enemy.shotCd = Math.max(0, enemy.shotCd - dt);
            if (enemy.shotCd <= 0 && distance < enemy.range) {
              fireEnemyShot(enemy, angle);
              enemy.shotCd = enemy.fireCd;
            }
          }
      
          enemy.x += Math.cos(angle) * enemy.speed * slow * intent * dt;
          enemy.y += Math.sin(angle) * enemy.speed * slow * intent * dt;
          enemy.hitFlash = Math.max(0, enemy.hitFlash - dt);
          enemy.attackCd = Math.max(0, enemy.attackCd - dt);
      
          const touch = enemy.radius + p.radius;
          if (dist2(enemy.x, enemy.y, p.x, p.y) < touch * touch && enemy.attackCd <= 0 && p.invuln <= 0) {
            const damage = Math.max(1, Math.round(enemy.damage - p.armor * 0.65));
            p.hp = Math.max(0, p.hp - damage);
            p.invuln = 0.42;
            enemy.attackCd = 0.55;
            state.floaters.push({ x: p.x, y: p.y - 32, text: `-${damage}`, life: 0.55, color: "#ff8c75" });
            addLog(`被${enemy.name}撞到，气血 -${damage}。`, "warn");
          }
        }
      }
      
      function fireEnemyShot(enemy, angle) {
        state.enemyShots.push({
          id: nextId(),
          x: enemy.x,
          y: enemy.y,
          vx: Math.cos(angle) * enemy.projectileSpeed,
          vy: Math.sin(angle) * enemy.projectileSpeed,
          radius: enemy.projectileRadius,
          damage: enemy.projectileDamage,
          life: 3.2,
          color: enemy.projectileColor
        });
      }
      
      function updateBullets(dt) {
        for (const bullet of state.bullets) {
          bullet.x += bullet.vx * dt;
          bullet.y += bullet.vy * dt;
          bullet.life -= dt;
      
          for (const enemy of state.enemies) {
            if (enemy.dead) continue;
            const r = bullet.radius + enemy.radius;
            if (dist2(bullet.x, bullet.y, enemy.x, enemy.y) <= r * r) {
              damageEnemy(enemy, bullet.damage, "bullet");
              bullet.pierce -= 1;
              spawnParticles(enemy.x, enemy.y, bullet.color, 6);
              if (bullet.pierce < 0) {
                bullet.life = 0;
                break;
              }
            }
          }
        }
      }
      
      function updateEnemyShots(dt) {
        const p = state.player;
        for (const shot of state.enemyShots) {
          shot.x += shot.vx * dt;
          shot.y += shot.vy * dt;
          shot.life -= dt;
      
          const r = shot.radius + p.radius;
          if (p.invuln <= 0 && dist2(shot.x, shot.y, p.x, p.y) <= r * r) {
            const damage = Math.max(1, Math.round(shot.damage - p.armor * 0.55));
            p.hp = Math.max(0, p.hp - damage);
            p.invuln = 0.34;
            shot.life = 0;
            state.floaters.push({ x: p.x, y: p.y - 32, text: `-${damage}`, life: 0.55, color: "#ff8c75" });
            addLog(`被孢子弹擦到，气血 -${damage}。`, "warn");
          }
        }
      }
      
      function updateHits(dt) {
        for (const hit of state.hits) {
          hit.life -= dt;
          for (const enemy of state.enemies) {
            if (enemy.dead || hit.hit.has(enemy.id)) continue;
            const r = hit.radius + enemy.radius;
            if (dist2(hit.x, hit.y, enemy.x, enemy.y) <= r * r) {
              hit.hit.add(enemy.id);
              damageEnemy(enemy, hit.damage, "melee");
              spawnParticles(enemy.x, enemy.y, hit.color, 7);
            }
          }
        }
      }
      
      function updateDrops(dt) {
        const p = state.player;
        const pickupRange = 72 * p.pickupMult;
      
        for (const drop of state.drops) {
          const d = Math.hypot(p.x - drop.x, p.y - drop.y);
          if (d < pickupRange) {
            const pull = clamp(1 - d / pickupRange, 0.08, 1) * 620;
            drop.x += ((p.x - drop.x) / Math.max(1, d)) * pull * dt;
            drop.y += ((p.y - drop.y) / Math.max(1, d)) * pull * dt;
          }
      
          if (d < p.radius + drop.radius) {
            drop.dead = true;
            if (drop.type === "xp") gainXp(drop.value);
            if (drop.type === "crystal") {
              p.crystals += drop.value;
              addLog(`捡到 ${drop.value} 枚晶薯。`, "gold");
            }
            if (drop.type === "heart") {
              p.hp = Math.min(p.maxHp, p.hp + drop.value);
              addLog(`捡到热汤，回复 ${drop.value}。`, "good");
            }
            if (drop.type === "magnet") {
              magnetizeDrops();
              addLog("磁铁爆开，经验全都飞了过来。", "good");
            }
          }
        }
      }
      
      function updateParticles(dt) {
        for (const p of state.particles) {
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.life -= dt;
        }
        for (const f of state.floaters) {
          f.y -= 36 * dt;
          f.life -= dt;
        }
      }
      
      function damageEnemy(enemy, amount) {
        enemy.hp -= amount;
        enemy.hitFlash = 0.12;
        state.floaters.push({ x: enemy.x, y: enemy.y - enemy.radius, text: amount, life: 0.42, color: "#fff5ce" });
        if (enemy.hp <= 0 && !enemy.dead) {
          killEnemy(enemy);
        }
      }
      
      function killEnemy(enemy) {
        enemy.dead = true;
        state.killCount += 1;
        dropLoot(enemy);
        spawnParticles(enemy.x, enemy.y, enemy.color, 16);
      
        if (enemy.boss) {
          endRun(true);
        } else if (enemy.elite) {
          addLog(`打倒精英${enemy.name}，掉了一地好东西。`, "gold");
        }
      }
      
      function dropLoot(enemy) {
        state.drops.push({
          id: nextId(),
          type: "xp",
          x: enemy.x,
          y: enemy.y,
          radius: 8,
          value: enemy.xp,
          color: "#65d6a4"
        });
      
        if (Math.random() < enemy.crystalChance) {
          state.drops.push({
            id: nextId(),
            type: "crystal",
            x: enemy.x + random(-12, 12),
            y: enemy.y + random(-12, 12),
            radius: 9,
            value: enemy.elite ? randomInt(8, 12) : randomInt(1, 3),
            color: "#6ec8ff"
          });
        }
      
        if (Math.random() < 0.035 || enemy.elite) {
          state.drops.push({
            id: nextId(),
            type: Math.random() < 0.7 ? "heart" : "magnet",
            x: enemy.x + random(-16, 16),
            y: enemy.y + random(-16, 16),
            radius: 10,
            value: enemy.elite ? 18 : 10,
            color: Math.random() < 0.7 ? "#ff7770" : "#d7a947"
          });
        }
      }
      
      function gainXp(amount) {
        const p = state.player;
        p.xp += amount;
        while (p.xp >= p.xpNext) {
          p.xp -= p.xpNext;
          p.level += 1;
          p.xpNext = Math.round(p.xpNext * 1.22 + 8);
          state.pendingUpgrades += 1;
          addLog(`升到 ${p.level} 级，选择一项强化。`, "good");
        }
      
        if (state.pendingUpgrades > 0 && ui.modal.classList.contains("hidden")) {
          openUpgradeModal();
        }
      }
      
      function spawnDirector(dt) {
        state.enemySpawn -= dt;
        const t = state.elapsed;
        const danger = state.danger;
      
        if (t >= state.nextEliteAt && !state.bossSpawned) {
          spawnEnemy("elite");
          state.nextEliteAt += Math.max(42, 76 - danger * 9 - Math.floor(t / 60) * 4);
          addLog("菜园边缘钻出一只精英甲虫。", "warn");
        }
      
        if (state.bossSpawned) return;
      
        if (state.enemySpawn <= 0) {
          const pack = 1 + Math.floor(t / 55) + Math.floor(danger / 2) + (t > 180 ? 1 : 0);
          for (let i = 0; i < pack; i += 1) {
            const roll = Math.random();
            let kind = "grunt";
            if (t > 42 && roll < 0.18 + danger * 0.045) kind = "spitter";
            else if (t > 120 && roll < 0.34 + danger * 0.04) kind = "brute";
            else if (roll < 0.46) kind = "runner";
            spawnEnemy(kind);
          }
          state.enemySpawn = Math.max(0.14, 0.88 - t / 380 - danger * 0.075);
        }
      }
      
      function spawnEnemy(kind) {
        const edge = randomInt(0, 3);
        let x = state.player.x;
        let y = state.player.y;
        const distance = Math.max(canvas.width, canvas.height) * 0.64;
      
        if (edge === 0) {
          x += random(-distance, distance);
          y -= distance;
        } else if (edge === 1) {
          x += distance;
          y += random(-distance, distance);
        } else if (edge === 2) {
          x += random(-distance, distance);
          y += distance;
        } else {
          x -= distance;
          y += random(-distance, distance);
        }
      
        x = clamp(x, 30, WORLD.width - 30);
        y = clamp(y, 30, WORLD.height - 30);
      
        const minute = Math.floor(state.elapsed / 60);
        const scale = (1 + minute * 0.24) * (1 + state.danger * 0.16);
        const config = enemyConfig(kind, scale);
      
        state.enemies.push({
          id: nextId(),
          ...config,
          x,
          y,
          hp: config.maxHp,
          hitFlash: 0,
          attackCd: random(0, 0.3),
          shotCd: random(0.2, 1.2),
          dead: false
        });
      }
      
      function enemyConfig(kind, scale) {
        const danger = state.danger;
        if (kind === "runner") {
          return {
            name: "快苗",
            radius: 15,
            maxHp: Math.round(16 * scale),
            speed: 125 + scale * 10 + danger * 7,
            damage: Math.round(6 * scale),
            xp: 6,
            crystalChance: 0.12,
            color: "#80c46a"
          };
        }
        if (kind === "brute") {
          return {
            name: "厚皮萝卜",
            radius: 25,
            maxHp: Math.round(48 * scale),
            speed: 62 + danger * 4,
            damage: Math.round(12 * scale),
            xp: 15,
            crystalChance: 0.2,
            color: "#b87b4f"
          };
        }
        if (kind === "spitter") {
          return {
            name: "孢子射手",
            radius: 17,
            maxHp: Math.round(22 * scale),
            speed: 72 + danger * 4,
            damage: Math.round(6 * scale),
            xp: 12,
            crystalChance: 0.16,
            color: "#8b6bb8",
            ranged: true,
            range: 420 + danger * 24,
            preferRange: 275,
            fireCd: Math.max(0.82, 1.75 - danger * 0.16),
            projectileSpeed: 225 + danger * 22,
            projectileRadius: 6,
            projectileDamage: Math.round(7 * scale),
            projectileColor: "#c9a6ff"
          };
        }
        if (kind === "elite") {
          return {
            name: "锅盖甲虫",
            radius: 34,
            maxHp: Math.round(210 * scale),
            speed: 76 + danger * 3,
            damage: Math.round(20 * scale),
            xp: 55,
            crystalChance: 1,
            color: "#af4d59",
            elite: true
          };
        }
        return {
          name: "田鼠芽",
          radius: 18,
          maxHp: Math.round(24 * scale),
          speed: 88 + danger * 5,
          damage: Math.round(8 * scale),
          xp: 9,
          crystalChance: 0.1,
          color: "#8fb86a"
        };
      }
      
      function spawnBoss() {
        state.bossSpawned = true;
        const angle = random(0, Math.PI * 2);
        const x = clamp(state.player.x + Math.cos(angle) * 520, 80, WORLD.width - 80);
        const y = clamp(state.player.y + Math.sin(angle) * 520, 80, WORLD.height - 80);
        state.enemies.push({
          id: nextId(),
          name: "铁锅王",
          radius: 52,
          x,
          y,
          maxHp: 1200 + state.danger * 180,
          hp: 1200 + state.danger * 180,
          speed: 62,
          damage: 28 + state.danger * 3,
          xp: 0,
          crystalChance: 1,
          color: "#803b3b",
          hitFlash: 0,
          attackCd: 0,
          boss: true,
          dead: false
        });
        addLog("铁锅王翻过菜畦，最后一波来了。", "warn");
      }
      
      function addWeapon(key) {
        const existing = state.player.weapons.find((weapon) => weapon.key === key);
        if (existing && existing.level < 5) {
          existing.level += 1;
          addLog(`${WEAPONS[key].name} 升到 ${existing.level} 级。`, "gold");
          return;
        }
        state.player.weapons.push({ key, cooldown: 0.2, level: 1 });
        addLog(`获得武器：${WEAPONS[key].name}。`, "gold");
      }
      
      function openUpgradeModal() {
        state.paused = true;
        ui.pause.textContent = "继续";
        const options = sampleUpgrades(3);
        ui.upgradeChoices.innerHTML = options
          .map(
            (upgrade) => `
            <button class="upgrade-card" data-upgrade-id="${upgrade.id}" type="button">
              <span class="upgrade-icon">${upgrade.icon}</span>
              <strong>${upgrade.title}</strong>
              <p>${upgrade.desc}</p>
            </button>
          `
          )
          .join("");
        ui.modal.classList.remove("hidden");
      }
      
      function closeUpgradeModal() {
        ui.modal.classList.add("hidden");
      }
      
      function chooseUpgrade(id) {
        const upgrade = UPGRADES.find((entry) => entry.id === id);
        if (!upgrade) return;
        upgrade.apply();
        state.pendingUpgrades = Math.max(0, state.pendingUpgrades - 1);
      
        if (state.pendingUpgrades > 0) {
          openUpgradeModal();
        } else {
          closeUpgradeModal();
          state.paused = false;
          ui.pause.textContent = "暂停";
          lastTime = performance.now();
        }
        syncUi();
      }
      
      function sampleUpgrades(count) {
        const pool = [...UPGRADES];
        const result = [];
        while (result.length < count && pool.length) {
          const index = randomInt(0, pool.length - 1);
          result.push(pool.splice(index, 1)[0]);
        }
        return result;
      }
      
      function magnetizeDrops() {
        for (const drop of state.drops) {
          if (drop.type === "xp") {
            drop.x = state.player.x + random(-80, 80);
            drop.y = state.player.y + random(-80, 80);
          }
        }
      }
      
      function cleanupEntities() {
        state.enemies = state.enemies.filter((enemy) => !enemy.dead);
        state.bullets = state.bullets.filter((bullet) => bullet.life > 0 && inWorld(bullet.x, bullet.y, 80));
        state.enemyShots = state.enemyShots.filter((shot) => shot.life > 0 && inWorld(shot.x, shot.y, 120));
        state.hits = state.hits.filter((hit) => hit.life > 0);
        state.drops = state.drops.filter((drop) => !drop.dead);
        state.particles = state.particles.filter((p) => p.life > 0);
        state.floaters = state.floaters.filter((f) => f.life > 0);
      }
      
      function endRun(win) {
        state.mode = win ? "win" : "dead";
        state.paused = true;
        ui.overlay.classList.remove("hidden");
        ui.overlay.querySelector("h2").textContent = win ? "铁锅王被打翻了" : "薯仔倒下了";
        ui.overlay.querySelector("p:last-of-type").textContent = win
          ? `存活 ${formatTime(state.elapsed)}，击倒 ${state.killCount} 个敌人，晶薯 ${state.player.crystals}。`
          : `坚持 ${formatTime(state.elapsed)}，击倒 ${state.killCount} 个敌人。`;
        ui.start.textContent = "再来一局";
        addLog(win ? "突围成功，今晚可以吃热汤。" : "这块菜地暂时不属于你了。", win ? "good" : "warn");
      }
      
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawWorld();
        drawDrops();
        drawHits();
        drawBullets();
        drawEnemyShots();
        drawEnemies();
        drawPlayer();
        drawParticles();
        drawFloaters();
        drawMinimap();
      }
      
      function drawWorld() {
        const cam = state.camera;
        ctx.save();
        ctx.translate(-cam.x, -cam.y);
        ctx.fillStyle = "#18221c";
        ctx.fillRect(cam.x, cam.y, canvas.width, canvas.height);
      
        ctx.strokeStyle = "rgba(245,240,223,0.08)";
        ctx.lineWidth = 1;
        const grid = 80;
        const startX = Math.floor(cam.x / grid) * grid;
        const startY = Math.floor(cam.y / grid) * grid;
        for (let x = startX; x < cam.x + canvas.width + grid; x += grid) {
          ctx.beginPath();
          ctx.moveTo(x, cam.y);
          ctx.lineTo(x, cam.y + canvas.height);
          ctx.stroke();
        }
        for (let y = startY; y < cam.y + canvas.height + grid; y += grid) {
          ctx.beginPath();
          ctx.moveTo(cam.x, y);
          ctx.lineTo(cam.x + canvas.width, y);
          ctx.stroke();
        }
      
        drawPatch(400, 350, "#243b2a");
        drawPatch(1780, 420, "#352f22");
        drawPatch(1040, 1220, "#233642");
        drawPatch(2100, 1300, "#3a2b30");
      
        ctx.strokeStyle = "rgba(215,169,71,0.32)";
        ctx.lineWidth = 8;
        ctx.strokeRect(4, 4, WORLD.width - 8, WORLD.height - 8);
        ctx.restore();
      }
      
      function drawPatch(x, y, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(0.2);
        ctx.fillStyle = color;
        roundRect(ctx, -150, -70, 300, 140, 26);
        ctx.fill();
        ctx.restore();
      }
      
      function drawPlayer() {
        const p = state.player;
        const cam = state.camera;
        const x = p.x - cam.x;
        const y = p.y - cam.y;
        ctx.save();
        ctx.translate(x, y);
      
        if (p.invuln > 0) {
          ctx.globalAlpha = 0.62 + Math.sin(performance.now() * 0.04) * 0.18;
        }
      
        ctx.fillStyle = "#d9b46b";
        ctx.strokeStyle = "#111814";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(0, 2, p.radius * 0.92, p.radius * 1.06, -0.16, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      
        ctx.fillStyle = "#111814";
        ctx.beginPath();
        ctx.arc(-8, -4, 3.6, 0, Math.PI * 2);
        ctx.arc(9, -4, 3.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#111814";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(1, 6, 10, 0.18, Math.PI - 0.18);
        ctx.stroke();
      
        ctx.restore();
      }
      
      function drawEnemies() {
        const cam = state.camera;
        for (const enemy of state.enemies) {
          const x = enemy.x - cam.x;
          const y = enemy.y - cam.y;
          if (x < -80 || y < -80 || x > canvas.width + 80 || y > canvas.height + 80) continue;
      
          ctx.save();
          ctx.translate(x, y);
          ctx.fillStyle = enemy.hitFlash > 0 ? "#fff2c0" : enemy.color;
          ctx.strokeStyle = "#111814";
          ctx.lineWidth = enemy.boss ? 5 : 3;
          ctx.beginPath();
          ctx.ellipse(0, 0, enemy.radius, enemy.radius * 0.88, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
      
          ctx.fillStyle = "#111814";
          ctx.beginPath();
          ctx.arc(-enemy.radius * 0.32, -4, 3, 0, Math.PI * 2);
          ctx.arc(enemy.radius * 0.32, -4, 3, 0, Math.PI * 2);
          ctx.fill();
      
          if (enemy.elite || enemy.boss) {
            ctx.strokeStyle = enemy.boss ? "#d7a947" : "#fff2c0";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(0, 0, enemy.radius + 8, 0, Math.PI * 2);
            ctx.stroke();
          }
      
          const hpPct = clamp(enemy.hp / enemy.maxHp, 0, 1);
          ctx.fillStyle = "rgba(0,0,0,0.35)";
          roundRect(ctx, -enemy.radius, enemy.radius + 10, enemy.radius * 2, 7, 4);
          ctx.fill();
          ctx.fillStyle = "#ff6f5c";
          roundRect(ctx, -enemy.radius, enemy.radius + 10, enemy.radius * 2 * hpPct, 7, 4);
          ctx.fill();
          ctx.restore();
        }
      }
      
      function drawBullets() {
        const cam = state.camera;
        for (const bullet of state.bullets) {
          ctx.fillStyle = bullet.color;
          ctx.beginPath();
          ctx.arc(bullet.x - cam.x, bullet.y - cam.y, bullet.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      
      function drawEnemyShots() {
        const cam = state.camera;
        for (const shot of state.enemyShots) {
          ctx.fillStyle = shot.color;
          ctx.strokeStyle = "rgba(17,24,20,0.75)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(shot.x - cam.x, shot.y - cam.y, shot.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }
      }
      
      function drawHits() {
        const cam = state.camera;
        for (const hit of state.hits) {
          const alpha = clamp(hit.life / hit.maxLife, 0, 1);
          ctx.strokeStyle = hexToRgba(hit.color, 0.75 * alpha);
          ctx.lineWidth = 18 * alpha;
          ctx.beginPath();
          ctx.arc(hit.x - cam.x, hit.y - cam.y, hit.radius, -0.9, 0.9);
          ctx.stroke();
        }
      }
      
      function drawDrops() {
        const cam = state.camera;
        for (const drop of state.drops) {
          const x = drop.x - cam.x;
          const y = drop.y - cam.y;
          ctx.fillStyle = drop.color;
          ctx.strokeStyle = "rgba(17,24,20,0.55)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          if (drop.type === "xp") {
            ctx.moveTo(x, y - drop.radius);
            ctx.lineTo(x + drop.radius, y);
            ctx.lineTo(x, y + drop.radius);
            ctx.lineTo(x - drop.radius, y);
            ctx.closePath();
          } else {
            ctx.arc(x, y, drop.radius, 0, Math.PI * 2);
          }
          ctx.fill();
          ctx.stroke();
        }
      }
      
      function drawParticles() {
        const cam = state.camera;
        for (const p of state.particles) {
          ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x - cam.x, p.y - cam.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
      
      function drawFloaters() {
        const cam = state.camera;
        ctx.font = "700 16px Microsoft YaHei, sans-serif";
        ctx.textAlign = "center";
        for (const f of state.floaters) {
          ctx.globalAlpha = clamp(f.life / 0.5, 0, 1);
          ctx.fillStyle = f.color;
          ctx.fillText(f.text, f.x - cam.x, f.y - cam.y);
          ctx.globalAlpha = 1;
        }
      }
      
      function drawMinimap() {
        const w = 132;
        const h = 88;
        const x = canvas.width - w - 14;
        const y = 14;
        ctx.fillStyle = "rgba(10,16,12,0.62)";
        roundRect(ctx, x, y, w, h, 8);
        ctx.fill();
        ctx.strokeStyle = "rgba(245,240,223,0.35)";
        ctx.stroke();
      
        const px = x + (state.player.x / WORLD.width) * w;
        const py = y + (state.player.y / WORLD.height) * h;
        ctx.fillStyle = "#d7a947";
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fill();
      
        ctx.fillStyle = "#ff6f5c";
        for (const enemy of state.enemies.slice(0, 80)) {
          ctx.fillRect(x + (enemy.x / WORLD.width) * w - 1, y + (enemy.y / WORLD.height) * h - 1, 2, 2);
        }
      }
      
      function spawnParticles(x, y, color, count) {
        for (let i = 0; i < count; i += 1) {
          const angle = random(0, Math.PI * 2);
          const speed = random(40, 180);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            radius: random(2, 5),
            life: random(0.22, 0.55),
            maxLife: 0.55,
            color
          });
        }
      }
      
      function syncUi() {
        const p = state.player;
        ui.time.textContent = formatTime(state.elapsed);
        ui.hp.textContent = `${Math.max(0, Math.ceil(p.hp))}/${p.maxHp}`;
        ui.level.textContent = p.level;
        ui.crystal.textContent = p.crystals;
      
        ui.statList.innerHTML = [
          ["危险度", state.danger],
          ["下一精英", state.bossSpawned ? "首领" : `${Math.max(0, Math.ceil(state.nextEliteAt - state.elapsed))}秒`],
          ["伤害", `${Math.round(p.damageMult * 100)}%`],
          ["攻速", `${Math.round((1 / p.cooldownMult) * 100)}%`],
          ["移速", `${Math.round(p.speed * p.speedMult)}`],
          ["护甲", p.armor],
          ["自愈", `${p.regen.toFixed(2)}/秒`],
          ["拾取", `${Math.round(p.pickupMult * 100)}%`],
          ["击倒", state.killCount]
        ]
          .map(([label, value]) => `<div class="stat-line"><span>${label}</span><strong>${value}</strong></div>`)
          .join("");
      
        ui.weaponList.innerHTML = p.weapons
          .map((weapon) => `<span class="chip weapon">${WEAPONS[weapon.key].icon} ${WEAPONS[weapon.key].name} Lv.${weapon.level}</span>`)
          .join("");
      
        ui.logList.innerHTML = state.logs.map((entry) => `<li class="${entry.type}">${entry.text}</li>`).join("");
      }
      
      function resizeCanvas() {
        const wrap = canvas.parentElement;
        const rect = wrap.getBoundingClientRect();
        const width = Math.max(320, Math.floor(rect.width));
        const height = Math.max(300, Math.floor(rect.height));
        canvas.width = width;
        canvas.height = height;
      }
      
      function bindEvents() {
        window.addEventListener("keydown", (event) => {
          if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(event.code)) {
            event.preventDefault();
          }
          if (event.code === "Space") {
            togglePause();
            return;
          }
          keys.add(event.code);
        });
      
        window.addEventListener("keyup", (event) => {
          keys.delete(event.code);
        });

        function resetJoystick() {
          joystick.active = false;
          joystick.pointerId = null;
          joystick.x = 0;
          joystick.y = 0;
          mobileJoystickThumb.style.left = "50%";
          mobileJoystickThumb.style.top = "50%";
        }

        function updateJoystick(event) {
          const rect = mobileJoystick.getBoundingClientRect();
          const cx = rect.width / 2;
          const cy = rect.height / 2;
          const max = rect.width * 0.34;
          const rawX = event.clientX - rect.left - cx;
          const rawY = event.clientY - rect.top - cy;
          const len = Math.hypot(rawX, rawY);
          const scale = len > max ? max / len : 1;
          const dx = rawX * scale;
          const dy = rawY * scale;
          joystick.x = dx / max;
          joystick.y = dy / max;
          mobileJoystickThumb.style.left = `${cx + dx}px`;
          mobileJoystickThumb.style.top = `${cy + dy}px`;
        }

        mobileJoystick.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          event.stopPropagation();
          joystick.active = true;
          joystick.pointerId = event.pointerId;
          mobileJoystick.setPointerCapture(event.pointerId);
          updateJoystick(event);
        });

        mobileJoystick.addEventListener("pointermove", (event) => {
          if (!joystick.active || event.pointerId !== joystick.pointerId) return;
          event.preventDefault();
          event.stopPropagation();
          updateJoystick(event);
        });

        function releaseJoystick(event) {
          if (event && joystick.pointerId !== null && event.pointerId !== joystick.pointerId) return;
          if (event) {
            event.preventDefault();
            event.stopPropagation();
          }
          resetJoystick();
        }

        mobileJoystick.addEventListener("pointerup", releaseJoystick);
        mobileJoystick.addEventListener("pointercancel", releaseJoystick);
        mobileJoystick.addEventListener("lostpointercapture", releaseJoystick);
      
        canvas.addEventListener("pointerdown", (event) => {
          pointer.active = true;
          pointer.x = event.clientX;
          pointer.y = event.clientY;
          canvas.setPointerCapture(event.pointerId);
        });
        canvas.addEventListener("pointermove", (event) => {
          if (!pointer.active) return;
          pointer.x = event.clientX;
          pointer.y = event.clientY;
        });
        canvas.addEventListener("pointerup", () => {
          pointer.active = false;
        });
        canvas.addEventListener("pointercancel", () => {
          pointer.active = false;
        });
      
        ui.start.addEventListener("click", startRun);
        ui.restart.addEventListener("click", () => {
          resetRun();
          startRun();
        });
        ui.pause.addEventListener("click", togglePause);
        document.querySelectorAll("[data-danger]").forEach((button) => {
          button.addEventListener("click", () => {
            if (state.mode === "running") return;
            selectedDanger = Number(button.dataset.danger);
            resetRun();
          });
        });
        ui.upgradeChoices.addEventListener("click", (event) => {
          const button = event.target.closest("button[data-upgrade-id]");
          if (!button) return;
          chooseUpgrade(button.dataset.upgradeId);
        });
      
        resizeObserver = new ResizeObserver(() => {
          resizeCanvas();
          draw();
        });
        resizeObserver.observe(canvas.parentElement);
      }
      
      function formatTime(seconds) {
        const total = Math.max(0, Math.floor(seconds));
        const min = String(Math.floor(total / 60)).padStart(2, "0");
        const sec = String(total % 60).padStart(2, "0");
        return `${min}:${sec}`;
      }
      
      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }
      
      function random(min, max) {
        return Math.random() * (max - min) + min;
      }
      
      function randomInt(min, max) {
        return Math.floor(random(min, max + 1));
      }
      
      function dist2(ax, ay, bx, by) {
        const dx = ax - bx;
        const dy = ay - by;
        return dx * dx + dy * dy;
      }
      
      function inWorld(x, y, padding = 0) {
        return x >= -padding && y >= -padding && x <= WORLD.width + padding && y <= WORLD.height + padding;
      }
      
      function roundRect(context, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + width, y, x + width, y + height, r);
        context.arcTo(x + width, y + height, x, y + height, r);
        context.arcTo(x, y + height, x, y, r);
        context.arcTo(x, y, x + width, y, r);
        context.closePath();
      }
      
      function hexToRgba(hex, alpha) {
        const value = hex.replace("#", "");
        const r = parseInt(value.slice(0, 2), 16);
        const g = parseInt(value.slice(2, 4), 16);
        const b = parseInt(value.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }
      
      bindEvents();
      resetRun();
      resizeCanvas();
      draw();
    </script>
  </body>
</html>
