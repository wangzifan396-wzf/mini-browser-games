<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#111a16" />
    <title>薯仔突围：丰收行动</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23111915'/%3E%3Cellipse cx='32' cy='34' rx='21' ry='24' fill='%23d7aa5d'/%3E%3Ccircle cx='25' cy='29' r='3'/%3E%3Ccircle cx='40' cy='29' r='3'/%3E%3Cpath d='M23 43c6 5 13 5 19 0' stroke='%23111915' stroke-width='4' stroke-linecap='round' fill='none'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: dark;
        --ink: #f7f1df;
        --muted: #9eaea3;
        --leaf: #70c77d;
        --gold: #e5b654;
        --red: #ee6d62;
        --cyan: #63cce4;
        --violet: #b593ee;
        --panel: rgba(13, 23, 17, 0.93);
        --line: rgba(232, 240, 219, 0.16);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #09110d;
        color: var(--ink);
        font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      }
      body {
        overflow: hidden;
      }
      button {
        font: inherit;
      }
      .app {
        height: 100vh;
        height: 100dvh;
        padding: 10px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 10px;
        background:
          radial-gradient(
            circle at 8% 10%,
            rgba(91, 190, 109, 0.13),
            transparent 30%
          ),
          radial-gradient(
            circle at 92% 85%,
            rgba(225, 173, 72, 0.1),
            transparent 30%
          );
      }
      .topbar,
      .arena,
      .side,
      .card,
      .overlay-card,
      .modal-card {
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      }
      .topbar {
        min-height: 66px;
        border-radius: 16px;
        padding: 9px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .logo {
        width: 43px;
        height: 43px;
        border-radius: 13px;
        display: grid;
        place-items: center;
        color: #1b2118;
        font-size: 24px;
        font-weight: 1000;
        background: linear-gradient(145deg, #f1c96d, #bd8244);
        box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.2);
      }
      h1 {
        font-size: clamp(21px, 2.5vw, 31px);
        line-height: 1;
        margin: 0;
      }
      .brand p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }
      .brand b {
        color: var(--gold);
      }
      .actions {
        display: flex;
        gap: 7px;
      }
      .btn,
      .icon-btn,
      .choice,
      .upgrade-card,
      .camp-btn {
        border: 1px solid var(--line);
        border-radius: 11px;
        background: rgba(32, 50, 38, 0.92);
        color: var(--ink);
        font-weight: 900;
        cursor: pointer;
        transition: 0.15s;
      }
      .btn:hover,
      .icon-btn:hover,
      .choice:hover,
      .upgrade-card:hover,
      .camp-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(229, 182, 84, 0.76);
      }
      .btn:disabled,
      .icon-btn:disabled,
      .camp-btn:disabled {
        opacity: 0.38;
        cursor: not-allowed;
        transform: none;
      }
      .btn {
        padding: 9px 14px;
      }
      .btn.primary {
        background: linear-gradient(135deg, #70c77d, #a6d369);
        color: #132017;
        border: 0;
      }
      .icon-btn {
        width: 42px;
        height: 42px;
      }
      .icon-btn.active {
        border-color: var(--gold);
        color: var(--gold);
      }
      .layout {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 338px;
        gap: 10px;
      }
      .arena,
      .side {
        border-radius: 16px;
        min-width: 0;
        min-height: 0;
      }
      .arena {
        padding: 9px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 8px;
      }
      .hud {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
      }
      .hud div {
        border: 1px solid var(--line);
        border-radius: 11px;
        padding: 7px 9px;
        background: rgba(255, 255, 255, 0.025);
      }
      .hud span {
        display: block;
        font-size: 9px;
        color: var(--muted);
        font-weight: 900;
      }
      .hud strong {
        display: block;
        font-size: 17px;
        margin-top: 2px;
      }
      .hud .hp strong {
        color: #83da84;
      }
      .hud .timer strong {
        color: var(--gold);
      }
      .canvas-wrap {
        position: relative;
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 13px;
        overflow: hidden;
        background: #19271d;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      .progress {
        position: absolute;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        width: min(58%, 570px);
        height: 25px;
        padding: 7px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(7, 13, 9, 0.8);
        pointer-events: none;
      }
      .progress div {
        height: 9px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }
      .progress i {
        display: block;
        width: 0;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          var(--leaf),
          var(--gold),
          var(--red)
        );
        transition: width 0.2s;
      }
      .progress span {
        position: absolute;
        inset: 3px;
        text-align: center;
        font-size: 10px;
        font-weight: 900;
        text-shadow: 0 2px 4px #000;
      }
      .skill-btn,
      .dash-btn {
        position: absolute;
        right: 16px;
        bottom: 18px;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 2px solid rgba(238, 208, 117, 0.7);
        background: radial-gradient(
          circle at 35% 30%,
          rgba(255, 255, 255, 0.2),
          rgba(104, 78, 34, 0.88)
        );
        color: #fff1b5;
        font-weight: 1000;
        cursor: pointer;
        z-index: 4;
      }
      .skill-btn small,
      .dash-btn small {
        display: block;
        font-size: 9px;
        color: #dccb9d;
      }
      .skill-btn:disabled {
        filter: grayscale(1);
        opacity: 0.5;
      }
      .dash-btn {
        display: none;
        right: 97px;
        width: 56px;
        height: 56px;
        bottom: 25px;
        border-color: rgba(112, 199, 125, 0.65);
        background: rgba(31, 73, 48, 0.83);
        color: #c8f5cc;
      }
      .joystick {
        display: none;
        position: absolute;
        left: 18px;
        bottom: 18px;
        width: 112px;
        height: 112px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.26);
        background: rgba(5, 12, 8, 0.38);
        backdrop-filter: blur(6px);
        z-index: 4;
        touch-action: none;
      }
      .joystick i {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(
          circle at 35% 30%,
          #dbf1d4,
          #527d58 62%,
          #294332
        );
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
      }
      .side {
        padding: 9px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow: auto;
      }
      .card {
        border-radius: 13px;
        padding: 10px;
      }
      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 7px;
      }
      .card-head strong {
        font-size: 12px;
      }
      .eyebrow {
        color: var(--gold);
        font-size: 9px;
        font-weight: 1000;
        letter-spacing: 0.08em;
      }
      .objective {
        display: flex;
        gap: 9px;
        align-items: center;
      }
      .objective-icon {
        width: 39px;
        height: 39px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-size: 20px;
        background: rgba(229, 182, 84, 0.13);
      }
      .objective b {
        display: block;
        font-size: 13px;
      }
      .objective small {
        color: var(--muted);
        font-size: 10px;
        line-height: 1.3;
      }
      .bar {
        height: 7px;
        margin-top: 7px;
        border-radius: 6px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.09);
      }
      .bar i {
        display: block;
        width: 0;
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--cyan),
          var(--leaf),
          var(--gold)
        );
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .chip {
        padding: 5px 7px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.035);
        font-size: 10px;
      }
      .chip.evolved {
        border-color: var(--gold);
        color: #ffe19a;
      }
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }
      .stats div {
        display: flex;
        justify-content: space-between;
        padding: 6px 7px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
        font-size: 10px;
      }
      .stats span {
        color: var(--muted);
      }
      .log {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 5px;
        max-height: 150px;
        overflow: auto;
      }
      .log li {
        font-size: 10px;
        color: var(--muted);
        border-left: 2px solid rgba(255, 255, 255, 0.16);
        padding-left: 7px;
      }
      .log li.good {
        color: #90e49b;
        border-color: var(--leaf);
      }
      .log li.warn {
        color: #ff9b8d;
        border-color: var(--red);
      }
      .log li.gold {
        color: #f5ca6a;
        border-color: var(--gold);
      }
      .overlay,
      .modal {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        padding: 16px;
        background: rgba(5, 10, 7, 0.74);
        backdrop-filter: blur(7px);
      }
      .overlay.hidden,
      .modal.hidden {
        display: none;
      }
      .overlay-card,
      .modal-card {
        width: min(940px, 96%);
        max-height: 94%;
        overflow: auto;
        border-radius: 20px;
        padding: 18px;
      }
      .overlay-title {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: flex-start;
      }
      .overlay-title h2 {
        font-size: 27px;
        margin: 0;
      }
      .overlay-title h2 b {
        color: var(--gold);
      }
      .overlay-title p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 11px;
      }
      .save-pill {
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        font-size: 10px;
        color: var(--muted);
      }
      .setup-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 11px;
        margin-top: 12px;
      }
      .setup-section {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 11px;
        background: rgba(255, 255, 255, 0.02);
      }
      .setup-section h3 {
        font-size: 12px;
        margin: 0 0 8px;
      }
      .hero-grid,
      .op-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
      }
      .choice {
        min-height: 67px;
        padding: 8px;
        text-align: left;
      }
      .choice b {
        display: block;
        font-size: 13px;
      }
      .choice small {
        display: block;
        color: var(--muted);
        font-size: 9px;
        margin-top: 4px;
        line-height: 1.3;
      }
      .choice.selected {
        border-color: var(--gold);
        background: rgba(229, 182, 84, 0.11);
      }
      .danger-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .danger-row .choice {
        min-height: auto;
        padding: 7px 11px;
        border-radius: 999px;
      }
      .camp {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
      }
      .camp-btn {
        padding: 8px;
        text-align: left;
      }
      .camp-btn b {
        font-size: 11px;
      }
      .camp-btn span {
        display: block;
        color: var(--muted);
        font-size: 9px;
        margin-top: 3px;
      }
      .camp-btn em {
        display: block;
        color: var(--gold);
        font-style: normal;
        font-size: 9px;
        margin-top: 5px;
      }
      .start-row {
        display: flex;
        justify-content: flex-end;
        gap: 7px;
        margin-top: 11px;
      }
      .result {
        display: none;
        text-align: center;
      }
      .result.show {
        display: block;
      }
      .result h2 {
        font-size: 29px;
        margin: 0;
      }
      .result p {
        color: var(--muted);
        font-size: 11px;
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 7px;
        margin: 13px 0;
      }
      .result-grid div {
        padding: 10px;
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.04);
      }
      .result-grid b {
        display: block;
        color: var(--gold);
        font-size: 19px;
      }
      .result-grid span {
        font-size: 9px;
        color: var(--muted);
      }
      .modal-card {
        width: min(780px, 95%);
      }
      .modal-card h2 {
        margin: 2px 0 12px;
      }
      .upgrade-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .upgrade-card {
        position: relative;
        min-height: 145px;
        padding: 13px;
        text-align: left;
      }
      .upgrade-card .rarity {
        position: absolute;
        right: 9px;
        top: 8px;
        font-size: 9px;
        color: var(--muted);
      }
      .upgrade-card .up-icon {
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.06);
        font-size: 18px;
        margin-bottom: 9px;
      }
      .upgrade-card strong {
        display: block;
      }
      .upgrade-card p {
        font-size: 10px;
        color: var(--muted);
        line-height: 1.45;
      }
      .upgrade-card.rare {
        border-color: #64cce5;
      }
      .upgrade-card.epic {
        border-color: #b593ee;
      }
      .upgrade-card.legend {
        border-color: #e5b654;
      }
      .modal-actions {
        display: flex;
        justify-content: space-between;
        gap: 7px;
        margin-top: 10px;
      }
      .banner {
        position: absolute;
        left: 50%;
        top: 78px;
        transform: translate(-50%, -12px);
        padding: 9px 15px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(8, 14, 10, 0.88);
        font-weight: 900;
        font-size: 12px;
        opacity: 0;
        transition: 0.2s;
        pointer-events: none;
        z-index: 6;
      }
      .banner.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      @media (max-width: 940px) {
        .app {
          grid-template-rows: auto minmax(0, 1fr);
        }
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) 235px;
        }
        .side {
          display: grid;
          grid-template-columns: 1fr 1fr;
          grid-auto-rows: min-content;
        }
        .side .log-card {
          display: none;
        }
        .hud {
          grid-template-columns: repeat(6, 1fr);
        }
        .setup-grid {
          grid-template-columns: 1fr;
        }
        .joystick,
        .dash-btn {
          display: block;
        }
      }
      @media (max-width: 560px) {
        .app {
          padding: 6px;
          gap: 6px;
        }
        .topbar {
          min-height: 54px;
          padding: 6px 9px;
        }
        .logo {
          width: 36px;
          height: 36px;
        }
        .brand p {
          display: none;
        }
        .actions .btn {
          display: none;
        }
        .icon-btn {
          width: 36px;
          height: 36px;
        }
        .layout {
          grid-template-rows: minmax(0, 1fr) 214px;
          gap: 6px;
        }
        .arena {
          padding: 5px;
        }
        .hud {
          gap: 3px;
          grid-template-columns: repeat(3, 1fr);
        }
        .hud div {
          padding: 4px 6px;
        }
        .hud span {
          font-size: 8px;
        }
        .hud strong {
          font-size: 13px;
        }
        .side {
          padding: 6px;
          grid-template-columns: 1fr 1fr;
          gap: 5px;
        }
        .card {
          padding: 7px;
        }
        .stats {
          display: none;
        }
        .skill-btn {
          width: 62px;
          height: 62px;
        }
        .progress {
          width: 52%;
          bottom: 6px;
        }
        .overlay {
          padding: 7px;
        }
        .overlay-card {
          padding: 12px;
        }
        .overlay-title {
          display: block;
        }
        .setup-grid {
          gap: 7px;
        }
        .setup-section {
          padding: 8px;
        }
        .hero-grid,
        .op-grid {
          gap: 5px;
        }
        .choice {
          min-height: 58px;
          padding: 6px;
        }
        .camp {
          grid-template-columns: 1fr;
        }
        .camp-btn {
          display: flex;
          justify-content: space-between;
          align-items: center;
        }
        .camp-btn span {
          display: none;
        }
        .upgrade-grid {
          grid-template-columns: 1fr;
        }
        .upgrade-card {
          min-height: 105px;
        }
        .result-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo">薯</div>
          <div>
            <h1>薯仔突围 <b>丰收季 V3</b></h1>
            <p>六战薯 · 六行动区 · 十二武器 · 营地任务</p>
          </div>
        </div>
        <div class="actions">
          <button class="icon-btn" id="speedBtn" title="倍速">1×</button
          ><button class="icon-btn" id="pauseBtn" title="暂停">Ⅱ</button
          ><button class="btn" id="homeBtn">行动营地</button
          ><button class="icon-btn" id="restartBtn" title="重开">↻</button>
        </div>
      </header>
      <div class="layout">
        <section class="arena">
          <div class="hud">
            <div class="timer">
              <span>行动时间</span><strong id="timeStat">00:00</strong>
            </div>
            <div class="hp">
              <span>气血 / 护盾</span><strong id="hpStat">60/60</strong>
            </div>
            <div><span>等级</span><strong id="levelStat">1</strong></div>
            <div><span>击倒</span><strong id="killStat">0</strong></div>
            <div><span>晶薯</span><strong id="crystalStat">0</strong></div>
            <div><span>阶段</span><strong id="stageStat">1</strong></div>
          </div>
          <div class="canvas-wrap">
            <canvas id="gameCanvas" aria-label="薯仔突围战场"></canvas>
            <div class="banner" id="banner">阶段开始</div>
            <div class="progress">
              <div><i id="runBar"></i></div>
              <span id="runText">选择行动</span>
            </div>
            <button class="dash-btn" id="dashBtn">
              冲刺<small>Shift</small></button
            ><button class="skill-btn" id="skillBtn" disabled>
              战技<small id="skillText">0%</small>
            </button>
            <div class="joystick" id="joystick"><i id="joystickThumb"></i></div>
            <div class="overlay" id="homeOverlay">
              <div class="overlay-card">
                <div id="setupView">
                  <div class="overlay-title">
                    <div>
                      <h2>丰收行动：<b>整装出发</b></h2>
                      <p>
                        选择战薯与行动区域；击败敌人，把晶薯带回营地强化下一轮。
                      </p>
                    </div>
                    <div class="save-pill" id="savePill">营地晶薯 0</div>
                  </div>
                  <div class="setup-grid">
                    <section class="setup-section">
                      <h3>选择战薯</h3>
                      <div class="hero-grid" id="heroGrid"></div>
                    </section>

          : "这次构筑已经结算，强化营地后再来一轮。";
        $("#resultTime").textContent = format(state.elapsed);
        $("#resultKills").textContent = state.killCount;
        $("#resultCores").textContent = reward;
        $("#resultBoss").textContent = state.bossKills;
      }
      function addLog(text, type = "") {
        state.logs.unshift({ text, type });
        state.logs = state.logs.slice(0, 15);
      }
      function showBanner(text) {
        ui.banner.textContent = text;
        ui.banner.classList.add("show");
        bannerTimer = 2.2;
      }
      function updateFx(dt) {
        if (bannerTimer > 0) {
          bannerTimer -= dt;
          if (bannerTimer <= 0) ui.banner.classList.remove("show");
        }
        for (const p of state.particles) {
          p.life -= dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
        }
        for (const f of state.floaters) {
          f.life -= dt;
          f.y -= 32 * dt;
        }
      }
      function burstFx(x, y, color, n = 9) {
        for (let i = 0; i < n; i++) {
          const a = rand(0, Math.PI * 2),
            s = rand(40, 180);
          state.particles.push({
            x,
            y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s,
            r: rand(2, 5),
            life: rand(0.25, 0.65),
            max: 0.65,
            color,
          });
        }
      }
      function ring(x, y, r, color) {
        state.particles.push({
          x,
          y,
          vx: 0,
          vy: 0,
          r,
          life: 0.45,
          max: 0.45,
          color,
          ring: true,
        });
      }
      function beam(x, y, x2, y2, color) {
        state.particles.push({
          x,
          y,
          x2,
          y2,
          vx: 0,
          vy: 0,
          r: 0,
          life: 0.18,
          max: 0.18,
          color,
          beam: true,
        });
      }
      function sync() {
        const p = state.player,
          op = OPERATIONS[state.op];
        ui.time.textContent = format(state.elapsed);
        ui.hp.textContent = `${Math.ceil(p.hp)}/${p.maxHp}${p.shield ? ` +${Math.ceil(p.shield)}` : ""}`;
        ui.level.textContent = p.level;
        ui.kills.textContent = state.killCount;
        ui.crystal.textContent = p.crystals;
        ui.stage.textContent = state.stage;
        ui.skill.disabled = p.skill < 100 || state.mode !== "running";
        ui.skillText.textContent = `${Math.floor(p.skill)}%`;
        ui.skillBar.style.width = `${p.skill}%`;
        const progress =
          state.op === "endless"
            ? (state.elapsed % 300) / 3
            : (state.elapsed / state.duration) * 100;
        ui.runBar.style.width = `${clamp(progress, 0, 100)}%`;
        ui.runText.textContent =
          state.op === "endless"
            ? `距下个首领 ${format(Math.max(0, state.nextBossAt - state.elapsed))}`
            : `距首领 ${format(Math.max(0, state.duration - state.elapsed))}`;
        $("#opIcon").textContent = op.icon;
        $("#opTitle").textContent =
          `${op.name} · ${DANGERS[state.danger].name}`;
        $("#opText").textContent = op.desc;
        ui.slots.textContent = `${p.weapons.length}/${MAX_WEAPONS}`;
        ui.weapons.innerHTML = p.weapons
          .map(
            (w) =>
              `<span class="chip ${w.evolved ? "evolved" : ""}">${WEAPONS[w.key].icon} ${w.evolved ? WEAPONS[w.key].evo : WEAPONS[w.key].name} Lv.${w.level}</span>`,
          )
          .join("");
        ui.relicCount.textContent = `${p.relics.length} 遗物`;
        ui.stats.innerHTML = [
          ["伤害", `${Math.round(p.damageMult * 100)}%`],
          ["攻速", `${Math.round(100 / p.cooldownMult)}%`],
          ["移速", `${Math.round(p.speedMult * 100)}%`],
          ["护甲", p.armor],
          ["暴击", `${Math.round(p.crit * 100)}%`],
          ["拾取", `${Math.round(p.pickupMult * 100)}%`],
        ]
          .map((x) => `<div><span>${x[0]}</span><b>${x[1]}</b></div>`)
          .join("");
        ui.logs.innerHTML = state.logs
          .map((x) => `<li class="${x.type}">${x.text}</li>`)
          .join("");
        $("#pauseBtn").textContent = state.paused ? "▶" : "Ⅱ";
        $("#rerollBtn").textContent = `重抽（${state.rerolls}）`;
        $("#rerollBtn").disabled = state.rerolls <= 0;
      }
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!state) return;
        drawWorld();
        drawHazards();
        drawFields();
        drawDrops();
        drawBullets();
        drawEnemies();
        drawPlayer();
        drawFx();
        drawMinimap();
        if (state.op === "night") {
          const g = ctx.createRadialGradient(
            canvas.width / 2,
            canvas.height / 2,
            150,
            canvas.width / 2,
            canvas.height / 2,
            Math.max(canvas.width, canvas.height) * 0.7,
          );
          g.addColorStop(0, "rgba(5,8,14,0)");
          g.addColorStop(1, "rgba(6,8,16,.58)");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
      }
      function screen(x, y) {
        return { x: x - state.camera.x, y: y - state.camera.y };
      }
      function drawWorld() {
        const op = OPERATIONS[state.op],
          cam = state.camera;
        ctx.fillStyle = op.ground;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const grid = 90;
        ctx.strokeStyle = "rgba(230,242,218,.055)";
        ctx.lineWidth = 1;
        for (
          let x = Math.floor(cam.x / grid) * grid;
          x < cam.x + canvas.width + grid;
          x += grid
        ) {
          ctx.beginPath();
          ctx.moveTo(x - cam.x, 0);
          ctx.lineTo(x - cam.x, canvas.height);
          ctx.stroke();
        }
        for (
          let y = Math.floor(cam.y / grid) * grid;
          y < cam.y + canvas.height + grid;
          y += grid
        ) {
          ctx.beginPath();
          ctx.moveTo(0, y - cam.y);
          ctx.lineTo(canvas.width, y - cam.y);
          ctx.stroke();
        }
        for (let i = 0; i < 42; i++) {
          const x = (i * 337 + 91) % WORLD.w,
            y = (i * 191 + 63) % WORLD.h,
            s = screen(x, y);
          if (
            s.x < -40 ||
            s.y < -40 ||
            s.x > canvas.width + 40 ||
            s.y > canvas.height + 40
          )
            continue;
          ctx.fillStyle = i % 3 ? `${op.accent}26` : "rgba(255,255,255,.035)";
          ctx.beginPath();
          ctx.ellipse(
            s.x,
            s.y,
            18 + (i % 4) * 6,
            10 + (i % 3) * 4,
            i,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }
      }
      function drawPlayer() {
        const p = state.player,
          s = screen(p.x, p.y);
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.fillStyle = "rgba(0,0,0,.25)";
        ctx.beginPath();
        ctx.ellipse(0, 20, 25, 9, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = p.invuln > 0 ? "#fff0ae" : "#d8ad63";
        ctx.strokeStyle = "#242219";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(0, 0, 21, 25, -0.15, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#1f241d";
        ctx.beginPath();
        ctx.arc(-7, -5, 3, 0, Math.PI * 2);
        ctx.arc(7, -5, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#4e7d49";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(1, -22);
        ctx.quadraticCurveTo(7, -36, 17, -33);
        ctx.stroke();
        if (p.shield) {
          ctx.strokeStyle = "#75d5e5";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(0, 0, 31, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }
      function drawEnemies() {
        for (const e of state.enemies) {
          const s = screen(e.x, e.y);
          if (
            s.x < -90 ||
            s.y < -90 ||
            s.x > canvas.width + 90 ||
            s.y > canvas.height + 90
          )
            continue;
          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.globalAlpha = e.hidden ? 0.42 : 1;
          ctx.fillStyle = "rgba(0,0,0,.22)";
          ctx.beginPath();
          ctx.ellipse(0, e.r * 0.65, e.r, e.r * 0.35, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = e.flash > 0 ? "#fff3c8" : e.color;
          ctx.strokeStyle = "#20241e";
          ctx.lineWidth = e.boss ? 5 : 3;
          ctx.beginPath();
          ctx.ellipse(0, 0, e.r, e.r * 0.88, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#20241e";
          ctx.beginPath();
          ctx.arc(-e.r * 0.3, -3, e.boss ? 5 : 3, 0, Math.PI * 2);
          ctx.arc(e.r * 0.3, -3, e.boss ? 5 : 3, 0, Math.PI * 2);
          ctx.fill();
          if (e.elite || e.boss) {
            ctx.strokeStyle = e.boss ? "#e8bd5d" : "#f0a0ad";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, e.r + 7, 0, Math.PI * 2);
            ctx.stroke();
          }
          const pct = clamp(e.hp / e.maxHp, 0, 1);
          ctx.fillStyle = "rgba(0,0,0,.55)";
          round(-e.r, e.r + 9, e.r * 2, 6, 3);
          ctx.fill();
          ctx.fillStyle = e.boss ? "#d696e7" : "#78dc7b";
          round(-e.r, e.r + 9, e.r * 2 * pct, 6, 3);
          ctx.fill();
          ctx.restore();
        }
      }
      function drawBullets() {
        for (const b of state.bullets) {
          const s = screen(b.x, b.y);
          ctx.fillStyle = b.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, b.r, 0, Math.PI * 2);
          ctx.fill();
        }
        for (const b of state.shots) {
          const s = screen(b.x, b.y);
          ctx.fillStyle = b.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, b.r, 0, Math.PI * 2);
          ctx.fill();
        }
        for (const h of state.hits) {
          const s = screen(h.x, h.y);
          ctx.globalAlpha = clamp(h.life / h.max, 0.12, 0.55);
          ctx.strokeStyle = h.color;
          ctx.lineWidth = 7;
          ctx.beginPath();
          ctx.arc(
            s.x,
            s.y,
            h.r * (1.1 - (h.life / h.max) * 0.1),
            0,
            Math.PI * 2,
          );
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
      function drawFields() {
        for (const f of state.fields) {
          const s = screen(f.x, f.y),
            a = clamp(f.duration / 1.2, 0, 0.42);
          ctx.fillStyle = rgba(f.color, a);
          ctx.beginPath();
          ctx.arc(s.x, s.y, f.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = f.color;
          ctx.globalAlpha = 0.6;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
      function drawDrops() {
        for (const d of state.drops) {
          const s = screen(d.x, d.y);
          ctx.fillStyle = d.color;
          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.rotate(performance.now() * 0.002);
          ctx.beginPath();
          if (d.type === "crystal" || d.type === "crate") {
            ctx.moveTo(0, -d.r);
            ctx.lineTo(d.r, 0);
            ctx.lineTo(0, d.r);
            ctx.lineTo(-d.r, 0);
            ctx.closePath();
          } else ctx.arc(0, 0, d.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }
      function drawHazards() {
        for (const h of state.hazards) {
          const s = screen(h.x, h.y);
          ctx.fillStyle = h.kind === "frost"
            ? h.warning > 0 ? "rgba(130,220,244,.12)" : "rgba(86,179,220,.25)"
            : h.warning > 0 ? "rgba(255,190,84,.12)" : "rgba(234,83,60,.22)";
          ctx.strokeStyle = h.kind === "frost" ? "#8bdcf0" : h.warning > 0 ? "#efbf62" : "#e95e4f";
          ctx.setLineDash(h.warning > 0 ? [8, 7] : []);
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(s.x, s.y, h.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }
      function drawFx() {
        for (const p of state.particles) {
          ctx.save();
          ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
          const s = screen(p.x, p.y);
          if (p.beam) {
            const t = screen(p.x2, p.y2);
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(t.x, t.y);
            ctx.stroke();
          } else if (p.ring) {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(
              s.x,
              s.y,
              p.r * (1.35 - (p.life / p.max) * 0.35),
              0,
              Math.PI * 2,
            );
            ctx.stroke();
          } else {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(s.x, s.y, p.r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
        ctx.textAlign = "center";
        ctx.font = "900 13px sans-serif";
        for (const f of state.floaters) {
          const s = screen(f.x, f.y);
          ctx.globalAlpha = clamp(f.life / 0.45, 0, 1);
          ctx.fillStyle = f.color;
          ctx.fillText(f.text, s.x, s.y);
        }
        ctx.globalAlpha = 1;
      }
      function drawMinimap() {
        const w = 126,
          h = 82,
          x = canvas.width - w - 12,
          y = 12;
        ctx.fillStyle = "rgba(5,10,7,.65)";
        round(x, y, w, h, 10);
        ctx.fill();
        ctx.strokeStyle = "rgba(238,244,225,.2)";
        ctx.stroke();
        ctx.fillStyle = "#f3ce72";
        ctx.beginPath();
        ctx.arc(
          x + (state.player.x / WORLD.w) * w,
          y + (state.player.y / WORLD.h) * h,
          3,
          0,
          Math.PI * 2,
        );
        ctx.fill();
        ctx.fillStyle = "#e77468";
        state.enemies
          .filter((e) => e.elite || e.boss)
          .forEach((e) =>
            ctx.fillRect(
              x + (e.x / WORLD.w) * w - 2,
              y + (e.y / WORLD.h) * h - 2,
              4,
              4,
            ),
          );
      }
      function round(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }
      function rgba(hex, a) {
        const n = parseInt(hex.slice(1), 16);
        return `rgba(${n >> 16},${(n >> 8) & 255},${n & 255},${a})`;
      }
      function format(s) {
        s = Math.max(0, Math.floor(s));
        return `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
      }
      function resize() {
        const r = canvas.parentElement.getBoundingClientRect();
        canvas.width = Math.max(320, Math.floor(r.width));
        canvas.height = Math.max(280, Math.floor(r.height));
        if (state) {
          state.camera.x = clamp(
            state.player.x - canvas.width / 2,
            0,
            Math.max(0, WORLD.w - canvas.width),
          );
          state.camera.y = clamp(
            state.player.y - canvas.height / 2,
            0,
            Math.max(0, WORLD.h - canvas.height),
          );
          draw();
        }
      }
      $("#startBtn").onclick = startRun;
      $("#againBtn").onclick = startRun;
      $("#resultHomeBtn").onclick = () => {
        ui.result.classList.remove("show");
        renderHome();
      };
      $("#homeBtn").onclick = () => {
        if (
          state.mode === "running" &&
          !confirm("当前行动尚未结算，返回营地将放弃本局收获。")
        )
          return;
        state.mode = "ready";
        ui.overlay.classList.remove("hidden");
        renderHome();
      };
      $("#restartBtn").onclick = () => {
        if (state.mode === "running" && confirm("重新开始当前行动？"))
          startRun();
      };
      $("#pauseBtn").onclick = () => {
        if (
          state.mode !== "running" ||
          !ui.upgrade.classList.contains("hidden")
        )
          return;
        state.paused = !state.paused;
        last = performance.now();
        sync();
      };
      $("#speedBtn").onclick = () => {
        timeScale = timeScale === 1 ? 2 : 1;
        $("#speedBtn").textContent = `${timeScale}×`;
        $("#speedBtn").classList.toggle("active", timeScale === 2);
      };
      ui.skill.onclick = useSkill;
      $("#dashBtn").onclick = dash;
      $("#rerollBtn").onclick = () => {
        if (state.rerolls > 0) {
          state.rerolls--;
          rollOptions();
          sync();
        }
      };
      $("#healSkipBtn").onclick = () => {
        if (state.upgradeType === "relic") state.player.crystals += 12;
        else
          state.player.hp = Math.min(
            state.player.maxHp,
            state.player.hp + state.player.maxHp * 0.15,
          );
        finishUpgrade();
      };
      window.addEventListener("keydown", (e) => {
        keys.add(e.code);
        if (e.code === "Space" || e.code === "KeyP") {
          e.preventDefault();
          $("#pauseBtn").click();
        }
        if (e.code === "KeyQ") useSkill();
      });
      window.addEventListener("keyup", (e) => keys.delete(e.code));
      canvas.addEventListener("pointerdown", (e) => {
        if (e.pointerType !== "touch") {
          pointer.active = true;
          pointer.x = e.clientX;
          pointer.y = e.clientY;
        }
      });
      canvas.addEventListener("pointermove", (e) => {
        if (pointer.active) {
          pointer.x = e.clientX;
          pointer.y = e.clientY;
        }
      });
      window.addEventListener("pointerup", () => (pointer.active = false));
      const joystick = $("#joystick"),
        thumb = $("#joystickThumb");
      function joyUpdate(e) {
        const r = joystick.getBoundingClientRect(),
          cx = r.width / 2,
          cy = r.height / 2,
          dx = e.clientX - r.left - cx,
          dy = e.clientY - r.top - cy,
          max = r.width * 0.34,
          l = Math.hypot(dx, dy),
          s = l > max ? max / l : 1;
        joy.x = (dx * s) / max;
        joy.y = (dy * s) / max;
        thumb.style.transform = `translate(calc(-50% + ${dx * s}px),calc(-50% + ${dy * s}px))`;
      }
      function joyEnd(e) {
        if (e && joy.id !== e.pointerId) return;
        joy.active = false;
        joy.id = null;
        joy.x = joy.y = 0;
        thumb.style.transform = "translate(-50%,-50%)";
      }
      joystick.addEventListener("pointerdown", (e) => {
        joy.active = true;
        joy.id = e.pointerId;
        joystick.setPointerCapture(e.pointerId);
        joyUpdate(e);
      });
      joystick.addEventListener("pointermove", (e) => {
        if (joy.active && e.pointerId === joy.id) joyUpdate(e);
      });
      joystick.addEventListener("pointerup", joyEnd);
      joystick.addEventListener("pointercancel", joyEnd);
      window.addEventListener("resize", resize);
      resetRun();
      renderHome();
      resize();
    </script>
  </body>
</html>
