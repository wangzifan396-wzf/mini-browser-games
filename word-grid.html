<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>五字密语</title><style>body{margin:0;background:#101116;color:#fff;font-family:system-ui,"Microsoft YaHei"}.app{min-height:100vh;display:grid;place-items:center;padding:12px}.shell{width:min(560px,100%);text-align:center}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:min(360px,90vw);margin:14px auto}.cell{aspect-ratio:1;border:2px solid #3c414b;display:grid;place-items:center;font-size:28px;font-weight:bold;text-transform:uppercase}.good{background:#4d9c61}.near{background:#c59b43}.bad{background:#3b3e47}.keys{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}.keys button,button{padding:9px;border:0;border-radius:6px;background:#373b45;color:white;font-weight:bold}.msg{color:#aeb8c8}.row{display:flex;justify-content:center;gap:7px;margin-top:10px}</style><main class="app"><div class="shell"><h1>五字密语</h1><div class="msg" id="msg">六次机会猜出五字母密语。绿色位置正确，金色字母存在。</div><div class="grid" id="g"></div><div class="keys" id="keys"></div><div class="row"><button id="enter">提交</button><button id="del">删除</button><button id="newGame">换词</button></div></div></main><script>
const words=['PLANT','LIGHT','STONE','NIGHT','WATER','BRAIN','CLOUD','FLAME','SWORD','MUSIC'];let q;function reset(){q={word:words[Math.floor(Math.random()*words.length)],rows:Array.from({length:6},()=>Array(5).fill('')),r:0,c:0,state:Array.from({length:6},()=>Array(5).fill(''))};draw()}function add(ch){if(q.r>=6||q.c>=5)return;q.rows[q.r][q.c++]=ch;draw()}function back(){if(q.c)q.rows[q.r][--q.c]='';draw()}function submit(){if(q.c<5)return msg.textContent='还需要输入完整五个字母';let guess=q.rows[q.r].join(''),left={};for(let i=0;i<5;i++)if(guess[i]===q.word[i])q.state[q.r][i]='good';else left[q.word[i]]=(left[q.word[i]]||0)+1;for(let i=0;i<5;i++)if(!q.state[q.r][i]){if(left[guess[i]]){q.state[q.r][i]='near';left[guess[i]]--}else q.state[q.r][i]='bad'}if(guess===q.word){msg.textContent='破解成功！';q.r=6}else{q.r++;q.c=0;if(q.r===6)msg.textContent='答案：'+q.word}draw()}function draw(){g.innerHTML=q.rows.flatMap((r,y)=>r.map((v,x)=>`<div class="cell ${q.state[y][x]}">${v}</div>`)).join('');keys.innerHTML='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(c=>`<button data-k="${c}">${c}</button>`).join('');keys.querySelectorAll('button').forEach(b=>b.onclick=()=>add(b.dataset.k))}addEventListener('keydown',e=>{if(/^[a-z]$/i.test(e.key))add(e.key.toUpperCase());if(e.key==='Backspace')back();if(e.key==='Enter')submit()});enter.onclick=submit;del.onclick=back;newGame.onclick=reset;reset();
</script>
