<html lang="zh-CN">

  <title>信标车队：十二线护送战役</title>
  <style>

    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;background:linear-gradient(135deg,#0d1b26,#23403e 53%,#433442)}button,input,textarea{font:inherit}.app{width:min(1420px,calc(100vw - 24px));margin:12px auto 28px}.topbar,.panel,.archive-box{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,244,.97);box-shadow:0 16px 36px var(--shadow)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px}.eyebrow{margin:0 0 5px;color:#856219;font-size:12px;font-weight:900;letter-spacing:.06em}.topbar h1{margin:0;font-size:clamp(26px,4vw,44px);line-height:1}.subtitle{margin:7px 0 0;color:var(--muted);font-size:14px;line-height:1.5}.actions{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:42px;padding:0 14px;border:1px solid #24534d;border-radius:var(--radius);color:#fffdf6;background:var(--teal);font-weight:900;cursor:pointer}.btn.secondary{color:var(--ink);background:#f0d17b;border-color:#9c7621}.btn.ghost{color:var(--ink);background:#edf0e4;border-color:#84968f}.btn:disabled{opacity:.42;cursor:not-allowed}.layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:14px;margin-top:14px;align-items:start}.stage{position:relative;overflow:hidden;min-height:630px}.stage canvas{display:block;width:100%;height:630px;touch-action:none}.side{padding:14px}.panel{padding:14px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:13px}.stat{padding:9px;border:1px solid #9da69e;border-radius:var(--radius);background:#f9f7eb}.stat b{display:block;font-size:23px;line-height:1.1}.stat small{color:var(--muted);font-weight:800}.meter{margin:0 0 12px}.meter span{display:flex;justify-content:space-between;margin-bottom:5px;font-weight:900}.bar{height:12px;border:1px solid #84968f;border-radius:999px;overflow:hidden;background:#e8eadf}.bar i{display:block;width:100%;height:100%;back dth:100%;min-height:92px;padding:9px;border:1px solid #9da69e;border-radius:var(--radius);background:#f7f5e9;color:var(--ink);resize:vertical}.archive-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}.archive-feedback{min-height:20px;margin-top:8px;color:var(--teal);font-size:13px;font-weight:800}.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}.pad button{min-height:47px;border:1px solid #7a958e;border-radius:var(--radius);background:#fff8e6;color:var(--ink);font-weight:900;cursor:pointer}.pad .blank{visibility:hidden}.pad .skill{background:#e7f3ef}@media(max-width:970px){.layout{grid-template-columns:1fr}.side{order:-1}.route-list{max-height:none;grid-template-columns:repeat(3,1fr)}.log{height:90px}}@media(max-width:620px){.app{width:calc(100vw - 14px);margin-top:7px}.topbar{display:block;padding:14px}.actions{margin-top:12px;justify-content:stretch}.actions .btn{flex:1 1 auto}.stage{min-height:500px}.stage canvas{height:500px}.route-list{grid-template-columns:1fr 1fr;max-height:280px;overflow:auto}.stat b{font-size:20px}.pad button{font-size:13px}}

<body>
  <main class="app">
    <header class="topbar">
      <div><p class="eyebrow">ESCORT ACTION / DETERMINISTIC CAMPAIGN</p><h1>信标车队：十二线护送战役</h1><p class="subtitle" id="routeIntro">车队会自动前进，你负责清理敌袭、修复护盾，并在关键路口部署信标。</p></div>
      <div class="actions"><button class="btn" id="startBtn">出发</button><button class="btn secondary" id="pauseBtn">暂停</button><button class="btn ghost" id="resetBtn">重开</button><button class="btn ghost" id="archiveBtn">档案</button></div>
    </header>
    <section class="layout">
      <div class="panel stage"><canvas id="gameCanvas" aria-label="信标车队护送战场"></canvas><div class="overlay" id="overlay"><div class="modal"><h2 id="overlayTitle">选择护送路线</h2><p id="overlayText">十二条路线拥有固定敌袭计划和不同的护送目标。先观察情报，再选择模块的使用时机。</p><div class="actions"><button class="btn" id="overlayBtn">开始护送</button><button class="btn ghost" id="referenceBtn">应用参考方案</button></div></div></div></div>
      <aside class="panel side">
        <div class="stats"><div class="stat"><b id="scoreText">0</b><small>本局得分</small></div><div class="stat"><b id="bestText">0</b><small>路线最佳</small></div><div class="stat"><b id="waveText">0/0</b><small>敌袭波次</small></div><div class="stat"><b id="scrapText">0</b><small>维修零件</small></div></div>
        <div class="meter"><span><b>车队护盾</b><em id="hpText">100%</em></span><div class="bar"><i id="hpBar"></i></div></div>
        <div class="meter"><span><b>路线进度</b><em id="routeText">0%</em></span><div class="bar"><i id="routeBar"></i></div></div>
        <h2>路线情报</h2><div class="route-list" id="routeList"></div>
        <h2 style="margin-top:14px">护送模块</h2><div class="ability-list"><button class="ability" data-action="repair">维修护盾<span>消耗 1 零件</span></button><button class="ability" data-action="pulse">脉冲清场<span>击退附近敌袭</span></button><button class="ability" data-action="beacon">部署信标<span>加速并降低压力</span></button><button class="ability" data-action="sweep">扫描航线<span>显示下一波情报</span></button></div>
        <div class="pad"><button class="blank"></button><button data-key="KeyW">上</button><button class="blank"></button><button data-key="KeyA">左</button><button class="skill" data-key="Space">脉冲</button><button data-key="KeyD">右</button><button class="blank"></button><button data-key="KeyS">下</button><button class="blank"></button></div>
        <p class="hint">WASD / 方向键移动护卫。护卫会自动射击射程内的敌人；零件来自已清除的波次。空格可触发脉冲，移动端使用方向键和模块按钮。</p>
        <div class="log" id="log"></div>
      </aside>
    </section>
    <section class="archive-box hidden" id="archiveBox"><h2>信标车队档案</h2><p>档案记录路线解锁、星级和最佳分数，可复制到另一台设备继续。</p><textarea id="archiveText" spellcheck="false"></textarea><div class="archive-actions"><button class="btn" id="exportBtn">复制档案</button><button class="btn secondary" id="importBtn">导入档案</button><button class="btn ghost" id="closeArchiveBtn">关闭</button></div><div class="archive-feedback" id="archiveFeedback"></div></section>
  </main>
  <script>
  (()=>{
    const ROUTE_SEEDS=[
      ["dawn","曙光堤岸","东部海岸","潮汐会切断旧路，第一支车队要把信标送进港口。",330,72,1],
      ["reed","芦苇湿地","东部海岸","湿地视线很差，敌方无人机擅长从侧翼逼近。",350,70,1],
      ["salt","盐线公路","东部海岸","盐尘会让护盾持续衰减，零件要留给最后一段。",370,68,2],
      ["quarry","白石采场","中部高地","采场的重型装甲会冲击车头，脉冲要留给红色冲车。",390,68,2],
      ["switch","道岔谷地","中部高地","三组岔路汇入同一条山口，信标可以压低敌袭密度。",410,66,2],
      ["relay","风切中继站","中部高地","中继站停电后，车队必须在暴露区坚持更久。",430,66,2],
      ["night","夜航隧道","北部边境","隧道里没有天空，扫描模块能提前读出下一波。",450,64,2],
      ["frost","霜桥哨线","北部边境","冰桥狭窄，修理比追分更重要。",470,64,3],
      ["aurora","极光台地","北部边境","高地风暴会改变敌人路径，信标能稳定航线。",490,62,3],
      ["black","黑曜裂谷","北部边境","裂谷两侧都有炮台，必须持续清除小型无人机。",510,62,3],
      ["crown","王冠天线","北部边境","最后的天线阵列需要完整车队才能重新上线。",530,60,3],
      ["zero","零刻灯塔","终点","把十二条路线的信号汇成一束，完成零刻协议。",560,58,3]
    ];
    const ROUTES=ROUTE_SEEDS.map((item,index)=>{const [id,title,region,brief,length,hp,rank]=item;const events=[];const count=5+(index%4);for(let i=0;i<count;i++)events.push({at:Math.round(length*(.14+i*.14)),type:(i+index)%4===0?"ram":(i%3===0?"brute":"drone"),lane:(i*37+index*23)%3,damage:(i%3===0?12:8)+(rank-1)*2});return{id,title,region,brief,length,hp,rank,events,par:Math.ceil(length/16)+5,reference:[{at:20,action:"beacon"},{at:Math.round(length*.33),action:"pulse"},{at:Math.round(length*.56),action:"repair"},{at:Math.round(length*.78),action:"pulse"}]};});
    const STORAGE="miniSignalCaravanV2";const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d"),overlay=document.getElementById("overlay"),overlayTitle=document.getElementById("overlayTitle"),overlayText=document.getElementById("overlayText"),overlayBtn=document.getElementById("overlayBtn"),referenceBtn=document.getElementById("referenceBtn"),routeList=document.getElementById("routeList"),routeIntro=document.getElementById("routeIntro"),logEl=document.getElementById("log"),archiveBox=document.getElementById("archiveBox"),archiveText=document.getElementById("archiveText"),archiveFeedback=document.getElementById("archiveFeedback");const scoreText=document.getElementById("scoreText"),bestText=document.getElementById("bestText"),waveText=document.getElementById("waveText"),scrapText=document.getElementById("scrapText"),hpText=document.getElementById("hpText"),routeText=document.getElementById("routeText"),hpBar=document.getElementById("hpBar"),routeBar=document.getElementById("routeBar");
    let routeIndex=0,profile=loadProfile(),state=makeState(0),w=900,h=630,dpr=1,last=0,token=0;const keys=new Set(),pressed=new Set();
    function emptyProfile(){return{v:2,unlocked:0,stars:Array(12).fill(0),best:Array(12).fill(0),clears:0}}function normalize(p){return{v:2,unlocked:Math.max(0,Math.min(11,+p.unlocked||0)),stars:Array.from({length:12},(_,i)=>Math.max(0,Math.min(3,+p.stars?.[i]||0))),best:Array.from({length:12},(_,i)=>Math.max(0,+p.best?.[i]||0)),clears:Math.max(0,+p.clears||0)}}function loadProfile(){try{const p=JSON.parse(localStorage.getItem(STORAGE)||"null");return p?.v===2?normalize(p):emptyProfile()}catch{return emptyProfile()}}function saveProfile(){localStorage.setItem(STORAGE,JSON.stringify(profile))}
    function makeState(index){const route=ROUTES[index];return{mode:"menu",route:index,progress:0,hp:100,scrap:0,score:0,best:profile.best[index]||0,spawned:0,kills:0,beaconUses:0,beaconTime:0,beaconCooldown:0,repairCooldown:0,pulseCooldown:0,shotCooldown:0,time:0,player:{x:250,y:330,vx:0,vy:0},enemies:[],particles:[],logs:[`[START] ${route.title} · ${route.region}`],message:"",messageColor:"#fffdf4",messageTime:0,stars:0}};
    function route(){return ROUTES[state.route]||ROUTES[routeIndex]}function addLog(text){state.logs.unshift(text);state.logs=state.logs.slice(0,18);logEl.innerHTML=state.logs.map(line=>`<div>${line}</div>`).join("")}function message(text,color="#287468"){state.message=text;state.messageColor=color;state.messageTime=1.4;addLog(`[INFO] ${text}`)}
    function resize(){const rect=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,devicePixelRatio||1));w=Math.max(320,rect.width);h=Math.max(500,rect.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
    function start(){token++;state=makeState(routeIndex);state.mode="running";overlay.classList.add("hidden");last=performance.now();updateHud();requestAnimationFrame(now=>loop(now,token))}function reset(){start()}function togglePause(){if(state.mode==="running"){state.mode="paused";overlayTitle.textContent="车队暂停";overlayText.textContent="暂停期间敌袭不会推进。确认路线情报后继续护送。";overlayBtn.textContent="继续护送";referenceBtn.classList.add("hidden");overlay.classList.remove("hidden")}else if(state.mode==="paused"){state.mode="running";overlay.classList.add("hidden");last=performance.now();requestAnimationFrame(now=>loop(now,token))}}
    function loop(now,loopToken){if(loopToken!==token||state.mode!=="running")return;const dt=Math.min(.04,(now-last)/1000||.016);last=now;step(state,route(),dt,{keys,pressed});draw();requestAnimationFrame(t=>loop(t,loopToken))}
    function activate(action,s=state,r=route()){if(s.mode!=="running"&&s.mode!=="reference")return false;if(action==="repair"&&s.repairCooldown<=0&&s.scrap>0){s.scrap--;s.hp=Math.min(100,s.hp+20);s.repairCooldown=5;messageFor(s,"护盾修复完成", "#287468");return true}if(action==="pulse"&&s.pulseCooldown<=0){let hit=0;for(const enemy of s.enemies){if(enemy.hp>0){enemy.hp-=28;hit++}}s.pulseCooldown=6;if(hit)messageFor(s,`脉冲命中 ${hit} 个目标`, "#d6a33d");return true}if(action==="beacon"&&s.beaconCooldown<=0&&s.beaconUses<3){s.beaconUses++;s.beaconTime=8;s.beaconCooldown=12;messageFor(s,"临时信标上线，航速提升", "#8bd0bb");return true}if(action==="sweep"){const next=r.events[s.spawned];messageFor(s,next?`扫描：${Math.max(0,Math.round(next.at-s.progress))} 米后出现 ${enemyName(next.type)}`:"扫描：本路线已无未发现敌袭", "#326f91");return true}return false}
    function messageFor(s,text,color){s.message=text;s.messageColor=color;s.messageTime=1.2;if(s===state)addLog(`[INFO] ${text}`)}function enemyName(type){return type==="ram"?"冲车":type==="brute"?"重装": "无人机"}
    function step(s,r,dt,input={}){if(s.mode!=="running"&&s.mode!=="reference")return;s.time+=dt;s.messageTime=Math.max(0,s.messageTime-dt);s.beaconCooldown=Math.max(0,s.beaconCooldown-dt);s.repairCooldown=Math.max(0,s.repairCooldown-dt);s.pulseCooldown=Math.max(0,s.pulseCooldown-dt);s.beaconTime=Math.max(0,s.beaconTime-dt);const p=s.player;let ax=0,ay=0;const k=input.keys||new Set();if(k.has("KeyA")||k.has("ArrowLeft"))ax--;if(k.has("KeyD")||k.has("ArrowRight"))ax++;if(k.has("KeyW")||k.has("ArrowUp"))ay--;if(k.has("KeyS")||k.has("ArrowDown"))ay++;const len=Math.hypot(ax,ay)||1;p.vx+=(ax/len)*850*dt;p.vy+=(ay/len)*850*dt;p.vx*=Math.pow(.08,dt);p.vy*=Math.pow(.08,dt);p.x=Math.max(38,Math.min(w-38,p.x+p.vx*dt));p.y=Math.max(105,Math.min(h-62,p.y+p.vy*dt));if(input.pressed?.has("Space"))activate("pulse",s,r);input.pressed?.clear();const speed=16+(s.beaconTime>0?7:0);s.progress+=speed*dt;while(s.spawned<r.events.length&&r.events[s.spawned].at<=s.progress){const event=r.events[s.spawned++];s.enemies.push({id:s.spawned,type:event.type,lane:event.lane,hp:event.type==="ram"?44:event.type==="brute"?34:22,damage:event.damage,age:0,x:w+40,y:150+event.lane*(h-250)/2});s.scrap++;s.score+=15;messageFor(s,`${enemyName(event.type)}接近，获得 1 个零件`,"#d6a33d")}s.shotCooldown-=dt;if(s.shotCooldown<=0){const target=s.enemies.find(e=>e.hp>0&&Math.hypot(e.x-p.x,e.y-p.y)<330);if(target){target.hp-=11;s.shotCooldown=.36;s.particles.push({x:target.x,y:target.y,text:"-11",color:"#fffdf4",life:.7})}else s.shotCooldown=.08}for(const e of s.enemies){e.age+=dt;e.x-=((e.type==="ram"?72:e.type==="brute"?62:86)+(s.beaconTime>0?8:0))*dt;e.y+=Math.sin((s.time+e.id)*2)*dt*5;if(e.x<178){s.hp-=e.damage;e.hp=0;s.particles.push({x:180,y:e.y,text:`-${e.damage}`,color:"#bd5148",life:1});messageFor(s,"车队受到撞击", "#bd5148")}}for(let i=s.enemies.length-1;i>=0;i--){const e=s.enemies[i];if(e.hp<=0){s.kills++;s.score+=e.type==="ram"?90:e.type==="brute"?70:52;s.particles.push({x:e.x,y:e.y,text:"清除",color:"#8bd0bb",life:1});s.enemies.splice(i,1)}}for(const particle of s.particles){particle.life-=dt;particle.y-=dt*20}s.particles=s.particles.filter(particle=>particle.life>0);if(s.hp<=0)return finishState(s,r,false);if(s.progress>=r.length)return finishState(s,r,true)}
    function finishState(s,r,win){if(s.mode==="over")return;const testing=s.mode==="reference";s.mode="over";if(win){s.score+=Math.round(s.hp*8+s.beaconUses*100);s.stars=1+(s.hp>=r.hp?1:0)+(s.beaconUses>=1?1:0);if(s.kills>=r.events.length)s.stars=Math.max(s.stars,3);if(!testing){profile.stars[s.route]=Math.max(profile.stars[s.route],s.stars);profile.best[s.route]=Math.max(profile.best[s.route],s.score);profile.unlocked=Math.max(profile.unlocked,Math.min(11,s.route+1));profile.clears++;saveProfile()}}s.best=testing?s.score:profile.best[s.route]||s.score;if(testing)return;overlayTitle.textContent=win?`${r.title} · ${"★".repeat(s.stars)}${"☆".repeat(3-s.stars)}`:"车队失守";overlayText.textContent=win?`护送完成，车队护盾 ${Math.round(s.hp)}%，清除 ${s.kills}/${r.events.length} 波敌袭，获得 ${s.score} 分。`:`车队在 ${Math.round(s.progress)} 米处失守。维修和信标要提前使用。`;overlayBtn.textContent="再次护送";referenceBtn.classList.remove("hidden");overlay.classList.remove("hidden");updateHud()}
    function applyReference(index=routeIndex){routeIndex=Math.max(0,Math.min(11,index));const r=ROUTES[routeIndex];const s=makeState(routeIndex);s.mode="reference";let next=0;for(let t=0;t<r.length/16+18;t+=.1){while(next<r.reference.length&&s.progress>=r.reference[next].at){activate(r.reference[next].action,s,r);next++}if(s.hp<r.hp+8&&s.scrap>0&&s.repairCooldown<=0)activate("repair",s,r);step(s,r,.1,{keys:new Set(),pressed:new Set()});if(s.mode==="over")break}if(s.mode!=="over")finishState(s,r,s.progress>=r.length&&s.hp>0);return{ok:s.mode==="over"&&s.progress>=r.length,route:r.id,stars:s.stars,hp:Math.round(s.hp),score:s.score,kills:s.kills,beaconUses:s.beaconUses,steps:Math.ceil(s.time/.1)}}
    function validateContent(){const errors=[];for(const [i,r] of ROUTES.entries()){if(!r.id||r.events.length<5)errors.push(`route ${i} content`);const result=applyReference(i);if(!result.ok||result.stars!==3)errors.push(`route ${i} reference ${JSON.stringify(result)}`)}routeIndex=Math.min(profile.unlocked,11);state=makeState(routeIndex);renderAll();return{valid:errors.length===0,errors,routes:ROUTES.length,events:ROUTES.reduce((sum,r)=>sum+r.events.length,0),references:ROUTES.length}}
    function checksum(text){let hash=2166136261;for(let i=0;i<text.length;i++){hash^=text.charCodeAt(i);hash=Math.imul(hash,16777619)}return(hash>>>0).toString(36)}function encode(){const payload=btoa(unescape(encodeURIComponent(JSON.stringify({v:2,u:profile.unlocked,s:profile.stars,b:profile.best,c:profile.clears}))));return`BEACON2.${payload}.${checksum(payload)}`}function decode(code){const parts=String(code).trim().split(".");if(parts.length!==3||parts[0]!=="BEACON2"||checksum(parts[1])!==parts[2])throw Error("信标档案校验失败");const data=JSON.parse(decodeURIComponent(escape(atob(parts[1]))));if(data.v!==2)throw Error("信标档案版本不兼容");return normalize({v:2,unlocked:data.u,stars:data.s,best:data.b,clears:data.c})}
    function renderRoutes(){routeList.innerHTML=ROUTES.map((r,i)=>`<button class="route ${i===routeIndex?"active":""}" data-route="${i}" ${i>profile.unlocked?"disabled":""}><span><strong>${i+1}. ${r.title}</strong><small>${r.region} · ${r.brief}</small></span><b>${profile.stars[i]?"★".repeat(profile.stars[i]):i<=profile.unlocked?"待战":"锁定"}</b></button>`).join("");routeList.querySelectorAll("[data-route]").forEach(button=>button.onclick=()=>selectRoute(+button.dataset.route))}
    function selectRoute(index){if(index<0||index>profile.unlocked||index>11)return false;routeIndex=index;state=makeState(index);routeIntro.textContent=`${ROUTES[index].brief} 目标护盾 ${ROUTES[index].hp}% 以上。`;overlayTitle.textContent="选择护送模块";overlayText.textContent=`${ROUTES[index].title} · ${ROUTES[index].region}。固定敌袭共 ${ROUTES[index].events.length} 波，参考方案可用于复核路线难度。`;overlayBtn.textContent="开始护送";referenceBtn.classList.remove("hidden");overlay.classList.remove("hidden");renderAll();return true}
    function updateHud(){const r=route();scoreText.textContent=state.score;bestText.textContent=Math.max(state.best,state.score);waveText.textContent=`${state.spawned}/${r.events.length}`;scrapText.textContent=state.scrap;hpText.textContent=`${Math.max(0,Math.round(state.hp))}%`;routeText.textContent=`${Math.min(100,Math.round(state.progress/r.length*100))}%`;hpBar.style.width=`${Math.max(0,state.hp)}%`;hpBar.style.background=state.hp<r.hp?"linear-gradient(90deg,#bd5148,#d6a33d)":"linear-gradient(90deg,#326f91,#8bd0bb)";routeBar.style.width=`${Math.min(100,state.progress/r.length*100)}%`;routeIntro.textContent=`${r.brief} 目标护盾 ${r.hp}% 以上。`;document.querySelectorAll("[data-action]").forEach(button=>{const action=button.dataset.action;button.disabled=state.mode!=="running"||(action==="repair"&&(state.scrap<1||state.repairCooldown>0))||(action==="pulse"&&state.pulseCooldown>0)||(action==="beacon"&&(state.beaconCooldown>0||state.beaconUses>=3))});}
    function draw(){ctx.clearRect(0,0,w,h);const r=route();const bg=ctx.createLinearGradient(0,0,0,h);bg.addColorStop(0,"#142734");bg.addColorStop(1,"#26343b");ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);ctx.fillStyle="rgba(240,209,111,.06)";for(let i=0;i<44;i++){const x=(i*97-state.progress*2)%w,y=88+(i*53)%(h-150);ctx.fillRect(x,y,36,5)}ctx.strokeStyle="rgba(240,209,111,.45)";ctx.lineWidth=82;ctx.lineCap="round";ctx.beginPath();for(let x=-40;x<w+80;x+=22){const y=h*.54+Math.sin((x+state.progress*3)*.012)*34;x===-40?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.stroke();ctx.strokeStyle="rgba(255,253,244,.34)";ctx.lineWidth=3;ctx.setLineDash([17,17]);ctx.beginPath();for(let x=-40;x<w+80;x+=22){const y=h*.54+Math.sin((x+state.progress*3)*.012)*34;x===-40?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.stroke();ctx.setLineDash([]);drawGate(r);for(const e of state.enemies)drawEnemy(e);drawCar();drawPlayer();for(const p of state.particles){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.font="900 17px system-ui";ctx.textAlign="center";ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1}if(state.messageTime>0){ctx.fillStyle=state.messageColor;ctx.font="900 22px system-ui";ctx.textAlign="center";ctx.fillText(state.message,w/2,52)}}
    function drawGate(r){const end=Math.max(0,w-90-(r.length-state.progress)*.06);ctx.fillStyle="#17242b";ctx.fillRect(end-25,110,50,h-170);ctx.fillStyle="#d6a33d";ctx.fillRect(end-7,110,14,h-170);ctx.fillStyle="#fffdf4";ctx.font="900 14px system-ui";ctx.textAlign="center";ctx.fillText(`${Math.round(Math.min(r.length,state.progress))}m`,w-76,94)}function drawCar(){const x=150,y=h*.54+Math.sin(state.progress*.04)*34;ctx.save();ctx.translate(x,y);ctx.fillStyle="#17242b";round(-38,-21,76,42,8);ctx.fill();ctx.fillStyle="#287468";round(-33,-25,66,38,8);ctx.fill();ctx.fillStyle="#f0d16f";ctx.fillRect(-8,-38,16,25);ctx.fillStyle="#10191f";ctx.beginPath();ctx.arc(-24,22,9,0,Math.PI*2);ctx.arc(24,22,9,0,Math.PI*2);ctx.fill();ctx.restore()}function drawPlayer(){const p=state.player;ctx.fillStyle="#10191f";ctx.beginPath();ctx.arc(p.x,p.y+8,20,0,Math.PI*2);ctx.fill();ctx.fillStyle="#8bd0bb";ctx.beginPath();ctx.arc(p.x,p.y,17,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fffdf4";ctx.lineWidth=3;ctx.stroke();ctx.fillStyle="#f0d16f";ctx.fillRect(p.x+10,p.y-4,18,8)}function drawEnemy(e){ctx.save();ctx.translate(e.x,e.y);ctx.fillStyle=e.type==="ram"?"#bd5148":e.type==="brute"?"#d9823b":"#326f91";ctx.beginPath();ctx.arc(0,0,e.type==="ram"?20:e.type==="brute"?18:14,0,Math.PI*2);ctx.fill();ctx.fillStyle="#10191f";ctx.fillRect(-6,-4,12,8);ctx.restore()}function round(x,y,W,H,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+W,y,x+W,y+H,r);ctx.arcTo(x+W,y+H,x,y+H,r);ctx.arcTo(x,y+H,x,y,r);ctx.arcTo(x,y,x+W,y,r)}
    function renderAll(){renderRoutes();logEl.innerHTML=state.logs.map(line=>`<div>${line}</div>`).join("");updateHud();draw()}
    document.getElementById("startBtn").onclick=start;document.getElementById("resetBtn").onclick=reset;document.getElementById("pauseBtn").onclick=togglePause;overlayBtn.onclick=()=>state.mode==="paused"?togglePause():start;referenceBtn.onclick=()=>{const result=applyReference(routeIndex);overlayTitle.textContent=`参考方案：${result.stars} 星`;overlayText.textContent=`${route().title} 参考护送 ${result.ok?"通过":"未通过"}，护盾 ${result.hp}%、清除 ${result.kills} 波。`;overlayBtn.textContent="开始实战";overlay.classList.remove("hidden");renderAll()};document.querySelectorAll("[data-action]").forEach(button=>button.addEventListener("click",()=>{activate(button.dataset.action);updateHud()}));document.querySelectorAll("[data-key]").forEach(button=>{const code=button.dataset.key;button.addEventListener("pointerdown",event=>{event.preventDefault();keys.add(code);pressed.add(code)});button.addEventListener("pointerup",event=>{event.preventDefault();keys.delete(code)});button.addEventListener("pointercancel",()=>keys.delete(code));button.addEventListener("pointerleave",()=>keys.delete(code))});document.addEventListener("keydown",event=>{if(["KeyW","KeyA","KeyS","KeyD","Space","ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(event.code))event.preventDefault();if(!keys.has(event.code))pressed.add(event.code);keys.add(event.code);if(event.code==="KeyP")togglePause();if(event.code==="KeyR")reset()});document.addEventListener("keyup",event=>keys.delete(event.code));document.getElementById("archiveBtn").onclick=()=>{archiveText.value=encode();archiveFeedback.textContent="";archiveBox.classList.remove("hidden")};document.getElementById("closeArchiveBtn").onclick=()=>archiveBox.classList.add("hidden");document.getElementById("exportBtn").onclick=async()=>{archiveText.value=encode();archiveText.select();try{await navigator.clipboard.writeText(archiveText.value);archiveFeedback.textContent="档案已复制"}catch{archiveFeedback.textContent="档案已生成，请手动复制"}};document.getElementById("importBtn").onclick=()=>{try{profile=decode(archiveText.value);saveProfile();routeIndex=Math.min(profile.unlocked,11);state=makeState(routeIndex);archiveFeedback.textContent="导入成功";renderAll()}catch(error){archiveFeedback.textContent=error.message}};window.addEventListener("resize",resize);window.__signalCaravan={ROUTES,profile:()=>profile,state:()=>state,selectRoute,start,step,activate,applyReference,simulateReference:applyReference,validateContent,encode,decode,renderAll};resize();renderAll();
  })();
  </script>
