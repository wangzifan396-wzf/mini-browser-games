<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>信标车队</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23101824'/%3E%3Cpath d='M14 42h36v10H14z' fill='%23287468'/%3E%3Ccircle cx='22' cy='52' r='5' fill='%23f0d16f'/%3E%3Ccircle cx='42' cy='52' r='5' fill='%23f0d16f'/%3E%3Cpath d='M32 12v20m-10-8 10-12 10 12' stroke='%238bd0bb' stroke-width='5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
    <style>
      :root{--ink:#10191f;--panel:#fffdf4;--line:#87989e;--teal:#287468;--gold:#d6a33d;--red:#bd5148;--blue:#326f91;--shadow:rgba(5,12,16,.28);--radius:8px}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,sans-serif;background:linear-gradient(rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(135deg,#0c1824,#223b39 48%,#403444);background-size:30px 30px,30px 30px,auto}button{font:inherit}.app{width:min(1380px,calc(100vw - 28px));margin:14px auto}.topbar,.panel{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,244,.97);box-shadow:0 16px 36px var(--shadow)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px}.eyebrow{margin:0 0 5px;color:#856219;font-size:12px;font-weight:900}h1{margin:0;font-size:clamp(26px,4vw,44px);line-height:1}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:42px;padding:0 14px;border:1px solid #24534d;border-radius:var(--radius);color:#fffdf6;background:var(--teal);font-weight:900;cursor:pointer}.btn.secondary{color:var(--ink);background:#f0d17b;border-color:#9c7621}.layout{display:grid;grid-template-columns:minmax(0,1fr) 318px;gap:14px;margin-top:14px;align-items:start}.stage{position:relative;overflow:hidden;min-height:630px}canvas{display:block;width:100%;height:630px;touch-action:none}.side{padding:16px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.stat{padding:10px;border:1px solid #9da69e;border-radius:var(--radius);background:#f9f7eb}.stat b{display:block;font-size:24px;line-height:1.1}.stat small{color:#5e6d67;font-weight:800}.meter{margin:0 0 13px}.meter span{display:flex;justify-content:space-between;margin-bottom:6px;color:#5e6d67;font-weight:900}.bar{height:13px;border:1px solid #84968f;border-radius:999px;overflow:hidden;background:#e9eadc}.bar i{display:block;width:100%;height:100%;background:linear-gradient(90deg,var(--blue),#8bd0bb)}.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.pad button{min-height:52px;border:1px solid #758780;border-radius:var(--radius);background:#fff8e6;color:var(--ink);font-weight:900;cursor:pointer}.pad .blank{visibility:hidden}.pad .skill{background:#e7f3ef}.hint{margin:14px 0 0;color:#566861;line-height:1.55;font-weight:700}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:24px;background:rgba(16,28,31,.52)}.modal{width:min(470px,100%);padding:22px;border:1px solid #a4b4ad;border-radius:var(--radius);background:#fffdf6;box-shadow:0 24px 52px rgba(0,0,0,.32)}.modal h2{margin:0 0 10px;font-size:28px}.modal p{margin:0 0 16px;color:#53635f;line-height:1.6}.hidden{display:none}@media(max-width:940px){.layout{grid-template-columns:1fr}.side{order:-1}.stage{min-height:540px}canvas{height:540px}}@media(max-width:620px){.app{width:min(100vw - 16px,1380px);margin-top:8px}.topbar{display:block;padding:14px}.actions{margin-top:12px;justify-content:stretch}.btn{flex:1 1 auto}.stage{min-height:500px}canvas{height:500px}.stat b{font-size:21px}.pad button{font-size:14px}}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div><p class="eyebrow">ESCORT ACTION</p><h1>信标车队</h1></div>
        <div class="actions"><button class="btn" id="startBtn">出发</button><button class="btn secondary" id="pauseBtn">暂停</button><button class="btn secondary" id="resetBtn">重开</button></div>
      </header>
      <section class="layout">
        <div class="panel stage"><canvas id="gameCanvas" aria-label="信标车队游戏画面"></canvas><div class="overlay" id="overlay"><div class="modal"><h2 id="overlayTitle">穿过废城</h2><p id="overlayText">护送信标车到达终点。车队会自动前进，你负责移动护卫、清障、放下临时信标塔。</p><button class="btn" id="overlayBtn">启动车队</button></div></div></div>
        <aside class="panel side">
          <div class="stats"><div class="stat"><b id="scoreText">0</b><small>分数</small></div><div class="stat"><b id="bestText">0</b><small>最佳</small></div><div class="stat"><b id="waveText">1</b><small>路段</small></div><div class="stat"><b id="scrapText">0</b><small>零件</small></div></div>
          <div class="meter"><span><b>车队耐久</b><em id="hpText">100%</em></span><div class="bar"><i id="hpBar"></i></div></div>
          <div class="meter"><span><b>路程</b><em id="routeText">0%</em></span><div class="bar"><i id="routeBar"></i></div></div>
          <div class="meter"><span><b>信标冷却</b><em id="towerText">就绪</em></span><div class="bar"><i id="towerBar"></i></div></div>
          <div class="pad">
            <button class="blank"></button><button data-key="KeyW">上</button><button class="blank"></button>
            <button data-key="KeyA">左</button><button class="skill" data-key="Space">信标</button><button data-key="KeyD">右</button>
            <button class="blank"></button><button data-key="KeyS">下</button><button class="blank"></button>
          </div>
          <p class="hint">WASD / 方向键移动护卫，靠近敌人会自动射击。空格放置信标塔，拾取零件可修车并加分。</p>
        </aside>
      </section>
    </main>
    <script>
      (()=> {
        const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d"),overlay=document.getElementById("overlay"),overlayTitle=document.getElementById("overlayTitle"),overlayText=document.getElementById("overlayText"),overlayBtn=document.getElementById("overlayBtn"),startBtn=document.getElementById("startBtn"),pauseBtn=document.getElementById("pauseBtn"),resetBtn=document.getElementById("resetBtn");
        const scoreText=document.getElementById("scoreText"),bestText=document.getElementById("bestText"),waveText=document.getElementById("waveText"),scrapText=document.getElementById("scrapText"),hpText=document.getElementById("hpText"),routeText=document.getElementById("routeText"),towerText=document.getElementById("towerText"),hpBar=document.getElementById("hpBar"),routeBar=document.getElementById("routeBar"),towerBar=document.getElementById("towerBar");
        const storageKey="miniSignalCaravanRecords";let w=900,h=630,dpr=1,last=0,loopToken=0;const keys=new Set(),pressed=new Set();let state=makeState();
        function loadBest(){try{return JSON.parse(localStorage.getItem(storageKey)||"{}").best||0}catch(e){return 0}}function saveBest(v){const b=Math.max(loadBest(),v);localStorage.setItem(storageKey,JSON.stringify({best:b}));return b}
        function makeState(){return{mode:"menu",score:0,best:loadBest(),route:0,wave:1,hp:100,scrap:0,nextEnemy:0,towerCd:0,time:0,msg:"",msgTimer:0,player:{x:180,y:330,vx:0,vy:0,shoot:0},car:{x:120,y:330},enemies:[],shots:[],towers:[],parts:[],particles:[]}}
        function resize(){const r=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,devicePixelRatio||1));w=Math.max(320,r.width);h=Math.max(500,r.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
        function start(){loopToken++;state=makeState();state.mode="running";overlay.classList.add("hidden");last=performance.now();updateHud();requestAnimationFrame(t=>loop(t,loopToken))}
        function togglePause(){if(state.mode==="running"){state.mode="paused";overlayTitle.textContent="车队待命";overlayText.textContent="暂停时敌人不会推进。";overlayBtn.textContent="继续护送";overlay.classList.remove("hidden");pauseBtn.textContent="继续"}else if(state.mode==="paused"){state.mode="running";overlay.classList.add("hidden");pauseBtn.textContent="暂停";last=performance.now();requestAnimationFrame(t=>loop(t,loopToken))}}
        function finish(win){if(state.mode==="over")return;state.mode="over";if(win)state.score+=Math.round(state.hp*12+state.scrap*40);state.best=saveBest(state.score);overlayTitle.textContent=win?"信标抵达":"车队失守";overlayText.textContent=`路段 ${state.wave}，分数 ${state.score}，最佳 ${state.best}。`;overlayBtn.textContent="再护送一次";overlay.classList.remove("hidden");updateHud()}
        function loop(now,token){if(token!==loopToken||state.mode!=="running")return;const dt=Math.min(.033,(now-last)/1000||.016);last=now;update(dt);draw();requestAnimationFrame(t=>loop(t,token))}
        function update(dt){state.time+=dt;state.route+=dt*(7+state.wave*.9);state.wave=1+Math.floor(state.route/120);if(state.route>=360)finish(true);state.car.x=110+state.route*1.25;state.car.y=h*.52+Math.sin(state.route*.04)*40;control(dt);spawn(dt);autoShoot(dt);towerShoot(dt);moveShots(dt);moveEnemies(dt);collectParts(dt);state.towerCd=Math.max(0,state.towerCd-dt);state.msgTimer=Math.max(0,state.msgTimer-dt);state.particles=state.particles.filter(p=>{p.life-=dt;p.y-=dt*28;return p.life>0});if(state.hp<=0)finish(false);updateHud()}
        function control(dt){const p=state.player;let ax=0,ay=0;if(keys.has("KeyA")||keys.has("ArrowLeft"))ax--;if(keys.has("KeyD")||keys.has("ArrowRight"))ax++;if(keys.has("KeyW")||keys.has("ArrowUp"))ay--;if(keys.has("KeyS")||keys.has("ArrowDown"))ay++;const len=Math.hypot(ax,ay)||1;p.vx+=(ax/len)*900*dt;p.vy+=(ay/len)*900*dt;p.vx*=Math.pow(.08,dt);p.vy*=Math.pow(.08,dt);p.x=Math.max(28,Math.min(w-28,p.x+p.vx*dt));p.y=Math.max(90,Math.min(h-56,p.y+p.vy*dt));if(pressed.has("Space"))placeTower();pressed.clear()}
        function placeTower(){if(state.towerCd>0||state.scrap<1&&state.towers.length>=1)return;state.towers.push({x:state.player.x,y:state.player.y,life:13,cd:0});state.towerCd=5.5;if(state.scrap>0)state.scrap--;message("信标塔部署","#8bd0bb")}
        function spawn(dt){state.nextEnemy-=dt;if(state.nextEnemy<=0){state.nextEnemy=Math.max(.35,1.3-state.wave*.08);const side=Math.random()<.5?0:1,x=side?w+40:-40,y=100+Math.random()*(h-170),type=Math.random()<.18+state.wave*.015?"ram":"drone";state.enemies.push({x,y,vx:0,vy:0,r:type==="ram"?19:14,hp:type==="ram"?38:22,type,hit:0})}}
        function nearest(x,y,range){let best=null,bd=range;for(const e of state.enemies){const d=Math.hypot(e.x-x,e.y-y);if(d<bd){bd=d;best=e}}return best}
        function autoShoot(dt){const p=state.player;p.shoot-=dt;const e=nearest(p.x,p.y,250);if(e&&p.shoot<=0){shoot(p.x,p.y,e,230,14,"#f0d16f");p.shoot=.24}}
        function towerShoot(dt){for(const t of state.towers){t.life-=dt;t.cd-=dt;const e=nearest(t.x,t.y,210);if(e&&t.cd<=0){shoot(t.x,t.y,e,190,10,"#8bd0bb");t.cd=.45}}state.towers=state.towers.filter(t=>t.life>0)}
        function shoot(x,y,e,speed,damage,color){const a=Math.atan2(e.y-y,e.x-x);state.shots.push({x,y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,damage,color,life:1.6})}
        function moveShots(dt){for(let i=state.shots.length-1;i>=0;i--){const s=state.shots[i];s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt;let used=s.life<=0;for(const e of state.enemies){if(!used&&Math.hypot(e.x-s.x,e.y-s.y)<e.r+5){e.hp-=s.damage;e.hit=.12;used=true;pop(e.x,e.y,"-","#fffdf4")}}if(used)state.shots.splice(i,1)}for(let i=state.enemies.length-1;i>=0;i--){const e=state.enemies[i];if(e.hp<=0){state.score+=e.type==="ram"?90:60;if(Math.random()<.55)state.parts.push({x:e.x,y:e.y,life:8});pop(e.x,e.y,"零件","#d6a33d");state.enemies.splice(i,1)}}}
        function moveEnemies(dt){for(const e of state.enemies){e.hit=Math.max(0,e.hit-dt);const target=Math.hypot(e.x-state.car.x,e.y-state.car.y)<210?state.car:state.player,a=Math.atan2(target.y-e.y,target.x-e.x),speed=e.type==="ram"?72+state.wave*7:96+state.wave*8;e.vx+=Math.cos(a)*speed*dt*3;e.vy+=Math.sin(a)*speed*dt*3;e.vx*=Math.pow(.18,dt);e.vy*=Math.pow(.18,dt);e.x+=e.vx*dt;e.y+=e.vy*dt;if(Math.hypot(e.x-state.car.x,e.y-state.car.y)<e.r+30){state.hp-=e.type==="ram"?18:10;e.hp=0;message("车队受击","#bd5148")}if(Math.hypot(e.x-state.player.x,e.y-state.player.y)<e.r+18){state.hp-=dt*7}}}
        function collectParts(dt){for(let i=state.parts.length-1;i>=0;i--){const p=state.parts[i];p.life-=dt;if(Math.hypot(p.x-state.player.x,p.y-state.player.y)<34){state.parts.splice(i,1);state.scrap++;state.hp=Math.min(100,state.hp+5);state.score+=45;message("拾取零件","#f0d16f")}else if(p.life<=0)state.parts.splice(i,1)}}
        function message(text,color){state.msg=text;state.msgColor=color;state.msgTimer=1}
        function pop(x,y,text,color){state.particles.push({x,y,text,color,life:1})}
        function draw(){ctx.clearRect(0,0,w,h);const bg=ctx.createLinearGradient(0,0,0,h);bg.addColorStop(0,"#162633");bg.addColorStop(1,"#25313b");ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);drawRoad();for(const t of state.towers)drawTower(t);for(const p of state.parts)drawPart(p);for(const s of state.shots)drawShot(s);for(const e of state.enemies)drawEnemy(e);drawCar();drawPlayer();for(const p of state.particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.font="900 18px system-ui";ctx.textAlign="center";ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1}if(state.msgTimer>0){ctx.fillStyle=state.msgColor||"#fffdf4";ctx.font="900 24px system-ui";ctx.textAlign="center";ctx.fillText(state.msg,w/2,54)}}
        function drawRoad(){ctx.strokeStyle="rgba(240,209,111,.45)";ctx.lineWidth=76;ctx.lineCap="round";ctx.beginPath();for(let x=-40;x<w+80;x+=24){const y=h*.52+Math.sin((x+state.route*5)*.012)*40;if(x===-40)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();ctx.strokeStyle="rgba(255,253,244,.28)";ctx.lineWidth=3;ctx.setLineDash([18,18]);ctx.beginPath();for(let x=-40;x<w+80;x+=24){const y=h*.52+Math.sin((x+state.route*5)*.012)*40;if(x===-40)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();ctx.setLineDash([]);ctx.fillStyle="rgba(255,253,244,.08)";for(let i=0;i<38;i++){const x=(i*97-state.route*17)%w,y=90+(i*53)%(h-160);ctx.fillRect(x,y,34,6)}}
        function drawCar(){const c=state.car;ctx.save();ctx.translate(c.x,c.y);ctx.fillStyle="#17242b";round(-34,-19,68,38,8);ctx.fill();ctx.fillStyle="#287468";round(-30,-23,60,36,8);ctx.fill();ctx.fillStyle="#f0d16f";ctx.fillRect(-8,-35,16,22);ctx.fillStyle="#10191f";ctx.beginPath();ctx.arc(-22,20,8,0,Math.PI*2);ctx.arc(22,20,8,0,Math.PI*2);ctx.fill();ctx.restore()}
        function drawPlayer(){const p=state.player;ctx.fillStyle="#10191f";ctx.beginPath();ctx.arc(p.x,p.y+8,19,0,Math.PI*2);ctx.fill();ctx.fillStyle="#8bd0bb";ctx.beginPath();ctx.arc(p.x,p.y,17,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fffdf4";ctx.lineWidth=3;ctx.stroke();ctx.fillStyle="#f0d16f";ctx.fillRect(p.x+10,p.y-4,18,8)}
        function drawEnemy(e){ctx.fillStyle=e.type==="ram"?"#bd5148":"#d9823b";ctx.globalAlpha=e.hit>0?.55:1;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle="#10191f";ctx.fillRect(e.x-5,e.y-4,10,8)}
        function drawTower(t){ctx.fillStyle="rgba(139,208,187,.14)";ctx.beginPath();ctx.arc(t.x,t.y,210,0,Math.PI*2);ctx.fill();ctx.fillStyle="#326f91";round(t.x-12,t.y-12,24,24,6);ctx.fill();ctx.fillStyle="#f0d16f";ctx.beginPath();ctx.arc(t.x,t.y-20,8,0,Math.PI*2);ctx.fill()}
        function drawPart(p){ctx.fillStyle="#d6a33d";ctx.save();ctx.translate(p.x,p.y);ctx.rotate(state.time*2);ctx.fillRect(-8,-8,16,16);ctx.restore()}
        function drawShot(s){ctx.strokeStyle=s.color;ctx.lineWidth=4;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*.04,s.y-s.vy*.04);ctx.stroke()}
        function round(x,y,W,H,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+W,y,x+W,y+H,r);ctx.arcTo(x+W,y+H,x,y+H,r);ctx.arcTo(x,y+H,x,y,r);ctx.arcTo(x,y,x+W,y,r)}
        function updateHud(){scoreText.textContent=state.score.toString();bestText.textContent=Math.max(state.best,state.score).toString();waveText.textContent=state.wave.toString();scrapText.textContent=state.scrap.toString();hpText.textContent=`${Math.round(state.hp)}%`;routeText.textContent=`${Math.min(100,Math.round(state.route/360*100))}%`;towerText.textContent=state.towerCd<=0?"就绪":`${state.towerCd.toFixed(1)}s`;hpBar.style.width=`${Math.max(0,state.hp)}%`;hpBar.style.background=state.hp<35?"linear-gradient(90deg,#bd5148,#d6a33d)":"linear-gradient(90deg,var(--blue),#8bd0bb)";routeBar.style.width=`${Math.min(100,state.route/360*100)}%`;towerBar.style.width=`${state.towerCd<=0?100:(1-state.towerCd/5.5)*100}%`}
        startBtn.addEventListener("click",start);resetBtn.addEventListener("click",start);pauseBtn.addEventListener("click",togglePause);overlayBtn.addEventListener("click",()=>state.mode==="paused"?togglePause():start());
        document.querySelectorAll("[data-key]").forEach(btn=>{const code=btn.dataset.key;btn.addEventListener("pointerdown",e=>{e.preventDefault();keys.add(code);pressed.add(code)});btn.addEventListener("pointerup",e=>{e.preventDefault();keys.delete(code)});btn.addEventListener("pointercancel",()=>keys.delete(code));btn.addEventListener("pointerleave",()=>keys.delete(code))});
        document.addEventListener("keydown",e=>{if(["KeyW","KeyA","KeyS","KeyD","Space","ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.code))e.preventDefault();if(!keys.has(e.code))pressed.add(e.code);keys.add(e.code);if(e.code==="KeyP")togglePause();if(e.code==="KeyR")start()});document.addEventListener("keyup",e=>keys.delete(e.code));window.addEventListener("resize",resize);resize();updateHud();draw();
      })();
    </script>
  </body>
</html>
