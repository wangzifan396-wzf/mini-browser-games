gold);color:white}.phase.done{border-color:#4c956b;background:#213d31;color:#daf3e4}.witness{text-align:center}.avatar{font-size:58px;line-height:1}.witness h3{margin:5px 0}.statement{min-height:116px;padding:17px;border:1px solid #74768c;border-radius:11px;background:#151725dd;display:grid;place-items:center;text-align:center;font-size:18px;line-height:1.55}.statement-index{margin:8px 0;color:var(--muted);font-size:12px;text-align:center}.evidence{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:12px 0}.ev{min-height:92px;padding:6px;border:1px solid #72758b;border-radius:8px;background:#292c41;color:white;cursor:pointer}.ev.sel{outline:3px solid var(--gold);background:#3f3c45}.ev.locked{filter:grayscale(1);opacity:.43}.ev b,.ev small,.ev span{display:block}.ev b{font-size:12px}.ev small{font-size:19px;margin:3px}.ev span{font-size:9px;color:var(--muted);line-height:1.3}.exam-actions{justify-content:center}.object{min-height:48px;background:#963f45;border-color:#c46367;font-size:17px}.press{background:#846326;border-color:#aa8439}.feedback{min-height:46px;margin-top:9px;padding:8px;border:1px solid #686b82;border-radius:8px;background:#1d1f31;color:#d1d1dc;font-size:12px;line-height:1.45}.closing{display:grid;gap:12px;max-width:650px;margin:54px auto 0;padding:20px;border:1px solid #8b7e6d;border-radius:12px;background:#f3eadc;color:#2c2930}.closing.hidden,.exam.hidden{display:none}.closing h2{margin:0}.closing p{margin:0;color:#625a5d}.closing label{display:grid;gap:5px;font-size:12px;font-weight:850}.closing select{min-height:43px;padding:0 8px;border:1px solid #8c8177;border-radius:8px;background:white;color:#29272c}.side{padding:12px;display:grid;gap:10px;max-height:calc(100vh - 105px);overflow:auto}.block{padding:11px;border:1px solid #626579;border-radius:10px;background:var(--panel2)}.block h2,.block h3{margin:0 0 8px}.block h2{font-size:20px}.block h3{font-size:14px;color:var(--gold)}.cases{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}.case-btn{min-height:58px;padding:5px;border:1px solid #696c83;border-radius:8px;background:#303349;color:white;cursor:pointer}.case-btn.active{outline:3px solid var(--gold)}.case-btn:disabled{opacity:.36}.case-btn b,.case-btn small{display:block}.case-btn small{font-size:9px;color:var(--muted);margin-top:3px}.stars{color:var(--gold);font-size:10px}.goals{display:grid;gap:5px}.goal{padding:7px;border:1px solid #64677a;border-radius:7px;color:var(--muted);font-size:11px}.goal.pass{border-color:#4d9168;background:#20382d;color:#dcf3e4}.log{height:145px;overflow:auto;color:#bec0ce;font-size:11px;line-height:1.55}.career{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.career div{padding:7px;border:1px solid #616478;border-radius:8px;background:#282b40;text-align:center}.career b{display:block;font-size:19px}.career small{font-size:9px;color:var(--muted)}.tip{color:var(--muted);font-size:12px;line-height:1.5}.archive{position:fixed;inset:0;z-index:9;display:grid;place-items:center;padding:18px;background:rgba(10,9,14,.87)}.archive.hidden{display:none}.dialog{width:min(620px,100%);padding:18px;border:1px solid #777a91;border-radius:14px;background:#292b3f}.dialog h2{margin:0 0 8px}.dialog textarea{width:100%;min-height:125px;padding:10px;border:1px solid #74778d;border-radius:8px;background:#171927;color:white;resize:vertical}.archive-feedback{min-height:20px;margin-top:7px;color:var(--gold);font-size:12px;font-weight:850}

<body>
<main class="app">
  <header class="top"><div><p class="eyebrow">CROSS-EXAMINATION CAMPAIGN</p><h1>逆转法庭：六案终审</h1><p class="sub">六案十八段证词 · 逐句追问 · 隐藏证物 · 连续异议 · 结案论证</p></div><div class="actions"><button class="btn red" id="restartBtn">重开本案</button><button class="btn gold" id="archiveBtn">律师档案</button></div></header>
  <section class="layout">
    <section class="panel court">
      <div class="case-head"><div><h2 id="caseTitle"></h2><p id="caseSubtitle"></p></div><div><small>法庭可信度</small><div class="credibility" id="credibility"></div></div></div>
      <div class="phase-track" id="phaseTrack"></div>
      <div class="exam" id="examView">
        <div class="witness"><div class="avatar" id="avatar"></div><h3 id="witnessName"></h3></div>
        <div class="statement" id="statement"></div><div class="statement-index"><button class="btn" id="prevBtn">←</button>　证词 <b id="lineNo"></b>　<button class="btn" id="nextBtn">→</button></div>
        <div class="evidence" id="evidenceList"></div>
        <div class="row exam-actions"><button class="btn press" id="pressBtn">追问当前证词</button><button class="btn object" id="objectBtn">异议！提交证物</button></div>
        <div class="feedback" id="feedback">先阅读证词；追问能得到细节，有些证物只会在追问后公开。</div>
      </div>
      <div class="closing hidden" id="closingView"><h2>结案论证</h2><p>三段证词已被击破。现在把证物链还原成唯一结论。</p><label>责任人<select id="culpritSelect"></select></label><label>实施方式<select id="methodSelect"></select></label><button class="btn red" id="closeCaseBtn">提交最终论证</button><div class="feedback" id="closingFeedback"></div></div>
    </section>
    <aside class="panel side">
      <section class="block"><h3>案件卷宗</h3><div class="cases" id="caseList"></div></section>
      <section class="block"><h2>本案评价</h2><div class="goals" id="goals"></div><p class="tip">结案获得一星；全程零错误、追问不超过四次分别增加一星。必要追问不会破坏三星。</p></section>
      <section class="block"><h3>庭审记录</h3><div class="log" id="log"></div></section>
      <section class="block"><h3>律师生涯</h3><div class="career"><div><b id="totalStars">0</b><small>总星章</small></div><div><b id="solvedCases">0</b><small>结案件数</small></div><div><b id="perfectCases">0</b><small>无误案件</small></div></div></section>
    </aside>
  </section>
</main>
<div class="archive hidden" id="archiveModal"><div class="dialog"><h2>跨设备律师档案</h2><p class="tip">档案包含六案星级、最佳错误数、解锁进度和结案纪录。</p><textarea id="archiveText" spellcheck="false"></textarea><div class="row" style="justify-content:flex-end;margin-top:8px"><button class="btn" id="closeArchiveBtn">关闭</button><button class="btn" id="importBtn">导入</button><button class="btn gold" id="exportBtn">生成并复制</button></div><div class="archive-feedback" id="archiveFeedback"></div></div></div>
