            ctx.arc(tower.x, tower.y, tower.range, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
          }

          for (const objective of entities.objectives) {
            if (
              !objective.alive ||
              distance(player, objective) >= objective.range + 120
            )
              continue;
            ctx.strokeStyle = "rgba(244, 202, 88, 0.28)";
            ctx.fillStyle = "rgba(244, 202, 88, 0.04)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(objective.x, objective.y, objective.range, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
          }

          if (player.target?.alive) {
            ctx.strokeStyle = "rgba(244, 202, 88, 0.72)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.target.x, player.target.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(
              player.target.x,
              player.target.y,
              player.target.r + 10,
              0,
              Math.PI * 2,
            );
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawAbilityPreview() {
          if (!queuedAbility || !player?.alive) return;
          const def = abilityDefs[queuedAbility];
          const n = normalize(pointer.x - player.x, pointer.y - player.y);
          const range = Math.min(def.range, n.len || def.range);
          const end = {
            x: player.x + n.x * range,
            y: player.y + n.y * range,
          };

          ctx.save();
          ctx.strokeStyle = "rgba(244, 202, 88, 0.86)";
          ctx.fillStyle = "rgba(244, 202, 88, 0.12)";
          ctx.lineWidth = 3;
          if (queuedAbility === "q") {
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + n.x * def.range, player.y + n.y * def.range);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(end.x, end.y, 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
          } else if (queuedAbility === "w") {
            ctx.setLineDash([14, 10]);
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(end.x, end.y);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.arc(end.x, end.y, player.r + 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
          } else {
            const radius = queuedAbility === "r" ? 124 : 88;
            ctx.beginPath();
            ctx.arc(end.x, end.y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(end.x, end.y);
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawMap() {
          const bg = ctx.createLinearGradient(0, 0, WORLD_W, WORLD_H);
          bg.addColorStop(0, "#254336");
          bg.addColorStop(0.5, "#1c362b");
          bg.addColorStop(1, "#2a301f");
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, WORLD_W, WORLD_H);

          drawRiver();
          ctx.fillStyle = "#173025";
          drawForest(0, 0, 360, 320);
          drawForest(1320, 760, 480, 420);
          drawForest(0, 1035, 360, 145);
          drawForest(1530, 0, 270, 235);
          drawForest(675, 780, 255, 230);
          drawForest(930, 175, 245, 230);
          drawJungleOrnaments();
          drawJungleCampGrounds();

          ctx.strokeStyle = "rgba(86, 145, 113, 0.26)";
          ctx.lineWidth = 42;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(285, 1085);
          ctx.bezierCurveTo(525, 865, 650, 750, 910, 600);
          ctx.bezierCurveTo(1150, 460, 1345, 290, 1555, 90);
          ctx.stroke();

          for (const lane of lanes) drawLane(lane.points);
          drawLanePressure();

          drawBaseAura(170, 1000, teamColor[BLUE]);
          drawBaseAura(1630, 180, teamColor[RED]);
        }

        function drawLanePressure() {
          ctx.save();
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = "800 13px 'Segoe UI', sans-serif";
          for (let laneIndex = 0; laneIndex < lanes.length; laneIndex += 1) {
            const lane = lanes[laneIndex];
            const blueCount = entities.minions.filter(
              (m) => m.alive && m.team === BLUE && m.lane === laneIndex,
            ).length;
            const redCount = entities.minions.filter(
              (m) => m.alive && m.team === RED && m.lane === laneIndex,
            ).length;
            const diff = clamp(blueCount - redCount, -6, 6);
            const mid = lane.points[Math.floor(lane.points.length / 2)];
            const x = mid.x + diff * 9;
            const y = mid.y - 42;
            ctx.fillStyle =
              diff >= 0
                ? "rgba(78, 197, 232, 0.18)"
                : "rgba(255, 108, 95, 0.18)";
            ctx.strokeStyle =
              diff >= 0
                ? "rgba(78, 197, 232, 0.54)"
                : "rgba(255, 108, 95, 0.54)";
            ctx.lineWidth = 2;
            roundRect(x - 42, y - 15, 84, 30, 8);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = "rgba(240, 247, 237, 0.86)";
            ctx.fillText(lane.name + " " + Math.abs(diff), x, y);
          }
          ctx.restore();
        }

        function drawRiver() {
          const river = ctx.createLinearGradient(260, 1080, 1580, 100);
          river.addColorStop(0, "rgba(69, 151, 145, 0.2)");
          river.addColorStop(0.5, "rgba(79, 197, 232, 0.22)");
          river.addColorStop(1, "rgba(69, 151, 145, 0.16)");
          ctx.strokeStyle = river;
          ctx.lineWidth = 86;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(250, 1040);
          ctx.bezierCurveTo(510, 890, 650, 725, 900, 595);
          ctx.bezierCurveTo(1160, 455, 1370, 270, 1580, 95);
          ctx.stroke();

          ctx.strokeStyle = "rgba(222, 246, 236, 0.12)";
          ctx.lineWidth = 2;
          for (let i = 0; i < 10; i += 1) {
            ctx.beginPath();
            ctx.moveTo(330 + i * 126, 990 - i * 88);
            ctx.quadraticCurveTo(
              382 + i * 118,
              956 - i * 90,
              438 + i * 126,
              930 - i * 88,
            );
            ctx.stroke();
          }
        }

        function drawForest(x, y, w, h) {
          ctx.fillStyle = "#173025";
          ctx.beginPath();
          ctx.rect(x, y, w, h);
          ctx.fill();
          ctx.fillStyle = "rgba(84, 135, 82, 0.16)";
          for (let i = 0; i < 18; i += 1) {
            const px = x + ((i * 47) % Math.max(1, w));
            const py = y + ((i * 31) % Math.max(1, h));
            ctx.beginPath();
            ctx.arc(px, py, 18 + (i % 4) * 5, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        function drawJungleOrnaments() {
          const stones = [
            [455, 765, 18],
            [500, 812, 11],
            [1310, 415, 16],
            [1368, 452, 12],
            [735, 410, 13],
            [1015, 755, 15],
            [340, 820, 10],
            [1510, 300, 11],
            [690, 980, 16],
            [1110, 230, 14],
          ];
          for (const [x, y, r] of stones) {
            ctx.fillStyle = "rgba(202, 211, 177, 0.12)";
            ctx.beginPath();
            ctx.ellipse(x, y, r, r * 0.62, -0.35, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.strokeStyle = "rgba(103, 215, 132, 0.16)";
          ctx.lineWidth = 3;
          for (let i = 0; i < 38; i += 1) {
            const x = 120 + ((i * 181) % (WORLD_W - 240));
            const y = 95 + ((i * 137) % (WORLD_H - 190));
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + Math.sin(i) * 16, y - 18 - (i % 3) * 7);
            ctx.stroke();
          }
        }

        function drawJungleCampGrounds() {
          for (const spot of jungleCampSpots) {
            ctx.save();
            ctx.translate(spot.x, spot.y);
            ctx.fillStyle = "rgba(7, 13, 10, 0.38)";
            ctx.strokeStyle = spot.color;
            ctx.globalAlpha = 0.5;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.ellipse(0, 12, 58, 36, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.globalAlpha = 0.18;
            ctx.setLineDash([10, 9]);
            ctx.beginPath();
            ctx.arc(0, 0, 74, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
        }

        function drawLane(points) {
          ctx.strokeStyle = "rgba(83, 67, 43, 0.32)";
          ctx.lineWidth = 58;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.beginPath();
          ctx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length; i += 1)
            ctx.lineTo(points[i].x, points[i].y);
          ctx.stroke();

          ctx.strokeStyle = "rgba(205, 190, 128, 0.22)";
          ctx.lineWidth = 42;
          ctx.stroke();

          ctx.strokeStyle = "rgba(244, 225, 151, 0.16)";
          ctx.lineWidth = 4;
          ctx.setLineDash([18, 16]);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        function drawBaseAura(x, y, color) {
          ctx.save();
          ctx.strokeStyle = color;
          ctx.globalAlpha = 0.45;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(x, y, 78, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        function drawJungleCamps() {
          for (const camp of entities.jungle) {
            ctx.save();
            ctx.translate(camp.x, camp.y);
            drawUnitShadow(0, camp.r * 0.8, camp.r * 1.85, camp.r * 0.48);
            if (!camp.alive) {
              ctx.globalAlpha = 0.46;
              ctx.strokeStyle = camp.color;
              ctx.fillStyle = "rgba(7, 13, 10, 0.42)";
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.arc(0, 0, camp.r + 10, 0, Math.PI * 2);
              ctx.fill();
              ctx.stroke();
              ctx.globalAlpha = 1;
              ctx.fillStyle = "rgba(240, 247, 237, 0.86)";
              ctx.font = "900 13px 'Segoe UI', sans-serif";
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillText(Math.ceil(Math.max(0, camp.respawn)), 0, 1);
              ctx.restore();
              continue;
            }

            const pulse = 1 + Math.sin(camp.pulse) * 0.045;
            ctx.scale(pulse, pulse);
            if (camp.attackFlash > 0) {
              ctx.strokeStyle = camp.color;
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.arc(
                0,
                0,
                camp.r + 14 + camp.attackFlash * 24,
                0,
                Math.PI * 2,
              );
              ctx.stroke();
            }
            ctx.fillStyle =
              camp.hitFlash > 0 ? "#fff8d5" : "rgba(18, 28, 23, 0.96)";
            ctx.strokeStyle = camp.color;
            ctx.lineWidth = 4;
            ctx.beginPath();
            if (camp.type === "bulwark") {
              roundRect(
                -camp.r * 0.9,
                -camp.r * 0.78,
                camp.r * 1.8,
                camp.r * 1.56,
                8,
              );
            } else if (camp.type === "ember") {
              for (let i = 0; i < 7; i += 1) {
                const a = ((Math.PI * 2) / 7) * i - Math.PI / 2;
                const r = i % 2 === 0 ? camp.r * 1.04 : camp.r * 0.68;
                const x = Math.cos(a) * r;
                const y = Math.sin(a) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
              }
              ctx.closePath();
            } else {
              ctx.arc(0, 0, camp.r, 0, Math.PI * 2);
            }
            ctx.fill();
            ctx.stroke();
            ctx.strokeStyle = "rgba(240, 247, 237, 0.42)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, camp.r * 0.48, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            drawBar(
              camp.x - 34,
              camp.y - camp.r - 18,
              68,
              6,
              camp.hp / camp.maxHp,
              camp.color,
            );
            ctx.fillStyle = "#f0f7ed";
            ctx.font = "800 11px 'Segoe UI', sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "alphabetic";
            ctx.fillText(camp.name, camp.x, camp.y + camp.r + 17);
          }
        }

        function drawRunes() {
          for (const rune of entities.runes) {
            const spin = rune.pulse;
            ctx.save();
            ctx.translate(rune.x, rune.y);
            ctx.rotate(spin * 0.42);
            ctx.globalAlpha = rune.available ? 1 : 0.34;
            drawUnitShadow(0, 17, 32, 9);
            ctx.strokeStyle = rune.color;
            ctx.fillStyle = rune.available
              ? "rgba(12, 18, 15, 0.82)"
              : "rgba(12, 18, 15, 0.52)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let i = 0; i < 6; i += 1) {
              const a = (Math.PI / 3) * i;
              const r = i % 2 === 0 ? rune.r : rune.r * 0.58;
              ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.rotate(-spin * 0.84);
            ctx.strokeStyle = rune.available
              ? rune.color
              : "rgba(180, 190, 180, 0.45)";
            ctx.beginPath();
            ctx.arc(0, 0, rune.r + 8 + Math.sin(spin) * 2, 0, Math.PI * 2);
            ctx.stroke();
            if (!rune.available) {
              ctx.fillStyle = "rgba(240, 247, 237, 0.76)";
              ctx.font = "800 11px 'Segoe UI', sans-serif";
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillText(Math.ceil(rune.timer), 0, 1);
            }
            ctx.restore();
          }
        }

        function drawObjectives() {
          for (const objective of entities.objectives) {
            ctx.save();
            ctx.translate(objective.x, objective.y);
            drawUnitShadow(
              0,
              objective.r * 0.72,
              objective.r * 1.8,
              objective.r * 0.46,
            );
            if (!objective.alive) {
              ctx.globalAlpha = 0.46;
              ctx.strokeStyle = "rgba(244, 202, 88, 0.46)";
              ctx.fillStyle = "rgba(244, 202, 88, 0.08)";
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.arc(0, 0, objective.r + 8, 0, Math.PI * 2);
              ctx.fill();
              ctx.stroke();
              ctx.globalAlpha = 1;
              ctx.fillStyle = "rgba(240, 247, 237, 0.88)";
              ctx.font = "900 15px 'Segoe UI', sans-serif";
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillText(Math.ceil(Math.max(0, objective.respawn)), 0, 1);
              ctx.restore();
              continue;
            }

            const pulse = 1 + Math.sin(objective.pulse) * 0.045;
            ctx.scale(pulse, pulse);
            if (objective.attackFlash > 0) {
              ctx.strokeStyle = "rgba(244, 202, 88, 0.72)";
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.arc(
                0,
                0,
                objective.r + 18 + objective.attackFlash * 28,
                0,
                Math.PI * 2,
              );
              ctx.stroke();
            }
            ctx.fillStyle =
              objective.hitFlash > 0 ? "#fff8d5" : "rgba(42, 55, 43, 0.94)";
            ctx.strokeStyle = teamColor[NEUTRAL];
            ctx.lineWidth = 4;
            ctx.beginPath();
            for (let i = 0; i < 8; i += 1) {
              const a = (Math.PI / 4) * i + Math.PI / 8;
              const r = i % 2 === 0 ? objective.r : objective.r * 0.62;
              ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.strokeStyle = "rgba(244, 202, 88, 0.42)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, objective.r * 0.48, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-objective.r * 0.64, 0);
            ctx.lineTo(objective.r * 0.64, 0);
            ctx.moveTo(0, -objective.r * 0.64);
            ctx.lineTo(0, objective.r * 0.64);
            ctx.stroke();
            ctx.restore();

            drawBar(
              objective.x - 40,
              objective.y - objective.r - 20,
              80,
              7,
              objective.hp / objective.maxHp,
              teamColor[NEUTRAL],
            );
            ctx.fillStyle = "#f0f7ed";
            ctx.font = "800 12px 'Segoe UI', sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "alphabetic";
            ctx.fillText(
              objective.name,
              objective.x,
              objective.y + objective.r + 19,
            );
          }
        }

        function drawStructures() {
          for (const structure of entities.structures) {
            if (!structure.alive && structure.kind !== "core") continue;
            ctx.save();
            ctx.translate(structure.x, structure.y);
            drawUnitShadow(
              0,
              structure.r * 0.75,
              structure.r * 1.5,
              structure.r * 0.42,
            );
            if (structure.attackFlash > 0) {
              ctx.strokeStyle = "rgba(244, 202, 88, 0.74)";
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.arc(
                0,
                0,
                structure.range * (0.18 + structure.attackFlash),
                0,
                Math.PI * 2,
              );
              ctx.stroke();
            }
            ctx.fillStyle =
              structure.hitFlash > 0
                ? "#fff8d5"
                : structure.alive
                  ? teamSoft[structure.team]
                  : "rgba(80,80,80,0.38)";
            ctx.strokeStyle = structure.alive
              ? teamColor[structure.team]
              : "#777";
            ctx.lineWidth = 3;
            if (structure.kind === "core") {
              const pulse =
                1 + Math.sin(performance.now() * 0.004 + structure.team) * 0.06;
              ctx.scale(pulse, pulse);
              ctx.beginPath();
              for (let i = 0; i < 8; i += 1) {
                const a = (Math.PI / 4) * i + Math.PI / 8;
                const r = i % 2 === 0 ? structure.r : structure.r * 0.66;
                ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
              }
              ctx.closePath();
            } else {
              ctx.fillStyle =
                structure.hitFlash > 0 ? "#fff8d5" : "rgba(16, 20, 19, 0.72)";
              ctx.beginPath();
              ctx.arc(0, 16, 27, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle =
                structure.hitFlash > 0 ? "#fff8d5" : teamSoft[structure.team];
              roundRect(-21, -29, 42, 58, 7);
            }
            ctx.fill();
            ctx.stroke();
            if (structure.kind === "tower") {
              ctx.fillStyle = teamColor[structure.team];
              ctx.beginPath();
              ctx.arc(0, -35, 8, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
            drawBar(
              structure.x - 34,
              structure.y - structure.r - 18,
              68,
              7,
              structure.hp / structure.maxHp,
              teamColor[structure.team],
            );
          }
        }

        function drawMinions() {
          for (const minion of entities.minions) {
            if (!minion.alive) continue;
            ctx.save();
            ctx.translate(minion.x, minion.y);
            ctx.rotate(minion.face || 0);
            drawUnitShadow(0, minion.r * 0.6, minion.r * 1.4, minion.r * 0.42);
            ctx.fillStyle =
              minion.hitFlash > 0
                ? "#fff8d5"
                : minion.type === "caster"
                  ? teamSoft[minion.team]
                  : teamColor[minion.team];
            ctx.strokeStyle = teamColor[minion.team];
            ctx.lineWidth = 2;
            if (minion.type === "siege") {
              roundRect(
                -minion.r * 0.9,
                -minion.r * 0.65,
                minion.r * 1.8,
                minion.r * 1.3,
                5,
              );
              ctx.moveTo(minion.r + 9, 0);
              ctx.lineTo(minion.r * 0.25, -6);
              ctx.lineTo(minion.r * 0.25, 6);
              ctx.closePath();
            } else if (minion.type === "caster") {
              ctx.beginPath();
              ctx.arc(0, 0, minion.r, 0, Math.PI * 2);
              ctx.moveTo(minion.r + 6, 0);
              ctx.arc(minion.r + 2, 0, 4, 0, Math.PI * 2);
            } else {
              ctx.beginPath();
              ctx.moveTo(minion.r + 4, 0);
              ctx.lineTo(-minion.r * 0.65, -minion.r);
              ctx.lineTo(-minion.r * 0.65, minion.r);
              ctx.closePath();
            }
            ctx.fill();
            ctx.stroke();
            if (minion.attackFlash > 0) {
              ctx.strokeStyle = "rgba(244, 202, 88, 0.82)";
              ctx.beginPath();
              ctx.arc(0, 0, minion.r + 6, -0.9, 0.9);
              ctx.stroke();
            }
            ctx.restore();
            drawBar(
              minion.x - 16,
              minion.y - minion.r - 10,
              32,
              4,
              minion.hp / minion.maxHp,
              teamColor[minion.team],
            );
          }
        }

        function drawHeroes() {
          for (const hero of entities.heroes) {
            if (!hero.alive) {
              if (hero.isPlayer) {
                ctx.fillStyle = "rgba(0,0,0,0.45)";
                ctx.font = "900 26px 'Segoe UI', sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(
                  "复活 " + Math.ceil(hero.respawn),
                  WORLD_W / 2,
                  WORLD_H / 2,
                );
              }
              continue;
            }
            ctx.save();
            ctx.translate(hero.x, hero.y);
            ctx.rotate(hero.face || 0);
            drawUnitShadow(0, hero.r * 0.75, hero.r * 1.7, hero.r * 0.48);
            if (hero.isPlayer) {
              ctx.strokeStyle = "rgba(240, 247, 237, 0.58)";
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.arc(0, 0, hero.r + 10, 0, Math.PI * 2);
              ctx.stroke();
            }
            ctx.fillStyle =
              hero.hitFlash > 0
                ? "#fff8d5"
                : hero.isPlayer
                  ? "#f0f7ed"
                  : teamColor[hero.team];
            ctx.strokeStyle = teamColor[hero.team];
            ctx.lineWidth = hero.isPlayer ? 5 : 3;
            drawHeroSilhouette(hero);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = teamColor[hero.team];
            ctx.beginPath();
            ctx.moveTo(hero.r + 11, 0);
            ctx.lineTo(hero.r - 2, -7);
            ctx.lineTo(hero.r - 2, 7);
            ctx.closePath();
            ctx.fill();
            if (hero.attackFlash > 0) {
              ctx.strokeStyle = "rgba(244, 202, 88, 0.9)";
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.arc(0, 0, hero.r + 13, -0.82, 0.82);
              ctx.stroke();
            }
            if (hero.shield > 0) {
              ctx.strokeStyle = "#f4ca58";
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.arc(0, 0, hero.r + 8, 0, Math.PI * 2);
              ctx.stroke();
            }
            ctx.restore();

            drawBar(
              hero.x - 30,
              hero.y - hero.r - 18,
              60,
              6,
              hero.hp / hero.maxHp,
              teamColor[hero.team],
            );
            drawBar(
              hero.x - 30,
              hero.y - hero.r - 10,
              60,
              4,
              hero.mana / hero.maxMana,
              "#67d784",
            );
            ctx.fillStyle = "#f0f7ed";
            ctx.font = "700 12px 'Segoe UI', sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(
              hero.name + " " + hero.level,
              hero.x,
              hero.y + hero.r + 17,
            );
          }
        }

        function drawHeroSilhouette(hero) {
          const r = hero.r;
          ctx.beginPath();
          if (hero.role === "guard") {
            roundRect(-r * 0.92, -r * 0.86, r * 1.84, r * 1.72, 7);
          } else if (hero.role === "mage") {
            ctx.moveTo(0, -r * 1.12);
            ctx.lineTo(r * 0.96, 0);
            ctx.lineTo(0, r * 1.12);
            ctx.lineTo(-r * 0.96, 0);
            ctx.closePath();
          } else if (hero.role === "ranger") {
            ctx.moveTo(r * 1.1, 0);
            ctx.lineTo(-r * 0.72, -r * 0.92);
            ctx.lineTo(-r * 0.28, 0);
            ctx.lineTo(-r * 0.72, r * 0.92);
            ctx.closePath();
          } else {
            ctx.arc(0, 0, r, 0, Math.PI * 2);
          }
        }

        function drawUnitShadow(x, y, w, h) {
          ctx.save();
          ctx.fillStyle = "rgba(0, 0, 0, 0.28)";
          ctx.beginPath();
          ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        function drawProjectiles() {
          for (const p of entities.projectiles) {
            ctx.save();
            ctx.strokeStyle = p.color;
            ctx.globalAlpha = 0.38;
            ctx.lineWidth = Math.max(2, p.r * 0.9);
            ctx.lineCap = "round";
            ctx.beginPath();
            if (p.target) {
              ctx.moveTo(p.x, p.y);
              const n = normalize(
                (p.target?.x || p.x) - p.x,
                (p.target?.y || p.y) - p.y,
              );
              ctx.lineTo(p.x - n.x * 24, p.y - n.y * 24);
            } else {
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p.x - (p.vx || 0) * 0.045, p.y - (p.vy || 0) * 0.045);
            }
            ctx.stroke();
            ctx.globalAlpha = 1;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        function drawAoes() {
          for (const area of entities.aoes) {
            ctx.save();
            ctx.globalAlpha = Math.max(0.16, area.life / 2.5);
            ctx.fillStyle = area.color;
            ctx.strokeStyle = area.team === BLUE ? "#67d784" : "#ff6c5f";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(area.x, area.y, area.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
          }
        }

        function drawParticles() {
          for (const p of entities.particles) {
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life / 0.8);
            if (p.ring) {
              ctx.strokeStyle = p.color;
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r * (1.1 - p.life), 0, Math.PI * 2);
              ctx.stroke();
            } else {
              ctx.fillStyle = p.color;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
          }
        }

        function drawTexts() {
          ctx.font = "800 15px 'Segoe UI', sans-serif";
          ctx.textAlign = "center";
          for (const t of entities.texts) {
            ctx.globalAlpha = Math.max(0, t.life / 0.85);
            ctx.fillStyle = t.color;
            ctx.fillText(t.text, t.x, t.y);
          }
          ctx.globalAlpha = 1;
        }

        function drawCursor() {
          if (!game.started || game.over) return;
          ctx.strokeStyle = "rgba(244, 202, 88, 0.75)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(pointer.x, pointer.y, 12, 0, Math.PI * 2);
          ctx.stroke();
        }

        function drawScreenHud() {
          if (!game.started || !player) {
            drawMinimap();
            return;
          }
          const d = view.dpr;
          const barW = Math.min(360 * d, canvas.width * 0.44);
          const x = (canvas.width - barW) / 2;
          const y = canvas.height - 48 * d;
          ctx.save();
          drawObjectiveHud(d);
          ctx.fillStyle = "rgba(5, 8, 7, 0.68)";
          ctx.strokeStyle = "rgba(221, 238, 213, 0.18)";
          ctx.lineWidth = d;
          roundRect(x - 12 * d, y - 12 * d, barW + 24 * d, 40 * d, 8 * d);
          ctx.fill();
          ctx.stroke();
          hudBar(
            x,
            y,
            barW,
            9 * d,
            player.hp / player.maxHp,
            "#4ec5e8",
            "生命",
          );
          hudBar(
            x,
            y + 13 * d,
            barW,
            7 * d,
            player.mana / player.maxMana,
            "#67d784",
            "能量",
          );
          hudBar(
            x,
            y + 24 * d,
            barW,
            5 * d,
            player.xp / xpNeed(player.level),
            "#f4ca58",
            "经验",
          );

          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.font = `${Math.round(12 * d)}px "Segoe UI", sans-serif`;
          ctx.fillStyle = "rgba(240, 247, 237, 0.92)";
          ctx.fillText(
            `Lv.${player.level}  ${Math.floor(player.gold)}G  K/D ${game.kills}/${game.deaths}`,
            canvas.width / 2,
            y - 9 * d,
          );

          drawAbilityHud(d);
          drawMinimap();
          ctx.restore();
        }

        function hudBar(x, y, w, h, ratio, color) {
          ctx.fillStyle = "rgba(0, 0, 0, 0.52)";
          roundRect(x, y, w, h, h / 2);
          ctx.fill();
          ctx.fillStyle = color;
          roundRect(x, y, w * clamp(ratio, 0, 1), h, h / 2);
          ctx.fill();
        }

        function drawObjectiveHud(d) {
          const blueCore = getCore(BLUE);
          const redCore = getCore(RED);
          const w = Math.min(470 * d, canvas.width - 34 * d);
          const h = 56 * d;
          const x = (canvas.width - w) / 2;
          const y = 14 * d;
          const objective = entities.objectives[0];
          const objectiveText = objective
            ? objective.alive
              ? `晶兽 ${percent(objective.hp, objective.maxHp)}`
              : `晶兽刷新 ${Math.ceil(Math.max(0, objective.respawn))}s`
            : "晶兽未出现";
          const buffText = [BLUE, RED]
            .filter((team) => teamBuffs[team].duration > 0)
            .map(
              (team) =>
                `${teamName[team]}晶潮 ${Math.ceil(teamBuffs[team].duration)}s`,
            )
            .join(" · ");
          const personalBuffText = [
            player.emberTime > 0 ? `余烬 ${Math.ceil(player.emberTime)}s` : "",
            player.aetherTime > 0
              ? `苍蓝 ${Math.ceil(player.aetherTime)}s`
              : "",
            player.bulwarkTime > 0
              ? `石甲 ${Math.ceil(player.bulwarkTime)}s`
              : "",
          ]
            .filter(Boolean)
            .join(" · ");
          const allBuffText = [buffText, personalBuffText]
            .filter(Boolean)
            .join(" · ");
          ctx.fillStyle = "rgba(5, 8, 7, 0.62)";
          ctx.strokeStyle = "rgba(221, 238, 213, 0.16)";
          ctx.lineWidth = d;
          roundRect(x, y, w, h, 8 * d);
          ctx.fill();
          ctx.stroke();
          hudBar(
            x + 12 * d,
            y + 11 * d,
            w * 0.34,
            8 * d,
            blueCore ? blueCore.hp / blueCore.maxHp : 0,
            teamColor[BLUE],
          );
          hudBar(
            x + w - 12 * d - w * 0.34,
            y + 11 * d,
            w * 0.34,
            8 * d,
            redCore ? redCore.hp / redCore.maxHp : 0,
            teamColor[RED],
          );
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `${Math.round(13 * d)}px "Segoe UI", sans-serif`;
          ctx.fillStyle = "rgba(240, 247, 237, 0.94)";
          ctx.fillText(
            `第 ${Math.max(1, game.waveNumber)} 波`,
            x + w / 2,
            y + 15 * d,
          );
          ctx.font = `${Math.round(11 * d)}px "Segoe UI", sans-serif`;
          ctx.fillStyle = "rgba(244, 202, 88, 0.95)";
          ctx.fillText(
            `${objectiveText} · 下一波 ${Math.ceil(game.waveTimer)}s`,
            x + w / 2,
            y + 31 * d,
          );
          ctx.fillStyle = allBuffText
            ? "rgba(103, 215, 132, 0.95)"
            : "rgba(167, 184, 166, 0.84)";
          ctx.fillText(allBuffText || "无增益", x + w / 2, y + 45 * d);
        }

        function drawAbilityHud(d) {
          const size = 42 * d;
          const gap = 8 * d;
          const keys = ["q", "w", "e", "r"];
          const total = keys.length * size + (keys.length - 1) * gap;
          const compact = canvas.width < 760 * d;
          const x = compact ? 14 * d : (canvas.width - total) / 2;
          const y = compact ? canvas.height - 112 * d : canvas.height - 103 * d;
          for (let i = 0; i < keys.length; i += 1) {
            const key = keys[i];
            const def = activeAbilityDef(key);
            const bx = x + i * (size + gap);
            const locked = key === "r" && player.level < 3;
            const ready =
              !locked &&
              player.cooldowns[key] <= 0 &&
              player.mana >= def.cost &&
              player.alive;
            ctx.fillStyle = ready
              ? "rgba(20, 32, 26, 0.82)"
              : "rgba(5, 8, 7, 0.66)";
            ctx.strokeStyle =
              queuedAbility === key
                ? "#f4ca58"
                : ready
                  ? "rgba(221, 238, 213, 0.24)"
                  : "rgba(221, 238, 213, 0.12)";
            ctx.lineWidth = queuedAbility === key ? 2.5 * d : d;
            roundRect(bx, y, size, size, 8 * d);
            ctx.fill();
            ctx.stroke();
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = `${Math.round(17 * d)}px "Segoe UI", sans-serif`;
            ctx.fillStyle = ready ? "#f0f7ed" : "rgba(167, 184, 166, 0.72)";
            ctx.fillText(def.key, bx + size / 2, y + size * 0.38);
            ctx.font = `${Math.round(10 * d)}px "Segoe UI", sans-serif`;
            ctx.fillStyle = "rgba(167, 184, 166, 0.95)";
            const label = locked
              ? "锁定"
              : player.cooldowns[key] > 0
                ? player.cooldowns[key].toFixed(1)
                : def.cost;
            ctx.fillText(label, bx + size / 2, y + size * 0.72);
          }
        }

        function drawMinimap() {
          const d = view.dpr;
          const w = Math.min(190 * d, canvas.width * 0.26);
          const h = (w * WORLD_H) / WORLD_W;
          const x = canvas.width - w - 14 * d;
          const y = canvas.height - h - 14 * d;
          const sx = w / WORLD_W;
          const sy = h / WORLD_H;

          ctx.save();
          ctx.fillStyle = "rgba(8, 13, 10, 0.74)";
          ctx.strokeStyle = "rgba(221, 238, 213, 0.22)";
          ctx.lineWidth = d;
          roundRect(x, y, w, h, 8 * d);
          ctx.fill();
          ctx.stroke();
          ctx.save();
          ctx.beginPath();
          roundRect(x, y, w, h, 8 * d);
          ctx.clip();
          ctx.translate(x, y);

          ctx.strokeStyle = "rgba(244, 225, 151, 0.3)";
          ctx.lineWidth = 5 * d;
          ctx.lineCap = "round";
          for (const lane of lanes) {
            ctx.beginPath();
            ctx.moveTo(lane.points[0].x * sx, lane.points[0].y * sy);
            for (let i = 1; i < lane.points.length; i += 1) {
              ctx.lineTo(lane.points[i].x * sx, lane.points[i].y * sy);
            }
            ctx.stroke();
          }

          for (const structure of entities.structures) {
            miniDot(
              structure.x,
              structure.y,
              structure.alive ? teamColor[structure.team] : "#59615b",
              structure.kind === "core" ? 4.4 * d : 3.2 * d,
              sx,
              sy,
            );
          }
          for (const minion of entities.minions) {
            if (minion.alive)
              miniDot(
                minion.x,
                minion.y,
                teamColor[minion.team],
                1.5 * d,
                sx,
                sy,
              );
          }
          for (const objective of entities.objectives) {
            miniDot(
              objective.x,
              objective.y,
              objective.alive ? teamColor[NEUTRAL] : "#70613b",
              3.7 * d,
              sx,
              sy,
            );
          }
          for (const camp of entities.jungle) {
            miniDot(
              camp.x,
              camp.y,
              camp.alive ? camp.color : "#70613b",
              2.8 * d,
              sx,
              sy,
            );
          }
          for (const hero of entities.heroes) {
            if (hero.alive)
              miniDot(
                hero.x,
                hero.y,
                hero.isPlayer ? "#f0f7ed" : teamColor[hero.team],
                4 * d,
                sx,
                sy,
              );
          }

          const vx = (-view.ox / view.scale) * sx;
          const vy = (-view.oy / view.scale) * sy;
          const vw = (canvas.width / view.scale) * sx;
          const vh = (canvas.height / view.scale) * sy;
          ctx.strokeStyle = "rgba(240, 247, 237, 0.74)";
          ctx.lineWidth = 1.3 * d;
          ctx.strokeRect(vx, vy, vw, vh);
          ctx.restore();
          ctx.restore();
        }

        function miniDot(x, y, color, r, sx, sy) {
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(x * sx, y * sy, r, 0, Math.PI * 2);
          ctx.fill();
        }

        function drawBar(x, y, w, h, ratio, color) {
          ctx.fillStyle = "rgba(0,0,0,0.5)";
          ctx.fillRect(x, y, w, h);
          ctx.fillStyle = color;
          ctx.fillRect(x, y, w * clamp(ratio, 0, 1), h);
          ctx.strokeStyle = "rgba(255,255,255,0.22)";
          ctx.lineWidth = 1;
          ctx.strokeRect(x, y, w, h);
        }

        function roundRect(x, y, w, h, r) {
          const radius = Math.min(r, w / 2, h / 2);
          ctx.beginPath();
          ctx.moveTo(x + radius, y);
          ctx.lineTo(x + w - radius, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
          ctx.lineTo(x + w, y + h - radius);
          ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
          ctx.lineTo(x + radius, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
          ctx.lineTo(x, y + radius);
          ctx.quadraticCurveTo(x, y, x + radius, y);
          ctx.closePath();
        }

        function onPointer(event, down) {
          const p = screenToWorld(event);
          pointer.x = p.x;
          pointer.y = p.y;
          pointer.down = down;
          if (
            !down ||
            !game.started ||
            game.paused ||
            game.over ||
            !player?.alive
          )
            return;
          event.preventDefault();
          if (queuedAbility) {
            useAbility(queuedAbility);
            return;
          }
          const target = allDamageables()
            .filter(
              (unit) =>
                unit.team !== player.team && distance(unit, p) <= unit.r + 12,
            )
            .sort((a, b) => distance(a, p) - distance(b, p))[0];
          if (target) {
            player.target = target;
            player.moveTarget = null;
            showToast("锁定 " + target.name);
          } else {
            player.moveTarget = p;
            player.target = null;
          }
        }

        function togglePause() {
          if (!game.started || game.over) return;
          game.paused = !game.paused;
          pauseBtn.textContent = game.paused ? "▶" : "Ⅱ";
          showToast(game.paused ? "暂停" : "继续");
          updateUI();
        }

        function loop(time) {
          const dt = Math.min(
            0.05,
            lastTime ? (time - lastTime) / 1000 : 1 / 60,
          );
          lastTime = time;
          update(dt);
          updateCamera(dt);
          draw();
          requestAnimationFrame(loop);
        }

        canvas.addEventListener("pointermove", (event) => {
          const p = screenToWorld(event);
          pointer.x = p.x;
          pointer.y = p.y;
        });
        canvas.addEventListener("pointerdown", (event) =>
          onPointer(event, true),
        );
        canvas.addEventListener("pointerup", (event) =>
          onPointer(event, false),
        );
        canvas.addEventListener("contextmenu", (event) =>
          event.preventDefault(),
        );

        window.addEventListener("keydown", (event) => {
          keys.add(event.code);
          if (["KeyQ", "KeyW", "KeyE", "KeyR"].includes(event.code)) {
            event.preventDefault();
            useAbility(event.code.slice(3).toLowerCase());
          }
          if (event.code === "Space" || event.code === "KeyP") {
            event.preventDefault();
            togglePause();
          }
        });
        window.addEventListener("keyup", (event) => keys.delete(event.code));
        window.addEventListener("resize", resize);

        startBtn.addEventListener("click", startGame);
        againBtn.addEventListener("click", startGame);
        restartBtn.addEventListener("click", startGame);
        pauseBtn.addEventListener("click", togglePause);
        buyAttack.addEventListener("click", () => buyUpgrade("attack"));
        buyHealth.addEventListener("click", () => buyUpgrade("health"));
        buyHaste.addEventListener("click", () => buyUpgrade("haste"));
        buySustain.addEventListener("click", () => buyUpgrade("sustain"));
        buyWard.addEventListener("click", () => buyUpgrade("ward"));
        buyMomentum.addEventListener("click", () => buyUpgrade("momentum"));
        exportSaveBtn.addEventListener("click", async () => {
          const code = encodeCareer();
          try {
            await navigator.clipboard.writeText(code);
          } catch (error) {}
          prompt("晶塔前线存档码（已尝试复制，可在其他设备导入）", code);
        });
        importSaveBtn.addEventListener("click", () => {
          const code = prompt("粘贴晶塔前线存档码：");
          if (!code) return;
          try {
            importCareer(code);
            alert("存档导入成功，赛季成长与纪录已恢复。");
          } catch (error) {
            alert(`导入失败：${error.message}`);
          }
        });

        resize();
        renderDeployment();
        if (
          new URLSearchParams(window.location.search).get("autostart") === "1"
        )
          startGame();
        requestAnimationFrame(loop);
      })();
    </script>
  </body>
</html>
