<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>晶塔前线：群星赛季</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f0c;
        --panel: rgba(18, 24, 20, 0.92);
        --panel-2: rgba(25, 33, 29, 0.94);
        --line: rgba(221, 238, 213, 0.17);
        --line-hot: rgba(98, 210, 126, 0.62);
        --text: #f0f7ed;
        --muted: #a7b8a6;
        --blue: #4ec5e8;
        --red: #ff6c5f;
        --green: #67d784;
        --gold: #f4ca58;
        --violet: #b790ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          #13201b 0%,
          #0b0f0d 54%,
          #090b08 100%
        );
        color: var(--text);
        font-family: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
        touch-action: none;
        user-select: none;
      }

      button {
        font: inherit;
        color: inherit;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(30, 40, 35, 0.94);
        cursor: pointer;
        transition:
          transform 120ms ease,
          background 120ms ease,
          border-color 120ms ease,
          opacity 120ms ease;
      }

      button:hover {
        background: rgba(44, 58, 50, 0.98);
        border-color: var(--line-hot);
      }

      button:active {
        transform: scale(0.97);
      }
      button:disabled {
        opacity: 0.42;
        cursor: not-allowed;
      }

      .shell {
        width: min(1240px, calc(100vw - 28px));
        height: min(800px, calc(100vh - 28px));
        display: grid;
        grid-template-columns: minmax(0, 1fr) 326px;
        gap: 16px;
        align-items: stretch;
      }

      .stage,
      .rail {
        min-width: 0;
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 24px 76px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(14px);
      }

      .stage {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border-bottom: 1px solid rgba(221, 238, 213, 0.12);
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1;
        letter-spacing: 0;
      }

      .subline {
        margin-top: 7px;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .top-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .icon-btn {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        font-size: 18px;
        font-weight: 900;
      }

      .canvas-wrap {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          #203b30 0%,
          #193126 50%,
          #15150f 100%
        );
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .toast {
        position: absolute;
        left: 50%;
        top: 18px;
        transform: translateX(-50%);
        min-width: 180px;
        max-width: min(560px, 80%);
        padding: 10px 14px;
        border: 1px solid rgba(244, 202, 88, 0.44);
        border-radius: 8px;
        background: rgba(12, 16, 13, 0.9);
        color: var(--text);
        text-align: center;
        font-size: 14px;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 4px);
      }

      .modal {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        padding: 20px;
        background: rgba(5, 8, 6, 0.56);
      }

      .modal.show {
        display: grid;
      }

      .dialog {
        width: min(460px, 92%);
        border: 1px solid rgba(221, 238, 213, 0.2);
        border-radius: 8px;
        background: rgba(18, 24, 20, 0.96);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
        padding: 20px;
      }

      .dialog h2 {
        margin: 0 0 8px;
        font-size: 27px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .dialog p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.65;
        font-size: 14px;
      }

      .dialog-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      #startModal .dialog {
        width: min(780px, 96%);
        max-height: 94%;
        overflow: auto;
      }
      .deploy-section {
        margin: 12px 0;
      }
      .deploy-section h3 {
        margin: 0 0 7px;
        color: var(--muted);
        font-size: 12px;
      }
      .deploy-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 7px;
      }
      .deploy-card {
        min-height: 74px;
        padding: 9px;
        text-align: left;
      }
      .deploy-card strong,
      .career-btn strong {
        display: block;
        font-size: 13px;
      }
      .deploy-card span,
      .career-btn span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 10px;
        line-height: 1.35;
      }
      .deploy-card.selected {
        border-color: var(--gold);
        background: rgba(244, 202, 88, 0.12);
      }
      .career-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
      }
      .career-btn {
        min-height: 62px;
        padding: 8px;
        text-align: left;
      }
      .save-row {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        margin: 10px 0;
        color: var(--gold);
        font-size: 11px;
        font-weight: 800;
      }

      .primary-btn,
      .wide-btn {
        min-height: 42px;
        padding: 0 15px;
        font-weight: 800;
      }

      .primary-btn {
        border-color: rgba(98, 210, 126, 0.76);
        background: linear-gradient(
          180deg,
          rgba(98, 210, 126, 0.3),
          rgba(72, 197, 232, 0.18)
        );
      }

      .rail {
        display: grid;
        grid-template-rows: auto auto auto auto minmax(0, 1fr);
        gap: 12px;
        padding: 12px;
        overflow: hidden;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .stat {
        min-height: 72px;
        padding: 10px;
        border: 1px solid rgba(221, 238, 213, 0.13);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.035);
      }

      .stat-label {
        color: var(--muted);
        font-size: 12px;
      }

      .stat-value {
        margin-top: 7px;
        font-size: 21px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .panel-title {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .objective-card {
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(221, 238, 213, 0.13);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.035);
      }

      .objective-card strong,
      .lane-state strong {
        font-size: 13px;
      }

      .objective-card span,
      .lane-state span {
        color: var(--muted);
        font-size: 12px;
      }

      .objective-row,
      .lane-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .objective-pill {
        min-height: 24px;
        flex: 0 1 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 8px;
        border-radius: 8px;
        background: rgba(244, 202, 88, 0.14);
        color: var(--gold);
        font-size: 12px;
        font-weight: 800;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .lane-board {
        display: grid;
        gap: 7px;
        margin-top: 8px;
      }

      .lane-state {
        display: grid;
        gap: 5px;
      }

      .lane-track {
        position: relative;
        height: 8px;
        border-radius: 8px;
        background: linear-gradient(
          90deg,
          rgba(78, 197, 232, 0.28),
          rgba(221, 238, 213, 0.12) 50%,
          rgba(255, 108, 95, 0.28)
        );
        overflow: hidden;
      }

      .lane-track::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 0;
        width: 1px;
        height: 100%;
        background: rgba(240, 247, 237, 0.5);
      }

      .lane-marker {
        position: absolute;
        top: 50%;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(8, 13, 10, 0.94);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 0 1px rgba(240, 247, 237, 0.28);
      }

      .ability-grid,
      .shop-grid {
        display: grid;
        gap: 8px;
      }

      .ability-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .ability-btn,
      .shop-btn {
        min-height: 50px;
        padding: 8px;
        text-align: left;
      }

      .ability-btn.armed {
        border-color: rgba(244, 202, 88, 0.86);
        background: linear-gradient(
          180deg,
          rgba(244, 202, 88, 0.24),
          rgba(78, 197, 232, 0.12)
        );
      }

      .ability-btn strong,
      .shop-btn strong {
        display: block;
        font-size: 14px;
        line-height: 1.1;
      }

      .ability-btn span,
      .shop-btn span {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .feed {
        min-height: 0;
        overflow: auto;
        display: grid;
        align-content: start;
        gap: 7px;
        padding-right: 2px;
      }

      .feed-line {
        min-height: 34px;
        display: flex;
        align-items: center;
        padding: 8px;
        border: 1px solid rgba(221, 238, 213, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.032);
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
        }

        .shell {
          width: min(100vw - 18px, 780px);
          height: auto;
          min-height: calc(100vh - 18px);
          grid-template-columns: 1fr;
          grid-template-rows: minmax(520px, 64vh) auto;
          padding: 9px 0;
        }

        .rail {
          grid-template-rows: auto auto auto auto;
          overflow: visible;
        }

        .feed {
          max-height: 170px;
        }
      }

      @media (max-width: 560px) {
        .shell {
          width: calc(100vw - 12px);
          grid-template-rows: minmax(500px, 63vh) auto;
          gap: 10px;
        }

        .topbar {
          grid-template-columns: 1fr;
        }
        h1 {
          font-size: 27px;
        }
        .subline {
          white-space: normal;
        }
        .top-actions {
          justify-content: flex-start;
        }
        .deploy-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .career-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="晶塔前线游戏区">
        <header class="topbar">
          <div>
            <h1>晶塔前线 <b>群星赛季 V4</b></h1>
            <div class="subline">
              <span id="statusText">待命</span> ·
              <span id="timerText">00:00</span>
            </div>
          </div>
          <div class="top-actions">
            <button
              class="icon-btn"
              id="pauseBtn"
              title="暂停/继续"
              aria-label="暂停/继续"
            >
              Ⅱ
            </button>
            <button
              class="icon-btn"
              id="restartBtn"
              title="重新开始"
              aria-label="重新开始"
            >
              ↻
            </button>
          </div>
        </header>

        <div class="canvas-wrap">
          <canvas id="gameCanvas" aria-label="晶塔前线战场画布"></canvas>
          <div class="toast" id="toast"></div>
          <div class="modal show" id="startModal">
            <div class="dialog">
              <h2>晶塔前线：群星赛季</h2>
              <p>
                选择英雄与战场规则，三线带兵破塔，争夺野区、符印和远古晶兽，摧毁敌方晶核。
              </p>
              <section class="deploy-section">
                <h3>选择出战英雄</h3>
                <div class="deploy-grid" id="championGrid"></div>
              </section>
              <section class="deploy-section">
                <h3>选择对局规则</h3>
                <div class="deploy-grid" id="ruleGrid"></div>
              </section>
              <section class="deploy-section">
                <h3>赛季研究</h3>
                <div class="career-row" id="careerGrid"></div>
              </section>
              <div class="save-row">
                <span id="careerMeta">晶屑 0 · 0 胜</span>
                <button id="exportSaveBtn" type="button">导出存档码</button>
                <button id="importSaveBtn" type="button">导入存档码</button>
              </div>
              <div class="dialog-actions">
                <button class="primary-btn" id="startBtn">开始对局</button>
              </div>
            </div>
          </div>
          <div class="modal" id="resultModal">
            <div class="dialog">
              <h2 id="resultTitle">胜利</h2>
              <p id="resultCopy">对局总结会显示在这里。</p>
              <div class="dialog-actions">
                <button class="primary-btn" id="againBtn">再来一局</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <aside class="rail" aria-label="晶塔前线状态栏">
        <div class="stat-grid">
          <div class="stat">
            <div class="stat-label">等级</div>
            <div class="stat-value" id="levelValue">1</div>
          </div>
          <div class="stat">
            <div class="stat-label">金币</div>
            <div class="stat-value" id="goldValue">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">蓝晶核</div>
            <div class="stat-value" id="blueCoreValue">100%</div>
          </div>
          <div class="stat">
            <div class="stat-label">赤晶核</div>
            <div class="stat-value" id="redCoreValue">100%</div>
          </div>
        </div>

        <section>
          <p class="panel-title">战术</p>
          <div class="objective-card">
            <div class="objective-row">
              <div>
                <strong id="objectiveValue">远古晶兽</strong><br />
                <span id="objectiveTimer">可争夺</span>
              </div>
              <div class="objective-pill" id="teamBuffValue">无增益</div>
            </div>
            <div class="lane-board" id="laneBoard"></div>
          </div>
        </section>

        <section>
          <p class="panel-title">技能</p>
          <div class="ability-grid" id="abilityGrid"></div>
        </section>

        <section>
          <p class="panel-title">补给</p>
          <div class="shop-grid">
            <button class="shop-btn" id="buyAttack">
              <strong>攻击校准</strong><span>90 金币</span>
            </button>
            <button class="shop-btn" id="buyHealth">
              <strong>生命护符</strong><span>110 金币</span>
            </button>
            <button class="shop-btn" id="buyHaste">
              <strong>冷却回路</strong><span>130 金币</span>
            </button>
            <button class="shop-btn" id="buySustain">
              <strong>汲取晶刃</strong><span>150 金币</span>
            </button>
            <button class="shop-btn" id="buyWard">
              <strong>守望屏障</strong><span>160 金币</span>
            </button>
            <button class="shop-btn" id="buyMomentum">
              <strong>追风战靴</strong><span>175 金币</span>
            </button>
          </div>
        </section>

        <section>
          <p class="panel-title">战况</p>
          <div class="feed" id="feed"></div>
        </section>
      </aside>
    </main>

        function careerHash(text) {
          let hash = 2166136261;
          for (let i = 0; i < text.length; i++) {
            hash ^= text.charCodeAt(i);
            hash = Math.imul(hash, 16777619);
          }
          return (hash >>> 0).toString(36);
        }

        function encodeCareer() {
          const json = JSON.stringify({
            game: "crystal-front",
            version: 3,
            data: career,
          });
          const bytes = new TextEncoder().encode(json);
          let binary = "";
          bytes.forEach((byte) => (binary += String.fromCharCode(byte)));
          const payload = btoa(binary);
          return `CFT3.${payload}.${careerHash(payload)}`;
        }

        function importCareer(code) {
          const [prefix, payload, checksum] = String(code || "")
            .trim()
            .split(".");
          if (prefix !== "CFT3" || !payload || careerHash(payload) !== checksum)
            throw new Error("存档码校验失败");
          const binary = atob(payload);
          const parsed = JSON.parse(
            new TextDecoder().decode(
              Uint8Array.from(binary, (char) => char.charCodeAt(0)),
            ),
          );
          if (parsed.game !== "crystal-front" || !parsed.data)
            throw new Error("不是晶塔前线存档");
          localStorage.setItem(CAREER_KEY, JSON.stringify(parsed.data));

        function resize() {
          const rect = canvas.getBoundingClientRect();
          view.cssWidth = Math.max(1, rect.width);
          view.cssHeight = Math.max(1, rect.height);
          view.dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
          canvas.width = Math.max(1, Math.floor(rect.width * view.dpr));
          canvas.height = Math.max(1, Math.floor(rect.height * view.dpr));
          view.baseScale = Math.min(
            canvas.width / WORLD_W,
            canvas.height / WORLD_H,
          );
          updateCamera(1, true);
        }

        function updateCamera(dt, snap = false) {
          const targetZoom = game.started
            ? view.cssWidth < 700
              ? 1.05
              : 1.18
            : 1;
          camera.zoom = snap
            ? targetZoom
            : lerp(camera.zoom, targetZoom, Math.min(1, dt * 4));

          let targetX = WORLD_W / 2;
          let targetY = WORLD_H / 2;
          if (game.started && player?.alive) {
            targetX = player.x + clamp(pointer.x - player.x, -330, 330) * 0.16;
            targetY = player.y + clamp(pointer.y - player.y, -255, 255) * 0.13;
          }

          camera.x = snap
            ? targetX
            : lerp(camera.x, targetX, Math.min(1, dt * 5.5));
          camera.y = snap
            ? targetY
            : lerp(camera.y, targetY, Math.min(1, dt * 5.5));

          view.scale = view.baseScale * camera.zoom;
          const visibleW = canvas.width / view.scale;
          const visibleH = canvas.height / view.scale;
          camera.x =
            visibleW >= WORLD_W
              ? WORLD_W / 2
              : clamp(camera.x, visibleW / 2, WORLD_W - visibleW / 2);
          camera.y =
            visibleH >= WORLD_H
              ? WORLD_H / 2
              : clamp(camera.y, visibleH / 2, WORLD_H - visibleH / 2);
          view.ox = canvas.width / 2 - camera.x * view.scale;
          view.oy = canvas.height / 2 - camera.y * view.scale;
        }

        function screenToWorld(event) {
          const rect = canvas.getBoundingClientRect();
          const sx = (event.clientX - rect.left) * view.dpr;
          const sy = (event.clientY - rect.top) * view.dpr;
          return {
            x: clamp((sx - view.ox) / view.scale, 0, WORLD_W),
            y: clamp((sy - view.oy) / view.scale, 0, WORLD_H),
          };
        }

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function lerp(a, b, t) {
          return a + (b - a) * t;
        }

        function distance(a, b) {
          return Math.hypot(a.x - b.x, a.y - b.y);
        }

        function normalize(dx, dy) {
          const len = Math.hypot(dx, dy) || 1;
          return { x: dx / len, y: dy / len, len };
        }

              attackTimer: 0.45,
              attackFlash: 0,
              hitFlash: 0,
              pulse: Math.random() * Math.PI * 2,
              color: spot.color,
              respawnDelay: spot.respawn,
              respawn: 0,
              aggroTarget: null,
              aggroTime: 0,
              alive: true,
              gold: spot.gold,
              xp: spot.xp,
            });
          }
        }

        function createRunes() {
          for (const spot of runeSpots) {
            entities.runes.push({
              ...spot,
              r: 19,
              available: true,
              timer: 0,
              pulse: Math.random() * Math.PI * 2,
            });
          }
        }

        function createObjective() {
          entities.objectives.push({
            kind: "objective",
            team: NEUTRAL,
            name: "远古晶兽",
            x: 900,
            y: 590,
            r: 34,
            maxHp: 1650,
            hp: 1650,
            damage: 74,
            range: 185,
            attackCd: 1.25,
            attackTimer: 0.8,
            attackFlash: 0,
            hitFlash: 0,
            pulse: 0,
            alive: true,
            respawn: 0,
            aggroTarget: null,
            aggroTime: 0,
            gold: 260,
            xp: 210,
          });
          const rule = MATCH_RULES[game.rule || selectedRule];
          const first = entities.objectives[0];
          first.maxHp = Math.round(first.maxHp * rule.objective);
          first.hp = first.maxHp;
          if (rule.dualObjective) {
            entities.objectives.push({
              ...first,
              name: "裂界晶兽",
              x: 1040,
              y: 690,
              pulse: Math.PI,
              aggroTarget: null,
              aggroTime: 0,
            });
          }
        }

        function createStructures() {
          const towerData = [
            [BLUE, "上路外塔", 0, 390, 660],
            [BLUE, "中路外塔", 1, 565, 790],
            [BLUE, "下路外塔", 2, 650, 980],
            [RED, "上路外塔", 0, 1240, 262],
            [RED, "中路外塔", 1, 1248, 390],
            [RED, "下路外塔", 2, 1362, 650],
          ];
          for (const [team, name, lane, x, y] of towerData) {
            entities.structures.push({
              kind: "tower",
              team,
              name,
              lane,
              x,
              y,
              r: 25,
              maxHp: 1120,
              hp: 1120,
              damage: 82,
              range: 255,
              attackCd: 1.05,
              attackTimer: 0,
              attackFlash: 0,
              hitFlash: 0,
              alive: true,
            });
          }

          entities.structures.push({
            kind: "core",
            team: BLUE,
            name: "蓝晶核",
            x: 170,
            y: 1000,
            r: 38,
            maxHp: 1900,
            hp: 1900,
            damage: 58,
            range: 225,
            attackCd: 1.25,
            attackTimer: 0,
            attackFlash: 0,
            hitFlash: 0,
            alive: true,
          });

          entities.structures.push({
            kind: "core",
            team: RED,
            name: "赤晶核",
            x: 1630,
            y: 180,
            r: 38,
            maxHp: 1900,
            hp: 1900,
            damage: 58,
            range: 225,
            attackCd: 1.25,
            attackTimer: 0,
            attackFlash: 0,
            hitFlash: 0,
            alive: true,
          });
        }

        function spawnWave() {
          game.waveNumber += 1;
          for (let laneIndex = 0; laneIndex < lanes.length; laneIndex += 1) {
            for (const team of [BLUE, RED]) {
              const path = getPath(laneIndex, team);
              const side = team === BLUE ? 1 : -1;
              for (let i = 0; i < 4; i += 1) {
                spawnMinion(
                  team,
                  laneIndex,
                  "melee",
                  path[0].x + (i - 1.5) * 15 * side,
                  path[0].y + i * 10,
                );
              }
              for (let i = 0; i < 3; i += 1) {
                spawnMinion(
                  team,
                  laneIndex,
                  "caster",
                  path[0].x - 28 * side + i * 18 * side,
                  path[0].y + 45 + i * 7,
                );
              }
              if (game.waveNumber % 3 === 0)
                spawnMinion(
                  team,
                  laneIndex,
                  "siege",
                  path[0].x - 56 * side,
                  path[0].y + 76,
                );
            }
          }
          pushFeed(
            "第 " +
              game.waveNumber +
              " 波兵线抵达" +
              (game.waveNumber % 3 === 0 ? " · 精英兵出动" : ""),
          );
          showToast(game.waveNumber % 3 === 0 ? "精英兵线刷新" : "兵线刷新");
        }

        function spawnMinion(team, laneIndex, type, x, y) {
          const caster = type === "caster";
          const siege = type === "siege";
          const path = getPath(laneIndex, team);
          entities.minions.push({
            kind: "minion",
            type,
            team,
            lane: laneIndex,
            path,
            wp: 1,
            x,
            y,
            r: siege ? 16 : caster ? 10 : 12,
            maxHp: siege ? 420 : caster ? 150 : 220,
            hp: siege ? 420 : caster ? 150 : 220,
            speed: siege ? 62 : caster ? 84 : 78,
            damage: siege ? 46 : caster ? 22 : 29,
            range: siege ? 218 : caster ? 165 : 30,
            attackCd: siege ? 1.35 : caster ? 1.15 : 0.82,
            attackTimer: 0.2 + Math.random() * 0.5,
            attackFlash: 0,
            hitFlash: 0,
            face: team === BLUE ? -0.35 : 2.8,
            vision: siege ? 260 : caster ? 220 : 165,
            target: null,
            alive: true,
            gold: siege ? 54 : caster ? 22 : 18,
            xp: siege ? 56 : caster ? 22 : 18,
          });
        }

        function getPath(laneIndex, team) {
          const points = lanes[laneIndex].points;
          return team === BLUE ? points : [...points].reverse();
        }

        function update(dt) {
          updateToast(dt);
          if (!game.started || game.paused || game.over) {
            return;
          }
          game.time += dt;
          const rule = MATCH_RULES[game.rule || selectedRule];
          player.gold += (0.85 + (rule.startGold ? 0.08 : 0)) * dt;
          updateTeamBuffs(dt);
          game.waveTimer -= dt;
          if (game.waveTimer <= 0) {
            spawnWave();
            game.waveTimer =
              Math.max(14, 22 - Math.floor(game.time / 100)) * rule.wave;
          }

          updateHeroes(dt);
          updateMinions(dt);
          updateJungle(dt);
          updateObjectives(dt);
          updateStructures(dt);
          updateProjectiles(dt);
          updateAoes(dt);
          updateRunes(dt);
          updateUnitState(dt);
          separateUnits();
          updateParticles(dt);
          updateFloatingTexts(dt);
          cleanupEntities();
          checkWin();
          updateGameMessage();
          updateUI();
        }

        function updateHeroes(dt) {
          for (const hero of entities.heroes) {
            tickCooldowns(hero, dt);
            if (!hero.alive) {
              hero.respawn -= dt;
              if (hero.respawn <= 0) respawnHero(hero);
              continue;
            }
            hero.mana = Math.min(
              hero.maxMana,
              hero.mana + (10 + hero.level * 1.2) * dt,
            );
            if (!hero.isPlayer) {
              const targetLevel = Math.min(5, 1 + Math.floor(game.time / 80));
              if (hero.level < targetLevel) {
                hero.level += 1;
                hero.maxHp += 70;
                hero.hp = Math.min(hero.maxHp, hero.hp + 130);
                hero.maxMana += 18;
                hero.damage += 5;
              }
            }
            hero.buffTime = Math.max(0, (hero.buffTime || 0) - dt);
            hero.guardTime = Math.max(0, (hero.guardTime || 0) - dt);
            hero.emberTime = Math.max(0, (hero.emberTime || 0) - dt);
            hero.aetherTime = Math.max(0, (hero.aetherTime || 0) - dt);
            hero.bulwarkTime = Math.max(0, (hero.bulwarkTime || 0) - dt);
            if (hero.buffTime > 0)
              hero.mana = Math.min(hero.maxMana, hero.mana + 12 * dt);
            if (hero.aetherTime > 0)
              hero.mana = Math.min(hero.maxMana, hero.mana + 16 * dt);
            if (hero.regen > 0)
              hero.hp = Math.min(hero.maxHp, hero.hp + hero.regen * dt);
            hero.attackTimer -= dt;
            if (hero.shieldTime > 0) {
              hero.shieldTime -= dt;
              if (hero.shieldTime <= 0) hero.shield = 0;
            }

            if (hero.isPlayer) updatePlayer(hero, dt);
            else updateBotHero(hero, dt);
            autoAttack(hero);
          }
        }

        function tickCooldowns(hero, dt) {
          const buffHaste = hero.aetherTime > 0 ? 1.25 : 1;
          for (const key of Object.keys(hero.cooldowns)) {
            hero.cooldowns[key] = Math.max(
              0,
              hero.cooldowns[key] - dt * hero.haste * buffHaste,
            );
          }
        }

        function updatePlayer(hero, dt) {
          let dx = 0;
          let dy = 0;
          if (keys.has("KeyA") || keys.has("ArrowLeft")) dx -= 1;
          if (keys.has("KeyD") || keys.has("ArrowRight")) dx += 1;
          if (keys.has("KeyW") || keys.has("ArrowUp")) dy -= 1;
          if (keys.has("KeyS") || keys.has("ArrowDown")) dy += 1;

          if (dx || dy) {
            const n = normalize(dx, dy);
            moveUnit(hero, n.x, n.y, dt, hero.speed);
            hero.moveTarget = null;
          } else if (hero.moveTarget) {
            moveToward(hero, hero.moveTarget, dt, hero.speed);
            if (distance(hero, hero.moveTarget) < 12) hero.moveTarget = null;
          }

          if (
            hero.target &&
            (!hero.target.alive || hero.target.team === hero.team)
          )
            hero.target = null;
        }

        function updateBotHero(hero, dt) {
          hero.aiThink -= dt;
          if (hero.aiThink <= 0) {
            hero.aiThink = 0.45 + Math.random() * 0.35;
            const core = getCore(hero.team);
            const enemyCore = getCore(1 - hero.team);
            const danger = hero.hp / hero.maxHp < 0.35;
            if (danger && core) {
              if (
                hero.cooldowns.w <= 0 &&
                hero.mana >= abilityDefs.w.cost &&
                distance(hero, core) > 170
              )
                castDash(hero, core);
              hero.moveTarget = { x: core.x, y: core.y };
              hero.target = null;
            } else {
              hero.target = nearestEnemy(hero, 470, true);
              if (!hero.target) {
                const path = getPath(hero.lane, hero.team);
                const currentGoal = path[hero.pathIndex] || enemyCore;
                if (!hero.moveTarget || distance(hero, currentGoal) < 55) {
                  hero.pathIndex = Math.min(
                    path.length - 1,
                    hero.pathIndex + 1,
                  );
                  hero.moveTarget = path[hero.pathIndex] || enemyCore;
                } else {
                  hero.moveTarget = currentGoal;
                }
              }
            }
          }

          if (hero.target && hero.target.alive) {
            const d = distance(hero, hero.target);
            if (d > hero.range * 0.85)
              moveToward(hero, hero.target, dt, hero.speed);
            if (d < 460 && hero.cooldowns.q <= 0 && hero.mana >= 24)
              castSkillshot(hero, hero.target, "q");
            if (d < 210 && hero.cooldowns.e <= 0 && hero.mana >= 34)
              castAoe(hero, hero.target, "e");
            if (
              d < 500 &&
              hero.level >= 3 &&
              hero.cooldowns.r <= 0 &&
              hero.mana >= 70 &&
              hero.role === "mage"
            )
              castMeteor(hero, hero.target);
          } else if (hero.moveTarget) {
            moveToward(hero, hero.moveTarget, dt, hero.speed);
          }
        }

        function updateMinions(dt) {
          for (const minion of entities.minions) {
            if (!minion.alive) continue;
            minion.attackTimer -= dt;
            if (
              !validTarget(minion.target, minion.team) ||
              distance(minion, minion.target) > minion.vision * 1.35
            ) {
              minion.target = nearestEnemy(minion, minion.vision, false);
            }

            if (minion.target) {
              const d = distance(minion, minion.target);
              if (d <= minion.range + minion.target.r) {
                tryAttack(minion, minion.target);
              } else {
                moveToward(minion, minion.target, dt, minion.speed);
              }
            } else {
              const wp = minion.path[minion.wp];
              if (wp) {
                moveToward(minion, wp, dt, minion.speed);
                if (distance(minion, wp) < 24) minion.wp += 1;
              } else {
                const core = getCore(1 - minion.team);
                if (core) minion.target = core;
              }
            }
          }
        }

        function updateStructures(dt) {
          for (const structure of entities.structures) {
            if (!structure.alive) continue;
            structure.attackTimer -= dt;
            const target = chooseStructureTarget(structure);
            if (target) tryAttack(structure, target);
          }
        }

        function updateProjectiles(dt) {
          for (const p of entities.projectiles) {
            if (p.dead) continue;
            if (p.target) {
              if (!p.target.alive) {
                p.dead = true;
                continue;
              }
              const n = normalize(p.target.x - p.x, p.target.y - p.y);
              p.x += n.x * p.speed * dt;
              p.y += n.y * p.speed * dt;
              if (distance(p, p.target) <= p.r + p.target.r) {
                damageUnit(p.target, p.damage, p.source, p.name);
                p.dead = true;
                burst(p.x, p.y, p.color, 8);
              }
            } else {
              p.x += p.vx * dt;
              p.y += p.vy * dt;
              p.life -= dt;
              const hit = firstEnemyHit(p);
              if (hit) {
                damageUnit(hit, p.damage, p.source, p.name);
                p.dead = true;
                burst(p.x, p.y, p.color, 12);
              }
              if (
                p.life <= 0 ||
                p.x < -60 ||
                p.x > WORLD_W + 60 ||
                p.y < -60 ||
                p.y > WORLD_H + 60
              )
                p.dead = true;
            }
          }
        }

        function updateAoes(dt) {
          for (const area of entities.aoes) {
            area.life -= dt;
            area.tick -= dt;
            if (area.tick <= 0) {
              area.tick = 0.28;
              const enemies = allDamageables().filter(
                (unit) =>
                  unit.alive &&
                  unit.team !== area.team &&
                  distance(unit, area) < area.r + unit.r,
              );
              for (const unit of enemies) {
                damageUnit(unit, area.damage, area.source, area.name);
                if (
                  area.slow &&
                  (unit.kind === "hero" || unit.kind === "minion")
                ) {
                  unit.slow = Math.max(unit.slow || 0, 0.45);
                  unit.slowTime = Math.max(unit.slowTime || 0, 0.5);
                }
              }
            }
          }

          for (const unit of [...entities.heroes, ...entities.minions]) {
            if (unit.slowTime > 0) {
              unit.slowTime -= dt;
              if (unit.slowTime <= 0) unit.slow = 0;
            }
          }
        }

        function updateRunes(dt) {
          for (const rune of entities.runes) {
            rune.pulse += dt * 3.2;
            if (!rune.available) {
              rune.timer -= dt;
              if (rune.timer <= 0) {
                rune.available = true;
                burst(rune.x, rune.y, rune.color, 14);
              }
              continue;
            }

            for (const hero of entities.heroes) {
              if (!hero.alive || distance(hero, rune) > hero.r + rune.r + 6)
                continue;
              takeRune(hero, rune);
              break;
            }
          }
        }

        function updateTeamBuffs(dt) {
          for (const buff of teamBuffs) {
            buff.duration = Math.max(0, buff.duration - dt);
          }
        }

        function updateJungle(dt) {
          for (const camp of entities.jungle) {
            camp.pulse += dt * 2.6;
            if (!camp.alive) {
              camp.respawn -= dt;
              if (camp.respawn <= 0) {
                camp.alive = true;
                camp.hp = camp.maxHp;
                camp.attackTimer = 0.45;
                camp.aggroTarget = null;
                camp.aggroTime = 0;
                burst(camp.x, camp.y, camp.color, 18);
              }
              continue;
            }

            camp.aggroTime = Math.max(0, camp.aggroTime - dt);
            camp.attackTimer -= dt;
            const target = nearestJungleTarget(camp);
            if (target) tryAttack(camp, target);
          }
        }

        function nearestJungleTarget(camp) {
          if (
            camp.aggroTime > 0 &&
            camp.aggroTarget?.alive &&
            distance(camp, camp.aggroTarget) <=
              camp.range + camp.aggroTarget.r + 42
          ) {
            return camp.aggroTarget;
          }

          const enemies = entities.heroes.filter(
            (unit) => unit.alive && distance(camp, unit) <= camp.range + unit.r,
          );
          if (enemies.length === 0) return null;
          enemies.sort((a, b) => distance(camp, a) - distance(camp, b));
          return enemies[0];
        }

        function updateObjectives(dt) {
          for (const objective of entities.objectives) {
            objective.pulse += dt * 2.2;
            if (!objective.alive) {
              objective.respawn -= dt;
              if (objective.respawn <= 0) {
                objective.alive = true;
                objective.hp = objective.maxHp;
                objective.attackTimer = 0.8;
                objective.aggroTarget = null;
                objective.aggroTime = 0;
                burst(objective.x, objective.y, teamColor[NEUTRAL], 28);
                pushFeed(objective.name + " 重新出现");
              }
              continue;
            }

            objective.aggroTime = Math.max(0, objective.aggroTime - dt);
            objective.attackTimer -= dt;
            const target = nearestObjectiveTarget(objective);
            if (target) tryAttack(objective, target);
          }
        }

        function nearestObjectiveTarget(objective) {
          if (
            objective.aggroTime > 0 &&
            objective.aggroTarget?.alive &&
            distance(objective, objective.aggroTarget) <=
              objective.range + objective.aggroTarget.r + 36
          ) {
            return objective.aggroTarget;
          }

          const enemies = entities.heroes.filter(
            (unit) =>
              unit.alive &&
              distance(objective, unit) <= objective.range + unit.r,
          );
          if (enemies.length === 0) return null;
          enemies.sort((a, b) => {
            const ah = a.kind === "hero" ? -80 : 0;
            const bh = b.kind === "hero" ? -80 : 0;
            return distance(objective, a) + ah - (distance(objective, b) + bh);
          });
          return enemies[0];
        }

        function takeRune(hero, rune) {
          rune.available = false;
          rune.timer = 24;
          if (rune.type === "renew") {
            hero.hp = Math.min(hero.maxHp, hero.hp + hero.maxHp * 0.28);
            hero.mana = Math.min(hero.maxMana, hero.mana + hero.maxMana * 0.42);
          } else if (rune.type === "power") {
            hero.buffTime = Math.max(hero.buffTime || 0, 16);
          } else if (rune.type === "haste") {
            hero.cooldowns.q = Math.max(0, hero.cooldowns.q - 3);
            hero.cooldowns.w = Math.max(0, hero.cooldowns.w - 3);
            hero.cooldowns.e = Math.max(0, hero.cooldowns.e - 3);
            hero.buffTime = Math.max(hero.buffTime || 0, 9);
          } else if (rune.type === "guard") {
            hero.shield = Math.max(hero.shield || 0, 150 + hero.level * 22);
            hero.shieldTime = 5.5;
            hero.guardTime = Math.max(hero.guardTime || 0, 12);
          }
          floatingText(hero.x, hero.y - 36, rune.name, rune.color);
          burst(rune.x, rune.y, rune.color, 22);
          if (hero.isPlayer) showToast(rune.name);
        }

        function updateUnitState(dt) {
          for (const unit of allDamageables()) {
            unit.hitFlash = Math.max(0, (unit.hitFlash || 0) - dt);
            unit.attackFlash = Math.max(0, (unit.attackFlash || 0) - dt);
          }

          for (const hero of entities.heroes) {
            if (!hero.alive) continue;
            const core = getCore(hero.team);
            if (core && distance(hero, core) < 120) {
              hero.hp = Math.min(hero.maxHp, hero.hp + hero.maxHp * 0.08 * dt);
              hero.mana = Math.min(
                hero.maxMana,
                hero.mana + hero.maxMana * 0.18 * dt,
              );
            }
          }
        }

        function separateUnits() {
          const movers = [...entities.heroes, ...entities.minions].filter(
            (unit) => unit.alive,
          );
          for (let i = 0; i < movers.length; i += 1) {
            for (let j = i + 1; j < movers.length; j += 1) {
              const a = movers[i];
              const b = movers[j];
              const minDist = (a.r + b.r) * 0.72;
              const dx = b.x - a.x;
              const dy = b.y - a.y;
              const d = Math.hypot(dx, dy);
              if (d <= 0.01 || d >= minDist) continue;
              const push = (minDist - d) * 0.5;
              const nx = dx / d;
              const ny = dy / d;
              if (!a.isPlayer) {
                a.x = clamp(a.x - nx * push, 34, WORLD_W - 34);
                a.y = clamp(a.y - ny * push, 34, WORLD_H - 34);
              }
              if (!b.isPlayer) {
                b.x = clamp(b.x + nx * push, 34, WORLD_W - 34);
                b.y = clamp(b.y + ny * push, 34, WORLD_H - 34);
              }
            }
          }
        }

        function updateGameMessage() {
          if (game.over) return;
          const redCore = getCore(RED);
          const blueCore = getCore(BLUE);
          const target = player?.target;
          if (target?.alive) {
            game.message = "锁定 " + (target.name || "目标");
          } else if (blueCore && blueCore.hp / blueCore.maxHp < 0.45) {
            game.message =
              "基地告急 · 下一波 " + Math.ceil(game.waveTimer) + "s";
          } else if (redCore && redCore.hp / redCore.maxHp < 0.45) {
            game.message =
              "压制赤方 · 下一波 " + Math.ceil(game.waveTimer) + "s";
          } else {
            game.message =
              "第 " +
              Math.max(1, game.waveNumber) +
              " 波 · 下一波 " +
              Math.ceil(game.waveTimer) +
              "s";
          }
        }

        function moveUnit(unit, nx, ny, dt, speed) {
          const slow = unit.slow ? 1 - unit.slow : 1;
          unit.face = Math.atan2(ny, nx);
          unit.x = clamp(unit.x + nx * speed * slow * dt, 34, WORLD_W - 34);
          unit.y = clamp(unit.y + ny * speed * slow * dt, 34, WORLD_H - 34);
        }

        function moveToward(unit, point, dt, speed) {
          const n = normalize(point.x - unit.x, point.y - unit.y);
          if (n.len < 2) return;
          moveUnit(unit, n.x, n.y, dt, speed);
        }

        function validTarget(target, team) {
          return target && target.alive && target.team !== team;
        }

        function allDamageables(includeObjectives = true) {
          const units = [
            ...entities.heroes,
            ...entities.minions,
            ...entities.structures,
          ];
          if (includeObjectives)
            units.push(...entities.objectives, ...entities.jungle);
          return units.filter((unit) => unit.alive);
        }

        function nearestEnemy(unit, range, preferHero) {
          const enemies = allDamageables().filter((target) => {
            if (
              target.team === unit.team ||
              distance(unit, target) > range + target.r
            )
              return false;
            if (
              target.kind === "objective" &&
              (unit.kind === "minion" || !unit.isPlayer)
            )
              return false;
            if (
              target.kind === "jungle" &&
              (unit.kind === "minion" || !unit.isPlayer)
            )
              return false;
            return true;
          });
          if (enemies.length === 0) return null;
          enemies.sort((a, b) => {
            const ah = preferHero && a.kind === "hero" ? -180 : 0;
            const bh = preferHero && b.kind === "hero" ? -180 : 0;
            const as = a.kind === "minion" ? -30 : 0;
            const bs = b.kind === "minion" ? -30 : 0;
            return distance(unit, a) + ah + as - (distance(unit, b) + bh + bs);
          });
          return enemies[0];
        }

        function chooseStructureTarget(structure) {
          const enemies = allDamageables(false).filter(
            (target) =>
              target.team !== structure.team &&
              distance(structure, target) <= structure.range + target.r,
          );
          if (enemies.length === 0) return null;
          enemies.sort(
            (a, b) =>
              structureThreatScore(structure, a) -
              structureThreatScore(structure, b),
          );
          return enemies[0];
        }

        function structureThreatScore(structure, target) {
          let score = distance(structure, target);
          if (target.kind === "minion")
            score -= target.type === "siege" ? 180 : 120;
          if (target.kind === "hero")
            score -= target.target === structure ? 90 : 35;
          if (target.kind === "structure") score += 240;
          if (target.hitFlash > 0) score -= 25;
          return score;
        }

        function hasNearbyMinion(point, team, radius = 285) {
          return entities.minions.some(
            (minion) =>
              minion.alive &&
              minion.team === team &&
              distance(point, minion) <= radius,
          );
        }

        function firstEnemyHit(projectile) {
          const enemies = allDamageables().filter(
            (unit) => unit.team !== projectile.team,
          );
          for (const unit of enemies) {
            if (distance(projectile, unit) <= projectile.r + unit.r)
              return unit;
          }
          return null;
        }

        function autoAttack(hero) {
          if (!hero.alive) return;
          if (
            !validTarget(hero.target, hero.team) ||
            distance(hero, hero.target) > hero.range + hero.target.r + 70
          ) {
            hero.target = nearestEnemy(hero, hero.range, true);
          }
          if (
            hero.target &&
            distance(hero, hero.target) <= hero.range + hero.target.r
          ) {
            tryAttack(hero, hero.target);
          }
        }

        function tryAttack(attacker, target) {
          if (attacker.attackTimer > 0 || !target || !target.alive) return;
          attacker.attackTimer = attacker.attackCd;
          attacker.attackFlash = 0.18;
          attacker.face = Math.atan2(
            target.y - attacker.y,
            target.x - attacker.x,
          );
          const ranged =
            attacker.kind !== "minion" ||
            attacker.type === "caster" ||
            attacker.kind === "structure";
          if (ranged) {
            launchTargetProjectile(
              attacker,
              target,
              attacker.damage,
              attacker.kind === "structure"
                ? "#f4ca58"
                : teamColor[attacker.team],
              "普攻",
            );
          } else {
            damageUnit(target, attacker.damage, attacker, "普攻");
            burst(target.x, target.y, teamColor[attacker.team], 5);
          }
        }

        function launchTargetProjectile(source, target, damage, color, name) {
          entities.projectiles.push({
            x: source.x,
            y: source.y,
            r: source.kind === "structure" ? 6 : 5,
            team: source.team,
            source,
            target,
            damage,
            color,
            name,
            speed: source.kind === "structure" ? 430 : 360,
            dead: false,
          });
        }

        function damageUnit(unit, amount, source, name) {
          if (!unit.alive) return;
          let damage = amount;
          if (source?.crit > 0 && Math.random() < source.crit) {
            damage *= 1.65;
            if (source === player) showToast("暴击");
          }
          if (source?.buffTime > 0) damage *= 1.18;
          if (source?.emberTime > 0) damage *= 1.14;
          if (
            source &&
            source.team !== NEUTRAL &&
            teamBuffs[source.team]?.duration > 0
          ) {
            damage *= source.kind === "minion" ? 1.24 : 1.08;
            if (unit.kind === "tower" || unit.kind === "core") damage *= 1.1;
          }
          if (unit.kind === "objective" && source && source.team !== NEUTRAL) {
            unit.aggroTarget = source;
            unit.aggroTime = 6;
          }
          if (unit.kind === "jungle" && source && source.team !== NEUTRAL) {
            unit.aggroTarget = source;
            unit.aggroTime = 5.5;
          }
          if (
            (unit.kind === "tower" || unit.kind === "core") &&
            source?.kind === "hero" &&
            source.team !== unit.team &&
            !hasNearbyMinion(unit, source.team)
          ) {
            damage *= source.guardTime > 0 ? 0.62 : 0.42;
          }
          if (unit.bulwarkTime > 0) damage *= 0.88;
          if (unit.shield > 0) {
            const absorbed = Math.min(unit.shield, damage);
            unit.shield -= absorbed;
            damage -= absorbed;
          }
          if (damage <= 0) return;
          unit.hp -= damage;
          if (
            source === player &&
            source.lifesteal > 0 &&
            unit.team !== source.team
          ) {
            source.hp = Math.min(
              source.maxHp,
              source.hp + damage * source.lifesteal,
            );
          }
          unit.hitFlash = 0.16;
          floatingText(
            unit.x,
            unit.y - unit.r - 8,
            Math.round(damage),
            source ? teamColor[source.team] : "#ffffff",
          );
          if (unit.hp <= 0) killUnit(unit, source, name);
        }

        function killUnit(unit, source, name) {
          unit.hp = 0;
          unit.alive = false;
          burst(
            unit.x,
            unit.y,
            unit.kind === "structure" ? "#f4ca58" : teamColor[unit.team],
            unit.kind === "structure" ? 26 : 16,
          );

          if (unit.kind === "core") {
            endGame(1 - unit.team);
            return;
          }

          if (unit.kind === "tower") {
            pushFeed(unit.name + " 被摧毁");
            rewardPlayer(unit, source, 150, 110);
            return;
          }

          if (unit.kind === "objective") {
            unit.respawn = OBJECTIVE_RESPAWN;
            unit.aggroTarget = null;
            unit.aggroTime = 0;
            grantObjectiveBuff(unit, source);
            rewardPlayer(unit, source, unit.gold, unit.xp);
            return;
          }

          if (unit.kind === "jungle") {
            unit.respawn = unit.respawnDelay;
            unit.aggroTarget = null;
            unit.aggroTime = 0;
            grantJungleBuff(unit, source);
            rewardPlayer(unit, source, unit.gold, unit.xp);
            return;
          }

          if (unit.kind === "hero") {
            unit.respawn = unit.isPlayer
              ? 8 * (1 - (career.tech.recovery || 0) * 0.08)
              : 10;
            if (unit.isPlayer) {
              game.deaths += 1;
              queuedAbility = null;
            }
            if (source && source.team === BLUE)
              game.kills += unit.team === RED ? 1 : 0;
            pushFeed((source?.name || "兵线") + " 击败 " + unit.name);
            rewardPlayer(unit, source, 180, 150);
            return;
          }

          rewardPlayer(unit, source, unit.gold, unit.xp);
        }

        function grantJungleBuff(unit, source) {
          if (!source || source.kind !== "hero" || source.team === NEUTRAL)
            return;
          const hero = source;
          if (unit.type === "ember") {
            hero.emberTime = Math.max(hero.emberTime || 0, 30);
            hero.buffTime = Math.max(hero.buffTime || 0, 8);
            floatingText(hero.x, hero.y - 38, "余烬", unit.color);
            if (hero.isPlayer) showToast("获得余烬增伤");
          } else if (unit.type === "aether") {
            hero.aetherTime = Math.max(hero.aetherTime || 0, 30);
            hero.mana = hero.maxMana;
            for (const key of ["q", "w", "e"])
              hero.cooldowns[key] = Math.max(0, hero.cooldowns[key] - 2);
            floatingText(hero.x, hero.y - 38, "苍蓝", unit.color);
            if (hero.isPlayer) showToast("获得苍蓝回能");
          } else if (unit.type === "bulwark") {
            hero.bulwarkTime = Math.max(hero.bulwarkTime || 0, 28);
            hero.guardTime = Math.max(hero.guardTime || 0, 16);
            hero.shield = Math.max(hero.shield || 0, 120 + hero.level * 24);
            hero.shieldTime = Math.max(hero.shieldTime || 0, 6);
            floatingText(hero.x, hero.y - 38, "石甲", unit.color);
            if (hero.isPlayer) showToast("获得石甲护盾");
          }
          burst(unit.x, unit.y, unit.color, 24);
        }

        function grantObjectiveBuff(unit, source) {
          if (!source || source.team === NEUTRAL || !teamBuffs[source.team]) {
            pushFeed(unit.name + " 被击败");
            return;
          }
          teamBuffs[source.team].duration = Math.max(
            teamBuffs[source.team].duration,
            OBJECTIVE_BUFF_DURATION +
              (source.team === BLUE ? (career.tech.objective || 0) * 6 : 0),
          );
          for (const hero of entities.heroes) {
            if (hero.team !== source.team || !hero.alive) continue;
            hero.buffTime = Math.max(hero.buffTime || 0, 12);
            hero.mana = Math.min(hero.maxMana, hero.mana + 55);
            floatingText(hero.x, hero.y - 38, "晶潮", teamColor[source.team]);
          }
          burst(unit.x, unit.y, teamColor[source.team], 34);
          pushFeed(
            teamName[source.team] + " 击败 " + unit.name + "，获得晶潮推进",
          );
          if (source.team === BLUE) showToast("晶潮推进已激活");
        }

        function rewardPlayer(unit, source, gold, xp) {
          if (!source || source.team !== BLUE) return;
          const nearby = distance(player, unit) < 520;
          const major =
            unit.kind === "hero" ||
            unit.kind === "tower" ||
            unit.kind === "objective" ||
            unit.kind === "jungle";
          if (source === player || nearby || major) {
            const share =
              source === player
                ? 1
                : unit.kind === "objective"
                  ? 0.85
                  : major
                    ? 0.65
                    : 0.42;
            const gainedGold = Math.max(1, Math.round(gold * share));
            const gainedXp = Math.max(1, Math.round(xp * share));
            player.gold += gainedGold;
            player.xp += gainedXp;
            floatingText(
              player.x,
              player.y - 34,
              "+" + gainedGold + "G",
              "#f4ca58",
            );
            checkLevelUp();
          }
        }

        function checkLevelUp() {
          while (player.level < 6 && player.xp >= xpNeed(player.level)) {
            player.xp -= xpNeed(player.level);
            player.level += 1;
            player.maxHp += 86;
            player.hp = Math.min(player.maxHp, player.hp + 160);
            player.maxMana += 24;
            player.mana = player.maxMana;
            player.damage += 7;
            abilityRenderKey = "";
            showToast("等级提升 " + player.level);
            burst(player.x, player.y, "#67d784", 24);
          }
        }

        function xpNeed(level) {
          return 95 + level * 72;
        }

        function respawnHero(hero) {
          const core = getCore(hero.team);
          hero.alive = true;
          hero.hp = hero.maxHp;
          hero.mana = hero.maxMana;
          hero.shield = 0;
          hero.shieldTime = 0;
          hero.emberTime = 0;
          hero.aetherTime = 0;
          hero.bulwarkTime = 0;
          hero.target = null;
          hero.moveTarget = null;
          hero.x = core ? core.x + (hero.team === BLUE ? 45 : -45) : hero.x;
          hero.y = core ? core.y + (hero.team === BLUE ? -45 : 45) : hero.y;
          pushFeed(hero.name + " 回到战场");
        }

        function getCore(team) {
          return entities.structures.find(
            (item) => item.kind === "core" && item.team === team,
          );
        }

        function queueAbility(key) {
          if (!game.started || game.paused || game.over || !player.alive)
            return;
          key = key.toLowerCase();
          const def = activeAbilityDef(key);
          if (!def) return;
          if (key === "r" && player.level < 3) {
            showToast("R 技能需要 3 级");
            return;
          }
          if (player.cooldowns[key] > 0) {
            showToast(def.name + " 冷却中");
            return;
          }
          if (player.mana < def.cost) {
            showToast("能量不足");
            return;
          }
          queuedAbility = queuedAbility === key ? null : key;
          abilityRenderKey = "";
          showToast(queuedAbility ? "选择 " + def.key + " 落点" : "取消技能");
          updateUI();
        }

        function useAbility(key) {
          if (!game.started || game.paused || game.over || !player.alive)
            return;
          key = key.toLowerCase();
          const def = activeAbilityDef(key);
          if (!def) return;
          if (key === "r" && player.level < 3) {
            showToast("R 技能需要 3 级");
            return;
          }
          if (player.cooldowns[key] > 0) return;
          if (player.mana < def.cost) {
            showToast("能量不足");
            return;
          }
          player.mana -= def.cost;
          player.cooldowns[key] = def.cd;
          queuedAbility = null;
          abilityRenderKey = "";

          if (key === "q") castSkillshot(player, pointer, key);
          if (key === "w") castDash(player, pointer);
          if (key === "e") castAoe(player, pointer, key);
          if (key === "r") castMeteor(player, pointer);
          updateUI();
        }

        function castSkillshot(caster, point, key) {
          const def = abilityDefs[key] || abilityDefs.q;
          const n = normalize(point.x - caster.x, point.y - caster.y);
          caster.face = Math.atan2(n.y, n.x);
          caster.attackFlash = 0.2;
          entities.projectiles.push({
            x: caster.x + n.x * 24,
            y: caster.y + n.y * 24,
            vx: n.x * 540,
            vy: n.y * 540,
            r: 8,
            team: caster.team,
            source: caster,
            damage: caster.isPlayer
              ? (88 + caster.level * 18) * (caster.skillPower || 1)
              : 62,
            color: caster.team === BLUE ? "#7ee3ff" : "#ff9a82",
            name: caster.isPlayer ? activeAbilityDef("q").name : "弧光刃",
            life: def.range / 540,
            dead: false,
          });
          caster.cooldowns.q = abilityDefs.q.cd;
          caster.mana = Math.max(0, caster.mana - (caster.isPlayer ? 0 : 24));
          burst(
            caster.x,
            caster.y,
            caster.team === BLUE ? "#4ec5e8" : "#ff6c5f",
            8,
          );
        }

        function castDash(caster, point) {
          const n = normalize(point.x - caster.x, point.y - caster.y);
          caster.face = Math.atan2(n.y, n.x);
          const distanceToMove = Math.min(
            abilityDefs.w.range * (caster.isPlayer ? caster.aoeScale || 1 : 1),
            n.len || abilityDefs.w.range,
          );
          caster.x = clamp(caster.x + n.x * distanceToMove, 34, WORLD_W - 34);
          caster.y = clamp(caster.y + n.y * distanceToMove, 34, WORLD_H - 34);
          caster.shield = (96 + caster.level * 18) * (caster.shieldScale || 1);
          caster.shieldTime = 2.4;
          caster.cooldowns.w = abilityDefs.w.cd;
          caster.mana = Math.max(
            0,
            caster.mana - (caster.isPlayer ? 0 : abilityDefs.w.cost),
          );
          burst(caster.x, caster.y, "#67d784", 20);
        }

        function castAoe(caster, point, key) {
          const def = abilityDefs[key] || abilityDefs.e;
          const n = normalize(point.x - caster.x, point.y - caster.y);
          caster.face = Math.atan2(n.y, n.x);
          caster.attackFlash = 0.22;
          const range = Math.min(def.range, n.len);
          const x = caster.x + n.x * range;
          const y = caster.y + n.y * range;
          entities.aoes.push({
            x,
            y,
            r: 88 * (caster.aoeScale || 1),
            team: caster.team,
            source: caster,
            damage: caster.isPlayer
              ? (28 + caster.level * 4) * (caster.skillPower || 1)
              : 20,
            name: caster.isPlayer ? activeAbilityDef("e").name : "星沼",
            slow: true,
            life: 2.4,
            tick: 0.05,
            color:
              caster.team === BLUE
                ? "rgba(103, 215, 132, 0.25)"
                : "rgba(255, 108, 95, 0.22)",
          });
          caster.cooldowns.e = abilityDefs.e.cd;
          caster.mana = Math.max(0, caster.mana - (caster.isPlayer ? 0 : 34));
        }

        function castMeteor(caster, point) {
          const n = normalize(point.x - caster.x, point.y - caster.y);
          caster.face = Math.atan2(n.y, n.x);
          caster.attackFlash = 0.28;
          const range = Math.min(abilityDefs.r.range, n.len);
          const x = caster.x + n.x * range;
          const y = caster.y + n.y * range;
          entities.aoes.push({
            x,
            y,
            r: 124 * (caster.aoeScale || 1),
            team: caster.team,
            source: caster,
            damage: (84 + caster.level * 15) * (caster.skillPower || 1),
            name: caster.isPlayer ? activeAbilityDef("r").name : "晶陨",
            life: 1.05,
            tick: 0.16,
            color: "rgba(244, 202, 88, 0.26)",
          });
          caster.cooldowns.r = abilityDefs.r.cd;
          caster.mana = Math.max(
            0,
            caster.mana - (caster.isPlayer ? 0 : abilityDefs.r.cost),
          );
          shockRing(x, y, 124, "#f4ca58");
        }

        function buyUpgrade(type) {
          if (!player || game.over) return;
          const costs = {
            attack: 90,
            health: 110,
            haste: 130,
            sustain: 150,
            ward: 160,
            momentum: 175,
          };
          const cost = costs[type];
          if (player.gold < cost) {
            showToast("金币不足");
            return;
          }
          player.gold -= cost;
          if (type === "attack") {
            player.damage += 9;
            showToast("攻击提升");
          } else if (type === "health") {
            player.maxHp += 120;
            player.hp = Math.min(player.maxHp, player.hp + 120);
            showToast("生命提升");
          } else if (type === "haste") {
            player.haste += 0.08;
            showToast("冷却加速");
          } else if (type === "sustain") {
            player.lifesteal = (player.lifesteal || 0) + 0.025;
            showToast("汲取效果提升");
          } else if (type === "ward") {
            player.maxMana += 35;
            player.mana = player.maxMana;
            player.shield = Math.max(player.shield || 0, 150);
            player.shieldTime = 7;
            showToast("守望屏障展开");
          } else if (type === "momentum") {
            player.speed += 16;
            showToast("移动速度提升");
          }
          player.items[type] = (player.items[type] || 0) + 1;
          updateUI();
        }

        function checkWin() {
          const blueCore = getCore(BLUE);
          const redCore = getCore(RED);
          if (blueCore && !blueCore.alive) endGame(RED);
          if (redCore && !redCore.alive) endGame(BLUE);
        }

        function endGame(winner) {
          if (game.over) return;
          game.over = true;
          game.winner = winner;
          queuedAbility = null;
          const won = winner === BLUE;
          const rule = MATCH_RULES[game.rule || selectedRule];
          const shards = Math.max(
            3,
            Math.floor(
              (game.kills * 1.5 + game.waveNumber + (won ? 16 : 0)) *
                rule.reward *
                (1 + (career.tech.fortune || 0) * 0.08),
            ),
          );
          career.shards += shards;
          career.games += 1;
          career.wins += won ? 1 : 0;
          const previousStreak = career.streak || 0;
          const rankDelta = won
            ? Math.round(15 * rule.reward + Math.min(10, previousStreak * 2))
            : -Math.round(7 * Math.max(1, rule.enemy));
          career.streak = won ? previousStreak + 1 : 0;
          career.rankPoints = Math.max(
            0,
            (career.rankPoints || 0) + rankDelta,
          );
          career.bestKills = Math.max(career.bestKills, game.kills);
          career.mastery[selectedChampion] =
            (career.mastery[selectedChampion] || 0) + 1;
          const record = career.records[selectedRule] || {
            plays: 0,
            wins: 0,
            bestTime: 0,
          };
          record.plays += 1;
          record.wins += won ? 1 : 0;
          if (won)
            record.bestTime =
              !record.bestTime || game.time < record.bestTime
                ? Math.round(game.time)
                : record.bestTime;
          career.records[selectedRule] = record;
          storeCareer();
          renderDeployment();
          resultTitle.textContent = won ? "胜利" : "失败";
          resultCopy.textContent = `${CHAMPIONS[selectedChampion].name} · ${rule.name} · 用时 ${formatTime(game.time)} · 击败 ${game.kills} · 阵亡 ${game.deaths} · 第 ${game.waveNumber} 波 · 获得 ${shards} 晶屑 · 天梯 ${rankDelta >= 0 ? "+" : ""}${rankDelta}`;
          resultModal.classList.add("show");
          pushFeed(won ? "赤晶核被摧毁" : "蓝晶核被摧毁");
          showToast(won ? "胜利" : "失败");
        }

        function cleanupEntities() {
          entities.projectiles = entities.projectiles.filter((p) => !p.dead);
          entities.aoes = entities.aoes.filter((a) => a.life > 0);
          entities.particles = entities.particles.filter((p) => p.life > 0);
          entities.texts = entities.texts.filter((t) => t.life > 0);
          entities.minions = entities.minions.filter((m) => m.alive);
        }

        function updateParticles(dt) {
          for (const p of entities.particles) {
            p.life -= dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 18 * dt;
          }
        }

        function updateFloatingTexts(dt) {
          for (const t of entities.texts) {
            t.life -= dt;
            t.y -= 28 * dt;
          }
        }

        function updateToast(dt) {
          if (toastTimer > 0) {
            toastTimer -= dt;
            if (toastTimer <= 0) toast.classList.remove("show");
          }
        }

        function burst(x, y, color, count) {
          for (let i = 0; i < count; i += 1) {
            const a = Math.random() * Math.PI * 2;
            const s = 45 + Math.random() * 120;
            entities.particles.push({
              x,
              y,
              vx: Math.cos(a) * s,
              vy: Math.sin(a) * s,
              r: 2 + Math.random() * 3,
              color,
              life: 0.45 + Math.random() * 0.35,
            });
          }
        }

        function shockRing(x, y, r, color) {
          entities.particles.push({
            x,
            y,
            vx: 0,
            vy: 0,
            r,
            color,
            ring: true,
            life: 0.55,
          });
        }

        function floatingText(x, y, text, color) {
          entities.texts.push({ x, y, text, color, life: 0.85 });
        }

        function showToast(message) {
          toast.textContent = message;
          toast.classList.add("show");
          toastTimer = 1.5;
        }

        function pushFeed(message) {
          const line = document.createElement("div");
          line.className = "feed-line";
          line.textContent = formatTime(game.time) + "  " + message;
          feed.prepend(line);
          while (feed.children.length > 9) feed.removeChild(feed.lastChild);
        }

        function updateUI() {
          if (!player) return;
          statusText.textContent = game.over
            ? game.winner === BLUE
              ? "胜利"
              : "失败"
            : game.paused
              ? "暂停"
              : game.message;
          timerText.textContent = formatTime(game.time);
          levelValue.textContent = `${player.level} (${Math.floor(player.xp)}/${xpNeed(player.level)})`;
          goldValue.textContent = Math.floor(player.gold);
          const blueCore = getCore(BLUE);
          const redCore = getCore(RED);
          blueCoreValue.textContent = blueCore
            ? percent(blueCore.hp, blueCore.maxHp)
            : "0%";
          redCoreValue.textContent = redCore
            ? percent(redCore.hp, redCore.maxHp)
            : "0%";
          renderObjectivePanel();
          renderLaneBoard();
          buyAttack.disabled = player.gold < 90;
          buyHealth.disabled = player.gold < 110;
          buyHaste.disabled = player.gold < 130;
          buySustain.disabled = player.gold < 150;
          buyWard.disabled = player.gold < 160;
          buyMomentum.disabled = player.gold < 175;
          renderAbilities();
        }

        function renderObjectivePanel() {
          const objective = entities.objectives[0];
          const buffs = [BLUE, RED]
            .filter((team) => teamBuffs[team].duration > 0)
            .map(
              (team) =>
                `${teamName[team].slice(0, 1)} ${Math.ceil(teamBuffs[team].duration)}s`,
            );
          const personalBuffs = [];
          if (player.emberTime > 0)
            personalBuffs.push(`余烬 ${Math.ceil(player.emberTime)}s`);
          if (player.aetherTime > 0)
            personalBuffs.push(`苍蓝 ${Math.ceil(player.aetherTime)}s`);
          if (player.bulwarkTime > 0)
            personalBuffs.push(`石甲 ${Math.ceil(player.bulwarkTime)}s`);
          const allBuffs = [...buffs, ...personalBuffs];
          teamBuffValue.textContent = allBuffs.length
            ? allBuffs.join(" / ")
            : "无增益";
          if (!objective) {
            objectiveValue.textContent = "远古晶兽";
            objectiveTimer.textContent = "未出现";
            return;
          }
          objectiveValue.textContent = objective.alive
            ? `${objective.name} ${percent(objective.hp, objective.maxHp)}`
            : objective.name;
          objectiveTimer.textContent = objective.alive
            ? "可争夺 · 击败强化兵线"
            : `刷新 ${Math.ceil(Math.max(0, objective.respawn))}s`;
        }

        function renderLaneBoard() {
          const laneStates = lanes.map((lane, index) => {
            const pressure = lanePressure(index);
            const score = Math.round(pressure * 100);
            const label =
              pressure > 0.18
                ? "蓝方推进"
                : pressure < -0.18
                  ? "赤方推进"
                  : "均势";
            return { lane, pressure, score, label };
          });
          const nextKey = laneStates
            .map((state) => `${state.score}:${state.label}`)
            .join("|");
          if (nextKey === laneRenderKey) return;
          laneRenderKey = nextKey;
          laneBoard.innerHTML = laneStates
            .map((state) => {
              const position = clamp(50 + state.pressure * 42, 7, 93);
              const color =
                state.pressure >= 0 ? teamColor[BLUE] : teamColor[RED];
              return `
        <div class="lane-state">
          <div class="lane-row"><strong>${state.lane.name}</strong><span>${state.label}</span></div>
          <div class="lane-track"><i class="lane-marker" style="left:${position}%;background:${color}"></i></div>
        </div>
      `;
            })
            .join("");
        }

        function lanePressure(laneIndex) {
          const blueMinions = entities.minions.filter(
            (m) => m.alive && m.team === BLUE && m.lane === laneIndex,
          ).length;
          const redMinions = entities.minions.filter(
            (m) => m.alive && m.team === RED && m.lane === laneIndex,
          ).length;
          const blueTower = entities.structures.some(
            (s) =>
              s.alive &&
              s.kind === "tower" &&
              s.team === BLUE &&
              s.lane === laneIndex,
          )
            ? 1
            : 0;
          const redTower = entities.structures.some(
            (s) =>
              s.alive &&
              s.kind === "tower" &&
              s.team === RED &&
              s.lane === laneIndex,
          )
            ? 1
            : 0;
          const blueHeroes = entities.heroes.filter(
            (h) => h.alive && h.team === BLUE && h.lane === laneIndex,
          ).length;
          const redHeroes = entities.heroes.filter(
            (h) => h.alive && h.team === RED && h.lane === laneIndex,
          ).length;
          return clamp(
            (blueMinions - redMinions) * 0.09 +
              (blueTower - redTower) * 0.22 +
              (blueHeroes - redHeroes) * 0.06,
            -1,
            1,
          );
        }

        function renderAbilities() {
          const nextKey = ["q", "w", "e", "r"]
            .map((key) => {
              const def = activeAbilityDef(key);
              const locked = key === "r" && player.level < 3;
              return [
                key,
                queuedAbility === key ? 1 : 0,
                locked ? 1 : 0,
                Math.ceil(player.cooldowns[key] * 10),
                player.mana >= def.cost ? 1 : 0,
                player.alive ? 1 : 0,
                game.paused ? 1 : 0,
                game.over ? 1 : 0,
              ].join(":");
            })
            .join("|");
          if (nextKey === abilityRenderKey) return;
          abilityRenderKey = nextKey;
          abilityGrid.innerHTML = "";
          for (const key of ["q", "w", "e", "r"]) {
            const def = activeAbilityDef(key);
            const cd = player.cooldowns[key];
            const locked = key === "r" && player.level < 3;
            const button = document.createElement("button");
            button.className = "ability-btn";
            if (queuedAbility === key) button.classList.add("armed");
            button.disabled =
              locked ||
              cd > 0 ||
              player.mana < def.cost ||
              !player.alive ||
              game.paused ||
              game.over;
            button.innerHTML = `<strong>${def.key} ${def.name}</strong><span>${locked ? "3 级解锁" : cd > 0 ? cd.toFixed(1) + "s" : def.cost + " 能量"}</span>`;
            button.addEventListener("click", () => queueAbility(key));
            abilityGrid.appendChild(button);
          }
        }

        function percent(value, max) {
          return Math.max(0, Math.ceil((value / max) * 100)) + "%";
        }

        function formatTime(time) {
          const minutes = Math.floor(time / 60)
            .toString()
            .padStart(2, "0");
          const seconds = Math.floor(time % 60)
            .toString()
            .padStart(2, "0");
          return minutes + ":" + seconds;
        }

        function draw() {
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.save();
          ctx.translate(view.ox, view.oy);
          ctx.scale(view.scale, view.scale);

          drawMap();
          drawJungleCamps();
          drawRunes();
          drawRanges();
          drawAbilityPreview();
          drawAoes();
          drawStructures();
          drawObjectives();
          drawMinions();
          drawHeroes();
          drawProjectiles();
          drawParticles();
          drawTexts();
          drawCursor();

          ctx.restore();
          drawScreenHud();
        }

        function drawRanges() {
          if (!game.started || !player?.alive) return;
          ctx.save();
          ctx.strokeStyle = "rgba(78, 197, 232, 0.22)";
          ctx.lineWidth = 2;
          ctx.setLineDash([11, 14]);
          ctx.beginPath();
          ctx.arc(player.x, player.y, player.range + player.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);

          for (const tower of entities.structures) {
            if (
              !tower.alive ||
              tower.kind !== "tower" ||
              tower.team === player.team
            )
              continue;
            const close = distance(player, tower) < tower.range + 80;
            if (!close) continue;
            ctx.strokeStyle = "rgba(255, 108, 95, 0.26)";
            ctx.fillStyle = "rgba(255, 108, 95, 0.035)";
            ctx.lineWidth = 2;
            ctx.beginPath();
