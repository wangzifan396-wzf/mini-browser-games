<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>霓虹叠塔</title><style>body{margin:0;background:#080814;color:#f8f4ff;font-family:system-ui,"Microsoft YaHei"}.app{height:100vh;display:grid;grid-template-columns:1fr 230px;gap:10px;padding:10px;box-sizing:border-box}.stage,aside{border:1px solid #4b3d78;border-radius:16px;background:#121126;overflow:hidden}.stage{position:relative}canvas{width:100%;height:100%;display:block;touch-action:none}aside{padding:14px;display:flex;flex-direction:column;gap:9px}.card{padding:10px;border:1px solid #4b3d78;border-radius:10px}.card b{display:block;color:#dc87ff;font-size:25px}button{padding:10px;border:1px solid #7854ad;border-radius:9px;background:#352253;color:#fff;font-weight:bold}.overlay{position:absolute;inset:0;display:grid;place-items:center;text-align:center;background:#080713c9}.hidden{display:none}.help{color:#c0afd8;line-height:1.6}@media(max-width:650px){.app{grid-template-columns:1fr;grid-template-rows:1fr 130px;padding:6px}aside{display:grid;grid-template-columns:repeat(3,1fr);padding:7px}.help{display:none}}</style><body><main class="app"><section class="stage"><canvas id="c"></canvas><div id="overlay" class="overlay"><div><h1>霓虹叠塔</h1><p>点击放下移动方块；重叠部分会保留，完美落点累积连击并恢复塔宽。</p><button id="startBtn">开始叠塔</button></div></div></section><aside><div class="card">层数 / 最佳<b id="score">0 / 0</b></div><div class="card">完美连击<b id="combo">0</b></div><div class="card">风速<b id="speed">1.0×</b></div><button id="resetBtn">新塔</button><div class="help">鼠标、空格或触摸放置。每十层改变风向与速度；连续三次完美落点会略微扩宽塔身。</div></aside></main><script>
const c=document.querySelector('#c'),x=c.getContext('2d'),O=document.querySelector('#overlay'),S=document.querySelector('#score'),C=document.querySelector('#combo'),V=document.querySelector('#speed');let q,last=0;const BK='stack_tower_best';function reset(){q={run:false,blocks:[{x:.5,w:.45,y:.88}],cur:null,score:0,best:+localStorage.getItem(BK)||0,combo:0,dir:1,t:0};next();sync()}function next(){let b=q.blocks[q.blocks.length-1];q.cur={x:q.dir>0?-.25:1.25,w:b.w,y:b.y-.075};q.dir*=-1}function start(){reset();q.run=true;O.classList.add('hidden');last=performance.now()}function place(){if(!q.run)return;let b=q.blocks[q.blocks.length-1],l=Math.max(q.cur.x-q.cur.w/2,b.x-b.w/2),r=Math.min(q.cur.x+q.cur.w/2,b.x+b.w/2),w=r-l;if(w<=.015)return end();let perfect=Math.abs(q.cur.x-b.x)<.012;q.combo=perfect?q.combo+1:0;if(q.combo&&q.combo%3===0)w=Math.min(b.w,w+.025);q.blocks.push({x:(l+r)/2,w,y:q.cur.y});q.score++;if(q.blocks.length>11){q.blocks.shift();q.blocks.forEach(z=>z.y+=.075)}next();sync()}function update(dt){if(!q.run)return;q.t+=dt;let sp=.35+Math.min(.55,q.score*.018);q.cur.x+=q.dir*sp*dt;if(q.cur.x>1.25||q.cur.x<-.25)q.dir*=-1;sync()}function end(){q.run=false;q.best=Math.max(q.best,q.score);localStorage.setItem(BK,q.best);O.innerHTML=`<div><h1>塔身坍塌</h1><p>${q.score} 层 · 最佳 ${q.best}</p><button id="startBtn">重新叠塔</button></div>`;O.classList.remove('hidden');document.querySelector('#startBtn').onclick=start}function sync(){S.textContent=`${q.score} / ${q.best}`;C.textContent=q.combo;V.textContent=(1+Math.min(2,q.score*.04)).toFixed(1)+'×'}function draw(){let w=c.clientWidth,h=c.clientHeight;c.width=w*devicePixelRatio;c.height=h*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);x.fillStyle='#111027';x.fillRect(0,0,w,h);let all=[...q.blocks,q.cur].filter(Boolean);all.forEach((b,i)=>{x.fillStyle=`hsl(${(i*31+q.score*9)%360} 78% 62%)`;x.fillRect((b.x-b.w/2)*w,b.y*h,b.w*w,.065*h)})}function loop(t){let dt=Math.min(.03,(t-last)/1000);last=t;update(dt);draw();requestAnimationFrame(loop)}c.addEventListener('pointerdown',place);addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();place()}});document.querySelector('#startBtn').onclick=start;document.querySelector('#resetBtn').onclick=reset;reset();requestAnimationFrame(loop);
</script>
