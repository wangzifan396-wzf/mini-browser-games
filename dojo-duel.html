<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>巷馆对决</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23101824'/%3E%3Cpath d='M14 48h36M20 38l8-18h8l8 18' stroke='%23f0d16f' stroke-width='5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Ccircle cx='32' cy='18' r='6' fill='%238bd0bb'/%3E%3C/svg%3E">
    <style>
      :root{--ink:#10191f;--panel:#fffdf4;--line:#87989e;--teal:#287468;--gold:#d6a33d;--red:#bd5148;--blue:#326f91;--shadow:rgba(5,12,16,.28);--radius:8px}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,sans-serif;background:linear-gradient(rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(135deg,#0c1824,#263844 48%,#3d3141);background-size:30px 30px,30px 30px,auto}button{font:inherit}.app{width:min(1380px,calc(100vw - 28px));margin:14px auto}.topbar,.panel{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,244,.97);box-shadow:0 16px 36px var(--shadow)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px}.eyebrow{margin:0 0 5px;color:#856219;font-size:12px;font-weight:900}h1{margin:0;font-size:clamp(26px,4vw,44px);line-height:1}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:42px;padding:0 14px;border:1px solid #24534d;border-radius:var(--radius);color:#fffdf6;background:var(--teal);font-weight:900;cursor:pointer}.btn.secondary{color:var(--ink);background:#f0d17b;border-color:#9c7621}.layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:14px;margin-top:14px;align-items:start}.stage{position:relative;overflow:hidden;min-height:630px}canvas{display:block;width:100%;height:630px;touch-action:none}.side{padding:16px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.stat{padding:10px;border:1px solid #9da69e;border-radius:var(--radius);background:#f9f7eb}.stat b{display:block;font-size:24px;line-height:1.1}.stat small{color:#5e6d67;font-weight:800}.meter{margin:0 0 13px}.meter span{display:flex;justify-content:space-between;margin-bottom:6px;color:#5e6d67;font-weight:900}.bar{height:13px;border:1px solid #84968f;border-radius:999px;overflow:hidden;background:#e9eadc}.bar i{display:block;width:100%;height:100%;background:linear-gradient(90deg,var(--blue),#8bd0bb)}.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.pad button{min-height:52px;border:1px solid #758780;border-radius:var(--radius);background:#fff8e6;color:var(--ink);font-weight:900;cursor:pointer}.pad .blank{visibility:hidden}.pad .attack{background:#fde7d9}.pad .guard{background:#e7f3ef}.hint{margin:14px 0 0;color:#566861;line-height:1.55;font-weight:700}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:24px;background:rgba(16,28,31,.52)}.modal{width:min(470px,100%);padding:22px;border:1px solid #a4b4ad;border-radius:var(--radius);background:#fffdf6;box-shadow:0 24px 52px rgba(0,0,0,.32)}.modal h2{margin:0 0 10px;font-size:28px}.modal p{margin:0 0 16px;color:#53635f;line-height:1.6}.hidden{display:none}@media(max-width:940px){.layout{grid-template-columns:1fr}.side{order:-1}.stage{min-height:540px}canvas{height:540px}}@media(max-width:620px){.app{width:min(100vw - 16px,1380px);margin-top:8px}.topbar{display:block;padding:14px}.actions{margin-top:12px;justify-content:stretch}.btn{flex:1 1 auto}.stage{min-height:510px}canvas{height:510px}.stat b{font-size:21px}.pad button{font-size:14px}}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div><p class="eyebrow">2D FIGHTING</p><h1>巷馆对决</h1></div>
        <div class="actions"><button class="btn" id="startBtn">开战</button><button class="btn secondary" id="pauseBtn">暂停</button><button class="btn secondary" id="resetBtn">重开</button></div>
      </header>
      <section class="layout">
        <div class="panel stage"><canvas id="gameCanvas" aria-label="巷馆对决游戏画面"></canvas><div class="overlay" id="overlay"><div class="modal"><h2 id="overlayTitle">夜馆开擂</h2><p id="overlayText">移动找距离，轻击打断、重击破防、格挡减伤。把对手血量打空即可获胜。</p><button class="btn" id="overlayBtn">进入擂台</button></div></div></div>
        <aside class="panel side">
          <div class="stats"><div class="stat"><b id="roundText">1</b><small>回合</small></div><div class="stat"><b id="scoreText">0</b><small>评分</small></div><div class="stat"><b id="comboText">0</b><small>连击</small></div><div class="stat"><b id="bestText">0</b><small>最佳</small></div></div>
          <div class="meter"><span><b>我方体力</b><em id="hpText">100%</em></span><div class="bar"><i id="hpBar"></i></div></div>
          <div class="meter"><span><b>对手体力</b><em id="enemyText">100%</em></span><div class="bar"><i id="enemyBar"></i></div></div>
          <div class="meter"><span><b>气力</b><em id="staminaText">100%</em></span><div class="bar"><i id="staminaBar"></i></div></div>
          <div class="pad">
            <button data-key="KeyA">左</button><button data-key="KeyW">跳</button><button data-key="KeyD">右</button>
            <button class="attack" data-key="KeyJ">轻击</button><button class="attack" data-key="KeyK">重击</button><button class="guard" data-key="KeyL">格挡</button>
            <button class="guard" data-key="ShiftLeft">闪避</button><button class="blank"></button><button class="blank"></button>
          </div>
          <p class="hint">A/D 移动，W 跳，J 轻击，K 重击，L 格挡，Shift 闪避。格挡会消耗气力，重击命中评分更高。</p>
        </aside>
      </section>
    </main>
    <script>
      (()=> {
        const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d"),overlay=document.getElementById("overlay"),overlayTitle=document.getElementById("overlayTitle"),overlayText=document.getElementById("overlayText"),overlayBtn=document.getElementById("overlayBtn"),startBtn=document.getElementById("startBtn"),pauseBtn=document.getElementById("pauseBtn"),resetBtn=document.getElementById("resetBtn");
        const roundText=document.getElementById("roundText"),scoreText=document.getElementById("scoreText"),comboText=document.getElementById("comboText"),bestText=document.getElementById("bestText"),hpText=document.getElementById("hpText"),enemyText=document.getElementById("enemyText"),staminaText=document.getElementById("staminaText"),hpBar=document.getElementById("hpBar"),enemyBar=document.getElementById("enemyBar"),staminaBar=document.getElementById("staminaBar");
        const storageKey="miniDojoDuelRecords";let w=900,h=630,dpr=1,last=0,loopToken=0;const keys=new Set(),pressed=new Set();let state=makeState();
        function loadBest(){try{return JSON.parse(localStorage.getItem(storageKey)||"{}").best||0}catch(e){return 0}}function saveBest(v){const b=Math.max(loadBest(),v);localStorage.setItem(storageKey,JSON.stringify({best:b}));return b}
        function fighter(x,team){return{x,y:0,vx:0,vy:0,w:58,h:126,dir:team===0?1:-1,hp:100,stamina:100,team,grounded:false,state:"idle",timer:0,attack:null,guard:0,dodge:0,hit:0,ai:0}}
        function makeState(){return{mode:"menu",round:1,score:0,combo:0,comboTimer:0,best:loadBest(),time:99,msg:"",msgTimer:0,shake:0,particles:[],player:fighter(190,0),enemy:fighter(710,1)}}
        function resize(){const r=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,devicePixelRatio||1));w=Math.max(320,r.width);h=Math.max(500,r.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
        function ground(){return h-98}
        function start(){loopToken++;state=makeState();state.player.y=ground()-state.player.h;state.enemy.y=ground()-state.enemy.h;state.mode="running";overlay.classList.add("hidden");last=performance.now();updateHud();requestAnimationFrame(t=>loop(t,loopToken))}
        function togglePause(){if(state.mode==="running"){state.mode="paused";overlayTitle.textContent="已暂停";overlayText.textContent="擂台先歇一口气。";overlayBtn.textContent="继续";overlay.classList.remove("hidden");pauseBtn.textContent="继续"}else if(state.mode==="paused"){state.mode="running";overlay.classList.add("hidden");pauseBtn.textContent="暂停";last=performance.now();requestAnimationFrame(t=>loop(t,loopToken))}}
        function finish(win){if(state.mode==="over")return;state.mode="over";if(win)state.score+=Math.round(state.player.hp*8+state.time*12);state.best=saveBest(state.score);overlayTitle.textContent=win?"胜负已分":"被击倒了";overlayText.textContent=`评分 ${state.score}，最高 ${state.best}。连击最高保留在本局节奏里。`;overlayBtn.textContent="再打一场";overlay.classList.remove("hidden");updateHud()}
        function loop(now,token){if(token!==loopToken||state.mode!=="running")return;const dt=Math.min(.033,(now-last)/1000||.016);last=now;update(dt);draw();requestAnimationFrame(t=>loop(t,token))}
        function update(dt){state.time=Math.max(0,state.time-dt);if(state.time<=0)finish(state.player.hp>=state.enemy.hp);state.comboTimer-=dt;if(state.comboTimer<=0)state.combo=0;state.msgTimer=Math.max(0,state.msgTimer-dt);state.shake=Math.max(0,state.shake-dt*18);controlPlayer(dt);controlEnemy(dt);stepFighter(state.player,dt);stepFighter(state.enemy,dt);resolveBodies();checkAttack(state.player,state.enemy);checkAttack(state.enemy,state.player);state.particles=state.particles.filter(p=>{p.life-=dt;p.y-=dt*34;return p.life>0});if(state.enemy.hp<=0)finish(true);if(state.player.hp<=0)finish(false);updateHud();pressed.clear()}
        function controlPlayer(dt){const p=state.player;if(p.hit>0)return;let move=0;if(keys.has("KeyA")||keys.has("ArrowLeft"))move-=1;if(keys.has("KeyD")||keys.has("ArrowRight"))move+=1;p.dir=state.enemy.x>p.x?1:-1;if(move&&p.state!=="attack"){p.vx+=move*900*dt;p.dir=move>0?1:-1}if((pressed.has("KeyW")||pressed.has("ArrowUp"))&&p.grounded){p.vy=-560;p.grounded=false}if(pressed.has("KeyJ"))attack(p,"light");if(pressed.has("KeyK"))attack(p,"heavy");if(keys.has("KeyL")&&!p.attack&&p.stamina>6){p.guard=1;p.stamina-=dt*12}else p.guard=0;if((pressed.has("ShiftLeft")||pressed.has("ShiftRight"))&&p.stamina>22&&!p.attack){p.dodge=.36;p.stamina-=22;p.vx=-p.dir*430}p.stamina=Math.min(100,p.stamina+dt*(p.guard?5:22))}
        function controlEnemy(dt){const e=state.enemy,p=state.player;if(e.hit>0)return;e.ai-=dt;const dist=Math.abs(p.x-e.x);e.dir=p.x>e.x?1:-1;if(e.ai<=0){e.ai=.22+Math.random()*.18;if(dist>165)e.vx+=e.dir*360;else if(dist<72)e.vx-=e.dir*290;else if(Math.random()<.42)attack(e,Math.random()<.7?"light":"heavy");if(p.attack&&dist<150&&e.stamina>14)e.guard=Math.random()<.55?1:0;else e.guard=0;if(dist<96&&Math.random()<.18&&e.stamina>24){e.dodge=.34;e.stamina-=24;e.vx=-e.dir*380}}e.stamina=Math.min(100,e.stamina+dt*(e.guard?4:18))}
        function attack(f,type){if(f.attack||f.stamina<(type==="heavy"?22:10)||f.dodge>0)return;f.stamina-=type==="heavy"?22:10;f.state="attack";f.timer=type==="heavy"?.54:.34;f.attack={type,wind:type==="heavy"?.18:.08,active:type==="heavy"?.18:.12,done:false,damage:type==="heavy"?19:9,reach:type==="heavy"?98:78}}
        function stepFighter(f,dt){f.hit=Math.max(0,f.hit-dt);f.dodge=Math.max(0,f.dodge-dt);if(f.attack){f.attack.wind-=dt;if(f.attack.wind<=0)f.attack.active-=dt;if(f.attack.active<=0||f.timer<=0){f.attack=null;f.state="idle"}}f.timer=Math.max(0,f.timer-dt);f.vy+=1400*dt;f.vx*=Math.pow(.08,dt);f.x+=f.vx*dt;f.y+=f.vy*dt;const g=ground()-f.h;if(f.y>=g){f.y=g;f.vy=0;f.grounded=true}else f.grounded=false;f.x=Math.max(38,Math.min(w-38,f.x))}
        function resolveBodies(){const a=state.player,b=state.enemy,dx=b.x-a.x,min=(a.w+b.w)*.42;if(Math.abs(dx)<min){const push=(min-Math.abs(dx))*.5*(dx>=0?1:-1);a.x-=push;b.x+=push}}
        function checkAttack(a,b){if(!a.attack||a.attack.done||a.attack.wind>0||a.attack.active<=0)return;const reach=a.attack.reach,front=a.x+a.dir*(a.w*.35+reach*.5),hitX=Math.abs(b.x-front)<reach*.58,hitY=Math.abs((a.y+a.h*.48)-(b.y+b.h*.48))<74;if(hitX&&hitY&&b.dodge<=0){a.attack.done=true;let dmg=a.attack.damage,blocked=b.guard&&Math.sign(a.dir)!==Math.sign(b.dir);if(blocked){dmg*=a.attack.type==="heavy"?.52:.26;b.stamina=Math.max(0,b.stamina-(a.attack.type==="heavy"?28:12));spark(b.x,b.y+b.h*.38,"格挡","#8bd0bb");if(a.attack.type==="heavy"&&b.stamina<=0){dmg=14;b.guard=0;spark(b.x,b.y+b.h*.35,"破防","#f0d16f")}}else{state.combo=a.team===0?state.combo+1:0;state.comboTimer=1.8;b.hit=.18;b.vx=a.dir*(a.attack.type==="heavy"?420:260);b.vy-=a.attack.type==="heavy"?180:80;state.shake=a.attack.type==="heavy"?.45:.22;spark(b.x,b.y+b.h*.38,a.attack.type==="heavy"?"重击":"命中",a.team===0?"#d6a33d":"#bd5148")}b.hp=Math.max(0,b.hp-dmg);if(a.team===0)state.score+=Math.round(dmg*18+(blocked?8:state.combo*12))}}
        function spark(x,y,text,color){state.particles.push({x,y,text,color,life:1});state.msg=text;state.msgTimer=.8}
        function draw(){ctx.clearRect(0,0,w,h);ctx.save();if(state.shake>0)ctx.translate((Math.random()-.5)*state.shake*8,(Math.random()-.5)*state.shake*5);const sky=ctx.createLinearGradient(0,0,0,h);sky.addColorStop(0,"#132232");sky.addColorStop(.62,"#2f3b43");sky.addColorStop(1,"#1c2028");ctx.fillStyle=sky;ctx.fillRect(0,0,w,h);drawDojo();drawFighter(state.enemy);drawFighter(state.player);for(const p of state.particles){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.font="900 22px system-ui";ctx.textAlign="center";ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1}if(state.msgTimer>0){ctx.fillStyle="rgba(255,253,244,.88)";ctx.font="900 24px system-ui";ctx.textAlign="center";ctx.fillText(state.msg,w/2,54)}ctx.restore()}
        function drawDojo(){ctx.fillStyle="#efe3bf";ctx.fillRect(0,ground(),w,h-ground());ctx.fillStyle="#9b6f3b";for(let x=-40;x<w+40;x+=90){ctx.fillRect(x,ground()+10,58,8);ctx.fillRect(x+12,ground()+46,58,8)}ctx.fillStyle="rgba(255,253,244,.1)";for(let i=0;i<7;i++){ctx.fillRect(i*w/7,90,2,ground()-90)}ctx.fillStyle="#243844";ctx.fillRect(0,ground()-20,w,20);ctx.fillStyle="#d6a33d";ctx.fillRect(w*.5-90,86,180,8);ctx.font="900 20px system-ui";ctx.textAlign="center";ctx.fillStyle="#fffdf4";ctx.fillText(`倒计时 ${Math.ceil(state.time)}`,w/2,78)}
        function drawFighter(f){const cx=f.x,base=f.y+f.h,headY=f.y+22,color=f.team===0?"#287468":"#bd5148",trim=f.team===0?"#f0d16f":"#8bd0bb";ctx.save();ctx.translate(cx,0);ctx.scale(f.dir,1);ctx.globalAlpha=f.dodge>0?.45:1;ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#17242b";ctx.lineWidth=15;ctx.beginPath();ctx.moveTo(0,headY+42);ctx.lineTo(0,headY+82);ctx.moveTo(0,headY+80);ctx.lineTo(-22,base-8);ctx.moveTo(0,headY+80);ctx.lineTo(25,base-8);ctx.stroke();ctx.strokeStyle=color;ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(0,headY+40);ctx.lineTo(0,headY+82);ctx.moveTo(0,headY+80);ctx.lineTo(-22,base-8);ctx.moveTo(0,headY+80);ctx.lineTo(25,base-8);ctx.stroke();ctx.fillStyle=trim;ctx.beginPath();ctx.arc(0,headY,18,0,Math.PI*2);ctx.fill();ctx.fillStyle="#10191f";ctx.fillRect(6,headY-4,5,4);let armY=headY+52;if(f.guard){ctx.strokeStyle="#8bd0bb";ctx.lineWidth=12;ctx.beginPath();ctx.moveTo(0,armY);ctx.lineTo(32,armY-18);ctx.stroke()}else if(f.attack&&f.attack.wind<=0){ctx.strokeStyle=f.attack.type==="heavy"?"#f0d16f":"#fffdf4";ctx.lineWidth=f.attack.type==="heavy"?13:10;ctx.beginPath();ctx.moveTo(0,armY);ctx.lineTo(f.attack.reach,armY-8);ctx.stroke()}else{ctx.strokeStyle=color;ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(0,armY);ctx.lineTo(28,armY+8);ctx.moveTo(0,armY);ctx.lineTo(-24,armY+14);ctx.stroke()}ctx.globalAlpha=1;ctx.restore();if(f.hit>0){ctx.strokeStyle="#fffdf4";ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,f.y+42,34,0,Math.PI*2);ctx.stroke()}}
        function updateHud(){roundText.textContent=state.round.toString();scoreText.textContent=state.score.toString();comboText.textContent=state.combo.toString();bestText.textContent=Math.max(state.best,state.score).toString();hpText.textContent=`${Math.round(state.player.hp)}%`;enemyText.textContent=`${Math.round(state.enemy.hp)}%`;staminaText.textContent=`${Math.round(state.player.stamina)}%`;hpBar.style.width=`${state.player.hp}%`;enemyBar.style.width=`${state.enemy.hp}%`;staminaBar.style.width=`${state.player.stamina}%`;hpBar.style.background=state.player.hp<30?"linear-gradient(90deg,#bd5148,#d6a33d)":"linear-gradient(90deg,var(--blue),#8bd0bb)";enemyBar.style.background="linear-gradient(90deg,#bd5148,#f0d16f)";staminaBar.style.background="linear-gradient(90deg,#326f91,#d6a33d)"}
        startBtn.addEventListener("click",start);resetBtn.addEventListener("click",start);pauseBtn.addEventListener("click",togglePause);overlayBtn.addEventListener("click",()=>state.mode==="paused"?togglePause():start());
        document.querySelectorAll("[data-key]").forEach(btn=>{const code=btn.dataset.key;btn.addEventListener("pointerdown",e=>{e.preventDefault();keys.add(code);pressed.add(code)});btn.addEventListener("pointerup",e=>{e.preventDefault();keys.delete(code)});btn.addEventListener("pointercancel",()=>keys.delete(code));btn.addEventListener("pointerleave",()=>keys.delete(code))});
        document.addEventListener("keydown",e=>{if(["KeyA","KeyD","KeyW","KeyJ","KeyK","KeyL","ShiftLeft","ShiftRight","ArrowLeft","ArrowRight","ArrowUp"].includes(e.code))e.preventDefault();if(!keys.has(e.code))pressed.add(e.code);keys.add(e.code);if(e.code==="KeyP")togglePause();if(e.code==="KeyR")start()});
        document.addEventListener("keyup",e=>keys.delete(e.code));window.addEventListener("resize",resize);resize();updateHud();draw();
      })();
    </script>
  </body>
</html>
