  <main class="app">

  <script>
  (()=>{
    const FIGHTERS={crane:{name:"白鹤",tag:"迅捷连段",color:"#287468",trim:"#f0d16f",hp:96,speed:1.13,damage:.94,stamina:1.15,special:{name:"回风三叠",damage:27,reach:126,wind:.11}},tiger:{name:"赤虎",tag:"重击破防",color:"#bd5148",trim:"#f0d16f",hp:108,speed:.94,damage:1.14,stamina:.94,special:{name:"震门靠",damage:34,reach:108,wind:.2}},stone:{name:"玄岩",tag:"格挡反击",color:"#536b78",trim:"#8bd0bb",hp:118,speed:.88,damage:1.02,stamina:1.08,special:{name:"不动返",damage:30,reach:102,wind:.15}},echo:{name:"青响",tag:"专注爆发",color:"#326f91",trim:"#d6a33d",hp:100,speed:1.03,damage:1,stamina:1.03,special:{name:"鸣弦步",damage:31,reach:142,wind:.08}},ember:{name:"炽拳",tag:"持续压制",color:"#a94c49",trim:"#f1c86b",hp:106,speed:1.05,damage:1.07,stamina:1,special:{name:"火线追身",damage:32,reach:120,wind:.12}},veil:{name:"无影",tag:"闪避反击",color:"#655b75",trim:"#9cd7ca",hp:98,speed:1.12,damage:1.02,stamina:1.12,special:{name:"折光击",damage:29,reach:138,wind:.07}}};
    const PLAYER_IDS=["crane","tiger","stone","echo"];const BOUTS=[
      {id:"alley",title:"一门 · 青砖巷",opponent:"crane",style:"mobile",brief:"以移动和轻击测试距离。",scale:.92,seed:101,colors:["#243a44","#33403d"]},
      {id:"forge",title:"二门 · 炉火馆",opponent:"tiger",style:"power",brief:"重击慢，但会持续压迫格挡。",scale:.96,seed:203,colors:["#492f2b","#34353a"]},
      {id:"wall",title:"三门 · 石壁馆",opponent:"stone",style:"counter",brief:"馆主偏爱格挡后反击。",scale:1,seed:307,colors:["#303b40","#394033"]},
      {id:"rain",title:"四门 · 听雨台",opponent:"echo",style:"focus",brief:"拖延越久，专属技越危险。",scale:1.02,seed:401,colors:["#24384b","#2e3940"]},
      {id:"ember",title:"五门 · 赤灯堂",opponent:"ember",style:"pressure",brief:"短间隔进攻会消耗你的体力。",scale:1.04,seed:509,colors:["#4b302e","#3c352e"]},
      {id:"veil",title:"六门 · 无影廊",opponent:"veil",style:"evasive",brief:"虚晃与闪避专门惩罚重击。",scale:1.06,seed:601,colors:["#322e43","#273b3e"]},
      {id:"mirror",title:"七门 · 照身镜",opponent:"echo",style:"adaptive",brief:"馆主会复制你最近的攻击节奏。",scale:1.1,seed:709,colors:["#2d3943","#3e3342"]},
      {id:"master",title:"八门 · 百式庭",opponent:"stone",style:"master",brief:"进攻、防守和闪避会随局势切换。",scale:1.13,seed:809,colors:["#263b38","#493b2c"]}
    ];
    const STORAGE="dojoDuelV2";const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d"),overlay=document.getElementById("overlay"),overlayTitle=document.getElementById("overlayTitle"),overlayText=document.getElementById("overlayText"),overlayBtn=document.getElementById("overlayBtn"),fightersEl=document.getElementById("fighters"),boutsEl=document.getElementById("bouts"),archiveBox=document.getElementById("archiveBox"),archiveText=document.getElementById("archiveText"),archiveFeedback=document.getElementById("archiveFeedback");const roundText=document.getElementById("roundText"),scoreText=document.getElementById("scoreText"),comboText=document.getElementById("comboText"),winsText=document.getElementById("winsText"),hpText=document.getElementById("hpText"),enemyText=document.getElementById("enemyText"),staminaText=document.getElementById("staminaText"),focusText=document.getElementById("focusText"),hpBar=document.getElementById("hpBar"),enemyBar=document.getElementById("enemyBar"),staminaBar=document.getElementById("staminaBar"),focusBar=document.getElementById("focusBar");let profile=loadProfile(),fighterId=profile.lastFighter||"crane",boutIndex=Math.min(profile.unlocked,7),state=makeState(),w=900,h=630,dpr=1,last=0,loopToken=0;const keys=new Set(),pressed=new Set();
    function emptyProfile(){return{v:2,unlocked:0,stars:Array(8).fill(0),best:Array(8).fill(0),wins:0,lastFighter:"crane",fighterWins:{}}}function normalize(p){return{v:2,unlocked:Math.max(0,Math.min(7,+p.unlocked||0)),stars:Array.from({length:8},(_,i)=>Math.max(0,Math.min(3,+p.stars?.[i]||0))),best:Array.from({length:8},(_,i)=>Math.max(0,+p.best?.[i]||0)),wins:Math.max(0,+p.wins||0),lastFighter:PLAYER_IDS.includes(p.lastFighter)?p.lastFighter:"crane",fighterWins:Object.fromEntries(PLAYER_IDS.map(id=>[id,Math.max(0,+p.fighterWins?.[id]||0)]))}}function loadProfile(){try{const p=JSON.parse(localStorage.getItem(STORAGE)||"null");return p?.v===2?normalize(p):emptyProfile()}catch{return emptyProfile()}}function saveProfile(){localStorage.setItem(STORAGE,JSON.stringify(profile))}
    function fighter(x,team,id,scale=1){const def=FIGHTERS[id],maxHp=Math.round(def.hp*scale);return{x,y:0,vx:0,vy:0,w:58,h:126,dir:team===0?1:-1,hp:maxHp,maxHp,stamina:100,focus:0,team,id,def,grounded:false,state:"idle",timer:0,attack:null,guard:0,dodge:0,hit:0,ai:0}}
    function makeState(){const bout=BOUTS[boutIndex];return{mode:"menu",round:1,playerRounds:0,enemyRounds:0,roundLosses:0,score:0,combo:0,maxCombo:0,comboTimer:0,time:75,message:"",messageTime:0,shake:0,particles:[],specialHits:0,seed:bout.seed,player:fighter(190,0,fighterId),enemy:fighter(710,1,bout.opponent,bout.scale)}}function ground(){return h-98}function resetRound(){const bout=BOUTS[boutIndex];state.player=fighter(190,0,fighterId);state.enemy=fighter(710,1,bout.opponent,bout.scale);state.player.y=ground()-state.player.h;state.enemy.y=ground()-state.enemy.h;state.time=75;state.combo=0;state.comboTimer=0;state.mode="running";state.seed=(bout.seed+state.round*97)>>>0;overlay.classList.add("hidden");last=performance.now();updateHud();requestAnimationFrame(t=>loop(t,loopToken))}
    function resize(){const r=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,devicePixelRatio||1));w=Math.max(320,r.width);h=Math.max(500,r.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);if(state.player){state.player.y=Math.min(state.player.y,ground()-state.player.h);state.enemy.y=Math.min(state.enemy.y,ground()-state.enemy.h)}draw()}
    function start(){loopToken++;state=makeState();state.round=1;state.playerRounds=0;state.enemyRounds=0;resetRound()}function togglePause(){if(state.mode==="running"){state.mode="paused";overlayTitle.textContent="擂台暂停";overlayText.textContent="招式状态已冻结，继续后从当前距离恢复。";overlayBtn.textContent="继续本局";overlay.classList.remove("hidden")}else if(state.mode==="paused"){state.mode="running";overlay.classList.add("hidden");last=performance.now();requestAnimationFrame(t=>loop(t,loopToken))}}function loop(now,token){if(token!==loopToken||state.mode!=="running")return;const dt=Math.min(.033,(now-last)/1000||.016);last=now;update(dt);draw();requestAnimationFrame(t=>loop(t,token))}
    function random(){state.seed^=state.seed<<13;state.seed^=state.seed>>>17;state.seed^=state.seed<<5;return(state.seed>>>0)/4294967296}function update(dt){state.time=Math.max(0,state.time-dt);state.comboTimer-=dt;if(state.comboTimer<=0)state.combo=0;state.messageTime=Math.max(0,state.messageTime-dt);state.shake=Math.max(0,state.shake-dt*18);controlPlayer(dt);controlEnemy(dt);stepFighter(state.player,dt);stepFighter(state.enemy,dt);resolveBodies();checkAttack(state.player,state.enemy);checkAttack(state.enemy,state.player);for(const p of state.particles){p.life-=dt;p.y-=dt*32}state.particles=state.particles.filter(p=>p.life>0);if(state.enemy.hp<=0)endRound(true);else if(state.player.hp<=0)endRound(false);else if(state.time<=0)endRound(state.player.hp/state.player.maxHp>=state.enemy.hp/state.enemy.maxHp);updateHud();pressed.clear()}
    function controlPlayer(dt){const p=state.player;if(p.hit>0)return;let move=0;if(keys.has("KeyA")||keys.has("ArrowLeft"))move--;if(keys.has("KeyD")||keys.has("ArrowRight"))move++;p.dir=state.enemy.x>p.x?1:-1;if(move&&!p.attack){p.vx+=move*900*p.def.speed*dt;p.dir=move>0?1:-1}if((pressed.has("KeyW")||pressed.has("ArrowUp"))&&p.grounded){p.vy=-550*p.def.speed;p.grounded=false}if(pressed.has("KeyJ"))attack(p,"light");if(pressed.has("KeyK"))attack(p,"heavy");if(pressed.has("KeyI"))attack(p,"special");if(keys.has("KeyL")&&!p.attack&&p.stamina>5){p.guard=1;p.stamina-=dt*12/p.def.stamina}else p.guard=0;if((pressed.has("ShiftLeft")||pressed.has("ShiftRight"))&&p.stamina>22&&!p.attack){p.dodge=.34;p.stamina-=22;p.vx=-p.dir*430*p.def.speed}p.stamina=Math.min(100,p.stamina+dt*(p.guard?5:22)*p.def.stamina)}
    function controlEnemy(dt){const e=state.enemy,p=state.player;if(e.hit>0)return;e.ai-=dt;e.dir=p.x>e.x?1:-1;if(e.ai>0){e.stamina=Math.min(100,e.stamina+dt*(e.guard?4:18)*e.def.stamina);return}const bout=BOUTS[boutIndex],dist=Math.abs(p.x-e.x),roll=random();e.ai=.16+random()*.17;e.guard=0;if(p.attack&&dist<155){const defend=bout.style==="counter"?.78:bout.style==="evasive"?.72:bout.style==="master"?.7:.48;if(roll<defend*.55&&e.stamina>8)e.guard=1;else if(roll<defend&&e.stamina>24){e.dodge=.32;e.stamina-=24;e.vx=-e.dir*390*e.def.speed;return}}if(dist>155){e.vx+=e.dir*390*e.def.speed;return}if(dist<70&&random()<.32){e.vx-=e.dir*330;return}const heavyChance=bout.style==="power"?.52:bout.style==="counter"?.38:.25,specialChance=bout.style==="focus"?.5:bout.style==="master"?.42:.3;if(e.focus>=100&&random()<specialChance)attack(e,"special");else attack(e,random()<heavyChance?"heavy":"light");e.stamina=Math.min(100,e.stamina+dt*18*e.def.stamina)}

    function spark(x,y,text,color){state.particles.push({x,y,text,color,life:1});state.message=text;state.messageTime=.8}function endRound(playerWon){if(state.mode!=="running")return;state.mode="round";if(playerWon)state.playerRounds++;else{state.enemyRounds++;state.roundLosses++}if(state.playerRounds>=2||state.enemyRounds>=2)return finishMatch(state.playerRounds>=2);state.round++;overlayTitle.textContent=playerWon?`第 ${state.round-1} 局胜出`:`第 ${state.round-1} 局失守`;overlayText.textContent=`当前局分 ${state.playerRounds}:${state.enemyRounds}。双方体力与专注重置，下一局重新判断距离。`;overlayBtn.textContent=`开始第 ${state.round} 局`;overlay.classList.remove("hidden");updateHud()}

    function draw(){ctx.clearRect(0,0,w,h);ctx.save();if(state.shake>0)ctx.translate(Math.sin(state.time*53)*state.shake*3,Math.cos(state.time*37)*state.shake*2);const colors=BOUTS[boutIndex].colors,sky=ctx.createLinearGradient(0,0,0,h);sky.addColorStop(0,colors[0]);sky.addColorStop(.62,colors[1]);sky.addColorStop(1,"#1c2028");ctx.fillStyle=sky;ctx.fillRect(0,0,w,h);drawDojo();drawFighter(state.enemy);drawFighter(state.player);for(const p of state.particles){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.font="900 21px system-ui";ctx.textAlign="center";ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1}if(state.messageTime>0){ctx.fillStyle="rgba(255,253,244,.9)";ctx.font="900 23px system-ui";ctx.textAlign="center";ctx.fillText(state.message,w/2,52)}ctx.restore()}function drawDojo(){ctx.fillStyle="#efe3bf";ctx.fillRect(0,ground(),w,h-ground());ctx.fillStyle="#9b6f3b";for(let x=-40;x<w+40;x+=90){ctx.fillRect(x,ground()+10,58,8);ctx.fillRect(x+12,ground()+46,58,8)}ctx.fillStyle="rgba(255,253,244,.1)";for(let i=0;i<7;i++)ctx.fillRect(i*w/7,90,2,ground()-90);ctx.fillStyle="#243844";ctx.fillRect(0,ground()-20,w,20);ctx.fillStyle="#d6a33d";ctx.fillRect(w*.5-100,82,200,8);ctx.font="900 19px system-ui";ctx.textAlign="center";ctx.fillStyle="#fffdf4";ctx.fillText(`${BOUTS[boutIndex].title} · ${Math.ceil(state.time)} 秒`,w/2,73)}function drawFighter(f){const cx=f.x,base=f.y+f.h,headY=f.y+22;ctx.save();ctx.translate(cx,0);ctx.scale(f.dir,1);ctx.globalAlpha=f.dodge>0?.42:1;ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#17242b";ctx.lineWidth=15;ctx.beginPath();ctx.moveTo(0,headY+42);ctx.lineTo(0,headY+82);ctx.moveTo(0,headY+80);ctx.lineTo(-22,base-8);ctx.moveTo(0,headY+80);ctx.lineTo(25,base-8);ctx.stroke();ctx.strokeStyle=f.def.color;ctx.lineWidth=10;ctx.stroke();ctx.fillStyle=f.def.trim;ctx.beginPath();ctx.arc(0,headY,18,0,Math.PI*2);ctx.fill();ctx.fillStyle="#10191f";ctx.fillRect(6,headY-4,5,4);const armY=headY+52;ctx.strokeStyle=f.guard?"#8bd0bb":f.attack&
