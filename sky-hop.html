<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>云端跃迁</title><style>body{margin:0;background:#07142a;color:#eff8ff;font-family:system-ui}.app{height:100vh;display:grid;grid-template-columns:1fr 250px;gap:10px;padding:10px;box-sizing:border-box}.stage,aside{border:1px solid #315779;border-radius:16px;background:#0a2038;overflow:hidden}.stage{position:relative}canvas{display:block;width:100%;height:100%}aside{padding:14px;display:flex;flex-direction:column;gap:10px}.card{padding:10px;border:1px solid #2d5576;border-radius:10px}.card b{display:block;font-size:24px;color:#72ecff}button{border:1px solid #4982a8;border-radius:9px;background:#153c58;color:white;padding:10px;font-weight:bold}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:#071426bd;text-align:center}.hidden{display:none}@media(max-width:650px){.app{grid-template-columns:1fr;grid-template-rows:1fr 150px;padding:6px}aside{display:grid;grid-template-columns:repeat(3,1fr);padding:7px}.card{padding:7px}.card b{font-size:16px}.help{display:none}}</style><main class="app"><section class="stage"><canvas id="c"></canvas><div id="o" class="overlay"><div><h1>云端跃迁</h1><p>原创无限上跳。左右移动踩住浮台，收集星片，利用弹簧和滑翔云冲向更高天空。</p><button id="go">开始跃迁</button></div></div></section><aside><div class="card">高度<b id="height">0m</b></div><div class="card">星片<b id="stars">0</b></div><div class="card">最佳<b id="best">0m</b></div><button id="resetGame">新局</button><div class="help">A/D 或方向键控制左右；鼠标/触摸可导向。自动跳跃，越高平台越窄。</div></aside></main><script>
const c=document.querySelector('#c'),x=c.getContext('2d'),O=document.querySelector('#o'),HE=document.querySelector('#height'),ST=document.querySelector('#stars'),BE=document.querySelector('#best');let q,keys=new Set(),target=null,last=0;function reset(){q={run:false,p:{x:.5,y:.75,vx:0,vy:-.55},plats:[],stars:0,height:0,best:+localStorage.getItem('sky_hop_best')||0};for(let i=0;i<12;i++)add(.15+Math.random()*.7,.92-i*.085,i<3?.22:.13);sync()}function add(x,y,w){q.plats.push({x,y,w,boost:Math.random()<.1,cloud:Math.random()<.08,star:Math.random()<.3})}function sync(){HE.textContent=Math.floor(q.height)+'m';ST.textContent=q.stars;BE.textContent=Math.floor(Math.max(q.best,q.height))+'m'}function start(){q.run=true;O.classList.add('hidden')}function update(dt){if(!q.run)return;let d=(keys.has('ArrowLeft')||keys.has('KeyA')?-1:0)+(keys.has('ArrowRight')||keys.has('KeyD')?1:0);if(target)d+=(target-q.p.x)*3;q.p.vx+=(d*.9-q.p.vx)*dt*5;q.p.x+=q.p.vx*dt;q.p.x=(q.p.x+1)%1;q.p.vy+=.92*dt;q.p.y+=q.p.vy*dt;for(const p of q.plats){if(q.p.vy>0&&q.p.y<p.y&&q.p.y+q.p.vy*dt>=p.y&&Math.abs(q.p.x-p.x)<p.w/2){q.p.y=p.y;q.p.vy=p.boost?-.88:-.58;if(p.star){q.stars++;p.star=false}if(p.cloud)q.p.vy=-.73}}if(q.p.y>.98)end();if(q.p.y<.38){let up=.38-q.p.y;q.p.y+=up;q.plats.forEach(p=>p.y+=up);q.height+=up*900;while(Math.min(...q.plats.map(p=>p.y))>.08){let top=Math.min(...q.plats.map(p=>p.y));add(.1+Math.random()*.8,top-.07-Math.random()*.04,Math.max(.07,.17-q.height/9000))}}q.plats=q.plats.filter(p=>p.y<1.08);sync()}function end(){q.run=false;q.best=Math.max(q.best,q.height);localStorage.setItem('sky_hop_best',q.best);O.innerHTML=`<div><h1>坠入云海</h1><p>高度 ${Math.floor(q.height)}m，星片 ${q.stars}</p><button id="go">再试一次</button></div>`;O.classList.remove('hidden');document.querySelector('#go').onclick=()=>{reset();start()}}function draw(){let w=c.clientWidth,h=c.clientHeight;c.width=w*devicePixelRatio;c.height=h*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);let g=x.createLinearGradient(0,0,0,h);g.addColorStop(0,'#153d70');g.addColorStop(1,'#07182c');x.fillStyle=g;x.fillRect(0,0,w,h);for(const p of q.plats){x.fillStyle=p.cloud?'#d8f5ff':p.boost?'#ffd56b':'#68e2c0';x.fillRect((p.x-p.w/2)*w,p.y*h,p.w*w,9);if(p.star){x.fillStyle='#fff09a';x.fillText('✦',p.x*w,p.y*h-8)}}x.fillStyle='#7fe9ff';x.beginPath();x.arc(q.p.x*w,q.p.y*h,12,0,7);x.fill()}function loop(t){let dt=Math.min(.03,(t-last)/1000);last=t;update(dt);draw();requestAnimationFrame(loop)}addEventListener('keydown',e=>keys.add(e.code));addEventListener('keyup',e=>keys.delete(e.code));c.addEventListener('pointermove',e=>{let r=c.getBoundingClientRect();target=(e.clientX-r.left)/r.width});c.addEventListener('pointerleave',()=>target=null);document.querySelector('#go').onclick=()=>{reset();start()};document.querySelector('#resetGame').onclick=reset;reset();requestAnimationFrame(loop);
</script>
