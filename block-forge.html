<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>方块熔炉</title><style>body{margin:0;background:#090a13;color:#eef2ff;font-family:system-ui}.app{min-height:100vh;display:grid;place-items:center;padding:12px;box-sizing:border-box}.wrap{display:grid;grid-template-columns:auto 250px;gap:12px;padding:14px;border:1px solid #34395e;border-radius:18px;background:#111323}canvas{background:#070813;border:1px solid #3d4370;border-radius:10px;max-width:72vw}.side{display:flex;flex-direction:column;gap:10px}.card{padding:10px;border:1px solid #353962;border-radius:10px}.card b{display:block;color:#69e4ff;font-size:23px}button{border:1px solid #50699b;border-radius:9px;background:#1d2a48;color:white;padding:10px;font-weight:bold}.tip{color:#9daac9;font-size:13px;line-height:1.6}@media(max-width:650px){.wrap{grid-template-columns:1fr;width:100%}canvas{width:100%;height:auto;max-width:100%}.side{display:grid;grid-template-columns:repeat(2,1fr)}.tip,#next{display:none}}</style><main class="app"><div class="wrap"><canvas id="c" width="300" height="600"></canvas><aside class="side"><div class="card">分数<b id="score">0</b></div><div class="card">等级 / 行数<b id="lines">1 / 0</b></div><div class="card">暂存<b id="hold">—</b></div><canvas id="next" width="220" height="80"></canvas><button id="newGame">新局</button><div class="tip">方向键/WASD 移动旋转；空格硬降；C 暂存。七袋随机、幽灵落点与连消等级加速。</div></aside></div></main><script>
const c=document.querySelector('#c'),x=c.getContext('2d'),nn=document.querySelector('#next'),nx=nn.getContext('2d'),S=document.querySelector('#score'),L=document.querySelector('#lines'),HH=document.querySelector('#hold'),W=10,HHH=20,Z=30;const P={I:[[1,1,1,1]],O:[[1,1],[1,1]],T:[[0,1,0],[1,1,1]],L:[[1,0],[1,0],[1,1]],J:[[0,1],[0,1],[1,1]],A:[[0,1,1],[1,1,0]],B:[[1,1,0],[0,1,1]]},C=['#4ee9ff','#ffe06e','#b38aff','#ff995c','#6da5ff','#63ec9c','#ff649a'];let q,last=0;function bag(){return Object.keys(P).sort(()=>Math.random()-.5)}function reset(){q={g:Array.from({length:HHH},()=>Array(W).fill('')),bag:bag(),score:0,lines:0,level:1,hold:'',used:false,over:false};spawn();draw()}function take(){if(!q.bag.length)q.bag=bag();return q.bag.pop()}function spawn(){let k=take();q.p={k,m:P[k].map(r=>r.slice()),x:3,y:0};q.used=false;if(hit(q.p))q.over=true;drawNext()}function hit(p){for(let y=0;y<p.m.length;y++)for(let z=0;z<p.m[y].length;z++)if(p.m[y][z]&&(p.x+z<0||p.x+z>=W||p.y+y>=HHH||q.g[p.y+y]?.[p.x+z]))return true;return false}function move(dx,dy){q.p.x+=dx;q.p.y+=dy;if(hit(q.p)){q.p.x-=dx;q.p.y-=dy;return false}return true}function rot(){let m=q.p.m[0].map((_,i)=>q.p.m.map(r=>r[i]).reverse()),old=q.p.m;q.p.m=m;if(hit(q.p)){q.p.x++;if(hit(q.p)){q.p.x-=2;if(hit(q.p)){q.p.x++;q.p.m=old}}}}function lock(){q.p.m.forEach((r,y)=>r.forEach((v,z)=>{if(v&&q.p.y+y>=0)q.g[q.p.y+y][q.p.x+z]=q.p.k}));let n=q.g.filter(r=>r.every(Boolean)).length;q.g=q.g.filter(r=>!r.every(Boolean));while(q.g.length<HHH)q.g.unshift(Array(W).fill(''));if(n){q.lines+=n;q.level=1+Math.floor(q.lines/10);q.score+=[0,100,300,500,800][n]*q.level}spawn();sync()}function hard(){let n=0;while(move(0,1))n++;q.score+=n*2;lock()}function hold(){if(q.used)return;let k=q.p.k;if(q.hold){q.p={k:q.hold,m:P[q.hold].map(r=>r.slice()),x:3,y:0};q.hold=k}else{q.hold=k;spawn()}q.used=true;sync()}function ghost(){let p={k:q.p.k,m:q.p.m,x:q.p.x,y:q.p.y};while(!hit({k:p.k,m:p.m,x:p.x,y:p.y+1}))p.y++;return p}function sync(){S.textContent=q.score;L.textContent=`${q.level} / ${q.lines}`;HH.textContent=q.hold||'—'}function block(px,py,k,a=1){x.globalAlpha=a;x.fillStyle=C[Object.keys(P).indexOf(k)];x.fillRect(px*Z+1,py*Z+1,Z-2,Z-2);x.globalAlpha=1}function draw(){x.fillStyle='#070813';x.fillRect(0,0,300,600);for(let y=0;y<HHH;y++)for(let z=0;z<W;z++){x.strokeStyle='#15182a';x.strokeRect(z*Z,y*Z,Z,Z);if(q.g[y][z])block(z,y,q.g[y][z])}if(!q.over){let g=ghost();g.m.forEach((r,y)=>r.forEach((v,z)=>{if(v)block(g.x+z,g.y+y,g.k,.2)}));q.p.m.forEach((r,y)=>r.forEach((v,z)=>{if(v)block(q.p.x+z,q.p.y+y,q.p.k)}))}else{x.fillStyle='white';x.font='bold 24px sans-serif';x.fillText('熔炉停机',90,290)}sync()}function drawNext(){nx.clearRect(0,0,220,80);let k=q.bag[q.bag.length-1]||'T';nx.fillStyle='#aab6d8';nx.fillText('下一块',8,15);P[k].forEach((r,y)=>r.forEach((v,z)=>{if(v){nx.fillStyle=C[Object.keys(P).indexOf(k)];nx.fillRect(80+z*18,25+y*18,16,16)}}))}function loop(t){let d=t-last;last=t;if(!q.over){q.a=(q.a||0)+d;if(q.a>Math.max(90,650-q.level*55)){q.a=0;if(!move(0,1))lock();draw()}}requestAnimationFrame(loop)}addEventListener('keydown',e=>{if(q.over)return;if(['ArrowLeft','KeyA'].includes(e.code))move(-1,0);if(['ArrowRight','KeyD'].includes(e.code))move(1,0);if(['ArrowDown','KeyS'].includes(e.code))move(0,1);if(['ArrowUp','KeyW'].includes(e.code))rot();if(e.code==='Space'){e.preventDefault();hard()}if(e.code==='KeyC')hold();draw()});document.querySelector('#newGame').onclick=reset;reset();requestAnimationFrame(loop);
</script>
