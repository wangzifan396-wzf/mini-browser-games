<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#10251a" />
    <title>芽阵前线：六境繁花</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f4f8ea;
        --muted: #aebca7;
        --leaf: #83dd72;
        --sun: #ffd45e;
        --danger: #ff6d61;
        --cyan: #6dd9ec;
        --violet: #b99aff;
        --panel: rgba(10, 20, 15, 0.92);
        --line: rgba(226, 243, 214, 0.16);
      }
      * {
        box-sizing: border-box;
      }
      button {
        font: inherit;
      }
      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: #07100c;
        color: var(--ink);
        font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
        user-select: none;
      }
      body:before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            circle at 12% 10%,
            rgba(92, 197, 102, 0.18),
            transparent 30%
          ),
          radial-gradient(
            circle at 85% 80%,
            rgba(255, 196, 71, 0.12),
            transparent 28%
          );
        pointer-events: none;
      }
      .app {
        height: 100vh;
        height: 100dvh;
        padding: 12px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 348px;
        gap: 12px;
      }
      .stage,
      .rail {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(8, 15, 11, 0.78);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
        overflow: hidden;
      }
      .stage {
        position: relative;
        min-height: 0;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #183b28;
        touch-action: none;
      }
      .hud {
        position: absolute;
        inset: 12px 12px auto 12px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        pointer-events: none;
      }
      .brand,
      .top-stats,
      .wave-track,
      .toast,
      .panel,
      .modal-card {
        border: 1px solid var(--line);
        background: rgba(7, 15, 10, 0.84);
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      }
      .brand {
        border-radius: 14px;
        padding: 10px 14px;
        min-width: 225px;
      }
      .brand h1 {
        margin: 0;
        font-size: clamp(23px, 2.5vw, 34px);
        line-height: 1;
        letter-spacing: -1px;
      }
      .brand h1 b {
        color: var(--sun);
      }
      .subline {
        margin-top: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }
      .top-stats {
        border-radius: 14px;
        padding: 8px 10px;
        display: grid;
        grid-template-columns: repeat(4, minmax(62px, 1fr));
        gap: 7px;
      }
      .stat span {
        display: block;
        color: var(--muted);
        font-size: 10px;
        font-weight: 900;
      }
      .stat strong {
        font-size: 19px;
      }
      .stat.sun strong {
        color: var(--sun);
      }
      .hud-actions {
        display: flex;
        gap: 7px;
        pointer-events: auto;
      }
      .icon-btn,
      .primary-btn,
      .mode-btn,
      .seed-card,
      .tab-btn,
      .level-btn,
      .mini-btn {
        border: 1px solid rgba(230, 244, 220, 0.18);
        background: rgba(23, 38, 28, 0.94);
        color: var(--ink);
        font-weight: 900;
        cursor: pointer;
        transition: 0.15s ease;
      }
      .icon-btn:hover,
      .primary-btn:hover,
      .mode-btn:hover,
      .seed-card:hover,
      .tab-btn:hover,
      .level-btn:hover,
      .mini-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 212, 94, 0.7);
      }
      .icon-btn {
        width: 42px;
        height: 42px;
        border-radius: 12px;
      }
      .icon-btn.active {
        color: var(--sun);
        border-color: var(--sun);
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.38;
        transform: none !important;
      }
      .wave-track {
        position: absolute;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        width: min(62%, 620px);
        height: 28px;
        border-radius: 14px;
        padding: 8px 12px;
      }
      .wave-track .fill {
        height: 10px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.11);
        overflow: hidden;
      }
      .wave-track i {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(
          90deg,
          var(--leaf),
          var(--sun),
          var(--danger)
        );
        border-radius: inherit;
        transition: width 0.3s;
      }
      .wave-track span {
        position: absolute;
        inset: 4px;
        text-align: center;
        font-size: 11px;
        font-weight: 900;
        text-shadow: 0 2px 4px #000;
      }
      .rail {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
      }
      .panel {
        border-radius: 14px;
        padding: 10px;
      }
      .mission {
        display: flex;
        gap: 9px;
        align-items: center;
      }
      .mission-icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-size: 22px;
        background: linear-gradient(
          145deg,
          rgba(118, 216, 117, 0.24),
          rgba(255, 210, 84, 0.16)
        );
      }
      .mission strong,
      .panel-title {
        display: block;
        font-size: 13px;
      }
      .mission small {
        color: var(--muted);
        line-height: 1.25;
      }
      .resource-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .meter span {
        font-size: 10px;
        color: var(--muted);
        font-weight: 900;
      }
      .meter strong {
        float: right;
        font-size: 12px;
      }
      .bar {
        height: 7px;
        margin-top: 7px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        overflow: hidden;
      }
      .bar i {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(
          90deg,
          var(--cyan),
          var(--leaf),
          var(--sun)
        );
        transition: width 0.2s;
      }
      .guards i {
        background: linear-gradient(90deg, var(--danger), var(--sun));
      }
      .toolbox {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 7px;
      }
      .toolbox button {
        width: auto;
        font-size: 13px;
      }
      .leaf-btn {
        position: relative;
      }
      .leaf-btn em {
        font-style: normal;
        color: var(--sun);
      }
      .seed-bank {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
        overflow: auto;
        padding-right: 3px;
        align-content: start;
        min-height: 0;
      }
      .seed-card {
        position: relative;
        min-height: 78px;
        border-radius: 13px;
        padding: 8px 8px 7px 43px;
        text-align: left;
        overflow: hidden;
      }
      .seed-card.selected {
        border-color: var(--sun);
        background: rgba(59, 53, 25, 0.96);
        box-shadow: 0 0 0 1px rgba(255, 212, 94, 0.2) inset;
      }
      .seed-card .seed-icon {
        position: absolute;
        left: 8px;
        top: 10px;
        width: 29px;
        height: 29px;
        border-radius: 9px;
        display: grid;
        place-items: center;
        font-size: 18px;
        background: var(--seed-bg, rgba(110, 220, 110, 0.18));
      }
      .seed-card strong {
        display: block;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .seed-card small {
        display: block;
        color: var(--muted);
        font-size: 10px;
        margin-top: 3px;
      }
      .seed-card .cost {
        position: absolute;
        right: 7px;
        bottom: 6px;
        color: var(--sun);
        font-size: 11px;
      }
      .seed-card .key {
        position: absolute;
        left: 8px;
        bottom: 6px;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.35);
      }
      .cooldown-mask {
        position: absolute;
        inset: auto 0 0;
        height: 0;
        background: rgba(3, 7, 5, 0.7);
        pointer-events: none;
      }
      .conveyor-badge {
        position: absolute;
        right: 6px;
        top: 5px;
        color: var(--cyan);
        font-size: 10px;
      }
      .brief {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.45;
      }
      .brief b {
        color: var(--ink);
      }
      .toast {
        position: absolute;
        left: 50%;
        top: 105px;
        transform: translate(-50%, -12px);
        opacity: 0;
        border-radius: 999px;
        padding: 9px 16px;
        font-size: 13px;
        font-weight: 900;
        pointer-events: none;
        transition: 0.18s;
      }
      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      .modal {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        padding: 20px;
        background: rgba(3, 8, 5, 0.72);
        backdrop-filter: blur(5px);
        z-index: 20;
      }
      .modal.show {
        display: grid;
      }
      .modal-card {
        width: min(940px, 96%);
        max-height: 92%;
        overflow: auto;
        border-radius: 22px;
        padding: 20px;
      }
      .modal-card.compact {
        width: min(480px, 94%);
        text-align: center;
      }
      .title-row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-start;
      }
      .title-row h2,
      .compact h2 {
        margin: 0;
        font-size: 29px;
      }
      .title-row h2 b {
        color: var(--sun);
      }
      .title-row p,
      .compact p {
        margin: 7px 0;
        color: var(--muted);
      }
      .save-pill {
        padding: 7px 11px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 999px;
        font-size: 11px;
        color: var(--muted);
      }
      .tabs {
        display: flex;
        gap: 7px;
        margin: 16px 0 12px;
      }
      .tab-btn {
        border-radius: 999px;
        padding: 8px 14px;
      }
      .tab-btn.selected {
        background: var(--leaf);
        color: #102116;
      }
      .menu-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 14px;
      }
      .menu-section {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.025);
        border-radius: 16px;
        padding: 13px;
      }
      .menu-section h3 {
        margin: 0 0 10px;
        font-size: 14px;
      }
      .level-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .level-btn {
        border-radius: 12px;
        padding: 9px 5px;
        min-height: 62px;
        text-align: center;
      }
      .level-btn span {
        display: block;
        font-size: 18px;
      }
      .level-btn small {
        display: block;
        color: var(--muted);
        font-size: 9px;
        margin-top: 3px;
      }
      .level-btn.selected {
        border-color: var(--sun);
        background: rgba(255, 212, 94, 0.12);
      }
      .level-btn.locked {
        filter: grayscale(1);
      }
      .level-info {
        min-height: 82px;
        padding: 11px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.18);
        margin-top: 10px;
      }
      .level-info strong {
        font-size: 16px;
      }
      .level-info p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }
      .loadout-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .loadout-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
        max-height: 245px;
        overflow: auto;
        padding-right: 3px;
      }
      .loadout-card {
        min-height: 57px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: rgba(22, 36, 26, 0.8);
        cursor: pointer;
        text-align: center;
        position: relative;
      }
      .loadout-card b {
        display: block;
        font-size: 18px;
      }
      .loadout-card span {
        display: block;
        font-size: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .loadout-card.selected {
        border-color: var(--sun);
        background: rgba(255, 212, 94, 0.12);
      }
      .loadout-card.locked {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .loadout-card i {
        position: absolute;
        right: 4px;
        top: 3px;
        font-size: 8px;
        font-style: normal;
        color: var(--sun);
      }
      .start-row {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 13px;
      }
      .primary-btn {
        border-radius: 13px;
        padding: 11px 22px;
        background: linear-gradient(135deg, #6cca68, #9bd75e);
        color: #102116;
        border: 0;
      }
      .mini-btn {
        border-radius: 10px;
        padding: 8px 11px;
      }
      .mini-btn.selected {
        border-color: var(--sun);
        color: var(--sun);
        background: rgba(255, 212, 94, 0.1);
      }
      .mode-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 9px;
      }
      .mode-btn {
        border-radius: 14px;
        padding: 14px;
        text-align: left;
        min-height: 110px;
      }
      .mode-btn b {
        display: block;
        font-size: 20px;
        margin-bottom: 5px;
      }
      .mode-btn small {
        color: var(--muted);
        line-height: 1.4;
      }
      .mode-btn.selected {
        border-color: var(--sun);
        background: rgba(255, 212, 94, 0.1);
      }
      .almanac-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 9px;
      }
      .codex-card {
        border: 1px solid var(--line);
        border-radius: 13px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.025);
      }
      .codex-card b {
        font-size: 20px;
      }
      .codex-card strong {
        display: block;
        margin: 5px 0 3px;
        font-size: 12px;
      }
      .codex-card small {
        color: var(--muted);
        font-size: 10px;
        line-height: 1.4;
      }
      .result-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin: 15px 0;
      }
      .result-stats div {
        padding: 11px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
      }
      .result-stats strong {
        display: block;
        font-size: 20px;
        color: var(--sun);
      }
      .result-stats span {
        font-size: 10px;
        color: var(--muted);
      }
      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) 258px;
          padding: 7px;
          gap: 7px;
        }
        .rail {
          display: grid;
          grid-template-columns: 185px 1fr;
          grid-template-rows: auto auto 1fr;
          padding: 8px;
          gap: 7px;
        }
        .mission {
          grid-column: 1;
        }
        .resource-row {
          grid-column: 1;
        }
        .toolbox {
          grid-column: 1;
        }
        .seed-bank {
          grid-column: 2;
          grid-row: 1/4;
        }
        .brief {
          display: none;
        }
        .brand {
          min-width: 175px;
        }
        .top-stats {
          display: none;
        }
        .wave-track {
          width: 68%;
        }
        .modal-card {
          padding: 14px;
        }
        .menu-grid {
          grid-template-columns: 1fr;
        }
        .loadout-grid {
          max-height: 160px;
        }
        .almanac-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (max-width: 560px) {
        .app {
          grid-template-rows: minmax(0, 1fr) 230px;
        }
        .brand {
          padding: 8px 10px;
          min-width: 145px;
        }
        .brand h1 {
          font-size: 21px;
        }
        .hud {
          inset: 7px;
        }
        .hud-actions .icon-btn {
          width: 36px;
          height: 36px;
        }
        .rail {
          grid-template-columns: 137px 1fr;
        }
        .mission {
          padding: 7px;
        }
        .mission-icon {
          display: none;
        }
        .resource-row {
          grid-template-columns: 1fr;
        }
        .seed-bank {
          grid-template-columns: repeat(2, minmax(105px, 1fr));
        }
        .seed-card {
          min-height: 70px;
          padding-left: 37px;
        }
        .seed-card .seed-icon {
          left: 6px;
          width: 26px;
          height: 26px;
        }
        .wave-track {
          bottom: 7px;
        }
        .title-row {
          display: block;
        }
        .level-grid {
          grid-template-columns: repeat(3, 1fr);
        }
        .mode-cards {
          grid-template-columns: 1fr;
        }
        .almanac-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="stage">
        <canvas id="gameCanvas" aria-label="芽阵前线五路战场"></canvas>
        <div class="hud">
          <div class="brand">
            <h1>芽阵前线 <b>六境 V3</b></h1>
            <div class="subline">
              <span id="statusText">远征待命</span> ·
              <span id="regionText">晨露庭院</span>
            </div>
          </div>
          <div class="top-stats">
            <div class="stat sun">
              <span>日光</span><strong id="sunText">150</strong>
            </div>
            <div class="stat">
              <span>波次</span><strong id="waveStat">0/0</strong>
            </div>
            <div class="stat">
              <span>威胁</span><strong id="threatText">0</strong>
            </div>
            <div class="stat">
              <span>击退</span><strong id="killText">0</strong>
            </div>
          </div>
          <div class="hud-actions">
            <button class="icon-btn" id="speedBtn" title="倍速">1×</button
            ><button class="icon-btn" id="pauseBtn" title="暂停">Ⅱ</button
            ><button class="icon-btn" id="menuBtn" title="返回远征地图">
              ☰
            </button>
          </div>
        </div>
        <div class="wave-track">
          <div class="fill"><i id="waveBar"></i></div>
          <span id="waveText">选择行动</span>
        </div>
        <div class="toast" id="toast">准备就绪</div>
        <div class="modal show" id="startModal">
          <div class="modal-card">
            <div class="title-row">
              <div>
                <h2>芽阵前线：<b>六境繁花</b></h2>
                <p>24 株芽阵、18 关远征、Boss 机制与挑战词条。</p>
              </div>
              <div class="save-pill" id="savePill">远征进度 1/18</div>
            </div>
            <div class="tabs">
              <button class="tab-btn selected" data-tab="adventure">
                冒险地图</button
              ><button class="tab-btn" data-tab="special">特别行动</button
              ><button class="tab-btn" data-tab="almanac">芽阵图鉴</button>
            </div>
            <div id="adventureTab">
              <div class="menu-grid">
                <section class="menu-section">
                  <h3>四境路线</h3>
                  <div class="level-grid" id="levelGrid"></div>
                  <div class="level-info" id="levelInfo"></div>
                  <h3>挑战词条</h3>
                  <div class="tabs" id="challengeGrid"></div>
                </section>
                <section class="menu-section">
                  <div class="loadout-head">
                    <h3>出战芽阵 <span id="loadoutCount">0/8</span></h3>
                    <button class="mini-btn" id="autoLoadoutBtn">推荐</button>
                  </div>
                  <div class="loadout-grid" id="loadoutGrid"></div>
                </section>
              </div>
            </div>
            <div id="specialTab" hidden>
              <div class="mode-cards" id="modeCards"></div>
              <div class="level-info" id="specialInfo"></div>
            </div>
            <div id="almanacTab" hidden>
              <div class="almanac-grid" id="almanacGrid"></div>
            </div>
            <div class="start-row">
              <button class="mini-btn" id="exportSaveBtn">导出存档码</button>
              <button class="mini-btn" id="importSaveBtn">导入存档码</button>
              <button class="mini-btn" id="resetSaveBtn">重置进度</button
              ><button class="primary-btn" id="startBtn">开始行动</button>
            </div>
          </div>
        </div>
        <div class="modal" id="resultModal">
          <div class="modal-card compact">
            <h2 id="resultTitle">防线稳固</h2>
            <p id="resultCopy"></p>
            <div class="result-stats">
              <div><strong id="resultKills">0</strong><span>击退</span></div>
              <div><strong id="resultSun">0</strong><span>日光</span></div>
              <div><strong id="resultGuards">5</strong><span>防线</span></div>
            </div>

            } else if (p.kind === "ring") {
              ctx.strokeStyle = p.color;
              ctx.lineWidth = 5;
              ctx.beginPath();
              ctx.arc(
                p.x,
                p.y,
                p.r * (1.5 - (p.life / (p.max || 0.4)) * 0.5),
                0,
                Math.PI * 2,
              );
              ctx.stroke();
            } else {
              ctx.fillStyle = p.color;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r || 9, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
          }
        }
        function drawPreview() {
          if (!state.started || state.paused || state.over || !pointer.inside)
            return;
          const cell = pointCell(pointer);
          if (!cell) return;
          const c = center(cell.row, cell.col),
            existing = plantAt(cell.row, cell.col);
          ctx.save();
          ctx.strokeStyle = shovel
            ? "#ff6d61"
            : leafMode
              ? "#ffd45e"
              : "rgba(255,238,145,.85)";
          ctx.lineWidth = 4;
          ctx.setLineDash([9, 7]);
          roundRect(c.x - CW / 2 + 7, c.y - CH / 2 + 7, CW - 14, CH - 14, 12);
          ctx.stroke();
          ctx.restore();
          if (!shovel && !leafMode && !existing && plantMap[selectedSeed]) {
            ctx.save();
            ctx.globalAlpha = 0.48;
            drawPlant({
              key: selectedSeed,
              x: c.x,
              y: c.y,
              hp: 1,
              maxHp: 1,
              birth: 0,
              boost: 0,
              frozen: 0,
              overlay: false,
            });
            ctx.restore();
          }
        }
        function roundRect(x, y, w, h, r) {
          r = Math.min(r, w / 2, h / 2);
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + w - r, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + r);
          ctx.lineTo(x + w, y + h - r);
          ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          ctx.lineTo(x + r, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
          ctx.closePath();
        }
        function loop(t) {
          const dt = Math.min(
            0.04,
            Math.max(0.001, lastTime ? (t - lastTime) / 1000 : 1 / 60),
          );
          lastTime = t;
          update(dt);
          draw();
          requestAnimationFrame(loop);
        }
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => (b.onclick = () => selectTab(b.dataset.tab)));
        $("autoLoadoutBtn").onclick = () => {
          loadout = plantsDef
            .filter(unlockedPlant)
            .slice(0, 8)
            .map((p) => p.key);
          renderLoadout();
        };
        $("startBtn").onclick = () => startGame();
        $("againBtn").onclick = () => startGame(true);
        $("nextBtn").onclick = () => {
          state.started = false;
          $("resultModal").classList.remove("show");
          $("startModal").classList.add("show");
          selectedTab = "adventure";
          selectTab("adventure");
        };
        $("menuBtn").onclick = () => {
          if (
            state.started &&
            !state.over &&
            !confirm("当前行动尚未结束，返回地图？")
          )
            return;
          state.started = false;
          $("resultModal").classList.remove("show");
          $("startModal").classList.add("show");
          renderMenu();
        };
        $("restartBtn").onclick = () => {
          if (state.started && confirm("重新开始当前行动？")) startGame(true);
        };
        $("pauseBtn").onclick = () => {
          if (!state.started || state.over) return;
          state.paused = !state.paused;
          $("pauseBtn").textContent = state.paused ? "▶" : "Ⅱ";
          updateUI();
        };
        $("speedBtn").onclick = () => {
          speed = speed === 1 ? 2 : 1;
          $("speedBtn").textContent = `${speed}×`;
          $("speedBtn").classList.toggle("active", speed === 2);
        };
        $("shovelBtn").onclick = () => {
          shovel = !shovel;
          leafMode = false;
          updateUI();
        };
        $("overloadBtn").onclick = () => {
          if (state.charge >= 100) {
            leafMode = !leafMode;
            shovel = false;
            updateUI();
          }
        };
        $("hintBtn").onclick = () => showToast(regions[state.region].note);
        $("resetSaveBtn").onclick = () => {
          if (confirm("确定重置远征关卡、星级和纪录？")) {
            localStorage.removeItem(SAVE_KEY);
            save = loadSave();
            selectedLevel = 1;
            renderMenu();
          }
        };
        $("exportSaveBtn").onclick = async () => {
          const code = encodeSave();
          try {
            await navigator.clipboard.writeText(code);
          } catch (error) {}
          prompt("芽阵前线存档码（已尝试复制，可在其他设备导入）", code);
        };
        $("importSaveBtn").onclick = () => {
          const code = prompt("粘贴芽阵前线存档码：");
          if (!code) return;
          try {
            importSave(code);
            alert("存档导入成功，远征、熟练与挑战纪录已恢复。");
          } catch (error) {
            alert(`导入失败：${error.message}`);
          }
        };
        canvas.addEventListener("click", canvasClick);
        canvas.addEventListener("pointermove", (e) =>
          Object.assign(pointer, screenPoint(e), { inside: true }),
        );
        canvas.addEventListener("pointerdown", (e) =>
          Object.assign(pointer, screenPoint(e), { inside: true }),
        );
        canvas.addEventListener("pointerleave", () => (pointer.inside = false));
        window.addEventListener("keydown", (e) => {
          if (e.code === "Space" || e.code === "KeyP") {
            e.preventDefault();
            $("pauseBtn").click();
          }
          if (/^Digit[1-8]$/.test(e.code)) {
            const b = UI.seedBank.children[+e.code.slice(-1) - 1];
            if (b && !b.disabled) b.click();
          }
          if (e.code === "Escape") {
            shovel = false;
            leafMode = false;
            updateUI();
          }
        });
        window.addEventListener("resize", resize);
        resize();
        updateUI();
        renderMenu();
        requestAnimationFrame(loop);
      })();
    </script>
  </body>
</html>
