<script>
(()=>{"use strict";const $=id=>document.getElementById(id),SAVE='monsterTamerV3';

 {n:'焰尾狐',i:'🦊',e:'火',base:0,evo:1,hp:55,a:16,sp:15,m:['claw','ember','fang']},{n:'赤曜九尾',i:'🦊',e:'火',base:0,hp:88,a:27,sp:25,m:['ember','blaze','fang','nova']},
 {n:'泡泡獭',i:'🦦',e:'水',base:2,evo:3,hp:62,a:14,sp:13,m:['claw','splash','renew']},{n:'潮冠海獭',i:'🦦',e:'水',base:2,hp:98,a:23,sp:21,m:['splash','tide','renew','guard']},

 {n:'卵石猪',i:'🐗',e:'大地',base:8,evo:9,hp:72,a:15,sp:9,m:['claw','rock','guard']},{n:'晶甲山王',i:'🐢',e:'大地',base:8,hp:116,a:24,sp:14,m:['rock','quake','guard','fang']},

 {n:'珊瑚蟹',i:'🦀',e:'水',base:12,evo:13,hp:75,a:13,sp:8,m:['splash','rock','guard']},{n:'深潮巨钳',i:'🦀',e:'水',base:12,hp:120,a:25,sp:12,m:['tide','quake','guard','fang']},
 {n:'花粉蛾',i:'🦋',e:'自然',base:14,evo:15,hp:48,a:15,sp:22,m:['leaf','dream','renew']},{n:'幻彩蝶后',i:'🦋',e:'自然',base:14,hp:78,a:25,sp:33,m:['leaf','bloom','dream','nova']},
 {n:'沙铃蛇',i:'🐍',e:'大地',base:16,evo:17,hp:60,a:19,sp:18,m:['rock','fang','spirit']},{n:'风暴翼蛇',i:'🐉',e:'风暴',base:16,hp:92,a:31,sp:31,m:['gale','thunder','quake','nova']}
];
const REGIONS=[{n:'青芽原',i:'🌿',e:'自然',pool:[4,8,14]},{n:'潮鸣湾',i:'🌊',e:'水',pool:[2,12,6]},{n:'赤砂环',i:'🌋',e:'火',pool:[0,8,16]},{n:'雷云脊',i:'⛈️',e:'风暴',pool:[6,14,16]},{n:'月蚀岛',i:'🌙',e:'灵',pool:[10,1,3,7,9,13,15,17]}];

let profile={crystals:20,orbs:7,medals:0,region:0,owned:[],team:[],dex:[],best:0},run={region:0,node:0},battle=null,busy=false,currentView='expedition';
const makePet=(id,lv=1)=>{const d=BEASTS[id],max=Math.round(d.hp*(1+(lv-1)*.09));return{uid:Math.random().toString(36).slice(2),id,lv,xp:0,hp:max,max,shield:0,status:null,statusTurns:0}};
function save(){localStorage.setItem(SAVE,JSON.stringify({v:3,profile,run,battle}))}function load(){try{const x=JSON.parse(localStorage.getItem(SAVE));if(x?.v===3){profile=x.profile;run=x.run||run;battle=x.battle}}catch{}profile.dex=[...new Set(profile.dex||[])];profile.team=profile.team||[]}
function checksum(s){let h=2166136261;for(const ch of s){h^=ch.charCodeAt(0);h=Math.imul(h,16777619)}return(h>>>0).toString(36)}function exportCode(){const b=btoa(unescape(encodeURIComponent(JSON.stringify({v:3,profile,run,battle}))));return`MT3-${b}-${checksum(b)}`}function importCode(x){const m=x.trim().match(/^MT3-(.+)-([a-z0-9]+)$/i);if(!m||checksum(m[1])!==m[2])throw Error('存档码校验失败');const d=JSON.parse(decodeURIComponent(escape(atob(m[1]))));if(d.v!==3)throw Error('版本不兼容');profile=d.profile;run=d.run;battle=d.battle;save();draw()}
function pet(uid){return profile.owned.find(x=>x.uid===uid)}function team(){return profile.team.map(pet).filter(Boolean)}function maxHp(p){return Math.round(BEASTS[p.id].hp*(1+(p.lv-1)*.09))}function discover(id){profile.dex.push(id);profile.dex=[...new Set(profile.dex)]}
function routeType(n){return n===4?'boss':n===2?'event':n===3?'elite':'wild'}function currentRegion(){return REGIONS[run.region]}
function generateEnemy(){const r=currentRegion(),type=routeType(run.node),pool=r.pool.filter(id=>type==='boss'||BEASTS[id].evo!=null),base=pool[(run.node+Math.floor(Math.random()*pool.length))%pool.length];let id=base,lv=2+run.region*3+run.node;if(type==='boss'){id=BEASTS[base].evo??base;lv+=3}if(type==='elite'){id=BEASTS[base].evo??base;lv+=1}const p=makePet(id,lv);p.wild=type!=='boss';p.boss=type==='boss';return p}

function effectiveness(move,def){if(move.e==='无')return 1;if(TYPES[move.e]===def)return 1.5;if(TYPES[def]===move.e)return .68;return 1}

function enemyTurn(){if(!battle)return;const e=battle.enemy,p=pet(battle.active);if(!tickStatus(e,BEASTS[e.id].n)){busy=false;nextTurn();return}const moves=BEASTS[e.id].m.filter(id=>(battle.enemyCool[id]||0)<=0),id=moves[Math.floor(Math.random()*moves.length)]||BEASTS[e.id].m[0],m=MOVES[id];animate('enemyBeast','cast');resolveMove(e,p,m,true);battle.enemyCool[id]=m.c||0;Object.keys(battle.enemyCool).forEach(k=>battle.enemyCool[k]=Math.max(0,battle.enemyCool[k]-1));if(p.hp<=0){p.hp=0;const next=team().find(x=>x.hp>0);if(next){battle.active=next.uid;message(`${BEASTS[p.id].n}倒下，${BEASTS[next.id].n}接替出战`)}else return setTimeout(defeat,600)}busy=false;nextTurn()}
function nextTurn(){battle.turn++;draw();save()}
function victory(){busy=false;const p=pet(battle.active),type=routeType(run.node),xp=18+run.region*9+(type==='boss'?35:type==='elite'?18:0),cr=5+run.region*3+(type==='boss'?15:0);grantXp(p,xp);profile.crystals+=cr;profile.best=Math.max(profile.best,run.region*5+run.node+1);message(`胜利！获得 ${xp} 经验与 ${cr} 灵晶`);if(type==='boss'){profile.medals=Math.max(profile.medals,run.region+1);profile.region=Math.max(profile.region,Math.min(4,run.region+1));profile.orbs+=2}battle=null;run.node++;if(run.node>=5){run.node=0;if(run.region<4)run.region=Math.min(profile.region,run.region+1);else showEnding()}draw();save()}
function defeat(){busy=false;battle=null;profile.crystals=Math.max(0,profile.crystals-5);message('远征失败，损失 5 灵晶。营地已为队伍恢复一半生命');team().forEach(p=>p.hp=Math.max(1,Math.round(p.max*.5)));draw();save()}
function grantXp(p,n){p.xp+=n;while(p.xp>=p.lv*22){p.xp-=p.lv*22;p.lv++;p.max=maxHp(p);p.hp=p.max;if(p.lv>=8&&BEASTS[p.id].evo!=null){p.id=BEASTS[p.id].evo;p.max=maxHp(p);p.hp=p.max;discover(p.id);toast(`${BEASTS[p.id].n}完成进化！`)}}}
function capture(){if(!battle||busy||!battle.enemy.wild)return message('当前目标无法捕捉');if(profile.orbs<=0)return message('灵球不足');profile.orbs--;const e=battle.enemy,chance=.16+(1-e.hp/e.max)*.68+(e.status?.12:0);if(Math.random()<chance){const caught=makePet(BEASTS[e.id].base??e.id,Math.max(1,e.lv-1));profile.owned.push(caught);discover(caught.id);message(`成功捕捉 ${BEASTS[caught.id].n}！`);battle=null;run.node++;if(run.node>=5){run.node=0;run.region=Math.min(profile.region,run.region+1)}busy=false;draw();save()}else{message('灵球摇晃后弹开了！');busy=true;setTimeout(enemyTurn,500);save()}}
function switchPet(uid){if(!battle||busy||uid===battle.active)return;const p=pet(uid);if(!p||p.hp<=0)return message('这只灵兽无法出战');battle.active=uid;message(`${BEASTS[p.id].n}上场！`);busy=true;setTimeout(enemyTurn,450);draw()}
function camp(){if(profile.crystals<8)return message('营地治疗需要 8 灵晶');profile.crystals-=8;team().forEach(p=>p.hp=p.max);message('队伍已在营地完全恢复');draw();save()}
function showEvent(){const opts=[{i:'🫧',n:'灵泉休整',d:'全队恢复 45% 生命',f:()=>team().forEach(p=>p.hp=Math.min(p.max,p.hp+p.max*.45))},{i:'🪙',n:'晶洞采集',d:'获得 14 灵晶',f:()=>profile.crystals+=14},{i:'🔮',n:'神秘蛋',d:'支付 10 灵晶，获得随机幼兽',f:()=>{if(profile.crystals<10)return toast('灵晶不足');profile.crystals-=10;const ids=BEASTS.map((b,i)=>b.evo!=null?i:-1).filter(i=>i>=0),id=ids[Math.floor(Math.random()*ids.length)];profile.owned.push(makePet(id,1));discover(id)}}];$('choiceTitle').textContent='群岛奇遇';$('choiceHelp').textContent='风改变了航线，你只能选择一份馈赠。';$('choices').innerHTML=opts.map((o,i)=>`<button class="choice" data-event="${i}"><span class="big">${o.i}</span><h3>${o.n}</h3><p>${o.d}</p></button>`).join('');$('choiceOverlay').classList.remove('hidden');document.querySelectorAll('[data-event]').forEach(b=>b.onclick=()=>{opts[+b.dataset.event].f();run.node++;$('choiceOverlay').classList.add('hidden');draw();save()})}
function message(s){$('message').textContent=s;if(battle){battle.log.unshift(s);battle.log=battle.log.slice(0,10)}}function animate(id,cls){const el=$(id);el.classList.add(cls);setTimeout(()=>el.classList.remove(cls),360)}function toast(s){const e=document.createElement('div');e.className='toast';e.textContent=s;document.body.append(e);setTimeout(()=>e.remove(),1700)}
function beastHtml(p,enemy=false){if(!p)return'<span class="sprite">❔</span><h3>等待遭遇</h3>';const d=BEASTS[p.id];return`<span class="sprite">${d.i}</span><h3>${d.n} <span class="level">Lv.${p.lv}</span></h3><span class="element">${d.e}</span><div class="hpbar"><i style="width:${Math.max(0,p.hp/p.max*100)}%"></i></div><div class="status">${p.shield?`护盾 ${Math.round(p.shield)} `:''}${p.status?statusName(p.status):''}</div>`}function statusName(s){return{burn:'灼烧',soak:'潮湿',root:'缠绕',shock:'眩晕',sleep:'沉睡'}[s]||s}
function draw(){profile.owned.forEach(p=>{p.max=maxHp(p);p.hp=Math.min(p.hp,p.max)});$('crystals').textContent=profile.crystals;$('orbs').textContent=profile.orbs;$('medals').textContent=`${profile.medals} / 5`;$('dexCount').textContent=`${profile.dex.length} / 18`;$('regionTabs').innerHTML=REGIONS.map((r,i)=>`<button class="region-btn ${run.region===i?'active':''}" data-region="${i}" ${i>profile.region?'disabled':''}>${r.i} ${r.n}</button>`).join('');document.querySelectorAll('[data-region]').forEach(b=>b.onclick=()=>{if(!battle){run.region=+b.dataset.region;run.node=0;draw()}});$('route').innerHTML=Array.from({length:5},(_,i)=>{const type=routeType(i),names={wild:'野外遭遇',event:'群岛奇遇',elite:'精英驯兽师',boss:'守岛灵王'},icons={wild:'🐾',event:'❔',elite:'⚔️',boss:'👑'};return`<button class="node ${i===run.node?'current':i<run.node?'done':'locked'}" ${i!==run.node||battle?'disabled':''} data-node="${i}"><span class="ico">${icons[type]}</span><span><b>${names[type]}</b><small>${i===4?'赢得徽章并解锁下一岛':'节点 '+(i+1)}</small></span><span>›</span></button>`}).join('');document.querySelectorAll('[data-node]').forEach(b=>b.onclick=startBattle);const active=battle?pet(battle.active):team().find(x=>x.hp>0);$('playerBeast').innerHTML=beastHtml(active);$('enemyBeast').innerHTML=beastHtml(battle?.enemy,true);const moves=active?BEASTS[active.id].m:[];$('moves').innerHTML=battle?moves.map(id=>{const m=MOVES[id],cd=battle.cool[id]||0;return`<button class="move" data-move="${id}" ${cd||busy?'disabled':''}><em>${m.e}</em><b>${m.n}</b><small>${m.d}${cd?` · 冷却${cd}`:''}</small></button>`}).join(''):'<div class="sub">进入节点后显示战斗招式。</div>';document.querySelectorAll('[data-move]').forEach(b=>b.onclick=()=>useMove(b.dataset.move));$('captureBtn').disabled=!battle||!battle.enemy.wild||busy;$('nextBtn').disabled=!!battle||busy;$('nextBtn').textContent=battle?'战斗进行中':'进入节点';$('teamstrip').innerHTML=team().map(p=>`<button class="teambeast ${battle?.active===p.uid?'active':''} ${p.hp<=0?'fainted':''}" data-switch="${p.uid}"><span>${BEASTS[p.id].i}</span><b>${BEASTS[p.id].n}</b><small>Lv.${p.lv} · ${Math.round(p.hp)}/${p.max}</small></button>`).join('');document.querySelectorAll('[data-switch]').forEach(b=>b.onclick=()=>switchPet(b.dataset.switch));drawRoster();drawCodex();save()}
function drawRoster(){$('roster').innerHTML=profile.owned.map(p=>{const d=BEASTS[p.id],inTeam=profile.team.includes(p.uid);return`<article class="petcard ${inTeam?'selected':''}"><span class="sprite">${d.i}</span><span class="element">${d.e}</span><h3>${d.n} · Lv.${p.lv}</h3><p>生命 ${Math.round(p.hp)}/${p.max} · 攻击 ${d.a}<br>${d.m.map(id=>MOVES[id].n).join(' / ')}</p><div class="progress"><i style="width:${p.xp/(p.lv*22)*100}%"></i></div><div class="actions"><button data-team="${p.uid}">${inTeam?'移出':'编入'}</button><button data-heal="${p.uid}">治疗 4</button></div></article>`}).join('');document.querySelectorAll('[data-team]').forEach(b=>b.onclick=()=>{const uid=b.dataset.team;if(profile.team.includes(uid))profile.team=profile.team.filter(x=>x!==uid);else if(profile.team.length<3)profile.team.push(uid);else return toast('队伍最多三只');draw()});document.querySelectorAll('[data-heal]').forEach(b=>b.onclick=()=>{const p=pet(b.dataset.heal);if(profile.crystals<4)return toast('灵晶不足');profile.crystals-=4;p.hp=p.max;draw()})}
function drawCodex(){$('codex').innerHTML=BEASTS.map((d,id)=>`<div class="codex-card ${profile.dex.includes(id)?'':'locked'}"><span>${profile.dex.includes(id)?d.i:'❔'}</span><b>${profile.dex.includes(id)?d.n:'未发现'}</b><small>${profile.dex.includes(id)?`${d.e}系 · ${d.m.map(x=>MOVES[x].n).join('/')}`:'在群岛远征中遭遇'}</small></div>`).join('')}
function showSave(){const code=exportCode();$('infoTitle').textContent='跨设备驯兽档案';$('infoBody').innerHTML=`<p>灵晶、队伍、图鉴、徽章和当前远征均会导出，并带完整性校验。</p><textarea class="savebox" id="saveCode">${code}</textarea><div class="tools"><button class="btn" id="copyCode">复制导出</button><button class="btn" id="importCodeBtn">导入上方存档</button></div>`;$('infoOverlay').classList.remove('hidden');$('copyCode').onclick=()=>navigator.clipboard?.writeText($('saveCode').value);$('importCodeBtn').onclick=()=>{try{importCode($('saveCode').value);$('infoOverlay').classList.add('hidden');alert('导入成功')}catch(e){alert(e.message)}}}
function showEnding(){$('infoTitle').textContent='群岛图鉴大师';$('infoBody').innerHTML=`<h3>五枚徽章已经共鸣。</h3><p>你完成了群岛主线，但仍可回到各岛捕捉未发现灵兽、培养进化队伍并挑战更高等级。</p>`;$('infoOverlay').classList.remove('hidden')}
function starterScreen(){$('starterChoices').innerHTML=[0,2,4].map(id=>{const d=BEASTS[id];return`<button class="choice" data-starter="${id}"><span class="big">${d.i}</span><h3>${d.n} · ${d.e}系</h3><p>生命 ${d.hp} · 攻击 ${d.a} · 速度 ${d.sp}<br>${d.m.map(x=>MOVES[x].n).join(' / ')}</p></button>`}).join('');document.querySelectorAll('[data-starter]').forEach(b=>b.onclick=()=>{const p=makePet(+b.dataset.starter,1);profile.owned=[p];profile.team=[p.uid];profile.dex=[p.id];$('starterOverlay').classList.add('hidden');draw()})}
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{currentView=b.dataset.view;document.querySelectorAll('.tab[data-view]').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id===currentView+'View'))});$('nextBtn').onclick=startBattle;$('captureBtn').onclick=capture;$('campBtn').onclick=camp;$('saveBtn').onclick=showSave;$('closeInfoBtn').onclick=()=>$('infoOverlay').classList.add('hidden');$('newBtn').onclick=()=>{if(confirm('清空当前灵兽档案并重新开始？')){localStorage.removeItem(SAVE);location.reload()}};
load();starterScreen();if(profile.owned.length){$('starterOverlay').classList.add('hidden');draw()}else draw();
})();
</script></body></html>
