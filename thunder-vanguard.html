<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>雷霆先锋</title><style>body{margin:0;background:#060916;color:#eef7ff;font-family:system-ui,"Microsoft YaHei";overflow:hidden}.app{height:100vh;display:grid;grid-template-columns:1fr 280px;gap:10px;padding:10px;box-sizing:border-box}section,aside{border:1px solid #314268;border-radius:16px;background:#0b1122;overflow:hidden}section{position:relative}canvas{width:100%;height:100%;display:block}aside{padding:14px;display:flex;flex-direction:column;gap:10px}.stat{padding:10px;border:1px solid #273a60;border-radius:10px}.stat small{color:#8ea2c8}.stat b{display:block;font-size:23px;color:#60dfff}.bar{height:8px;background:#1b2945;border-radius:8px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,#48ddff,#78f3a1);width:100%}button{border:1px solid #4a6da3;border-radius:10px;background:#162746;color:white;padding:10px;font-weight:bold;cursor:pointer}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:#050914cc;text-align:center;padding:20px}.card{max-width:480px}.card h1{font-size:38px;margin:0;color:#59ddff}.card p{color:#a8bad8;line-height:1.6}.upgrade{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.hidden{display:none}@media(max-width:700px){.app{grid-template-columns:1fr;grid-template-rows:1fr 190px;padding:6px}aside{display:grid;grid-template-columns:repeat(3,1fr);padding:7px}.stat{padding:7px}.stat b{font-size:16px}.help{display:none}.upgrade{grid-column:1/-1}}</style><body><main class="app"><section><canvas id="c"></canvas><div id="overlay" class="overlay"><div class="card"><h1>雷霆先锋</h1><p>原创竖版空战。移动战机自动开火，收集能量核心，击破波次首领并选择强化。</p><button id="start">启动拦截</button></div></div></section><aside><div class="stat"><small>得分 / 最佳</small><b id="score">0 / 0</b></div><div class="stat"><small>护盾</small><div class="bar"><i id="hp"></i></div><b id="level">Lv.1</b></div><div class="stat"><small>波次</small><b id="wave">1</b></div><div class="help">WASD / 方向键或拖动移动。自动射击；每次升级选择武器协议。Boss 每 5 波出现。</div><div id="up" class="upgrade"></div></aside></main><script>
const c=document.querySelector('#c'),x=c.getContext('2d'),O=document.querySelector('#overlay'),S=document.querySelector('#score'),H=document.querySelector('#hp'),L=document.querySelector('#level'),W=document.querySelector('#wave'),U=document.querySelector('#up');let q,keys=new Set(),pointer=null,last=0;const bestKey='thunder_vanguard_best';function reset(){q={run:false,t:0,score:0,best:+localStorage.getItem(bestKey)||0,hp:100,max:100,level:1,xp:0,next:30,wave:1,fire:0,spawn:0,bul:[],enemy:[],loot:[],p:{x:.5,y:.82,spd:.62,shots:1,dmg:12,rate:.22,spread:.14,shield:0},paused:false};U.innerHTML='';sync()}function resize(){c.width=c.clientWidth*devicePixelRatio;c.height=c.clientHeight*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}function sync(){S.textContent=`${q.score} / ${Math.max(q.score,q.best)}`;H.style.width=`${q.hp/q.max*100}%`;L.textContent=`Lv.${q.level}`;W.textContent=q.wave}function start(){reset();q.run=true;O.classList.add('hidden');last=performance.now();requestAnimationFrame(loop)}function spawn(){let boss=q.wave%5===0&&q.enemy.length===0;q.enemy.push({x:Math.random()*.8+.1,y:-.1,hp:boss?260+q.wave*35:24+q.wave*4,r:boss?.075:.032,v:boss?.08:.13,shoot:Math.random(),boss,dx:(Math.random()-.5)*.18})}function hit(e,d){e.hp-=d;if(e.hp<=0){q.score+=e.boss?500:25;q.xp+=e.boss?35:6;q.loot.push({x:e.x,y:e.y,v:e.boss?12:3});q.enemy=q.enemy.filter(a=>a!==e);if(e.boss)q.wave++}}function level(){while(q.xp>=q.next){q.xp-=q.next;q.next=Math.round(q.next*1.35);q.level++;q.run=false;let a=[['聚焦炮','伤害 +35%',()=>q.p.dmg*=1.35],['散射翼','额外弹道',()=>q.p.shots++],['超导装填','射速 +22%',()=>q.p.rate*=.78],['护盾电池','恢复 30 护盾',()=>q.hp=Math.min(q.max,q.hp+30)],['机动喷口','速度 +15%',()=>q.p.spd*=1.15]].sort(()=>Math.random()-.5).slice(0,3);U.innerHTML=a.map((z,i)=>`<button data-i="${i}">${z[0]}<br><small>${z[1]}</small></button>`).join('');U.querySelectorAll('button').forEach(b=>b.onclick=()=>{a[+b.dataset.i][2]();U.innerHTML='';q.run=true;last=performance.now()})}}function update(dt){q.t+=dt;let dx=(keys.has('ArrowLeft')||keys.has('KeyA')?-1:0)+(keys.has('ArrowRight')||keys.has('KeyD')?1:0),dy=(keys.has('ArrowUp')||keys.has('KeyW')?-1:0)+(keys.has('ArrowDown')||keys.has('KeyS')?1:0);if(pointer){dx+=(pointer.x-q.p.x)*3;dy+=(pointer.y-q.p.y)*3}q.p.x=Math.max(.04,Math.min(.96,q.p.x+dx*q.p.spd*dt));q.p.y=Math.max(.1,Math.min(.94,q.p.y+dy*q.p.spd*dt));q.fire-=dt;if(q.fire<=0){q.fire=q.p.rate;for(let i=0;i<q.p.shots;i++){let a=(i-(q.p.shots-1)/2)*q.p.spread;q.bul.push({x:q.p.x,y:q.p.y-.04,vx:Math.sin(a)*.38,vy:-.95,d:q.p.dmg,from:1})}}q.spawn-=dt;if(q.spawn<=0){spawn();q.spawn=Math.max(.35,1.2-q.wave*.04)}for(const b of q.bul){b.x+=b.vx*dt;b.y+=b.vy*dt}for(const e of q.enemy){e.y+=e.v*dt;e.x+=e.dx*dt;e.shoot-=dt;if(e.shoot<0){e.shoot=e.boss?.6:1.5;q.bul.push({x:e.x,y:e.y,vx:0,vy:e.boss?.45:.28,d:e.boss?12:7,from:0})}}for(const b of q.bul){if(b.from)for(const e of q.enemy)if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){hit(e,b.d);b.dead=1}else if(!b.from&&Math.hypot(b.x-q.p.x,b.y-q.p.y)<.045){q.hp-=b.d;b.dead=1}}q.bul=q.bul.filter(b=>!b.dead&&b.y>-0.1&&b.y<1.1);for(const l of q.loot){l.y+=.06*dt;if(Math.hypot(l.x-q.p.x,l.y-q.p.y)<.08){q.xp+=l.v;l.dead=1}}q.loot=q.loot.filter(l=>!l.dead);q.enemy=q.enemy.filter(e=>e.y<1.12);level();if(q.hp<=0){q.best=Math.max(q.best,q.score);localStorage.setItem(bestKey,q.best);O.querySelector('.card').innerHTML=`<h1>战机坠毁</h1><p>得分 ${q.score}，抵达波次 ${q.wave}</p><button id="start">重新部署</button>`;O.classList.remove('hidden');document.querySelector('#start').onclick=start;q.run=false}sync()}function draw(){let w=c.clientWidth,h=c.clientHeight;x.clearRect(0,0,w,h);x.fillStyle='#07112a';x.fillRect(0,0,w,h);x.strokeStyle='#16345c';for(let i=0;i<30;i++){let y=(i*73+q.t*70)%h;x.beginPath();x.moveTo(0,y);x.lineTo(w,y-90);x.stroke()}for(const l of q.loot){x.fillStyle='#ffe26d';x.beginPath();x.arc(l.x*w,l.y*h,5,0,7);x.fill()}for(const b of q.bul){x.fillStyle=b.from?'#60eaff':'#ff749d';x.fillRect(b.x*w-2,b.y*h-7,4,14)}for(const e of q.enemy){x.fillStyle=e.boss?'#f15e9b':'#a48cff';x.beginPath();x.arc(e.x*w,e.y*h,e.r*w,0,7);x.fill();x.fillStyle='#171428';x.fillRect((e.x-e.r)*w,(e.y-e.r-.02)*h,e.r*2*w,4);x.fillStyle='#75f4a5';x.fillRect((e.x-e.r)*w,(e.y-e.r-.02)*h,e.r*2*w*Math.max(0,e.hp/(e.boss?260+q.wave*35:24+q.wave*4)),4)}x.fillStyle='#4be5ff';x.beginPath();x.moveTo(q.p.x*w,(q.p.y-.04)*h);x.lineTo((q.p.x-.035)*w,(q.p.y+.05)*h);x.lineTo((q.p.x+.035)*w,(q.p.y+.05)*h);x.fill()}function loop(t){let dt=Math.min(.033,(t-last)/1000);last=t;if(q.run)update(dt);draw();requestAnimationFrame(loop)}c.addEventListener('pointermove',e=>{let r=c.getBoundingClientRect();pointer={x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height}});c.addEventListener('pointerleave',()=>pointer=null);addEventListener('keydown',e=>keys.add(e.code));addEventListener('keyup',e=>keys.delete(e.code));addEventListener('resize',resize);document.querySelector('#start').onclick=start;reset();resize();draw();
</script>
