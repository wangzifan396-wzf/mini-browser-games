<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>点球热浪</title><style>body{margin:0;background:#071a12;color:#effff4;font-family:system-ui}.app{min-height:100vh;display:grid;place-items:center;padding:12px;box-sizing:border-box}.shell{width:min(900px,100%);padding:14px;border:1px solid #39745d;border-radius:18px;background:#102b20}.field{position:relative;aspect-ratio:16/9;background:linear-gradient(#23834e,#155d38);border-radius:12px;overflow:hidden}.goal{position:absolute;left:20%;right:20%;top:8%;height:37%;border:8px solid #edf8ef;border-bottom:0}.keeper{position:absolute;top:32%;left:46%;width:8%;height:13%;background:#ffcf5f;border-radius:12px}.target{position:absolute;width:14%;height:22%;border:2px dashed #9ffad0;background:#ffffff18;border-radius:9px;cursor:pointer}.top{display:flex;justify-content:space-between;gap:10px}.card{padding:8px;border:1px solid #39745d;border-radius:9px}.msg{color:#aee3c5}.row{display:flex;gap:8px;margin-top:10px}button{padding:10px;border:1px solid #50a77d;border-radius:9px;background:#1f563e;color:white;font-weight:bold}@media(max-width:520px){.shell{padding:8px}.goal{left:10%;right:10%}}</style><main class="app"><div class="shell"><div class="top"><div><h1>点球热浪</h1><div id="msg" class="msg">选择射门区域，连续进球会提升难度和倍率。</div></div><div id="score" class="card">0 : 0</div></div><div class="field" id="f"><div class="goal"></div><div class="keeper" id="k"></div></div><div class="row"><button id="newGame">新赛季</button><button id="power">蓄力：中</button></div></div></main><script>
const F=document.querySelector('#f'),K=document.querySelector('#k'),M=document.querySelector('#msg'),S=document.querySelector('#score');let q={me:0,save:0,round:1,streak:0,power:1};function reset(){q={me:0,save:0,round:1,streak:0,power:1};draw()}function draw(){S.textContent=`${q.me} : ${q.save} · 回合 ${q.round}`;F.querySelectorAll('.target').forEach(e=>e.remove());for(let r=0;r<2;r++)for(let c=0;c<3;c++){let d=document.createElement('button');d.className='target';d.style.left=28+c*15+'%';d.style.top=12+r*20+'%';d.onclick=()=>shoot(r,c);F.append(d)}K.style.left=(36+Math.random()*28)+'%'}function shoot(r,c){let keeper=parseFloat(K.style.left)||46,tx=28+c*15+7,dist=Math.abs(tx-(keeper+4)),chance=Math.min(.9,.38+dist/55+.12*q.power+.04*q.streak);if(Math.random()<chance){q.me++;q.streak++;M.textContent=`进球！连击 ${q.streak}，下一脚门将更快。`}else{q.save++;q.streak=0;M.textContent='被扑出，调整射门角度和蓄力。'}q.round++;if(q.round>10){M.textContent=q.me>q.save?'赛季夺冠！':'赛季结束，重新挑战。';q.round=1;q.streak=0}draw()}newGame.onclick=reset;power.onclick=()=>{q.power=q.power===2?0:q.power+1;power.textContent='蓄力：'+['弱','中','强'][q.power]};reset();
</script><script>const penaltyRecord=document.createElement('div');penaltyRecord.className='card';document.querySelector('.top').append(penaltyRecord);setInterval(()=>{let b=+localStorage.getItem('penalty_streak_best')||0;if(q.streak>b){b=q.streak;localStorage.setItem('penalty_streak_best',b)}penaltyRecord.textContent='最佳连击 '+b},500)</script>
