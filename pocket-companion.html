<!doctype html>
<html lang="zh-CN">
  <meta charset="utf-8" /><meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  /><title>口袋伙伴</title
  ><style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #1b1730;
      color: #f7f1ff;
      font-family: system-ui, "Microsoft YaHei";
    }
    .app {
      min-height: 100vh;
      padding: 14px;
      display: grid;
      place-items: center;
    }
    .shell {
      width: min(900px, 100%);
      background: #30274d;
      border: 1px solid #7668a0;
      border-radius: 24px;
      padding: 18px;
    }
    .top,
    .row {
      display: flex;
      justify-content: space-between;
      gap: 9px;
      align-items: center;
      flex-wrap: wrap;
    }
    .room {
      min-height: 390px;
      margin: 12px 0;
      border-radius: 18px;
      background: linear-gradient(#8cc8db 0 65%, #d7bb83 65%);
      position: relative;
      text-align: center;
      padding-top: 70px;
    }
    .pet {
      font-size: 110px;
      display: inline-block;
      transition: transform 0.3s;
    }
    .pet.happy {
      animation: bounce 0.5s;
    }
    @keyframes bounce {
      50% {
        transform: translateY(-25px);
      }
    }
    .bubble {
      min-height: 30px;
      font-size: 18px;
    }
    .bars {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .bar {
      height: 10px;
      background: #2b2142;
      border-radius: 8px;
      overflow: hidden;
    }
    .bar i {
      display: block;
      height: 100%;
      background: #73df9d;
    }
    .panel {
      background: #251e3d;
      border: 1px solid #625783;
      border-radius: 11px;
      padding: 10px;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .actions button {
      min-height: 55px;
    }
    .memory {
      display: none;
      gap: 8px;
      justify-content: center;
    }
    .memory.show {
      display: flex;
    }
    .orb {
      width: 60px;
      height: 60px;
      font-size: 25px;
    }
    .log {
      height: 75px;
      overflow: auto;
      color: #c9bfdb;
      font-size: 13px;
    }
    button {
      padding: 9px 11px;
      border: 1px solid #8273a9;
      border-radius: 9px;
      background: #4d3f70;
      color: white;
      font-weight: bold;
    }
    .help {
      font-size: 13px;
      color: #c9bfdd;
    }
    @media (max-width: 650px) {
      .actions {
        grid-template-columns: repeat(3, 1fr);
      }
      .bars {
        grid-template-columns: repeat(2, 1fr);
      }
      .app {
        place-items: start center;
      }
    }
  </style>
  <main class="app">
    <section class="shell">
      <div class="top">
        <div>
          <h1 style="margin: 0">口袋伙伴</h1>
          <div class="help">
            照顾、训练并陪伴宠物成长；性格和照料方式会决定第七天的进化形态。
          </div>
        </div>
        <div>
          第 <b id="day"></b> 天　年龄 <b id="age"></b>　羁绊
          <b id="bond"></b>　图鉴 <b id="dex"></b>/4
        </div>
      </div>
      <div class="bars">
        <span
          >饱食
          <div class="bar"><i id="foodBar"></i></div></span
        ><span
          >快乐
          <div class="bar"><i id="joyBar"></i></div></span
        ><span
          >清洁
          <div class="bar"><i id="cleanBar"></i></div></span
        ><span
          >精力
          <div class="bar"><i id="energyBar"></i></div
        ></span>
      </div>
      <div class="room">
        <div class="bubble" id="bubble"></div>
        <div class="pet" id="pet"></div>
        <div class="memory" id="memory"></div>
      </div>
      <div class="actions">
        <button data-a="feed">🍖 喂食</button
        ><button data-a="play">🧶 玩耍</button
        ><button data-a="clean">🛁 清洁</button
        ><button data-a="train">🎯 训练</button
        ><button data-a="sleep">🌙 睡觉</button>
      </div>
      <div class="panel log" id="log"></div>
      <div class="row">
        <span id="trait"></span><button id="restart">领养新伙伴</button>
      </div>
    </section>
  </main>
  <script>
    const forms = [
      ["晨光兽", "🦁", "活力"],
      ["月影兽", "🐺", "聪慧"],
      ["花灵兽", "🦄", "亲和"],
      ["云眠兽", "🐻‍❄️", "安稳"],
    ];
    let q,
      sequence = [],
      input = [],
      training = false;
    const $ = (x) => document.getElementById(x);
    function fresh() {
      return {
        day: 1,
        age: 0,
        food: 75,
        joy: 70,
        clean: 75,
        energy: 75,
        bond: 0,
        train: 0,
        care: 0,
        form: null,
        logs: ["一枚小小的蛋在房间里摇晃……"],
        dex: JSON.parse(localStorage.getItem("pet_dex") || "{}"),
      };
    }
    function act(a) {
      if (training || (q.form && q.day > 10)) return;
      if (a === "feed") {
        q.food = Math.min(100, q.food + 28);
        q.care++;
        say("伙伴吃得很香。");
      }
      if (a === "play") {
        if (q.energy < 15) return say("伙伴太累了。");
        q.joy = Math.min(100, q.joy + 25);
        q.energy -= 15;
        q.bond += 3;
        say("一起玩耍，羁绊提升。");
      }
      if (a === "clean") {
        q.clean = 100;
        q.care++;
        say("洗得干干净净！");
      }
      if (a === "train") return startTrain();
      if (a === "sleep") nextDay();
      bounce();
      draw();
    }
    function nextDay() {
      q.day++;
      q.age++;
      q.food -= 18;
      q.joy -= 10;
      q.clean -= 14;
      q.energy = 100;
      let low = [q.food, q.joy, q.clean].filter((x) => x < 25).length;
      if (low) q.bond = Math.max(0, q.bond - low * 2);
      else q.bond += 2;
      if (q.day === 2) say("宠物蛋孵化了！");
      if (q.day === 7 && !q.form) evolve();
      else say("新的一天开始。");
    }
    function evolve() {
      let idx = q.train >= 6 ? 1 : q.care >= 7 ? 2 : q.bond >= 15 ? 0 : 3;
      q.form = idx;
      q.dex[idx] = true;
      localStorage.setItem("pet_dex", JSON.stringify(q.dex));
      say(`伙伴进化为 ${forms[idx][1]}${forms[idx][0]}！`);
    }
    function startTrain() {
      if (q.energy < 15) return say("精力不足。");
      training = true;
      sequence = Array.from(
        { length: 3 + Math.min(3, Math.floor(q.train / 2)) },
        () => Math.floor(Math.random() * 4),
      );
      input = [];
      memory.classList.add("show");
      memory.innerHTML = [0, 1, 2, 3]
        .map(
          (i) =>
            `<button class="orb" data-i="${i}">${["🔴", "🔵", "🟢", "🟡"][i]}</button>`,
        )
        .join("");
      memory
        .querySelectorAll("[data-i]")
        .forEach((e) => (e.onclick = () => press(+e.dataset.i)));
      bubble.textContent =
        "记住顺序：" +
        sequence.map((i) => ["🔴", "🔵", "🟢", "🟡"][i]).join(" ");
      setTimeout(() => (bubble.textContent = "现在按顺序点击颜色"), 1200);
    }
    function press(i) {
      if (!training) return;
      input.push(i);
      if (input[input.length - 1] !== sequence[input.length - 1]) {
        training = false;
        q.energy -= 10;
        memory.classList.remove("show");
        return say("顺序错了，再休息一下重试。");
      }
      if (input.length === sequence.length) {
        training = false;
        q.train++;
        q.bond += 4;
        q.energy -= 15;
        q.joy += 5;
        memory.classList.remove("show");
        say("训练成功，聪慧与羁绊提升！");
      }
      draw();
    }
    function say(s) {
      q.logs.unshift(s);
      q.logs = q.logs.slice(0, 9);
      draw();
    }
    function bounce() {
      pet.classList.remove("happy");
      void pet.offsetWidth;
      pet.classList.add("happy");
    }
    function draw() {
      day.textContent = q.day;
      age.textContent = q.age;
      bond.textContent = q.bond;
      dex.textContent = Object.keys(q.dex).length;
      foodBar.style.width = Math.max(0, q.food) + "%";
      joyBar.style.width = Math.max(0, q.joy) + "%";
      cleanBar.style.width = Math.max(0, q.clean) + "%";
      energyBar.style.width = Math.max(0, q.energy) + "%";
      pet.textContent = q.day === 1 ? "🥚" : q.form ? forms[q.form][1] : "🐣";
      trait.textContent = q.form
        ? `${forms[q.form][0]} · ${forms[q.form][2]}型`
        : `成长倾向：训练 ${q.train} · 照料 ${q.care}`;
      log.innerHTML = q.logs.map((x) => `<div>• ${x}</div>`).join("");
      if (!training)
        bubble.textContent =
          q.food < 25
            ? "肚子饿了……"
            : q.clean < 25
              ? "想洗澡……"
              : q.joy < 25
                ? "陪我玩嘛！"
                : "今天也要一起成长！";
    }
    document
      .querySelectorAll("[data-a]")
      .forEach((e) => (e.onclick = () => act(e.dataset.a)));
    restart.onclick = () => {
      if (confirm("领养一只新伙伴？图鉴会保留。")) {
        q = fresh();
        draw();
      }
    };
    q = fresh();
    draw();
  </script>
</html>
