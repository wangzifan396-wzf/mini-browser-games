<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>深空扫雷</title><style>body{margin:0;background:#07101b;color:#ecf6ff;font-family:system-ui,"Microsoft YaHei"}.app{min-height:100vh;display:grid;place-items:center;padding:12px;box-sizing:border-box}.shell{width:min(850px,100%);padding:16px;border:1px solid #33506e;border-radius:18px;background:#0d1928}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.top h1{margin:0;color:#62e1ff}.stats{display:flex;gap:8px}.pill{padding:8px 11px;border:1px solid #365473;border-radius:9px}.board{margin-top:14px;display:grid;gap:3px}.cell{aspect-ratio:1;border:1px solid #29445f;border-radius:4px;background:#1a3146;color:white;font-weight:900;cursor:pointer}.cell.open{background:#0b1625;border-color:#223c57}.cell.mine{background:#8a3147}.cell.flag{background:#3c3564}.row{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}button{border:1px solid #46769d;border-radius:9px;background:#18344b;color:white;padding:9px 12px;font-weight:bold}.help{margin-top:12px;color:#91abc4;font-size:13px;line-height:1.6}@media(max-width:520px){.shell{padding:10px}.top{display:block}.stats{margin-top:8px}.board{gap:2px}.cell{font-size:11px}}</style><body><main class="app"><div class="shell"><div class="top"><div><h1>深空扫雷</h1><small>首击安全 · 标记地雷 · 数字连开</small></div><div class="stats"><div class="pill" id="mine">雷 0</div><div class="pill" id="time">00:00</div><div class="pill" id="best">最佳 --</div></div></div><div class="row"><button data-d="easy">新手 9×9</button><button data-d="normal">标准 12×12</button><button data-d="hard">硬核 16×16</button><button id="flag">标记模式：关</button><button id="hint">扫描提示</button></div><div class="board" id="board"></div><div class="help">点击探测；标记模式或右键标出可疑地雷；点击已打开数字格可在旗帜数匹配时连开周围。扫描提示会找出一个安全格，但每局仅三次。</div></div></main><script>
const B=document.querySelector('#board'),M=document.querySelector('#mine'),T=document.querySelector('#time'),Best=document.querySelector('#best'),F=document.querySelector('#flag');const cfg={easy:[9,10],normal:[12,24],hard:[16,48]};let q,clock;function start(d='easy'){let[n,m]=cfg[d];q={d,n,m,cells:Array.from({length:n*n},(_,i)=>({i,mine:false,open:false,flag:false,num:0})),first:true,flag:false,hints:3,t:0,over:false};B.style.gridTemplateColumns=`repeat(${n},1fr)`;B.style.maxWidth=n>12?'720px':'540px';clearInterval(clock);clock=setInterval(()=>{if(!q.over&&!q.first){q.t++;sync()}},1000);sync();render()}function around(i){let r=Math.floor(i/q.n),c=i%q.n,a=[];for(let y=-1;y<=1;y++)for(let x=-1;x<=1;x++)if(x||y){let rr=r+y,cc=c+x;if(rr>=0&&cc>=0&&rr<q.n&&cc<q.n)a.push(rr*q.n+cc)}return a}function plant(safe){let pool=q.cells.filter(c=>c.i!==safe&&!around(safe).includes(c.i));for(let i=0;i<q.m;i++){let k=Math.floor(Math.random()*pool.length),c=pool.splice(k,1)[0];c.mine=true}q.cells.forEach(c=>c.num=around(c.i).filter(i=>q.cells[i].mine).length)}function open(i){let c=q.cells[i];if(q.over||c.flag)return;if(q.first){q.first=false;plant(i)}if(c.mine){c.open=true;q.over=true;render();sync();return}flood(i);check();render();sync()}function flood(i){let c=q.cells[i];if(c.open||c.flag)return;c.open=true;if(!c.num)around(i).forEach(flood)}function chord(i){let c=q.cells[i];if(!c.open||!c.num)return;let a=around(i);if(a.filter(j=>q.cells[j].flag).length===c.num)a.forEach(open)}function click(i){let c=q.cells[i];if(q.flag){c.flag=!c.flag;render();sync();return}if(c.open)chord(i);else open(i)}function check(){if(q.cells.filter(c=>!c.mine).every(c=>c.open)){q.over=true;localStorage.setItem('mine_'+q.d+'_best',q.t)}}function render(){B.innerHTML=q.cells.map(c=>`<button class="cell ${c.open?'open':''} ${c.open&&c.mine?'mine':''} ${c.flag?'flag':''}" data-i="${c.i}">${c.flag?'⚑':c.open?(c.mine?'✹':c.num||''):''}</button>`).join('');B.querySelectorAll('[data-i]').forEach(b=>{b.onclick=()=>click(+b.dataset.i);b.oncontextmenu=e=>{e.preventDefault();q.flag=true;click(+b.dataset.i);q.flag=false}})}function sync(){M.textContent=`雷 ${q.m-q.cells.filter(c=>c.flag).length} · 提示 ${q.hints}`;T.textContent=`${String(Math.floor(q.t/60)).padStart(2,'0')}:${String(q.t%60).padStart(2,'0')}`;Best.textContent='最佳 '+(localStorage.getItem('mine_'+q.d+'_best')||'--');F.textContent='标记模式：'+(q.flag?'开':'关')}document.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>start(b.dataset.d));F.onclick=()=>{q.flag=!q.flag;sync()};document.querySelector('#hint').onclick=()=>{if(q.hints&& !q.over){let a=q.cells.filter(c=>!c.mine&&!c.open&&!c.flag);if(a.length){q.hints--;open(a[Math.floor(Math.random()*a.length)].i)}}};start();
</script>
