<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>星球大合成</title><style>body{margin:0;background:#070817;color:white;font-family:system-ui}.app{height:100vh;display:grid;grid-template-columns:1fr 230px;gap:10px;padding:10px;box-sizing:border-box}.stage,aside{border:1px solid #493f7e;border-radius:16px;background:#100d2b;overflow:hidden}.stage{position:relative}canvas{width:100%;height:100%;display:block}aside{padding:14px;display:flex;flex-direction:column;gap:9px}.card{padding:10px;border:1px solid #493f7e;border-radius:9px}.card b{display:block;color:#ffcf6b;font-size:24px}button{padding:10px;border:1px solid #755fb4;border-radius:9px;background:#302658;color:white;font-weight:bold}@media(max-width:650px){.app{grid-template-columns:1fr;grid-template-rows:1fr 130px;padding:6px}aside{display:grid;grid-template-columns:repeat(3,1fr);padding:7px}.help{display:none}}</style><main class="app"><section class="stage"><canvas id="c"></canvas></section><aside><div class="card">得分<b id="s">0</b></div><div class="card">最大星球<b id="m">1</b></div><button id="newGame">新宇宙</button><div class="help">移动鼠标或手指选择落点，点击投放星球。相同等级碰撞会合成更大的星球；堆到红线即结束。</div></aside></main><script>
const c=document.querySelector('#c'),x=c.getContext('2d');let q,last=0,aim=.5;function reset(){q={balls:[],next:1,score:0,max:1,over:false,cd:0};sync()}function drop(){if(q.over||q.cd>0)return;q.balls.push({x:aim,y:.08,vx:0,vy:0,l:q.next,r:.022+q.next*.008});q.next=Math.random()<.75?1:2;q.cd=.35}function update(dt){q.cd-=dt;for(const b of q.balls){b.vy+=.55*dt;b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.y+b.r>.98){b.y=.98-b.r;b.vy*=-.25}if(b.x-b.r<0||b.x+b.r>1){b.x=Math.max(b.r,Math.min(1-b.r,b.x));b.vx*=-.4}}for(let i=0;i<q.balls.length;i++)for(let j=i+1;j<q.balls.length;j++){let a=q.balls[i],b=q.balls[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),min=a.r+b.r;if(d<min){if(a.l===b.l&&!a.dead&&!b.dead){a.dead=b.dead=1;let l=a.l+1;q.balls.push({x:(a.x+b.x)/2,y:(a.y+b.y)/2,vx:0,vy:-.12,l,r:.022+l*.008});q.score+=l*20;q.max=Math.max(q.max,l)}else{let n={x:dx/(d||1),y:dy/(d||1)},push=(min-d)*.5;a.x-=n.x*push;b.x+=n.x*push;a.y-=n.y*push;b.y+=n.y*push;let rv=(b.vx-a.vx)*n.x+(b.vy-a.vy)*n.y;if(rv<0){a.vx+=rv*n.x*.5;a.vy+=rv*n.y*.5;b.vx-=rv*n.x*.5;b.vy-=rv*n.y*.5}}}}q.balls=q.balls.filter(b=>!b.dead);if(q.balls.some(b=>b.y-b.r<.12&&Math.abs(b.vy)<.04)){q.over=true;setTimeout(()=>alert('宇宙已满，得分 '+q.score),10)}sync()}function sync(){s.textContent=q.score;m.textContent=q.max}function draw(){let w=c.clientWidth,h=c.clientHeight;c.width=w*devicePixelRatio;c.height=h*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);x.fillStyle='#100d2b';x.fillRect(0,0,w,h);x.strokeStyle='#ff5f7e';x.setLineDash([8,8]);x.beginPath();x.moveTo(0,.12*h);x.lineTo(w,.12*h);x.stroke();x.setLineDash([]);for(const b of q.balls){x.fillStyle=`hsl(${b.l*42%360} 75% 62%)`;x.beginPath();x.arc(b.x*w,b.y*h,b.r*w,0,7);x.fill();x.fillStyle='#151025';x.fillText(b.l,b.x*w-3,b.y*h+4)}x.strokeStyle='#fff';x.beginPath();x.moveTo(aim*w,.02*h);x.lineTo(aim*w,.08*h);x.stroke()}function loop(t){let dt=Math.min(.025,(t-last)/1000);last=t;if(!q.over)update(dt);draw();requestAnimationFrame(loop)}c.addEventListener('pointermove',e=>{let r=c.getBoundingClientRect();aim=(e.clientX-r.left)/r.width});c.addEventListener('pointerdown',drop);newGame.onclick=reset;reset();requestAnimationFrame(loop);
</script>
