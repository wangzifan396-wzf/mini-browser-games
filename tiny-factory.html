mplate-columns:repeat(8,1fr);gap:3px;background:#080a0e;border:2px solid #536173;border-radius:6px;padding:5px;aspect-ratio:1;min-height:520px}.cell{position:relative;min-width:0;min-height:0;background:#1e2630;border:1px solid #374454;cursor:pointer;overflow:hidden}.cell:nth-child(2n){background:#222b36}.cell.source-ore{background:#302e32}.cell.source-copper{background:#392a27}.node{position:absolute;left:3px;top:2px;font-size:13px;opacity:.65}.tile{position:absolute;inset:2px;border:1px solid #65778c;background:linear-gradient(145deg,#344150,#202832);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}.tile.belt{background:#28323e}.tile.machine{border-color:#8292a4}.tile.unpowered{filter:grayscale(1);opacity:.55}.tile.blocked{box-shadow:inset 0 0 0 2px var(--red)}.tile .icon{font-size:22px;line-height:1}.tile b{font-size:7px}.tile .dir{position:absolute;right:2px;bottom:0;color:var(--gold);font-size:10px}.tile .progress{position:absolute;left:0;right:0;bottom:0;height:3px;background:#0a0d11}.tile .progress i{display:block;height:100%;background:var(--green)}.item{position:absolute;z-index:4;font-size:15px;left:50%;top:50%;transform:translate(-50%,-50%);filter:drop-shadow(0 2px 2px #000);animation:pop .22s}.count{position:absolute;right:2px;top:1px;z-index:5;background:#091018cc;color:#fff;font-size:8px;padding:1px 3px}.pulse{animation:pulse .35s}@keyframes pop{from{transform:translate(-50%,-50%) scale(.4)}}@keyframes pulse{50%{filter:brightness(1.7)}}.controls{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}.btn{border:1px solid #526275;background:#293543;border-radius:5px;min-height:40px;padding:8px 10px;font-weight:800;cursor:pointer}.btn:hover{filter:brightness(1.13)}.btn:disabled{opacity:.4}.btn.primary{background:var(--gold);border-color:var(--gold);color:#251b00}.btn.active{box-shadow:inset 0 0 0 2px var(--gold)}.message{margin-top:7px;background:#0d1218;border-left:3px solid var(--blue);padding:8px;min-height:40px;color:#d6dee8;font-size:11px;line-height:1.5}.order{background:#111821;border:1px solid #344355;border-radius:5px;padding:9px}.order h3{font-size:13px;margin:0 0 4px}.order p{color:var(--muted);font-size:10px;margin:0}.order strong{color:var(--gold)}.order .bar{height:7px;background:#070a0e;margin-top:7px;overflow:hidden}.order .bar i{display:block;height:100%;background:var(--green)}.recipe{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #303c4a;padding:6px 0;font-size:10px}.recipe:last-child{border:0}.recipe span{white-space:nowrap}.recipe strong{color:var(--green)}.research{display:grid;gap:6px}.tech{text-align:left;background:#222b36;border:1px solid #435365;border-radius:5px;padding:8px;cursor:pointer}.tech:disabled{opacity:.42}.tech b{display:block;font-size:11px}.tech small{color:var(--muted);font-size:9px}.tech em{float:right;color:var(--gold);font-style:normal}.legend{display:flex;gap:8px;flex-wrap:wrap;font-size:9px;color:var(--muted);margin-top:7px}.overlay{position:fixed;inset:0;z-index:20;background:#090d12ed;display:flex;align-items:center;justify-content:center;padding:14px}.overlay.hidden{display:none}.modal{width:min(790px,100%);max-height:92vh;overflow:auto;background:#171d26;border:1px solid #536376;border-radius:8px;padding:17px}.modal h2{font-size:25px;margin:0 0 5px}.modal>p{color:var(--muted);line-height:1.55;margin:0 0 12px}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.choice{text-align:left;min-height:135px;background:#232d39;border:1px solid #4a5c70;border-radius:6px;padding:11px;cursor:pointer}.choice:hover{border-color:var(--gold)}.choice .big{font-size:31px}.choice h3{font-size:14px;margin:6px 0 3px}.choice p{font-size:10px;color:var(--muted);line-height:1.45;margin:0}.savebox{width:100%;height:130px;background:#0c1016;border:1px solid #48586b;color:#fff;padding:9px;resize:vertical}.achievement{display:flex;justify-content:space-between;border-bottom:1px solid #303b48;padding:7px 0;font-size:11px}@media(max-width:980px){.layout{grid-template-columns:240px minmax(0,1fr)}.right{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid{min-height:470px}}@media(max-width:650px){.app{padding:8px}.top{flex-direction:column;align-items:flex-start}.stats{width:100%}.stat{flex:1;min-width:70px}.layout{grid-template-columns:1fr}.palette{order:2}.factory{order:1;padding:6px}.right{order:3;display:flex;flex-direction:column}.tools{grid-template-columns:repeat(4,minmax(0,1fr))}.tool{min-height:65px;padding:5px}.tool span{font-size:19px}.tool b{font-size:8px}.grid{min-height:350px;gap:2px;padding:3px}.tile .icon{font-size:18px}.tile b{font-size:6px}.cell{min-height:42px}.choices{grid-template-columns:1fr}.choice{min-height:105px}.controls{display:grid;grid-template-columns:repeat(3,1fr)}.btn{padding:7px 5px}}
</style></head><body><main class="app"><header class="top"><div><h1>微型流水线：工业纪元</h1><div class="sub">从矿脉到无人机：解决物流瓶颈，升级配方层级，完成八阶段工业蓝图。</div></div><div class="stats"><div class="stat"><small>资金</small><b id="coins">120</b></div><div class="stat"><small>电力</small><b id="power">0 / 20</b></div><div class="stat"><small>科研</small><b id="science">0</b></div><div class="stat"><small>阶段</small><b id="stage">1 / 8</b></div></div></header><section class="layout"><aside class="panel section palette"><h2>建造工具</h2><div class="tools" id="tools"></div><div class="controls"><button class="btn" id="rotateBtn">旋转方向</button><button class="btn" id="recipeBtn">切换配方</button></div><div class="legend"><span>⛰️ 铁矿</span><span>🟠 铜矿</span><span>红框 = 堵塞</span></div></aside><section class="panel factory"><div class="factory-head"><b>第七号工区 · <span id="toolName">传送带</span></b><small id="tickText">生产暂停</small></div><div class="grid" id="grid"></div><div class="controls"><button class="btn primary" id="runBtn">启动产线</button><button class="btn" id="speedBtn">速度 x1</button><button class="btn" id="saveBtn">存档码</button><button class="btn" id="newBtn">重置工区</button></div><div class="message" id="message">先在矿脉上建采矿机，再用传送带接入熔炉与交付仓。</div></section><aside class="right"><section class="panel section"><h2>当前工业订单</h2><div id="order"></div></section><section class="panel section"><h2>生产配方</h2><div id="recipes"></div></section><section class="panel section"><h2>技术研究</h2><div class="research" id="research"></div></section></aside></section></main><div class="overlay hidden" id="choiceOverlay"><section class="modal"><h2 id="choiceTitle">工业里程碑</h2><p id="choiceHelp"></p><div class="choices" id="choices"></div></section></div><div class="overlay hidden" id="infoOverlay"><section class="modal"><h2 id="infoTitle">工厂档案</h2><div id="infoBody"></div><div class="controls"><button class="btn primary" id="closeInfoBtn">返回工区</button></div></section></div>
<script>
(()=>{"use strict";const $=id=>document.getElementById(id),SAVE='tinyFactoryV3',COLS=8,ROWS=8,DIRS=[[1,0],[0,1],[-1,0],[0,-1]],ARROWS=['→','↓','←','↑'];
const ITEMS={ore:{n:'铁矿',i:'⬛'},copper:{n:'铜矿',i:'🟠'},plate:{n:'铁板',i:'▰'},cplate:{n:'铜板',i:'🟧'},gear:{n:'齿轮',i:'⚙️'},circuit:{n:'电路',i:'🟩'},engine:{n:'引擎',i:'🔧'},drone:{n:'无人机',i:'🚁'}};
const TILES={belt:{n:'传送带',i:'➡️',cost:1,power:0,kind:'belt',d:'沿箭头输送物料'},miner:{n:'采矿机',i:'⛏️',cost:10,power:2,kind:'machine',d:'必须建在矿脉上'},furnace:{n:'电弧熔炉',i:'🔥',cost:15,power:3,kind:'machine',d:'矿石冶炼为板材'},press:{n:'精密冲压机',i:'⚙️',cost:22,power:4,kind:'machine',d:'生产齿轮或电路'},assembler:{n:'复合组装机',i:'🏭',cost:35,power:6,kind:'machine',d:'生产引擎或无人机',tech:'assembly'},lab:{n:'分析实验室',i:'🔬',cost:28,power:5,kind:'machine',d:'消耗电路产生科研',tech:'lab'},splitter:{n:'智能分流器',i:'🔀',cost:8,power:1,kind:'belt',d:'交替向前与侧面输出',tech:'splitter'},storage:{n:'缓冲仓',i:'📦',cost:12,power:0,kind:'machine',d:'最多缓存 12 件物料'},seller:{n:'交付仓',i:'🚚',cost:15,power:1,kind:'machine',d:'交付物料并获取资金'},generator:{n:'增容电站',i:'⚡',cost:30,power:-15,kind:'machine',d:'提供 15 点电力'},erase:{n:'拆除',i:'🧹',cost:0,power:0,kind:'tool',d:'拆除设备返还 50%'}};
const RECIPES={furnace:[{id:'plate',in:{ore:1},out:'plate',time:3},{id:'cplate',in:{copper:1},out:'cplate',time:3}],press:[{id:'gear',in:{plate:2},out:'gear',time:4},{id:'circuit',in:{plate:1,cplate:1},out:'circuit',time:5}],assembler:[{id:'engine',in:{gear:2,circuit:1},out:'engine',time:6},{id:'drone',in:{engine:1,circuit:2},out:'drone',time:8}],lab:[{id:'science',in:{circuit:1},out:'science',time:5}]};
const ORDERS=[{item:'plate',need:10,reward:80,n:'基础冶炼'},{item:'cplate',need:10,reward:100,n:'双矿协作'},{item:'gear',need:8,reward:150,n:'机械传动'},{item:'circuit',need:7,reward:180,n:'电气时代'},{item:'engine',need:5,reward:240,n:'动力核心'},{item:'science',need:8,reward:260,n:'研究协议'},{item:'drone',need:4,reward:380,n:'自动物流'},{item:'drone',need:12,reward:800,n:'工业纪元'}];
const TECHS={splitter:{n:'智能分流',cost:6,d:'解锁智能分流器'},assembly:{n:'复合组装',cost:10,d:'解锁复合组装机'},lab:{n:'分析科学',cost:4,d:'解锁实验室'},efficiency:{n:'节能电机',cost:14,d:'所有耗电降低 20%'},logistics:{n:'高速物流',cost:18,d:'传送带每轮可额外尝试一次'},overclock:{n:'精密超频',cost:24,d:'所有机器加工时间 -1'}};
const SOURCES={0:'ore',16:'ore',47:'copper',63:'copper'};let q={v:3,coins:120,science:0,stage:0,tiles:Array(64).fill(null),delivered:{},tech:[],running:false,speed:1,tick:0,recipeChoice:{furnace:0,press:0,assembler:0},stats:{built:0,moved:0,orders:0,best:0}},tool='belt',dir=0,timer=null;
function save(){localStorage.setItem(SAVE,JSON.stringify(q))}function load(){try{const x=JSON.parse(localStorage.getItem(SAVE));if(x?.v===3)q={...q,...x,stats:{...q.stats,...x.stats}}}catch{}q.tiles=q.tiles.map(t=>t?{buffer:[],out:[],progress:0,...t}:null)}
function checksum(s){let h=1779033703;for(const ch of s)h=Math.imul(h^ch.charCodeAt(0),3432918353);return(h>>>0).toString(36)}function exportCode(){const clean={...q,running:false};const b=btoa(unescape(encodeURIComponent(JSON.stringify(clean))));return`TF3-${b}-${checksum(b)}`}function importCode(x){const m=x.trim().match(/^TF3-(.+)-([a-z0-9]+)$/i);if(!m||checksum(m[1])!==m[2])throw Error('存档码校验失败');const d=JSON.parse(decodeURIComponent(escape(atob(m[1]))));if(d.v!==3)throw Error('版本不兼容');stop();q=d;draw();save()}
function next(i,d=dir){const r=Math.floor(i/COLS),c=i%COLS,[dx,dy]=DIRS[d],rr=r+dy,cc=c+dx;return rr>=0&&rr<ROWS&&cc>=0&&cc<COLS?rr*COLS+cc:-1}function power(){let use=0,cap=20;q.tiles.forEach(t=>{if(!t)return;if(t.type==='generator')cap+=15;else use+=Math.max(0,TILES[t.type].power)*(q.tech.includes('efficiency')?.8:1)});return{use:Math.ceil(use),cap}}
function build(i){if(tool==='erase'){const t=q.tiles[i];if(!t)return;q.coins+=Math.floor(TILES[t.type].cost*.5);q.tiles[i]=null;message(`拆除 ${TILES[t.type].n}`);draw();return}const d=TILES[tool];if(d.tech&&!q.tech.includes(d.tech))return message('该设备尚未研究');if(q.tiles[i])return message('这里已有设备');if(tool==='miner'&&!SOURCES[i])return message('采矿机必须建在矿脉上');if(tool!=='miner'&&SOURCES[i])return message('矿脉格只允许建造采矿机');if(q.coins<d.cost)return message('资金不足');q.coins-=d.cost;q.tiles[i]={type:tool,dir,recipe:RECIPES[tool]?q.recipeChoice[tool]||0:0,buffer:[],out:[],progress:0,alt:0,blocked:false};q.stats.built++;message(`建造 ${d.n}`);draw();save()}
function accepts(tile,item){if(!tile||tile.type==='generator')return false;const cap=tile.type==='storage'?12:tile.type==='belt'||tile.type==='splitter'?2:6;if(tile.buffer.length>=cap)return false;if(tile.type==='miner')return false;if(tile.type==='furnace'&&!['ore','copper'].includes(item))return false;if(tile.type==='press'&&!['plate','cplate'].includes(item))return false;if(tile.type==='assembler'&&!['gear','circuit','engine'].includes(item))return false;if(tile.type==='lab'&&item!=='circuit')return false;return true}
function hasInputs(buffer,inputs){return Object.entries(inputs).every(([id,n])=>buffer.filter(x=>x===id).length>=n)}function consume(buffer,inputs){for(const[id,n]of Object.entries(inputs))for(let k=0;k<n;k++)buffer.splice(buffer.indexOf(id),1)}
function processTile(t,i,powered){t.blocked=false;if(t.type==='miner'){if(!powered)return;t.progress++;if(t.progress>=3){if(t.out.length<2){t.out.push(SOURCES[i]);t.progress=0}else t.blocked=true}}else if(RECIPES[t.type]){if(!powered)return;const r=RECIPES[t.type][t.recipe||0];if(!r)return;if(t.progress<=0&&hasInputs(t.buffer,r.in)){consume(t.buffer,r.in);t.progress=1}else if(t.progress>0){t.progress++;const time=Math.max(2,r.time-(q.tech.includes('overclock')?1:0));if(t.progress>time){if(r.out==='science'){q.science++;t.progress=0}else if(t.out.length<3){t.out.push(r.out);t.progress=0}else t.blocked=true}}}else if(t.type==='seller'){while(t.buffer.length){const id=t.buffer.shift(),value={ore:1,copper:1,plate:3,cplate:4,gear:8,circuit:11,engine:25,drone:60}[id]||0;q.coins+=value;q.delivered[id]=(q.delivered[id]||0)+1}}}
function moveOutput(t,i){let item=t.out[0]??((t.type==='belt'||t.type==='splitter'||t.type==='storage')?t.buffer[0]:null);if(!item)return;let d=t.dir;if(t.type==='splitter'){d=(t.alt++%2)?(t.dir+1)%4:t.dir}const j=next(i,d),target=q.tiles[j];if(j>=0&&accepts(target,item)){if(t.out[0]!=null)t.out.shift();else t.buffer.shift();target.buffer.push(item);q.stats.moved++;return true}t.blocked=true;return false}
function tick(){const p=power(),powered=p.use<=p.cap;q.tick++;q.tiles.forEach((t,i)=>{if(t)processTile(t,i,powered||t.type==='generator')});const indexes=Array.from({length:64},(_,i)=>i).sort(()=>Math.random()-.5);indexes.forEach(i=>{const t=q.tiles[i];if(t)moveOutput(t,i)});if(q.tech.includes('logistics'))indexes.forEach(i=>{const t=q.tiles[i];if(t&&(t.type==='belt'||t.type==='splitter'))moveOutput(t,i)});checkOrder();draw();save()}
function checkOrder(){const o=ORDERS[q.stage];if(!o)return;const have=q.delivered[o.item]||0;if(have<o.need)return;q.delivered[o.item]-=o.need;q.coins+=o.reward;q.science+=2+Math.floor(q.stage/2);q.stage++;q.stats.orders++;q.stats.best=Math.max(q.stats.best,q.stage);message(`订单完成：${o.n}，获得 ${o.reward} 资金与科研点`);if(q.stage===3&&!q.tech.includes('splitter'))showMilestone();if(q.stage>=ORDERS.length){stop();showVictory()}}
function start(){if(q.running)return stop();q.running=true;$('runBtn').textContent='暂停产线';timer=setInterval(tick,700/q.speed);draw()}function stop(){q.running=false;clearInterval(timer);timer=null;$('runBtn').textContent='启动产线';draw()}
function setSpeed(){q.speed=q.speed===1?2:q.speed===2?4:1;if(q.running){clearInterval(timer);timer=setInterval(tick,700/q.speed)}$('speedBtn').textContent=`速度 x${q.speed}`}
function research(id){const t=TECHS[id];if(q.tech.includes(id))return;if(q.science<t.cost)return message('科研点不足');q.science-=t.cost;q.tech.push(id);message(`研究完成：${t.n}`);draw();save()}
function message(s){$('message').textContent=s}
function showMilestone(){const perks=[{i:'⚡',n:'高压接入',d:'电力容量永久 +15（赠送一座电站资金）',f:()=>q.coins+=30},{i:'📦',n:'物流补贴',d:'获得 100 资金用于扩建',f:()=>q.coins+=100},{i:'🔬',n:'研究拨款',d:'立即获得 10 科研点',f:()=>q.science+=10}];$('choiceTitle').textContent='工业里程碑';$('choiceHelp').textContent='齿轮订单证明了工区价值，董事会批准一项扩建方案。';$('choices').innerHTML=perks.map((p,i)=>`<button class="choice" data-perk="${i}"><span class="big">${p.i}</span><h3>${p.n}</h3><p>${p.d}</p></button>`).join('');$('choiceOverlay').classList.remove('hidden');document.querySelectorAll('[data-perk]').forEach(b=>b.onclick=()=>{perks[+b.dataset.perk].f();$('choiceOverlay').classList.add('hidden');draw();save()})}
function renderTile(t,i){const d=TILES[t.type],p=power(),powered=t.type==='generator'||p.use<=p.cap,el=document.createElement('div');el.className=`tile ${d.kind==='belt'?'belt':'machine'} ${powered?'':'unpowered'} ${t.blocked?'blocked':''}`;const item=t.out[0]||t.buffer[0],rec=RECIPES[t.type]?.[t.recipe||0];el.innerHTML=`<span class="icon">${d.i}</span><b>${rec?ITEMS[rec.out]?.n||'科研':d.n}</b>${['belt','splitter','miner','furnace','press','assembler','lab','storage'].includes(t.type)?`<span class="dir">${ARROWS[t.dir]}</span>`:''}${t.progress?`<span class="progress"><i style="width:${Math.min(100,t.progress/(rec?.time||3)*100)}%"></i></span>`:''}${item?`<span class="item">${ITEMS[item]?.i||'🔹'}</span><span class="count">${t.buffer.length+t.out.length}</span>`:''}`;el.onclick=e=>{e.stopPropagation();if(RECIPES[t.type]){t.recipe=(t.recipe+1)%RECIPES[t.type].length;message(`${d.n}切换为 ${ITEMS[RECIPES[t.type][t.recipe].out]?.n||'科研'} 配方`);draw()}};return el}
function draw(){const p=power();$('coins').textContent=q.coins;$('science').textContent=q.science;$('power').textContent=`${p.use} / ${p.cap}`;$('power').style.color=p.use>p.cap?'var(--red)':'var(--gold)';$('stage').textContent=`${Math.min(q.stage+1,8)} / 8`;$('tickText').textContent=q.running?`产线运行 · 第${q.tick}拍`:'生产暂停';$('toolName').textContent=TILES[tool].n;const grid=$('grid');grid.innerHTML='';for(let i=0;i<64;i++){const c=document.createElement('div');c.className=`cell ${SOURCES[i]?`source-${SOURCES[i]}`:''}`;if(SOURCES[i])c.innerHTML=`<span class="node">${ITEMS[SOURCES[i]].i}</span>`;c.onclick=()=>build(i);if(q.tiles[i])c.append(renderTile(q.tiles[i],i));grid.append(c)}$('tools').innerHTML=Object.entries(TILES).map(([id,d])=>`<button class="tool ${tool===id?'active':''}" data-tool="${id}" ${d.tech&&!q.tech.includes(d.tech)?'disabled':''}><em>${d.cost}</em><span>${d.i}</span><b>${d.n}</b><small>${d.d}</small></button>`).join('');document.querySelectorAll('[data-tool]').forEach(b=>b.onclick=()=>{tool=b.dataset.tool;draw()});const o=ORDERS[q.stage];$('order').innerHTML=o?`<div class="order"><h3>${o.n}</h3><p>交付 ${ITEMS[o.item]?.i||'🔬'} ${ITEMS[o.item]?.n||'科研点'} ${o.need} 件</p><strong>${q.delivered[o.item]||0} / ${o.need} · 奖励 ${o.reward}</strong><div class="bar"><i style="width:${Math.min(100,(q.delivered[o.item]||0)/o.need*100)}%"></i></div></div>`:'<div class="order"><h3>工业纪元完成</h3><p>全部蓝图已经验证。</p></div>';$('recipes').innerHTML=[['🔥','铁矿 → 铁板'],['🔥','铜矿 → 铜板'],['⚙️','铁板×2 → 齿轮'],['⚙️','铁板+铜板 → 电路'],['🏭','齿轮×2+电路 → 引擎'],['🏭','引擎+电路×2 → 无人机']].map(x=>`<div class="recipe"><span>${x[0]} ${x[1]}</span><strong>自动</strong></div>`).join('');$('research').innerHTML=Object.entries(TECHS).map(([id,t])=>`<button class="tech" data-tech="${id}" ${q.tech.includes(id)?'disabled':''}><em>${q.tech.includes(id)?'已完成':t.cost+'科研'}</em><b>${t.n}</b><small>${t.d}</small></button>`).join('');document.querySelectorAll('[data-tech]').forEach(b=>b.onclick=()=>research(b.dataset.tech));$('rotateBtn').textContent=`旋转 ${ARROWS[dir]}`;$('speedBtn').textContent=`速度 x${q.speed}`;$('runBtn').textContent=q.running?'暂停产线':'启动产线';save()}
function showSave(){const code=exportCode();$('infoTitle').textContent='跨设备工厂档案';$('infoBody').innerHTML=`<p>工区布局、设备缓存、科研、订单和统计都会导出，并带完整性校验。</p><textarea class="savebox" id="saveCode">${code}</textarea><div class="controls"><button class="btn" id="copyCode">复制导出</button><button class="btn" id="importCodeBtn">导入上方存档</button></div><div class="achievement"><span>已完成订单</span><strong>${q.stats.orders}</strong></div><div class="achievement"><span>累计物流移动</span><strong>${q.stats.moved}</strong></div>`;$('infoOverlay').classList.remove('hidden');$('copyCode').onclick=()=>navigator.clipboard?.writeText($('saveCode').value);$('importCodeBtn').onclick=()=>{try{importCode($('saveCode').value);$('infoOverlay').classList.add('hidden');alert('导入成功')}catch(e){alert(e.message)}}}
function showVictory(){$('infoTitle').textContent='工业纪元';$('infoBody').innerHTML=`<h3>第一架量产无人机离开交付仓。</h3><p>八阶段蓝图全部完成。工区现在进入无限生产，可以继续优化吞吐量、研究全部技术并挑战更紧凑布局。</p>`;$('infoOverlay').classList.remove('hidden')}
$('rotateBtn').onclick=()=>{dir=(dir+1)%4;draw()};$('recipeBtn').onclick=()=>{if(['furnace','press','assembler'].includes(tool)){q.recipeChoice[tool]=(q.recipeChoice[tool]+1)%RECIPES[tool].length;message(`新建${TILES[tool].n}将使用${ITEMS[RECIPES[tool][q.recipeChoice[tool]].out].n}配方`)}else message('选择熔炉、冲压机或组装机后可切换默认配方');draw()};$('runBtn').onclick=start;$('speedBtn').onclick=setSpeed;$('saveBtn').onclick=showSave;$('closeInfoBtn').onclick=()=>$('infoOverlay').classList.add('hidden');$('newBtn').onclick=()=>{if(confirm('清空当前工区并重新开始？')){stop();localStorage.removeItem(SAVE);location.reload()}};
load();draw();if(q.running){q.running=false;start()}
})();
</script></body></html>
