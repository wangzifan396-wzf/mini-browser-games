  let profile=load(),chapterIndex=Math.min(profile.unlocked,5),state=makeState(),pendingCode=null;
  function load(){try{const p=JSON.parse(localStorage.getItem(STORAGE)||"null");if(p?.v===2&&Array.isArray(p.stars))return normalize(p)}catch{}return emptyProfile()}
  function normalize(p){return{v:2,unlocked:Math.max(0,Math.min(5,+p.unlocked||0)),stars:Array.from({length:6},(_,i)=>Math.max(0,Math.min(3,+p.stars?.[i]||0))),bestMoves:Array.from({length:6},(_,i)=>Math.max(0,+p.bestMoves?.[i]||0)),clears:Math.max(0,+p.clears||0)}}
  function save(){localStorage.setItem(STORAGE,JSON.stringify(profile))}
  function makeState(){return{flags:{},items:[],usedItems:{},steps:0,hints:0,done:false,message:"调查场景中的物件，机关链会留下可复核的线索。",logs:["[START] 进入"+CHAPTERS[chapterIndex].label]}}
  function chapter(){return CHAPTERS[chapterIndex]}
  function addLog(text){state.logs.unshift(text);state.logs=state.logs.slice(0,30)}
  function give(item){if(!item||state.items.some(entry=>entry.id===item[0]))return;state.items.push({id:item[0],name:item[1],icon:item[2]});addLog(`[ITEM] 获得 ${item[1]}`)}
  function requirementsMet(list=[]){return list.every(flag=>state.flags[flag])}
  function getAction(target,itemId){return chapter().actions.find(action=>action.target===target&&(action.item||null)===(itemId||null)&&!state.flags[action.flag])}
  function openCode(target){const lock=chapter().codes.find(code=>code.target===target&&!state.flags[code.flag]);if(!lock)return false;if(!requirementsMet(lock.requires)){state.message="当前线索还不足以操作这道密码机关。";addLog(`[BLOCK] ${target} 缺少前置线索`);renderAll();return true}pendingCode=lock;els.codeTitle.textContent=lock.title;els.codeClue.textContent=lock.clue;els.codeInput.value="";els.codeModal.classList.remove("hidden");setTimeout(()=>els.codeInput.focus(),0);return true}
  function inspect(target,itemId=null,testing=false){if(state.done)return{ok:false,reason:"done"};const selected=itemId||document.querySelector(".item.selected")?.dataset.id||null;if(!selected&&openCode(target))return{ok:true,mode:"code"};const action=getAction(target,selected);state.steps++;
    if(!action){state.message=selected?`“${state.items.find(i=>i.id===selected)?.name||selected}”不能这样用于此处。`:"这里暂时没有新的发现。";addLog(`[MISS] ${selected?selected+" → ":"调查 "}${target}`);if(!testing)renderAll();return{ok:false,reason:"no action"}}
    if(!requirementsMet(action.requires)){state.message="还缺少前置机关或线索。";addLog(`[BLOCK] ${target}`);if(!testing)renderAll();return{ok:false,reason:"requirements"}}
    state.flags[action.flag]=true;if(selected)state.usedItems[selected]=true;give(action.give);state.message=action.message;addLog(`[OK] ${action.message}`);if(action.finish)finish(testing);if(!testing)renderAll();return{ok:true,flag:action.flag}}
  function submitCode(value,testing=false){const lock=pendingCode;if(!lock)return{ok:false,reason:"no code"};state.steps++;if(String(value)!==lock.code){state.message="密码没有通过，机关退回初始位置。";addLog(`[CODE] ${lock.title} 输入错误`);if(!testing){els.codeModal.classList.add("hidden");renderAll()}pendingCode=null;return{ok:false,reason:"wrong"}}
    state.flags[lock.flag]=true;give(lock.give);state.message=lock.message;addLog(`[CODE] ${lock.message}`);pendingCode=null;if(!testing){els.codeModal.classList.add("hidden");renderAll()}return{ok:true,flag:lock.flag}}
  function finish(testing=false){if(state.done)return state.stars||0;state.done=true;const stars=1+(state.steps<=chapter().par?1:0)+(state.hints===0?1:0);state.stars=stars;if(!testing){profile.stars[chapterIndex]=Math.max(profile.stars[chapterIndex],stars);profile.bestMoves[chapterIndex]=profile.bestMoves[chapterIndex]?Math.min(profile.bestMoves[chapterIndex],state.steps):state.steps;profile.unlocked=Math.max(profile.unlocked,Math.min(5,chapterIndex+1));profile.clears++;save()}state.message+=` 本章评价：${"★".repeat(stars)}${"☆".repeat(3-stars)}。`;addLog(`[CLEAR] ${state.steps} 步，${stars} 星`);return stars}
  function selectChapter(index){if(index<0||index>profile.unlocked||index>=CHAPTERS.length)return false;chapterIndex=index;state=makeState();pendingCode=null;renderAll();return true}
  function commandFlag(command){if(command[0]==="inspect")return chapter().actions.find(action=>action.target===command[1]&&!action.item)?.flag;if(command[0]==="use")return chapter().actions.find(action=>action.target===command[2]&&action.item===command[1])?.flag;if(command[0]==="code")return chapter().codes.find(code=>code.target===command[1])?.flag;return null}
  function hint(){if(state.done)return;state.hints++;const next=chapter().reference.find(command=>!state.flags[commandFlag(command)]);state.message=next?next[0]==="inspect"?`提示：调查“${objectName(next[1])}”。`:next[0]==="use"?`提示：把“${itemName(next[1])}”用于“${objectName(next[2])}”。`:`提示：检查“${objectName(next[1])}”的密码线索。`:"所有机关已经完成。";addLog(`[HINT] ${state.message}`);renderAll()}
  function objectName(id){return chapter().objects.find(item=>item[0]===id)?.[1]||id}function itemName(id){return state.items.find(item=>item.id===id)?.name||chapter().actions.find(action=>action.give?.[0]===id)?.give[1]||chapter().codes.find(code=>code.give?.[0]===id)?.give[1]||id}
  function applyReference(index=chapterIndex){const oldIndex=chapterIndex;chapterIndex=index;state=makeState();pendingCode=null;for(const command of chapter().reference){let result;if(command[0]==="inspect")result=inspect(command[1],null,true);else if(command[0]==="use")result=inspect(command[2],command[1],true);else{pendingCode=chapter().codes.find(code=>code.target===command[1]&&!state.flags[code.flag]);result=pendingCode&&requirementsMet(pendingCode.requires)?submitCode(command[2],true):{ok:false,reason:"requirements"}}if(!result.ok){const failure={ok:false,command,reason:result.reason};chapterIndex=oldIndex;return failure}}const result={ok:state.done,stars:state.stars,steps:state.steps,flags:{...state.flags}};if(oldIndex!==index)chapterIndex=oldIndex;return result}
  function validateContent(){const errors=[];const ids=new Set();for(const [index,item] of CHAPTERS.entries()){if(ids.has(item.id))errors.push(`duplicate chapter ${item.id}`);ids.add(item.id);const objects=new Set(item.objects.map(object=>object[0]));if(item.objects.length<6)errors.push(`objects ${index}`);for(const action of item.actions)if(!objects.has(action.target))errors.push(`target ${action.target}`);for(const lock of item.codes)if(!objects.has(lock.target)||!/^\d{4,6}$/.test(lock.code))errors.push(`code ${index}`);const reference=applyReference(index);if(!reference.ok||reference.stars!==3)errors.push(`reference ${index}`)}chapterIndex=Math.min(profile.unlocked,5);state=makeState();return{valid:errors.length===0,errors,chapters:CHAPTERS.length,objects:CHAPTERS.reduce((sum,item)=>sum+item.objects.length,0),actions:CHAPTERS.reduce((sum,item)=>sum+item.actions.length+item.codes.length,0),references:CHAPTERS.length}}
  function checksum(text){let hash=2166136261;for(let i=0;i<text.length;i++){hash^=text.charCodeAt(i);hash=Math.imul(hash,16777619)}return(hash>>>0).toString(36)}
  function encode(){const payload=btoa(unescape(encodeURIComponent(JSON.stringify({v:2,u:profile.unlocked,s:profile.stars,b:profile.bestMoves,c:profile.clears}))));return`ESCAPE2.${payload}.${checksum(payload)}`}
  function decode(code){const parts=code.trim().split(".");if(parts.length!==3||parts[0]!=="ESCAPE2"||checksum(parts[1])!==parts[2])throw Error("密室档案校验失败");const value=JSON.parse(decodeURIComponent(escape(atob(parts[1]))));if(value.v!==2)throw Error("密室档案版本不兼容");return normalize({v:2,unlocked:value.u,stars:value.s,bestMoves:value.b,clears:value.c})}
  function renderScene(){const item=chapter();els.scene.style.setProperty("--scene-a",item.colors[0]);els.scene.style.setProperty("--scene-b",item.colors[1]);els.scene.querySelectorAll(".object").forEach(node=>node.remove());for(const object of item.objects){const [id,name,icon,x,y]=object;const button=document.createElement("button");button.className="object"+(Object.values(state.flags).length&&[...item.actions,...item.codes].some(action=>action.target===id&&state.flags[action.flag])?" done":"");button.dataset.object=id;button.style.left=`clamp(48px,${x}%,calc(100% - 48px))`;button.style.top=`clamp(42px,${y}%,calc(100% - 42px))`;button.innerHTML=`<span class="icon">${icon}</span>${name}`;button.onclick=()=>inspect(id);els.scene.appendChild(button)}}
  function renderAll(){const item=chapter();els.chapterTitle.textContent=item.title;els.chapterText.textContent=item.text;els.sceneLabel.textContent=item.label;els.stepText.textContent=state.steps;const completed=[...item.actions,...item.codes].filter(action=>state.flags[action.flag]).length;els.clueText.textContent=`${completed}/${item.actions.length+item.codes.length}`;els.hintText.textContent=state.hints;els.dialog.textContent=state.message;renderScene();els.inventory.innerHTML=state.items.length?state.items.map(entry=>`<button class="item ${state.usedItems[entry.id]?"used":""}" data-id="${entry.id}">${entry.icon} ${entry.name}</button>`).join(""):"<span class='subtitle'>道具栏为空，先调查场景。</span>";els.inventory.querySelectorAll(".item").forEach(button=>button.onclick=()=>{const was=button.classList.contains("selected");els.inventory.querySelectorAll(".item").forEach(node=>node.classList.remove("selected"));if(!was)button.classList.add("selected")});els.chapters.innerHTML=CHAPTERS.map((entry,index)=>`<button class="chapter ${index===chapterIndex?"active":""}" data-chapter="${index}" ${index>profile.unlocked?"disabled":""}><b>${entry.title}</b><small>${profile.stars[index]?"★".repeat(profile.stars[index]):index<=profile.unlocked?"待破解":"未解锁"}</small></button>`).join("");els.chapters.querySelectorAll("[data-chapter]").forEach(button=>button.onclick=()=>selectChapter(+button.dataset.chapter));els.rules.innerHTML=[...item.actions,...item.codes].map(action=>`<div class="rule ${state.flags[action.flag]?"ok":""}">${state.flags[action.flag]?"✓":"○"} ${action.finish?"打开出口":action.message}</div>`).join("");els.log.innerHTML=state.logs.map(line=>`<div>• ${line}</div>`).join("");els.careerStars.textContent=profile.stars.reduce((sum,value)=>sum+value,0);els.careerClears.textContent=profile.clears;els.careerBest.textContent=profile.bestMoves[chapterIndex]||"--"}
  $("hintBtn").onclick=hint;$("cancelBtn").onclick=()=>{els.inventory.querySelectorAll(".item").forEach(node=>node.classList.remove("selected"));state.message="已取消道具选择。";renderAll()};$("restartBtn").onclick=()=>{state=makeState();pendingCode=null;renderAll()};$("codeConfirm").onclick=()=>submitCode(els.codeInput.value);$("codeCancel").onclick=()=>{pendingCode=null;els.codeModal.classList.add("hidden")};els.codeInput.addEventListener("keydown",event=>{if(event.key==="Enter")submitCode(els.codeInput.value)});$("archiveBtn").onclick=()=>{els.archive.classList.remove("hidden");els.archiveText.value=encode();els.archiveFeedback.textContent=""};$("closeArchiveBtn").onclick=()=>els.archive.classList.add("hidden");$("exportBtn").onclick=async()=>{els.archiveText.value=encode();els.archiveText.select();try{await navigator.clipboard.writeText(els.archiveText.value);els.archiveFeedback.textContent="密室档案已复制。"}catch{els.archiveFeedback.textContent="档案已生成，请手动复制。"}};$("importBtn").onclick=()=>{try{profile=decode(els.archiveText.value);save();chapterIndex=Math.min(profile.unlocked,5);state=makeState();renderAll();els.archiveFeedback.textContent="导入成功。"}catch(error){els.archiveFeedback.textContent=error.message}};
  window.__clockworkEscape={CHAPTERS,profile:()=>profile,state:()=>state,selectChapter,inspect,submitCode,hint,applyReference,validateContent,encode,decode,renderAll};renderAll();
})();
</script>
