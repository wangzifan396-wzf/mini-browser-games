<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>口袋地铁：城市脉络</title><style>
:root{--paper:#f3f0e8;--panel:#fffdf7;--ink:#25262a;--muted:#6d706f;--line:#aaa99f;--red:#d94149;--blue:#3478cd;--yellow:#d69a1c;--green:#3a9259;--purple:#8a58b0;--cyan:#2c9ea8}*{box-sizing:border-box}body{margin:0;background:#dedbd2;color:var(--ink);font-family:Inter,"Microsoft YaHei",system-ui,sans-serif}.app{width:min(1260px,100%);margin:auto;padding:10px}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:2px solid #333;padding-bottom:8px}h1{font-size:clamp(24px,3.8vw,36px);margin:0}.sub{font-size:11px;color:var(--muted);margin-top:3px}.stats{display:flex;gap:6px;flex-wrap:wrap}.stat{min-width:80px;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:6px 9px}.stat small{display:block;font-size:8px;color:var(--muted)}.stat b{font-size:16px}.layout{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:8px;margin-top:8px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:9px}.map-panel{padding:7px;min-width:0}.canvas-wrap{position:relative}canvas{display:block;width:100%;aspect-ratio:16/10;background:#e9f0ed;border:1px solid #9da7a3;border-radius:7px;touch-action:none}.lines,.controls{display:flex;gap:5px;flex-wrap:wrap}.lines{margin-bottom:6px;overflow:auto;padding:2px}.btn,.line-btn{border:1px solid #858783;background:#fff;color:#25262a;border-radius:6px;padding:8px 10px;min-height:38px;font-weight:800;cursor:pointer}.btn:hover,.line-btn:hover{filter:brightness(.95)}.btn:disabled{opacity:.38}.line-btn{border-left:8px solid var(--c)}.line-btn.active{outline:3px solid #222}.btn.primary{background:#222;color:white}.btn.danger{background:#a43e43;color:#fff}.message{margin-top:6px;background:#f0ede3;border-left:4px solid #222;padding:8px;min-height:40px;font-size:10px;line-height:1.5}.side{display:flex;flex-direction:column;gap:7px}.section{padding:9px}.section h2{font-size:14px;margin:0 0 7px}.city-rule{background:#f0ede3;border:1px solid #c5c1b6;border-radius:7px;padding:8px;font-size:10px;line-height:1.5}.resource{display:flex;justify-content:space-between;border-bottom:1px solid #ddd8cc;padding:6px 0;font-size:10px}.station-list{max-height:180px;overflow:auto}.station-row{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:6px;padding:5px;border-bottom:1px solid #e3dfd5;font-size:9px}.station-row span:first-child{font-size:20px}.danger-text{color:#bf323a;font-weight:900}.log{max-height:110px;overflow:auto;font-size:9px;color:#555}.log div{padding:4px 0;border-bottom:1px solid #e2ddd1}.overlay{position:fixed;inset:0;background:#e8e4daf2;z-index:20;display:flex;align-items:center;justify-content:center;padding:12px}.overlay.hidden{display:none}.modal{width:min(920px,100%);max-height:93vh;overflow:auto;background:#fffdf7;border:1px solid #98978f;border-radius:9px;padding:16px}.modal h2{font-size:25px;margin:0 0 4px}.modal>p{font-size:10px;color:var(--muted);line-height:1.55}.cities{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.city{text-align:left;background:#f5f2ea;border:1px solid #aaa99f;border-radius:7px;padding:11px;color:#222;cursor:pointer}.city:disabled{opacity:.35}.city span{font-size:34px}.city h3{margin:5px 0}.city p{font-size:9px;color:#666;line-height:1.5}.best{font-weight:900;color:#3a7950}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.choice{text-align:left;background:#f4f0e7;border:1px solid #aaa99f;border-radius:7px;padding:11px;color:#222;cursor:pointer;min-height:125px}.choice:hover{border-color:#222}.choice span{font-size:34px}.choice h3{margin:5px 0}.choice p{font-size:9px;color:#666;line-height:1.5}.savebox{width:100%;height:125px;background:white;border:1px solid #999;color:#222;padding:8px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:white;border:2px solid #222;padding:8px 13px;z-index:30}@media(max-width:850px){.layout{grid-template-columns:1fr}.side{display:grid;grid-template-columns:1fr 1fr}.side .panel:last-child{grid-column:1/-1}}@media(max-width:560px){.app{padding:5px}.top{flex-direction:column;align-items:flex-start}.stats{width:100%}.stat{flex:1;min-width:65px;padding:5px}.side{display:flex}canvas{aspect-ratio:4/3}.controls .btn{flex:1;padding:6px}.cities,.choices{grid-template-columns:1fr}.line-btn{padding:6px}}
</style></head><body><main class="app"><header class="top"><div><h1>口袋地铁：城市脉络</h1><div class="sub">五座城市、程序化车站、换乘寻路与每周升级；在拥堵压垮网络前完成运输目标。</div></div><div class="stats"><div class="stat"><small>周次</small><b id="week">1 / 8</b></div><div class="stat"><small>运送目标</small><b id="delivered">0 / 160</b></div><div class="stat"><small>运营预算</small><b id="budget">0</b></div><div class="stat"><small>列车</small><b id="trainCount">0 / 0</b></div><div class="stat"><small>最高压力</small><b id="pressure">0%</b></div></div></header><section class="layout"><section class="panel map-panel"><div class="lines" id="lines"></div><div class="canvas-wrap"><canvas id="canvas" width="960" height="600"></canvas></div><div class="controls"><button class="btn" id="undoBtn">撤销末站</button><button class="btn" id="addTrainBtn">增配列车</button><button class="btn" id="removeTrainBtn">回收列车</button><button class="btn" id="hubBtn">改造拥堵枢纽</button><button class="btn primary" id="pauseBtn">暂停</button><button class="btn" id="saveBtn">存档码</button><button class="btn" id="newBtn">城市地图</button></div><div class="message" id="message">选择线路后依次点击车站。首条有效线路会自动分配一辆列车。</div></section><aside class="side"><section class="panel section"><h2 id="cityName">城市规则</h2><div class="city-rule" id="cityRule"></div></section><section class="panel section"><h2>网络资源</h2><div id="resources"></div></section><section class="panel section"><h2>拥堵监测</h2><div class="station-list" id="stationList"></div></section><section class="panel section"><h2>调度记录</h2><div class="log" id="log"></div></section></aside></section></main>
<div class="overlay" id="startOverlay"><section class="modal"><h2>选择运营城市</h2><p>每座城市拥有不同地形、客流和目标。完成运输目标可解锁下一座城市。</p><div class="cities" id="cities"></div></section></div><div class="overlay hidden" id="choiceOverlay"><section class="modal"><h2 id="choiceTitle">每周市政预算</h2><p id="choiceHelp">选择一项网络升级，然后继续运营。</p><div class="choices" id="choices"></div></section></div><div class="overlay hidden" id="infoOverlay"><section class="modal"><h2 id="infoTitle">城市档案</h2><div id="infoBody"></div><div class="controls"><button class="btn primary" id="closeInfoBtn">返回线路图</button></div></section></div>
<script>(()=>{'use strict';const $=id=>document.getElementById(id),cv=$('canvas'),g=cv.getContext('2d'),SAVE='metroWeaverV3',COLORS=['#d94149','#3478cd','#d69a1c','#3a9259','#8a58b0','#2c9ea8'],SHAPES=['●','■','▲','◆','✚','⬟'];
const CITIES=[{n:'澄河湾',i:'🌊',d:'一条大河把城市分成两岸，跨河线段消耗桥梁。',rule:'river',target:160,weeks:8,spawn:2.25,start:7},{n:'群岛环港',i:'🏝️',d:'横纵水道交错，桥梁珍贵但换乘站收益更高。',rule:'island',target:210,weeks:9,spawn:2.0,start:8},{n:'旧城丘陵',i:'⛰️',d:'超长线段必须使用隧道，车站分布更分散。',rule:'hill',target:250,weeks:9,spawn:1.85,start:8},{n:'方格新都',i:'🏙️',d:'车站快速增长，规则简单但客流密度极高。',rule:'rush',target:310,weeks:10,spawn:1.55,start:9},{n:'不夜星城',i:'🌌',d:'六类目的地全部出现，跨河、长距与高客流同时施压。',rule:'final',target:400,weeks:11,spawn:1.35,start:10}];
const UPGRADES=[{id:'line',i:'🖍️',n:'新线路许可',d:'可用线路 +1。'},{id:'train',i:'🚇',n:'新列车',d:'未分配列车 +1。'},{id:'carriage',i:'🚃',n:'加挂车厢',d:'所有列车容量 +2。'},{id:'bridge',i:'🌉',n:'桥梁组件',d:'桥梁库存 +2。'},{id:'tunnel',i:'🚇',n:'隧道组件',d:'隧道库存 +2。'},{id:'speed',i:'⚡',n:'信号提速',d:'列车速度 +12%。'},{id:'station',i:'🏛️',n:'枢纽标准',d:'所有车站容量 +1。'},{id:'budget',i:'💰',n:'运营补贴',d:'立即获得 65 预算。'}];
let profile={unlocked:1,wins:0,best:{}},q=null,last=0,raf,selectedLine=0;const rand=(a,b)=>a+Math.random()*(b-a);
function makeStation(i,state){const rule=CITIES[state.city].rule;let x,y,tries=0;do{x=rand(75,885);y=rand(70,530);if(rule==='island'){x=[rand(80,270),rand(350,590),rand(680,880)][i%3]}if(rule==='hill'&&i%2)x=rand(520,880);tries++}while(tries<80&&state.stations.some(s=>Math.hypot(s.x-x,s.y-y)<85));const maxShape=Math.min(6,4+Math.floor(state.week/3)+(state.city>=4?1:0));return{x,y,shape:i%maxShape,wait:[],over:0,hub:0}}
function fresh(city){const c=CITIES[city],x={v:3,city,week:1,clock:0,delivered:0,budget:120,totalTrains:3,lineCount:3,capacity:6,stationCap:10,bridges:city?2:1,tunnels:city>=2?2:1,speed:1,selected:0,stations:[],lines:Array.from({length:6},()=>[]),lineCars:Array(6).fill(0),cars:[],segments:[],spawn:1.5,paused:false,over:false,won:false,maxPressure:0,logs:['市政线路图启用，第一批乘客正在进站。'],message:'选择线路后依次点击车站。首条有效线路会自动分配一辆列车。'};for(let i=0;i<c.start;i++)x.stations.push(makeStation(i,x));return x}
function save(){localStorage.setItem(SAVE,JSON.stringify({v:3,profile,q}))}function load(){try{const d=JSON.parse(localStorage.getItem(SAVE));if(d?.v===3){profile={...profile,...d.profile,best:{...profile.best,...d.profile.best}};q=d.q}}catch{}}
function checksum(s){let h=5381;for(const ch of s)h=((h<<5)-h+ch.charCodeAt(0))>>>0;return h.toString(36)}function exportCode(){const clean=q?{...q,paused:true}:null,b=btoa(unescape(encodeURIComponent(JSON.stringify({v:3,profile,q:clean}))));return`MW3-${b}-${checksum(b)}`}function importCode(x){const m=x.trim().match(/^MW3-(.+)-([a-z0-9]+)$/i);if(!m||checksum(m[1])!==m[2])throw Error('存档码校验失败');const d=JSON.parse(decodeURIComponent(escape(atob(m[1]))));if(d.v!==3)throw Error('版本不兼容');profile=d.profile;q=d.q;if(q)q.paused=false;save();drawUI()}
function log(s){q.logs.unshift(s);q.logs=q.logs.slice(0,18);q.message=s}function toast(s){const e=document.createElement('div');e.className='toast';e.textContent=s;document.body.append(e);setTimeout(()=>e.remove(),1400)}function usedTrains(){return q.lineCars.reduce((a,b)=>a+b,0)}function stationAt(x,y){return q.stations.findIndex(s=>Math.hypot(s.x-x,s.y-y)<27)}function linesAt(si){return q.lines.map((l,i)=>l.includes(si)?i:-1).filter(i=>i>=0)}function lineHasShape(li,shape){return q.lines[li].some(si=>q.stations[si].shape===shape)}
function bestLine(si,dest){const direct=linesAt(si).find(li=>lineHasShape(li,dest));if(direct!=null)return direct;for(const li of linesAt(si))for(const transfer of q.lines[li]){const other=linesAt(transfer).find(x=>x!==li&&lineHasShape(x,dest));if(other!=null)return li}return null}
function segmentNeed(a,b){const c=CITIES[q.city],dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy);let bridge=0,tunnel=0;if(['river','final'].includes(c.rule)&&((a.x<480&&b.x>480)||(a.x>480&&b.x<480)))bridge=1;if(c.rule==='island'&&((Math.floor(a.x/310)!==Math.floor(b.x/310))||(a.y<300&&b.y>300)||(a.y>300&&b.y<300)))bridge=1;if(['hill','final'].includes(c.rule)&&dist>285)tunnel=1;return{bridge,tunnel,dist,cost:Math.max(4,Math.round(dist/28))}}
function addStationToLine(i){if(q.over)return;const line=q.lines[selectedLine];if(line.at(-1)===i)return;if(line.includes(i)){if(line.length>2&&line[0]===i){line.push(i);log('线路闭合为环线。');syncCars();drawUI()}else toast('线路不能重复经过同一车站');return}if(!line.length){line.push(i);log(`线路 ${selectedLine+1} 设置起点。`);return drawUI()}const a=q.stations[line.at(-1)],b=q.stations[i],need=segmentNeed(a,b);if(q.budget<need.cost)return toast(`新线段需要 ${need.cost} 预算`);if(need.bridge&&!q.bridges)return toast('跨越水道需要桥梁组件');if(need.tunnel&&!q.tunnels)return toast('长距离山段需要隧道组件');q.budget-=need.cost;if(need.bridge)q.bridges--;if(need.tunnel)q.tunnels--;q.segments.push({line:selectedLine,a:line.at(-1),b:i,bridge:need.bridge,tunnel:need.tunnel,cost:need.cost});line.push(i);if(line.length===2&&q.lineCars[selectedLine]===0&&usedTrains()<q.totalTrains){q.lineCars[selectedLine]=1;log(`线路 ${selectedLine+1} 开通并自动配车。`)}else log(`线路 ${selectedLine+1} 延伸至 ${SHAPES[b.shape]} 站。`);syncCars();save();drawUI()}
function syncCars(){const old=q.cars||[],cars=[];q.lines.forEach((line,li)=>{if(line.length<2)return;for(let n=0;n<q.lineCars[li];n++){const prior=old.find(c=>c.line===li&&c.index===n);cars.push(prior&&prior.seg<line.length?prior:{line:li,index:n,seg:0,t:n/Math.max(1,q.lineCars[li])*.7,dir:1,on:[]})}});q.cars=cars}
function spawnPassenger(){const s=q.stations[Math.floor(Math.random()*q.stations.length)],maxShape=Math.min(6,4+Math.floor(q.week/3)+(q.city>=4?1:0));let dest=Math.floor(Math.random()*maxShape);if(dest===s.shape)dest=(dest+1)%maxShape;s.wait.push({dest,transfer:0})}
function arrive(car,si){const s=q.stations[si];let kept=[];for(const p of car.on){if(p.dest===s.shape){q.delivered++;q.budget++;s.over=Math.max(0,s.over-.3)}else{const best=bestLine(si,p.dest);if(best!=null&&best!==car.line&&p.transfer<2){p.transfer++;s.wait.push(p)}else kept.push(p)}}car.on=kept;for(let i=s.wait.length-1;i>=0&&car.on.length<q.capacity;i--){const p=s.wait[i],best=bestLine(si,p.dest);if(best===car.line)car.on.push(...s.wait.splice(i,1))}}
function update(dt){if(!q||q.paused||q.over)return;const city=CITIES[q.city];q.clock+=dt;q.spawn-=dt;if(q.spawn<=0){spawnPassenger();if(city.rule==='rush'&&Math.random()<.35)spawnPassenger();q.spawn=Math.max(.75,city.spawn-q.week*.07)}for(const car of q.cars){const L=q.lines[car.line];if(L.length<2)continue;car.t+=dt*(.32+q.speed*.1);if(car.t>=1){car.t=0;car.seg+=car.dir;if(car.seg>=L.length-1){car.seg=L.length-1;car.dir=-1}else if(car.seg<=0){car.seg=0;car.dir=1}arrive(car,L[car.seg])}}
let max=0;q.stations.forEach(s=>{const cap=q.stationCap+s.hub*5,ratio=s.wait.length/cap;max=Math.max(max,ratio);s.over=ratio>=1?s.over+dt:Math.max(0,s.over-dt*.6);if(s.over>7)return finish(false)});q.maxPressure=Math.max(q.maxPressure,Math.round(max*100));const nextWeek=Math.floor(q.clock/24)+1;if(nextWeek>q.week){q.week=nextWeek;addCityStation();showUpgrade()}if(q.delivered>=city.target)return finish(true);if(q.week>city.weeks+2&&q.delivered<city.target*.6)return finish(false);drawUI()}
function addCityStation(){q.stations.push(makeStation(q.stations.length,q));log(`第 ${q.week} 周：城市新增 ${SHAPES[q.stations.at(-1).shape]} 站。`)}
function showUpgrade(){q.paused=true;const opts=[...UPGRADES].sort(()=>Math.random()-.5).slice(0,3);$('choiceTitle').textContent=`第 ${q.week} 周市政预算`;$('choiceHelp').textContent='城市扩张会增加一座车站。选择一项升级后继续运营。';$('choices').innerHTML=opts.map((o,i)=>`<button class="choice" data-upgrade="${i}"><span>${o.i}</span><h3>${o.n}</h3><p>${o.d}</p></button>`).join('');$('choiceOverlay').classList.remove('hidden');document.querySelectorAll('[data-upgrade]').forEach(b=>b.onclick=()=>{applyUpgrade(opts[+b.dataset.upgrade].id);$('choiceOverlay').classList.add('hidden');q.paused=false;drawUI()})}
function applyUpgrade(id){if(id==='line')q.lineCount=Math.min(6,q.lineCount+1);if(id==='train')q.totalTrains++;if(id==='carriage')q.capacity+=2;if(id==='bridge')q.bridges+=2;if(id==='tunnel')q.tunnels+=2;if(id==='speed')q.speed+=.12;if(id==='station')q.stationCap++;if(id==='budget')q.budget+=65;log(`市政升级：${UPGRADES.find(x=>x.id===id).n}`);save()}
function addTrain(){if(q.lines[selectedLine].length<2)return toast('当前线路至少需要两个车站');if(usedTrains()>=q.totalTrains)return toast('没有未分配列车，等待每周升级');q.lineCars[selectedLine]++;syncCars();log(`线路 ${selectedLine+1} 增配一辆列车。`);drawUI()}
function removeTrain(){if(q.lineCars[selectedLine]<=0)return;q.lineCars[selectedLine]--;syncCars();log(`线路 ${selectedLine+1} 回收一辆列车。`);drawUI()}
function undo(){const L=q.lines[selectedLine];if(!L.length)return;const removed=L.pop(),segIndex=[...q.segments].reverse().findIndex(s=>s.line===selectedLine&&(s.b===removed||s.a===removed));if(segIndex>=0){const i=q.segments.length-1-segIndex,s=q.segments[i];q.budget+=Math.floor(s.cost*.5);if(s.bridge)q.bridges++;if(s.tunnel)q.tunnels++;q.segments.splice(i,1)}if(L.length<2)q.lineCars[selectedLine]=0;syncCars();log(`撤销线路 ${selectedLine+1} 的末站。`);drawUI()}
function makeHub(){const s=[...q.stations].sort((a,b)=>b.wait.length-a.wait.length)[0];if(!s)return;if(q.budget<45)return toast('枢纽改造需要 45 预算');q.budget-=45;s.hub++;s.over=0;log(`最拥堵车站完成枢纽改造，容量 +5。`);drawUI()}
function finish(win){if(q.over)return;q.over=true;q.paused=true;q.won=win;const city=CITIES[q.city];if(win){const score=Math.max(1,3-(q.maxPressure>130?1:0)-(q.week>city.weeks?1:0));profile.wins++;profile.unlocked=Math.max(profile.unlocked,Math.min(CITIES.length,q.city+2));profile.best[q.city]=Math.max(profile.best[q.city]||0,score)}save();$('infoTitle').textContent=win?'城市网络达标':'城市网络停摆';$('infoBody').innerHTML=`<h3>${city.i} ${city.n}</h3><p>运送 ${q.delivered}/${city.target} · 最高压力 ${q.maxPressure}% · 运营至第 ${q.week} 周</p>${win?`<div class="best">${'★'.repeat(profile.best[q.city])}${'☆'.repeat(3-profile.best[q.city])}</div>`:'<p>某座车站持续超载。增加换乘、车辆或枢纽容量后再试。</p>'}<button class="btn primary" id="returnCities">返回城市列表</button>`;$('infoOverlay').classList.remove('hidden');$('returnCities').onclick=()=>{q=null;save();$('infoOverlay').classList.add('hidden');cityScreen();$('startOverlay').classList.remove('hidden')}}
function showSave(){const code=exportCode();$('infoTitle').textContent='跨设备交通档案';$('infoBody').innerHTML=`<p>城市解锁、最佳评级、线路、乘客、车辆与每周升级都会导出，并带完整性校验。</p><textarea class="savebox" id="saveCode">${code}</textarea><div class="controls"><button class="btn" id="copyCode">复制导出</button><button class="btn" id="importCodeBtn">导入上方存档</button></div>`;$('infoOverlay').classList.remove('hidden');$('copyCode').onclick=()=>navigator.clipboard?.writeText($('saveCode').value);$('importCodeBtn').onclick=()=>{try{importCode($('saveCode').value);$('infoOverlay').classList.add('hidden');$('startOverlay').classList.toggle('hidden',!!q);alert('交通档案导入成功')}catch(e){alert(e.message)}}}
function render(){if(!q)return;const city=CITIES[q.city];g.clearRect(0,0,960,600);g.fillStyle=city.rule==='final'?'#17222d':'#e9f0ed';g.fillRect(0,0,960,600);g.strokeStyle=city.rule==='final'?'#354458':'#becdca';g.lineWidth=3;for(let i=0;i<6;i++){g.beginPath();g.moveTo(0,70+i*95);g.bezierCurveTo(260,20+i*100,650,135+i*60,960,45+i*100);g.stroke()}if(['river','final'].includes(city.rule)){g.fillStyle=city.rule==='final'?'#24435d':'#b9dce4';g.fillRect(455,0,55,600)}if(city.rule==='island'){g.fillStyle='#b9dce4';g.fillRect(285,0,55,600);g.fillRect(620,0,55,600);g.fillRect(0,275,960,42)}if(city.rule==='hill'){g.fillStyle='#c8c1ac';for(let i=0;i<5;i++){g.beginPath();g.arc(600+i*70,100+(i%2)*300,65,0,7);g.fill()}}
q.lines.forEach((L,li)=>{if(L.length<2)return;g.strokeStyle=COLORS[li];g.lineWidth=9;g.lineCap='round';g.lineJoin='round';g.beginPath();L.forEach((si,j)=>{const s=q.stations[si];j?g.lineTo(s.x,s.y):g.moveTo(s.x,s.y)});g.stroke()});q.segments.forEach(s=>{if(!s.bridge&&!s.tunnel)return;const a=q.stations[s.a],b=q.stations[s.b];g.fillStyle='#222';g.font='18px sans-serif';g.fillText(s.bridge?'🌉':'🚇',(a.x+b.x)/2,(a.y+b.y)/2)});
q.stations.forEach((s,si)=>{const cap=q.stationCap+s.hub*5,hot=s.wait.length>=cap;g.fillStyle=city.rule==='final'?'#eef3f4':'#fff';g.strokeStyle=hot?'#d94149':'#222';g.lineWidth=hot?6:4;g.beginPath();g.arc(s.x,s.y,21+s.hub*2,0,7);g.fill();g.stroke();g.fillStyle='#222';g.font='23px sans-serif';g.textAlign='center';g.fillText(SHAPES[s.shape],s.x,s.y+8);s.wait.slice(0,18).forEach((p,i)=>{g.font='12px sans-serif';g.fillStyle=hot?'#b82f37':'#333';g.fillText(SHAPES[p.dest],s.x-26+(i%6)*10,s.y+37+Math.floor(i/6)*12)});if(hot){g.font='bold 10px sans-serif';g.fillStyle='#d94149';g.fillText(Math.ceil(Math.max(0,7-s.over))+'s',s.x,s.y-30)}});
q.cars.forEach(car=>{const L=q.lines[car.line],a=q.stations[L[car.seg]],b=q.stations[L[car.seg+car.dir]]||a;if(!a)return;const x=a.x+(b.x-a.x)*car.t,y=a.y+(b.y-a.y)*car.t;g.save();g.translate(x,y);g.rotate(Math.atan2(b.y-a.y,b.x-a.x));g.fillStyle=COLORS[car.line];g.fillRect(-16,-10,32,20);g.fillStyle='#fff';g.font='bold 10px sans-serif';g.textAlign='center';g.fillText(car.on.length,0,4);g.restore()});if(q.paused&&!q.over&&!$('choiceOverlay').classList.contains('hidden')){}else if(q.paused&&!q.over){g.fillStyle='#ffffffc8';g.fillRect(0,0,960,600);g.fillStyle='#222';g.font='bold 34px sans-serif';g.textAlign='center';g.fillText('运营暂停',480,300)}}
function drawUI(){if(!q)return;const c=CITIES[q.city],max=Math.max(0,...q.stations.map(s=>s.wait.length/(q.stationCap+s.hub*5)));$('week').textContent=`${q.week} / ${c.weeks}`;$('delivered').textContent=`${q.delivered} / ${c.target}`;$('budget').textContent=Math.floor(q.budget);$('trainCount').textContent=`${usedTrains()} / ${q.totalTrains}`;$('pressure').textContent=Math.round(max*100)+'%';$('pressure').className=max>=.8?'danger-text':'';$('cityName').textContent=`${c.i} ${c.n}`;$('cityRule').textContent=c.d;$('message').textContent=q.message;
$('lines').innerHTML=COLORS.slice(0,q.lineCount).map((color,i)=>`<button class="line-btn ${selectedLine===i?'active':''}" style="--c:${color}" data-line="${i}">线路 ${i+1} · ${q.lines[i].length}站 · ${q.lineCars[i]}车</button>`).join('');document.querySelectorAll('[data-line]').forEach(b=>b.onclick=()=>{selectedLine=+b.dataset.line;drawUI()});$('resources').innerHTML=[['可用桥梁',q.bridges],['可用隧道',q.tunnels],['列车容量',q.capacity],['车站基础容量',q.stationCap],['网络速度',Math.round(q.speed*100)+'%']].map(x=>`<div class="resource"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('');$('stationList').innerHTML=q.stations.map((s,i)=>{const cap=q.stationCap+s.hub*5,ratio=s.wait.length/cap;return`<div class="station-row ${ratio>=.8?'danger-text':''}"><span>${SHAPES[s.shape]}</span><span>${i+1}号站${s.hub?' · 枢纽'+s.hub:''}</span><b>${s.wait.length}/${cap}</b></div>`}).join('');$('log').innerHTML=q.logs.map(x=>`<div>${x}</div>`).join('');$('addTrainBtn').textContent=`增配列车（闲置 ${q.totalTrains-usedTrains()}）`;$('pauseBtn').textContent=q.paused?'继续':'暂停';render();save()}
function cityScreen(){$('cities').innerHTML=CITIES.map((c,i)=>{const best=profile.best[i]||0;return`<button class="city" data-city="${i}" ${i>=profile.unlocked?'disabled':''}><span>${c.i}</span><h3>${i+1}. ${c.n}</h3><p>${c.d}<br>目标 ${c.target} · ${c.weeks} 周 ${best?`<span class="best">${'★'.repeat(best)}</span>`:''}</p></button>`}).join('');document.querySelectorAll('[data-city]').forEach(b=>b.onclick=()=>{q=fresh(+b.dataset.city);selectedLine=0;$('startOverlay').classList.add('hidden');drawUI()})}
cv.onpointerdown=e=>{if(!q||q.paused||q.over)return;const r=cv.getBoundingClientRect(),x=(e.clientX-r.left)*960/r.width,y=(e.clientY-r.top)*600/r.height,i=stationAt(x,y);if(i>=0)addStationToLine(i)};$('undoBtn').onclick=undo;$('addTrainBtn').onclick=addTrain;$('removeTrainBtn').onclick=removeTrain;$('hubBtn').onclick=makeHub;$('pauseBtn').onclick=()=>{q.paused=!q.paused;drawUI()};$('saveBtn').onclick=()=>q&&showSave();$('closeInfoBtn').onclick=()=>$('infoOverlay').classList.add('hidden');$('newBtn').onclick=()=>{if(!q||confirm('离开当前城市并返回地图？')){q=null;save();cityScreen();$('startOverlay').classList.remove('hidden')}};function loop(t){const dt=Math.min(.04,(t-last)/1000||0);last=t;update(dt);render();raf=requestAnimationFrame(loop)}load();cityScreen();if(q&&!q.over){$('startOverlay').classList.add('hidden');q.paused=false;selectedLine=q.selected||0;syncCars();drawUI()}loop(0)
})();</script><style>@media(max-width:560px){.map-panel>.controls{display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}.map-panel>.controls .btn{width:100%}}</style></body></html>
