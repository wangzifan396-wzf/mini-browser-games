  <style>

    *{box-sizing:border-box}[hidden]{display:none!important}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,sans-serif;background:var(--bg)}a{color:inherit}button,input,select{font:inherit}.shell{width:min(1280px,calc(100vw - 28px));margin:0 auto}.site-head{color:#fff;background:var(--dark);border-bottom:5px solid #e3b84e}.head-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;min-height:164px;padding:26px 0}.brand{min-width:0}.eyebrow{margin:0 0 7px;color:#f3c969;font-size:12px;font-weight:900;letter-spacing:.08em}.brand h1{margin:0;font-size:clamp(34px,5vw,58px);line-height:1.04;letter-spacing:0}.brand p{max-width:720px;margin:10px 0 0;color:#dbe8e8;font-size:15px;line-height:1.6}.head-links{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.head-link{display:inline-flex;align-items:center;min-height:42px;padding:0 14px;border:1px solid #86a9b2;border-radius:var(--radius);color:#fff;text-decoration:none;font-weight:900;background:#225164}.head-link.primary{border-color:#f3c969;color:#172127;background:#f3c969}.summary-band{border-bottom:1px solid var(--line);background:var(--paper)}.summary{display:grid;grid-template-columns:repeat(4,1fr)}.summary-item{padding:15px 18px;border-right:1px solid var(--line)}.summary-item:last-child{border-right:0}.summary-item b{display:block;color:var(--blue);font-size:23px}.summary-item span{color:var(--muted);font-size:12px;font-weight:800}.catalog{padding:28px 0 46px}.catalog-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:15px}.catalog-head h2{margin:0;font-size:27px}.catalog-head p{margin:5px 0 0;color:var(--muted);font-size:13px}.result-count{color:var(--teal);font-weight:900}.toolbar{display:grid;grid-template-columns:minmax(220px,1fr) 220px auto;gap:10px;align-items:center;margin-bottom:18px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.search,.select{width:100%;height:44px;border:1px solid #9cadaa;border-radius:var(--radius);color:var(--ink);background:var(--paper);outline:none}.search{padding:0 13px}.select{padding:0 10px}.search:focus,.select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(23,107,145,.13)}.grades{display:flex;gap:4px;padding:4px;border:1px solid #9cadaa;border-radius:var(--radius);background:#dde6e3}.grade-filter{min-width:38px;height:34px;padding:0 9px;border:0;border-radius:5px;color:#41555d;background:transparent;font-weight:900;cursor:pointer}.grade-filter.active{color:#fff;background:var(--blue)}.game-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.game-card{display:flex;flex-direction:column;min-height:220px;padding:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper);box-shadow:var(--shadow)}.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.game-card h3{margin:0;font-size:18px;line-height:1.35}.grade{flex:0 0 auto;display:grid;place-items:center;min-width:36px;height:29px;padding:0 8px;border-radius:6px;color:#fff;background:#66767b;font-size:12px;font-weight:900}.grade.s{background:#9a6810}.grade.a{background:var(--teal)}.grade.b{background:var(--blue)}.grade.c{background:#6c6387}.category{margin:7px 0 0;color:var(--blue);font-size:11px;font-weight:900}.description{flex:1;margin:12px 0;color:var(--muted);font-size:13px;line-height:1.6}.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px}.play,.source{display:grid;place-items:center;min-height:40px;border-radius:var(--radius);text-decoration:none;font-size:13px;font-weight:900}.play{color:#fff;background:var(--blue)}.source{border:1px solid #9cadaa;color:var(--ink);background:#edf1ec}.empty{grid-column:1/-1;padding:70px 20px;border:1px dashed #9cadaa;border-radius:var(--radius);color:var(--muted);text-align:center}.site-foot{padding:22px 0;border-top:1px solid var(--line);color:var(--muted);background:var(--paper);font-size:12px}.foot-inner{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.status{min-height:120px;display:grid;place-items:center;color:var(--muted);font-weight:800}@media(max-width:920px){.game-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.toolbar{grid-template-columns:1fr 190px}.grades{grid-column:1/-1;justify-content:center}.head-inner{align-items:flex-start}.summary{grid-template-columns:repeat(2,1fr)}.summary-item:nth-child(2){border-right:0}.summary-item:nth-child(-n+2){border-bottom:1px solid var(--line)}}@media(max-width:620px){.shell{width:calc(100vw - 18px)}.head-inner{display:block;min-height:0;padding:22px 0}.brand h1{font-size:36px}.head-links{justify-content:flex-start;margin-top:18px}.head-link{flex:1 1 auto;justify-content:center}.summary-item{padding:12px}.summary-item b{font-size:19px}.catalog{padding-top:21px}.catalog-head{display:block}.result-count{display:block;margin-top:8px}.toolbar{grid-template-columns:1fr}.grades{grid-column:auto;overflow-x:auto;justify-content:flex-start}.game-grid{grid-template-columns:1fr}.game-card{min-height:0}.foot-inner{display:block}.foot-inner span{display:block;margin-top:5px}}

<body>
  <header class="site-head"><div class="shell head-inner"><div class="brand"><p class="eyebrow">OPEN SOURCE · SINGLE FILE GAMES</p><h1>迷你游戏合集</h1><p>100 款零依赖浏览器小游戏，覆盖策略、动作、益智、经营与实验玩法。每款作品均可独立运行。</p></div><nav class="head-links" aria-label="项目链接"><a class="head-link primary" href="#catalog">浏览游戏</a><a class="head-link" href="https://github.com/wangzifan396-wzf/mini-browser-games">GitHub</a><a class="head-link" href="GAME_AUDIT.md">质量审计</a></nav></div></header>
  <section class="summary-band"><div class="shell summary"><div class="summary-item"><b id="totalStat">100</b><span>款开源游戏</span></div><div class="summary-item"><b>0</b><span>运行时依赖</span></div><div class="summary-item"><b>1 HTML</b><span>每款独立交付</span></div><div class="summary-item"><b>MIT</b><span>开源许可证</span></div></div></section>
  <main class="shell catalog" id="catalog"><div class="catalog-head"><div><h2>在线游戏目录</h2><p>按质量评级和玩法类型浏览，点击卡片即可打开独立游戏。</p></div><span class="result-count" id="resultCount">正在读取目录</span></div><div class="toolbar"><input class="search" id="searchInput" type="search" placeholder="搜索游戏名称或玩法" aria-label="搜索游戏"><select class="select" id="categorySelect" aria-label="玩法类型"><option value="all">全部类型</option></select><div class="grades" id="gradeFilters" aria-label="质量评级"><button class="grade-filter active" data-grade="all">全部</button><button class="grade-filter" data-grade="S">S</button><button class="grade-filter" data-grade="A">A</button><button class="grade-filter" data-grade="B">B</button><button class="grade-filter" data-grade="C">C</button><button class="grade-filter" data-grade="D">D</button></div></div><div class="status" id="status">正在载入 100 款游戏资料...</div><div class="game-grid" id="gameGrid" hidden></div></main>
  <footer class="site-foot"><div class="shell foot-inner"><span>Mini Browser Games · MIT License</span><span>所有游戏均为单 HTML 文件，可离线保存运行。</span></div></footer>
  <script>
  (()=>{
    const PAGE_BASE="https://wangzifan396-wzf.github.io/mini-browser-games/",SOURCE_BASE="https://github.com/wangzifan396-wzf/mini-browser-games/blob/main/";const grid=document.getElementById("gameGrid"),status=document.getElementById("status"),searchInput=document.getElementById("searchInput"),categorySelect=document.getElementById("categorySelect"),resultCount=document.getElementById("resultCount"),gradeFilters=document.getElementById("gradeFilters");let games=[],grade="all";
    function parseReadme(markdown){const found=[],seen=new Set();let category="其他",inside=false;for(const line of markdown.split(/\r?\n/)){if(line.startsWith("## 游戏总览")){inside=true;continue}if(!inside)continue;if(line.startsWith("## ")&&!line.startsWith("### "))break;if(line.startsWith("### ")){category=line.slice(4).trim();continue}const match=line.match(/^\|\s*([^|]+?)\s*\|\s*\[([^\]]+)\]\(([^)]+\.html)\)\s*\|\s*([^|]+?)\s*\|/);if(!match)continue;const file=match[3].split("/").pop();if(seen.has(file))continue;seen.add(file);found.push({rating:match[1].trim().replace("+",""),title:match[2].trim(),file,description:match[4].trim(),category})}return found}
    function render(){const query=searchInput.value.trim().toLocaleLowerCase("zh-CN"),category=categorySelect.value;const visible=games.filter(game=>(grade==="all"||game.rating.startsWith(grade))&&(category==="all"||game.category===category)&&(!query||`${game.title} ${game.file} ${game.description} ${game.category}`.toLocaleLowerCase("zh-CN").includes(query)));grid.replaceChildren();for(const game of visible){const card=document.createElement("article");card.className="game-card";const top=document.createElement("div");top.className="card-top";const title=document.createElement("h3");title.textContent=game.title;const badge=document.createElement("span");badge.className=`grade ${game.rating[0].toLowerCase()}`;badge.textContent=game.rating;top.append(title,badge);const type=document.createElement("p");type.className="category";type.textContent=game.category;const description=document.createElement("p");description.className="description";description.textContent=game.description;const actions=document.createElement("div");actions.className="card-actions";const play=document.createElement("a");play.className="play";play.href=PAGE_BASE+game.file;play.textContent="在线试玩";const source=document.createElement("a");source.className="source";source.href=SOURCE_BASE+game.file;source.textContent="查看源码";actions.append(play,source);card.append(top,type,description,actions);grid.append(card)}if(!visible.length){const empty=document.createElement("div");empty.className="empty";empty.textContent="没有符合当前条件的游戏。";grid.append(empty)}resultCount.textContent=`显示 ${visible.length} / ${games.length} 款`}
    async function load(){try{const response=await fetch("README.md",{cache:"no-store"});if(!response.ok)throw Error(`HTTP ${response.status}`);games=parseReadme(await response.text());if(!games.length)throw Error("目录为空");const order={S:0,A:1,B:2,C:3,D:4};games.sort((a,b)=>(order[a.rating[0]]??9)-(order[b.rating[0]]??9)||a.title.localeCompare(b.title,"zh-CN"));const categories=[...new Set(games.map(game=>game.category))];for(const category of categories){const option=document.createElement("option");option.value=category;option.textContent=category;categorySelect.append(option)}document.getElementById("totalStat").textContent=games.length;status.hidden=true;grid.hidden=false;render()}catch(error){status.textContent=`目录加载失败：${error.message}。可前往 GitHub README 浏览游戏。`;resultCount.textContent="目录不可用"}}
    searchInput.addEventListener("input",render);categorySelect.addEventListener("change",render);gradeFilters.addEventListener("click",event=>{const button=event.target.closest("[data-grade]");if(!button)return;grade=button.dataset.grade;gradeFilters.querySelectorAll(".grade-filter").forEach(node=>node.classList.toggle("active",node===button));render()});load();
  })();
  </script>
