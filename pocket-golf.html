<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>口袋高尔夫</title><style>
*{box-sizing:border-box}body{margin:0;background:#173522;color:#f4fff1;font-family:system-ui,"Microsoft YaHei"}.app{min-height:100vh;padding:14px;display:grid;place-items:center}.shell{width:min(980px,100%);background:#28523a;border:1px solid #6d9978;border-radius:20px;padding:16px}.top,.row{display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap}canvas{width:100%;aspect-ratio:16/9;background:#58a85f;border:8px solid #d4b46c;border-radius:16px;display:block;touch-action:none;margin:12px 0}.score{display:flex;gap:5px;flex-wrap:wrap}.tag{padding:6px 9px;background:#376c47;border-radius:15px}button{padding:9px 11px;border:1px solid #80a987;border-radius:9px;background:#3e7750;color:white;font-weight:bold}.help{font-size:13px;color:#c4dac9}@media(max-width:650px){.app{place-items:start center}}
</style><main class="app"><section class="shell"><div class="top"><div><h1 style="margin:0">口袋高尔夫</h1><div class="help">从白球向后拖拽并松开发球；利用墙面反弹，避开沙坑与水池，完成九洞挑战。</div></div><div>第 <b id="holeNo"></b>/9 洞　杆数 <b id="strokes"></b>　标准杆 <b id="par"></b>　总计 <b id="total"></b></div></div><canvas id="c" width="960" height="540"></canvas><div class="row"><div class="score" id="score"></div><button id="reset">重置本洞</button><button id="restart">新球局</button><span id="msg"></span></div></section></main><script>
const cv=document.getElementById('c'),g=cv.getContext('2d');let q,drag=null,last=0;const $=x=>document.getElementById(x);
function fresh(){return{hole:0,strokes:0,total:0,scores:[],ball:null,cup:null,obstacles:[],moving:false,done:false}}
function setup(keep=0){let h=q.hole;q.strokes=keep;q.ball={x:90,y:100+(h%3)*160,vx:0,vy:0};q.cup={x:870,y:100+((h*2)%3)*160};q.obstacles=Array.from({length:2+h%3},(_,i)=>({x:280+i*170,y:80+((i+h)%3)*150,w:55+(i%2)*45,h:95,type:i%3===0?'sand':i%3===1?'wall':'water'}));q.moving=false;q.done=false;drawUI()}
function point(e){let r=cv.getBoundingClientRect(),p=e.touches?.[0]||e;return{x:(p.clientX-r.left)*960/r.width,y:(p.clientY-r.top)*540/r.height}}
function update(dt){let b=q.ball;if(!q.moving)return;b.x+=b.vx*dt;b.y+=b.vy*dt;b.vx*=Math.pow(.985,dt*60);b.vy*=Math.pow(.985,dt*60);if(b.x<12||b.x>948){b.vx*=-.8;b.x=Math.max(12,Math.min(948,b.x))}if(b.y<12||b.y>528){b.vy*=-.8;b.y=Math.max(12,Math.min(528,b.y))}for(const o of q.obstacles)if(b.x>o.x&&b.x<o.x+o.w&&b.y>o.y&&b.y<o.y+o.h){if(o.type==='water'){msg.textContent='落水罚一杆，回到发球点。';setup(q.strokes+1);return}if(o.type==='sand'){b.vx*=.9;b.vy*=.9}else{b.vx*=-.8;b.vy*=-.8}}if(Math.hypot(b.x-q.cup.x,b.y-q.cup.y)<18&&Math.hypot(b.vx,b.vy)<120)return finish();if(Math.hypot(b.vx,b.vy)<5){b.vx=b.vy=0;q.moving=false}}
function finish(){q.moving=false;q.done=true;q.total+=q.strokes;q.scores.push(q.strokes);msg.textContent=`完成本洞：${q.strokes} 杆！`;if(q.hole<8)setTimeout(()=>{q.hole++;setup()},750);else setTimeout(()=>alert(`九洞完赛！总杆数 ${q.total}`),50)}
function render(t){let dt=Math.min(.04,(t-last)/1000||0);last=t;update(dt);g.fillStyle='#58a85f';g.fillRect(0,0,960,540);for(const o of q.obstacles){g.fillStyle=o.type==='sand'?'#d8bd72':o.type==='water'?'#4ca6d2':'#6b5544';g.fillRect(o.x,o.y,o.w,o.h)}g.fillStyle='#111';g.beginPath();g.arc(q.cup.x,q.cup.y,13,0,7);g.fill();g.fillStyle='white';g.fillRect(q.cup.x,q.cup.y-60,3,60);g.fillStyle='red';g.fillRect(q.cup.x,q.cup.y-60,35,20);g.fillStyle='white';g.beginPath();g.arc(q.ball.x,q.ball.y,11,0,7);g.fill();if(drag){g.strokeStyle='white';g.lineWidth=3;g.beginPath();g.moveTo(q.ball.x,q.ball.y);g.lineTo(drag.x,drag.y);g.stroke()}requestAnimationFrame(render)}
function drawUI(){holeNo.textContent=q.hole+1;strokes.textContent=q.strokes;par.textContent=3+q.hole%2;total.textContent=q.total;score.innerHTML=q.scores.map((s,i)=>`<span class="tag">${i+1}洞 ${s}</span>`).join('')}
cv.onpointerdown=e=>{let p=point(e);if(!q.moving&&!q.done&&Math.hypot(p.x-q.ball.x,p.y-q.ball.y)<35)drag=p};cv.onpointermove=e=>{if(drag)drag=point(e)};cv.onpointerup=e=>{if(!drag)return;let p=point(e),dx=q.ball.x-p.x,dy=q.ball.y-p.y,m=Math.min(500,Math.hypot(dx,dy)*3),l=Math.hypot(dx,dy)||1;q.ball.vx=dx/l*m;q.ball.vy=dy/l*m;q.strokes++;q.moving=true;drag=null;drawUI()};reset.onclick=()=>setup();restart.onclick=()=>{q=fresh();setup()};q=fresh();setup();requestAnimationFrame(render);
</script>
