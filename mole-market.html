<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>菜摊敲敲乐</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23131b20'/%3E%3Cpath d='M14 46h36v8H14z' fill='%23d6a33d'/%3E%3Ccircle cx='25' cy='32' r='11' fill='%238bd0bb'/%3E%3Ccircle cx='41' cy='31' r='10' fill='%23bd5148'/%3E%3C/svg%3E">
    <style>
      :root{--ink:#10191f;--panel:#fffdf4;--line:#87989e;--teal:#287468;--gold:#d6a33d;--red:#bd5148;--shadow:rgba(5,12,16,.28);--radius:8px}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,sans-serif;background:linear-gradient(rgba(255,255,245,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,245,.06) 1px,transparent 1px),linear-gradient(135deg,#102024,#17383a 46%,#533b4b);background-size:30px 30px,30px 30px,auto}button{font:inherit}.app{width:min(1380px,calc(100vw - 28px));margin:14px auto}.topbar,.panel{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,244,.97);box-shadow:0 16px 36px var(--shadow)}.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:16px 20px}.eyebrow{margin:0 0 5px;color:#856219;font-size:12px;font-weight:900}h1{margin:0;font-size:clamp(26px,4vw,44px);line-height:1}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:42px;padding:0 14px;border:1px solid #24534d;border-radius:var(--radius);color:#fffdf6;background:var(--teal);font-weight:900;cursor:pointer}.btn.secondary{color:var(--ink);background:#f0d17b;border-color:#9c7621}.layout{display:grid;grid-template-columns:minmax(0,1fr) 312px;gap:14px;margin-top:14px;align-items:start}.stage{position:relative;overflow:hidden;min-height:620px}canvas{display:block;width:100%;height:620px;touch-action:none}.side{padding:16px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.stat{padding:10px;border:1px solid #9da69e;border-radius:var(--radius);background:#f9f7eb}.stat b{display:block;font-size:24px;line-height:1.1}.stat small{color:#5e6d67;font-weight:800}.hint{margin:14px 0 0;color:#566861;line-height:1.55;font-weight:700}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:24px;background:rgba(16,28,31,.52)}.modal{width:min(460px,100%);padding:22px;border:1px solid #a4b4ad;border-radius:var(--radius);background:#fffdf6;box-shadow:0 24px 52px rgba(0,0,0,.32)}.modal h2{margin:0 0 10px;font-size:28px}.modal p{margin:0 0 16px;color:#53635f;line-height:1.6}.hidden{display:none}@media(max-width:940px){.layout{grid-template-columns:1fr}.side{order:-1}.stage{min-height:540px}canvas{height:540px}}@media(max-width:620px){.app{width:min(100vw - 16px,1380px);margin-top:8px}.topbar{display:block;padding:14px}.actions{margin-top:12px;justify-content:stretch}.btn{flex:1 1 auto}.stage{min-height:500px}canvas{height:500px}}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar"><div><p class="eyebrow">REACTION TAP</p><h1>菜摊敲敲乐</h1></div><div class="actions"><button class="btn" id="startBtn">开摊</button><button class="btn secondary" id="focusBtn">专注</button><button class="btn secondary" id="resetBtn">重开</button></div></header>
      <section class="layout">
        <div class="panel stage"><canvas id="gameCanvas" aria-label="菜摊敲敲乐游戏画面"></canvas><div class="overlay" id="overlay"><div class="modal"><h2 id="overlayTitle">看准再敲</h2><p id="overlayText">坏菜会冒头，敲掉得分；别敲到好菜。连续命中会进入专注时间。</p><button class="btn" id="overlayBtn">开始敲摊</button></div></div></div>
        <aside class="panel side">
          <div class="stats"><div class="stat"><b id="scoreText">0</b><small>分数</small></div><div class="stat"><b id="comboText">0</b><small>连击</small></div><div class="stat"><b id="missText">0/5</b><small>失误</small></div><div class="stat"><b id="bestText">0</b><small>最佳</small></div></div>
          <p class="hint" id="hintText">点击坏菜和小偷，避开带笑脸的好菜。专注会短暂放慢冒头速度。</p>
        </aside>
      </section>
    </main>
    <script>
      (()=>{const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d"),overlay=document.getElementById("overlay"),overlayTitle=document.getElementById("overlayTitle"),overlayText=document.getElementById("overlayText"),overlayBtn=document.getElementById("overlayBtn"),startBtn=document.getElementById("startBtn"),resetBtn=document.getElementById("resetBtn"),focusBtn=document.getElementById("focusBtn"),scoreText=document.getElementById("scoreText"),comboText=document.getElementById("comboText"),missText=document.getElementById("missText"),bestText=document.getElementById("bestText"),hintText=document.getElementById("hintText");const storageKey="miniMoleMarketRecords";let w=900,h=620,dpr=1,last=0,token=0,state=makeState();
      function best(){try{return JSON.parse(localStorage.getItem(storageKey)||"{}").best||0}catch(e){return 0}}function save(s){const b=Math.max(best(),s);localStorage.setItem(storageKey,JSON.stringify({best:b}));return b}
      function makeState(){return{mode:"menu",time:0,duration:60000,next:0,score:0,combo:0,miss:0,best:best(),focus:0,holes:[],pops:[]}}
      function resize(){const r=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,devicePixelRatio||1));w=Math.max(320,r.width);h=Math.max(480,r.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);makeHoles();draw()}
      function makeHoles(){state.holes=[];const cols=3,rows=3,gx=w/(cols+1),gy=(h-120)/(rows+1);for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)state.holes.push({x:gx*(x+1),y:110+gy*(y+1),item:null})}
      function start(){token++;state=makeState();makeHoles();state.mode="running";spawn();overlay.classList.add("hidden");last=performance.now();updateHud();requestAnimationFrame(t=>loop(t,token))}
      function end(){if(state.mode==="over")return;state.mode="over";state.best=save(state.score);overlayTitle.textContent="收摊";overlayText.textContent=`分数 ${state.score}，最高连击 ${state.combo}。`;overlayBtn.textContent="再来一摊";overlay.classList.remove("hidden");updateHud()}
      function spawn(){const empty=state.holes.filter(h=>!h.item);if(!empty.length)return;const hole=empty[Math.floor(Math.random()*empty.length)],roll=Math.random();hole.item={type:roll<.72?"bad":roll<.9?"good":"thief",age:0,life:1250+Math.random()*650};state.next=state.time+Math.max(420,920-state.time/150)}
      function hit(hole){const item=hole.item;if(!item)return;if(item.type==="good"){state.miss++;state.combo=0;pop(hole.x,hole.y,"别敲","#bd5148")}else{state.combo++;const gain=item.type==="thief"?180:80+state.combo*6;state.score+=gain;if(state.combo%8===0)state.focus=4;pop(hole.x,hole.y,`+${gain}`,"#d6a33d")}hole.item=null;if(state.miss>=5)end();updateHud();draw()}
      function focus(){if(state.combo>=5)state.focus=4}
      function update(dt){state.time+=dt*1000;if(state.time>=state.duration)end();if(state.focus>0)state.focus-=dt;if(state.time>=state.next)spawn();const slow=state.focus>0?.45:1;for(const h0 of state.holes){if(h0.item){h0.item.age+=dt*1000*slow;if(h0.item.age>h0.item.life){if(h0.item.type!=="good"){state.miss++;state.combo=0;pop(h0.x,h0.y,"漏了","#bd5148");if(state.miss>=5)end()}h0.item=null}}}state.pops=state.pops.filter(p=>{p.y-=dt*38;p.life-=dt*.9;return p.life>0});updateHud()}
      function loop(now,id){if(id!==token||state.mode!=="running")return;const dt=Math.min(.05,(now-last)/1000||.016);last=now;update(dt);draw();if(state.mode==="running")requestAnimationFrame(t=>loop(t,id))}
      function pop(x,y,text,color){state.pops.push({x,y,text,color,life:1})}function rr(x,y,W,H,r,fill,stroke){r=Math.min(r,W/2,H/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+W,y,x+W,y+H,r);ctx.arcTo(x+W,y+H,x,y+H,r);ctx.arcTo(x,y+H,x,y,r);ctx.arcTo(x,y,x+W,y,r);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.stroke()}}
      function draw(){ctx.clearRect(0,0,w,h);const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,"#fff8e8");g.addColorStop(.6,"#edf7e8");g.addColorStop(1,"#d6c49a");ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle="#caa466";ctx.fillRect(0,h-48,w,48);for(const hole of state.holes){ctx.fillStyle="#31413e";ctx.beginPath();ctx.ellipse(hole.x,hole.y+28,62,24,0,0,Math.PI*2);ctx.fill();if(hole.item){const inRate=Math.min(1,hole.item.age/180),outRate=Math.max(0,(hole.item.life-hole.item.age)/220),rise=Math.min(1,Math.sin(inRate*Math.PI/2),outRate);const y=hole.y+16-rise*80;ctx.fillStyle=hole.item.type==="bad"?"#bd5148":hole.item.type==="good"?"#8bd0bb":"#d6a33d";ctx.beginPath();ctx.arc(hole.x,y,40,0,Math.PI*2);ctx.fill();ctx.lineWidth=4;ctx.strokeStyle="rgba(16,25,31,.62)";ctx.stroke();ctx.fillStyle="#10191f";ctx.font="900 26px system-ui";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(hole.item.type==="bad"?"坏":hole.item.type==="good"?"好":"偷",hole.x,y+1)}}const left=Math.max(0,Math.ceil((state.duration-state.time)/1000));rr(w-136,22,108,46,8,"rgba(255,253,244,.92)","#87989e");ctx.fillStyle="#10191f";ctx.font="900 22px system-ui";ctx.textAlign="center";ctx.fillText(`${left}s`,w-82,53);for(const p of state.pops){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.font="900 22px system-ui";ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1}}
      function updateHud(){scoreText.textContent=state.score;comboText.textContent=state.combo;missText.textContent=`${state.miss}/5`;bestText.textContent=Math.max(state.best,state.score);focusBtn.textContent=state.focus>0?"专注中":state.combo>=5?"专注":"专注";hintText.textContent=state.focus>0?"专注时间：冒头速度放慢，抓紧连击。":"点击坏菜和小偷，避开带笑脸的好菜。"}
      function click(e){const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;const hole=state.holes.find(h=>Math.hypot(h.x-x,h.y-y)<66);if(hole)hit(hole)}
      startBtn.addEventListener("click",start);resetBtn.addEventListener("click",start);overlayBtn.addEventListener("click",start);focusBtn.addEventListener("click",focus);canvas.addEventListener("pointerdown",click);document.addEventListener("keydown",e=>{if(e.code==="KeyR")start()});window.addEventListener("resize",resize);resize();updateHud();draw()})();
    </script>
  </body>
</html>
