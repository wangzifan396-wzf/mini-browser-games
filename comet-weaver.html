<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>彗尾织者</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23101824'/%3E%3Cpath d='M13 47c14-2 28-12 38-30-18 8-29 19-38 30Z' fill='%23f0d16f'/%3E%3Ccircle cx='24' cy='38' r='9' fill='%238bd0bb'/%3E%3C/svg%3E">
    <style>
      :root{--ink:#10191f;--panel:#fffdf4;--line:#87989e;--teal:#287468;--gold:#d6a33d;--red:#bd5148;--blue:#326f91;--shadow:rgba(5,12,16,.28);--radius:8px}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,sans-serif;background:linear-gradient(rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,245,.05) 1px,transparent 1px),linear-gradient(135deg,#0c1824,#152b41 48%,#433352);background-size:30px 30px,30px 30px,auto}button{font:inherit}.app{width:min(1380px,calc(100vw - 28px));margin:14px auto}.topbar,.panel{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,244,.97);box-shadow:0 16px 36px var(--shadow)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px}.eyebrow{margin:0 0 5px;color:#856219;font-size:12px;font-weight:900}h1{margin:0;font-size:clamp(26px,4vw,44px);line-height:1}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:42px;padding:0 14px;border:1px solid #24534d;border-radius:var(--radius);color:#fffdf6;background:var(--teal);font-weight:900;cursor:pointer}.btn.secondary{color:var(--ink);background:#f0d17b;border-color:#9c7621}.layout{display:grid;grid-template-columns:minmax(0,1fr) 312px;gap:14px;margin-top:14px;align-items:start}.stage{position:relative;overflow:hidden;min-height:620px}canvas{display:block;width:100%;height:620px;touch-action:none}.side{padding:16px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.stat{padding:10px;border:1px solid #9da69e;border-radius:var(--radius);background:#f9f7eb}.stat b{display:block;font-size:24px;line-height:1.1}.stat small{color:#5e6d67;font-weight:800}.meter{margin:0 0 13px}.meter span{display:flex;justify-content:space-between;margin-bottom:6px;color:#5e6d67;font-weight:900}.bar{height:13px;border:1px solid #84968f;border-radius:999px;overflow:hidden;background:#e9eadc}.bar i{display:block;width:100%;height:100%;background:linear-gradient(90deg,var(--red),var(--gold))}.pad{display:grid;grid-template-columns:repeat(3,60px);justify-content:center;gap:8px;margin-top:14px}.pad button{width:60px;height:52px;border:1px solid #758780;border-radius:var(--radius);background:#fff8e6;color:var(--ink);font-size:20px;font-weight:900;cursor:pointer}.pad .blank{visibility:hidden}.hint{margin:14px 0 0;color:#566861;line-height:1.55;font-weight:700}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:24px;background:rgba(16,28,31,.52)}.modal{width:min(460px,100%);padding:22px;border:1px solid #a4b4ad;border-radius:var(--radius);background:#fffdf6;box-shadow:0 24px 52px rgba(0,0,0,.32)}.modal h2{margin:0 0 10px;font-size:28px}.modal p{margin:0 0 16px;color:#53635f;line-height:1.6}.hidden{display:none}@media(max-width:940px){.layout{grid-template-columns:1fr}.side{order:-1}.stage{min-height:540px}canvas{height:540px}}@media(max-width:620px){.app{width:min(100vw - 16px,1380px);margin-top:8px}.topbar{display:block;padding:14px}.actions{margin-top:12px;justify-content:stretch}.btn{flex:1 1 auto}.stage{min-height:500px}canvas{height:500px}}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar"><div><p class="eyebrow">BULLET DODGE</p><h1>彗尾织者</h1></div><div class="actions"><button class="btn" id="startBtn">开局</button><button class="btn secondary" id="blinkBtn">闪现</button><button class="btn secondary" id="resetBtn">重开</button></div></header>
      <section class="layout">
        <div class="panel stage"><canvas id="gameCanvas" aria-label="彗尾织者游戏画面"></canvas><div class="overlay" id="overlay"><div class="modal"><h2 id="overlayTitle">穿过彗尾雨</h2><p id="overlayText">只需要活下去。贴近弹幕擦弹得分，闪现可以短暂无敌但有冷却。</p><button class="btn" id="overlayBtn">开始穿梭</button></div></div></div>
        <aside class="panel side">
          <div class="stats"><div class="stat"><b id="scoreText">0</b><small>分数</small></div><div class="stat"><b id="grazeText">0</b><small>擦弹</small></div><div class="stat"><b id="livesText">3</b><small>护盾</small></div><div class="stat"><b id="bestText">0</b><small>最佳</small></div></div>
          <div class="meter"><span><b>Boss</b><em id="bossText">100%</em></span><div class="bar"><i id="bossBar"></i></div></div>
          <div class="meter"><span><b>闪现</b><em id="blinkText">就绪</em></span><div class="bar"><i id="blinkBar"></i></div></div>
          <div class="pad"><button class="blank"></button><button data-dir="up">↑</button><button class="blank"></button><button data-dir="left">←</button><button data-dir="down">↓</button><button data-dir="right">→</button></div>
          <p class="hint">WASD / 方向键移动，Shift 或按钮闪现。触屏可拖动画布移动。</p>
        </aside>
      </section>
    </main>
    <script>
      (() => {
        const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d"),overlay=document.getElementById("overlay"),overlayTitle=document.getElementById("overlayTitle"),overlayText=document.getElementById("overlayText"),overlayBtn=document.getElementById("overlayBtn"),startBtn=document.getElementById("startBtn"),resetBtn=document.getElementById("resetBtn"),blinkBtn=document.getElementById("blinkBtn");
        const scoreText=document.getElementById("scoreText"),grazeText=document.getElementById("grazeText"),livesText=document.getElementById("livesText"),bestText=document.getElementById("bestText"),bossText=document.getElementById("bossText"),bossBar=document.getElementById("bossBar"),blinkText=document.getElementById("blinkText"),blinkBar=document.getElementById("blinkBar");
        const storageKey="miniCometWeaverRecords";let w=900,h=620,dpr=1,lastFrame=0,loopToken=0;const keys=new Set();let pointer=null;let state=makeState();
        function loadBest(){try{return JSON.parse(localStorage.getItem(storageKey)||"{}").best||0}catch(e){return 0}}function saveBest(s){const b=Math.max(loadBest(),s);localStorage.setItem(storageKey,JSON.stringify({best:b}));return b}
        function makeState(){return{mode:"menu",time:0,score:0,graze:0,lives:3,boss:100,player:{x:180,y:310,vx:0,vy:0,inv:0,blink:0},bullets:[],particles:[],nextPattern:0,best:loadBest()}}
        function resize(){const r=canvas.getBoundingClientRect();dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));w=Math.max(320,r.width);h=Math.max(480,r.height);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
        function start(){loopToken++;state=makeState();state.mode="running";state.player.x=w*.22;state.player.y=h*.5;overlay.classList.add("hidden");lastFrame=performance.now();updateHud();requestAnimationFrame(t=>loop(t,loopToken))}
        function finish(win=false){if(state.mode==="over")return;state.mode="over";state.best=saveBest(state.score);overlayTitle.textContent=win?"穿梭成功":"护盾碎裂";overlayText.textContent=`分数 ${state.score}，擦弹 ${state.graze} 次。`;overlayBtn.textContent="再来一局";overlay.classList.remove("hidden");updateHud()}
        function input(){let ax=0,ay=0;if(keys.has("ArrowLeft")||keys.has("KeyA"))ax-=1;if(keys.has("ArrowRight")||keys.has("KeyD"))ax+=1;if(keys.has("ArrowUp")||keys.has("KeyW"))ay-=1;if(keys.has("ArrowDown")||keys.has("KeyS"))ay+=1;if(pointer){ax=(pointer.x-state.player.x)/70;ay=(pointer.y-state.player.y)/70}const len=Math.hypot(ax,ay)||1;return{x:ax/len,y:ay/len,active:Math.hypot(ax,ay)>0.04}}
        function blink(){if(state.mode!=="running"||state.player.blink>0)return;const d=input();state.player.x+=d.x*96;state.player.y+=d.y*96;state.player.inv=.75;state.player.blink=4.2}
        function spawnPattern(){const boss={x:w-120,y:h*.5+Math.sin(state.time*.0017)*h*.25};const type=Math.floor(state.time/4500)%3;if(type===0){for(let i=0;i<18;i++){const a=i/18*Math.PI*2+state.time*.001;addBullet(boss.x,boss.y,Math.cos(a)*115,Math.sin(a)*115,7,"#f0d16f")}}else if(type===1){for(let i=-4;i<=4;i++){const a=Math.atan2(state.player.y-boss.y,state.player.x-boss.x)+i*.12;addBullet(boss.x,boss.y,Math.cos(a)*155,Math.sin(a)*155,6,"#bd5148")}}else{for(let i=0;i<10;i++){addBullet(boss.x,boss.y,-135-Math.random()*70,(Math.random()-.5)*150,8,"#8bd0bb")}}state.nextPattern=state.time+620}
        function addBullet(x,y,vx,vy,r,color){state.bullets.push({x,y,vx,vy,r,color,grazed:false})}
        function update(dt){state.time+=dt*1000;state.score+=Math.floor(dt*12);state.boss=Math.max(0,100-state.time/1200);if(state.boss<=0)finish(true);const d=input(),p=state.player;if(d.active){p.vx+=d.x*620*dt;p.vy+=d.y*620*dt}p.vx*=Math.pow(.05,dt);p.vy*=Math.pow(.05,dt);p.x=Math.max(22,Math.min(w-22,p.x+p.vx*dt));p.y=Math.max(22,Math.min(h-22,p.y+p.vy*dt));p.inv=Math.max(0,p.inv-dt);p.blink=Math.max(0,p.blink-dt);if(state.time>state.nextPattern)spawnPattern();for(let i=state.bullets.length-1;i>=0;i--){const b=state.bullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.x<-40||b.x>w+40||b.y<-40||b.y>h+40){state.bullets.splice(i,1);continue}const dist=Math.hypot(b.x-p.x,b.y-p.y);if(dist<b.r+9&&p.inv<=0){state.bullets.splice(i,1);state.lives--;p.inv=1.2;pop(p.x,p.y,"命中","#bd5148");if(state.lives<=0)finish();}else if(!b.grazed&&dist<b.r+28){b.grazed=true;state.graze++;state.score+=35;pop(b.x,b.y,"擦","#d6a33d")}}state.particles=state.particles.filter(o=>{o.y-=dt*36;o.life-=dt*.9;return o.life>0});updateHud()}
        function loop(now,token){if(token!==loopToken||state.mode!=="running")return;const dt=Math.min(.05,(now-lastFrame)/1000||.016);lastFrame=now;update(dt);draw();if(state.mode==="running")requestAnimationFrame(t=>loop(t,token))}
        function pop(x,y,text,color){state.particles.push({x,y,text,color,life:1})}function rr(x,y,wid,hei,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+wid,y,x+wid,y+hei,r);ctx.arcTo(x+wid,y+hei,x,y+hei,r);ctx.arcTo(x,y+hei,x,y,r);ctx.arcTo(x,y,x+wid,y,r);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.stroke()}}
        function draw(){ctx.clearRect(0,0,w,h);const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,"#101824");g.addColorStop(1,"#1d3452");ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle="rgba(255,255,255,.14)";for(let i=0;i<70;i++){const x=(i*97+state.time*.018)%w;const y=(i*53)%h;ctx.fillRect(x,y,2,2)}const boss={x:w-120,y:h*.5+Math.sin(state.time*.0017)*h*.25};ctx.fillStyle="#3d4b5d";ctx.beginPath();ctx.arc(boss.x,boss.y,42,0,Math.PI*2);ctx.fill();ctx.fillStyle="#f0d16f";ctx.beginPath();ctx.arc(boss.x-12,boss.y-6,7,0,Math.PI*2);ctx.arc(boss.x+12,boss.y-6,7,0,Math.PI*2);ctx.fill();
          for(const b of state.bullets){ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill()}const p=state.player;ctx.globalAlpha=p.inv>0?.55:1;ctx.fillStyle="#8bd0bb";ctx.beginPath();ctx.arc(p.x,p.y,13,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fffdf4";ctx.lineWidth=3;ctx.stroke();ctx.globalAlpha=1;for(const o of state.particles){ctx.globalAlpha=o.life;ctx.fillStyle=o.color;ctx.font="900 20px system-ui";ctx.textAlign="center";ctx.fillText(o.text,o.x,o.y);ctx.globalAlpha=1}}
        function updateHud(){scoreText.textContent=state.score.toString();grazeText.textContent=state.graze.toString();livesText.textContent=state.lives.toString();bestText.textContent=Math.max(state.best,state.score).toString();bossText.textContent=`${Math.max(0,Math.round(state.boss))}%`;bossBar.style.width=`${Math.max(0,state.boss)}%`;const ready=state.player.blink<=0;blinkText.textContent=ready?"就绪":`${state.player.blink.toFixed(1)}s`;blinkBar.style.width=`${ready?100:(1-state.player.blink/4.2)*100}%`;blinkBtn.textContent=ready?"闪现":"冷却"}
        startBtn.addEventListener("click",start);resetBtn.addEventListener("click",start);overlayBtn.addEventListener("click",start);blinkBtn.addEventListener("click",blink);document.querySelectorAll("[data-dir]").forEach(btn=>{const code={up:"ArrowUp",down:"ArrowDown",left:"ArrowLeft",right:"ArrowRight"}[btn.dataset.dir];btn.addEventListener("pointerdown",()=>keys.add(code));btn.addEventListener("pointerup",()=>keys.delete(code));btn.addEventListener("pointerleave",()=>keys.delete(code))});
        canvas.addEventListener("pointerdown",e=>{const r=canvas.getBoundingClientRect();pointer={x:e.clientX-r.left,y:e.clientY-r.top}});canvas.addEventListener("pointermove",e=>{if(pointer){const r=canvas.getBoundingClientRect();pointer={x:e.clientX-r.left,y:e.clientY-r.top}}});canvas.addEventListener("pointerup",()=>pointer=null);canvas.addEventListener("pointercancel",()=>pointer=null);
        document.addEventListener("keydown",e=>{keys.add(e.code);if(e.code==="ShiftLeft"||e.code==="ShiftRight")blink();if(e.code==="KeyR")start()});document.addEventListener("keyup",e=>keys.delete(e.code));window.addEventListener("resize",resize);resize();updateHud();draw();
      })();
    </script>
  </body>
</html>
